<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔍 숨은 물건 찾기 (만 3세)</title>
<style>
:root {
  --accent: #FF6B35;
  --accent-h: #e85a25;
  --mint: #4ECDC4;
  --mint-h: #38b8ae;
  --bg: #FFF8F0;
  --card-bg: #FFFFFF;
  --text: #333333;
  --shadow: 0 4px 16px rgba(0,0,0,.12);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.18);
  --radius-sm: 12px;
  --radius-md: 20px;
  --radius-lg: 24px;
  --font: 'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  background-image:
    radial-gradient(circle at 20% 20%,rgba(255,107,53,.06) 0%,transparent 50%),
    radial-gradient(circle at 80% 80%,rgba(78,205,196,.06) 0%,transparent 50%);
  color:var(--text);font-family:var(--font);
  min-height:100vh;display:flex;justify-content:center;
  padding:20px 16px 40px;
}
.screen{display:none;width:100%;max-width:680px;margin:0 auto;}
.screen.active{display:block;}

.game-header{text-align:center;padding:28px 0 20px;}
.game-header h1{font-size:2.2rem;color:var(--accent);text-shadow:2px 3px 6px rgba(255,107,53,.2);}
.subtitle{color:#888;font-size:1rem;margin-top:6px;}

/* Progress */
.progress-wrap{background:#fff;border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:14px 20px;margin-bottom:16px;}
.progress-label{font-size:.85rem;color:#888;margin-bottom:6px;text-align:center;}
.progress-bar{height:14px;background:#eee;border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--mint),var(--accent));border-radius:10px;transition:width .4s ease;}

/* Target area */
.target-area{
  background:linear-gradient(135deg,var(--mint),var(--mint-h));
  border-radius:var(--radius-lg);box-shadow:var(--shadow);
  padding:20px;margin-bottom:16px;text-align:center;color:#fff;
}
.target-label{font-size:1.1rem;font-weight:700;margin-bottom:8px;}
.target-emoji{font-size:4.5rem;line-height:1.1;animation:targetPulse 1.5s ease-in-out infinite;}
@keyframes targetPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.target-name{font-size:1.1rem;font-weight:700;margin-top:6px;}

/* Grid area */
.grid-area{
  background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow);
  padding:16px;margin-bottom:16px;
}
.emoji-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  max-width:440px;
  margin:0 auto;
}
.grid-cell{
  aspect-ratio:1;
  display:flex;justify-content:center;align-items:center;
  font-size:2.6rem;
  background:#fffaf5;
  border:3px solid #f0e4d8;
  border-radius:var(--radius-sm);
  cursor:pointer;
  transition:all .18s;
  user-select:none;
  opacity:.7;
}
.grid-cell:hover{
  border-color:var(--accent);
  transform:scale(1.06);
  box-shadow:var(--shadow);
  opacity:1;
}
.grid-cell:active{transform:scale(.95);}
.grid-cell.target-cell{opacity:1;}
.grid-cell.found{
  background:#d4f4e8;border-color:#2ECC71;
  animation:foundBounce .5s ease;opacity:1;
}
.grid-cell.wrong-cell{
  background:#fde8e8;border-color:#e74c3c;
  animation:shake .4s ease;
}
@keyframes foundBounce{0%{transform:scale(1);}40%{transform:scale(1.2);}70%{transform:scale(.95);}100%{transform:scale(1);}}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}

/* Correct overlay */
.correct-overlay{
  position:fixed;inset:0;background:rgba(46,204,113,.25);
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  z-index:100;animation:fadeInOut 1.1s ease forwards;pointer-events:none;
}
.correct-overlay .big-emoji{font-size:5rem;animation:popIn .4s ease;}
.correct-overlay .msg{font-size:1.6rem;font-weight:900;color:#2ECC71;margin-top:10px;}
@keyframes fadeInOut{0%{opacity:0;}20%{opacity:1;}80%{opacity:1;}100%{opacity:0;}}
@keyframes popIn{0%{transform:scale(0);}60%{transform:scale(1.2);}100%{transform:scale(1);}}

/* Confetti */
.confetti-star{position:fixed;pointer-events:none;font-size:1.6rem;animation:starFly .9s ease-out forwards;z-index:500;}
@keyframes starFly{0%{transform:translate(0,0) scale(1) rotate(0deg);opacity:1;}100%{transform:translate(var(--dx),var(--dy)) scale(0) rotate(360deg);opacity:0;}}

/* Result */
.result-header{text-align:center;padding:32px 0 24px;}
.result-trophy{font-size:5rem;margin-bottom:10px;}
.result-header h2{font-size:2.2rem;color:var(--accent);font-weight:900;}
.result-sub{color:#888;margin-top:8px;font-size:1.1rem;}
.star-row{font-size:3.2rem;margin:20px 0 16px;text-align:center;letter-spacing:4px;}
.result-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;padding-bottom:30px;}

/* Buttons */
.btn-primary{
  background:var(--accent);color:#fff;border:none;padding:16px 44px;border-radius:32px;
  font-size:1.15rem;font-weight:700;font-family:var(--font);cursor:pointer;
  box-shadow:0 4px 14px rgba(255,107,53,.35);transition:all .18s;
}
.btn-primary:hover{background:var(--accent-h);transform:translateY(-2px);box-shadow:0 6px 18px rgba(255,107,53,.45);}
.btn-primary:active{transform:translateY(0);}
.btn-secondary{
  background:#fff;color:var(--accent);border:2px solid var(--accent);padding:14px 32px;
  border-radius:32px;font-size:1rem;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .18s;
}
.btn-secondary:hover{background:var(--accent);color:#fff;}
.btn-small{
  background:#f2f2f2;color:var(--text);border:none;padding:8px 18px;border-radius:20px;
  font-size:.88rem;font-family:var(--font);cursor:pointer;transition:background .18s;
}
.btn-small:hover{background:#e4e4e4;}
.game-actions{display:flex;gap:10px;justify-content:center;padding-bottom:20px;}

@media(max-width:480px){
  body{padding:10px 8px 30px;}
  .game-header h1{font-size:1.7rem;}
  .target-emoji{font-size:3.5rem;}
  .emoji-grid{gap:6px;}
  .grid-cell{font-size:2rem;border-width:2px;}
  .result-header h2{font-size:1.7rem;}
  .star-row{font-size:2.4rem;}
}
@media(max-width:360px){
  .grid-cell{font-size:1.6rem;}
  .emoji-grid{gap:4px;}
}

    .home-float-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .home-float-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
<a href="../../index.html" class="home-float-btn" title="홈으로">🏠</a>


<!-- Start Screen -->
<div id="screen-start" class="screen active">
  <header class="game-header">
    <h1>🔍 숨은 물건 찾기</h1>
    <p class="subtitle">숨어있는 물건을 찾아보세요!</p>
  </header>
  <div style="text-align:center;padding:30px 0;">
    <div style="font-size:4rem;margin-bottom:20px;">🍎🐸🚗🌸🔍</div>
    <button class="btn-primary" onclick="startGame()">게임 시작! 🎮</button>
  </div>
</div>

<!-- Game Screen -->
<div id="screen-game" class="screen">
  <header class="game-header" style="padding:14px 0 10px;">
    <h1 style="font-size:1.7rem;">🔍 숨은 물건 찾기</h1>
  </header>
  <div class="progress-wrap">
    <div class="progress-label" id="progress-label">1 / 8</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:12.5%"></div></div>
  </div>
  <div class="target-area">
    <div class="target-label">이것을 찾아요! 👇</div>
    <div class="target-emoji" id="target-emoji"></div>
  </div>
  <div class="grid-area">
    <div class="emoji-grid" id="emoji-grid"></div>
  </div>
  <div class="game-actions">
    <button class="btn-small" onclick="goHome()">🏠 홈으로</button>
  </div>
</div>

<!-- Result Screen -->
<div id="screen-result" class="screen">
  <div class="result-header">
    <div class="result-trophy">🏆</div>
    <h2>잘했어요! 🎉</h2>
    <p class="result-sub" id="result-sub">숨은 물건을 아주 잘 찾았어요!</p>
  </div>
  <div class="star-row" id="star-row">⭐⭐⭐</div>
  <div class="result-actions">
    <button class="btn-primary" onclick="startGame()">🔄 다시하기</button>
    <button class="btn-secondary" onclick="goHome()">🏠 처음으로</button>
  </div>
</div>

<script>
/* ===== Audio System ===== */
const AudioSys = (() => {
  let ctx = null;
  function getCtx() { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); return ctx; }
  function beep(freq, type, start, dur, vol=.4) {
    const c=getCtx(), osc=c.createOscillator(), gain=c.createGain();
    osc.connect(gain); gain.connect(c.destination);
    osc.type=type; osc.frequency.setValueAtTime(freq,c.currentTime+start);
    gain.gain.setValueAtTime(vol,c.currentTime+start);
    gain.gain.exponentialRampToValueAtTime(.001,c.currentTime+start+dur);
    osc.start(c.currentTime+start); osc.stop(c.currentTime+start+dur+.05);
  }
  return {
    playCorrect() { beep(523,'sine',0,.12,.5); beep(659,'sine',.12,.12,.5); beep(784,'sine',.24,.22,.5); },
    playWrong() { beep(300,'square',0,.10,.3); beep(220,'square',.12,.15,.3); },
    playWin() { [523,659,784,880,1046].forEach((f,i)=>beep(f,'sine',i*.12,.18,.4)); },
  };
})();

/* ===== Reward Reporting ===== */
function reportReward(stars) {
  try {
    const data = JSON.parse(localStorage.getItem('kbr.rewards')||'null') || { totalStars:0, totalGames:0, badges:[], history:[], streak:0, lastDate:null };
    data.totalStars+=stars; data.totalGames+=1;
    const today=new Date().toISOString().slice(0,10);
    data.history.unshift({gameId:'hidden_object',area:'관찰력',stars,date:today,timestamp:Date.now()});
    if(data.history.length>100) data.history=data.history.slice(0,100);
    if(data.lastDate!==today){ if(data.lastDate){const d=Math.floor((new Date(today)-new Date(data.lastDate))/86400000);data.streak=d===1?data.streak+1:1;}else{data.streak=1;} data.lastDate=today; }
    localStorage.setItem('kbr.rewards',JSON.stringify(data));
  } catch{}
}

/* ===== Fisher-Yates Shuffle ===== */
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

/* ===== Emoji Pools by Theme ===== */
const EMOJI_POOLS = {
  fruits:  ['🍎','🍌','🍇','🍊','🍓','🍑','🍒','🍋','🍉','🍍','🥝','🫐','🍐','🥭','🍈'],
  animals: ['🐶','🐱','🐰','🐻','🐧','🐸','🐨','🦊','🐮','🐷','🐵','🦁','🐯','🐔','🐝'],
  objects: ['⚽','🎈','🎁','🔔','💎','🎵','🌈','☂️','⭐','🏀','🎯','🧩','🪁','🎨','🎀'],
  nature:  ['🌸','🌻','🌵','🍀','🌙','☀️','🌊','🍄','🌺','🪻','🌷','🌹','🍁','🌴','🪴'],
  food:    ['🍕','🍔','🧁','🍩','🍦','🌮','🥐','🍪','🎂','🥞','🍰','🧀','🥨','🍫','🥧'],
  vehicles:['🚗','🚌','✈️','🚀','🚲','🚢','🚁','🚂','🛸','🏎️','🚒','🚑','🛵','🚜','⛵'],
};

const THEME_KEYS = Object.keys(EMOJI_POOLS);

/* ===== Game State ===== */
let currentQ = 0;
let correctCount = 0;
const totalQ = 8;
const gridSize = 16; // 4x4 grid
let locked = false;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome(){ showScreen('screen-start'); }

/* ===== Start Game ===== */
function startGame() {
  currentQ = 0;
  correctCount = 0;
  locked = false;
  showScreen('screen-game');
  renderRound();
}

/* ===== Render Round ===== */
function renderRound() {
  document.getElementById('progress-label').textContent = (currentQ+1)+' / '+totalQ;
  document.getElementById('progress-fill').style.width = ((currentQ+1)/totalQ*100)+'%';

  // Pick a theme
  const themeKey = THEME_KEYS[Math.floor(Math.random()*THEME_KEYS.length)];
  const pool = [...EMOJI_POOLS[themeKey]];

  // Pick target
  const shuffledPool = shuffle(pool);
  const target = shuffledPool[0];

  // Fill grid: gridSize-1 random emojis (not the target) + 1 target
  const fillers = [];
  const nonTarget = shuffledPool.filter(e => e !== target);
  // Pick fillers, allowing repeats from non-target pool
  for (let i = 0; i < gridSize - 1; i++) {
    fillers.push(nonTarget[i % nonTarget.length]);
  }

  // Place target at random position
  const targetPos = Math.floor(Math.random() * gridSize);
  const gridItems = [];
  let fi = 0;
  for (let i = 0; i < gridSize; i++) {
    if (i === targetPos) {
      gridItems.push({ emoji: target, isTarget: true });
    } else {
      gridItems.push({ emoji: fillers[fi++], isTarget: false });
    }
  }

  // Render
  document.getElementById('target-emoji').textContent = target;

  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  gridItems.forEach((item, idx) => {
    const cell = document.createElement('div');
    cell.className = 'grid-cell' + (item.isTarget ? ' target-cell' : '');
    cell.textContent = item.emoji;
    cell.addEventListener('click', () => onCellClick(cell, item.isTarget));
    grid.appendChild(cell);
  });
}

/* ===== Cell Click ===== */
function onCellClick(cell, isTarget) {
  if (locked) return;

  if (isTarget) {
    locked = true;
    AudioSys.playCorrect();
    cell.classList.add('found');
    correctCount++;
    showCorrectOverlay();
    spawnConfetti(cell);
    setTimeout(() => {
      currentQ++;
      if (currentQ >= totalQ) {
        onGameComplete();
      } else {
        locked = false;
        renderRound();
      }
    }, 1100);
  } else {
    AudioSys.playWrong();
    cell.classList.add('wrong-cell');
    setTimeout(() => cell.classList.remove('wrong-cell'), 400);
  }
}

/* ===== Correct Overlay ===== */
function showCorrectOverlay() {
  const overlay = document.createElement('div');
  overlay.className = 'correct-overlay';
  overlay.innerHTML = '<div class="big-emoji">🎉</div><div class="msg">찾았어요!</div>';
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 1100);
}

/* ===== Confetti ===== */
function spawnConfetti(el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const emojis = ['⭐','✨','🌟','💛','🎉'];
  for (let i = 0; i < 10; i++) {
    const star = document.createElement('div');
    star.className = 'confetti-star';
    star.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const angle = (i/10)*2*Math.PI;
    const dist = 50+Math.random()*70;
    star.style.left = cx+'px'; star.style.top = cy+'px';
    star.style.setProperty('--dx', Math.cos(angle)*dist+'px');
    star.style.setProperty('--dy', Math.sin(angle)*dist+'px');
    document.body.appendChild(star);
    setTimeout(() => star.remove(), 950);
  }
}

/* ===== Game Complete ===== */
function onGameComplete() {
  AudioSys.playWin();
  const stars = correctCount >= 7 ? 3 : correctCount >= 5 ? 2 : 1;
  reportReward(stars);
  document.getElementById('star-row').textContent = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
  document.getElementById('result-sub').textContent = totalQ+'개 중 '+correctCount+'개를 찾았어요!';
  showScreen('screen-result');
}
</script>
</body>
