<style>

:root {

body {

}

/* ===== мєінЕМк≥†л¶ђ л≤ДнКЉ 3к∞Ь ===== */
.category-grid {

}

}
.cat-btn:hover {

}

}
.cat-icon { font-size: 2.8rem; display: block; margin-bottom: 8px; }

/* ===== мЛЬмЮС л≤ДнКЉ ===== */

}
.btn-primary {

}
.btn-primary:hover {

  box-shadow: 0 6px 18px rgba(255,107,53,.45);
}
.btn-primary:active { transform: translateY(0); }

/* ===== к≤МмЮД нЩФл©і ===== */

/* нФДл¶ђлЈ∞ л∞∞лДИ вАФ мєілУЬл•Љ кЄ∞мЦµнХШмДЄмЪФ! */

}

}
@keyframes pulse {

}

/* лВ®мЭА мМН нСЬмЛЬ л∞Ф */
.pairs-bar {
  background: #fff;

}

/* ===== мєілУЬ л≥ілУЬ: 2√Ч4 кЈЄл¶ђлУЬ ===== */
.card-board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding: 16px;
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--sh);

}

/* ===== мєілУЬ кЄ∞л≥Є ===== */
.card {
  aspect-ratio: 1;
  cursor: pointer;
  perspective: 700px;
  user-select: none;
  border-radius: var(--r);
}
.card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform .38s cubic-bezier(.4,0,.2,1);
  border-radius: var(--r);
}

/* мєілУЬ мХЮ/лТЈл©і к≥µнЖµ */
.card-face-down, .card-face-up {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: var(--r);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* мєілУЬ лТЈл©і: м£ЉнЩ© кЈЄлЭЉлН∞мЭімЕШ (age_5 лПЩмЭЉ нМ®нДі) */
.card-face-down {
  background: linear-gradient(135deg, #ff8c5a, #ff6b35, #e55a24);
  box-shadow: 0 3px 8px rgba(255,107,53,.28);
}
.card-face-down::before {
  content: '';
  position: absolute;
  inset: 4px;
  border: 2px solid rgba(255,255,255,.3);
  border-radius: 8px;
}
.card-back-icon { font-size: 1.8rem; opacity: .7; }

/* мєілУЬ мХЮл©і */
.card-face-up {
  transform: rotateY(180deg);
  background: #fffaf5;
  border: 2px solid #f0e4d8;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}

/* лІМ 3мДЄ: мЭіл™®мІА нБђк≤М */
.card-emoji {
  font-size: 3rem;
  line-height: 1;
}

/* лТ§мІСнЮМ мєілУЬ */
.card.flipped .card-inner { transform: rotateY(180deg); }

/* нШЄл≤Д нЪ®к≥Љ */
.card:not(.matched):hover .card-face-down {
  filter: brightness(1.05);
  box-shadow: 0 6px 16px rgba(255,107,53,.4);
}
.card.flipped:not(.matched):hover .card-inner {
  transform: rotateY(180deg) scale(1.04);
}
.card:not(.flipped):not(.matched):hover .card-inner {
  transform: scale(1.04);
}

/* лІ§мє≠лРЬ мєілУЬ */
.card.matched .card-face-up {
  background: linear-gradient(135deg, #d4f4e8, #b8edd8);
  border-color: #7edcb8;
}
.card.matched { cursor: default; }

/* нЛАл†ЄмЭД лХМ нЭФлУ§кЄ∞ мХ†лЛИл©ФмЭімЕШ */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-8px); }
  40%      { transform: translateX(8px); }
  60%      { transform: translateX(-6px); }
  80%      { transform: translateX(6px); }
}
.card.shake { animation: shake .4s ease; }

/* ===== лІ§мє≠ мД±к≥µ мґХнХШ мЭінОЩнКЄ ===== */
@keyframes matchBounce {
  0%   { transform: rotateY(180deg) scale(1); }
  40%  { transform: rotateY(180deg) scale(1.18); }
  70%  { transform: rotateY(180deg) scale(.95); }
  100% { transform: rotateY(180deg) scale(1); }
}
.card.matched .card-inner {
  animation: matchBounce .45s ease forwards;
}

/* ===== л≥Д нД∞мІАкЄ∞ (confetti) ===== */
.confetti-star {

  font-size: 1.6rem;

@keyframes starFly {

  100% { transform: translate(var(--dx), var(--dy)) scale(0) rotate(360deg); opacity: 0; }

/* ===== мЩДл£М нЩФл©і ===== */

/* мЩДл£М мХ°мЕШ л≤ДнКЉ */

/* ===== к≤МмЮД мХ°мЕШ л≤ДнКЉ ===== */

/* ===== л™®л∞ФмЭЉ лМАмЭС ===== */

<!-- ===== мєінЕМк≥†л¶ђ мД†нГЭ нЩФл©і ===== -->
<div id="screen-start" class="screen active">

  <!-- нФДл¶ђлЈ∞ л∞∞лДИ: мєілУЬ к≥µк∞Ь м§СмЭЉ лХМлІМ нСЬмЛЬ -->

  <!-- л≥Дм†Р (нХ≠мГБ л≥Д 3к∞Ь вАФ лІМ 3мДЄлКФ лђім°∞к±і мє≠м∞ђ) -->

<script>
/* ===================================================
   лІМ 3мДЄмЪ© мЙђмЪі мІЭлІЮмґФкЄ∞ к≤МмЮД (easy_matching)
   age_5/image_matching кЄ∞л∞ШмЬЉл°Ь лМАнП≠ лЛ®мИЬнЩФ
   - 4мМН(8мЮ•) к≥†м†Х
   - мєілУЬ к≥µк∞Ь 15міИ к≥†м†Х
   - нГАмЭіл®Є/лЮ≠нВє/л©АнЛ∞нФМл†ИмЭі мЧЖмЭМ
   - мєінЕМк≥†л¶ђ мД†нГЭ(к≥ЉмЭЉ/лПЩлђЉ/нГИк≤Г)лІМ к∞АлК•
=================================================== */

/* ===== мЭіл™®мІА лН∞мЭінД∞ ===== */
const CATEGORIES = {
  fruit:   { name: 'к≥ЉмЭЉ', icon: 'рЯНО', emojis: ['рЯНО','рЯНМ','рЯНЗ','рЯНК','рЯНУ','рЯНС','рЯНТ','рЯНЛ'] },
  animal:  { name: 'лПЩлђЉ', icon: 'рЯРґ', emojis: ['рЯРґ','рЯР±','рЯР∞','рЯРї','рЯРІ','рЯРЄ','рЯР®','рЯ¶К'] },
  vehicle: { name: 'нГИк≤Г', icon: 'рЯЪЧ', emojis: ['рЯЪЧ','рЯЪМ','вЬИпЄП','рЯЪА','рЯЪ≤','рЯЪҐ','рЯЪБ','рЯЪВ'] },
};

/* ===== к≤МмЮД мГБнГЬ ===== */
let selectedCat   = 'fruit';   // мД†нГЭлРЬ мєінЕМк≥†л¶ђ
let cards         = [];         // DOM мєілУЬ мЧШл¶ђл®ЉнКЄ л∞∞мЧі
let flippedCards  = [];         // нШДмЮђ лТ§мІСнЮМ мєілУЬ (мµЬлМА 2мЮ•)
let matchedCount  = 0;          // лІЮмґШ мМН мИШ
let lockBoard     = false;      // нБіл¶≠ мЮ†кЄИ (мХ†лЛИл©ФмЭімЕШ м§С)
let previewTimer  = null;       // нФДл¶ђлЈ∞ мєімЪінКЄлЛ§мЪі мЭЄнД∞л≤М

/* ===== Web Audio API мї®нЕНмК§нКЄ ===== */
let audioCtx = null;

// мШ§лФФмШ§ мї®нЕНмК§нКЄл•Љ м≤Ђ мВђмЪ©мЮР мЭЄнД∞лЮЩмЕШ мЛЬ мГЭмД± (лЄМлЭЉмЪ∞м†А м†Хм±Е)
function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  // suspended мГБнГЬл©і мЮђк∞Ь
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

/* --- лЛ®мЭЉ лєДнФДмЭМ мГЭмД± нЧђнНЉ --- */
function beep(freq, duration, type = 'sine', gainVal = 0.35, startDelay = 0) {
  if (!audioCtx) return;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type      = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startDelay);
  gain.gain.setValueAtTime(gainVal, audioCtx.currentTime + startDelay);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + startDelay + duration);
  osc.start(audioCtx.currentTime + startDelay);
  osc.stop(audioCtx.currentTime + startDelay + duration);
}

/* --- мєілУЬ лТ§мІСкЄ∞ нЪ®к≥ЉмЭМ (мІІмЭА нБіл¶≠мЭМ) --- */
function playFlipSound() {
  ensureAudio();
  beep(600, 0.08, 'triangle', 0.25);
}

/* --- лІ§мє≠ мД±к≥µмЭМ (3мЭМ мГБнЦЙ: лПДвЖТлѓЄвЖТмЖФ) --- */
function playMatchSound() {
  ensureAudio();
  beep(523, 0.15, 'sine', 0.4, 0.00);   // лПД
  beep(659, 0.15, 'sine', 0.4, 0.15);   // лѓЄ
  beep(784, 0.25, 'sine', 0.4, 0.30);   // мЖФ
}

/* --- к≤МмЮД мЩДл£М нМ°нММл†И --- */
function playCompleteSound() {
  ensureAudio();
  // мГБнЦЙ нЫД лПДмХљ мљФлУЬ вАФ л∞Эк≥† к≤љмЊМнХЬ нМ°нММл†И
  beep(523, 0.12, 'sine', 0.45, 0.00);  // лПД
  beep(587, 0.12, 'sine', 0.45, 0.12);  // л†И
  beep(659, 0.12, 'sine', 0.45, 0.24);  // лѓЄ
  beep(784, 0.20, 'sine', 0.45, 0.36);  // мЖФ
  beep(523, 0.10, 'sine', 0.35, 0.56);  // лПД(мШ•нГАлЄМ мХДлЮШ)
  beep(659, 0.10, 'sine', 0.35, 0.66);  // лѓЄ
  beep(784, 0.10, 'sine', 0.35, 0.76);  // мЖФ
  beep(1047, 0.4, 'sine', 0.5, 0.86);  // лЖТмЭА лПД
}

/* ===== мєінЕМк≥†л¶ђ мД†нГЭ ===== */
function selectCategory(btn) {
  // л™®лУ† л≤ДнКЉ active нХім†Ь
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedCat = btn.dataset.cat;
}

/* ===== нЩФл©і м†ДнЩШ нЧђнНЉ ===== */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ===== нЩИмЬЉл°Ь (мєінЕМк≥†л¶ђ мД†нГЭ нЩФл©імЬЉл°Ь) ===== */
function goHome() {
  clearPreviewTimer();
  showScreen('screen-start');
}

/* ===== к≤МмЮД мЛЬмЮС ===== */
function startGame() {
  ensureAudio();
  matchedCount  = 0;
  flippedCards  = [];
  lockBoard     = false;

  buildBoard();
  updatePairsDisplay();
  showScreen('screen-game');
  startPreview();
}

/* ===== мєілУЬ мЮђмЛЬмЮС (мєінЕМк≥†л¶ђ мЬ†мІА) ===== */
function restartGame() {
  clearPreviewTimer();
  startGame();
}

/* ===== мєілУЬ л≥ілУЬ мГЭмД± ===== */
function buildBoard() {
  const board    = document.getElementById('card-board');
  const catData  = CATEGORIES[selectedCat];

  // 4мМН(8мЮ•) вАФ мЭіл™®мІА 8к∞Ь к∞Б 2к∞ЬмФ© вЖТ міЭ 16к∞Ь м§С мХЮ 4к∞ЬлІМ мВђмЪ©
  // (лІМ 3мДЄ вЖТ 4мМН к≥†м†Х)
  const chosen   = catData.emojis.slice(0, 4);
  const doubled  = [...chosen, ...chosen]; // мМН мГЭмД±
  const shuffled = shuffle(doubled);       // мДЮкЄ∞

  board.innerHTML = '';
  cards = [];

  shuffled.forEach((emoji, i) => {
    const card = createCardElement(emoji, i);
    board.appendChild(card);
    cards.push(card);
  });
}

/* ===== мєілУЬ DOM мЪФмЖМ мГЭмД± ===== */
function createCardElement(emoji, index) {
  const card = document.createElement('div');
  card.className   = 'card';
  card.dataset.emoji = emoji;
  card.dataset.index = index;

  // 3D flip кµђм°∞: inner > face-down + face-up
  card.innerHTML = `
    <div class="card-inner">
      <div class="card-face-down">
        <span class="card-back-icon">вЬ®</span>
      </div>
      <div class="card-face-up">
        <span class="card-emoji">${emoji}</span>
      </div>
    </div>
  `;

  card.addEventListener('click', () => onCardClick(card));
  return card;
}

/* ===== л∞∞мЧі мЕФнФМ (Fisher-Yates) ===== */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ===== нФДл¶ђлЈ∞ (мєілУЬ к≥µк∞Ь 15міИ) ===== */
function startPreview() {
  const banner    = document.getElementById('preview-banner');
  const countEl   = document.getElementById('countdown');
  let   remaining = 15; // 15міИ к≥†м†Х

  // нФДл¶ђлЈ∞ м§С: л™®лУ† мєілУЬ мХЮл©і л≥імЭікЄ∞
  lockBoard = true;
  cards.forEach(c => c.classList.add('flipped'));

  banner.classList.remove('hidden');
  countEl.textContent = remaining;

  previewTimer = setInterval(() => {
    remaining--;
    countEl.textContent = remaining;

    if (remaining <= 0) {
      clearPreviewTimer();
      // мєілУЬ л™®лСР лТ§мІСкЄ∞
      cards.forEach(c => c.classList.remove('flipped'));
      banner.classList.add('hidden');
      lockBoard = false; // к≤МмЮД мЛЬмЮС
    }
  }, 1000);
}

/* ===== нФДл¶ђлЈ∞ нГАмЭіл®Є м†Хл¶ђ ===== */
function clearPreviewTimer() {
  if (previewTimer) {
    clearInterval(previewTimer);
    previewTimer = null;
  }
}

/* ===== мєілУЬ нБіл¶≠ нХЄлУ§лЯђ ===== */
function onCardClick(card) {
  // мЮ†кЄИ мГБнГЬ, мЭілѓЄ лТ§мІСнЮМ мєілУЬ, лІЮмґШ мєілУЬ нБіл¶≠ лђімЛЬ
  if (lockBoard)                          return;
  if (card.classList.contains('flipped')) return;
  if (card.classList.contains('matched')) return;

  // мєілУЬ лТ§мІСкЄ∞
  playFlipSound();
  card.classList.add('flipped');
  flippedCards.push(card);

  // м≤Ђ л≤ИмІЄ мєілУЬ: лМАкЄ∞
  if (flippedCards.length < 2) return;

  // лСР л≤ИмІЄ мєілУЬ: нМРм†Х
  lockBoard = true;
  checkMatch();
}

/* ===== мІЭ нМРм†Х ===== */
function checkMatch() {
  const [a, b] = flippedCards;
  const isMatch = a.dataset.emoji === b.dataset.emoji;

  if (isMatch) {
    // лІ§мє≠ мД±к≥µ
    playMatchSound();
    a.classList.add('matched');
    b.classList.add('matched');
    spawnConfetti(a);   // л≥Д мЭінОЩнКЄ
    spawnConfetti(b);

    matchedCount++;
    updatePairsDisplay();
    flippedCards = [];
    lockBoard    = false;

    // л™®лСР лІЮмґ§
    if (matchedCount === 4) {
      setTimeout(() => onGameComplete(), 600);
    }
  } else {
    // нЛАл¶Љ: нЭФлУ§к≥† лТ§мІСкЄ∞
    setTimeout(() => {
      a.classList.add('shake');
      b.classList.add('shake');
      // нЭФлУ§кЄ∞ мЩДл£М нЫД лТ§мІСкЄ∞
      setTimeout(() => {
        a.classList.remove('shake', 'flipped');
        b.classList.remove('shake', 'flipped');
        flippedCards = [];
        lockBoard    = false;
      }, 420);
    }, 300);
  }
}

/* ===== лВ®мЭА мМН нСЬмЛЬ мЧЕлН∞мЭінКЄ ===== */
function updatePairsDisplay() {
  document.getElementById('pairs-value').textContent = 4 - matchedCount;
}

/* ===== к≤МмЮД мЩДл£М ===== */
function onGameComplete() {
  playCompleteSound();
  showScreen('screen-result');
}

/* ===== л≥Д мЭінОЩнКЄ (confetti) ===== */
function spawnConfetti(cardEl) {
  const rect   = cardEl.getBoundingClientRect();
  const cx     = rect.left + rect.width / 2;
  const cy     = rect.top  + rect.height / 2;
  const emojis = ['в≠Р','вЬ®','рЯМЯ','рЯТЫ','рЯОЙ'];
  const count  = 8;

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className   = 'confetti-star';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];

    // л∞©мВђнШХ л∞©нЦ•
    const angle  = (i / count) * 2 * Math.PI;
    const dist   = 60 + Math.random() * 60;
    const dx     = Math.cos(angle) * dist;
    const dy     = Math.sin(angle) * dist;

    el.style.left     = `${cx}px`;
    el.style.top      = `${cy}px`;
    el.style.setProperty('--dx', `${dx}px`);
    el.style.setProperty('--dy', `${dy}px`);
    el.style.fontSize = `${1.2 + Math.random() * 1}rem`;

    document.body.appendChild(el);
    // мХ†лЛИл©ФмЭімЕШ мЩДл£М нЫД м†Ьк±∞
    setTimeout(() => el.remove(), 950);
  }
}
