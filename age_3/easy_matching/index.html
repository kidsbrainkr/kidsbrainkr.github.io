<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎴 쉬운 짝맞추기 (만 3세)</title>
<style>
/* ===== CSS 변수 ===== */
:root {
  --bg:        #FFF8F0;
  --accent:    #FF6B35;
  --accent-dk: #E55A24;
  --mint:      #4ECDC4;
  --ok:        #2ECC71;
  --txt:       #333;
  --txt-lt:    #888;
  --sh:  0 4px 16px rgba(0,0,0,.12);
  --sh2: 0 8px 32px rgba(0,0,0,.18);
  --r: 12px;
  --font: 'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
}

/* ===== 기본 리셋 ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  background-image:
    radial-gradient(circle at 20% 20%, rgba(255,107,53,.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(78,205,196,.06) 0%, transparent 50%);
  color: var(--txt);
  font-family: var(--font);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 20px 16px 40px;
}

/* ===== 화면 전환 ===== */
.screen { display: none; width: 100%; max-width: 680px; margin: 0 auto; }
.screen.active { display: block; }
.hidden { display: none !important; }

/* ===== 공통 헤더 ===== */
.game-header {
  text-align: center;
  padding: 28px 0 20px;
}
.game-header h1 {
  font-size: 2.4rem;
  color: var(--accent);
  text-shadow: 2px 3px 6px rgba(255,107,53,.2);
}
.subtitle {
  color: var(--txt-lt);
  font-size: 1rem;
  margin-top: 6px;
}

/* ===== 카테고리 선택 화면 ===== */
.category-section {
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--sh);
  padding: 28px 24px;
  margin-bottom: 20px;
}
.section-label {
  display: block;
  font-weight: 700;
  font-size: 1.05rem;
  margin-bottom: 16px;
  text-align: center;
}

/* ===== 카테고리 버튼 3개 ===== */
.category-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  max-width: 500px;
  margin: 0 auto;
}
.cat-btn {
  background: #fff;
  border: 3px solid #e8e8e8;
  border-radius: 16px;
  padding: 22px 12px 18px;
  cursor: pointer;
  font-family: var(--font);
  text-align: center;
  transition: all .18s;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.cat-btn:hover {
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: var(--sh2);
}
.cat-btn.active {
  border-color: var(--accent);
  background: #fff3ee;
}
.cat-icon { font-size: 2.8rem; display: block; margin-bottom: 8px; }
.cat-text { font-size: 1rem; font-weight: 700; color: var(--txt); }

/* ===== 시작 버튼 ===== */
.start-area {
  display: flex;
  justify-content: center;
  padding: 10px 0 30px;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 16px 44px;
  border-radius: 32px;
  font-size: 1.15rem;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(255,107,53,.35);
  transition: all .18s;
}
.btn-primary:hover {
  background: var(--accent-dk);
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(255,107,53,.45);
}
.btn-primary:active { transform: translateY(0); }

/* ===== 게임 화면 ===== */

/* 프리뷰 배너 — 카드를 기억하세요! */
.preview-banner {
  background: linear-gradient(135deg, var(--mint), #3aa8a0);
  color: #fff;
  border-radius: var(--r);
  padding: 16px;
  text-align: center;
  margin-bottom: 14px;
  font-size: 1.2rem;
  font-weight: 700;
}
.countdown {
  font-size: 3.6rem;
  font-weight: 900;
  line-height: 1;
  margin-top: 6px;
  animation: pulse 1s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.1); }
}

/* 남은 쌍 표시 바 */
.pairs-bar {
  background: #fff;
  border-radius: var(--r);
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
  padding: 12px 20px;
  margin-bottom: 14px;
  text-align: center;
}
.pairs-label { font-size: .85rem; color: var(--txt-lt); }
.pairs-value {
  font-size: 1.6rem;
  font-weight: 900;
  color: var(--accent);
  margin-top: 2px;
}

/* ===== 카드 보드: 2×4 그리드 ===== */
.card-board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding: 16px;
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--sh);
  margin: 0 auto 14px;
}

/* ===== 카드 기본 ===== */
.card {
  aspect-ratio: 1;
  cursor: pointer;
  perspective: 700px;
  user-select: none;
  border-radius: var(--r);
}
.card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform .38s cubic-bezier(.4,0,.2,1);
  border-radius: var(--r);
}

/* 카드 앞/뒷면 공통 */
.card-face-down, .card-face-up {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: var(--r);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* 카드 뒷면: 주황 그라데이션 (age_5 동일 패턴) */
.card-face-down {
  background: linear-gradient(135deg, #ff8c5a, #ff6b35, #e55a24);
  box-shadow: 0 3px 8px rgba(255,107,53,.28);
}
.card-face-down::before {
  content: '';
  position: absolute;
  inset: 4px;
  border: 2px solid rgba(255,255,255,.3);
  border-radius: 8px;
}
.card-back-icon { font-size: 1.8rem; opacity: .7; }

/* 카드 앞면 */
.card-face-up {
  transform: rotateY(180deg);
  background: #fffaf5;
  border: 2px solid #f0e4d8;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}

/* 만 3세: 이모지 크게 */
.card-emoji {
  font-size: 3rem;
  line-height: 1;
}

/* 뒤집힌 카드 */
.card.flipped .card-inner { transform: rotateY(180deg); }

/* 호버 효과 */
.card:not(.matched):hover .card-face-down {
  filter: brightness(1.05);
  box-shadow: 0 6px 16px rgba(255,107,53,.4);
}
.card.flipped:not(.matched):hover .card-inner {
  transform: rotateY(180deg) scale(1.04);
}
.card:not(.flipped):not(.matched):hover .card-inner {
  transform: scale(1.04);
}

/* 매칭된 카드 */
.card.matched .card-face-up {
  background: linear-gradient(135deg, #d4f4e8, #b8edd8);
  border-color: #7edcb8;
}
.card.matched { cursor: default; }

/* 틀렸을 때 흔들기 애니메이션 */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-8px); }
  40%      { transform: translateX(8px); }
  60%      { transform: translateX(-6px); }
  80%      { transform: translateX(6px); }
}
.card.shake { animation: shake .4s ease; }

/* ===== 매칭 성공 축하 이펙트 ===== */
@keyframes matchBounce {
  0%   { transform: rotateY(180deg) scale(1); }
  40%  { transform: rotateY(180deg) scale(1.18); }
  70%  { transform: rotateY(180deg) scale(.95); }
  100% { transform: rotateY(180deg) scale(1); }
}
.card.matched .card-inner {
  animation: matchBounce .45s ease forwards;
}

/* ===== 별 터지기 (confetti) ===== */
.confetti-star {
  position: fixed;
  pointer-events: none;
  font-size: 1.6rem;
  animation: starFly .9s ease-out forwards;
  z-index: 500;
}
@keyframes starFly {
  0%   { transform: translate(0,0) scale(1) rotate(0deg); opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0) rotate(360deg); opacity: 0; }
}

/* ===== 완료 화면 ===== */
.result-header {
  text-align: center;
  padding: 32px 0 24px;
}
.result-trophy { font-size: 5rem; margin-bottom: 10px; }
.result-header h2 {
  font-size: 2.2rem;
  color: var(--accent);
  font-weight: 900;
}
.result-sub {
  color: var(--txt-lt);
  margin-top: 8px;
  font-size: 1.1rem;
}

/* 별점 */
.star-row {
  font-size: 3.2rem;
  margin: 20px 0 16px;
  text-align: center;
  letter-spacing: 4px;
}

/* 완료 액션 버튼 */
.result-actions {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  padding-bottom: 30px;
}
.btn-secondary {
  background: #fff;
  color: var(--accent);
  border: 2px solid var(--accent);
  padding: 14px 32px;
  border-radius: 32px;
  font-size: 1rem;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  transition: all .18s;
}
.btn-secondary:hover { background: var(--accent); color: #fff; }

/* ===== 게임 액션 버튼 ===== */
.game-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  padding-bottom: 20px;
}
.btn-small {
  background: #f2f2f2;
  color: var(--txt);
  border: none;
  padding: 8px 18px;
  border-radius: 20px;
  font-size: .88rem;
  font-family: var(--font);
  cursor: pointer;
  transition: background .18s;
}
.btn-small:hover { background: #e4e4e4; }

/* ===== 모바일 대응 ===== */
@media(max-width: 480px) {
  body { padding: 10px 8px 30px; }
  .game-header h1 { font-size: 1.8rem; }
  .card-board { gap: 8px; padding: 10px; }
  .card-emoji { font-size: 2.2rem; }
  .cat-icon { font-size: 2.2rem; }
  .category-grid { gap: 10px; }
  .cat-btn { padding: 14px 8px 12px; }
  .cat-text { font-size: .9rem; }
  .result-header h2 { font-size: 1.7rem; }
  .star-row { font-size: 2.4rem; }
}
@media(max-width: 360px) {
  .card-emoji { font-size: 1.7rem; }
  .card-board { gap: 6px; }
}

    .home-float-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .home-float-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
<a href="../../index.html" class="home-float-btn" title="홈으로">🏠</a>


<!-- ===== 카테고리 선택 화면 ===== -->
<div id="screen-start" class="screen active">
  <header class="game-header">
    <h1>🎴 쉬운 짝맞추기</h1>
    <p class="subtitle">카드를 뒤집어 같은 그림을 찾아요!</p>
  </header>

  <div class="category-section">
    <label class="section-label">🎨 어떤 카드로 할까요?</label>
    <div class="category-grid">
      <!-- 과일 카테고리 버튼 -->
      <button class="cat-btn active" data-cat="fruit" onclick="selectCategory(this)">
        <span class="cat-icon">🍎</span>
        <span class="cat-text">과일</span>
      </button>
      <!-- 동물 카테고리 버튼 -->
      <button class="cat-btn" data-cat="animal" onclick="selectCategory(this)">
        <span class="cat-icon">🐶</span>
        <span class="cat-text">동물</span>
      </button>
      <!-- 탈것 카테고리 버튼 -->
      <button class="cat-btn" data-cat="vehicle" onclick="selectCategory(this)">
        <span class="cat-icon">🚗</span>
        <span class="cat-text">탈것</span>
      </button>
    </div>
  </div>

  <div class="start-area">
    <button class="btn-primary" onclick="startGame()">게임 시작! 🎮</button>
  </div>
</div>


<!-- ===== 게임 화면 ===== -->
<div id="screen-game" class="screen">
  <!-- 상단 게임 헤더 -->
  <header class="game-header" style="padding:16px 0 10px;">
    <h1 style="font-size:1.8rem;">🎴 짝맞추기</h1>
  </header>

  <!-- 프리뷰 배너: 카드 공개 중일 때만 표시 -->
  <div id="preview-banner" class="preview-banner hidden">
    카드를 기억하세요! ⏱
    <div id="countdown" class="countdown">15</div>
  </div>

  <!-- 남은 쌍 표시 -->
  <div class="pairs-bar">
    <div class="pairs-label">남은 쌍</div>
    <div id="pairs-value" class="pairs-value">4</div>
  </div>

  <!-- 카드 보드 (JS에서 생성) -->
  <div id="card-board" class="card-board"></div>

  <!-- 하단 게임 액션 -->
  <div class="game-actions">
    <button class="btn-small" onclick="goHome()">🏠 홈으로</button>
    <button class="btn-small" onclick="restartGame()">🔄 다시하기</button>
  </div>
</div>


<!-- ===== 결과 화면 ===== -->
<div id="screen-result" class="screen">
  <div class="result-header">
    <div class="result-trophy">🏆</div>
    <h2>잘했어요! 🎉</h2>
    <p class="result-sub">모든 카드를 다 맞췄어요!</p>
  </div>

  <!-- 별점 (항상 별 3개 — 만 3세는 무조건 칭찬) -->
  <div class="star-row">⭐⭐⭐</div>

  <div class="result-actions">
    <button class="btn-primary" onclick="restartGame()">🔄 다시하기</button>
    <button class="btn-secondary" onclick="goHome()">🏠 다른 카드</button>
  </div>
</div>


<script>
/* ===================================================
   만 3세용 쉬운 짝맞추기 게임 (easy_matching)
   age_5/image_matching 기반으로 대폭 단순화
   - 4쌍(8장) 고정
   - 카드 공개 15초 고정
   - 타이머/랭킹/멀티플레이 없음
   - 카테고리 선택(과일/동물/탈것)만 가능
=================================================== */

/* ===== 이모지 데이터 ===== */
const CATEGORIES = {
  fruit:   { name: '과일', icon: '🍎', emojis: ['🍎','🍌','🍇','🍊','🍓','🍑','🍒','🍋'] },
  animal:  { name: '동물', icon: '🐶', emojis: ['🐶','🐱','🐰','🐻','🐧','🐸','🐨','🦊'] },
  vehicle: { name: '탈것', icon: '🚗', emojis: ['🚗','🚌','✈️','🚀','🚲','🚢','🚁','🚂'] },
};

/* ===== 게임 상태 ===== */
let selectedCat   = 'fruit';   // 선택된 카테고리
let cards         = [];         // DOM 카드 엘리먼트 배열
let flippedCards  = [];         // 현재 뒤집힌 카드 (최대 2장)
let matchedCount  = 0;          // 맞춘 쌍 수
let lockBoard     = false;      // 클릭 잠금 (애니메이션 중)
let previewTimer  = null;       // 프리뷰 카운트다운 인터벌

/* ===== Web Audio API 컨텍스트 ===== */
let audioCtx = null;

// 오디오 컨텍스트를 첫 사용자 인터랙션 시 생성 (브라우저 정책)
function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  // suspended 상태면 재개
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

/* --- 단일 비프음 생성 헬퍼 --- */
function beep(freq, duration, type = 'sine', gainVal = 0.35, startDelay = 0) {
  if (!audioCtx) return;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type      = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startDelay);
  gain.gain.setValueAtTime(gainVal, audioCtx.currentTime + startDelay);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + startDelay + duration);
  osc.start(audioCtx.currentTime + startDelay);
  osc.stop(audioCtx.currentTime + startDelay + duration);
}

/* --- 카드 뒤집기 효과음 (짧은 클릭음) --- */
function playFlipSound() {
  ensureAudio();
  beep(600, 0.08, 'triangle', 0.25);
}

/* --- 매칭 성공음 (3음 상행: 도→미→솔) --- */
function playMatchSound() {
  ensureAudio();
  beep(523, 0.15, 'sine', 0.4, 0.00);   // 도
  beep(659, 0.15, 'sine', 0.4, 0.15);   // 미
  beep(784, 0.25, 'sine', 0.4, 0.30);   // 솔
}

/* --- 게임 완료 팡파레 --- */
function playCompleteSound() {
  ensureAudio();
  // 상행 후 도약 코드 — 밝고 경쾌한 팡파레
  beep(523, 0.12, 'sine', 0.45, 0.00);  // 도
  beep(587, 0.12, 'sine', 0.45, 0.12);  // 레
  beep(659, 0.12, 'sine', 0.45, 0.24);  // 미
  beep(784, 0.20, 'sine', 0.45, 0.36);  // 솔
  beep(523, 0.10, 'sine', 0.35, 0.56);  // 도(옥타브 아래)
  beep(659, 0.10, 'sine', 0.35, 0.66);  // 미
  beep(784, 0.10, 'sine', 0.35, 0.76);  // 솔
  beep(1047, 0.4, 'sine', 0.5, 0.86);  // 높은 도
}

/* ===== 카테고리 선택 ===== */
function selectCategory(btn) {
  // 모든 버튼 active 해제
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedCat = btn.dataset.cat;
}

/* ===== 화면 전환 헬퍼 ===== */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ===== 홈으로 (카테고리 선택 화면으로) ===== */
function goHome() {
  clearPreviewTimer();
  showScreen('screen-start');
}

/* ===== 게임 시작 ===== */
function startGame() {
  ensureAudio();
  matchedCount  = 0;
  flippedCards  = [];
  lockBoard     = false;

  buildBoard();
  updatePairsDisplay();
  showScreen('screen-game');
  startPreview();
}

/* ===== 카드 재시작 (카테고리 유지) ===== */
function restartGame() {
  clearPreviewTimer();
  startGame();
}

/* ===== 카드 보드 생성 ===== */
function buildBoard() {
  const board    = document.getElementById('card-board');
  const catData  = CATEGORIES[selectedCat];

  // 4쌍(8장) — 이모지 8개 각 2개씩 → 총 16개 중 앞 4개만 사용
  // (만 3세 → 4쌍 고정)
  const chosen   = catData.emojis.slice(0, 4);
  const doubled  = [...chosen, ...chosen]; // 쌍 생성
  const shuffled = shuffle(doubled);       // 섞기

  board.innerHTML = '';
  cards = [];

  shuffled.forEach((emoji, i) => {
    const card = createCardElement(emoji, i);
    board.appendChild(card);
    cards.push(card);
  });
}

/* ===== 카드 DOM 요소 생성 ===== */
function createCardElement(emoji, index) {
  const card = document.createElement('div');
  card.className   = 'card';
  card.dataset.emoji = emoji;
  card.dataset.index = index;

  // 3D flip 구조: inner > face-down + face-up
  card.innerHTML = `
    <div class="card-inner">
      <div class="card-face-down">
        <span class="card-back-icon">✨</span>
      </div>
      <div class="card-face-up">
        <span class="card-emoji">${emoji}</span>
      </div>
    </div>
  `;

  card.addEventListener('click', () => onCardClick(card));
  return card;
}

/* ===== 배열 셔플 (Fisher-Yates) ===== */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ===== 프리뷰 (카드 공개 15초) ===== */
function startPreview() {
  const banner    = document.getElementById('preview-banner');
  const countEl   = document.getElementById('countdown');
  let   remaining = 15; // 15초 고정

  // 프리뷰 중: 모든 카드 앞면 보이기
  lockBoard = true;
  cards.forEach(c => c.classList.add('flipped'));

  banner.classList.remove('hidden');
  countEl.textContent = remaining;

  previewTimer = setInterval(() => {
    remaining--;
    countEl.textContent = remaining;

    if (remaining <= 0) {
      clearPreviewTimer();
      // 카드 모두 뒤집기
      cards.forEach(c => c.classList.remove('flipped'));
      banner.classList.add('hidden');
      lockBoard = false; // 게임 시작
    }
  }, 1000);
}

/* ===== 프리뷰 타이머 정리 ===== */
function clearPreviewTimer() {
  if (previewTimer) {
    clearInterval(previewTimer);
    previewTimer = null;
  }
}

/* ===== 카드 클릭 핸들러 ===== */
function onCardClick(card) {
  // 잠금 상태, 이미 뒤집힌 카드, 맞춘 카드 클릭 무시
  if (lockBoard)                          return;
  if (card.classList.contains('flipped')) return;
  if (card.classList.contains('matched')) return;

  // 카드 뒤집기
  playFlipSound();
  card.classList.add('flipped');
  flippedCards.push(card);

  // 첫 번째 카드: 대기
  if (flippedCards.length < 2) return;

  // 두 번째 카드: 판정
  lockBoard = true;
  checkMatch();
}

/* ===== 짝 판정 ===== */
function checkMatch() {
  const [a, b] = flippedCards;
  const isMatch = a.dataset.emoji === b.dataset.emoji;

  if (isMatch) {
    // 매칭 성공
    playMatchSound();
    a.classList.add('matched');
    b.classList.add('matched');
    spawnConfetti(a);   // 별 이펙트
    spawnConfetti(b);

    matchedCount++;
    updatePairsDisplay();
    flippedCards = [];
    lockBoard    = false;

    // 모두 맞춤
    if (matchedCount === 4) {
      setTimeout(() => onGameComplete(), 600);
    }
  } else {
    // 틀림: 흔들고 뒤집기
    setTimeout(() => {
      a.classList.add('shake');
      b.classList.add('shake');
      // 흔들기 완료 후 뒤집기
      setTimeout(() => {
        a.classList.remove('shake', 'flipped');
        b.classList.remove('shake', 'flipped');
        flippedCards = [];
        lockBoard    = false;
      }, 420);
    }, 300);
  }
}

/* ===== 남은 쌍 표시 업데이트 ===== */
function updatePairsDisplay() {
  document.getElementById('pairs-value').textContent = 4 - matchedCount;
}

/* ===== 보상 보고 (메인 허브 연동) ===== */
function reportReward(stars) {
  try {
    const data = JSON.parse(localStorage.getItem('kbr.rewards') || 'null') || {
      totalStars: 0, totalGames: 0, badges: [], history: [], streak: 0, lastDate: null
    };
    data.totalStars += stars;
    data.totalGames += 1;
    const today = new Date().toISOString().slice(0, 10);
    data.history.unshift({
      gameId: 'easy_matching',
      area: '기억력',
      stars: stars,
      date: today,
      timestamp: Date.now()
    });
    if (data.history.length > 100) data.history = data.history.slice(0, 100);
    // 출석 streak
    if (data.lastDate !== today) {
      if (data.lastDate) {
        const diff = Math.floor((new Date(today) - new Date(data.lastDate)) / 86400000);
        data.streak = diff === 1 ? data.streak + 1 : 1;
      } else {
        data.streak = 1;
      }
      data.lastDate = today;
    }
    localStorage.setItem('kbr.rewards', JSON.stringify(data));
  } catch {}
}

/* ===== 게임 완료 ===== */
function onGameComplete() {
  playCompleteSound();
  reportReward(3); // 만 3세는 항상 별 3개 (무조건 칭찬)
  showScreen('screen-result');
}

/* ===== 별 이펙트 (confetti) ===== */
function spawnConfetti(cardEl) {
  const rect   = cardEl.getBoundingClientRect();
  const cx     = rect.left + rect.width / 2;
  const cy     = rect.top  + rect.height / 2;
  const emojis = ['⭐','✨','🌟','💛','🎉'];
  const count  = 8;

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className   = 'confetti-star';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];

    // 방사형 방향
    const angle  = (i / count) * 2 * Math.PI;
    const dist   = 60 + Math.random() * 60;
    const dx     = Math.cos(angle) * dist;
    const dy     = Math.sin(angle) * dist;

    el.style.left     = `${cx}px`;
    el.style.top      = `${cy}px`;
    el.style.setProperty('--dx', `${dx}px`);
    el.style.setProperty('--dy', `${dy}px`);
    el.style.fontSize = `${1.2 + Math.random() * 1}rem`;

    document.body.appendChild(el);
    // 애니메이션 완료 후 제거
    setTimeout(() => el.remove(), 950);
  }
}
</script>
