<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta http-equiv="X-Content-Type-Options" content="nosniff"><meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>순서 기억 게임 (단계 선택)</title>
  <style>
    :root {
      --accent:#FF6B35; --accent-h:#e85a25; --mint:#4ECDC4; --mint-h:#38b8ae;
      --bg:#FFF8F0; --card-bg:#FFFFFF; --text:#333333;
      --shadow:0 4px 16px rgba(0,0,0,.12); --shadow-lg:0 8px 32px rgba(0,0,0,.18);
      --radius-sm:12px; --radius-md:20px; --radius-lg:24px;
      --red:#FF4757; --blue:#2F86FF; --yellow:#FFD166; --green:#2ECC71;
      --red-lit:#FF8FA0; --blue-lit:#80BBFF; --yellow-lit:#FFE99A; --green-lit:#7FEBA3;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding: 20px 16px 40px;
      user-select: none; -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { font-size: clamp(1.5rem,5vw,2.2rem); font-weight: 800; color: var(--accent); }
    .header .subtitle { font-size: clamp(0.85rem,2.5vw,1rem); color: #888; margin-top: 4px; }

    /* Screen transitions */
    .screen { width: 100%; max-width: 480px; display: none; flex-direction: column; align-items: center; gap: 18px; }
    .screen.active { display: flex; animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Start screen */
    .start-title { font-size: clamp(1.1rem,3.5vw,1.4rem); font-weight: 700; text-align: center; }
    .start-desc { font-size: .9rem; color: #777; text-align: center; line-height: 1.5; }

    .difficulty-buttons { display: flex; flex-direction: column; gap: 14px; width: 100%; }
    .btn-difficulty {
      display: flex; align-items: center; gap: 14px; padding: 18px 22px;
      border: none; border-radius: 18px; font-family: inherit; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; transition: transform .15s, box-shadow .15s; box-shadow: var(--shadow);
    }
    .btn-difficulty:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .btn-difficulty:active { transform: scale(.97); }
    .btn-difficulty .diff-icon { font-size: 1.8rem; }
    .btn-difficulty .diff-info { text-align: left; }
    .btn-difficulty .diff-name { font-size: 1.1rem; }
    .btn-difficulty .diff-detail { font-size: .78rem; font-weight: 400; opacity: .75; margin-top: 2px; }
    .btn-difficulty.easy { background: linear-gradient(135deg,#84FAB0,#8FD3F4); color: #1a4a3a; }
    .btn-difficulty.normal { background: linear-gradient(135deg,#FFD86F,#FFAC5F); color: #5a3200; }
    .btn-difficulty.hard { background: linear-gradient(135deg,#FF6B6B,#FF8E53); color: #fff; }

    /* Game screen */
    .status-bar {
      display: flex; justify-content: space-between; width: 100%; max-width: 360px;
      background: var(--card-bg); border-radius: 14px; padding: 12px 18px; box-shadow: var(--shadow);
    }
    .status-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .status-label { font-size: .72rem; color: #aaa; font-weight: 600; text-transform: uppercase; }
    .status-value { font-size: 1.4rem; font-weight: 800; color: var(--accent); line-height: 1; }
    .status-divider { width: 1px; background: #eee; align-self: stretch; }

    #message-box {
      font-size: clamp(.95rem,3vw,1.1rem); font-weight: 700; min-height: 36px;
      text-align: center; color: var(--accent); padding: 0 8px;
    }

    /* Progress bar */
    .progress-wrap { width: 100%; max-width: 360px; height: 10px; background: #e8e8e8; border-radius: 5px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--mint), var(--accent)); border-radius: 5px; transition: width .3s ease; width: 0%; }

    /* 2x2 game grid */
    .game-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      width: 100%; max-width: 360px;
    }
    .game-btn {
      aspect-ratio: 1/1; min-height: 110px; border: none; border-radius: var(--radius-lg);
      font-size: clamp(2.2rem,9vw,3rem); cursor: pointer;
      transition: transform .12s, box-shadow .12s, background .12s, filter .12s;
      box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center;
    }
    .game-btn[data-id="0"] { background: var(--red); color: #fff; }
    .game-btn[data-id="1"] { background: var(--blue); color: #fff; }
    .game-btn[data-id="2"] { background: var(--yellow); color: #8a6800; }
    .game-btn[data-id="3"] { background: var(--green); color: #fff; }
    .game-btn.disabled { cursor: not-allowed; opacity: .8; }
    .game-btn.lit[data-id="0"] { background: var(--red-lit); box-shadow: 0 0 28px 10px rgba(255,71,87,.55); transform: scale(1.1); filter: brightness(1.2); }
    .game-btn.lit[data-id="1"] { background: var(--blue-lit); box-shadow: 0 0 28px 10px rgba(47,134,255,.55); transform: scale(1.1); filter: brightness(1.2); }
    .game-btn.lit[data-id="2"] { background: var(--yellow-lit); box-shadow: 0 0 28px 10px rgba(255,209,102,.65); transform: scale(1.1); filter: brightness(1.15); }
    .game-btn.lit[data-id="3"] { background: var(--green-lit); box-shadow: 0 0 28px 10px rgba(46,204,113,.55); transform: scale(1.1); filter: brightness(1.2); }
    .game-btn:active:not(.disabled) { transform: scale(.94); }

    /* Progress dots */
    .progress-dots { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; min-height: 18px; }
    .progress-dot { width: 12px; height: 12px; border-radius: 50%; background: #ddd; transition: background .2s, transform .2s; }
    .progress-dot.done { background: var(--mint); }
    .progress-dot.current { background: var(--accent); transform: scale(1.3); }

    .bottom-bar { display: flex; gap: 12px; width: 100%; max-width: 360px; }
    .btn-action {
      flex: 1; padding: 14px; border: none; border-radius: 14px; font-family: inherit;
      font-size: .95rem; font-weight: 700; cursor: pointer;
      transition: transform .15s, box-shadow .15s; box-shadow: var(--shadow);
    }
    .btn-action:active { transform: scale(.96); }
    .btn-action.primary { background: var(--accent); color: #fff; }
    .btn-action.secondary { background: #f0f0f0; color: #555; }

    /* Result screen */
    .result-card {
      background: var(--card-bg); border-radius: var(--radius-lg); padding: 32px 28px;
      text-align: center; box-shadow: var(--shadow-lg); width: 100%; max-width: 380px;
    }
    .result-emoji { font-size: 3.5rem; margin-bottom: 8px; }
    .result-title { font-size: 1.5rem; font-weight: 800; color: var(--accent); margin-bottom: 6px; }
    .result-detail { font-size: 1rem; color: #666; margin-bottom: 4px; }
    .result-stars { font-size: 2.4rem; margin: 12px 0; letter-spacing: 4px; }
    .result-best { font-size: .85rem; color: var(--mint); font-weight: 600; margin-bottom: 16px; }
    .btn-restart {
      padding: 16px 36px; border: none; border-radius: 16px; font-family: inherit;
      font-size: 1.1rem; font-weight: 700; background: var(--accent); color: #fff;
      cursor: pointer; box-shadow: var(--shadow); transition: transform .15s;
    }
    .btn-restart:active { transform: scale(.96); }
    .btn-home {
      margin-top: 10px; padding: 12px 28px; border: none; border-radius: 14px;
      font-family: inherit; font-size: .95rem; font-weight: 600;
      background: #f0f0f0; color: #555; cursor: pointer;
    }

    /* Correct overlay */
    .correct-overlay {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      z-index: 200; pointer-events: none;
    }
    .correct-overlay.show { display: flex; }
    .correct-text {
      font-size: 3rem; font-weight: 800; color: var(--mint);
      animation: popBounce .6s cubic-bezier(.34,1.56,.64,1) forwards;
      text-shadow: 0 4px 12px rgba(78,205,196,.4);
    }
    @keyframes popBounce { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }

    /* Particles */
    .particle {
      position: fixed; width: 10px; height: 10px; border-radius: 50%; pointer-events: none; z-index: 201;
      animation: particleFly .8s ease-out forwards;
    }
    @keyframes particleFly {
      0% { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    @media (max-width: 380px) { .game-grid { gap: 10px; } .game-btn { border-radius: 18px; } }
  </style>
</head>
<body>

  <header class="header">
    <h1>🧠 순서 기억 게임</h1>
    <p class="subtitle">불빛 순서를 기억하고 똑같이 눌러봐요!</p>
  </header>

  <!-- Start Screen -->
  <section id="screen-start" class="screen active">
    <p class="start-title">난이도를 선택하세요</p>
    <p class="start-desc">버튼이 빛나는 순서를 잘 보고<br>똑같은 순서로 눌러보세요!</p>
    <div class="difficulty-buttons">
      <button class="btn-difficulty easy" onclick="startGame('easy')">
        <span class="diff-icon">🌱</span>
        <span class="diff-info"><span class="diff-name">쉬움</span><span class="diff-detail">순서 2~3개 시작</span></span>
      </button>
      <button class="btn-difficulty normal" onclick="startGame('normal')">
        <span class="diff-icon">⚡</span>
        <span class="diff-info"><span class="diff-name">보통</span><span class="diff-detail">순서 3~5개 시작</span></span>
      </button>
      <button class="btn-difficulty hard" onclick="startGame('hard')">
        <span class="diff-icon">🔥</span>
        <span class="diff-info"><span class="diff-name">어려움</span><span class="diff-detail">순서 5~7개 시작</span></span>
      </button>
    </div>
  </section>

  <!-- Game Screen -->
  <section id="screen-game" class="screen">
    <div class="status-bar">
      <div class="status-item"><span class="status-label">라운드</span><span class="status-value" id="stat-round">1</span></div>
      <div class="status-divider"></div>
      <div class="status-item"><span class="status-label">순서 길이</span><span class="status-value" id="stat-len">2</span></div>
      <div class="status-divider"></div>
      <div class="status-item"><span class="status-label">최고</span><span class="status-value" id="stat-best">0</span></div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progress-fill"></div></div>
    <div id="message-box">준비 중...</div>
    <div class="game-grid">
      <button class="game-btn disabled" data-id="0" onclick="handlePress(0)">🔴</button>
      <button class="game-btn disabled" data-id="1" onclick="handlePress(1)">🔵</button>
      <button class="game-btn disabled" data-id="2" onclick="handlePress(2)">🟢</button>
      <button class="game-btn disabled" data-id="3" onclick="handlePress(3)">🟡</button>
    </div>
    <div class="progress-dots" id="progress-dots"></div>
    <div class="bottom-bar">
      <button class="btn-action primary" id="btn-replay" onclick="replaySequence()">다시 보기</button>
      <button class="btn-action secondary" onclick="goToStart()">처음으로</button>
    </div>
  </section>

  <!-- Result Screen -->
  <section id="screen-result" class="screen">
    <div class="result-card">
      <div class="result-emoji" id="result-emoji">🏆</div>
      <div class="result-title" id="result-title">잘했어요!</div>
      <div class="result-detail" id="result-detail"></div>
      <div class="result-stars" id="result-stars"></div>
      <div class="result-best" id="result-best"></div>
      <button class="btn-restart" onclick="goToStart()">다시 하기</button>
      <br><button class="btn-home" onclick="goToStart()">처음으로</button>
    </div>
  </section>

  <!-- Correct Overlay -->
  <div class="correct-overlay" id="correct-overlay"><div class="correct-text">정답! 🎉</div></div>

  <script>
    /* ===== Config ===== */
    const GAME_ID = 'sequence_stages';
    const AREA = '기억력';

    const DIFF_CONFIG = {
      easy:   { label: '쉬움🌱', startLen: 2, maxLen: 3, interval: 700, litDur: 550, maxRounds: 10 },
      normal: { label: '보통⚡', startLen: 3, maxLen: 5, interval: 500, litDur: 400, maxRounds: 12 },
      hard:   { label: '어려움🔥', startLen: 5, maxLen: 7, interval: 380, litDur: 280, maxRounds: 15 },
    };

    /* ===== State ===== */
    let difficulty = 'normal';
    let cfg = DIFF_CONFIG.normal;
    let sequence = [];
    let playerInput = [];
    let round = 0;
    let seqLen = 2;
    let bestRound = 0;
    let isPlaying = false;
    let isPlayerTurn = false;

    /* ===== Audio ===== */
    let audioCtx = null;
    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playTone(freq, dur, vol = .4, type = 'sine', offset = 0) {
      ensureAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime + offset);
      gain.gain.setValueAtTime(0, audioCtx.currentTime + offset);
      gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + offset + .02);
      gain.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + offset + dur);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(audioCtx.currentTime + offset);
      osc.stop(audioCtx.currentTime + offset + dur + .05);
    }
    const BTN_NOTES = [261.63, 329.63, 392.00, 523.25];
    function playBtnSound(id) { playTone(BTN_NOTES[id], .3, .45, 'sine'); }
    function playCorrect() { playTone(523, .12, .35, 'sine', 0); playTone(659, .12, .35, 'sine', .12); playTone(784, .18, .35, 'sine', .24); }
    function playWrong() { playTone(300, .25, .45, 'square', 0); playTone(220, .35, .4, 'sawtooth', .1); }
    function playWin() {
      const notes = [523, 587, 659, 784, 1047];
      notes.forEach((f, i) => playTone(f, .22, .35, 'sine', i * .15));
    }

    /* ===== DOM ===== */
    const gameBtns = document.querySelectorAll('.game-btn');
    const msgBox = document.getElementById('message-box');
    const statRound = document.getElementById('stat-round');
    const statLen = document.getElementById('stat-len');
    const statBest = document.getElementById('stat-best');
    const progressFill = document.getElementById('progress-fill');
    const progressDots = document.getElementById('progress-dots');
    const correctOverlay = document.getElementById('correct-overlay');

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    function setMsg(t, c = 'var(--accent)') { msgBox.textContent = t; msgBox.style.color = c; }
    function setDisabled(v) { gameBtns.forEach(b => v ? b.classList.add('disabled') : b.classList.remove('disabled')); }

    function updateStats() {
      statRound.textContent = round;
      statLen.textContent = seqLen;
      statBest.textContent = bestRound;
    }

    function updateProgress() {
      const pct = cfg.maxRounds > 0 ? ((round - 1) / cfg.maxRounds * 100) : 0;
      progressFill.style.width = Math.min(pct, 100) + '%';
    }

    function renderDots() {
      progressDots.innerHTML = '';
      for (let i = 0; i < seqLen; i++) {
        const d = document.createElement('div');
        d.className = 'progress-dot';
        if (i < playerInput.length) d.classList.add('done');
        else if (i === playerInput.length) d.classList.add('current');
        progressDots.appendChild(d);
      }
    }

    /* ===== Particles ===== */
    function spawnParticles(x, y) {
      const colors = ['#FF6B35','#4ECDC4','#FFD166','#FF4757','#2F86FF'];
      for (let i = 0; i < 12; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = x + 'px'; p.style.top = y + 'px';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        const angle = Math.random() * Math.PI * 2;
        const dist = 40 + Math.random() * 80;
        p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 850);
      }
    }

    function showCorrectOverlay() {
      correctOverlay.classList.add('show');
      spawnParticles(window.innerWidth / 2, window.innerHeight / 2);
      setTimeout(() => correctOverlay.classList.remove('show'), 700);
    }

    /* ===== Rewards ===== */
    function reportReward(stars) {
      try {
        const key = 'kbr.rewards';
        const data = JSON.parse(localStorage.getItem(key) || '[]');
        data.push({ gameId: GAME_ID, area: AREA, stars, ts: Date.now() });
        localStorage.setItem(key, JSON.stringify(data));
      } catch (e) {}
    }

    /* ===== Shuffle ===== */
    function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

    /* ===== Game Logic ===== */
    function goToStart() { showScreen('screen-start'); }

    function startGame(diff) {
      ensureAudio();
      difficulty = diff;
      cfg = DIFF_CONFIG[diff];
      round = 0;
      seqLen = cfg.startLen;
      bestRound = parseInt(localStorage.getItem('kbr.seq_best_' + diff) || '0');
      showScreen('screen-game');
      nextRound();
    }

    function nextRound() {
      round++;
      if (round > cfg.maxRounds) { endGame(); return; }
      // Increase sequence length every 2 rounds, capped at maxLen
      if (round > 1 && (round - 1) % 2 === 0 && seqLen < cfg.maxLen) seqLen++;

      sequence = [];
      for (let i = 0; i < seqLen; i++) sequence.push(Math.floor(Math.random() * 4));
      playerInput = [];

      updateStats();
      updateProgress();
      renderDots();
      setMsg('잘 보세요! 👀');
      setDisabled(true);

      setTimeout(() => playSequence(), 600);
    }

    function playSequence() {
      isPlaying = true;
      isPlayerTurn = false;
      setDisabled(true);
      let i = 0;
      const iv = setInterval(() => {
        if (i >= sequence.length) {
          clearInterval(iv);
          isPlaying = false;
          isPlayerTurn = true;
          setDisabled(false);
          setMsg('순서대로 눌러보세요! 👆', 'var(--mint)');
          renderDots();
          return;
        }
        lightBtn(sequence[i]);
        playBtnSound(sequence[i]);
        i++;
      }, cfg.interval);
    }

    function replaySequence() {
      if (isPlaying || !isPlayerTurn) return;
      playerInput = [];
      renderDots();
      setMsg('다시 보여줄게요! 👀');
      playSequence();
    }

    function lightBtn(id) {
      const btn = gameBtns[id];
      btn.classList.add('lit');
      setTimeout(() => btn.classList.remove('lit'), cfg.litDur);
    }

    function handlePress(id) {
      if (!isPlayerTurn || isPlaying) return;
      ensureAudio();
      playBtnSound(id);
      lightBtn(id);

      playerInput.push(id);
      renderDots();

      const idx = playerInput.length - 1;
      if (playerInput[idx] !== sequence[idx]) {
        // Wrong
        playWrong();
        isPlayerTurn = false;
        setMsg('틀렸어요! 😢', '#FF4757');
        setDisabled(true);
        setTimeout(() => endGame(), 1200);
        return;
      }

      if (playerInput.length === sequence.length) {
        // Round complete
        playCorrect();
        showCorrectOverlay();
        isPlayerTurn = false;
        setDisabled(true);
        setMsg('정답! 🎉', 'var(--mint)');
        setTimeout(() => nextRound(), 1000);
      }
    }

    function endGame() {
      const completedRounds = round - 1;
      const isNewBest = completedRounds > bestRound;
      if (isNewBest) {
        bestRound = completedRounds;
        localStorage.setItem('kbr.seq_best_' + difficulty, bestRound);
      }

      // Stars: based on rounds completed relative to maxRounds
      const ratio = completedRounds / cfg.maxRounds;
      let stars = 0;
      if (ratio >= .8) stars = 3;
      else if (ratio >= .5) stars = 2;
      else if (ratio >= .2) stars = 1;

      if (completedRounds >= cfg.maxRounds) {
        playWin();
        stars = 3;
      }

      reportReward(stars);

      // Show result
      document.getElementById('result-emoji').textContent = stars >= 3 ? '🏆' : stars >= 2 ? '🎉' : stars >= 1 ? '👍' : '💪';
      document.getElementById('result-title').textContent = completedRounds >= cfg.maxRounds ? '완벽해요!' : '잘했어요!';
      document.getElementById('result-detail').textContent = `${completedRounds}라운드 완료 (최대 순서 ${seqLen}개)`;
      document.getElementById('result-stars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
      document.getElementById('result-best').textContent = isNewBest ? '🎊 새로운 최고 기록!' : `최고 기록: ${bestRound}라운드`;

      showScreen('screen-result');
    }
  </script>
</body>
</html>
