<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리듬 따라하기 게임</title>

  <style>
    /* ===== CSS 변수 (디자인 토큰) ===== */
    :root {
      --accent:  #FF6B35;
      --mint:    #4ECDC4;
      --bg:      #FFF8F0;
      --text:    #2D2D2D;
      --shadow:  rgba(0, 0, 0, 0.15);

      /* 버튼 4가지 색 */
      --red:    #FF4757;
      --blue:   #2F86FF;
      --yellow: #FFD166;
      --green:  #2ECC71;

      /* 버튼 활성(빛남) 색 — 더 밝은 버전 */
      --red-lit:    #FF8FA0;
      --blue-lit:   #80BBFF;
      --yellow-lit: #FFE99A;
      --green-lit:  #7FEBA3;
    }

    /* ===== 기본 리셋 ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 40px;
      user-select: none;       /* 드래그 방지 */
      -webkit-user-select: none;
    }

    /* ===== 헤더 영역 ===== */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .header .subtitle {
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      color: #888;
      margin-top: 4px;
    }

    /* ===== 화면 전환 컨테이너 ===== */
    .screen {
      width: 100%;
      max-width: 480px;
      display: none;            /* 기본 숨김 */
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .screen.active {
      display: flex;
    }

    /* ===== 시작 화면 (난이도 선택) ===== */
    #screen-start {
      gap: 16px;
    }

    .start-title {
      font-size: clamp(1.1rem, 3.5vw, 1.4rem);
      font-weight: 700;
      text-align: center;
      color: var(--text);
    }

    .start-desc {
      font-size: 0.9rem;
      color: #777;
      text-align: center;
      line-height: 1.5;
    }

    /* 난이도 버튼 3개 */
    .difficulty-buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }

    .btn-difficulty {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      border: none;
      border-radius: 18px;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 14px var(--shadow);
    }

    .btn-difficulty:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px var(--shadow);
    }

    .btn-difficulty:active {
      transform: scale(0.97);
    }

    .btn-difficulty .diff-icon {
      font-size: 1.8rem;
      line-height: 1;
    }

    .btn-difficulty .diff-info {
      text-align: left;
    }

    .btn-difficulty .diff-name {
      font-size: 1.1rem;
    }

    .btn-difficulty .diff-detail {
      font-size: 0.78rem;
      font-weight: 400;
      opacity: 0.75;
      margin-top: 2px;
    }

    /* 난이도별 색상 */
    .btn-difficulty.easy {
      background: linear-gradient(135deg, #84FAB0, #8FD3F4);
      color: #1a4a3a;
    }

    .btn-difficulty.normal {
      background: linear-gradient(135deg, #FFD86F, #FFAC5F);
      color: #5a3200;
    }

    .btn-difficulty.hard {
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      color: #fff;
    }

    /* ===== 게임 화면 ===== */
    /* 상태 바 (단계 / 최고 단계) */
    .status-bar {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 360px;
      background: #fff;
      border-radius: 14px;
      padding: 12px 20px;
      box-shadow: 0 2px 10px var(--shadow);
    }

    .status-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .status-label {
      font-size: 0.72rem;
      color: #aaa;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .status-value {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .status-divider {
      width: 1px;
      background: #eee;
      align-self: stretch;
    }

    /* 메시지 박스 (정답/오답/지시) */
    #message-box {
      font-size: clamp(0.95rem, 3vw, 1.1rem);
      font-weight: 700;
      min-height: 36px;
      text-align: center;
      color: var(--accent);
      transition: opacity 0.3s;
      padding: 0 8px;
    }

    /* ===== 게임 버튼 그리드 (2×2) ===== */
    .game-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 360px;
    }

    /* 각 게임 버튼 */
    .game-btn {
      aspect-ratio: 1 / 1;       /* 정사각형 */
      min-height: 120px;
      border: none;
      border-radius: 24px;
      font-size: clamp(2.4rem, 10vw, 3.2rem);
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, background 0.12s, filter 0.12s;
      box-shadow: 0 6px 18px var(--shadow);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 기본(꺼진) 상태 — 약간 어둡게 */
    .game-btn[data-id="0"] { background: var(--red);    color: #fff; }
    .game-btn[data-id="1"] { background: var(--blue);   color: #fff; }
    .game-btn[data-id="2"] { background: var(--yellow);  color: #8a6800; }
    .game-btn[data-id="3"] { background: var(--green);  color: #fff; }

    /* 비활성화 중(시퀀스 재생 중 클릭 불가) */
    .game-btn.disabled {
      cursor: not-allowed;
      opacity: 0.85;
    }

    /* 빛나는(lit) 상태 */
    .game-btn.lit[data-id="0"] {
      background: var(--red-lit);
      box-shadow: 0 0 28px 10px rgba(255, 71, 87, 0.55);
      transform: scale(1.1);
      filter: brightness(1.2);
    }

    .game-btn.lit[data-id="1"] {
      background: var(--blue-lit);
      box-shadow: 0 0 28px 10px rgba(47, 134, 255, 0.55);
      transform: scale(1.1);
      filter: brightness(1.2);
    }

    .game-btn.lit[data-id="2"] {
      background: var(--yellow-lit);
      box-shadow: 0 0 28px 10px rgba(255, 209, 102, 0.65);
      transform: scale(1.1);
      filter: brightness(1.15);
    }

    .game-btn.lit[data-id="3"] {
      background: var(--green-lit);
      box-shadow: 0 0 28px 10px rgba(46, 204, 113, 0.55);
      transform: scale(1.1);
      filter: brightness(1.2);
    }

    /* 클릭 눌림 애니메이션 */
    .game-btn:active:not(.disabled) {
      transform: scale(0.94);
    }

    /* ===== 하단 버튼 영역 ===== */
    .bottom-bar {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 360px;
    }

    .btn-action {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 3px 10px var(--shadow);
    }

    .btn-action:hover {
      transform: translateY(-1px);
    }

    .btn-action:active {
      transform: scale(0.96);
    }

    .btn-action.primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-action.secondary {
      background: #f0f0f0;
      color: #555;
    }

    /* ===== 진행 표시 점 (현재 입력 위치) ===== */
    .progress-dots {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      min-height: 18px;
    }

    .progress-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ddd;
      transition: background 0.2s;
    }

    .progress-dot.done { background: var(--mint); }
    .progress-dot.current { background: var(--accent); transform: scale(1.3); }

    /* ===== 최고기록 갱신 팡파레 오버레이 ===== */
    #fanfare-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #fanfare-overlay.show {
      display: flex;
    }

    .fanfare-box {
      background: #fff;
      border-radius: 28px;
      padding: 36px 40px;
      text-align: center;
      box-shadow: 0 12px 48px rgba(0,0,0,0.25);
      animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1);
    }

    @keyframes popIn {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .fanfare-emoji { font-size: 3.5rem; }

    .fanfare-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent);
      margin: 10px 0 6px;
    }

    .fanfare-score {
      font-size: 1rem;
      color: #666;
    }

    /* ===== 반응형 — 작은 화면 ===== */
    @media (max-width: 380px) {
      .game-grid { gap: 10px; }
      .game-btn  { border-radius: 18px; }
    }
  </style>
</head>

<body>

  <!-- ===== 헤더 ===== -->
  <header class="header">
    <h1>🎵 리듬 따라하기</h1>
    <p class="subtitle">불빛 순서를 기억하고 똑같이 눌러봐요!</p>
  </header>

  <!-- ===========================
       화면 1: 시작 / 난이도 선택
       =========================== -->
  <section id="screen-start" class="screen active" role="main">
    <p class="start-title">난이도를 선택하세요</p>
    <p class="start-desc">
      버튼이 빛나는 순서를 잘 보고<br>똑같이 눌러보세요!
    </p>

    <div class="difficulty-buttons">
      <!-- 쉬움: 2~4개, 700ms -->
      <button class="btn-difficulty easy"  onclick="startGame('easy')"
              aria-label="쉬움 난이도 시작">
        <span class="diff-icon">🌱</span>
        <span class="diff-info">
          <span class="diff-name">쉬움</span>
          <span class="diff-detail">순서 2~4개 · 느린 속도</span>
        </span>
      </button>

      <!-- 보통: 3~6개, 500ms -->
      <button class="btn-difficulty normal" onclick="startGame('normal')"
              aria-label="보통 난이도 시작">
        <span class="diff-icon">⚡</span>
        <span class="diff-info">
          <span class="diff-name">보통</span>
          <span class="diff-detail">순서 3~6개 · 보통 속도</span>
        </span>
      </button>

      <!-- 어려움: 4~8개, 350ms -->
      <button class="btn-difficulty hard"  onclick="startGame('hard')"
              aria-label="어려움 난이도 시작">
        <span class="diff-icon">🔥</span>
        <span class="diff-info">
          <span class="diff-name">어려움</span>
          <span class="diff-detail">순서 4~8개 · 빠른 속도</span>
        </span>
      </button>
    </div>
  </section>

  <!-- ===========================
       화면 2: 게임 진행
       =========================== -->
  <section id="screen-game" class="screen" role="main" aria-live="polite">

    <!-- 단계 / 최고 단계 상태바 -->
    <div class="status-bar">
      <div class="status-item">
        <span class="status-label">현재 단계</span>
        <span class="status-value" id="stat-level">1</span>
      </div>
      <div class="status-divider"></div>
      <div class="status-item">
        <span class="status-label">최고 단계</span>
        <span class="status-value" id="stat-best">0</span>
      </div>
      <div class="status-divider"></div>
      <div class="status-item">
        <span class="status-label">난이도</span>
        <span class="status-value" id="stat-diff" style="font-size:1rem;margin-top:4px">-</span>
      </div>
    </div>

    <!-- 안내 메시지 -->
    <div id="message-box" aria-live="assertive">준비 중...</div>

    <!-- 2×2 게임 버튼 그리드 -->
    <div class="game-grid">
      <!-- data-id: 0=빨강, 1=파랑, 2=노랑, 3=초록 -->
      <button class="game-btn disabled" data-id="0" onclick="handlePress(0)"
              aria-label="빨간 버튼">🔴</button>
      <button class="game-btn disabled" data-id="1" onclick="handlePress(1)"
              aria-label="파란 버튼">🔵</button>
      <button class="game-btn disabled" data-id="2" onclick="handlePress(2)"
              aria-label="노란 버튼">🟡</button>
      <button class="game-btn disabled" data-id="3" onclick="handlePress(3)"
              aria-label="초록 버튼">🟢</button>
    </div>

    <!-- 입력 진행 점 -->
    <div class="progress-dots" id="progress-dots"></div>

    <!-- 하단 버튼 -->
    <div class="bottom-bar">
      <button class="btn-action primary"   onclick="replaySequence()" id="btn-replay">다시 보기</button>
      <button class="btn-action secondary" onclick="goToStart()">처음으로</button>
    </div>
  </section>

  <!-- ===== 최고기록 갱신 팡파레 오버레이 ===== -->
  <div id="fanfare-overlay" role="dialog" aria-modal="true" aria-label="최고기록 갱신">
    <div class="fanfare-box">
      <div class="fanfare-emoji">🏆</div>
      <div class="fanfare-title">최고 기록 갱신!</div>
      <div class="fanfare-score" id="fanfare-score-text"></div>
    </div>
  </div>

  <!-- ===========================
       JavaScript — 게임 로직
       =========================== -->
  <script>
    /* =====================================================
       1. 난이도 설정 (레벨별 파라미터)
       ===================================================== */
    const DIFFICULTY_CONFIG = {
      easy:   { label: '쉬움🌱', minSeq: 2, maxSeq: 4, interval: 700,  litDuration: 550 },
      normal: { label: '보통⚡', minSeq: 3, maxSeq: 6, interval: 500,  litDuration: 400 },
      hard:   { label: '어려움🔥', minSeq: 4, maxSeq: 8, interval: 350,  litDuration: 270 },
    };

    /* =====================================================
       2. 게임 상태 변수
       ===================================================== */
    let currentDifficulty = 'normal'; // 현재 선택된 난이도
    let config = DIFFICULTY_CONFIG.normal;

    let sequence       = [];   // 전체 시퀀스 배열
    let playerInput    = [];   // 플레이어 입력 배열
    let currentLevel   = 1;    // 현재 단계 (시퀀스 길이)
    let bestLevel      = 0;    // 최고 달성 단계

    let isPlayingSeq   = false; // 시퀀스 재생 중 여부
    let isPlayerTurn   = false; // 플레이어 입력 차례 여부
    let isProcessing   = false; // 오답 처리 중 여부

    /* =====================================================
       3. Web Audio API 초기화
       ===================================================== */
    let audioCtx = null;

    // 오디오 컨텍스트 지연 생성 (브라우저 정책: 사용자 제스처 후 생성)
    function ensureAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      // suspended 상태(자동 정지) 복원
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    /**
     * 단순 사인파 음 재생
     * @param {number} freq      - 주파수(Hz)
     * @param {number} duration  - 재생 시간(초)
     * @param {number} volume    - 볼륨 (0~1)
     * @param {string} type      - 파형 ('sine'|'square'|'triangle'|'sawtooth')
     * @param {number} [startOffset=0] - 시작 오프셋(초)
     */
    function playTone(freq, duration, volume = 0.45, type = 'sine', startOffset = 0) {
      ensureAudioCtx();
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type      = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startOffset);

      // 부드러운 Envelope (클릭음 팝 방지)
      gain.gain.setValueAtTime(0, audioCtx.currentTime + startOffset);
      gain.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + startOffset + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,
        audioCtx.currentTime + startOffset + duration);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(audioCtx.currentTime + startOffset);
      osc.stop(audioCtx.currentTime  + startOffset + duration + 0.05);
    }

    /* 버튼별 음 주파수 — 도(C4)·레(D4)·미(E4)·솔(G4) */
    const BUTTON_NOTES = [
      261.63,  // 0: 빨강 — 도 (C4)
      293.66,  // 1: 파랑 — 레 (D4)
      329.63,  // 2: 노랑 — 미 (E4)
      392.00,  // 3: 초록 — 솔 (G4)
    ];

    // 버튼 음 재생
    function playButtonSound(id) {
      playTone(BUTTON_NOTES[id], 0.35, 0.45, 'sine');
    }

    // 정답 효과음 (짧은 상행음: 미·솔)
    function playCorrectSound() {
      playTone(329.63, 0.15, 0.35, 'sine', 0);
      playTone(392.00, 0.2,  0.35, 'sine', 0.15);
    }

    // 오답 효과음 (낮은 부저)
    function playWrongSound() {
      playTone(120, 0.4, 0.5, 'square', 0);
      playTone(100, 0.35, 0.4, 'sawtooth', 0.1);
    }

    // 팡파레 (최고기록 갱신: 도·미·솔·도5 상행)
    function playFanfare() {
      const notes = [261.63, 329.63, 392.00, 523.25];
      notes.forEach((f, i) => {
        playTone(f, 0.25, 0.4, 'sine', i * 0.18);
      });
    }

    /* =====================================================
       4. DOM 유틸
       ===================================================== */
    const gameBtns     = document.querySelectorAll('.game-btn');
    const messageBox   = document.getElementById('message-box');
    const statLevel    = document.getElementById('stat-level');
    const statBest     = document.getElementById('stat-best');
    const statDiff     = document.getElementById('stat-diff');
    const progressDots = document.getElementById('progress-dots');
    const fanfareOverlay = document.getElementById('fanfare-overlay');
    const fanfareScoreText = document.getElementById('fanfare-score-text');
    const btnReplay    = document.getElementById('btn-replay');

    // 메시지 표시
    function setMessage(text, color = 'var(--accent)') {
      messageBox.textContent = text;
      messageBox.style.color = color;
    }

    // 상태바 업데이트
    function updateStats() {
      statLevel.textContent = currentLevel;
      statBest.textContent  = bestLevel;
      statDiff.textContent  = config.label;
    }

    // 진행 점 렌더링
    function renderDots() {
      progressDots.innerHTML = '';
      for (let i = 0; i < sequence.length; i++) {
        const dot = document.createElement('div');
        dot.className = 'progress-dot';
        if (i < playerInput.length)       dot.classList.add('done');
        else if (i === playerInput.length) dot.classList.add('current');
        progressDots.appendChild(dot);
      }
    }

    /* =====================================================
       5. 버튼 활성화 / 비활성화
       ===================================================== */
    function enableButtons() {
      gameBtns.forEach(b => b.classList.remove('disabled'));
    }

    function disableButtons() {
      gameBtns.forEach(b => b.classList.add('disabled'));
    }

    /* =====================================================
       6. 버튼 빛남 (lit) 효과
       ===================================================== */
    /**
     * 지정 버튼을 일정 시간 빛나게 함
     * @param {number} id        - 버튼 인덱스 (0~3)
     * @param {number} duration  - 빛남 지속 시간(ms)
     * @returns {Promise}        - 빛남이 끝나면 resolve
     */
    function lightButton(id, duration) {
      return new Promise(resolve => {
        const btn = gameBtns[id];
        btn.classList.add('lit');
        playButtonSound(id);                  // 빛날 때 음 재생

        setTimeout(() => {
          btn.classList.remove('lit');
          resolve();
        }, duration);
      });
    }

    /* =====================================================
       7. 시퀀스 재생 (게임이 순서를 보여줌)
       ===================================================== */
    async function playSequence(seq) {
      isPlayingSeq = true;
      isPlayerTurn = false;
      disableButtons();
      btnReplay.disabled = true;
      setMessage('잘 봐요! 🎵', '#555');

      // 재생 전 짧은 대기
      await delay(600);

      for (let i = 0; i < seq.length; i++) {
        await lightButton(seq[i], config.litDuration);
        // 버튼 간 간격 (interval - litDuration 이 남은 off 시간)
        await delay(config.interval - config.litDuration);
      }

      // 재생 완료 → 플레이어 차례
      await delay(300);
      isPlayingSeq  = false;
      isPlayerTurn  = true;
      playerInput   = [];
      enableButtons();
      btnReplay.disabled = false;
      setMessage('이제 눌러보세요! 👆', 'var(--mint)');
      renderDots();
    }

    /* =====================================================
       8. 플레이어 입력 처리
       ===================================================== */
    async function handlePress(id) {
      // 버튼 비활성화 상태이면 무시
      if (!isPlayerTurn || isProcessing) return;
      const btn = document.querySelector(`.game-btn[data-id="${id}"]`);
      if (btn.classList.contains('disabled')) return;

      // 클릭 시 음 재생 + 빛남 (짧게)
      btn.classList.add('lit');
      playButtonSound(id);
      setTimeout(() => btn.classList.remove('lit'), 200);

      playerInput.push(id);
      renderDots();

      const pos = playerInput.length - 1; // 방금 입력한 위치

      /* ----- 오답 체크 ----- */
      if (playerInput[pos] !== sequence[pos]) {
        await handleWrong();
        return;
      }

      /* ----- 정답 & 시퀀스 완성 체크 ----- */
      if (playerInput.length === sequence.length) {
        await handleLevelClear();
      }
      // 아직 입력 중이면 계속 대기 (렌더만)
    }

    /* =====================================================
       9. 레벨 클리어 처리
       ===================================================== */
    async function handleLevelClear() {
      isPlayerTurn = false;
      disableButtons();

      playCorrectSound();
      setMessage('정답! 훌륭해요! 🎉', 'var(--accent)');

      // 최고 단계 갱신 여부 확인
      const cleared = currentLevel; // 방금 클리어한 단계
      if (cleared > bestLevel) {
        bestLevel = cleared;
        updateStats();
        await delay(400);
        showFanfare(cleared);   // 팡파레 오버레이
        playFanfare();
        await delay(2200);      // 팡파레 표시 시간
        hideFanfare();
      } else {
        await delay(800);
      }

      // 최대 단계 도달 여부
      if (sequence.length >= config.maxSeq) {
        setMessage(`🏅 최대 단계 클리어! (${config.maxSeq}단계)`, '#2ECC71');
        await delay(1500);
        // 계속 이어가기 위해 maxSeq를 무제한으로 늘림 (선택)
        // 현재 구현: 최대 도달 후에도 계속 추가
      }

      // 다음 단계 진행
      currentLevel++;
      addToSequence();
      updateStats();
      await playSequence(sequence);
    }

    /* =====================================================
       10. 오답 처리
       ===================================================== */
    async function handleWrong() {
      isProcessing = true;
      isPlayerTurn = false;
      disableButtons();
      btnReplay.disabled = true;

      playWrongSound();
      setMessage('앗, 틀렸어요! 다시 해봐요 😅', '#FF4757');

      // 전체 버튼 흔들림 표현 (짧게 빨간 flash)
      gameBtns.forEach(b => {
        b.style.transition = 'background 0.1s';
        b.style.opacity = '0.5';
      });
      await delay(350);
      gameBtns.forEach(b => { b.style.opacity = ''; });
      await delay(300);

      // 같은 단계 재시도 — 시퀀스는 그대로 유지
      playerInput  = [];
      isProcessing = false;
      setMessage('다시 볼게요! 👀', '#888');
      await playSequence(sequence);
    }

    /* =====================================================
       11. 시퀀스 관리
       ===================================================== */
    // 시퀀스에 무작위 버튼 1개 추가
    function addToSequence() {
      const randomId = Math.floor(Math.random() * 4);
      sequence.push(randomId);
    }

    // 초기 시퀀스 생성 (minSeq 길이)
    function initSequence() {
      sequence = [];
      for (let i = 0; i < config.minSeq; i++) {
        addToSequence();
      }
    }

    /* =====================================================
       12. 게임 시작 / 재시작
       ===================================================== */
    function startGame(difficulty) {
      ensureAudioCtx(); // 사용자 제스처 후 오디오 컨텍스트 생성

      currentDifficulty = difficulty;
      config            = DIFFICULTY_CONFIG[difficulty];

      currentLevel = 1;
      playerInput  = [];
      isProcessing = false;

      // 화면 전환
      document.getElementById('screen-start').classList.remove('active');
      document.getElementById('screen-game').classList.add('active');

      initSequence();
      updateStats();
      setMessage('잠깐, 준비하세요! ⏳', '#aaa');

      // 잠시 후 시퀀스 재생 시작
      setTimeout(() => playSequence(sequence), 800);
    }

    /* ===== 다시 보기 버튼 — 현재 시퀀스 재재생 ===== */
    function replaySequence() {
      if (isPlayingSeq || isProcessing) return;
      playerInput = [];
      playSequence(sequence);
    }

    /* ===== 처음으로 버튼 — 시작 화면으로 ===== */
    function goToStart() {
      // 진행 중인 모든 상태 초기화
      isPlayingSeq  = false;
      isPlayerTurn  = false;
      isProcessing  = false;
      sequence      = [];
      playerInput   = [];
      progressDots.innerHTML = '';
      disableButtons();

      document.getElementById('screen-game').classList.remove('active');
      document.getElementById('screen-start').classList.add('active');
    }

    /* ===== 보상 보고 (메인 허브 연동) ===== */
    function reportReward(stars) {
      try {
        const data = JSON.parse(localStorage.getItem('kbr.rewards') || 'null') || {
          totalStars: 0, totalGames: 0, badges: [], history: [], streak: 0, lastDate: null
        };
        data.totalStars += stars;
        data.totalGames += 1;
        const today = new Date().toISOString().slice(0, 10);
        data.history.unshift({ gameId: 'rhythm_game', area: '기억력', stars, date: today, timestamp: Date.now() });
        if (data.history.length > 100) data.history = data.history.slice(0, 100);
        if (data.lastDate !== today) {
          if (data.lastDate) {
            const diff = Math.floor((new Date(today) - new Date(data.lastDate)) / 86400000);
            data.streak = diff === 1 ? data.streak + 1 : 1;
          } else { data.streak = 1; }
          data.lastDate = today;
        }
        localStorage.setItem('kbr.rewards', JSON.stringify(data));
      } catch {}
    }

    /* =====================================================
       13. 팡파레 오버레이 제어
       ===================================================== */
    function showFanfare(level) {
      const stars = level >= 6 ? 3 : (level >= 3 ? 2 : 1);
      reportReward(stars);
      fanfareScoreText.textContent = `${level}단계를 클리어했어요! 🎊`;
      fanfareOverlay.classList.add('show');
    }

    function hideFanfare() {
      fanfareOverlay.classList.remove('show');
    }

    // 오버레이 클릭 시 닫기
    fanfareOverlay.addEventListener('click', hideFanfare);

    /* =====================================================
       14. 유틸 — delay Promise
       ===================================================== */
    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    /* =====================================================
       15. 키보드 접근성 (1·2·3·4 키로 버튼 조작)
       ===================================================== */
    document.addEventListener('keydown', e => {
      const keyMap = { '1': 0, '2': 1, '3': 2, '4': 3 };
      if (e.key in keyMap) {
        handlePress(keyMap[e.key]);
      }
    });
  </script>
</body>
