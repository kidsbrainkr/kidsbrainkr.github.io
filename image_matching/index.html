<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 두뇌 짝 맞추기</title>
<style>
/* ===== VARIABLES ===== */
:root {
  --bg:        #FFF8F0;
  --accent:    #FF6B35;
  --accent-dk: #E55A24;
  --mint:      #4ECDC4;
  --ok:        #2ECC71;
  --txt:       #333;
  --txt-lt:    #888;
  --err:       #E74C3C;
  --sh:  0 4px 16px rgba(0,0,0,.12);
  --sh2: 0 8px 32px rgba(0,0,0,.18);
  --r: 12px;
  --font: 'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  background-image:
    radial-gradient(circle at 20% 20%,rgba(255,107,53,.06) 0%,transparent 50%),
    radial-gradient(circle at 80% 80%,rgba(78,205,196,.06) 0%,transparent 50%);
  color:var(--txt);font-family:var(--font);
  min-height:100vh;display:flex;justify-content:center;padding:20px 16px 40px;
}
.screen{display:none;width:100%;max-width:920px;margin:0 auto}
.screen.active{display:block}
.hidden{display:none!important}

/* ===== HEADER ===== */
.game-header{text-align:center;padding:28px 0 20px}
.game-header h1{font-size:2.6rem;color:var(--accent);text-shadow:2px 3px 6px rgba(255,107,53,.2)}
.subtitle{color:var(--txt-lt);font-size:1rem;margin-top:6px}

/* ===== SETUP PANEL ===== */
.setup-panel{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:28px 32px;margin-bottom:20px}
.setup-section{margin-bottom:22px}
.setup-section:last-child{margin-bottom:0}
.section-label{display:block;font-weight:700;font-size:.9rem;margin-bottom:10px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.choice-btn{
  padding:8px 22px;border:2px solid #e8e8e8;border-radius:24px;
  background:#fff;cursor:pointer;font-size:.9rem;font-family:var(--font);color:var(--txt);
  transition:all .18s
}
.choice-btn:hover{border-color:var(--accent);color:var(--accent)}
.choice-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
#player-names-container{display:flex;flex-direction:column;gap:8px}
.name-input{
  padding:10px 14px;border:2px solid #e8e8e8;border-radius:8px;
  font-size:.95rem;font-family:var(--font);width:100%;max-width:280px;
  background:#fafafa;transition:border-color .18s,background .18s
}
.name-input:focus{outline:none;border-color:var(--accent);background:#fff}
.card-count-select{
  padding:10px 14px;border:2px solid #e8e8e8;border-radius:8px;
  font-size:.95rem;font-family:var(--font);background:#fff;cursor:pointer;min-width:130px;margin-right:10px
}
.card-count-select:focus{outline:none;border-color:var(--accent)}
.diff-preview{font-size:.85rem;font-weight:700;color:var(--mint);vertical-align:middle}
.setup-row{display:flex;gap:32px;align-items:center;flex-wrap:wrap}
.audio-toggle{display:flex;align-items:center;gap:10px}
.audio-toggle .section-label{margin-bottom:0}
.toggle-switch{position:relative;display:inline-block;width:48px;height:26px;cursor:pointer}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#d0d0d0;border-radius:26px;transition:.25s}
.toggle-slider::before{
  content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 4px rgba(0,0,0,.2)
}
.toggle-switch input:checked+.toggle-slider{background:var(--accent)}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(22px)}

/* ===== FILE SECTION ===== */
.file-connect-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.file-badge{
  display:inline-block;padding:5px 12px;border-radius:20px;font-size:.82rem;font-weight:600
}
.file-badge-off{background:#f0f0f0;color:var(--txt-lt)}
.file-badge-on {background:#e8f8f0;color:#1a9e60;border:1px solid #b0e8cc}
.file-fallback{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.hint-text{font-size:.78rem;color:var(--txt-lt);margin-top:4px}

/* ===== ERRORS & ACTIONS ===== */
.error-msg{color:var(--err);background:#fff0f0;border:1px solid #ffd0d0;border-radius:8px;padding:10px 16px;margin-bottom:14px;font-size:.9rem}
.start-actions{display:flex;gap:12px;justify-content:center;padding-bottom:30px}

/* ===== BUTTONS ===== */
.btn-primary{
  background:var(--accent);color:#fff;border:none;padding:14px 36px;border-radius:28px;
  font-size:1.05rem;font-weight:700;font-family:var(--font);cursor:pointer;
  box-shadow:0 4px 14px rgba(255,107,53,.35);transition:all .18s
}
.btn-primary:hover{background:var(--accent-dk);transform:translateY(-2px);box-shadow:0 6px 18px rgba(255,107,53,.45)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{
  background:#fff;color:var(--accent);border:2px solid var(--accent);padding:12px 26px;border-radius:28px;
  font-size:.95rem;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .18s
}
.btn-secondary:hover{background:var(--accent);color:#fff}
.btn-small{
  background:#f2f2f2;color:var(--txt);border:none;padding:7px 16px;border-radius:20px;
  font-size:.82rem;font-family:var(--font);cursor:pointer;transition:background .18s;white-space:nowrap
}
.btn-small:hover{background:#e4e4e4}
.btn-small.accent-sm{background:#fff3ee;color:var(--accent);border:1px solid #ffcdb8}
.btn-small.accent-sm:hover{background:#ffe0d0}

/* ===== GAME STATUS BAR ===== */
.game-status-bar{
  display:flex;gap:8px;background:#fff;border-radius:var(--r);
  box-shadow:0 2px 8px rgba(0,0,0,.08);padding:12px 20px;margin-bottom:14px;
  flex-wrap:wrap;justify-content:space-around
}
.status-item{display:flex;flex-direction:column;align-items:center;min-width:66px}
.status-label{font-size:.68rem;color:var(--txt-lt);text-transform:uppercase;letter-spacing:.5px}
.status-value{font-size:1rem;font-weight:700;margin-top:3px;white-space:nowrap}
.timer-val{color:var(--accent);font-size:1.1rem}

/* ===== PREVIEW BANNER ===== */
.preview-banner{
  background:linear-gradient(135deg,var(--mint),#3aa8a0);color:#fff;
  border-radius:var(--r);padding:14px;text-align:center;margin-bottom:12px;
  font-size:1.05rem;font-weight:600
}
.countdown{font-size:3rem;font-weight:900;line-height:1;margin-top:4px;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* ===== CARD BOARD ===== */
.card-board{
  display:grid;gap:10px;padding:16px;background:#fff;
  border-radius:var(--r);box-shadow:var(--sh);margin:0 auto 14px
}

/* ===== CARDS ===== */
.card{aspect-ratio:1;cursor:pointer;perspective:700px;user-select:none;border-radius:var(--r)}
.card-inner{
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;transition:transform .38s cubic-bezier(.4,0,.2,1);border-radius:var(--r)
}
.card.flipped .card-inner{transform:rotateY(180deg)}
.card-face-down,.card-face-up{
  position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden
}
.card-face-down{
  background:linear-gradient(135deg,#ff8c5a,#ff6b35,#e55a24);
  box-shadow:0 3px 8px rgba(255,107,53,.28)
}
.card-face-down::before{content:'';position:absolute;inset:4px;border:2px solid rgba(255,255,255,.3);border-radius:8px}
.card-back-icon{font-size:1.6rem;opacity:.7}
.card-face-up{transform:rotateY(180deg);background:#fffaf5;border:2px solid #f0e4d8;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-emoji{font-size:2.2rem;line-height:1}
.card-name{font-size:.68rem;color:var(--txt-lt);margin-top:5px;font-weight:600}
.card:not(.matched):hover .card-face-down{filter:brightness(1.05);box-shadow:0 6px 16px rgba(255,107,53,.4)}
.card.flipped:not(.matched):hover .card-inner{transform:rotateY(180deg) scale(1.04)}
.card:not(.flipped):not(.matched):hover .card-inner{transform:scale(1.04)}
.card.matched .card-face-up{background:linear-gradient(135deg,#d4f4e8,#b8edd8);border-color:#7edcb8}
.card.matched{cursor:default}
.game-actions{display:flex;gap:10px;justify-content:center;padding-bottom:20px}

/* ===== RESULT ===== */
.result-header{text-align:center;padding:28px 0 20px}
.result-trophy{font-size:3.8rem;margin-bottom:8px}
.result-header h2{font-size:2rem;color:var(--accent)}
#result-subtitle{color:var(--txt-lt);margin-top:8px;font-size:1.1rem}
.ranking-table{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:12px 16px;margin:0 auto 24px;max-width:580px}
.rank-row{display:grid;grid-template-columns:50px 1fr 80px 50px 90px;align-items:center;padding:12px 8px;border-bottom:1px solid #f5f5f5;gap:8px}
.rank-row:last-child{border-bottom:none}
.rank-row.rank-first{background:linear-gradient(135deg,#fff8e0,#fff0c4);border-radius:8px;padding:14px 8px}
.rank-pos{font-size:1.6rem;text-align:center}
.rank-name{font-size:1.05rem;font-weight:700}
.rank-time{color:var(--accent);font-weight:700;font-size:1rem;text-align:right}
.rank-moves{color:var(--txt-lt);font-size:.82rem;text-align:right}
.rank-diff{color:var(--mint);font-size:.78rem;text-align:right}
.result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;padding-bottom:30px}

/* ===== RECORDS MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.48);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:20px
}
.modal-box{background:#fff;border-radius:var(--r);box-shadow:var(--sh2);padding:28px;width:100%;max-width:520px;max-height:78vh;overflow-y:auto}
.modal-box h2{margin-bottom:16px;color:var(--accent)}
.records-tabs{display:flex;gap:8px;margin-bottom:16px}
.tab-btn{padding:8px 20px;border:2px solid #e8e8e8;border-radius:20px;background:#fff;cursor:pointer;font-size:.88rem;font-family:var(--font);transition:all .18s}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tab-content{min-height:80px}
.best-rec-row,.record-row{display:grid;gap:10px;padding:9px 4px;border-bottom:1px solid #f5f5f5;font-size:.88rem;align-items:center}
.best-rec-row:last-child,.record-row:last-child{border-bottom:none}
.best-rec-row{grid-template-columns:auto 1fr auto auto}
.record-row{grid-template-columns:1fr auto auto auto}
.rec-name{font-weight:600}
.rec-setting{color:var(--txt-lt);font-size:.78rem}
.rec-time{color:var(--accent);font-weight:700}
.rec-moves{color:var(--txt-lt);font-size:.82rem}
.empty-msg{color:var(--txt-lt);text-align:center;padding:28px;font-size:.95rem}

/* ===== TRANSITION OVERLAY ===== */
.transition-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:200}
.transition-box{background:#fff;border-radius:var(--r);box-shadow:var(--sh2);padding:38px 32px;text-align:center;max-width:380px;width:90%}
.transition-result{margin-bottom:22px}
.tr-name{font-size:1.5rem;font-weight:800;color:var(--accent);margin-bottom:8px}
.tr-time{font-size:2rem;font-weight:800;color:var(--mint)}
.tr-moves{color:var(--txt-lt);margin-top:6px;font-size:.95rem}
.transition-next{font-size:1.05rem;color:var(--txt);margin-bottom:22px;line-height:1.5}

/* ===== SAVE STATUS TOAST ===== */
.save-toast{
  position:fixed;bottom:24px;right:24px;
  background:#1a9e60;color:#fff;padding:9px 18px;border-radius:20px;
  font-size:.82rem;font-weight:600;opacity:0;transition:opacity .3s;z-index:300;pointer-events:none
}
.save-toast.show{opacity:1}

/* ===== COMBO POPUP ===== */
.combo-popup{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  background:linear-gradient(135deg,#FF6B35,#FFD166);
  color:#fff;font-size:2.2rem;font-weight:900;padding:18px 36px;
  border-radius:50px;text-align:center;z-index:400;pointer-events:none;
  box-shadow:0 8px 32px rgba(255,107,53,.5);white-space:nowrap;
  transition:transform .15s cubic-bezier(.34,1.56,.64,1),opacity .3s
}
.combo-popup.show{transform:translate(-50%,-50%) scale(1)}
.combo-popup.hide{transform:translate(-50%,-50%) scale(0);opacity:0}

/* ===== TIME LOW ALERT ===== */
@keyframes timeLow{0%,100%{color:var(--accent)}50%{color:#E74C3C;transform:scale(1.15)}}
.timer-val.low{animation:timeLow .6s infinite}

/* ===== TIME UP OVERLAY ===== */
.timeup-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;
  align-items:center;justify-content:center;z-index:500
}
.timeup-box{
  background:#fff;border-radius:var(--r);box-shadow:var(--sh2);
  padding:40px 36px;text-align:center;max-width:380px;width:90%
}
.timeup-icon{font-size:3.5rem;margin-bottom:12px}
.timeup-box h2{font-size:1.8rem;color:var(--err);margin-bottom:8px}
.timeup-box p{color:var(--txt-lt);margin-bottom:24px;font-size:1rem}

/* ===== MOBILE ===== */
@media(max-width:480px){
  body{padding:10px 8px 30px}
  .game-header h1{font-size:1.9rem}
  .setup-panel{padding:18px 16px}
  .choice-btn{padding:7px 14px;font-size:.82rem}
  .card-board{padding:10px;gap:7px}
  .card-emoji{font-size:1.7rem}
  .card-name{font-size:.58rem}
  .game-status-bar{padding:8px 10px;gap:4px}
  .status-value{font-size:.88rem}
  .status-label{font-size:.6rem}
  .btn-primary{padding:12px 24px;font-size:.95rem}
  .ranking-table{padding:8px 10px}
  .rank-row{grid-template-columns:40px 1fr 70px 40px;font-size:.85rem}
  .rank-diff{display:none}
  .combo-popup{font-size:1.6rem;padding:12px 24px}
}
@media(max-width:360px){
  .card-emoji{font-size:1.4rem}
  .choice-btn{padding:6px 10px;font-size:.78rem}
}
</style>
</head>
<body>

<!-- ===== START SCREEN ===== -->
<div id="screen-start" class="screen active">
  <header class="game-header">
    <h1>🧠 두뇌 짝 맞추기</h1>
    <p class="subtitle">기억력 카드 게임</p>
  </header>
  <div class="setup-panel">

    <div class="setup-section">
      <label class="section-label">👥 플레이어 수</label>
      <div class="btn-group" id="player-count-group">
        <button class="choice-btn active" data-count="1">1명</button>
        <button class="choice-btn" data-count="2">2명</button>
        <button class="choice-btn" data-count="3">3명</button>
        <button class="choice-btn" data-count="4">4명</button>
      </div>
    </div>

    <div class="setup-section">
      <label class="section-label">✏️ 플레이어 이름</label>
      <div id="player-names-container"></div>
    </div>

    <div class="setup-section">
      <label class="section-label">⏱️ 카드 공개 시간</label>
      <div class="btn-group" id="preview-time-group">
        <button class="choice-btn" data-sec="5">5초</button>
        <button class="choice-btn active" data-sec="10">10초</button>
        <button class="choice-btn" data-sec="15">15초</button>
      </div>
    </div>

    <div class="setup-section">
      <label class="section-label">🎨 카테고리</label>
      <div class="btn-group" id="category-group">
        <button class="choice-btn active" data-cat="fruit">🍎 과일</button>
        <button class="choice-btn" data-cat="animal">🐶 동물</button>
        <button class="choice-btn" data-cat="vehicle">🚗 탈것</button>
        <button class="choice-btn" data-cat="food">🍕 음식</button>
        <button class="choice-btn" data-cat="sports">⚽ 스포츠</button>
        <button class="choice-btn" data-cat="space">🚀 우주</button>
        <button class="choice-btn" data-cat="sea">🐟 바다</button>
        <button class="choice-btn" data-cat="weather">⛅ 날씨</button>
        <button class="choice-btn" data-cat="magic">🦄 판타지</button>
        <button class="choice-btn" data-cat="veggie">🥦 채소</button>
      </div>
    </div>

    <div class="setup-section">
      <label class="section-label">🃏 카드 수</label>
      <select id="card-count-select" class="card-count-select">
        <option value="8">8장</option><option value="10">10장</option>
        <option value="12" selected>12장</option><option value="14">14장</option>
        <option value="16">16장</option><option value="18">18장</option>
        <option value="20">20장</option><option value="22">22장</option>
        <option value="24">24장</option><option value="26">26장</option>
        <option value="28">28장</option><option value="30">30장</option>
        <option value="32">32장</option><option value="34">34장</option>
        <option value="36">36장</option>
      </select>
      <span class="diff-preview" id="diff-preview"></span>
    </div>

    <div class="setup-section">
      <label class="section-label">⏰ 제한 시간</label>
      <div class="btn-group" id="timelimit-group">
        <button class="choice-btn active" data-limit="0">없음</button>
        <button class="choice-btn" data-limit="60">1분</button>
        <button class="choice-btn" data-limit="90">1분 30초</button>
        <button class="choice-btn" data-limit="120">2분</button>
        <button class="choice-btn" data-limit="180">3분</button>
      </div>
    </div>

    <div class="setup-section setup-row">
      <div class="audio-toggle">
        <label class="section-label">🎵 배경음악</label>
        <label class="toggle-switch">
          <input type="checkbox" id="bgm-toggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="audio-toggle">
        <label class="section-label">🔊 효과음</label>
        <label class="toggle-switch">
          <input type="checkbox" id="sfx-toggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- 기록 파일 연결 섹션 -->
    <div class="setup-section" id="file-section">
      <label class="section-label">💾 기록 저장 위치</label>
      <div class="file-connect-row">
        <span class="file-badge file-badge-off" id="file-status-badge">⚪ 브라우저 저장 중</span>
        <button class="btn-small accent-sm" id="btn-connect-file">📂 JSON 파일 연결</button>
        <button class="btn-small hidden" id="btn-disconnect-file">연결 해제</button>
      </div>
      <!-- File System API 미지원 시 폴백 -->
      <div class="file-fallback hidden" id="file-fallback">
        <button class="btn-small" id="btn-export">💾 기록 내보내기</button>
        <label class="btn-small" style="cursor:pointer">
          📂 기록 가져오기
          <input type="file" id="btn-import" accept=".json" style="display:none">
        </label>
      </div>
      <p class="hint-text" id="file-hint">처음 한 번 파일을 지정하면 이후 게임 기록이 해당 JSON 파일에 자동 저장됩니다</p>
    </div>

  </div>

  <div id="start-error" class="error-msg hidden"></div>
  <div class="start-actions">
    <button class="btn-secondary" id="btn-records">📋 기록 보기</button>
    <button class="btn-primary" id="btn-start">🎮 게임 시작!</button>
  </div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="screen-game" class="screen">
  <div class="game-status-bar">
    <div class="status-item"><span class="status-label">플레이어</span><span class="status-value" id="stat-player">-</span></div>
    <div class="status-item"><span class="status-label">난이도</span><span class="status-value" id="stat-difficulty">-</span></div>
    <div class="status-item"><span class="status-label">시간</span><span class="status-value timer-val" id="stat-timer">00:00</span></div>
    <div class="status-item"><span class="status-label">이동</span><span class="status-value" id="stat-moves">0</span></div>
    <div class="status-item"><span class="status-label">남은 쌍</span><span class="status-value" id="stat-pairs">0</span></div>
    <div class="status-item" id="stat-timelimit-wrap" style="display:none"><span class="status-label">남은 시간</span><span class="status-value timer-val" id="stat-timeleft">--:--</span></div>
    <div class="status-item" id="stat-combo-wrap" style="display:none"><span class="status-label">콤보</span><span class="status-value" id="stat-combo" style="color:#FF6B35">0</span></div>
  </div>

// =====================================================================
// FILE I/O — File System Access API + IndexedDB handle persistence
// =====================================================================
const FileIO = (() => {
  const IDB_NAME = 'bmg-handles';
  let fh = null; // FileSystemFileHandle

  // IndexedDB helpers
  function openDB() {
    return new Promise((res, rej) => {
      const r = indexedDB.open(IDB_NAME, 1);
      r.onupgradeneeded = e => e.target.result.createObjectStore('h');
      r.onsuccess = e => res(e.target.result);
      r.onerror   = () => rej(r.error);
    });
  }
  async function idbPut(key, val) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction('h', 'readwrite');
      tx.objectStore('h').put(val, key);
      tx.oncomplete = res; tx.onerror = () => rej(tx.error);
    });
  }
  async function idbGet(key) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction('h', 'readonly');
      const r  = tx.objectStore('h').get(key);
      r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
    });
  }
  async function idbDel(key) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction('h', 'readwrite');
      tx.objectStore('h').delete(key);
      tx.oncomplete = res; tx.onerror = () => rej(tx.error);
    });
  }

  // Permission
  async function ensurePermission(handle) {
    if (!handle) return false;
    try {
      const s = await handle.queryPermission({mode:'readwrite'});
      if (s === 'granted') return true;
      return (await handle.requestPermission({mode:'readwrite'})) === 'granted';
    } catch { return false; }
  }

  return {
    get supported() { return 'showOpenFilePicker' in window; },
    get connected() { return !!fh; },
    get filename()  { return fh ? fh.name : null; },

    // 앱 시작 시 저장된 핸들 복원
    async restore() {
      if (!this.supported) return false;
      try {
        const stored = await idbGet('records');
        if (!stored) return false;
        if (!(await ensurePermission(stored))) return false;
        fh = stored;
        return true;
      } catch { return false; }
    },

    // 사용자가 "파일 연결" 클릭
    async connect() {
      if (!this.supported) return false;
      try {
        // showSaveFilePicker: 기존 파일 선택 또는 새 파일 생성 모두 가능
        fh = await window.showSaveFilePicker({
          suggestedName: 'records.json',
          types: [{description:'기록 파일', accept:{'application/json':['.json']}}],
        });
        await idbPut('records', fh);
        return true;
      } catch { fh = null; return false; }
    },

    // 파일에서 읽기
    async load() {
      if (!fh) return null;
      try {
        const file = await fh.getFile();
        const text = await file.text();
        if (!text.trim()) return {};
        return JSON.parse(text);
      } catch { return null; }
    },

    // 파일에 쓰기
    async save(data) {
      if (!fh) return false;
      try {
        const w = await fh.createWritable();
        await w.write(JSON.stringify(data, null, 2));
        await w.close();
        return true;
      } catch { return false; }
    },

    // 연결 해제
    async disconnect() {
      fh = null;
      try { await idbDel('records'); } catch {}
    },
  };
})();

// =====================================================================
// AUDIO (Web Audio API — 파일 없이 합성)
// =====================================================================
const AudioSys = (() => {
  let ctx = null, masterGain = null;
  let bgmEnabled = true, sfxEnabled = true;
  let bgmTimer = null, bgmIdx = 0;
  const BGM = [523.25,659.25,783.99,659.25, 523.25,587.33,698.46,587.33,
               523.25,659.25,783.99,1046.5, 783.99,659.25,523.25,0];
  const NOTE_MS = 380;

  function ensure() {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain(); masterGain.gain.value = 0.35;
      masterGain.connect(ctx.destination);
    }
    if (ctx.state === 'suspended') ctx.resume();
  }
  function tone(freq, dur, gain=.45, type='sine', delay=0) {
    if (!ctx) return;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(masterGain);
    o.type = type; o.frequency.value = freq;
    const t = ctx.currentTime + delay;
    g.gain.setValueAtTime(gain, t);
    g.gain.exponentialRampToValueAtTime(.001, t+dur);
    o.start(t); o.stop(t+dur+.02);
  }
  function noteStep() {
    if (!bgmEnabled || !ctx) return;
    const f = BGM[bgmIdx++ % BGM.length]; if (!f) return;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(masterGain);
    o.type = 'triangle'; o.frequency.value = f;
    const t = ctx.currentTime;
    g.gain.setValueAtTime(.12, t);
    g.gain.exponentialRampToValueAtTime(.001, t+NOTE_MS/1000*.9);
    o.start(t); o.stop(t+NOTE_MS/1000);
  }
  return {
    init() { ensure(); },
    playFlip()  { if (!sfxEnabled||!ctx) return; tone(900,.06,.25,'square'); tone(650,.06,.18,'square',.05); },
    playMatch() { if (!sfxEnabled||!ctx) return; tone(523.25,.12,.4,'sine'); tone(659.25,.12,.4,'sine',.11); tone(783.99,.22,.45,'sine',.22); },
    playWin()   { if (!sfxEnabled||!ctx) return; [523.25,659.25,783.99,1046.5].forEach((f,i)=>tone(f,.22,.5,'sine',i*.16)); tone(1046.5,.5,.6,'sine',.64); },
    startBGM()  { if (!bgmEnabled||!ctx) return; this.stopBGM(); noteStep(); bgmTimer=setInterval(noteStep,NOTE_MS); },
    stopBGM()   { if (bgmTimer){clearInterval(bgmTimer);bgmTimer=null;} },
    setBGM(v)   { bgmEnabled=v; if(!v)this.stopBGM(); },
    setSFX(v)   { sfxEnabled=v; },
  };
})();

const state = {
  settings: {
    playerCount:1, playerNames:['플레이어 1'],
    previewSeconds:10, cardCount:12, bgmEnabled:true, sfxEnabled:true,
    category:'fruit', timeLimit:0,
  },
  deck:[], currentPlayerIndex:0,
  openedCards:[], matchedCardIds:new Set(),
  isPreviewPhase:false, isBusy:false,
  startTime:null, timerInterval:null, previewTimer:null,
  timeLimitInterval:null, timeLeft:0,
  moves:0, combo:0, maxCombo:0,
  playerResults:[],
  bestRecords:{}, recentRecords:[],
};

// =====================================================================
// UTILS
// =====================================================================
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function fmtTime(ms){const s=Math.floor(ms/1000);return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
function fmtSec(ms){return(ms/1000).toFixed(1)+'초';}
function diffLabel(n,p){
  let l=n<=12?0:n<=20?1:n<=28?2:3;
  if(p===5)l=Math.min(3,l+1); if(p===15)l=Math.max(0,l-1);
  return['🌱 쉬움','🌿 보통','🔥 어려움','💀 초어려움'][l];
}
function gridCols(n){
  if(n<=8)return 4; if(n<=10)return 5; if(n<=12)return 4;
  if(n<=20){if(n%6===0)return 6;if(n%5===0)return 5;if(n%4===0)return 4;return 5;}
  if(n%6===0)return 6; if(n%7===0)return 7; return 6;
}

// =====================================================================
// STORAGE — localStorage (항상) + JSON 파일 (연결 시)
// =====================================================================
const SK = {best:'bmg.best', recent:'bmg.recent', settings:'bmg.settings'};

function loadFromLocalStorage() {
  try {
    const b=localStorage.getItem(SK.best), r=localStorage.getItem(SK.recent), s=localStorage.getItem(SK.settings);
    if(b) state.bestRecords  =JSON.parse(b);
    if(r) state.recentRecords=JSON.parse(r);
    if(s) Object.assign(state.settings,JSON.parse(s));
  } catch {}
}

function applyFileData(data) {
  if (!data) return;
  if (data.bestRecords)   state.bestRecords   = data.bestRecords;
  if (data.recentRecords) state.recentRecords = data.recentRecords;
  // localStorage도 동기화
  try { localStorage.setItem(SK.best,  JSON.stringify(state.bestRecords)); }   catch {}
  try { localStorage.setItem(SK.recent,JSON.stringify(state.recentRecords)); } catch {}
}

function saveToLocalStorage() {
  try { localStorage.setItem(SK.best,  JSON.stringify(state.bestRecords)); }   catch {}
  try { localStorage.setItem(SK.recent,JSON.stringify(state.recentRecords)); } catch {}
  try { localStorage.setItem(SK.settings,JSON.stringify(state.settings)); }    catch {}
}

async function saveToFile() {
  if (!FileIO.connected) return;
  const ok = await FileIO.save({bestRecords:state.bestRecords, recentRecords:state.recentRecords});
  if (ok) showSaveToast();
}

function showSaveToast() {
  const t = document.getElementById('save-toast');
  t.textContent = `💾 ${FileIO.filename || 'records.json'} 저장됨`;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function addRecentRecord(rec) {
  state.recentRecords.unshift(rec);
  if (state.recentRecords.length > 20) state.recentRecords.length = 20;
  saveToLocalStorage();
  saveToFile(); // fire-and-forget
}

function updateBestRecord(rec) {
  const key = `${rec.cardCount}_${rec.previewSeconds}`;
  const ex  = state.bestRecords[key];
  if (!ex || rec.completionTimeMs < ex.completionTimeMs ||
      (rec.completionTimeMs === ex.completionTimeMs && rec.moves < ex.moves)) {
    state.bestRecords[key] = rec;
    saveToLocalStorage();
    saveToFile();
  }
}

function renderNameInputs() {

    const inp = Object.assign(document.createElement('input'), {

    });

function updateDiffPreview() {
  document.getElementById('diff-preview').textContent =
    diffLabel(state.settings.cardCount, state.settings.previewSeconds);
}

function readUI() {
  const s = state.settings;
  s.playerNames  = Array.from({length:s.playerCount},(_,i)=>{
    const el=document.getElementById(`pname-${i}`); return el?el.value.trim():`플레이어 ${i+1}`;
  });

  s.bgmEnabled    = document.getElementById('bgm-toggle').checked;
  s.sfxEnabled    = document.getElementById('sfx-toggle').checked;
}

function validate() {
  const {playerCount,playerNames} = state.settings;
  for (let i=0;i<playerCount;i++) if(!playerNames[i]) return `플레이어 ${i+1}의 이름을 입력해 주세요.`;
  return null;
}

// =====================================================================
// GAME
// =====================================================================
function buildDeck() {
  const pairs = state.settings.cardCount / 2;
  const pool  = CARD_CATEGORIES[state.settings.category]?.cards || CARD_CATEGORIES.fruit.cards;
  const deck  = [];
  shuffle([...pool]).slice(0,pairs).forEach(c=>{
    deck.push({...c,uid:`${c.id}-A`});
    deck.push({...c,uid:`${c.id}-B`});
  });
  return shuffle(deck);
}

function renderStatus() {
  const {settings,currentPlayerIndex,moves,matchedCardIds} = state;
  document.getElementById('stat-player').textContent     = settings.playerNames[currentPlayerIndex];
  document.getElementById('stat-difficulty').textContent = diffLabel(settings.cardCount,settings.previewSeconds);
  document.getElementById('stat-moves').textContent      = moves;
  document.getElementById('stat-pairs').textContent      = settings.cardCount/2 - matchedCardIds.size/2;
}

function renderCards() {
  const board = document.getElementById('card-board');
  board.innerHTML = '';
  const cols = gridCols(state.settings.cardCount);
  board.style.gridTemplateColumns = `repeat(${cols},1fr)`;
  board.style.maxWidth = `${cols*118+(cols-1)*10+32}px`;

  state.deck.forEach(card => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.uid = card.uid;
    const flipped = state.isPreviewPhase || state.matchedCardIds.has(card.uid) || state.openedCards.includes(card.uid);
    if (flipped) el.classList.add('flipped');
    if (state.matchedCardIds.has(card.uid)) el.classList.add('matched');
    el.innerHTML = `<div class="card-inner">
      <div class="card-face-down"><span class="card-back-icon">🎴</span></div>
      <div class="card-face-up"><span class="card-emoji">${card.emoji}</span><span class="card-name">${card.name}</span></div>
    </div>`;
    el.addEventListener('click', ()=>handleCardClick(card.uid));
    board.appendChild(el);
  });
}

function startGame() {
  readUI();
  const err = validate();
  const errEl = document.getElementById('start-error');
  if (err) { errEl.textContent=err; errEl.classList.remove('hidden'); return; }
  errEl.classList.add('hidden');
  saveToLocalStorage();
  AudioSys.init();
  AudioSys.setBGM(state.settings.bgmEnabled);
  AudioSys.setSFX(state.settings.sfxEnabled);
  state.playerResults = []; state.currentPlayerIndex = 0;
  showScreen('game');
  startRound();
}

function startRound() {
  clearInterval(state.timerInterval);  state.timerInterval = null;
  clearInterval(state.previewTimer);   state.previewTimer  = null;
  clearInterval(state.timeLimitInterval); state.timeLimitInterval = null;
  state.deck=buildDeck(); state.openedCards=[]; state.matchedCardIds=new Set();
  state.moves=0; state.combo=0; state.maxCombo=0;
  state.isBusy=false; state.isPreviewPhase=true; state.startTime=null;
  document.getElementById('stat-timer').textContent='00:00';
  document.getElementById('stat-combo').textContent='0';
  document.getElementById('stat-combo-wrap').style.display='none';
  // 제한시간 UI 초기화
  const hasLimit = state.settings.timeLimit > 0;
  document.getElementById('stat-timelimit-wrap').style.display = hasLimit ? '' : 'none';
  if(hasLimit){
    state.timeLeft = state.settings.timeLimit;
    document.getElementById('stat-timeleft').textContent = fmtTime(state.timeLeft*1000);
    document.getElementById('stat-timeleft').classList.remove('low');
  }
  document.getElementById('timeup-overlay').classList.add('hidden');
  renderStatus(); renderCards();

  const banner=document.getElementById('preview-banner'), cdown=document.getElementById('preview-countdown');
  banner.classList.remove('hidden');
  let rem = state.settings.previewSeconds; cdown.textContent=rem;
  state.previewTimer = setInterval(()=>{
    cdown.textContent=--rem;
    if(rem<=0){clearInterval(state.previewTimer);state.previewTimer=null;endPreview();}
  },1000);
  if(state.settings.bgmEnabled) AudioSys.startBGM();
}

function endPreview() {
  state.isPreviewPhase=false;
  document.getElementById('preview-banner').classList.add('hidden');
  document.querySelectorAll('.card').forEach(el=>{
    if(!state.matchedCardIds.has(el.dataset.uid)) el.classList.remove('flipped');
  });
  state.startTime=Date.now();
  state.timerInterval=setInterval(()=>{
    if(state.startTime) document.getElementById('stat-timer').textContent=fmtTime(Date.now()-state.startTime);
  },200);
  // 제한시간 카운트다운
  if(state.settings.timeLimit > 0) {
    state.timeLimitInterval = setInterval(()=>{
      state.timeLeft--;
      const el = document.getElementById('stat-timeleft');
      el.textContent = fmtTime(Math.max(0,state.timeLeft)*1000);
      if(state.timeLeft <= 10) el.classList.add('low');
      if(state.timeLeft <= 0) {
        clearInterval(state.timeLimitInterval); state.timeLimitInterval=null;
        handleTimeUp();
      }
    },1000);
  }
}

function handleTimeUp() {
  clearInterval(state.timerInterval); state.timerInterval=null;
  AudioSys.stopBGM();
  const matched = state.matchedCardIds.size/2;
  const total   = state.settings.cardCount/2;
  document.getElementById('timeup-msg').textContent =
    `${total}쌍 중 ${matched}쌍 완성! 다음엔 더 빠르게! 💪`;
  document.getElementById('timeup-overlay').classList.remove('hidden');
}

function handleCardClick(uid) {
  if(state.isPreviewPhase||state.isBusy||state.matchedCardIds.has(uid)||
     state.openedCards.includes(uid)||state.openedCards.length>=2) return;
  AudioSys.playFlip();
  document.querySelector(`.card[data-uid="${uid}"]`).classList.add('flipped');
  state.openedCards.push(uid);
  document.getElementById('stat-moves').textContent=++state.moves;
  if(state.openedCards.length===2){state.isBusy=true; setTimeout(checkMatch,650);}
}

function checkMatch() {
  const [u1,u2]=state.openedCards;
  const c1=state.deck.find(c=>c.uid===u1), c2=state.deck.find(c=>c.uid===u2);
  if(c1.id===c2.id){
    AudioSys.playMatch();
    [u1,u2].forEach(uid=>{
      state.matchedCardIds.add(uid);
      document.querySelector(`.card[data-uid="${uid}"]`).classList.add('matched');
    });
    document.getElementById('stat-pairs').textContent=state.settings.cardCount/2-state.matchedCardIds.size/2;
    // 콤보 처리
    state.combo++;
    if(state.combo > state.maxCombo) state.maxCombo = state.combo;
    if(state.combo >= 2) showComboPopup(state.combo);
    document.getElementById('stat-combo').textContent = state.combo;
    document.getElementById('stat-combo-wrap').style.display = '';
    state.openedCards=[]; state.isBusy=false;
    if(state.matchedCardIds.size===state.settings.cardCount) setTimeout(finishRound,350);
  } else {
    [u1,u2].forEach(uid=>document.querySelector(`.card[data-uid="${uid}"]`).classList.remove('flipped'));
    state.combo = 0;
    document.getElementById('stat-combo').textContent = 0;
    state.openedCards=[]; state.isBusy=false;
  }
}

function showComboPopup(n) {
  const el = document.getElementById('combo-popup');
  const msgs = ['','','2콤보! 🔥','3콤보! 🔥🔥','4콤보! ⚡','5콤보! 💥','6콤보! 🌟'];
  el.textContent = msgs[Math.min(n, msgs.length-1)] || `${n}콤보! 🏆`;
  el.classList.remove('hidden','hide');
  el.classList.add('show');
  setTimeout(()=>{ el.classList.remove('show'); el.classList.add('hide'); },900);
  setTimeout(()=>{ el.classList.add('hidden'); el.classList.remove('hide'); },1200);
}

function finishRound() {
  clearInterval(state.timerInterval); state.timerInterval=null;
  clearInterval(state.timeLimitInterval); state.timeLimitInterval=null;
  const ms=Date.now()-state.startTime, {settings,currentPlayerIndex,moves}=state;
  AudioSys.playWin();
  const rec={
    playerName:settings.playerNames[currentPlayerIndex],
    difficultyLabel:diffLabel(settings.cardCount,settings.previewSeconds),
    cardCount:settings.cardCount, previewSeconds:settings.previewSeconds,
    completionTimeMs:ms, moves, maxCombo:state.maxCombo,
    matchedPairs:settings.cardCount/2,
    playedAt:new Date().toISOString(), turnIndex:currentPlayerIndex,
  };
  state.playerResults.push(rec);
  addRecentRecord(rec);
  updateBestRecord(rec);
  if(currentPlayerIndex < settings.playerCount-1) showTransition(rec);
  else { AudioSys.stopBGM(); setTimeout(showRanking,300); }
}

function showTransition(rec) {
  const next=state.settings.playerNames[state.currentPlayerIndex+1];
  document.getElementById('transition-message').innerHTML=`
    <div class="transition-result">
      <div class="tr-name">${rec.playerName}</div>
      <div class="tr-time">⏱ ${fmtSec(rec.completionTimeMs)}</div>
      <div class="tr-moves">이동 횟수 ${rec.moves}회</div>
    </div>
    <div class="transition-next">다음은 <strong>${next}</strong>님 차례입니다!</div>`;
  document.getElementById('player-transition').classList.remove('hidden');
  document.getElementById('btn-next-player').onclick=()=>{
    document.getElementById('player-transition').classList.add('hidden');
    state.currentPlayerIndex++;
    startRound();
  };
}

function showRanking() {
  const sorted=[...state.playerResults].sort((a,b)=>
    a.completionTimeMs!==b.completionTimeMs?a.completionTimeMs-b.completionTimeMs:
    a.moves!==b.moves?a.moves-b.moves:a.turnIndex-b.turnIndex);
  const medals=['🥇','🥈','🥉'];
  const multi=sorted.length>1;
  document.getElementById('result-trophy').textContent = multi?'🏆':'🎉';
  document.getElementById('result-subtitle').textContent =
    multi?`1등: ${sorted[0].playerName}!`:`수고했어요, ${sorted[0].playerName}!`;
  document.getElementById('ranking-table').innerHTML=sorted.map((r,i)=>`
    <div class="rank-row${i===0?' rank-first':''}">
      <div class="rank-pos">${medals[i]||`${i+1}위`}</div>
      <div class="rank-name">${r.playerName}</div>
      <div class="rank-time">${fmtSec(r.completionTimeMs)}</div>
      <div class="rank-moves">${r.moves}회</div>
      <div class="rank-diff">${r.maxCombo>=2?`🔥${r.maxCombo}콤보`:r.difficultyLabel}</div>
    </div>`).join('');
  showScreen('result');
}

function exportJSON() {
  const data={bestRecords:state.bestRecords, recentRecords:state.recentRecords};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:'records.json'});
  a.click(); URL.revokeObjectURL(a.href);
}

function importJSON(file) {
  const reader=new FileReader();
  reader.onload=e=>{
    try {
      const data=JSON.parse(e.target.result);
      applyFileData(data);
      alert('✅ 기록을 불러왔습니다!');
    } catch { alert('❌ 파일을 읽을 수 없습니다.'); }
  };
  reader.readAsText(file);
}

// =====================================================================
function initEvents() {
  // 플레이어 수
  document.querySelectorAll('#player-count-group .choice-btn').forEach(btn=>
    btn.addEventListener('click',()=>{
      const n=+btn.dataset.count; state.settings.playerCount=n;
      while(state.settings.playerNames.length<n)
        state.settings.playerNames.push(`플레이어 ${state.settings.playerNames.length+1}`);
      document.querySelectorAll('#player-count-group .choice-btn')
        .forEach(b=>b.classList.toggle('active',b===btn));
      renderNameInputs();
    }));

  // 공개 시간
  document.querySelectorAll('#preview-time-group .choice-btn').forEach(btn=>
    btn.addEventListener('click',()=>{
      state.settings.previewSeconds=+btn.dataset.sec;
      document.querySelectorAll('#preview-time-group .choice-btn')
        .forEach(b=>b.classList.toggle('active',b===btn));
      updateDiffPreview();
    }));

  // 카드 수
  document.getElementById('card-count-select').addEventListener('change',e=>{
    state.settings.cardCount=+e.target.value; updateDiffPreview();
  });

  // 오디오
  document.getElementById('bgm-toggle').addEventListener('change',e=>state.settings.bgmEnabled=e.target.checked);
  document.getElementById('sfx-toggle').addEventListener('change',e=>state.settings.sfxEnabled=e.target.checked);

  // 파일 연결
  document.getElementById('btn-connect-file').addEventListener('click', async ()=>{
    const ok = await FileIO.connect();
    if (!ok) return;
    // 기존 파일 내용 읽기 시도
    const data = await FileIO.load();
    if (data && (data.bestRecords || data.recentRecords)) {
      if (confirm('파일에 기존 기록이 있습니다. 불러올까요?\n(취소 시 현재 기록을 파일에 덮어씁니다)')) {
        applyFileData(data);
      } else {
        await saveToFile();
      }
    } else {
      await saveToFile(); // 새 파일에 현재 기록 저장
    }
    updateFileStatus();
  });

  // 파일 연결 해제
  document.getElementById('btn-disconnect-file').addEventListener('click', async ()=>{
    await FileIO.disconnect(); updateFileStatus();
  });

  // 폴백 내보내기/가져오기
  document.getElementById('btn-export').addEventListener('click', exportJSON);
  document.getElementById('btn-import').addEventListener('change', e=>{
    if(e.target.files[0]) importJSON(e.target.files[0]);
    e.target.value='';
  });

  // 카테고리
  document.querySelectorAll('#category-group .choice-btn').forEach(btn=>
    btn.addEventListener('click',()=>{
      state.settings.category=btn.dataset.cat;
      document.querySelectorAll('#category-group .choice-btn')
        .forEach(b=>b.classList.toggle('active',b===btn));
    }));

  // 제한 시간
  document.querySelectorAll('#timelimit-group .choice-btn').forEach(btn=>
    btn.addEventListener('click',()=>{
      state.settings.timeLimit=+btn.dataset.limit;
      document.querySelectorAll('#timelimit-group .choice-btn')
        .forEach(b=>b.classList.toggle('active',b===btn));
    }));

  // 시간 초과 버튼
  document.getElementById('btn-timeup-retry').addEventListener('click',()=>{
    document.getElementById('timeup-overlay').classList.add('hidden');
    state.currentPlayerIndex=0; state.playerResults=[];
    startRound();
  });
  document.getElementById('btn-timeup-home').addEventListener('click',()=>{
    document.getElementById('timeup-overlay').classList.add('hidden');
    renderStartScreen();
  });

  // 게임 시작
  document.getElementById('btn-start').addEventListener('click', startGame);

  // 기록 보기
  document.getElementById('btn-records').addEventListener('click', openRecordsModal);
  document.getElementById('btn-close-modal').addEventListener('click',()=>
    document.getElementById('modal-records').classList.add('hidden'));
  document.getElementById('modal-records').addEventListener('click',e=>{
    if(e.target===document.getElementById('modal-records'))
      document.getElementById('modal-records').classList.add('hidden');
  });

  // 탭 전환
  document.querySelectorAll('.tab-btn').forEach(btn=>
    btn.addEventListener('click',()=>{
      const t=btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b===btn));
      ['best','recent'].forEach(k=>document.getElementById(`tab-${k}`).classList.toggle('hidden',k!==t));
    }));

  // 게임 화면
  document.getElementById('btn-restart').addEventListener('click',()=>{
    clearInterval(state.previewTimer); clearInterval(state.timerInterval);
    clearInterval(state.timeLimitInterval);
    AudioSys.stopBGM();
    state.currentPlayerIndex=0; state.playerResults=[];
    startRound();
  });
  document.getElementById('btn-home').addEventListener('click',()=>{
    clearInterval(state.previewTimer); clearInterval(state.timerInterval);
    clearInterval(state.timeLimitInterval);
    AudioSys.stopBGM(); renderStartScreen();
  });

  // 결과 화면
  document.getElementById('btn-play-again').addEventListener('click',()=>{
    state.currentPlayerIndex=0; state.playerResults=[];
    showScreen('game'); AudioSys.init(); startRound();
  });
  document.getElementById('btn-change-settings').addEventListener('click',()=>renderStartScreen());
  document.getElementById('btn-result-home').addEventListener('click',()=>renderStartScreen());
}

// =====================================================================
// INIT
// =====================================================================
async function init() {
  loadFromLocalStorage();
  initFileSection();

  if (FileIO.supported) {
    const restored = await FileIO.restore();
    if (restored) {
      const data = await FileIO.load();
      applyFileData(data);
    }
  }

  initEvents();
  renderStartScreen();
}

init();
</script>
</body>
</html>
