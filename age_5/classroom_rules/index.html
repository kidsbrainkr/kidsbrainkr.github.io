<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta http-equiv="X-Content-Type-Options" content="nosniff"><meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>교실 규칙 선택 게임 🏫</title>
  <style>
    :root { --accent:#FF6B35; --accent-h:#e85a25; --mint:#4ECDC4; --mint-h:#38b8ae; --bg:#FFF8F0; --card-bg:#FFFFFF; --text:#333333; --shadow:0 4px 16px rgba(0,0,0,.12); --shadow-lg:0 8px 32px rgba(0,0,0,.18); --radius-sm:12px; --radius-md:20px; --radius-lg:24px; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height:100%; background:var(--bg); font-family:'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif; overflow:hidden; user-select:none; -webkit-tap-highlight-color:transparent; }

    /* Screen system */
    .screen { display:none; flex-direction:column; align-items:center; justify-content:center; height:100%; width:100%; position:fixed; inset:0; }
    .screen.active { display:flex; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }

    /* Start screen */
    #start-screen { background:linear-gradient(135deg,#FFF8F0,#FFE5D9); gap:20px; padding:24px; }
    #start-screen .title-emoji { font-size:clamp(4rem,14vw,7rem); }
    #start-screen h1 { font-size:clamp(1.6rem,5vw,2.4rem); font-weight:900; color:var(--accent); text-align:center; }
    #start-screen p { font-size:clamp(1rem,3vw,1.3rem); color:#666; text-align:center; max-width:320px; line-height:1.5; }
    .btn-start { padding:18px 52px; border:none; border-radius:50px; font-size:clamp(1.2rem,4vw,1.5rem); font-weight:900; background:var(--accent); color:#fff; cursor:pointer; box-shadow:0 6px 20px rgba(255,107,53,0.4); transition:transform 0.15s; }
    .btn-start:active { transform:scale(0.93); }

    /* Game screen */
    #game-screen { background:var(--bg); padding:16px; gap:10px; justify-content:flex-start; padding-top:20px; }

    /* Progress bar */
    .progress-area { width:100%; max-width:500px; display:flex; align-items:center; gap:8px; }
    .progress-label { font-size:0.9rem; font-weight:700; color:#888; white-space:nowrap; }
    .progress-track { flex:1; height:10px; background:#E0D8D0; border-radius:99px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),#FFB347); border-radius:99px; transition:width 0.5s ease; width:0%; }

    /* Situation area */
    .situation-area { width:100%; max-width:500px; background:var(--card-bg); border-radius:var(--radius-lg); box-shadow:var(--shadow); padding:24px 20px; text-align:center; margin-top:8px; }
    .situation-emoji { font-size:clamp(3rem,10vw,5rem); margin-bottom:12px; display:block; }
    .situation-text { font-size:clamp(1.1rem,3.5vw,1.5rem); font-weight:800; color:var(--text); line-height:1.5; }

    /* Choices */
    .choices-area { width:100%; max-width:500px; display:flex; flex-direction:column; gap:12px; margin-top:12px; flex:1; justify-content:center; }
    .choice-btn { width:100%; padding:18px 20px; border:3px solid #E0D8D0; border-radius:var(--radius-md); background:var(--card-bg); font-size:clamp(1rem,3.2vw,1.3rem); font-weight:700; color:var(--text); cursor:pointer; text-align:center; box-shadow:var(--shadow); transition:transform 0.15s, border-color 0.2s, background 0.2s; }
    .choice-btn:active { transform:scale(0.96); }
    .choice-btn.correct { border-color:#2ECC71; background:#E8F8E8; animation:choicePop 0.5s ease; }
    .choice-btn.wrong { border-color:#E74C3C; background:#FDE8E8; animation:choiceShake 0.4s ease; }
    @keyframes choicePop { 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }
    @keyframes choiceShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

    /* Feedback overlay */
    .feedback-overlay { position:fixed; inset:0; z-index:100; display:none; align-items:center; justify-content:center; }
    .feedback-overlay.active { display:flex; }
    .feedback-overlay .fb-bg { position:absolute; inset:0; background:rgba(0,0,0,0.3); }
    .feedback-overlay .fb-box { position:relative; z-index:1; background:#fff; border-radius:28px; padding:36px 40px; text-align:center; box-shadow:var(--shadow-lg); animation:overlayPop 0.4s cubic-bezier(.17,.67,.36,1.3); }
    @keyframes overlayPop { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
    .fb-emoji { font-size:clamp(3rem,10vw,5rem); }
    .fb-text { font-size:clamp(1.2rem,4vw,1.6rem); font-weight:800; margin-top:12px; }
    .fb-text.correct-text { color:#2ECC71; }
    .fb-text.wrong-text { color:#E74C3C; }

    /* Particles */
    .particle { position:fixed; z-index:200; pointer-events:none; font-size:1.5rem; animation:particleFly 1s ease-out forwards; }
    @keyframes particleFly { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0.3)} }

    /* Result screen */
    #result-screen { background:linear-gradient(135deg,#FFF8F0,#FFE5D9); gap:22px; padding:24px; }
    #result-screen .result-emoji { font-size:clamp(4rem,14vw,7rem); animation:spin 1.2s ease-in-out; }
    @keyframes spin { 0%{transform:rotate(0) scale(0.5)} 60%{transform:rotate(380deg) scale(1.1)} 100%{transform:rotate(360deg) scale(1)} }
    #result-screen h1 { font-size:clamp(1.6rem,5vw,2.4rem); font-weight:900; color:var(--accent); text-align:center; }
    .result-score { font-size:clamp(1.1rem,3.5vw,1.5rem); font-weight:700; color:#555; }
    .stars-row { display:flex; gap:8px; font-size:clamp(2rem,8vw,3.5rem); }
    .star-item { animation:starPop 0.4s ease both; }
    .star-item:nth-child(1){animation-delay:0.2s} .star-item:nth-child(2){animation-delay:0.45s} .star-item:nth-child(3){animation-delay:0.7s}
    @keyframes starPop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
    .btn-restart { padding:18px 52px; border:none; border-radius:50px; font-size:clamp(1.2rem,4vw,1.5rem); font-weight:900; background:var(--accent); color:#fff; cursor:pointer; box-shadow:0 6px 20px rgba(255,107,53,0.4); transition:transform 0.15s; }
    .btn-restart:active { transform:scale(0.93); }
  
    .home-float-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .home-float-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
<a href="../../index.html" class="home-float-btn" title="홈으로">🏠</a>


<!-- Start Screen -->
<div id="start-screen" class="screen active">
  <div class="title-emoji">🏫</div>
  <h1>교실 규칙 선택 게임</h1>
  <p>교실에서 어떻게 행동하면 좋을까요?<br>올바른 행동을 골라봐요!</p>
  <button class="btn-start" id="btn-start">시작하기 🚀</button>
</div>

<!-- Game Screen -->
<div id="game-screen" class="screen">
  <div class="progress-area">
    <span class="progress-label" id="progress-label">1 / 10</span>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <span class="progress-label" id="score-label">⭐ 0</span>
  </div>
  <div class="situation-area">
    <span class="situation-emoji" id="situation-emoji"></span>
    <div class="situation-text" id="situation-text"></div>
  </div>
  <div class="choices-area" id="choices-area"></div>
</div>

<!-- Feedback Overlay -->
<div class="feedback-overlay" id="feedback-overlay">
  <div class="fb-bg"></div>
  <div class="fb-box">
    <div class="fb-emoji" id="fb-emoji"></div>
    <div class="fb-text" id="fb-text"></div>
  </div>
</div>

<!-- Result Screen -->
<div id="result-screen" class="screen">
  <div class="result-emoji">🎉</div>
  <h1>정말 잘했어요!</h1>
  <div class="stars-row" id="stars-row"></div>
  <div class="result-score" id="result-score"></div>
  <button class="btn-restart" id="btn-restart">다시 하기 🔄</button>
</div>

<script>
/* ===== 교실 규칙 선택 게임 ===== */

// ─── Audio System ─────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() { if(!audioCtx) audioCtx = new AudioCtx(); if(audioCtx.state==='suspended') audioCtx.resume(); }
function playTones(freqs, dur=0.15, mode='seq', type='sine') {
  if(!audioCtx) return;
  const now = audioCtx.currentTime;
  freqs.forEach((f,i) => {
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = type; osc.frequency.value = f;
    const start = mode==='seq' ? now + i*dur : now;
    gain.gain.setValueAtTime(0.28, start);
    gain.gain.exponentialRampToValueAtTime(0.001, start + dur*0.95);
    osc.start(start); osc.stop(start + dur);
  });
}
function playCorrect() { ensureAudio(); playTones([523,659,784], 0.13, 'seq', 'sine'); }
function playWrong() { ensureAudio(); playTones([300,220], 0.18, 'seq', 'sawtooth'); }
function playWin() { ensureAudio(); playTones([523,659,784,1047,1319], 0.15, 'seq', 'sine'); }

// ─── Reward System ────────────────────────────────────────
function reportReward(stars) {
  try {
    const data = JSON.parse(localStorage.getItem('kbr.rewards')||'null') || { totalStars:0, totalGames:0, badges:[], history:[], streak:0, lastDate:null };
    data.totalStars += stars; data.totalGames += 1;
    const today = new Date().toISOString().slice(0,10);
    data.history.unshift({ gameId:'classroom_rules', area:'사고력', stars, date:today, timestamp:Date.now() });
    if(data.history.length > 100) data.history = data.history.slice(0,100);
    if(data.lastDate !== today) {
      if(data.lastDate) { const diff = Math.floor((new Date(today)-new Date(data.lastDate))/86400000); data.streak = diff===1 ? data.streak+1 : 1; }
      else { data.streak = 1; }
      data.lastDate = today;
    }
    localStorage.setItem('kbr.rewards', JSON.stringify(data));
  } catch(e) {}
}

// ─── Particles ────────────────────────────────────────────
function spawnParticles(x, y) {
  const emojis = ['⭐','🌟','✨','💛','🎉'];
  for(let i=0; i<8; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = x+'px'; el.style.top = y+'px';
    el.style.setProperty('--px', (Math.random()*160-80)+'px');
    el.style.setProperty('--py', (Math.random()*-120-40)+'px');
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }
}

// ─── Game Data ────────────────────────────────────────────
const SITUATIONS = [
  { emoji:'😢👦', text:'친구가 울고 있어요', correct:'괜찮냐고 물어봐요', wrong:['모른 척해요','같이 울어요'], msg:'친구를 위로해주면 좋아요! 💕' },
  { emoji:'👩‍🏫📖', text:'선생님이 이야기할 때', correct:'조용히 들어요', wrong:['친구와 떠들어요','돌아다녀요'], msg:'선생님 말씀을 잘 들어요! 👂' },
  { emoji:'🧸🎲', text:'장난감을 다 가지고 놀았어요', correct:'제자리에 정리해요', wrong:['그냥 두고 가요','던져요'], msg:'정리하는 습관이 멋져요! 👍' },
  { emoji:'🍽️🥄', text:'급식 시간이에요', correct:'손을 씻어요', wrong:['바로 먹어요','뛰어다녀요'], msg:'깨끗한 손으로 먹어요! 🧼' },
  { emoji:'👧🤝', text:'친구가 놀자고 해요', correct:'"같이 놀자!" 해요', wrong:['"싫어" 하고 돌아서요','무시해요'], msg:'함께 노는 건 즐거워요! 😊' },
  { emoji:'🏫🚶', text:'복도를 지나갈 때', correct:'걸어서 가요', wrong:['뛰어다녀요','소리 질러요'], msg:'복도에서는 걸어 다녀요! 🚶' },
  { emoji:'📦👀', text:'친구의 물건이 떨어졌어요', correct:'주워줘요', wrong:['밟아요','모른 척해요'], msg:'친구를 도와주면 기분이 좋아요! 😄' },
  { emoji:'👫📏', text:'줄을 서야 해요', correct:'차례대로 서요', wrong:['새치기해요','줄 안 서요'], msg:'차례를 지키면 모두 행복해요! 🌈' },
  { emoji:'👩‍🏫👏', text:'선생님이 칭찬해줬어요', correct:'"감사합니다" 해요', wrong:['자랑해요','시무룩해요'], msg:'감사 인사를 잘 했어요! 🙏' },
  { emoji:'😴🛏️', text:'낮잠 시간이에요', correct:'조용히 누워요', wrong:['장난쳐요','큰 소리로 노래해요'], msg:'쉬는 시간은 조용히! 🌙' },
];

const TOTAL_Q = 10;
let currentQ = 0;
let score = 0;
let busy = false;
let shuffled = [];

// ─── Shuffle ──────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// ─── Screen management ───────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─── Start Game ───────────────────────────────────────────
function startGame() {
  ensureAudio();
  currentQ = 0; score = 0;
  shuffled = shuffle(SITUATIONS).slice(0, TOTAL_Q);
  showScreen('game-screen');
  showQuestion();
}

// ─── Show Question ────────────────────────────────────────
function showQuestion() {
  if(currentQ >= TOTAL_Q) { endGame(); return; }
  busy = false;
  const sit = shuffled[currentQ];

  document.getElementById('progress-label').textContent = `${currentQ+1} / ${TOTAL_Q}`;
  document.getElementById('progress-fill').style.width = `${(currentQ/TOTAL_Q)*100}%`;
  document.getElementById('score-label').textContent = `⭐ ${score}`;
  document.getElementById('situation-emoji').textContent = sit.emoji;
  document.getElementById('situation-text').textContent = sit.text;

  // Build choices: 1 correct + 2 wrong, shuffled
  const choices = shuffle([
    { text: sit.correct, isCorrect: true },
    { text: sit.wrong[0], isCorrect: false },
    { text: sit.wrong[1], isCorrect: false },
  ]);

  const area = document.getElementById('choices-area');
  area.innerHTML = '';
  choices.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = ch.text;
    btn.addEventListener('click', () => onChoice(ch.isCorrect, btn));
    area.appendChild(btn);
  });
}

// ─── Handle Choice ────────────────────────────────────────
function onChoice(isCorrect, btnEl) {
  if(busy) return;
  busy = true;
  const sit = shuffled[currentQ];

  if(isCorrect) {
    score += 10;
    playCorrect();
    btnEl.classList.add('correct');

    // Particles from button center
    const rect = btnEl.getBoundingClientRect();
    spawnParticles(rect.left + rect.width/2, rect.top + rect.height/2);

    // Show feedback overlay
    const overlay = document.getElementById('feedback-overlay');
    document.getElementById('fb-emoji').textContent = '⭕';
    const fbText = document.getElementById('fb-text');
    fbText.textContent = sit.msg;
    fbText.className = 'fb-text correct-text';
    overlay.classList.add('active');

    setTimeout(() => {
      overlay.classList.remove('active');
      currentQ++;
      showQuestion();
    }, 1300);
  } else {
    playWrong();
    btnEl.classList.add('wrong');

    const overlay = document.getElementById('feedback-overlay');
    document.getElementById('fb-emoji').textContent = '🤔';
    const fbText = document.getElementById('fb-text');
    fbText.textContent = '다시 생각해봐요!';
    fbText.className = 'fb-text wrong-text';
    overlay.classList.add('active');

    setTimeout(() => {
      overlay.classList.remove('active');
      btnEl.classList.remove('wrong');
      busy = false;
    }, 1000);
  }
}

// ─── End Game ─────────────────────────────────────────────
function endGame() {
  playWin();
  const stars = score >= 90 ? 3 : score >= 60 ? 2 : 1;
  reportReward(stars);

  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('result-score').textContent = `${score} / ${TOTAL_Q * 10} 점`;

  const row = document.getElementById('stars-row');
  row.innerHTML = '';
  for(let i=0; i<3; i++) {
    const s = document.createElement('span');
    s.className = 'star-item';
    s.textContent = i < stars ? '⭐' : '☆';
    row.appendChild(s);
  }

  showScreen('result-screen');
}

// ─── Event Listeners ──────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-restart').addEventListener('click', startGame);
</script>
</body>
</html>
