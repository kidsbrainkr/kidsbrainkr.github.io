<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌈⭐ 정리 순서 보드</title>
  <style>
    :root{
      --bg: linear-gradient(180deg, #E8F5FD 0%, #F3E5F5 50%, #FFF3E0 100%);
      --panel:rgba(255,255,255,.9);
      --panel-strong:rgba(255,255,255,.96);
      --text:#2f3642;
      --muted:#6b7682;
      --peach:#ff9668;
      --mint:#82d2a4;
      --sun:#ffd68f;
      --shadow:0 22px 52px rgba(47,54,66,.12);
      --radius:28px;
      --font:"Segoe UI","Malgun Gothic",sans-serif;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      min-height:100vh;
      font-family:var(--font);
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,150,104,.18), transparent 32%),
        radial-gradient(circle at top right, rgba(255,214,143,.16), transparent 24%),
        radial-gradient(circle at bottom right, rgba(130,210,164,.18), transparent 30%),
        linear-gradient(180deg,#fffaf6 0%, #fff3ec 100%);
    }
    .page{width:min(1120px,calc(100% - 22px));margin:0 auto;padding:18px 0 32px;}
    .toolbar,.panel,.big-step,.step-list-box,.editor,.hero-intro{
      background:var(--panel);
      border:1px solid rgba(255,255,255,.62);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
    }
    .toolbar{
      display:flex;
      justify-content:space-between;
      gap:14px;
      align-items:center;
      padding:16px 20px;
      margin-bottom:16px;
      flex-wrap:wrap;
    }
    .brand{display:flex;gap:14px;align-items:center;}
    .brand-badge{
      width:62px;height:62px;border-radius:20px;display:grid;place-items:center;
      background:linear-gradient(135deg,#fff4d8,#ffe6df,#ecfff2);
      box-shadow:inset 0 0 0 3px rgba(255,255,255,.7), 0 12px 24px rgba(255,150,104,.16);
      font-size:1.8rem;
    }
    .brand h1{margin:0;font-size:1.35rem;}
    .brand p{margin:4px 0 0;color:var(--muted);font-size:.94rem;}
    .toolbar-actions,.controls{display:flex;gap:8px;flex-wrap:wrap;}
    button,textarea{font:inherit;}
    .btn{
      border:0;
      border-radius:999px;
      padding:11px 16px;
      background:#fff;
      cursor:pointer;
      box-shadow:0 10px 18px rgba(47,54,66,.08);
    }
    .btn.primary{background:linear-gradient(135deg,var(--peach),#ffbe81);color:#fff;font-weight:800;}
    .btn.secondary{background:linear-gradient(135deg,var(--mint),#a6e2b6);color:#fff;font-weight:800;}
    .btn.music-on{background:linear-gradient(135deg,#8fa1ff,#b89bff);color:#fff;font-weight:800;}
    .panel{padding:22px;}
    .music-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:center;
      margin-bottom:14px;
    }
    .music-style{
      border:0;
      border-radius:999px;
      padding:11px 15px;
      cursor:pointer;
      color:var(--text);
      background:#fff;
      box-shadow:0 10px 18px rgba(47,54,66,.08);
    }
    .music-style.active{background:linear-gradient(135deg,#8fa1ff,#b89bff);color:#fff;font-weight:800;}
    .hero-intro{
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:center;
      padding:18px 20px;
      margin-bottom:18px;
      background:linear-gradient(135deg,rgba(255,255,255,.95),rgba(255,249,244,.84));
    }
    .hero-intro h2{margin:0 0 8px;font-size:1.28rem;}
    .hero-intro p{margin:0;color:var(--muted);line-height:1.65;}
    .hero-pill{
      flex-shrink:0;
      padding:12px 16px;
      border-radius:999px;
      background:linear-gradient(135deg,#fff1dd,#effcf3);
      color:#9b6337;
      font-weight:800;
    }
    .hero{display:grid;grid-template-columns:1.2fr 1fr;gap:18px;}
    .big-step,.step-list-box,.editor{
      padding:22px;
      background:linear-gradient(180deg,var(--panel-strong),rgba(255,255,255,.82));
    }
    .big-step{
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      min-height:340px;
    }
    .step-number{
      width:92px;height:92px;border-radius:50%;
      display:grid;place-items:center;
      font-size:2.1rem;font-weight:900;
      background:linear-gradient(135deg,#fff0df,#fffaf0);
      color:var(--peach);
      margin-bottom:18px;
      box-shadow:inset 0 0 0 4px rgba(255,255,255,.75), 0 14px 26px rgba(255,150,104,.14);
    }
    .big-title{font-size:clamp(1.65rem,3vw,2.8rem);font-weight:900;line-height:1.24;}
    .big-sub{margin-top:12px;color:var(--muted);line-height:1.65;max-width:28ch;}
    .step-list{display:flex;flex-direction:column;gap:10px;}
    .step-item{
      padding:13px 15px;
      border-radius:18px;
      background:#fff7f2;
      color:var(--muted);
      box-shadow:inset 0 0 0 2px rgba(255,150,104,.06);
    }
    .step-item.active{
      background:linear-gradient(135deg,#fff1e6,#eefbf2);
      color:var(--text);
      font-weight:800;
      box-shadow:inset 0 0 0 2px rgba(255,150,104,.16);
    }
    .step-item.done{
      background:#eef9f1;
      color:#2b8f57;
      font-weight:800;
    }
    .editor{margin-top:18px;}
    .editor h2{margin:0 0 8px;font-size:1.08rem;}
    .editor p{margin:0 0 12px;color:var(--muted);line-height:1.6;}
    .editor textarea{
      width:100%;
      min-height:112px;
      border:2px solid #eee3d8;
      border-radius:20px;
      padding:14px;
      resize:vertical;
      line-height:1.7;
      background:#fff;
    }
    @media (max-width:860px){
      .hero-intro{flex-direction:column;align-items:flex-start;}
      .hero{grid-template-columns:1fr;}
      .big-step{min-height:240px;}
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="toolbar">
      <div class="brand">
        <div class="brand-badge">🌈⭐</div>
        <div>
          <h1>정리 순서 보드</h1>
          <p>무엇부터 정리할지 차례대로 보여주는 생활 루틴 화면</p>
        </div>
      </div>
      <div class="toolbar-actions">
        <button class="btn music-on" id="musicBtn" type="button">BGM 끄기</button>
        <button class="btn" id="homeBtn" type="button">← 루틴 허브</button>
        <button class="btn secondary" id="fullscreenBtn" type="button">전체 화면</button>
      </div>
    </section>

    <section class="panel">
      <section class="hero-intro">
        <div>
          <h2>정리할 순서를 차근차근 따라가요</h2>
          <p>한 번에 하나씩 보여주면 아이들이 스스로 정리하는 흐름을 이해하기 쉽습니다.</p>
        </div>
        <div class="hero-pill">정리 시간용 추천</div>
      </section>

      <div class="music-row">
        <button class="music-style active" data-style="dreamy" type="button">포근한 별빛</button>
        <button class="music-style" data-style="rainbow" type="button">밝은 무지개</button>
        <button class="music-style" data-style="calm" type="button">차분한 교실</button>
      </div>

      <div class="controls" style="justify-content:center;margin-bottom:18px;">
        <button class="btn primary" id="prevBtn" type="button">이전</button>
        <button class="btn primary" id="nextBtn" type="button">다음</button>
        <button class="btn" id="resetBtn" type="button">처음부터</button>
      </div>

      <div class="hero">
        <article class="big-step">
          <div class="step-number" id="stepNumber">1</div>
          <div class="big-title" id="stepTitle">장난감을 상자 안에 넣어요</div>
          <div class="big-sub">천천히 하나씩 정리하면 금방 끝나요.</div>
        </article>
        <article class="step-list-box">
          <div class="step-list" id="stepList"></div>
        </article>
      </div>

      <section class="editor">
        <h2>정리 순서 직접 입력</h2>
        <p>한 줄에 하나씩 적으면 반 상황에 맞는 정리 순서를 바로 만들 수 있습니다.</p>
        <textarea id="stepInput">장난감을 상자 안에 넣어요
책을 책장에 꽂아요
의자를 바르게 넣어요
책상 위를 닦아요
자리에 앉아요</textarea>
        <div class="controls" style="justify-content:flex-start;margin-top:12px;margin-bottom:0;">
          <button class="btn" id="applyBtn" type="button">직접 적용</button>
        </div>
      </section>
    </section>
  </main>

  <audio id="bgmAudio" loop preload="auto"></audio>

  <script>
    const stepList = document.getElementById("stepList");
    const stepNumber = document.getElementById("stepNumber");
    const stepTitle = document.getElementById("stepTitle");
    const stepInput = document.getElementById("stepInput");
    const musicBtn = document.getElementById("musicBtn");
    const musicStyleButtons = [...document.querySelectorAll(".music-style")];
    const bgmAudio = document.getElementById("bgmAudio");

    let steps = [
      "장난감을 상자 안에 넣어요",
      "책을 책장에 꽂아요",
      "의자를 바르게 넣어요",
      "책상 위를 닦아요",
      "자리에 앉아요"
    ];
    let currentIndex = 0;
    let bgmEnabled = true;
    let selectedMusicStyle = "dreamy";

    const bgmSources = {
      dreamy: "../cleanup_timer/bgm-dreamy.mp3",
      rainbow: "../cleanup_timer/bgm-rainbow.mp3",
      calm: "../cleanup_timer/bgm-calm.mp3"
    };

    function loadSelectedBgm() {
      bgmAudio.pause();
      bgmAudio.currentTime = 0;
      bgmAudio.src = bgmSources[selectedMusicStyle];
      bgmAudio.load();
    }

    function syncMusicButton() {
      musicBtn.textContent = bgmEnabled ? "BGM 끄기" : "BGM 켜기";
      musicBtn.classList.toggle("music-on", bgmEnabled);
    }

    function startBgm() {
      if (!bgmEnabled) return;
      bgmAudio.currentTime = 0;
      bgmAudio.play().catch(() => {});
    }

    function stopBgm() {
      bgmAudio.pause();
      bgmAudio.currentTime = 0;
    }

    function render() {
      stepNumber.textContent = String(currentIndex + 1);
      stepTitle.textContent = steps[currentIndex] || "모두 끝났어요";
      stepList.innerHTML = "";
      steps.forEach((step, index) => {
        const done = index < currentIndex;
        const item = document.createElement("div");
        item.className = `step-item${index === currentIndex ? " active" : ""}${done ? " done" : ""}`;
        item.textContent = `${index + 1}. ${step}`;
        stepList.append(item);
      });
    }

    document.getElementById("prevBtn").addEventListener("click", () => {
      currentIndex = Math.max(0, currentIndex - 1);
      render();
      startBgm();
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      currentIndex = Math.min(steps.length - 1, currentIndex + 1);
      render();
      startBgm();
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      currentIndex = 0;
      render();
      startBgm();
    });

    document.getElementById("applyBtn").addEventListener("click", () => {
      const parsed = stepInput.value.split("\n").map((line) => line.trim()).filter(Boolean);
      if (parsed.length > 0) {
        steps = parsed;
        currentIndex = 0;
        render();
        startBgm();
      }
    });

    musicStyleButtons.forEach((button) => {
      button.addEventListener("click", () => {
        selectedMusicStyle = button.dataset.style;
        musicStyleButtons.forEach((item) => item.classList.toggle("active", item === button));
        loadSelectedBgm();
        if (bgmEnabled) {
          startBgm();
        }
      });
    });

    musicBtn.addEventListener("click", () => {
      bgmEnabled = !bgmEnabled;
      syncMusicButton();
      if (bgmEnabled) {
        startBgm();
      } else {
        stopBgm();
      }
    });

    document.getElementById("fullscreenBtn").addEventListener("click", async () => {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
      } else {
        await document.exitFullscreen();
      }
    });

    document.getElementById("homeBtn").addEventListener("click", () => {
      window.location.href = "../";
    });

    loadSelectedBgm();
    syncMusicButton();
    render();
  
/* ===== 이모지→이미지 자동 교체 (game-common) ===== */
const _EMOJI_IMG = {
  '🍎':'fruits/apple.png','🍌':'fruits/banana.png','🍇':'fruits/grape.png',
  '🍊':'fruits/orange.png','🍓':'fruits/strawberry.png','🍑':'fruits/peach.png',
  '🍒':'fruits/cherry.png','🍋':'fruits/lemon.png','🍉':'fruits/watermelon.png',
  '🐶':'animals/dog.png','🐱':'animals/cat.png','🐰':'animals/rabbit.png',
  '🐻':'animals/bear.png','🐧':'animals/penguin.png','🐸':'animals/frog.png',
  '🐨':'animals/koala.png','🦊':'animals/fox.png','🦉':'animals/owl.png',
  '🐯':'animals/tiger.png','🦁':'animals/lion.png','🐮':'animals/cow.png',
  '🐷':'animals/pig.png','🐔':'animals/chicken.png','🐥':'animals/chick.png',
  '🚗':'vehicles/car.png','🚌':'vehicles/bus.png','✈️':'vehicles/airplane.png',
  '🚀':'vehicles/rocket.png','🚲':'vehicles/bicycle.png','🚢':'vehicles/ship.png',
  '🚁':'vehicles/helicopter.png','🚂':'vehicles/train.png',
  '⭕':'shapes/circle.png','🔺':'shapes/triangle.png','⬜':'shapes/square.png',
  '⭐':'shapes/star.png','🔷':'shapes/diamond.png',
  '🌸':'nature/flower.png','🌳':'nature/tree.png',
};
const _ASSET_BASE = (function() {
  const p = window.location.pathname;
  // routine_tools/index.html (허브)만 깊이 1, 나머지 전부 깊이 2
  if (p.endsWith('/routine_tools/index.html') || p.endsWith('/routine_tools/'))
    return '../assets/game_items/';
  return '../../assets/game_items/';
})();

function _getItemHtml(emoji, sz) {
  sz = sz || 64;
  const f = _EMOJI_IMG[emoji];
  if (!f) return emoji;
  const src = _ASSET_BASE + f;
  return '<img src="' + src + '" alt="' + emoji + '" style="width:' + sz + 'px;height:' + sz + 'px;object-fit:contain;" onerror="this.outerHTML=\'' + emoji + '\'">';
}

function _getItemSrc(emoji) {
  const f = _EMOJI_IMG[emoji];
  return f ? _ASSET_BASE + f : null;
}

// 선택된 캐릭터 마스코트 표시
(function() {
  const ch = localStorage.getItem('selectedCharacter') || 'fairy';
  const charBase = _ASSET_BASE.replace('game_items/', 'characters/');
  const m = document.createElement('div');
  m.style.cssText = 'position:fixed;bottom:12px;right:12px;width:56px;height:56px;z-index:9999;cursor:pointer;animation:_mFloat 3s ease-in-out infinite;';
  m.innerHTML = '<img src="' + charBase + ch + '_profile.png" style="width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.15));">';
  m.title = {fairy:'별이',robot:'볼트',dino:'꾸미'}[ch] + '와 함께 하는 중!';
  m.onclick = function() { window.location.href = m.closest('html').querySelector('a[href*="index"]')?.href || '../../index.html'; };
  const style = document.createElement('style');
  style.textContent = '@keyframes _mFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}';
  document.head.appendChild(style);
  document.body.appendChild(m);
})();

</script>
</body>
</html>
