<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쑥쑥 놀이터 — 유아 두뇌발달 게임</title>
<meta name="description" content="유아 두뇌발달을 돕는 놀이 게임 모음. 기억력, 관찰력, 사고력, 청각, 창의력을 키워요.">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito','Malgun Gothic','Apple SD Gothic Neo',sans-serif;}
body{background:radial-gradient(ellipse at 50% 40%,#1a0533 0%,#0a0118 60%,#000 100%);}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}

#world{position:fixed;inset:0;z-index:1;cursor:grab;overflow:hidden;user-select:none;}
#world.dragging{cursor:grabbing;}
#world.edit-mode{cursor:default;}
#stage{position:absolute;width:3600px;height:3000px;top:50%;left:50%;transform:translate(-50%,-50%);}
#lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;}

/* 태양 */
.sun{position:absolute;width:160px;height:160px;left:1800px;top:1500px;transform:translate(-50%,-50%);z-index:10;}
.sun-core{
  width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#FFE566,#FF9F0A,#FF5500);
  box-shadow:0 0 80px 28px rgba(255,180,0,0.5),0 0 160px 60px rgba(255,120,0,0.25);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  animation:sunPulse 3s ease-in-out infinite;
}
.sun-core img{width:120px;height:120px;object-fit:contain;}
.sun-core .sun-emoji{font-size:3.8rem;}
.sun-label{position:absolute;bottom:-36px;left:50%;transform:translateX(-50%);
  font-size:0.88rem;font-weight:900;color:rgba(255,220,100,0.9);white-space:nowrap;
  text-shadow:0 0 12px rgba(255,180,0,0.5);}
@keyframes sunPulse{
  0%,100%{box-shadow:0 0 80px 28px rgba(255,180,0,0.5),0 0 160px 60px rgba(255,120,0,0.25);}
  50%{box-shadow:0 0 100px 40px rgba(255,180,0,0.7),0 0 200px 80px rgba(255,120,0,0.35);}
}

/* 궤도 링 */
.orbit-ring{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,0.05);
  transform:translate(-50%,-50%);left:1800px;top:1500px;pointer-events:none;}

/* 행성 */
.planet{position:absolute;transform:translate(-50%,-50%);z-index:5;cursor:pointer;}
.planet.spare{opacity:0.35;filter:grayscale(0.4);}
.planet.spare:hover .planet-body{transform:scale(1.05);}
.planet.spare .planet-label{color:rgba(255,255,255,0.45);font-size:0.7rem;}
.planet:hover:not(.dragging-item) .planet-body{transform:scale(1.1);}
.planet.active .planet-body{box-shadow:0 0 55px 22px var(--glow)!important;transform:scale(1.08);}
.planet.edit-handle{cursor:move;}
.planet.edit-handle .planet-body{
  border-color:rgba(255,255,100,0.5)!important;
  outline:2px dashed rgba(255,255,100,0.35);outline-offset:4px;}
.planet-body{
  width:100px;height:100px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:3px solid rgba(255,255,255,0.18);overflow:hidden;
  animation:planetFloat var(--dur) ease-in-out var(--delay) infinite;
  transition:transform .3s,box-shadow .3s,border-color .3s;
}
.planet-body img{width:70px;height:70px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.4));}
.planet-body .fallback{font-size:2.2rem;}
.planet-label{text-align:center;font-size:0.8rem;font-weight:900;color:rgba(255,255,255,0.88);
  margin-top:9px;text-shadow:0 2px 8px rgba(0,0,0,0.6);}
.planet-count{text-align:center;font-size:0.63rem;color:rgba(255,255,255,0.4);font-weight:700;margin-top:2px;}
@keyframes planetFloat{
  0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}
}
.planet.active .planet-body,.planet.edit-handle .planet-body{animation:none;}

/* 게임 위성 */
.game-dot{
  position:absolute;transform:translate(-50%,-50%) scale(0.6);
  z-index:6;cursor:pointer;opacity:0;pointer-events:none;
  transition:opacity .35s,transform .35s;
}
.game-dot.visible{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1);}
.game-dot.edit-handle{cursor:move;}
.game-dot.edit-handle .game-dot-body{
  border:2px dashed rgba(255,255,100,0.6)!important;background:rgba(255,255,100,0.08)!important;}
.game-dot-body{
  width:62px;height:62px;border-radius:18px;
  background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.18);
  backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;
  transition:all .2s;box-shadow:0 4px 24px rgba(0,0,0,0.35);overflow:hidden;
}
.game-dot-body img{width:48px;height:48px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.4));}
.game-dot-body .fallback{font-size:1.9rem;}
.game-dot:not(.edit-handle):hover .game-dot-body{
  background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.5);transform:scale(1.12);}
.game-dot-name{position:absolute;bottom:-27px;left:50%;transform:translateX(-50%);
  font-size:0.6rem;font-weight:800;color:rgba(255,255,255,0.78);white-space:nowrap;
  background:rgba(0,0,0,0.5);padding:2px 7px;border-radius:7px;max-width:90px;
  overflow:hidden;text-overflow:ellipsis;}

/* 패널 */
#panel{
  position:fixed;bottom:28px;right:28px;z-index:100;width:315px;
  background:rgba(12,6,28,0.97);backdrop-filter:blur(28px);
  border:1px solid rgba(255,255,255,0.1);border-radius:22px;overflow:hidden;
  transform:translateY(28px);opacity:0;pointer-events:none;
  transition:all .3s cubic-bezier(.4,0,.2,1);
}
#panel.open{transform:translateY(0);opacity:1;pointer-events:all;}
.panel-thumb{width:100%;height:150px;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;}
.panel-thumb-bg{position:absolute;inset:0;opacity:0.3;filter:blur(24px);
  background-size:cover;background-position:center;}
.panel-thumb img{width:120px;height:120px;object-fit:contain;position:relative;z-index:1;
  filter:drop-shadow(0 4px 14px rgba(0,0,0,0.55));}
.panel-thumb .f-icon{font-size:4.5rem;position:relative;z-index:1;}
.panel-body{padding:14px 20px 20px;}
.panel-badge{display:inline-flex;align-items:center;gap:5px;font-size:0.68rem;font-weight:900;
  padding:3px 11px;border-radius:20px;background:rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.6);margin-bottom:8px;}
.panel-title{font-size:1.15rem;font-weight:900;color:#fff;margin-bottom:5px;}
.panel-desc{font-size:0.79rem;color:rgba(255,255,255,0.52);line-height:1.65;margin-bottom:14px;}
.panel-tip{font-size:0.72rem;color:rgba(255,255,255,0.35);line-height:1.5;margin-bottom:16px;
  border-left:2px solid rgba(255,255,255,0.15);padding-left:10px;}
.panel-play{
  display:block;text-align:center;background:linear-gradient(135deg,#A855F7,#EC4899);
  color:#fff;border-radius:12px;padding:12px;font-size:0.92rem;font-weight:900;
  cursor:pointer;text-decoration:none;
  box-shadow:0 4px 20px rgba(168,85,247,0.4);transition:transform .15s,box-shadow .15s;
}
.panel-play:hover{transform:scale(1.02);box-shadow:0 6px 28px rgba(168,85,247,0.55);}
.panel-close{
  position:absolute;top:12px;right:12px;background:rgba(255,255,255,0.1);border:none;
  color:rgba(255,255,255,0.5);width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1rem;font-family:sans-serif;z-index:10;transition:background .15s;
}
.panel-close:hover{background:rgba(255,255,255,0.2);}

/* UI */
#ui{position:fixed;inset:0;z-index:50;pointer-events:none;}
.ui-top{
  position:absolute;top:0;left:0;right:0;padding:20px 28px;
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);
  pointer-events:all;
}
.logo{font-size:1.3rem;font-weight:900;
  background:linear-gradient(135deg,#C084FC,#F472B6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ui-right{margin-left:auto;display:flex;gap:8px;}
.ui-btn{
  background:rgba(255,255,255,0.08);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.14);color:#fff;
  border-radius:10px;padding:8px 16px;font-size:0.8rem;font-weight:900;
  cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;white-space:nowrap;
}
.ui-btn:hover{background:rgba(255,255,255,0.18);}
.ui-btn.gold{background:rgba(251,191,36,0.15);border-color:rgba(251,191,36,0.35);color:#FCD34D;}
.ui-btn.edit-on{background:rgba(255,255,100,0.18);border-color:rgba(255,255,100,0.5);color:#FFF176;}

#edit-banner{
  position:absolute;top:72px;left:50%;transform:translateX(-50%);
  background:rgba(20,18,5,0.88);border:1px solid rgba(255,255,100,0.4);
  border-radius:12px;padding:7px 20px;font-size:0.75rem;font-weight:900;
  color:rgba(255,255,100,0.9);pointer-events:none;white-space:nowrap;
  opacity:0;transition:opacity .3s;display:flex;align-items:center;gap:10px;
}
#edit-banner.on{opacity:1;}
#edit-banner button{
  background:rgba(255,255,100,0.15);border:1px solid rgba(255,255,100,0.4);
  color:rgba(255,255,100,0.9);border-radius:7px;padding:3px 10px;
  font-size:0.7rem;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;
  pointer-events:all;transition:background .15s;
}
#edit-banner button:hover{background:rgba(255,255,100,0.3);}

#cat-bar{
  position:absolute;bottom:0;left:0;right:0;padding:12px 20px;
  display:flex;gap:6px;justify-content:center;
  background:linear-gradient(to top,rgba(0,0,0,0.68),transparent);
  pointer-events:all;flex-wrap:wrap;
}
.cat-chip{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;padding:5px 12px;font-size:0.7rem;font-weight:900;
  color:rgba(255,255,255,0.58);cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:5px;
}
.cat-chip img{width:16px;height:16px;object-fit:contain;border-radius:50%;}
.cat-chip:hover,.cat-chip.active{
  background:rgba(255,255,255,0.16);color:#fff;border-color:rgba(255,255,255,0.35);}

.hint{position:absolute;bottom:62px;left:50%;transform:translateX(-50%);
  font-size:0.7rem;color:rgba(255,255,255,0.25);font-weight:700;
  animation:hintFade 6s ease-in-out 2s forwards;pointer-events:none;white-space:nowrap;}
@keyframes hintFade{0%{opacity:1;}90%{opacity:.15;}100%{opacity:0;}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="world">
  <div id="stage">
    <svg id="lines" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>
<div id="ui">
  <div class="ui-top">
    <div class="logo">🌱 쑥쑥 놀이터</div>
    <div class="ui-right">
      <button class="ui-btn" onclick="resetView()">🏠 홈</button>
      <button class="ui-btn" id="editBtn" onclick="toggleEdit()">✏️ 편집</button>
      <button class="ui-btn gold" onclick="toggleTeacher()">👩‍🏫 선생님</button>
    </div>
  </div>
  <div id="edit-banner">
    <span>행성과 게임을 드래그해서 원하는 위치로 이동해요</span>
    <button onclick="resetPositions()">↺ 초기화</button>
  </div>
  <div id="cat-bar"></div>
  <div class="hint">🖱 드래그 탐험 · 스크롤 확대/축소 · 행성 클릭 → 게임 펼치기</div>
</div>
<div id="panel">
  <button class="panel-close" onclick="closePanel()">✕</button>
  <div class="panel-thumb">
    <div class="panel-thumb-bg" id="pBg"></div>
    <img id="pImg" src="" alt="" style="display:none;"
      onerror="this.style.display='none';document.getElementById('pFi').style.display='block'">
    <div class="f-icon" id="pFi" style="display:none;"></div>
  </div>
  <div class="panel-body">
    <div class="panel-badge" id="pBadge"></div>
    <div class="panel-title" id="pTitle"></div>
    <div class="panel-desc" id="pDesc"></div>
    <div class="panel-tip" id="pTip" style="display:none;"></div>
    <a class="panel-play" id="pLink" href="#">▶ 게임 시작!</a>
  </div>
</div>

<script>
// ── 별 ──
(()=>{
  const c=document.getElementById('stars'),cx=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  for(let i=0;i<260;i++){
    cx.beginPath();
    cx.arc(Math.random()*c.width,Math.random()*c.height,Math.random()*1.8,0,Math.PI*2);
    cx.fillStyle=`rgba(255,255,255,${0.1+Math.random()*0.9})`;cx.fill();
  }
})();

const THUMB='assets/thumbs/';
const HAS=new Set([
  'color_basket','color_finder','easy_matching','hidden_picture','home_matching',
  'opposite_game','pattern_complete','position_memory','rhythm_game','sequence_memory',
  'shadow_matching','sound_match','spot_difference','seat_memory','maze_treasure',
  'vehicle_sound','initial_match','character_dress','flower_garden','car_race',
  'animal_food','classroom_search','hidden_object','shape_matching','size_compare',
  'planet_memory','planet_think','planet_sound','planet_create'
]);
const tUrl=id=>HAS.has(id)?THUMB+id+'_nb.png':null;

function imgEl(id,fallback,w,h){
  const u=tUrl(id);
  if(!u) return `<span class="fallback">${fallback}</span>`;
  return `<img src="${u}" alt="" width="${w}" height="${h}"
    onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<span class=\\'fallback\\'>${fallback}</span>')">`;
}

// ── 게임 데이터 (행성별 분류) ──
const CX=1800, CY=1500;

const PLANETS=[
  {id:'memory', label:'기억력', icon:'💭', pImg:'planet_memory',
   color:'#7C3AED', glow:'rgba(124,58,237,0.55)', angle:0, dist:380, prefDist:300, dur:'4s', delay:'0s',
   games:[
    {id:'easy_matching',     icon:'🃏', name:'쉬운 짝맞추기',     age:'3세+',  desc:'카드를 뒤집어 같은 그림 두 장을 찾아요!',                    tip:'처음에는 카드를 모두 보여준 뒤 뒤집어서 시작하면 쉬워요.',      path:'age_3/easy_matching/index.html'},
    {id:'position_memory',   icon:'📍', name:'위치 기억',          age:'4세+',  desc:'물건이 어디 있었는지 기억해서 맞춰요.',                       tip:'손가락으로 위치를 짚어보게 하며 기억을 도와주세요.',             path:'age_4/position_memory/index.html'},
    {id:'sequence_memory',   icon:'🔢', name:'순서 기억',          age:'4세+',  desc:'순서대로 나온 그림을 같은 순서로 눌러요.',                    tip:'리듬감 있게 순서를 외우는 말놀이로 접근해 보세요.',              path:'age_4/sequence_memory/index.html'},
    {id:'rhythm_game',       icon:'🥁', name:'리듬 따라하기',      age:'전연령', desc:'빛나는 버튼을 같은 순서로 눌러요. 기억력+리듬!',             tip:'박수를 치며 리듬을 먼저 익힌 뒤 게임을 시작하면 더 즐거워요.', path:'mixed/rhythm_game/index.html'},
    {id:'seat_memory',       icon:'🪑', name:'자리 기억',          age:'5세+',  desc:'친구나 캐릭터가 어디 앉았는지 기억해요.',                     tip:'교실 안 실제 친구들의 자리를 떠올리며 이야기 나눠보세요.',      path:'age_5/seat_memory/index.html'},
    {id:'image_matching',    icon:'🌈', name:'두뇌 쑥쑥 짝맞추기', age:'5세+',  desc:'고급 이미지·친구 얼굴 이름 매칭. 멀티플레이 지원!',          tip:'학기 초 친구들의 이름을 익히는 활동으로 추천합니다.',           path:'age_5/image_matching/index.html'},
    {id:'difficulty_matching',icon:'🎯', name:'난이도 선택 짝맞추기',age:'전연령',desc:'카드 수와 공개 시간을 조정해 어떤 연령에도 맞춰요.',         tip:'아이들의 수준에 맞춰 카드 개수를 조금씩 늘려가 보세요.',        path:'mixed/difficulty_matching/index.html'},
    {id:'sequence_stages',   icon:'🎵', name:'순서 기억 (단계)',   age:'전연령', desc:'빛나는 순서를 기억해서 따라 눌러요! 난이도 선택 가능.',       tip:'쉬운 단계부터 시작해서 점점 도전해 보세요.',                    path:'mixed/sequence_stages/index.html'},
    {id:'friend_custom',     icon:'👫', name:'친구 맞춤 모드',     age:'전연령', desc:'쉬움: 얼굴-얼굴 / 어려움: 얼굴-이름. 연령에 맞게 선택!',    tip:'우리 반 친구들의 사진을 활용해 친밀감을 높여보세요.',           path:'mixed/friend_custom/index.html'},
  ]},
  {id:'observe', label:'관찰력', icon:'👁️', pImg:'planet_observe',
   color:'#0891B2', glow:'rgba(8,145,178,0.55)', angle:60, dist:380, prefDist:360, dur:'5s', delay:'-1s',
   games:[
    {id:'color_finder',    icon:'🎨', name:'색깔 찾기',      age:'2세+',  desc:'보여주는 색과 같은 색을 찾아요. 색 인식의 첫 걸음!',            tip:'아이들이 좋아하는 색깔부터 시작해 보세요.',              path:'age_2/color_finder/index.html'},
    {id:'same_picture',    icon:'🖼️', name:'같은 그림 고르기',age:'2세+',  desc:'위에 보이는 그림과 똑같은 그림을 찾아요.',                      tip:'그림의 이름을 함께 말하며 진행하면 언어 발달에도 좋아요.', path:'age_2/same_picture/index.html'},
    {id:'size_compare',    icon:'📏', name:'큰 것 작은 것',   age:'2세+',  desc:'큰 것과 작은 것을 비교해서 골라요.',                           tip:'\"어떤 게 더 클까?\" 질문을 함께 하며 비교 개념을 익혀요.', path:'age_2/size_compare/index.html'},
    {id:'shadow_matching', icon:'🌑', name:'그림자 맞추기',   age:'3세+',  desc:'물건과 그림자를 연결해요. 형태 인식 훈련!',                     tip:'실제 물건을 전등에 비춰 그림자를 만드는 활동과 연계해 보세요.', path:'age_3/shadow_matching/index.html'},

const LS='orbit_v5';

// ── Force-directed 초기 배치 ──
// localStorage에 저장된 위치가 없을 때 행성들이 겹치지 않게 자동 배치
function computeForceLayout(){
  const nodes=PLANETS.map(p=>{
    const rad=p.angle*Math.PI/180;
    return{id:p.id, x:Math.cos(rad)*p.prefDist, y:Math.sin(rad)*p.prefDist, pd:p.prefDist};
  });
  const MIN=240; // 행성 간 최소 거리
  for(let k=0;k<600;k++){
    const f=nodes.map(()=>({x:0,y:0}));
    // 행성 간 반발력
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[j].x-nodes[i].x, dy=nodes[j].y-nodes[i].y;
        const d=Math.sqrt(dx*dx+dy*dy)||0.01;
        if(d<MIN){
          const s=(MIN-d)/d*1.5;
          f[i].x-=dx*s; f[i].y-=dy*s;
          f[j].x+=dx*s; f[j].y+=dy*s;
        }
      }
    }
    // 선호 궤도 거리로 당기는 힘 (소프트 스프링)
    nodes.forEach((n,i)=>{
      const d=Math.sqrt(n.x*n.x+n.y*n.y)||0.01;
      const diff=(d-n.pd)*0.06;
      f[i].x-=n.x/d*diff; f[i].y-=n.y/d*diff;
    });
    // 적용 (감쇠)
    nodes.forEach((n,i)=>{n.x+=f[i].x*0.25; n.y+=f[i].y*0.25;});
  }
  const result={};
  nodes.forEach(n=>{result['planet_'+n.id]={x:CX+n.x, y:CY+n.y};});
  return result;
}

// 저장된 행성 위치가 하나도 없으면 force layout으로 초기값 계산
const hasSavedPlanets=PLANETS.some(p=>savedPos['planet_'+p.id]);
const forcePos=hasSavedPlanets?{}:computeForceLayout();

function getPos(key,dx,dy){
  if(savedPos[key])return{x:savedPos[key].x,y:savedPos[key].y};
  if(forcePos[key])return{x:forcePos[key].x,y:forcePos[key].y};
  return{x:dx,y:dy};
}
function setPos(key,x,y){savedPos[key]={x,y};savePos(savedPos);}

function getPosFromEl(el){return{x:parseFloat(el.style.left),y:parseFloat(el.style.top)};}
function redrawLines(){
  svgEl.innerHTML='';
  const ns='http://www.w3.org/2000/svg';
  function line(x1,y1,x2,y2,stroke,dash){
    const l=document.createElementNS(ns,'line');
    l.setAttribute('x1',x1);l.setAttribute('y1',y1);
    l.setAttribute('x2',x2);l.setAttribute('y2',y2);
    l.setAttribute('stroke',stroke);l.setAttribute('stroke-width','1.5');
    if(dash)l.setAttribute('stroke-dasharray',dash);
    svgEl.appendChild(l);
  }
  PLANETS.forEach(p=>{
    const pe=planetData[p.id];if(!pe)return;
    const{x:px,y:py}=getPosFromEl(pe.el);
    line(CX,CY,px,py,'rgba(255,255,255,0.09)',null);

      allGameEls.filter(g=>g.planetId===p.id).forEach(g=>{
        const{x:gx,y:gy}=getPosFromEl(g.el);
        line(px,py,gx,gy,p.glow.replace('0.55','0.45'),'7 4');
      });
    }
  });
}

// ── 드래그 헬퍼 ──
function makeDraggable(triggerEl,el,onEnd,canDrag){
  let ox,oy,sl,st,moved=false;
  triggerEl.addEventListener('mousedown',ev=>{
    if(!canDrag())return;
    ev.stopPropagation();moved=false;
    ox=ev.clientX;oy=ev.clientY;
    sl=parseFloat(el.style.left);st=parseFloat(el.style.top);
    el.classList.add('dragging-item');
    const mm=me=>{
      const dx=(me.clientX-ox)/scale,dy=(me.clientY-oy)/scale;
      if(Math.abs(dx)>3||Math.abs(dy)>3)moved=true;
      el.style.left=(sl+dx)+'px';el.style.top=(st+dy)+'px';
      redrawLines();
    };
    const mu=()=>{
      window.removeEventListener('mousemove',mm);
      window.removeEventListener('mouseup',mu);
      el.classList.remove('dragging-item');
      if(moved&&onEnd)onEnd(parseFloat(el.style.left),parseFloat(el.style.top));
    };
    window.addEventListener('mousemove',mm);
    window.addEventListener('mouseup',mu);
  });
  return ()=>moved;
}

// ── 위성 기본 위치 계산 (행성 중심 기준 방사형 배치) ──
// planetX/Y: 실제 행성 위치, idx/total: 몇 번째 / 전체 수
function calcSatPos(planetX, planetY, idx, total){
  // 행성에서 태양 방향의 반대쪽을 기준으로 퍼뜨림
  const toSunAngle = Math.atan2(CY - planetY, CX - planetX);
  const awayAngle  = toSunAngle + Math.PI; // 태양 반대 방향
  const spread     = total <= 4 ? Math.PI * 0.9
                   : total <= 7 ? Math.PI * 1.1
                   : total <= 10? Math.PI * 1.3
                   :              Math.PI * 1.5;
  const step = total > 1 ? spread / (total - 1) : 0;
  const a    = awayAngle - spread/2 + step*idx;
  const r    = total <= 5 ? 155 : total <= 9 ? 170 : 185;
  const jitter = (idx % 2 === 0 ? 0 : 22); // 지그재그
  return{
    x: planetX + Math.cos(a) * (r + jitter),
    y: planetY + Math.sin(a) * (r + jitter)
  };
}

// ── 행성 생성 ──
PLANETS.forEach(p=>{
  const rad=p.angle*Math.PI/180;
  const defX=CX+Math.cos(rad)*p.dist, defY=CY+Math.sin(rad)*p.dist;
  const{x:px,y:py}=getPos('planet_'+p.id,defX,defY);

  const el=document.createElement('div');
  el.className='planet';el.id='planet-'+p.id;
  el.style.cssText=`left:${px}px;top:${py}px;--glow:${p.glow};--dur:${p.dur};--delay:${p.delay};`;

  const bg=`background:radial-gradient(circle at 35% 35%,${p.color}cc,${p.color}66);box-shadow:0 0 36px 10px ${p.glow};`;
  if(p.spare) el.classList.add('spare');
  el.innerHTML=`
    <div class="planet-body" style="${bg}">${imgEl(p.pImg||'',p.icon,70,70)}</div>
    <div class="planet-label">${p.label}</div>
    ${p.spare?'<div class="planet-count">곧 추가</div>':`<div class="planet-count">${p.games.length}개</div>`}`;

  let wasMoved=false;
  makeDraggable(el,el,(nx,ny)=>{
    wasMoved=true;setPos('planet_'+p.id,nx,ny);
    setTimeout(()=>{wasMoved=false;},80);
  },()=>editMode);

  el.addEventListener('click',ev=>{
    if(editMode||wasMoved)return;
    ev.stopPropagation();
    const isOpen=activePlanetId===p.id;
    collapseAll();
    if(!isOpen){
      activePlanetId=p.id;
      el.classList.add('active');
      allGameEls.filter(g=>g.planetId===p.id).forEach(g=>g.el.classList.add('visible'));
      document.querySelectorAll('.cat-chip').forEach(c=>c.classList.toggle('active',c.dataset.id===p.id));
    }
    closePanel();redrawLines();
  });

  stage.appendChild(el);
  planetData[p.id]={el,data:p};

  // 위성 (행성의 실제 배치 위치 기준으로 계산)
  p.games.forEach((g,i)=>{
    const sKey=`sat_${p.id}_${g.id}`;
    const{x:defGX,y:defGY}=calcSatPos(px,py,i,p.games.length);
    const{x:gx,y:gy}=getPos(sKey,defGX,defGY);

    const gel=document.createElement('div');
    gel.className='game-dot';gel.style.cssText=`left:${gx}px;top:${gy}px;`;
    gel.innerHTML=`
      <div class="game-dot-body">${imgEl(g.id,g.icon,48,48)}</div>
      <div class="game-dot-name">${g.name}</div>`;

    let satMoved=false;
    makeDraggable(gel,gel,(nx,ny)=>{
      satMoved=true;setPos(sKey,nx,ny);
      setTimeout(()=>{satMoved=false;},80);
    },()=>editMode);

    gel.addEventListener('click',ev=>{
      if(editMode||satMoved)return;
      ev.stopPropagation();openPanel(g,p);
    });

    stage.appendChild(gel);
    allGameEls.push({planetId:p.id,gameId:g.id,el:gel});
  });

  // 카테고리 칩 (예비 행성 제외)
  if(p.spare)return;
  const chip=document.createElement('div');
  chip.className='cat-chip';chip.dataset.id=p.id;
  const ci=tUrl(p.pImg)?`<img src="${tUrl(p.pImg)}" alt="" onerror="this.style.display='none'">`:p.icon;
  chip.innerHTML=`${ci}<span>${p.label}</span>`;
  chip.addEventListener('click',()=>el.click());
  document.getElementById('cat-bar').appendChild(chip);
});

redrawLines();

// ── 월드 드래그/줌 ──
const world=document.getElementById('world');
let wDrag=false,wSX=0,wSY=0,curX=0,curY=0,scale=1;

world.addEventListener('mousedown',e=>{
  if(editMode)return;
  wDrag=true;world.classList.add('dragging');wSX=e.clientX-curX;wSY=e.clientY-curY;
});
window.addEventListener('mousemove',e=>{if(!wDrag)return;curX=e.clientX-wSX;curY=e.clientY-wSY;applyT();});
window.addEventListener('mouseup',()=>{wDrag=false;world.classList.remove('dragging');});
world.addEventListener('wheel',e=>{
  e.preventDefault();scale=Math.min(1.9,Math.max(0.3,scale-e.deltaY*0.001));applyT();
},{passive:false});

let tDrag=false,tSX=0,tSY=0,lastTD=0;
world.addEventListener('touchstart',e=>{
  if(editMode)return;
  if(e.touches.length===1){tDrag=true;tSX=e.touches[0].clientX-curX;tSY=e.touches[0].clientY-curY;}
  else if(e.touches.length===2){tDrag=false;lastTD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
},{passive:true});
world.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&tDrag){curX=e.touches[0].clientX-tSX;curY=e.touches[0].clientY-tSY;applyT();}
  else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    scale=Math.min(1.9,Math.max(0.3,scale*(d/lastTD)));lastTD=d;applyT();
  }
},{passive:false});
world.addEventListener('touchend',()=>{tDrag=false;});

function applyT(){stage.style.transform=`translate(calc(-50% + ${curX}px),calc(-50% + ${curY}px)) scale(${scale})`;}
function resetView(){
  curX=0;curY=0;scale=1;applyT();
  collapseAll();closePanel();
  if(editMode)toggleEdit();
}
</script>
</body>
</html>
