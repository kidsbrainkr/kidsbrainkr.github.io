<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌈⭐ 두뇌 쑥쑥 놀이터</title>
  <style>
    :root {
      --bg: #F7F4FF;
      --header-bg: #5B4FCF;
      --header-text: #fff;
      --tab-active: #5B4FCF;
      --tab-inactive: #E0DBF7;
      --tab-text-active: #fff;
      --tab-text-inactive: #5B4FCF;
      --card-bg: #fff;
      --card-radius: 20px;
      --card-shadow: 0 4px 18px rgba(91,79,207,0.10);
      --card-shadow-hover: 0 8px 32px rgba(91,79,207,0.20);
      --badge-radius: 20px;
      --font: 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;

      /* 연령별 색상 */
      --age2: #FF7043;
      --age3: #43A047;
      --age4: #1E88E5;
      --age5: #8E24AA;
      --mixed: #F4511E;
      --routine: #00897B;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background:
        radial-gradient(circle at top left, rgba(255, 214, 191, 0.45), transparent 28%),
        radial-gradient(circle at top right, rgba(170, 207, 255, 0.28), transparent 24%),
        linear-gradient(180deg, #f8f5ff 0%, #f3f0ff 100%);
      min-height: 100vh;
      color: #333;
    }

    /* ─── 헤더 ─── */
    header {
      background:
        radial-gradient(circle at top center, rgba(255,255,255,0.2), transparent 28%),
        linear-gradient(135deg, #6558d9 0%, #5b4fcf 52%, #786cf0 100%);
      color: var(--header-text);
      text-align: center;
      padding: 40px 20px 34px;
      box-shadow: 0 18px 40px rgba(91,79,207,0.18);
    }
    header .logo {
      font-size: 2.8rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 78px;
      height: 78px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.16);
      backdrop-filter: blur(10px);
    }
    header h1 { font-size: 1.95rem; font-weight: 900; margin: 12px 0 8px; letter-spacing: -0.7px; }
    header p { font-size: 0.97rem; opacity: 0.88; }
    .hero-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .hero-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.86rem;
      font-weight: 800;
      font-family: var(--font);
      cursor: pointer;
      color: #4c3fbc;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 10px 20px rgba(60,50,150,0.14);
      transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
    }
    .hero-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 26px rgba(60,50,150,0.18);
    }
    .hero-btn.music-on {
      color: #fff;
      background: linear-gradient(135deg, #8f8dff, #b388ff);
    }
    .hero-music-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .hero-music-style {
      border: none;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 0.8rem;
      font-weight: 800;
      font-family: var(--font);
      cursor: pointer;
      color: #4c3fbc;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 10px 20px rgba(60,50,150,0.12);
    }
    .hero-music-style.active {
      color: #fff;
      background: linear-gradient(135deg, #8f8dff, #b388ff);
    }

    /* ─── 검색 및 서브 필터 ─── */
    .filter-section {
      background: rgba(255, 255, 255, 0.6);
      padding: 20px 16px 10px;
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(91,79,207,0.1);
    }
    .search-container {
      max-width: 600px;
      margin: 0 auto 16px;
      position: relative;
    }
    .search-container input {
      width: 100%;
      padding: 14px 20px 14px 46px;
      border-radius: 999px;
      border: 2px solid #E0DBF7;
      font-family: var(--font);
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .search-container input:focus {
      border-color: var(--header-bg);
      box-shadow: 0 0 0 4px rgba(91,79,207,0.1);
    }
    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      color: #999;
    }

    .sub-filter-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .sub-filter-btn {
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid #E0DBF7;
      background: #fff;
      color: #5B4FCF;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .sub-filter-btn.active {
      background: #5B4FCF;
      color: #fff;
      border-color: #5B4FCF;
    }
    .sub-filter-btn:hover:not(.active) {
      background: #F0EDFF;
    }

    /* ─── 선생님 팁 스타일 ─── */
    .teacher-tip {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #EEE;
      font-size: 0.76rem;
      color: #667866;
      line-height: 1.4;
      font-style: italic;
      background: #F9FFF9;
      padding: 8px;
      border-radius: 8px;
    }

    /* ─── 기존 탭바 디자인 수정 ─── */
    .tab-bar {
      justify-content: center;
      padding-bottom: 16px;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex: 0 0 auto;
      padding: 10px 18px;
      border: none;
      border-radius: 16px;
      font-size: 0.88rem;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      background: var(--tab-inactive);
      color: var(--tab-text-inactive);
      transition: background 0.2s, color 0.2s, transform 0.18s, box-shadow 0.18s;
      white-space: nowrap;
    }
    .tab-btn.active {
      background: var(--header-bg);
      color: var(--tab-text-active);
      box-shadow: 0 10px 20px rgba(91,79,207,0.18);
    }
    .tab-btn:hover {
      transform: translateY(-1px);
    }

    /* ─── 콘텐츠 영역 ─── */
    .content {
      padding: 28px 16px 52px;
      max-width: 900px;
      margin: 0 auto;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ─── 섹션 헤더 ─── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding: 0 2px;
    }
    .section-header .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 14px;
      border-radius: var(--badge-radius);
      font-size: 0.78rem;
      font-weight: 700;
      color: #fff;
    }
    .section-header h2 {
      font-size: 1.25rem;
      font-weight: 800;
      color: #333;
    }
    .section-header p {
      font-size: 0.82rem;
      color: #888;
      margin-top: 2px;
    }

    /* ─── 게임 그리드 ─── */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    /* ─── 게임 카드 ─── */
    .game-card {
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.85), transparent 26%),
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,252,247,0.98));
      border-radius: var(--card-radius);
      box-shadow: var(--card-shadow);
      padding: 22px 20px 20px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.8);
    }
    .game-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--card-shadow-hover);
    }
    .game-card .card-icon {
      font-size: 2.4rem;
      line-height: 1;
      width: 58px;
      height: 58px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      background: rgba(255,255,255,0.82);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.9), 0 8px 18px rgba(0,0,0,0.06);
    }
    .game-card .card-name {
      font-size: 1.05rem;
      font-weight: 800;
      color: #222;
    }
    .game-card .card-desc {
      font-size: 0.82rem;
      color: #666;
      line-height: 1.55;
    }
    .game-card .card-tag {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      display: inline-block;
      margin-top: 4px;
      width: fit-content;
    }
    /* 새 게임 뱃지 */
    .game-card .new-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      background: #FF3B30;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }
    /* 색상 줄 */
    .game-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      border-radius: var(--card-radius) var(--card-radius) 0 0;
    }

    /* 연령별 색상 적용 */
    .age2 .card-tag { background: #FFF0EC; color: var(--age2); }
    .age2::before { background: var(--age2); }
    .age3 .card-tag { background: #E8F5E9; color: var(--age3); }
    .age3::before { background: var(--age3); }
    .age4 .card-tag { background: #E3F2FD; color: var(--age4); }
    .age4::before { background: var(--age4); }
    .age5 .card-tag { background: #F3E5F5; color: var(--age5); }
    .age5::before { background: var(--age5); }
    .mixed .card-tag { background: #FBE9E7; color: var(--mixed); }
    .mixed::before { background: var(--mixed); }
    .routine .card-tag { background: #E0F2F1; color: var(--routine); }
    .routine::before { background: var(--routine); }

    /* ─── 루틴 섹션 설명 박스 ─── */
    .routine-info {
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.7), transparent 30%),
        linear-gradient(135deg, #daf5ee, #eefcf8);
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 0.85rem;
      color: #004D40;
      margin-bottom: 18px;
      line-height: 1.6;
      box-shadow: 0 10px 24px rgba(0,0,0,0.06);
    }
    .routine-info strong { font-weight: 800; }

    /* ─── 섹션 구분선 ─── */
    .section-divider {
      height: 1px;
      background: #E8E4FF;
      margin: 28px 0;
    }

    /* ─── 반응형 ─── */
    @media (max-width: 480px) {
      header { padding: 32px 16px 26px; }
      header .logo { width: 64px; height: 64px; font-size: 2.35rem; }
      header h1 { font-size: 1.55rem; }
      .tab-btn { font-size: 0.8rem; padding: 8px 14px; }
      .game-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .game-card { padding: 16px 14px 14px; }
      .game-card .card-icon { font-size: 2rem; width: 50px; height: 50px; border-radius: 16px; }
      .game-card .card-name { font-size: 0.92rem; }
      .game-card .card-desc { font-size: 0.76rem; }
    }

    @media (max-width: 340px) {
      .game-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🌈⭐</div>
  <h1>두뇌 쑥쑥 놀이터</h1>
  <p>어린이집 · 유치원 선생님을 위한 두뇌발달 게임 모음</p>
  <div class="hero-actions">
    <button class="hero-btn music-on" id="musicBtn" type="button">BGM 끄기</button>
  </div>
  <div class="hero-music-row">
    <button class="hero-music-style active" data-style="calm" type="button">차분한 교실</button>
    <button class="hero-music-style" data-style="rainbow" type="button">밝은 무지개</button>
    <button class="hero-music-style" data-style="dreamy" type="button">포근한 별빛</button>
  </div>
</header>

<!-- 검색 및 상세 필터 -->
<div class="filter-section">
  <div class="search-container">
    <input type="text" id="gameSearch" placeholder="찾고 싶은 게임을 검색하세요 (예: 색깔, 기억)">
    <span class="search-icon">🔍</span>
  </div>
  <div class="sub-filter-bar" id="areaFilter">
    <button class="sub-filter-btn active" data-area="all">전체 영역</button>
    <button class="sub-filter-btn" data-area="기억력">🧠 기억력</button>
    <button class="sub-filter-btn" data-area="관찰력">👁️ 관찰력</button>
    <button class="sub-filter-btn" data-area="사고력">💡 사고력</button>
    <button class="sub-filter-btn" data-area="루틴">⏰ 생활루틴</button>
  </div>
</div>

<div class="content">
  <!-- 게임 카드가 동적으로 생성될 영역 -->
  <div id="gameContainer" class="game-grid">
    <!-- JS에서 렌더링함 -->
  </div>
</div>

<audio id="bgmAudio" loop preload="auto"></audio>

<script>
  /**
   * KidsBrain Game Hub 메인 로직
   * 1. 데이터 로드: games.json에서 게임 목록을 가져옴
   * 2. 필터링: 선택된 연령 탭, 영역 버튼, 검색어에 따라 목록 필터링
   * 3. 렌더링: 필터링된 데이터를 바탕으로 게임 카드 HTML 동적 생성
   * 4. BGM 관리: 배경음악 온/오프 및 스타일 전환 제어
   */

  let gameData = [];        // 전체 게임 목록 저장 변수
  let currentTab = 'age2';  // 현재 선택된 연령 탭 (기본값: 만 2세)
  let currentArea = 'all';  // 현재 선택된 영역 필터 (기본값: 전체)
  let searchQuery = '';     // 현재 입력된 검색어

  // DOM 요소 참조
  const gameContainer = document.getElementById('gameContainer');
  const tabs = document.querySelectorAll('.tab-btn');
  const areaBtns = document.querySelectorAll('.sub-filter-btn');
  const searchInput = document.getElementById('gameSearch');
  
  const musicBtn = document.getElementById('musicBtn');
  const musicStyleButtons = document.querySelectorAll('.hero-music-style');
  const bgmAudio = document.getElementById('bgmAudio');
  
  let bgmEnabled = true;    // BGM 활성화 여부
  let bgmStarted = false;    // BGM 재생 시작 여부 (중복 재생 방지)
  let selectedMusicStyle = 'calm'; // 현재 선택된 음악 스타일

  // 배경음악 소스 경로 설정
  const bgmSources = {
    dreamy: './routine_tools/cleanup_timer/bgm-dreamy.mp3',
    rainbow: './routine_tools/cleanup_timer/bgm-rainbow.mp3',
    calm: './routine_tools/cleanup_timer/bgm-calm.mp3'
  };

  /**
   * 초기화 함수: 외부 JSON 데이터를 불러오고 첫 렌더링 수행
   */
  async function init() {
    try {
      // 캐시 방지를 위해 fetch 사용 (로컬 테스트 시 주의)
      const response = await fetch('./data/games.json');
      const data = await response.json();
      gameData = data.games;
      renderGames(); // 초기 화면 렌더링
    } catch (e) {
      console.error("데이터 로드 실패:", e);
      gameContainer.innerHTML = '<p style="text-align:center; padding:20px;">게임을 불러오는 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.</p>';
    }
  }

  /**
   * 게임 목록 렌더링 함수: 현재 필터 상태에 따라 화면 업데이트
   */
  function renderGames() {
    gameContainer.innerHTML = ''; // 기존 목록 초기화
    
    // 복합 필터 로직 적용
    const filtered = gameData.filter(game => {
      // 1. 연령 탭 매칭 (mixed 탭은 다연령 또는 공용 게임 포함)
      const tabMatch = (currentTab === 'age2' && game.age.includes(2)) ||
                       (currentTab === 'age3' && game.age.includes(3)) ||
                       (currentTab === 'age4' && game.age.includes(4)) ||
                       (currentTab === 'age5' && game.age.includes(5)) ||
                       (currentTab === 'mixed' && (game.age.includes(0) || game.age.length > 1)) ||
                       (currentTab === 'routine' && game.area === '루틴');
      
      // 2. 영역 필터 매칭
      const areaMatch = (currentArea === 'all') || (game.area === currentArea);
      
      // 3. 검색어 매칭 (제목, 설명, 태그 포함 검색)
      const searchMatch = game.title.includes(searchQuery) || 
                          game.desc.includes(searchQuery) || 
                          game.tag.includes(searchQuery);
      
      return tabMatch && areaMatch && searchMatch;
    });

    // 검색 결과가 없는 경우 안내 메시지 표시
    if (filtered.length === 0) {
      gameContainer.innerHTML = `
        <div style="grid-column: 1/-1; text-align: center; padding: 60px 40px; color: #888;">
          <div style="font-size: 3rem; margin-bottom: 20px;">🍎</div>
          찾으시는 조건의 게임이 아직 없어요.<br>
          선생님이 제안해 주시면 새로운 게임을 준비하겠습니다!
        </div>`;
      return;
    }

    // 필터링된 데이터를 바탕으로 카드 생성
    filtered.forEach(game => {
      // 연령/영역에 따른 카드 상단 색상 테마 결정
      const ageClass = game.age.includes(2) ? 'age2' : 
                       game.age.includes(3) ? 'age3' :
                       game.age.includes(4) ? 'age4' :
                       game.age.includes(5) ? 'age5' : 
                       game.area === '루틴' ? 'routine' : 'mixed';

      const card = document.createElement('a');
      card.className = `game-card ${ageClass}`;
      card.href = game.path;
      card.innerHTML = `
        ${game.isNew ? '<div class="new-badge">NEW</div>' : ''}
        <div class="card-icon">${game.icon}</div>
        <div class="card-name">${game.title}</div>
        <div class="card-desc">${game.desc}</div>
        <div class="card-tag">${game.tag}</div>
        <div class="teacher-tip">💡 ${game.tip}</div>
      `;
      
      // 카드 위에 마우스를 올리면 BGM이 준비되도록 설정 (사용자 인터랙션 대응)
      card.addEventListener('mouseenter', startMainBgm, { passive: true });
      gameContainer.appendChild(card);
    });
  }

  // --- 이벤트 리스너 설정 ---

  // 상단 연령 탭 클릭 이벤트
  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      tabs.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      renderGames();
    });
  });

  // 영역별 서브 필터 버튼 클릭 이벤트
  areaBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      areaBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentArea = btn.dataset.area;
      renderGames();
    });
  });

  // 검색창 입력 이벤트 (실시간 필터링)
  searchInput.addEventListener('input', (e) => {
    searchQuery = e.target.value;
    renderGames();
  });

  // --- BGM 제어 로직 ---

  // 현재 선택된 스타일의 음악 파일을 로드
  function loadMainBgm() {
    bgmAudio.pause();
    bgmAudio.currentTime = 0;
    bgmAudio.src = bgmSources[selectedMusicStyle];
    bgmAudio.load();
  }

  // 음악 On/Off 버튼 텍스트 업데이트
  function syncMusicButton() {
    musicBtn.textContent = bgmEnabled ? 'BGM 끄기' : 'BGM 켜기';
    musicBtn.classList.toggle('music-on', bgmEnabled);
  }

  // 음악 재생 시작 (브라우저 정책상 사용자 클릭/움직임 후에만 소리가 날 수 있음)
  function startMainBgm() {
    if (!bgmEnabled) return;
    if (bgmStarted) return;
    bgmStarted = true;
    bgmAudio.play().catch(() => {
      // 자동 재생 차단 시 무시 (사용자가 직접 클릭할 때 재생됨)
      bgmStarted = false;
    });
  }

  // BGM On/Off 토글 버튼 클릭
  musicBtn.addEventListener('click', () => {
    bgmEnabled = !bgmEnabled;
    syncMusicButton();
    if (bgmEnabled) {
      bgmStarted = false; 
      startMainBgm();
    } else {
      bgmAudio.pause();
      bgmStarted = false;
    }
  });

  // BGM 스타일 변경 버튼 클릭
  musicStyleButtons.forEach(button => {
    button.addEventListener('click', () => {
      selectedMusicStyle = button.dataset.style;
      musicStyleButtons.forEach(item => item.classList.toggle('active', item === button));
      loadMainBgm();
      if (bgmEnabled) {
        bgmStarted = false;
        startMainBgm();
      }
    });
  });

  // 초기 로드 실행
  init();
  loadMainBgm();
  syncMusicButton();
</script>

</body>
</html>
