<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌈⭐ 두뇌 쑥쑥 놀이터</title>
  <style>
    :root {
      --bg: #F7F4FF;
      --header-bg: #5B4FCF;
      --header-text: #fff;
      --tab-active: #5B4FCF;
      --tab-inactive: #E0DBF7;
      --tab-text-active: #fff;
      --tab-text-inactive: #5B4FCF;
      --card-bg: #fff;
      --card-radius: 20px;
      --card-shadow: 0 4px 18px rgba(91,79,207,0.10);
      --card-shadow-hover: 0 8px 32px rgba(91,79,207,0.20);
      --badge-radius: 20px;
      --font: 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;

      /* 연령별 색상 */
      --age2: #FF7043;
      --age3: #43A047;
      --age4: #1E88E5;
      --age5: #8E24AA;
      --mixed: #F4511E;
      --routine: #00897B;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background:
        radial-gradient(circle at top left, rgba(255, 214, 191, 0.45), transparent 28%),
        radial-gradient(circle at top right, rgba(170, 207, 255, 0.28), transparent 24%),
        linear-gradient(180deg, #f8f5ff 0%, #f3f0ff 100%);
      min-height: 100vh;
      color: #333;
    }

    /* ─── 헤더 ─── */
    header {
      background:
        radial-gradient(circle at top center, rgba(255,255,255,0.2), transparent 28%),
        linear-gradient(135deg, #6558d9 0%, #5b4fcf 52%, #786cf0 100%);
      color: var(--header-text);
      text-align: center;
      padding: 40px 20px 34px;
      box-shadow: 0 18px 40px rgba(91,79,207,0.18);
    }
    header .logo {
      font-size: 2.8rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 78px;
      height: 78px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.16);
      backdrop-filter: blur(10px);
    }
    header h1 { font-size: 1.95rem; font-weight: 900; margin: 12px 0 8px; letter-spacing: -0.7px; }
    header p { font-size: 0.97rem; opacity: 0.88; }
    .hero-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .hero-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.86rem;
      font-weight: 800;
      font-family: var(--font);
      cursor: pointer;
      color: #4c3fbc;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 10px 20px rgba(60,50,150,0.14);
      transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
    }
    .hero-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 26px rgba(60,50,150,0.18);
    }
    .hero-btn.music-on {
      color: #fff;
      background: linear-gradient(135deg, #8f8dff, #b388ff);
    }
    .hero-music-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .hero-music-style {
      border: none;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 0.8rem;
      font-weight: 800;
      font-family: var(--font);
      cursor: pointer;
      color: #4c3fbc;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 10px 20px rgba(60,50,150,0.12);
    }
    .hero-music-style.active {
      color: #fff;
      background: linear-gradient(135deg, #8f8dff, #b388ff);
    }

    /* ─── 검색 및 서브 필터 ─── */
    .filter-section {
      background: rgba(255, 255, 255, 0.6);
      padding: 20px 16px 10px;
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(91,79,207,0.1);
    }
    .search-container {
      max-width: 600px;
      margin: 0 auto 16px;
      position: relative;
    }
    .search-container input {
      width: 100%;
      padding: 14px 20px 14px 46px;
      border-radius: 999px;
      border: 2px solid #E0DBF7;
      font-family: var(--font);
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .search-container input:focus {
      border-color: var(--header-bg);
      box-shadow: 0 0 0 4px rgba(91,79,207,0.1);
    }
    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      color: #999;
    }

    .sub-filter-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .sub-filter-btn {
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid #E0DBF7;
      background: #fff;
      color: #5B4FCF;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .sub-filter-btn.active {
      background: #5B4FCF;
      color: #fff;
      border-color: #5B4FCF;
    }
    .sub-filter-btn:hover:not(.active) {
      background: #F0EDFF;
    }

    /* ─── 선생님 팁 스타일 ─── */
    .teacher-tip {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #EEE;
      font-size: 0.76rem;
      color: #667866;
      line-height: 1.4;
      font-style: italic;
      background: #F9FFF9;
      padding: 8px;
      border-radius: 8px;
    }

    /* ─── 기존 탭바 디자인 수정 ─── */
    .tab-bar {
      justify-content: center;
      padding-bottom: 16px;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex: 0 0 auto;
      padding: 10px 18px;
      border: none;
      border-radius: 16px;
      font-size: 0.88rem;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      background: var(--tab-inactive);
      color: var(--tab-text-inactive);
      transition: background 0.2s, color 0.2s, transform 0.18s, box-shadow 0.18s;
      white-space: nowrap;
    }
    .tab-btn.active {
      background: var(--header-bg);
      color: var(--tab-text-active);
      box-shadow: 0 10px 20px rgba(91,79,207,0.18);
    }
    .tab-btn:hover {
      transform: translateY(-1px);
    }

    /* ─── 콘텐츠 영역 ─── */
    .content {
      padding: 28px 16px 52px;
      max-width: 900px;
      margin: 0 auto;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ─── 섹션 헤더 ─── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding: 0 2px;
    }
    .section-header .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 14px;
      border-radius: var(--badge-radius);
      font-size: 0.78rem;
      font-weight: 700;
      color: #fff;
    }
    .section-header h2 {
      font-size: 1.25rem;
      font-weight: 800;
      color: #333;
    }
    .section-header p {
      font-size: 0.82rem;
      color: #888;
      margin-top: 2px;
    }

    /* ─── 게임 그리드 ─── */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    /* ─── 게임 카드 ─── */
    .game-card {
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.85), transparent 26%),
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,252,247,0.98));
      border-radius: var(--card-radius);
      box-shadow: var(--card-shadow);
      padding: 22px 20px 18px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: transform 0.22s cubic-bezier(.4,0,.2,1), box-shadow 0.22s;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.8);
    }
    .game-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 12px 36px rgba(91,79,207,0.22);
    }
    .game-card:active {
      transform: translateY(-2px) scale(0.98);
    }
    .game-card .card-icon {
      font-size: 2.4rem;
      line-height: 1;
      width: 58px;
      height: 58px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      background: rgba(255,255,255,0.82);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.9), 0 8px 18px rgba(0,0,0,0.06);
      transition: transform 0.22s;
    }
    .game-card:hover .card-icon {
      transform: scale(1.1) rotate(-5deg);
    }
    .game-card .card-name {
      font-size: 1.05rem;
      font-weight: 800;
      color: #222;
    }
    .game-card .card-desc {
      font-size: 0.82rem;
      color: #666;
      line-height: 1.55;
    }
    .game-card .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .game-card .card-tag {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      display: inline-block;
      width: fit-content;
    }
    .game-card .card-difficulty {
      font-size: 0.68rem;
      color: #bbb;
      letter-spacing: 1px;
    }
    .game-card .card-played {
      font-size: 0.65rem;
      color: #aaa;
      margin-left: auto;
    }
    /* 새 게임 뱃지 */
    .game-card .new-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      background: linear-gradient(135deg, #FF3B30, #FF6B6B);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      animation: newPulse 2s ease-in-out infinite;
    }
    @keyframes newPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,59,48,0.4); }
      50% { box-shadow: 0 0 0 6px rgba(255,59,48,0); }
    }
    /* 색상 줄 */
    .game-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      border-radius: var(--card-radius) var(--card-radius) 0 0;
    }

    /* 연령별 색상 적용 */
    .age2 .card-tag { background: #FFF0EC; color: var(--age2); }
    .age2::before { background: var(--age2); }
    .age3 .card-tag { background: #E8F5E9; color: var(--age3); }
    .age3::before { background: var(--age3); }
    .age4 .card-tag { background: #E3F2FD; color: var(--age4); }
    .age4::before { background: var(--age4); }
    .age5 .card-tag { background: #F3E5F5; color: var(--age5); }
    .age5::before { background: var(--age5); }
    .mixed .card-tag { background: #FBE9E7; color: var(--mixed); }
    .mixed::before { background: var(--mixed); }
    .routine .card-tag { background: #E0F2F1; color: var(--routine); }
    .routine::before { background: var(--routine); }

    /* ─── 루틴 섹션 설명 박스 ─── */
    .routine-info {
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.7), transparent 30%),
        linear-gradient(135deg, #daf5ee, #eefcf8);
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 0.85rem;
      color: #004D40;
      margin-bottom: 18px;
      line-height: 1.6;
      box-shadow: 0 10px 24px rgba(0,0,0,0.06);
    }
    .routine-info strong { font-weight: 800; }

    /* ─── 섹션 구분선 ─── */
    .section-divider {
      height: 1px;
      background: #E8E4FF;
      margin: 28px 0;
    }

    /* ─── 마스코트 캐릭터 ─── */
    .mascot-container {
      position: relative;
      display: flex;
      justify-content: center;
      margin: -28px auto 0;
      z-index: 10;
    }
    .mascot {
      width: 80px;
      height: 80px;
      position: relative;
      animation: mascotBounce 2s ease-in-out infinite;
      cursor: pointer;
      filter: drop-shadow(0 6px 12px rgba(91,79,207,0.2));
    }
    .mascot svg { width: 100%; height: 100%; }
    @keyframes mascotBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .mascot-speech {
      position: absolute;
      top: -10px;
      left: calc(50% + 44px);
      background: #fff;
      border-radius: 14px;
      padding: 8px 14px;
      font-size: 0.78rem;
      font-weight: 700;
      color: #5B4FCF;
      box-shadow: 0 4px 16px rgba(91,79,207,0.12);
      white-space: nowrap;
      animation: speechIn 0.3s ease-out;
      z-index: 11;
    }
    .mascot-speech::before {
      content: '';
      position: absolute;
      left: -8px;
      top: 50%;
      transform: translateY(-50%);
      border: 6px solid transparent;
      border-right-color: #fff;
    }
    @keyframes speechIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @media (max-width: 480px) {
      .mascot { width: 64px; height: 64px; }
      .mascot-speech { font-size: 0.7rem; padding: 6px 10px; left: calc(50% + 36px); }
    }

    /* ─── 보상 대시보드 ─── */
    .reward-dashboard {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px 0;
    }
    .reward-stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .reward-stat {
      flex: 1;
      min-width: 120px;
      background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,252,247,0.98));
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(91,79,207,0.08);
      border: 1px solid rgba(255,255,255,0.8);
      transition: transform 0.18s;
    }
    .reward-stat:hover { transform: translateY(-2px); }
    .reward-stat .stat-icon { font-size: 1.8rem; }
    .reward-stat .stat-value {
      font-size: 1.5rem;
      font-weight: 900;
      color: #5B4FCF;
      margin: 4px 0 2px;
    }
    .reward-stat .stat-label {
      font-size: 0.75rem;
      color: #888;
      font-weight: 600;
    }

    /* 최근 플레이 */
    .recent-section {
      margin-top: 16px;
      margin-bottom: 8px;
    }
    .recent-header {
      font-size: 0.92rem;
      font-weight: 800;
      color: #555;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .recent-list {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: none;
    }
    .recent-list::-webkit-scrollbar { display: none; }
    .recent-item {
      flex: 0 0 auto;
      background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(248,245,255,0.98));
      border-radius: 14px;
      padding: 12px 16px;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 3px 12px rgba(91,79,207,0.08);
      border: 1px solid rgba(91,79,207,0.06);
      transition: transform 0.18s, box-shadow 0.18s;
      min-width: 180px;
    }
    .recent-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(91,79,207,0.14);
    }
    .recent-item .ri-icon { font-size: 1.6rem; }
    .recent-item .ri-info { display: flex; flex-direction: column; gap: 2px; }
    .recent-item .ri-name { font-size: 0.82rem; font-weight: 700; color: #333; }
    .recent-item .ri-stars { font-size: 0.75rem; }
    .recent-item .ri-time { font-size: 0.68rem; color: #aaa; }

    /* 뱃지 컬렉션 */
    .badge-section { margin-top: 16px; }
    .badge-grid {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .badge-item {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background: linear-gradient(135deg, #f8f5ff, #ede8ff);
      box-shadow: 0 3px 10px rgba(91,79,207,0.1);
      border: 1px solid rgba(91,79,207,0.08);
      position: relative;
      transition: transform 0.2s;
    }
    .badge-item:hover { transform: scale(1.1); }
    .badge-item.locked {
      filter: grayscale(1) opacity(0.35);
    }
    .badge-item .badge-check {
      position: absolute;
      bottom: -2px;
      right: -2px;
      font-size: 0.65rem;
      background: #43A047;
      color: #fff;
      width: 16px;
      height: 16px;
      border-radius: 99px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .badge-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      font-size: 0.68rem;
      padding: 4px 10px;
      border-radius: 8px;
      white-space: nowrap;
      z-index: 10;
    }
    .badge-item:hover .badge-tooltip { display: block; }

    /* 마일스톤 축하 오버레이 */
    .milestone-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .milestone-overlay.show { display: flex; }
    .milestone-card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 36px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: milestoneIn 0.4s cubic-bezier(.4,0,.2,1);
      max-width: 340px;
    }
    .milestone-card .mc-icon { font-size: 4rem; margin-bottom: 12px; }
    .milestone-card .mc-title { font-size: 1.3rem; font-weight: 900; color: #5B4FCF; margin-bottom: 8px; }
    .milestone-card .mc-desc { font-size: 0.88rem; color: #666; margin-bottom: 20px; line-height: 1.5; }
    .milestone-card .mc-btn {
      background: linear-gradient(135deg, #6558d9, #786cf0);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 12px 32px;
      font-size: 0.92rem;
      font-weight: 800;
      cursor: pointer;
      font-family: var(--font);
    }
    @keyframes milestoneIn {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* ─── 학부모 대시보드 ─── */
    .parent-toggle {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: linear-gradient(135deg, #6558d9, #786cf0);
      color: #fff;
      border: none;
      border-radius: 999px;
      width: 48px;
      height: 48px;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(91,79,207,0.3);
      z-index: 100;
      transition: transform 0.2s;
      font-family: var(--font);
    }
    .parent-toggle:hover { transform: scale(1.1); }

    .parent-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9998;
      justify-content: center;
      align-items: flex-end;
    }
    .parent-panel.show { display: flex; }
    .parent-sheet {
      background: #fff;
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 28px 24px 40px;
      animation: sheetUp 0.3s ease-out;
    }
    @keyframes sheetUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .parent-sheet h3 {
      font-size: 1.15rem;
      font-weight: 900;
      color: #333;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .parent-sheet .close-btn {
      margin-left: auto;
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #999;
    }
    .parent-summary {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .ps-card {
      background: #f8f5ff;
      border-radius: 14px;
      padding: 14px;
      text-align: center;
    }
    .ps-card .ps-val { font-size: 1.4rem; font-weight: 900; color: #5B4FCF; }

    { id:"helper_board", title:"오늘의 도우미 보드", age:[0], area:"루틴", desc:"출석, 간식, 정리 역할을 랜덤으로 정하고 큰 화면에 띄울 수 있습니다.", tag:"반 운영 도구", path:"routine_tools/helper_board/index.html", icon:"⭐", tip:"매일 아침 도우미를 뽑는 시간을 아이들이 매우 기다릴 거예요!", isNew:false }
  ];

  /**
   * 초기화 함수: 인라인 데이터로 즉시 렌더링 (fetch 불필요)
   */
  function init() {
    gameData = GAMES_DATA;
    renderGames();
  }

  /**
   * 게임 목록 렌더링 함수: 현재 필터 상태에 따라 화면 업데이트
   */
  function renderGames() {
    gameContainer.innerHTML = ''; // 기존 목록 초기화
    
    // 복합 필터 로직 적용
    const filtered = gameData.filter(game => {
      // 1. 탭이 'all'이거나 검색어가 있으면 연령 필터 무시 (전체 표시)
      //    탭 버튼이 HTML에 존재할 경우 해당 연령만 필터링
      const tabMatch = (currentTab === 'all') ||
                       (searchQuery.length > 0) ||
                       (currentTab === 'age2' && game.age.includes(2)) ||
                       (currentTab === 'age3' && game.age.includes(3)) ||
                       (currentTab === 'age4' && game.age.includes(4)) ||
                       (currentTab === 'age5' && game.age.includes(5)) ||
                       (currentTab === 'mixed' && (game.age.includes(0) || game.age.length > 1)) ||
                       (currentTab === 'routine' && game.area === '루틴');
      
      // 2. 영역 필터 매칭
      const areaMatch = (currentArea === 'all') || (game.area === currentArea);
      
      // 3. 검색어 매칭 (제목, 설명, 태그, 영역 모두 검색 대상에 포함)
      const searchMatch = game.title.includes(searchQuery) || 
                          game.desc.includes(searchQuery) || 
                          game.tag.includes(searchQuery) ||
                          game.area.includes(searchQuery);
      
      return tabMatch && areaMatch && searchMatch;
    });

    // 검색 결과가 없는 경우 안내 메시지 표시
    if (filtered.length === 0) {
      gameContainer.innerHTML = `
        <div style="grid-column: 1/-1; text-align: center; padding: 60px 40px; color: #888;">
          <div style="font-size: 3rem; margin-bottom: 20px;">🍎</div>
          찾으시는 조건의 게임이 아직 없어요.<br>
          <span style="font-size: 0.9rem;">검색어를 바꿔보거나 다른 연령대를 확인해 보세요!</span>
        </div>`;
      return;
    }

    // 필터링된 데이터를 바탕으로 카드 생성
    filtered.forEach(game => {
      // 연령/영역에 따른 카드 상단 색상 테마 결정
      const ageClass = game.age.includes(2) ? 'age2' : 
                       game.age.includes(3) ? 'age3' :
                       game.age.includes(4) ? 'age4' :
                       game.age.includes(5) ? 'age5' : 
                       game.area === '루틴' ? 'routine' : 'mixed';

      // 난이도 (연령 기반)
      const diffStars = game.age.includes(2) ? '★☆☆' :
                        game.age.includes(3) ? '★★☆' :
                        game.age.includes(5) ? '★★★' :
                        game.age.includes(4) ? '★★☆' : '★★☆';

      // 플레이 횟수 (보상 데이터에서 가져오기)
      const rData = getRewardData();
      const playCount = rData.history.filter(h => h.gameId === game.id).length;

      const card = document.createElement('a');
      card.className = `game-card ${ageClass}`;
      card.href = game.path;
      card.innerHTML = `
        ${game.isNew ? '<div class="new-badge">NEW</div>' : ''}
        <div class="card-icon">${game.icon}</div>
        <div class="card-name">${game.title}</div>
        <div class="card-desc">${game.desc}</div>
        <div class="card-meta">
          <div class="card-tag">${game.tag}</div>
          <div class="card-difficulty">${diffStars}</div>
          ${playCount > 0 ? `<div class="card-played">🎮 ${playCount}회</div>` : ''}
        </div>
        <div class="teacher-tip">💡 ${game.tip}</div>
      `;
      
      // 카드 클릭 시 사운드 + BGM 준비
      card.addEventListener('mouseenter', startMainBgm, { passive: true });
      card.addEventListener('click', () => { try { kbrSound.click(); } catch {} }, { passive: true });
      gameContainer.appendChild(card);
    });
  }

  // --- 이벤트 리스너 설정 ---

  // 상단 연령 탭 클릭 이벤트
  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      tabs.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      renderGames();
    });
  });

  // 영역별 서브 필터 버튼 클릭 이벤트
  areaBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      areaBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentArea = btn.dataset.area;
      renderGames();
    });
  });

  // 검색창 입력 이벤트 (실시간 필터링)
  searchInput.addEventListener('input', (e) => {
    searchQuery = e.target.value;
    renderGames();
  });

  // --- BGM 제어 및 설정 유지 로직 ---

  // 페이지 로드 시 로컬 스토리지에서 이전 설정 불러오기 (위에서 선언 및 초기화 완료)

  /**
   * 음악 On/Off 버튼 상태 및 텍스트 업데이트
   * 저장된 설정에 따라 버튼의 디자인과 텍스트를 동기화합니다.
   */
  function syncMusicButton() {
    musicBtn.textContent = bgmEnabled ? 'BGM 끄기' : 'BGM 켜기';
    musicBtn.classList.toggle('music-on', bgmEnabled);
    
    // 스타일 버튼들도 현재 선택된 스타일에 맞춰 활성화 표시
    musicStyleButtons.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.style === selectedMusicStyle);
    });
  }

  /**
   * 음악 파일 로드
   * 선택된 스타일(차분한 교실 등)에 맞는 오디오 소스를 설정합니다.
   */
  function loadMainBgm() {
    bgmAudio.pause();
    bgmAudio.currentTime = 0;
    bgmAudio.src = bgmSources[selectedMusicStyle];
    bgmAudio.load();
  }

  /**
   * 배경음악 재생 시작
   * 사용자가 BGM을 켠 상태일 때만 재생을 시도합니다.
   */
  function startMainBgm() {
    // 1. 사용자가 BGM을 꺼두었다면 절대 재생하지 않음
    if (!bgmEnabled) return;
    
    // 2. 이미 재생 중이라면 중복 실행 방지
    if (bgmStarted) return;
    
    bgmStarted = true;
    bgmAudio.play().catch(() => {
      // 자동 재생 정책으로 인해 차단된 경우, 다음 인터랙션 시 재시도할 수 있게 상태 리셋
      bgmStarted = false;
    });
  }

  // BGM On/Off 토글 버튼 클릭 이벤트
  musicBtn.addEventListener('click', () => {
    bgmEnabled = !bgmEnabled;
    
    // 설정값을 브라우저에 영구 저장 (새로고침해도 유지됨)
    localStorage.setItem('bgmEnabled', bgmEnabled);
    
    syncMusicButton();
    
    if (bgmEnabled) {
      bgmStarted = false; 
      startMainBgm();
    } else {
      bgmAudio.pause();
      bgmStarted = false;
    }
  });

  // BGM 스타일(분위기) 변경 버튼 클릭 이벤트
  musicStyleButtons.forEach(button => {
    button.addEventListener('click', () => {
      selectedMusicStyle = button.dataset.style;
      
      // 선택한 스타일 저장
      localStorage.setItem('bgmStyle', selectedMusicStyle);
      
      musicStyleButtons.forEach(item => item.classList.toggle('active', item === button));
      loadMainBgm();
      
      if (bgmEnabled) {
        bgmStarted = false;
        startMainBgm();
      }
    });
  });

  // ─── 마스코트 대사 ───
  const MASCOT_GREETINGS = [
    '안녕! 오늘도 같이 놀자!', '오늘은 어떤 게임 할까?',
    '와! 또 왔구나! 반가워!', '두뇌가 쑥쑥 자라고 있어!',
    '오늘도 열심히 놀아보자!', '같이 재미있는 거 하자!',
    '뇌또리랑 놀면 똑똑해져!', '어떤 게임이 좋을까?'
  ];
  const MASCOT_REWARD_MSGS = [
    '와! 별을 {n}개나 모았어!', '대단해! 벌써 {n}개!',
    '{n}개의 별이 반짝반짝!'
  ];

  function updateMascotSpeech() {
    const data = getRewardData();
    const speech = document.getElementById('mascotSpeech');
    const todayCount = getTodayCount(data);

    if (todayCount > 0 && data.totalStars > 0) {
      const msgs = MASCOT_REWARD_MSGS;
      speech.textContent = msgs[Math.floor(Math.random() * msgs.length)].replace('{n}', data.totalStars);
    } else {
      speech.textContent = MASCOT_GREETINGS[Math.floor(Math.random() * MASCOT_GREETINGS.length)];
    }
  }

  document.getElementById('mascot').addEventListener('click', () => {
    const speech = document.getElementById('mascotSpeech');
    speech.textContent = MASCOT_GREETINGS[Math.floor(Math.random() * MASCOT_GREETINGS.length)];
    speech.style.animation = 'none';
    speech.offsetHeight;
    speech.style.animation = 'speechIn 0.3s ease-out';
  });

  // ─── 보상 시스템 ───

  const BADGE_DEFS = [
    { id: 'first_game',   icon: '🌟', name: '첫 도전!',       desc: '첫 번째 게임을 완료했어요',      condition: s => s.totalGames >= 1 },
    { id: 'five_games',   icon: '🎯', name: '다섯 고개',      desc: '게임을 5번 완료했어요',          condition: s => s.totalGames >= 5 },
    { id: 'ten_games',    icon: '🏆', name: '열 번의 도전',    desc: '게임을 10번 완료했어요',         condition: s => s.totalGames >= 10 },
    { id: 'twenty_games', icon: '👑', name: '스무 번 영웅',    desc: '게임을 20번 완료했어요',         condition: s => s.totalGames >= 20 },
    { id: 'fifty_games',  icon: '💎', name: '반짝반짝 보석',   desc: '게임을 50번 완료했어요',         condition: s => s.totalGames >= 50 },
    { id: 'star_10',      icon: '⭐', name: '별 10개',         desc: '별을 10개 모았어요',            condition: s => s.totalStars >= 10 },
    { id: 'star_50',      icon: '🌠', name: '별 50개',         desc: '별을 50개 모았어요',            condition: s => s.totalStars >= 50 },
    { id: 'star_100',     icon: '🌌', name: '별 100개',        desc: '별을 100개 모았어요',           condition: s => s.totalStars >= 100 },
    { id: 'streak_3',     icon: '🔥', name: '3일 연속!',       desc: '3일 연속 놀러 왔어요',          condition: s => s.streak >= 3 },
    { id: 'streak_7',     icon: '🌈', name: '일주일 연속!',    desc: '7일 연속 놀러 왔어요',          condition: s => s.streak >= 7 },
    { id: 'all_areas',    icon: '🧩', name: '골고루 박사',     desc: '모든 영역 게임을 해봤어요',      condition: s => s.areasPlayed && s.areasPlayed.size >= 4 },
    { id: 'today_3',      icon: '💪', name: '오늘의 챔피언',   desc: '하루에 게임 3개를 완료했어요',    condition: s => s.todayCount >= 3 },
  ];

  function getRewardData() {
    try {
      return JSON.parse(localStorage.getItem('kbr.rewards') || 'null') || {
        totalStars: 0, totalGames: 0, badges: [],
        history: [], streak: 0, lastDate: null
      };
    } catch { return { totalStars: 0, totalGames: 0, badges: [], history: [], streak: 0, lastDate: null }; }
  }

  function saveRewardData(data) {
    try { localStorage.setItem('kbr.rewards', JSON.stringify(data)); } catch {}
  }

  function updateStreak(data) {
    const today = new Date().toISOString().slice(0, 10);
    if (data.lastDate === today) return;

    if (data.lastDate) {
      const last = new Date(data.lastDate);
      const now = new Date(today);
      const diff = Math.floor((now - last) / 86400000);
      data.streak = diff === 1 ? data.streak + 1 : 1;
    } else {
      data.streak = 1;
    }
    data.lastDate = today;
    saveRewardData(data);
  }

  function getTodayCount(data) {
    const today = new Date().toISOString().slice(0, 10);
    return data.history.filter(h => h.date === today).length;
  }

  function getAreasPlayed(data) {
    return new Set(data.history.map(h => h.area).filter(Boolean));
  }

  function renderRewardDashboard() {
    const data = getRewardData();
    updateStreak(data);
    const todayCount = getTodayCount(data);

    document.getElementById('totalStars').textContent = data.totalStars;
    document.getElementById('todayCount').textContent = todayCount;
    document.getElementById('streakCount').textContent = data.streak;

    // 최근 플레이
    const recentSection = document.getElementById('recentSection');
    const recentList = document.getElementById('recentList');
    if (data.history.length > 0) {
      recentSection.style.display = 'block';
      recentList.innerHTML = '';
      const recent = data.history.slice(0, 8);
      recent.forEach(h => {
        const game = gameData.find(g => g.id === h.gameId);
        if (!game) return;
        const stars = '⭐'.repeat(h.stars || 1) + '☆'.repeat(3 - (h.stars || 1));
        const timeAgo = getTimeAgo(h.timestamp);
        const a = document.createElement('a');
        a.className = 'recent-item';
        a.href = game.path;
        a.innerHTML = `
          <span class="ri-icon">${game.icon}</span>
          <span class="ri-info">
            <span class="ri-name">${game.title}</span>
            <span class="ri-stars">${stars}</span>
            <span class="ri-time">${timeAgo}</span>
          </span>`;
        recentList.appendChild(a);
      });
    } else {
      recentSection.style.display = 'none';
    }

    // 뱃지
    const badgeGrid = document.getElementById('badgeGrid');
    badgeGrid.innerHTML = '';
    const stats = {
      totalStars: data.totalStars,
      totalGames: data.totalGames,
      streak: data.streak,
      todayCount,
      areasPlayed: getAreasPlayed(data)
    };
    let earnedCount = 0;

    BADGE_DEFS.forEach(bd => {
      const earned = data.badges.includes(bd.id);
      if (earned) earnedCount++;
      const div = document.createElement('div');
      div.className = `badge-item${earned ? '' : ' locked'}`;
      div.innerHTML = `
        ${bd.icon}
        ${earned ? '<span class="badge-check">✓</span>' : ''}
        <span class="badge-tooltip">${earned ? bd.name : '???'}</span>`;
      badgeGrid.appendChild(div);
    });
    document.getElementById('badgeCount').textContent = earnedCount;

    // 새로운 뱃지 획득 체크
    checkNewBadges(data, stats);
  }

  function checkNewBadges(data, stats) {
    const newBadges = [];
    BADGE_DEFS.forEach(bd => {
      if (!data.badges.includes(bd.id) && bd.condition(stats)) {
        data.badges.push(bd.id);
        newBadges.push(bd);
      }
    });
    if (newBadges.length > 0) {
      saveRewardData(data);
      showMilestone(newBadges[0]);
    }
  }

  function showMilestone(badge) {
    document.getElementById('mcIcon').textContent = badge.icon;
    document.getElementById('mcTitle').textContent = '뱃지 획득! ' + badge.name;
    document.getElementById('mcDesc').textContent = badge.desc;
    document.getElementById('milestoneOverlay').classList.add('show');
  }

  function closeMilestone() {
    document.getElementById('milestoneOverlay').classList.remove('show');
    renderRewardDashboard();
  }

  function getTimeAgo(ts) {
    const diff = Date.now() - ts;
    const min = Math.floor(diff / 60000);
    if (min < 1) return '방금 전';
    if (min < 60) return min + '분 전';
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + '시간 전';
    const day = Math.floor(hr / 24);
    return day + '일 전';
  }

  // ─── 학부모 대시보드 ───
  const parentToggle = document.getElementById('parentToggle');
  const parentPanel = document.getElementById('parentPanel');
  const parentClose = document.getElementById('parentClose');

  parentToggle.addEventListener('click', () => {
    renderParentDashboard();
    parentPanel.classList.add('show');
  });
  parentClose.addEventListener('click', () => parentPanel.classList.remove('show'));
  parentPanel.addEventListener('click', (e) => {
    if (e.target === parentPanel) parentPanel.classList.remove('show');
  });

  function renderParentDashboard() {
    const data = getRewardData();
    const todayCount = getTodayCount(data);
    const today = new Date().toISOString().slice(0, 10);

    // 이번 주 플레이 수
    const weekAgo = new Date();
    weekAgo.setDate(weekAgo.getDate() - 7);
    const weekStr = weekAgo.toISOString().slice(0, 10);
    const weekCount = data.history.filter(h => h.date >= weekStr).length;

    // 평균 별점
    const avgStars = data.history.length > 0
      ? (data.history.reduce((s, h) => s + (h.stars || 0), 0) / data.history.length).toFixed(1)
      : '0';

    // 가장 많이 한 게임
    const gameCounts = {};
    data.history.forEach(h => { gameCounts[h.gameId] = (gameCounts[h.gameId] || 0) + 1; });
    const topGameId = Object.keys(gameCounts).sort((a, b) => gameCounts[b] - gameCounts[a])[0];
    const topGame = topGameId ? (gameData.find(g => g.id === topGameId) || {}) : {};

    // 요약 카드
    document.getElementById('parentSummary').innerHTML = `
      <div class="ps-card"><div class="ps-val">${data.totalGames}</div><div class="ps-label">총 플레이 횟수</div></div>
      <div class="ps-card"><div class="ps-val">${data.totalStars}</div><div class="ps-label">총 획득 별</div></div>
      <div class="ps-card"><div class="ps-val">${todayCount}</div><div class="ps-label">오늘 플레이</div></div>
      <div class="ps-card"><div class="ps-val">${weekCount}</div><div class="ps-label">이번 주 플레이</div></div>
      <div class="ps-card"><div class="ps-val">${avgStars}</div><div class="ps-label">평균 별점</div></div>
      <div class="ps-card"><div class="ps-val">${data.streak}일</div><div class="ps-label">연속 출석</div></div>
      <div class="ps-card"><div class="ps-val">${topGame.title || '-'}</div><div class="ps-label">가장 좋아하는 게임</div></div>
      <div class="ps-card"><div class="ps-val">${data.badges.length}/${BADGE_DEFS.length}</div><div class="ps-label">뱃지 달성</div></div>
    `;

    // 영역별 차트
    const areaCounts = {};
    data.history.forEach(h => {
      if (h.area) areaCounts[h.area] = (areaCounts[h.area] || 0) + 1;
    });
    const maxArea = Math.max(...Object.values(areaCounts), 1);
    const areaLabels = { '기억력': '🧠', '관찰력': '👁️', '사고력': '💡', '루틴': '⏰' };

    let areaHTML = '<h4>영역별 활동 분포</h4>';
    ['기억력', '관찰력', '사고력', '루틴'].forEach(area => {
      const count = areaCounts[area] || 0;
      const pct = Math.round((count / maxArea) * 100);
      areaHTML += `
        <div class="area-bar-row">
          <span class="area-bar-label">${areaLabels[area] || ''} ${area}</span>
          <div class="area-bar-track"><div class="area-bar-fill" style="width:${pct}%"></div></div>
          <span class="area-bar-count">${count}회</span>
        </div>`;
    });
    document.getElementById('areaChart').innerHTML = areaHTML;

    // 최근 활동 로그
    const logContainer = document.getElementById('activityLog');
    if (data.history.length === 0) {
      logContainer.innerHTML = '<h4>최근 활동</h4><p style="color:#aaa;font-size:0.85rem;">아직 플레이 기록이 없어요.</p>';
      return;
    }

    let logHTML = '<h4>최근 활동 (최근 20개)</h4>';
    data.history.slice(0, 20).forEach(h => {
      const game = gameData.find(g => g.id === h.gameId);
      if (!game) return;
      const stars = '⭐'.repeat(h.stars || 1);
      const dateStr = h.date === today ? '오늘' : h.date;
      logHTML += `
        <div class="log-item">
          <span class="log-icon">${game.icon}</span>
          <span class="log-info">
            <div class="log-name">${game.title}</div>
            <div class="log-detail">${dateStr} · ${game.area}</div>
          </span>
          <span class="log-stars">${stars}</span>
        </div>`;
    });
    logContainer.innerHTML = logHTML;
  }

  // 초기 로드 시 실행
  init();
  renderRewardDashboard();
  updateMascotSpeech();
  loadMainBgm();
  syncMusicButton();
</script>

</body>
</html>
