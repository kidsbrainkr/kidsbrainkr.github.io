<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌈⭐ 쑥쑥 놀이터</title>
  <style>
    /* ============================================================
       CSS CUSTOM PROPERTIES
       ============================================================ */
    :root {
      --bg: #FFF8E1;
      --hero-start: #4FC3F7;
      --hero-mid: #7C4DFF;
      --hero-end: #FF6090;
      --age2: #FF6D00;
      --age3: #00C853;
      --age4: #2979FF;
      --age5: #AA00FF;
      --mixed: #FF6D00;
      --theme: #FF1744;
      --routine: #00BFA5;
      --card-radius: 24px;
      --font: 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background-color: var(--bg);
      background-image:
        radial-gradient(circle, rgba(255,105,135,0.18) 3px, transparent 3px),
        radial-gradient(circle, rgba(100,181,246,0.18) 3px, transparent 3px),
        radial-gradient(circle, rgba(255,213,79,0.15) 2px, transparent 2px),
        radial-gradient(circle, rgba(129,199,132,0.15) 2px, transparent 2px);
      background-size: 40px 40px, 60px 60px, 80px 80px, 50px 50px;
      background-position: 0 0, 30px 30px, 15px 45px, 55px 10px;
      min-height: 100vh;
      color: #333;
      overflow-x: hidden;
    }

    /* ============================================================
       KEYFRAMES
       ============================================================ */
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      30% { transform: translateY(-18px); }
      50% { transform: translateY(-6px); }
      70% { transform: translateY(-12px); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-16px) rotate(5deg); }
    }
    @keyframes popIn {
      0% { transform: scale(0.3); opacity: 0; }
      60% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); }
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-8deg); }
      75% { transform: rotate(8deg); }
    }
    @keyframes rainbow {
      0% { color: #FF1744; }
      16% { color: #FF6D00; }
      33% { color: #FFD600; }
      50% { color: #00C853; }
      66% { color: #2979FF; }
      83% { color: #AA00FF; }
      100% { color: #FF1744; }
    }
    @keyframes cloudMove {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(120vw); }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    @keyframes heroFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.03); }
    }
    @keyframes scrollArrow {
      0%, 100% { transform: translateY(0); opacity: 0.6; }
      50% { transform: translateY(12px); opacity: 1; }
    }
    @keyframes cardPop {
      0% { transform: scale(0.5) translateY(40px); opacity: 0; }
      60% { transform: scale(1.06) translateY(-5px); opacity: 1; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    @keyframes newPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,0,0.6); transform: scale(1); }
      50% { box-shadow: 0 0 0 8px rgba(255,255,0,0); transform: scale(1.08); }
    }
    @keyframes glowRing {
      0%, 100% { box-shadow: 0 0 0 4px rgba(255,255,255,0.5), 0 0 20px rgba(255,255,255,0.3); }
      50% { box-shadow: 0 0 0 8px rgba(255,255,255,0.7), 0 0 40px rgba(255,255,255,0.5); }
    }
    @keyframes mascotBounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-10px) rotate(-3deg); }
      75% { transform: translateY(-4px) rotate(3deg); }
    }
    @keyframes fadeUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes speechIn {
      from { opacity: 0; transform: translateX(-12px) scale(0.9); }
      to { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes milestoneIn {
      from { transform: scale(0.5) rotate(-5deg); opacity: 0; }
      to { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes sheetUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
      50% { opacity: 1; transform: scale(1) rotate(180deg); }
    }
    @keyframes balloonFloat {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-120vh) rotate(20deg); opacity: 0; }
    }

    /* ============================================================
       FLOATING BACKGROUND ELEMENTS
       ============================================================ */
    .bg-clouds {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .cloud {
      position: absolute;
      font-size: 3rem;
      opacity: 0.25;
      animation: cloudMove linear infinite;
    }
    .cloud:nth-child(1) { top: 8%; animation-duration: 30s; animation-delay: 0s; font-size: 5rem; opacity: 0.3; }
    .cloud:nth-child(2) { top: 22%; animation-duration: 40s; animation-delay: -8s; font-size: 4.5rem; opacity: 0.25; }
    .cloud:nth-child(3) { top: 45%; animation-duration: 35s; animation-delay: -18s; font-size: 4rem; }
    .cloud:nth-child(4) { top: 65%; animation-duration: 45s; animation-delay: -5s; font-size: 3.5rem; }
    .cloud:nth-child(5) { top: 85%; animation-duration: 38s; animation-delay: -12s; font-size: 4rem; opacity: 0.2; }
    .cloud:nth-child(6) { top: 35%; animation-duration: 50s; animation-delay: -25s; font-size: 3rem; opacity: 0.2; }

    .bg-stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-star {
      position: absolute;
      animation: twinkle ease-in-out infinite;
    }

    .bg-balloons {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .balloon {
      position: absolute;
      font-size: 2rem;
      animation: balloonFloat linear infinite;
    }

    /* ============================================================
       HERO SECTION (Full Viewport)
       ============================================================ */
    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--hero-start) 0%, var(--hero-mid) 50%, var(--hero-end) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 40px 20px 60px;
    }

    /* Hero floating decorations */
    .hero-deco {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .hero-deco .h-particle {
      position: absolute;
      font-size: 2.2rem;
      opacity: 0.4;
      animation: float var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    .hero-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 120px;
      height: 120px;
      border-radius: 999px;
      background: rgba(255,255,255,0.2);
      box-shadow: 0 0 0 6px rgba(255,255,255,0.15), 0 12px 40px rgba(0,0,0,0.15);
      backdrop-filter: blur(10px);
      animation: popIn 0.8s cubic-bezier(.4,0,.2,1), heroFloat 3s ease-in-out 0.8s infinite;
      position: relative;
      z-index: 2;
      margin-bottom: 12px;
    }
    .hero-logo svg { width: 80px; height: 80px; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.2)); }

    .hero h1 {
      font-size: 4.5rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 4px 4px 0 rgba(0,0,0,0.2), 0 0 40px rgba(255,255,255,0.4);
      letter-spacing: -2px;
      animation: fadeUp 0.6s ease-out 0.2s both;
      position: relative;
      z-index: 2;
      text-align: center;
      -webkit-text-stroke: 2px rgba(255,255,255,0.3);
    }
    .hero-subtitle {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.9);
      font-weight: 700;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
      animation: fadeUp 0.6s ease-out 0.35s both;
      position: relative;
      z-index: 2;
      margin-top: 8px;
    }

    /* Hero character images */
    .hero-characters {
      display: flex;
      gap: 24px;
      align-items: flex-end;
      margin-top: 32px;
      animation: fadeUp 0.6s ease-out 0.5s both;
      position: relative;
      z-index: 2;
    }
    .hero-char-img {
      width: 260px;
      height: 260px;
      object-fit: contain;
      filter: drop-shadow(0 12px 30px rgba(0,0,0,0.3));
      animation: bounce 2s ease-in-out infinite;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .hero-char-img:nth-child(1) { animation-delay: 0s; }
    .hero-char-img:nth-child(2) { animation-delay: 0.3s; width: 300px; height: 300px; }
    .hero-char-img:nth-child(3) { animation-delay: 0.6s; }
    .hero-char-img:hover { transform: scale(1.1) rotate(-5deg); }

    /* Scroll arrow */
    .scroll-arrow {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      font-size: 2rem;
      color: rgba(255,255,255,0.8);
      animation: scrollArrow 1.5s ease-in-out infinite;
      cursor: pointer;
    }

    /* ============================================================
       CHARACTER SELECTION BAR (Horizontal)
       ============================================================ */
    .character-bar {
      background: linear-gradient(135deg, #6A1B9A, #8E24AA, #AB47BC);
      padding: 16px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      position: relative;
      z-index: 10;
      box-shadow: 0 6px 24px rgba(106,27,154,0.3);
    }
    .char-btn {
      width: 200px;
      height: 230px;
      border: 4px solid rgba(255,255,255,0.3);
      border-radius: 28px;
      background: rgba(255,255,255,0.15);
      cursor: pointer;
      padding: 12px;
      transition: all 0.3s cubic-bezier(.4,0,.2,1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      position: relative;
      backdrop-filter: blur(8px);
    }
    .char-btn img {
      width: 160px;
      height: 160px;
      object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
      transition: transform 0.3s;
    }
    .char-btn span {
      font-size: 1.1rem;
      font-weight: 900;
      color: rgba(255,255,255,0.8);
      transition: color 0.25s;
    }
    .char-btn:hover {
      transform: scale(1.08);
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.25);
    }
    .char-btn:hover img { transform: scale(1.15) rotate(-5deg); }
    .char-btn.active {
      border-color: #fff;
      background: rgba(255,255,255,0.3);
      animation: glowRing 2s ease-in-out infinite;
    }
    .char-btn.active img { animation: bounce 1.5s ease-in-out infinite; }
    .char-btn.active span { color: #fff; font-weight: 900; }

    /* ============================================================
       STICKY FILTER BAR
       ============================================================ */
    .filter-section {
      background: linear-gradient(135deg, #FF6F00, #FFA000, #FFD600);
      padding: 14px 16px 12px;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 4px 20px rgba(255,111,0,0.25);
      transition: box-shadow 0.3s;
    }
    .filter-section.scrolled {
      box-shadow: 0 6px 30px rgba(255,111,0,0.35);
    }

    /* Tab bar */
    .tab-bar {
      display: flex;
      gap: 8px;
      padding: 4px 0 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      max-width: 1000px;
      margin: 0 auto;
      justify-content: center;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex: 0 0 auto;
      padding: 12px 22px;
      border: 3px solid rgba(255,255,255,0.5);
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 900;
      font-family: var(--font);
      cursor: pointer;
      background: rgba(255,255,255,0.35);
      color: #fff;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
      transition: all 0.25s cubic-bezier(.4,0,.2,1);
      white-space: nowrap;
      min-height: 50px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .tab-btn.active {
      transform: scale(1.08);
      border-color: #fff;
    }
    .tab-btn[data-tab="all"].active { background: #5B4FCF; box-shadow: 0 4px 20px rgba(91,79,207,0.5); }
    .tab-btn[data-tab="age2"].active { background: var(--age2); box-shadow: 0 4px 20px rgba(255,109,0,0.5); }
    .tab-btn[data-tab="age3"].active { background: var(--age3); box-shadow: 0 4px 20px rgba(0,200,83,0.5); }
    .tab-btn[data-tab="age4"].active { background: var(--age4); box-shadow: 0 4px 20px rgba(41,121,255,0.5); }
    .tab-btn[data-tab="age5"].active { background: var(--age5); box-shadow: 0 4px 20px rgba(170,0,255,0.5); }
    .tab-btn[data-tab="theme"].active { background: var(--theme); box-shadow: 0 4px 20px rgba(255,23,68,0.5); }
    .tab-btn[data-tab="mixed"].active { background: #FF6D00; box-shadow: 0 4px 20px rgba(255,109,0,0.5); }
    .tab-btn[data-tab="routine"].active { background: var(--routine); box-shadow: 0 4px 20px rgba(0,191,165,0.5); }
    .tab-btn:hover:not(.active) {
      transform: translateY(-2px) scale(1.03);
      background: rgba(255,255,255,0.5);
    }

    .tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      font-size: 0.7rem;
      font-weight: 900;
      background: rgba(255,255,255,0.35);
      border-radius: 99px;
      padding: 0 6px;
    }
    .tab-btn.active .tab-count {
      background: rgba(255,255,255,0.4);
    }

    /* Search */
    .search-container {
      max-width: 600px;
      margin: 0 auto 12px;
      position: relative;
    }
    .search-container input {
      width: 100%;
      padding: 14px 20px 14px 50px;
      border-radius: 999px;
      border: 3px solid rgba(255,255,255,0.6);
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 700;
      background: rgba(255,255,255,0.85);
      color: #333;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-container input::placeholder { color: #999; font-weight: 600; }
    .search-container input:focus {
      border-color: #fff;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.3);
    }
    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.3rem;
    }

    /* Sub filter buttons */
    .sub-filter-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      max-width: 1000px;
      margin: 0 auto;
    }
    .sub-filter-btn {
      padding: 10px 18px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.3);
      color: #fff;
      font-size: 0.88rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
    }
    .sub-filter-btn.active {
      background: rgba(255,255,255,0.85);
      color: #E65100;
      border-color: #fff;
      text-shadow: none;
      box-shadow: 0 3px 12px rgba(0,0,0,0.15);
    }
    .sub-filter-btn:hover:not(.active) {
      background: rgba(255,255,255,0.5);
      transform: translateY(-1px);
    }

    /* ============================================================
       GAME GRID
       ============================================================ */
    .content {
      padding: 20px 12px 52px;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    /* ============================================================
       GAME CARDS - Colored backgrounds!
       ============================================================ */
    .game-card {
      background: #5B4FCF;
      border-radius: var(--card-radius);
      box-shadow: 0 6px 24px rgba(0,0,0,0.15);
      padding: 24px 20px 20px;
      text-decoration: none;
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: transform 0.25s cubic-bezier(.4,0,.2,1), box-shadow 0.25s;
      position: relative;
      overflow: hidden;
      border: 4px solid rgba(255,255,255,0.3);
      animation: cardPop 0.5s cubic-bezier(.4,0,.2,1) both;
    }
    .game-card::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      pointer-events: none;
    }
    .game-card::after {
      content: '';
      position: absolute;
      bottom: -30px;
      left: -30px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      pointer-events: none;
    }
    .game-card:hover {
      transform: translateY(-8px) scale(1.04);
      box-shadow: 0 16px 40px rgba(0,0,0,0.25);
    }
    .game-card:active {
      transform: translateY(-2px) scale(0.98);
    }

    /* Card icon */
    .game-card .card-icon {
      font-size: 6rem;
      line-height: 1;
      text-align: center;
      display: block;
      margin: 4px auto 8px;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.2));
      transition: transform 0.3s;
    }
    .game-card:hover .card-icon {
      animation: wiggle 0.5s ease-in-out;
      transform: scale(1.1);
    }

    /* Card text */
    .game-card .card-name {
      font-size: 1.3rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
      text-align: center;
      letter-spacing: -0.5px;
    }
    .game-card .card-desc {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.75);
      line-height: 1.4;
      text-align: center;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Card meta */
    .game-card .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
      justify-content: center;
    }
    .game-card .card-tag {
      font-size: 0.75rem;
      font-weight: 800;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(255,255,255,0.25);
      color: #fff;
      display: inline-block;
    }
    .game-card .card-difficulty {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.7);
      letter-spacing: 1px;
    }
    .game-card .card-played {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.7);
    }

    /* Age-specific card colors */
    .game-card.age2 { background: linear-gradient(135deg, #FF6D00, #FF9100); }
    .game-card.age3 { background: linear-gradient(135deg, #00C853, #69F0AE); }
    .game-card.age4 { background: linear-gradient(135deg, #2979FF, #448AFF); }
    .game-card.age5 { background: linear-gradient(135deg, #AA00FF, #D500F9); }
    .game-card.theme { background: linear-gradient(135deg, #FF1744, #FF5252); }
    .game-card.mixed { background: linear-gradient(135deg, #FF6D00, #FFAB40); }
    .game-card.routine { background: linear-gradient(135deg, #00BFA5, #64FFDA); }

    /* Card hover glow per age */
    .game-card.age2:hover { box-shadow: 0 12px 40px rgba(255,109,0,0.4); }
    .game-card.age3:hover { box-shadow: 0 12px 40px rgba(0,200,83,0.4); }
    .game-card.age4:hover { box-shadow: 0 12px 40px rgba(41,121,255,0.4); }
    .game-card.age5:hover { box-shadow: 0 12px 40px rgba(170,0,255,0.4); }
    .game-card.theme:hover { box-shadow: 0 12px 40px rgba(255,23,68,0.4); }
    .game-card.mixed:hover { box-shadow: 0 12px 40px rgba(255,109,0,0.4); }
    .game-card.routine:hover { box-shadow: 0 12px 40px rgba(0,191,165,0.4); }

    /* NEW badge */
    .game-card .new-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: linear-gradient(135deg, #FFD600, #FFAB00);
      color: #333;
      font-size: 0.72rem;
      font-weight: 900;
      padding: 5px 14px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      animation: newPulse 1.5s ease-in-out infinite;
      z-index: 3;
      border: 2px solid rgba(255,255,255,0.5);
      text-shadow: none;
    }

    /* Teacher tip (hidden on cards, data preserved for parent dashboard) */
    .teacher-tip { display: none; }
    .tip-toggle { display: none; }

    /* ============================================================
       REWARD DASHBOARD
       ============================================================ */
    .reward-dashboard {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 0;
      position: relative;
      z-index: 1;
    }
    .reward-stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .reward-stat {
      flex: 1;
      min-width: 130px;
      background: linear-gradient(135deg, #FF6090, #FF80AB);
      border-radius: 22px;
      padding: 18px;
      text-align: center;
      box-shadow: 0 6px 20px rgba(255,96,144,0.3);
      border: 3px solid rgba(255,255,255,0.4);
      transition: transform 0.2s;
      color: #fff;
    }
    .reward-stat:nth-child(2) { background: linear-gradient(135deg, #7C4DFF, #B388FF); box-shadow: 0 6px 20px rgba(124,77,255,0.3); }
    .reward-stat:nth-child(3) { background: linear-gradient(135deg, #FF6D00, #FFAB40); box-shadow: 0 6px 20px rgba(255,109,0,0.3); }
    .reward-stat:nth-child(4) { background: linear-gradient(135deg, #00C853, #69F0AE); box-shadow: 0 6px 20px rgba(0,200,83,0.3); }
    .reward-stat:hover { transform: translateY(-4px) scale(1.03); }
    .reward-stat .stat-icon { font-size: 2.2rem; }
    .reward-stat .stat-value {
      font-size: 2rem;
      font-weight: 900;
      color: #fff;
      margin: 4px 0 2px;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.15);
    }
    .reward-stat .stat-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.85);
      font-weight: 700;
    }

    /* Recent plays */
    .recent-section { margin-top: 16px; margin-bottom: 8px; }
    .recent-header {
      font-size: 1rem;
      font-weight: 900;
      color: #5B4FCF;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-shadow: 1px 1px 0 rgba(91,79,207,0.1);
    }
    .recent-list {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: none;
    }
    .recent-list::-webkit-scrollbar { display: none; }
    .recent-item {
      flex: 0 0 auto;
      background: linear-gradient(135deg, #EDE7F6, #E8EAF6);
      border-radius: 18px;
      padding: 14px 18px;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 16px rgba(91,79,207,0.12);
      border: 2px solid rgba(91,79,207,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
      min-width: 190px;
    }
    .recent-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(91,79,207,0.2);
    }
    .recent-item .ri-icon { font-size: 2rem; }
    .recent-item .ri-info { display: flex; flex-direction: column; gap: 2px; }
    .recent-item .ri-name { font-size: 0.88rem; font-weight: 800; color: #333; }
    .recent-item .ri-stars { font-size: 0.8rem; }
    .recent-item .ri-time { font-size: 0.72rem; color: #aaa; }

    /* Badge collection */
    .badge-section { margin-top: 16px; }
    .badge-grid {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .badge-item {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      background: linear-gradient(135deg, #FFF8E1, #FFECB3);
      box-shadow: 0 4px 14px rgba(255,143,0,0.15);
      border: 2px solid rgba(255,143,0,0.15);
      position: relative;
      transition: transform 0.2s;
    }
    .badge-item:hover { transform: scale(1.15) rotate(-5deg); }
    .badge-item.locked {
      filter: grayscale(1) opacity(0.3);
    }
    .badge-item .badge-check {
      position: absolute;
      bottom: -3px;
      right: -3px;
      font-size: 0.7rem;
      background: #00C853;
      color: #fff;
      width: 18px;
      height: 18px;
      border-radius: 99px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #fff;
    }
    .badge-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      font-size: 0.72rem;
      padding: 5px 12px;
      border-radius: 10px;
      white-space: nowrap;
      z-index: 10;
    }
    .badge-item:hover .badge-tooltip { display: block; }

    /* ============================================================
       MASCOT
       ============================================================ */
    .mascot-container {
      position: fixed;
      bottom: 80px;
      left: 20px;
      z-index: 60;
      display: flex;
      align-items: flex-end;
      gap: 4px;
    }
    .mascot {
      width: 120px;
      height: 120px;
      position: relative;
      animation: mascotBounce 2.5s ease-in-out infinite;
      cursor: pointer;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.2));
    }
    .mascot img { width: 100%; height: 100%; object-fit: contain; }
    .mascot-speech {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #FFD600, #FFAB00);
      border-radius: 18px;
      padding: 10px 16px;
      font-size: 0.85rem;
      font-weight: 800;
      color: #333;
      box-shadow: 0 6px 20px rgba(255,171,0,0.3);
      white-space: nowrap;
      animation: speechIn 0.4s ease-out;
      z-index: 11;
      border: 3px solid rgba(255,255,255,0.5);
    }
    .mascot-speech::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 8px solid transparent;
      border-top-color: #FFAB00;
    }

    /* ============================================================
       MILESTONE OVERLAY
       ============================================================ */
    .milestone-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .milestone-overlay.show { display: flex; }
    .milestone-card {
      background: linear-gradient(135deg, #FFF8E1, #FFECB3);
      border-radius: 30px;
      padding: 44px 40px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
      animation: milestoneIn 0.5s cubic-bezier(.4,0,.2,1);
      max-width: 360px;
      border: 4px solid rgba(255,255,255,0.6);
    }
    .milestone-card .mc-icon { font-size: 5rem; margin-bottom: 14px; }
    .milestone-card .mc-title {
      font-size: 1.4rem;
      font-weight: 900;
      color: #FF6D00;
      margin-bottom: 8px;
      text-shadow: 1px 1px 0 rgba(255,109,0,0.1);
    }
    .milestone-card .mc-desc { font-size: 0.92rem; color: #666; margin-bottom: 22px; line-height: 1.6; }
    .milestone-card .mc-btn {
      background: linear-gradient(135deg, #FF6090, #FF1744);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      font-family: var(--font);
      box-shadow: 0 6px 20px rgba(255,23,68,0.35);
      border: 3px solid rgba(255,255,255,0.4);
      transition: transform 0.2s;
    }
    .milestone-card .mc-btn:hover { transform: scale(1.05); }

    /* ============================================================
       PARENT DASHBOARD
       ============================================================ */
    .parent-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(135deg, #5B4FCF, #7C4DFF);
      color: #fff;
      border: 3px solid rgba(255,255,255,0.4);
      border-radius: 999px;
      width: 56px;
      height: 56px;
      font-size: 1.4rem;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(91,79,207,0.4);
      z-index: 100;
      transition: transform 0.2s;
      font-family: var(--font);
    }
    .parent-toggle:hover { transform: scale(1.12); }

    .parent-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9998;
      justify-content: center;
      align-items: flex-end;
    }
    .parent-panel.show { display: flex; }
    .parent-sheet {
      background: #fff;
      border-radius: 28px 28px 0 0;
      width: 100%;
      max-width: 640px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 30px 26px 44px;
      animation: sheetUp 0.35s ease-out;
    }
    .parent-sheet h3 {
      font-size: 1.2rem;
      font-weight: 900;
      color: #333;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .parent-sheet .close-btn {
      margin-left: auto;
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: #999;
    }
    .parent-summary {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .ps-card {
      background: linear-gradient(135deg, #EDE7F6, #E8EAF6);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      border: 2px solid rgba(91,79,207,0.08);
    }
    .ps-card .ps-val { font-size: 1.4rem; font-weight: 900; color: #5B4FCF; }
    .ps-card .ps-label { font-size: 0.75rem; color: #888; margin-top: 4px; font-weight: 600; }
    .activity-log { margin-top: 8px; }
    .activity-log h4 { font-size: 0.95rem; font-weight: 900; color: #555; margin-bottom: 10px; }
    .log-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.85rem;
    }
    .log-item .log-icon { font-size: 1.5rem; }
    .log-item .log-info { flex: 1; }
    .log-item .log-name { font-weight: 800; color: #333; }
    .log-item .log-detail { font-size: 0.75rem; color: #999; margin-top: 2px; }
    .log-item .log-stars { font-size: 0.8rem; }
    .area-chart { margin-top: 16px; }
    .area-chart h4 { font-size: 0.95rem; font-weight: 900; color: #555; margin-bottom: 10px; }
    .area-bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .area-bar-label { font-size: 0.82rem; font-weight: 800; color: #555; min-width: 65px; }
    .area-bar-track {
      flex: 1;
      height: 14px;
      background: #EDE7F6;
      border-radius: 99px;
      overflow: hidden;
    }
    .area-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #7C4DFF, #B388FF);
      transition: width 0.5s ease;
    }
    .area-bar-count { font-size: 0.75rem; color: #999; min-width: 35px; text-align: right; }

    /* ============================================================
       BGM FLOATING BUTTON
       ============================================================ */
    .bgm-float-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      background: linear-gradient(135deg, #7C4DFF, #B388FF);
      color: #fff;
      border: 3px solid rgba(255,255,255,0.4);
      border-radius: 999px;
      width: 52px;
      height: 52px;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(124,77,255,0.4);
      transition: transform 0.2s;
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bgm-float-btn:hover { transform: scale(1.1); }
    .bgm-float-btn.off { background: linear-gradient(135deg, #9E9E9E, #BDBDBD); box-shadow: 0 6px 20px rgba(158,158,158,0.3); }

    .bgm-panel {
      display: none;
      position: fixed;
      top: 80px;
      right: 20px;
      z-index: 100;
      background: linear-gradient(135deg, #7C4DFF, #9C27B0);
      border-radius: 22px;
      padding: 18px 20px;
      box-shadow: 0 10px 40px rgba(124,77,255,0.4);
      border: 3px solid rgba(255,255,255,0.3);
      animation: popIn 0.3s ease-out;
    }
    .bgm-panel.show { display: block; }
    .bgm-panel-title {
      font-size: 0.85rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 10px;
      text-align: center;
    }
    .bgm-style-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .hero-music-style {
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.78rem;
      font-weight: 800;
      font-family: var(--font);
      cursor: pointer;
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.15);
      transition: all 0.2s;
    }
    .hero-music-style.active {
      color: #333;
      background: rgba(255,255,255,0.9);
      border-color: #fff;
    }
    .hero-music-style:hover:not(.active) { background: rgba(255,255,255,0.3); }
    .volume-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .volume-row label {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.8);
    }
    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100px;
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.3);
      outline: none;
      flex: 1;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      cursor: pointer;
    }
    .volume-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      cursor: pointer;
      border: none;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 600px) {
      .hero { min-height: 60vh; padding: 30px 16px 50px; }
      .hero h1 { font-size: 2.8rem; -webkit-text-stroke: 1px rgba(255,255,255,0.3); }
      .hero-subtitle { font-size: 1rem; }
      .hero-characters { gap: 8px; }
      .hero-char-img { width: 140px; height: 140px; }
      .hero-char-img:nth-child(2) { width: 170px; height: 170px; }

      .character-bar {
        gap: 10px;
        padding: 12px 16px;
      }
      .char-btn { width: 140px; height: 170px; }
      .char-btn img { width: 110px; height: 110px; }

      .tab-btn { font-size: 0.82rem; padding: 10px 16px; min-height: 42px; }
      .game-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .game-card { padding: 18px 14px 16px; }
      .game-card .card-icon { font-size: 4rem; }
      .game-card .card-name { font-size: 1rem; }
      .game-card .card-desc { font-size: 0.78rem; }

      .reward-stats { gap: 8px; }
      .reward-stat { min-width: 100px; padding: 14px 10px; }
      .reward-stat .stat-icon { font-size: 1.6rem; }
      .reward-stat .stat-value { font-size: 1.5rem; }
      .recent-item { min-width: 160px; }
      .badge-item { width: 48px; height: 48px; font-size: 1.4rem; }

      .mascot-container { bottom: 70px; left: 10px; }
      .mascot { width: 80px; height: 80px; }
      .mascot-speech { font-size: 0.72rem; padding: 7px 12px; }
    }

    @media (min-width: 601px) and (max-width: 768px) {
      .hero h1 { font-size: 2.8rem; }
      .game-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .hero-char-img { width: 140px; height: 140px; }
      .hero-char-img:nth-child(2) { width: 160px; height: 160px; }
    }

    @media (max-width: 340px) {
      .game-grid { grid-template-columns: 1fr; }
      .hero h1 { font-size: 1.8rem; }
      .character-bar { gap: 6px; }
      .char-btn { width: 110px; height: 140px; }
      .char-btn img { width: 85px; height: 85px; }
    }

    /* Section heading for game grid */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding: 0 2px;
    }
    .section-header .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
      color: #fff;
    }
    .section-header h2 {
      font-size: 1.3rem;
      font-weight: 900;
      color: #5B4FCF;
      text-shadow: 1px 1px 0 rgba(91,79,207,0.1);
    }
    .section-header p {
      font-size: 0.85rem;
      color: #888;
      margin-top: 2px;
    }
    .section-divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, #FFD600, #FF6090, #7C4DFF, transparent);
      margin: 28px 0;
      border-radius: 2px;
    }

    /* Routine info box */
    .routine-info {
      background: linear-gradient(135deg, #E0F7FA, #B2EBF2);
      border-radius: 22px;
      padding: 18px 20px;
      font-size: 0.88rem;
      color: #00695C;
      margin-bottom: 18px;
      line-height: 1.6;
      box-shadow: 0 6px 20px rgba(0,150,136,0.12);
      border: 2px solid rgba(0,150,136,0.15);
    }
    .routine-info strong { font-weight: 900; }

    /* Empty state */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 40px;
      color: #888;
    }
    .empty-state .empty-icon { font-size: 4rem; margin-bottom: 16px; }
  </style>
</head>
<body>

<!-- ============================================================
     FLOATING BACKGROUND ELEMENTS
     ============================================================ -->
<div class="bg-clouds">
  <div class="cloud">☁️</div>
  <div class="cloud">☁️</div>
  <div class="cloud">⛅</div>
  <div class="cloud">☁️</div>
  <div class="cloud">☁️</div>
  <div class="cloud">⛅</div>
</div>
<div class="bg-stars" id="bgStars"></div>
<div class="bg-balloons" id="bgBalloons"></div>

<!-- ============================================================
     HERO SECTION (Full Viewport)
     ============================================================ -->
<section class="hero">
  <div class="hero-deco" id="heroParticles"></div>

  <div class="hero-logo">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#FFF176"/>
          <stop offset="100%" style="stop-color:#FFD54F"/>
        </linearGradient>
        <linearGradient id="rainbowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#FF8A65"/>
          <stop offset="50%" style="stop-color:#FFD54F"/>
          <stop offset="100%" style="stop-color:#81D4FA"/>
        </linearGradient>
      </defs>
      <polygon points="50,5 58,35 90,35 64,52 74,82 50,64 26,82 36,52 10,35 42,35" fill="url(#starGrad)" opacity="0.95">
        <animateTransform attributeName="transform" type="rotate" values="0 50 50;5 50 50;0 50 50;-5 50 50;0 50 50" dur="5s" repeatCount="indefinite"/>
      </polygon>
      <circle cx="22" cy="20" r="2.5" fill="#fff" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="78" cy="18" r="2" fill="#fff" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="85" cy="60" r="1.8" fill="#fff" opacity="0.7">
        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <path d="M12 88 Q50 65 88 88" fill="none" stroke="#EF5350" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
      <path d="M16 92 Q50 70 84 92" fill="none" stroke="#FFA726" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
      <path d="M20 96 Q50 75 80 96" fill="none" stroke="#66BB6A" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
      <path d="M40 45 Q43 40 46 45" fill="none" stroke="#E65100" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M54 45 Q57 40 60 45" fill="none" stroke="#E65100" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M44 52 Q50 58 56 52" fill="none" stroke="#E65100" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>

  <h1>🌈⭐ 쑥쑥 놀이터</h1>
  <p class="hero-subtitle">어린이집 · 유치원 선생님을 위한 놀이 게임 모음</p>

  <div class="hero-characters">
    <img class="hero-char-img" src="assets/characters/fairy_profile.png" alt="별이" onclick="selectCharacter('fairy')">
    <img class="hero-char-img" src="assets/characters/robot_profile.png" alt="볼트" onclick="selectCharacter('robot')">
    <img class="hero-char-img" src="assets/characters/dino_profile.png" alt="꾸미" onclick="selectCharacter('dino')">
  </div>

  <div class="scroll-arrow" onclick="document.getElementById('characterBar').scrollIntoView({behavior:'smooth'})">⬇️</div>
</section>

<!-- ============================================================
     CHARACTER SELECTION BAR (Horizontal)
     ============================================================ -->
<div class="character-bar" id="characterBar">
  <button class="char-btn active" data-char="fairy" title="별이와 놀기!" onclick="selectCharacter('fairy')">
    <img src="assets/characters/fairy_profile.png" alt="별이">

    currentCharacter = charId;
    localStorage.setItem('selectedCharacter', charId);

  function getThumbnailHtml(game) {
    const path = `assets/thumbnails/${currentCharacter}/${game.id}.png`;
    return `<div class="card-thumbnail" style="display:none;">

    </div>`;
  }

  window.addEventListener('scroll', () => {
    filterSection.classList.toggle('scrolled', window.scrollY > 200);
  }, { passive: true });

  // 탭별 게임 수 표시
  function updateTabCounts() {
    tabs.forEach(btn => {
      const tab = btn.dataset.tab;
      let count = 0;
      if (tab === 'all') count = gameData.length;
      else if (tab === 'age2') count = gameData.filter(g => g.age.includes(2)).length;
      else if (tab === 'age3') count = gameData.filter(g => g.age.includes(3)).length;
      else if (tab === 'age4') count = gameData.filter(g => g.age.includes(4)).length;
      else if (tab === 'age5') count = gameData.filter(g => g.age.includes(5)).length;
      else if (tab === 'theme') count = gameData.filter(g => g.isTheme).length;
      else if (tab === 'mixed') count = gameData.filter(g => g.age.includes(0) && !g.isTheme && g.area !== '루틴').length;
      else if (tab === 'routine') count = gameData.filter(g => g.area === '루틴').length;
      const existing = btn.querySelector('.tab-count');
      if (existing) existing.textContent = count;
      else btn.insertAdjacentHTML('beforeend', `<span class="tab-count">${count}</span>`);
    });
  }

  function debounce(fn, ms) {
    let timer;
    return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
  }

  const musicBtn = document.getElementById('musicBtn');
  const musicStyleButtons = document.querySelectorAll('.hero-music-style');
  const bgmAudio = document.getElementById('bgmAudio');

  let bgmEnabled = localStorage.getItem('bgmEnabled') !== 'false';

  const bgmSources = {

  });

  function fadeBgm(targetVol, duration, callback) {
    const steps = 20;
    const stepTime = duration / steps;
    const startVol = bgmAudio.volume;
    const diff = targetVol - startVol;
    let step = 0;
    const interval = setInterval(() => {
      step++;
      bgmAudio.volume = Math.max(0, Math.min(1, startVol + diff * (step / steps)));
      if (step >= steps) {
        clearInterval(interval);
        if (callback) callback();
      }
    }, stepTime);
  }

  /**
   * 초기화 함수: 인라인 데이터로 즉시 렌더링 (fetch 불필요)
   */
  function init() {
    gameData = GAMES_DATA;
    updateTabCounts();
    // 저장된 캐릭터 복원
    selectCharacter(currentCharacter);
    renderGames();
  }

  /**
   * 게임 목록 렌더링 함수: 현재 필터 상태에 따라 화면 업데이트
   */
  function renderGames() {
    gameContainer.innerHTML = ''; // 기존 목록 초기화

    // 복합 필터 로직 적용
    const filtered = gameData.filter(game => {
      // 1. 탭 필터 (검색 중에도 탭 필터 유지)
      let tabMatch = false;
      if (currentTab === 'all') tabMatch = true;
      else if (currentTab === 'age2') tabMatch = game.age.includes(2);
      else if (currentTab === 'age3') tabMatch = game.age.includes(3);
      else if (currentTab === 'age4') tabMatch = game.age.includes(4);
      else if (currentTab === 'age5') tabMatch = game.age.includes(5);
      else if (currentTab === 'theme') tabMatch = !!game.isTheme;
      else if (currentTab === 'mixed') tabMatch = game.age.includes(0) && !game.isTheme && game.area !== '루틴';
      else if (currentTab === 'routine') tabMatch = game.area === '루틴';

      // 2. 영역 필터 매칭
      const areaMatch = (currentArea === 'all') || (game.area === currentArea);

      // 3. 검색어 매칭 (대소문자 무시, 제목/설명/태그/영역 포함)
      const q = searchQuery.toLowerCase();
      const searchMatch = !q ||
                          game.title.toLowerCase().includes(q) ||
                          game.desc.toLowerCase().includes(q) ||
                          game.tag.toLowerCase().includes(q) ||
                          game.area.toLowerCase().includes(q);

      return tabMatch && areaMatch && searchMatch;
    });

    // 검색 결과가 없는 경우 안내 메시지 표시
    if (filtered.length === 0) {
      gameContainer.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🍎</div>
          찾으시는 조건의 게임이 아직 없어요.<br>
          <span style="font-size: 0.9rem;">검색어를 바꿔보거나 다른 연령대를 확인해 보세요!</span>
        </div>`;
      return;
    }

    // 필터링된 데이터를 바탕으로 카드 생성
    filtered.forEach((game, idx) => {
      // 연령/영역에 따른 카드 상단 색상 테마 결정
      const ageClass = game.age.includes(2) ? 'age2' :
                       game.age.includes(3) ? 'age3' :
                       game.age.includes(4) ? 'age4' :
                       game.age.includes(5) ? 'age5' :
                       game.isTheme ? 'theme' :
                       game.area === '루틴' ? 'routine' : 'mixed';

      // 난이도 (연령 기반)
      const diffStars = game.age.includes(2) ? '★☆☆' :
                        game.age.includes(3) ? '★★☆' :
                        game.age.includes(5) ? '★★★' :
                        game.age.includes(4) ? '★★☆' : '★★☆';

      // 플레이 횟수 (보상 데이터에서 가져오기)
      const rData = getRewardData();
      const playCount = rData.history.filter(h => h.gameId === game.id).length;

      const card = document.createElement('a');
      card.className = `game-card ${ageClass}`;
      card.href = game.path;
      card.innerHTML = `
        ${game.isNew ? '<div class="new-badge">NEW</div>' : ''}
        <div class="card-icon">${game.icon}</div>
        <div class="card-name">${game.title}</div>
        <div class="card-desc">${game.desc}</div>
        <div class="card-meta">
          <div class="card-tag">${game.tag}</div>
          <div class="card-difficulty">${diffStars}</div>
          ${playCount > 0 ? `<div class="card-played">🎮 ${playCount}회</div>` : ''}
        </div>
        <div class="tip-toggle" onclick="event.preventDefault();this.nextElementSibling.classList.toggle('open')">💡 선생님 팁</div>
        <div class="teacher-tip">${game.tip}</div>
      `;

      // 순차 입장 애니메이션 딜레이
      card.style.animationDelay = (idx * 0.06) + 's';
      // 카드 클릭 시 사운드 + BGM 준비
      card.addEventListener('mouseenter', startMainBgm, { passive: true });
      card.addEventListener('click', () => { try { kbrSound.click(); } catch {} }, { passive: true });
      gameContainer.appendChild(card);
    });
  }

  // --- 이벤트 리스너 설정 ---

  // 연령 탭 클릭 이벤트
  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      tabs.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      renderGames();
      // 콘텐츠 영역으로 부드럽게 스크롤
      gameContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });

  // 영역별 서브 필터 버튼 클릭 이벤트
  areaBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      areaBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentArea = btn.dataset.area;
      renderGames();
    });
  });

  // 검색창 입력 이벤트 (디바운스 적용 — 300ms)
  const debouncedSearch = debounce(() => renderGames(), 300);
  searchInput.addEventListener('input', (e) => {
    searchQuery = e.target.value;
    debouncedSearch();
  });

  // --- BGM 제어 및 설정 유지 로직 ---

  /**
   * 음악 On/Off 버튼 상태 및 텍스트 업데이트
   */
  function syncMusicButton() {
    musicBtn.textContent = bgmEnabled ? '🎵' : '🔇';
    musicBtn.classList.toggle('off', !bgmEnabled);

    // 스타일 버튼들도 현재 선택된 스타일에 맞춰 활성화 표시
    musicStyleButtons.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.style === selectedMusicStyle);
    });
  }

  /**
   * 음악 파일 로드
   */
  function loadMainBgm() {
    bgmAudio.pause();
    bgmAudio.currentTime = 0;
    bgmAudio.src = bgmSources[selectedMusicStyle];
    bgmAudio.volume = bgmVolume;
    bgmAudio.load();
  }

  /**
   * 배경음악 재생 시작
   */
  function startMainBgm() {
    if (!bgmEnabled) return;
    if (bgmStarted) return;

    bgmStarted = true;
    bgmAudio.volume = 0;
    bgmAudio.play().then(() => {
      fadeBgm(bgmVolume, 800);
    }).catch(() => {
      bgmStarted = false;
    });
  }

  // BGM floating button: toggle panel + on/off
  let bgmPanelOpen = false;
  musicBtn.addEventListener('click', () => {
    const panel = document.getElementById('bgmPanel');
    bgmPanelOpen = !bgmPanelOpen;
    panel.classList.toggle('show', bgmPanelOpen);
  });

  // Close BGM panel when clicking outside
  document.addEventListener('click', (e) => {
    const panel = document.getElementById('bgmPanel');
    if (bgmPanelOpen && !panel.contains(e.target) && e.target !== musicBtn) {
      bgmPanelOpen = false;
      panel.classList.remove('show');
    }
  });

  // BGM on/off via double-click on the floating button
  musicBtn.addEventListener('dblclick', (e) => {
    e.preventDefault();
    bgmEnabled = !bgmEnabled;
    localStorage.setItem('bgmEnabled', bgmEnabled);
    syncMusicButton();

    if (bgmEnabled) {
      bgmStarted = false;
      startMainBgm();
    } else {
      fadeBgm(0, 500, () => {
        bgmAudio.pause();
        bgmStarted = false;
      });
    }
  });

  // BGM 스타일(분위기) 변경 버튼 클릭 이벤트
  musicStyleButtons.forEach(button => {
    button.addEventListener('click', () => {
      selectedMusicStyle = button.dataset.style;
      localStorage.setItem('bgmStyle', selectedMusicStyle);
      musicStyleButtons.forEach(item => item.classList.toggle('active', item === button));

      if (bgmEnabled && bgmStarted) {
        fadeBgm(0, 400, () => {
          loadMainBgm();
          bgmStarted = false;
          startMainBgm();
        });
      } else {
        loadMainBgm();
        // Auto-start when selecting a style
        if (bgmEnabled) {
          bgmStarted = false;
          startMainBgm();
        }
      }
    });
  });

  // ─── 배경 장식 생성 ───

  // Hero particles
  (function() {
    const container = document.getElementById('heroParticles');
    const emojis = ['⭐','🌟','✨','💜','🎈','🎨','🎵','🌈','💡','🎯','🔮','🦋','💫','🎪','🎠','🍭'];
    for (let i = 0; i < 20; i++) {
      const el = document.createElement('span');
      el.className = 'h-particle';
      el.textContent = emojis[i % emojis.length];
      el.style.left = (3 + Math.random() * 94) + '%';
      el.style.top = (3 + Math.random() * 90) + '%';
      el.style.setProperty('--dur', (4 + Math.random() * 6) + 's');
      el.style.setProperty('--delay', (-Math.random() * 6) + 's');
      el.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
      container.appendChild(el);
    }
  })();

  // Background twinkling stars
  (function() {
    const container = document.getElementById('bgStars');
    const starEmojis = ['✨','🌟','⭐','💫'];
    for (let i = 0; i < 15; i++) {
      const el = document.createElement('span');
      el.className = 'bg-star';
      el.textContent = starEmojis[Math.floor(Math.random() * starEmojis.length)];
      el.style.left = (Math.random() * 100) + '%';
      el.style.top = (Math.random() * 100) + '%';
      el.style.fontSize = (0.6 + Math.random() * 1) + 'rem';
      el.style.animationDuration = (2 + Math.random() * 4) + 's';
      el.style.animationDelay = (-Math.random() * 4) + 's';
      container.appendChild(el);
    }
  })();

  // Background balloons
  (function() {
    const container = document.getElementById('bgBalloons');
    const balloonEmojis = ['🎈','🎈','🎈','🎈','🎈','🎈'];
    const colors = ['#FF1744','#FF6D00','#FFD600','#00C853','#2979FF','#AA00FF'];
    for (let i = 0; i < 6; i++) {
      const el = document.createElement('span');
      el.className = 'balloon';
      el.textContent = '🎈';
      el.style.left = (5 + Math.random() * 90) + '%';
      el.style.fontSize = (1.2 + Math.random() * 1.2) + 'rem';
      el.style.animationDuration = (15 + Math.random() * 20) + 's';
      el.style.animationDelay = (-Math.random() * 20) + 's';
      el.style.opacity = 0.3 + Math.random() * 0.3;
      container.appendChild(el);
    }
  })();

  // ─── 마스코트 대사 ───
  const MASCOT_GREETINGS = [
    '안녕! 오늘도 같이 놀자!', '오늘은 어떤 게임 할까?',
    '와! 또 왔구나! 반가워!', '오늘도 재미있게 놀자!',
    '오늘도 열심히 놀아보자!', '같이 재미있는 거 하자!',
    '같이 놀면 재미있어!', '어떤 게임이 좋을까?'
  ];
  const MASCOT_REWARD_MSGS = [
    '와! 별을 {n}개나 모았어!', '대단해! 벌써 {n}개!',
    '{n}개의 별이 반짝반짝!'
  ];

  function updateMascotSpeech() {
    const data = getRewardData();
    const speech = document.getElementById('mascotSpeech');
    const todayCount = getTodayCount(data);

    if (todayCount > 0 && data.totalStars > 0) {
      const msgs = MASCOT_REWARD_MSGS;
      speech.textContent = msgs[Math.floor(Math.random() * msgs.length)].replace('{n}', data.totalStars);
    } else {
      speech.textContent = MASCOT_GREETINGS[Math.floor(Math.random() * MASCOT_GREETINGS.length)];
    }
  }

  document.getElementById('mascot').addEventListener('click', () => {
    const speech = document.getElementById('mascotSpeech');
    speech.textContent = MASCOT_GREETINGS[Math.floor(Math.random() * MASCOT_GREETINGS.length)];
    speech.style.animation = 'none';
    speech.offsetHeight;
    speech.style.animation = 'speechIn 0.4s ease-out';
  });

  // ─── 보상 시스템 ───

  const BADGE_DEFS = [
    { id: 'first_game',   icon: '🌟', name: '첫 도전!',       desc: '첫 번째 게임을 완료했어요',      condition: s => s.totalGames >= 1 },
    { id: 'five_games',   icon: '🎯', name: '다섯 고개',      desc: '게임을 5번 완료했어요',          condition: s => s.totalGames >= 5 },
    { id: 'ten_games',    icon: '🏆', name: '열 번의 도전',    desc: '게임을 10번 완료했어요',         condition: s => s.totalGames >= 10 },
    { id: 'twenty_games', icon: '👑', name: '스무 번 영웅',    desc: '게임을 20번 완료했어요',         condition: s => s.totalGames >= 20 },
    { id: 'fifty_games',  icon: '💎', name: '반짝반짝 보석',   desc: '게임을 50번 완료했어요',         condition: s => s.totalGames >= 50 },
    { id: 'star_10',      icon: '⭐', name: '별 10개',         desc: '별을 10개 모았어요',            condition: s => s.totalStars >= 10 },
    { id: 'star_50',      icon: '🌠', name: '별 50개',         desc: '별을 50개 모았어요',            condition: s => s.totalStars >= 50 },
    { id: 'star_100',     icon: '🌌', name: '별 100개',        desc: '별을 100개 모았어요',           condition: s => s.totalStars >= 100 },
    { id: 'streak_3',     icon: '🔥', name: '3일 연속!',       desc: '3일 연속 놀러 왔어요',          condition: s => s.streak >= 3 },
    { id: 'streak_7',     icon: '🌈', name: '일주일 연속!',    desc: '7일 연속 놀러 왔어요',          condition: s => s.streak >= 7 },
    { id: 'all_areas',    icon: '🧩', name: '골고루 박사',     desc: '모든 영역 게임을 해봤어요',      condition: s => s.areasPlayed && s.areasPlayed.size >= 4 },
    { id: 'today_3',      icon: '💪', name: '오늘의 챔피언',   desc: '하루에 게임 3개를 완료했어요',    condition: s => s.todayCount >= 3 },
  ];

  function getRewardData() {
    try {
      return JSON.parse(localStorage.getItem('kbr.rewards') || 'null') || {
        totalStars: 0, totalGames: 0, badges: [],
        history: [], streak: 0, lastDate: null
      };
    } catch { return { totalStars: 0, totalGames: 0, badges: [], history: [], streak: 0, lastDate: null }; }
  }

  function saveRewardData(data) {
    try { localStorage.setItem('kbr.rewards', JSON.stringify(data)); } catch {}
  }

  function updateStreak(data) {
    const today = new Date().toISOString().slice(0, 10);
    if (data.lastDate === today) return;

    if (data.lastDate) {
      const last = new Date(data.lastDate);
      const now = new Date(today);
      const diff = Math.floor((now - last) / 86400000);
      data.streak = diff === 1 ? data.streak + 1 : 1;
    } else {
      data.streak = 1;
    }
    data.lastDate = today;
    saveRewardData(data);
  }

  function getTodayCount(data) {
    const today = new Date().toISOString().slice(0, 10);
    return data.history.filter(h => h.date === today).length;
  }

  function getAreasPlayed(data) {
    return new Set(data.history.map(h => h.area).filter(Boolean));
  }

  function renderRewardDashboard() {
    const data = getRewardData();
    updateStreak(data);
    const todayCount = getTodayCount(data);

    document.getElementById('totalStars').textContent = data.totalStars;
    document.getElementById('todayCount').textContent = todayCount;
    document.getElementById('streakCount').textContent = data.streak;

    // 최근 플레이
    const recentSection = document.getElementById('recentSection');
    const recentList = document.getElementById('recentList');
    if (data.history.length > 0) {
      recentSection.style.display = 'block';
      recentList.innerHTML = '';
      const recent = data.history.slice(0, 8);
      recent.forEach(h => {
        const game = gameData.find(g => g.id === h.gameId);
        if (!game) return;
        const stars = '⭐'.repeat(h.stars || 1) + '☆'.repeat(3 - (h.stars || 1));
        const timeAgo = getTimeAgo(h.timestamp);
        const a = document.createElement('a');
        a.className = 'recent-item';
        a.href = game.path;
        a.innerHTML = `
          <span class="ri-icon">${game.icon}</span>
          <span class="ri-info">
            <span class="ri-name">${game.title}</span>
            <span class="ri-stars">${stars}</span>
            <span class="ri-time">${timeAgo}</span>
          </span>`;
        recentList.appendChild(a);
      });
    } else {
      recentSection.style.display = 'none';
    }

    // 뱃지
    const badgeGrid = document.getElementById('badgeGrid');
    badgeGrid.innerHTML = '';
    const stats = {
      totalStars: data.totalStars,
      totalGames: data.totalGames,
      streak: data.streak,
      todayCount,
      areasPlayed: getAreasPlayed(data)
    };
    let earnedCount = 0;

    BADGE_DEFS.forEach(bd => {
      const earned = data.badges.includes(bd.id);
      if (earned) earnedCount++;
      const div = document.createElement('div');
      div.className = `badge-item${earned ? '' : ' locked'}`;
      div.innerHTML = `
        ${bd.icon}
        ${earned ? '<span class="badge-check">✓</span>' : ''}
        <span class="badge-tooltip">${earned ? bd.name : '???'}</span>`;
      badgeGrid.appendChild(div);
    });
    document.getElementById('badgeCount').textContent = earnedCount;

    // 새로운 뱃지 획득 체크
    checkNewBadges(data, stats);
  }

  function checkNewBadges(data, stats) {
    const newBadges = [];
    BADGE_DEFS.forEach(bd => {
      if (!data.badges.includes(bd.id) && bd.condition(stats)) {
        data.badges.push(bd.id);
        newBadges.push(bd);
      }
    });
    if (newBadges.length > 0) {
      saveRewardData(data);
      showMilestone(newBadges[0]);
    }
  }

  function showMilestone(badge) {
    document.getElementById('mcIcon').textContent = badge.icon;
    document.getElementById('mcTitle').textContent = '뱃지 획득! ' + badge.name;
    document.getElementById('mcDesc').textContent = badge.desc;
    document.getElementById('milestoneOverlay').classList.add('show');
  }

  function closeMilestone() {
    document.getElementById('milestoneOverlay').classList.remove('show');
    renderRewardDashboard();
  }

  function getTimeAgo(ts) {
    const diff = Date.now() - ts;
    const min = Math.floor(diff / 60000);
    if (min < 1) return '방금 전';
    if (min < 60) return min + '분 전';
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + '시간 전';
    const day = Math.floor(hr / 24);
    return day + '일 전';
  }

  // ─── 학부모 대시보드 ───
  const parentToggle = document.getElementById('parentToggle');
  const parentPanel = document.getElementById('parentPanel');
  const parentClose = document.getElementById('parentClose');

  parentToggle.addEventListener('click', () => {
    renderParentDashboard();
    parentPanel.classList.add('show');
  });
  parentClose.addEventListener('click', () => parentPanel.classList.remove('show'));
  parentPanel.addEventListener('click', (e) => {
    if (e.target === parentPanel) parentPanel.classList.remove('show');
  });

  function renderParentDashboard() {
    const data = getRewardData();
    const todayCount = getTodayCount(data);
    const today = new Date().toISOString().slice(0, 10);

    // 이번 주 플레이 수
    const weekAgo = new Date();
    weekAgo.setDate(weekAgo.getDate() - 7);
    const weekStr = weekAgo.toISOString().slice(0, 10);
    const weekCount = data.history.filter(h => h.date >= weekStr).length;

    // 평균 별점
    const avgStars = data.history.length > 0
      ? (data.history.reduce((s, h) => s + (h.stars || 0), 0) / data.history.length).toFixed(1)
      : '0';

    // 가장 많이 한 게임
    const gameCounts = {};
    data.history.forEach(h => { gameCounts[h.gameId] = (gameCounts[h.gameId] || 0) + 1; });
    const topGameId = Object.keys(gameCounts).sort((a, b) => gameCounts[b] - gameCounts[a])[0];
    const topGame = topGameId ? (gameData.find(g => g.id === topGameId) || {}) : {};

    // 요약 카드
    document.getElementById('parentSummary').innerHTML = `
      <div class="ps-card"><div class="ps-val">${data.totalGames}</div><div class="ps-label">총 플레이 횟수</div></div>
      <div class="ps-card"><div class="ps-val">${data.totalStars}</div><div class="ps-label">총 획득 별</div></div>
      <div class="ps-card"><div class="ps-val">${todayCount}</div><div class="ps-label">오늘 플레이</div></div>
      <div class="ps-card"><div class="ps-val">${weekCount}</div><div class="ps-label">이번 주 플레이</div></div>
      <div class="ps-card"><div class="ps-val">${avgStars}</div><div class="ps-label">평균 별점</div></div>
      <div class="ps-card"><div class="ps-val">${data.streak}일</div><div class="ps-label">연속 출석</div></div>
      <div class="ps-card"><div class="ps-val">${topGame.title || '-'}</div><div class="ps-label">가장 좋아하는 게임</div></div>
      <div class="ps-card"><div class="ps-val">${data.badges.length}/${BADGE_DEFS.length}</div><div class="ps-label">뱃지 달성</div></div>
    `;

    // 영역별 차트
    const areaCounts = {};
    data.history.forEach(h => {
      if (h.area) areaCounts[h.area] = (areaCounts[h.area] || 0) + 1;
    });
    const maxArea = Math.max(...Object.values(areaCounts), 1);
    const areaLabels = { '기억력': '💭', '관찰력': '👁️', '사고력': '💡', '청각': '👂', '언어': '📝', '창의력': '🎨', '순발력': '⚡', '전략': '♟️', '지식': '📚', '루틴': '⏰' };

    let areaHTML = '<h4>영역별 활동 분포</h4>';
    ['기억력', '관찰력', '사고력', '청각', '언어', '창의력', '순발력', '전략', '지식', '루틴'].forEach(area => {
      const count = areaCounts[area] || 0;
      const pct = Math.round((count / maxArea) * 100);
      areaHTML += `
        <div class="area-bar-row">
          <span class="area-bar-label">${areaLabels[area] || ''} ${area}</span>
          <div class="area-bar-track"><div class="area-bar-fill" style="width:${pct}%"></div></div>
          <span class="area-bar-count">${count}회</span>
        </div>`;
    });
    document.getElementById('areaChart').innerHTML = areaHTML;

    // 최근 활동 로그
    const logContainer = document.getElementById('activityLog');
    if (data.history.length === 0) {
      logContainer.innerHTML = '<h4>최근 활동</h4><p style="color:#aaa;font-size:0.85rem;">아직 플레이 기록이 없어요.</p>';
      return;
    }

    let logHTML = '<h4>최근 활동 (최근 20개)</h4>';
    data.history.slice(0, 20).forEach(h => {
      const game = gameData.find(g => g.id === h.gameId);
      if (!game) return;
      const stars = '⭐'.repeat(h.stars || 1);
      const dateStr = h.date === today ? '오늘' : h.date;
      logHTML += `
        <div class="log-item">
          <span class="log-icon">${game.icon}</span>
          <span class="log-info">
            <div class="log-name">${game.title}</div>
            <div class="log-detail">${dateStr} · ${game.area}</div>
          </span>
          <span class="log-stars">${stars}</span>
        </div>`;
    });
    logContainer.innerHTML = logHTML;
  }

  // 초기 로드 시 실행
  init();
  renderRewardDashboard();
  updateMascotSpeech();
  loadMainBgm();
  syncMusicButton();
</script>

</body>
</html>
