<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌈⭐ 두뇌 쑥쑥 놀이터</title>
  <style>
    :root {
      --bg: #F7F4FF;
      --header-bg: #5B4FCF;
      --header-text: #fff;
      --tab-active: #5B4FCF;
      --tab-inactive: #E0DBF7;
      --tab-text-active: #fff;
      --tab-text-inactive: #5B4FCF;
      --card-bg: #fff;
      --card-radius: 20px;
      --card-shadow: 0 4px 18px rgba(91,79,207,0.10);
      --card-shadow-hover: 0 8px 32px rgba(91,79,207,0.20);
      --badge-radius: 20px;
      --font: 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;

      /* 연령별 색상 */
      --age2: #FF7043;
      --age3: #43A047;
      --age4: #1E88E5;
      --age5: #8E24AA;
      --mixed: #F4511E;
      --theme: #6D4C41;
      --routine: #00897B;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background:
        radial-gradient(circle at top left, rgba(255, 214, 191, 0.45), transparent 28%),
        radial-gradient(circle at top right, rgba(170, 207, 255, 0.28), transparent 24%),
        linear-gradient(180deg, #f8f5ff 0%, #f3f0ff 100%);
      min-height: 100vh;
      color: #333;
    }

    /* ─── 헤더 ─── */
    header {
      background:
        radial-gradient(circle at 20% 80%, rgba(255,183,77,0.15), transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(129,212,250,0.15), transparent 40%),
        radial-gradient(circle at top center, rgba(255,255,255,0.2), transparent 28%),
        linear-gradient(135deg, #6558d9 0%, #5b4fcf 40%, #7c6cf0 70%, #9c8cff 100%);
      color: var(--header-text);
      text-align: center;
      padding: 44px 20px 38px;
      box-shadow: 0 18px 40px rgba(91,79,207,0.18);
      position: relative;
      overflow: hidden;
    }
    /* 헤더 배경 떠다니는 도형들 */
    header::before, header::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      opacity: 0.08;
      background: #fff;
    }
    header::before {
      width: 200px; height: 200px;
      top: -60px; left: -40px;
      animation: floatShape 8s ease-in-out infinite;
    }
    header::after {
      width: 150px; height: 150px;
      bottom: -40px; right: -30px;
      animation: floatShape 6s ease-in-out infinite reverse;
    }
    @keyframes floatShape {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -15px) scale(1.1); }
    }

    /* SVG 로고 */
    header .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 96px;
      height: 96px;
      border-radius: 999px;
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.1), 0 8px 32px rgba(0,0,0,0.1);
      backdrop-filter: blur(10px);
      animation: logoEntry 0.8s cubic-bezier(.4,0,.2,1), logoPulse 3s ease-in-out 0.8s infinite;
      position: relative;
      z-index: 1;
    }
    .logo svg { width: 64px; height: 64px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15)); }
    @keyframes logoEntry {
      from { transform: scale(0) rotate(-180deg); opacity: 0; }
      to { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(255,255,255,0.1), 0 8px 32px rgba(0,0,0,0.1); }
      50% { box-shadow: 0 0 0 8px rgba(255,255,255,0.15), 0 8px 32px rgba(0,0,0,0.1); }
    }

    header h1 {
      font-size: 2rem;
      font-weight: 900;
      margin: 14px 0 8px;
      letter-spacing: -0.7px;
      animation: fadeUp 0.6s ease-out 0.2s both;
      position: relative;
      z-index: 1;
    }
    header p {
      font-size: 0.95rem;
      opacity: 0.85;
      animation: fadeUp 0.6s ease-out 0.35s both;
      position: relative;
      z-index: 1;
    }
    @keyframes fadeUp {
      from { transform: translateY(16px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* 헤더 떠다니는 이모지 파티클 */
    .header-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .h-particle {
      position: absolute;
      font-size: 1.2rem;
      opacity: 0.2;
      animation: particleFloat var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
    }
    @keyframes particleFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.15; }
      50% { transform: translateY(-20px) rotate(180deg); opacity: 0.3; }
    }
    .hero-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 16px;
      animation: fadeUp 0.6s ease-out 0.5s both;
      position: relative;
      z-index: 1;
    }
    .hero-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.86rem;
      font-weight: 800;
      font-family: var(--font);
      cursor: pointer;
      color: #4c3fbc;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 10px 20px rgba(60,50,150,0.14);
      transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
    }
    .hero-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 26px rgba(60,50,150,0.18);
    }
    .hero-btn.music-on {
      color: #fff;
      background: linear-gradient(135deg, #8f8dff, #b388ff);
    }
    .hero-music-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 10px;
      animation: fadeUp 0.6s ease-out 0.65s both;
      position: relative;
      z-index: 1;
    }
    .hero-music-style {
      border: none;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 0.8rem;
      font-weight: 800;
      font-family: var(--font);
      cursor: pointer;
      color: #4c3fbc;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 10px 20px rgba(60,50,150,0.12);
    }
    .hero-music-style.active {
      color: #fff;
      background: linear-gradient(135deg, #8f8dff, #b388ff);
    }

    /* ─── 검색 및 서브 필터 ─── */
    .filter-section {
      background: rgba(255, 255, 255, 0.85);
      padding: 14px 16px 10px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(91,79,207,0.1);
      position: sticky;
      top: 0;
      z-index: 50;
      transition: box-shadow 0.3s;
    }
    .filter-section.scrolled {
      box-shadow: 0 4px 20px rgba(91,79,207,0.12);
    }
    .search-container {
      max-width: 600px;
      margin: 0 auto 16px;
      position: relative;
    }
    .search-container input {
      width: 100%;
      padding: 14px 20px 14px 46px;
      border-radius: 999px;
      border: 2px solid #E0DBF7;
      font-family: var(--font);
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .search-container input:focus {
      border-color: var(--header-bg);
      box-shadow: 0 0 0 4px rgba(91,79,207,0.1);
    }
    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      color: #999;
    }

    .sub-filter-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .sub-filter-btn {
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid #E0DBF7;
      background: #fff;
      color: #5B4FCF;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .sub-filter-btn.active {
      background: #5B4FCF;
      color: #fff;
      border-color: #5B4FCF;
    }
    .sub-filter-btn:hover:not(.active) {
      background: #F0EDFF;
    }

    /* ─── 선생님 팁 스타일 (접기/펼치기) ─── */
    .teacher-tip {
      margin-top: 8px;
      font-size: 0.74rem;
      color: #667866;
      line-height: 1.4;
      font-style: italic;
      background: #F9FFF9;
      padding: 0;
      border-radius: 8px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
    }
    .game-card:hover .teacher-tip,
    .game-card:focus-within .teacher-tip,
    .teacher-tip.open {
      max-height: 80px;
      padding: 8px;
    }
    .tip-toggle {
      font-size: 0.7rem;
      color: #aaa;
      cursor: pointer;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }
    .tip-toggle:hover { color: #5B4FCF; }
    @media (hover: none) {
      .teacher-tip { max-height: none; padding: 8px; }
      .tip-toggle { display: none; }
    }

    /* ─── 탭바 ─── */
    .tab-bar {
      display: flex;
      gap: 8px;
      padding: 10px 16px 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      max-width: 900px;
      margin: 0 auto;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex: 0 0 auto;
      padding: 8px 16px;
      border: none;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      background: var(--tab-inactive);
      color: var(--tab-text-inactive);
      transition: background 0.2s, color 0.2s, transform 0.18s, box-shadow 0.18s;
      white-space: nowrap;
    }
    .tab-btn.active {
      color: #fff;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }
    .tab-btn[data-tab="all"].active { background: var(--header-bg); }
    .tab-btn[data-tab="age2"].active { background: var(--age2); }
    .tab-btn[data-tab="age3"].active { background: var(--age3); }
    .tab-btn[data-tab="age4"].active { background: var(--age4); }
    .tab-btn[data-tab="age5"].active { background: var(--age5); }
    .tab-btn[data-tab="theme"].active { background: var(--theme); }
    .tab-btn[data-tab="mixed"].active { background: var(--mixed); }
    .tab-btn[data-tab="routine"].active { background: var(--routine); }
    .tab-btn:hover:not(.active) {
      transform: translateY(-1px);
      background: #D0CBF0;
    }

    /* ─── 콘텐츠 영역 ─── */
    .content {
      padding: 28px 16px 52px;
      max-width: 900px;
      margin: 0 auto;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ─── 섹션 헤더 ─── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding: 0 2px;
    }
    .section-header .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 14px;
      border-radius: var(--badge-radius);
      font-size: 0.78rem;
      font-weight: 700;
      color: #fff;
    }
    .section-header h2 {
      font-size: 1.25rem;
      font-weight: 800;
      color: #333;
    }
    .section-header p {
      font-size: 0.82rem;
      color: #888;
      margin-top: 2px;
    }

    /* ─── 게임 그리드 ─── */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    /* ─── 게임 카드 ─── */
    .game-card {
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.85), transparent 26%),
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,252,247,0.98));
      border-radius: var(--card-radius);
      box-shadow: var(--card-shadow);
      padding: 22px 20px 18px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: transform 0.22s cubic-bezier(.4,0,.2,1), box-shadow 0.22s;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.8);
    }
    .game-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 12px 36px rgba(91,79,207,0.22);
    }
    .game-card:active {
      transform: translateY(-2px) scale(0.98);
    }
    .game-card .card-icon {
      font-size: 2.4rem;
      line-height: 1;
      width: 58px;
      height: 58px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      background: rgba(255,255,255,0.82);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.9), 0 8px 18px rgba(0,0,0,0.06);
      transition: transform 0.22s;
    }
    .game-card:hover .card-icon {
      transform: scale(1.1) rotate(-5deg);
    }
    .game-card .card-name {
      font-size: 1.05rem;
      font-weight: 800;
      color: #222;
    }
    .game-card .card-desc {
      font-size: 0.82rem;
      color: #666;
      line-height: 1.55;
    }
    .game-card .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .game-card .card-tag {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      display: inline-block;
      width: fit-content;
    }
    .game-card .card-difficulty {
      font-size: 0.68rem;
      color: #bbb;
      letter-spacing: 1px;
    }
    .game-card .card-played {
      font-size: 0.65rem;
      color: #aaa;
      margin-left: auto;
    }
    /* 새 게임 뱃지 */
    .game-card .new-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      background: linear-gradient(135deg, #FF3B30, #FF6B6B);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      animation: newPulse 2s ease-in-out infinite;
    }
    @keyframes newPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,59,48,0.4); }
      50% { box-shadow: 0 0 0 6px rgba(255,59,48,0); }
    }
    /* 카드 입장 애니메이션 */
    @keyframes cardEntry {
      from { transform: translateY(24px) scale(0.95); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }
    .game-card {
      animation: cardEntry 0.4s cubic-bezier(.4,0,.2,1) both;
    }
    /* 색상 줄 */
    .game-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      border-radius: var(--card-radius) var(--card-radius) 0 0;
    }

    /* 연령별 색상 적용 */
    .age2 .card-tag { background: #FFF0EC; color: var(--age2); }
    .age2::before { background: var(--age2); }
    .age3 .card-tag { background: #E8F5E9; color: var(--age3); }
    .age3::before { background: var(--age3); }
    .age4 .card-tag { background: #E3F2FD; color: var(--age4); }
    .age4::before { background: var(--age4); }
    .age5 .card-tag { background: #F3E5F5; color: var(--age5); }
    .age5::before { background: var(--age5); }
    .mixed .card-tag { background: #FBE9E7; color: var(--mixed); }
    .mixed::before { background: var(--mixed); }
    .theme .card-tag { background: #EFEBE9; color: var(--theme); }
    .theme::before { background: var(--theme); }
    .routine .card-tag { background: #E0F2F1; color: var(--routine); }
    .routine::before { background: var(--routine); }

    /* ─── 볼륨 슬라이더 ─── */
    .volume-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
      margin-top: 8px;
      animation: fadeUp 0.6s ease-out 0.75s both;
      position: relative;
      z-index: 1;
    }
    .volume-row label {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.8);
      font-weight: 600;
    }
    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100px;
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.3);
      outline: none;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      cursor: pointer;
    }
    .volume-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      cursor: pointer;
      border: none;
    }

    /* ─── 루틴 섹션 설명 박스 ─── */
    .routine-info {
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.7), transparent 30%),
        linear-gradient(135deg, #daf5ee, #eefcf8);
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 0.85rem;
      color: #004D40;
      margin-bottom: 18px;
      line-height: 1.6;
      box-shadow: 0 10px 24px rgba(0,0,0,0.06);
    }
    .routine-info strong { font-weight: 800; }

    /* ─── 섹션 구분선 ─── */
    .section-divider {
      height: 1px;
      background: #E8E4FF;
      margin: 28px 0;
    }

    /* ─── 마스코트 캐릭터 ─── */
    .mascot-container {
      position: relative;
      display: flex;
      justify-content: center;
      margin: -28px auto 0;
      z-index: 10;
    }
    .mascot {
      width: 80px;
      height: 80px;
      position: relative;
      animation: mascotBounce 2s ease-in-out infinite;
      cursor: pointer;
      filter: drop-shadow(0 6px 12px rgba(91,79,207,0.2));
    }
    .mascot svg { width: 100%; height: 100%; }
    @keyframes mascotBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .mascot-speech {
      position: absolute;
      top: -10px;
      left: calc(50% + 44px);
      background: #fff;
      border-radius: 14px;
      padding: 8px 14px;
      font-size: 0.78rem;
      font-weight: 700;
      color: #5B4FCF;
      box-shadow: 0 4px 16px rgba(91,79,207,0.12);
      white-space: nowrap;
      animation: speechIn 0.3s ease-out;
      z-index: 11;
    }
    .mascot-speech::before {
      content: '';
      position: absolute;
      left: -8px;
      top: 50%;
      transform: translateY(-50%);
      border: 6px solid transparent;
      border-right-color: #fff;
    }
    @keyframes speechIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @media (max-width: 480px) {
      .mascot { width: 64px; height: 64px; }
      .mascot-speech { font-size: 0.7rem; padding: 6px 10px; left: calc(50% + 36px); }
    }

    /* ─── 보상 대시보드 ─── */
    .reward-dashboard {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px 0;
    }
    .reward-stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .reward-stat {
      flex: 1;
      min-width: 120px;
      background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,252,247,0.98));
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(91,79,207,0.08);
      border: 1px solid rgba(255,255,255,0.8);
      transition: transform 0.18s;
    }
    .reward-stat:hover { transform: translateY(-2px); }
    .reward-stat .stat-icon { font-size: 1.8rem; }
    .reward-stat .stat-value {
      font-size: 1.5rem;
      font-weight: 900;
      color: #5B4FCF;
      margin: 4px 0 2px;
    }
    .reward-stat .stat-label {
      font-size: 0.75rem;
      color: #888;
      font-weight: 600;
    }

    /* 최근 플레이 */
    .recent-section {
      margin-top: 16px;
      margin-bottom: 8px;
    }
    .recent-header {
      font-size: 0.92rem;
      font-weight: 800;
      color: #555;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .recent-list {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 8px;

      font-family: var(--font);

      to { transform: scale(1); opacity: 1; }
    }

    /* ─── 학부모 대시보드 ─── */
    .parent-toggle {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: linear-gradient(135deg, #6558d9, #786cf0);

      border: none;
      border-radius: 999px;

      height: 48px;

    .parent-panel {
      display: none;
      position: fixed;
      inset: 0;

    .area-chart { margin-top: 16px; }

    /* ─── 반응형 ─── */
    @media (max-width: 480px) {
      header { padding: 32px 16px 28px; }

    @media (min-width: 481px) and (max-width: 768px) {

</head>

<script>
  /**
   * KidsBrain Game Hub 메인 로직
   * 1. 데이터 로드: games.json에서 게임 목록을 가져옴
   * 2. 필터링: 선택된 연령 탭, 영역 버튼, 검색어에 따라 목록 필터링
   * 3. 렌더링: 필터링된 데이터를 바탕으로 게임 카드 HTML 동적 생성

  // BGM 페이드 인/아웃
  function fadeBgm(targetVol, duration, callback) {
    const steps = 20;
    const stepTime = duration / steps;
    const startVol = bgmAudio.volume;
    const diff = targetVol - startVol;
    let step = 0;
    const interval = setInterval(() => {
      step++;
      bgmAudio.volume = Math.max(0, Math.min(1, startVol + diff * (step / steps)));
      if (step >= steps) {
        clearInterval(interval);
        if (callback) callback();
      }
    }, stepTime);
  }

  /**
   * 초기화 함수: 인라인 데이터로 즉시 렌더링 (fetch 불필요)
   */
  function init() {
    gameData = GAMES_DATA;
    updateTabCounts();
    renderGames();
  }

  /**
   * 게임 목록 렌더링 함수: 현재 필터 상태에 따라 화면 업데이트
   */
  function renderGames() {
    gameContainer.innerHTML = ''; // 기존 목록 초기화
    
    // 복합 필터 로직 적용
    const filtered = gameData.filter(game => {
      // 1. 탭 필터 (검색 중에도 탭 필터 유지)
      let tabMatch = false;
      if (currentTab === 'all') tabMatch = true;
      else if (currentTab === 'age2') tabMatch = game.age.includes(2);
      else if (currentTab === 'age3') tabMatch = game.age.includes(3);
      else if (currentTab === 'age4') tabMatch = game.age.includes(4);
      else if (currentTab === 'age5') tabMatch = game.age.includes(5);
      else if (currentTab === 'theme') tabMatch = !!game.isTheme;
      else if (currentTab === 'mixed') tabMatch = game.age.includes(0) && !game.isTheme && game.area !== '루틴';
      else if (currentTab === 'routine') tabMatch = game.area === '루틴';

      // 2. 영역 필터 매칭
      const areaMatch = (currentArea === 'all') || (game.area === currentArea);

      // 3. 검색어 매칭 (대소문자 무시, 제목/설명/태그/영역 포함)
      const q = searchQuery.toLowerCase();
      const searchMatch = !q ||
                          game.title.toLowerCase().includes(q) ||
                          game.desc.toLowerCase().includes(q) ||
                          game.tag.toLowerCase().includes(q) ||
                          game.area.toLowerCase().includes(q);

      return tabMatch && areaMatch && searchMatch;
    });

    // 검색 결과가 없는 경우 안내 메시지 표시
    if (filtered.length === 0) {
      gameContainer.innerHTML = `
        <div style="grid-column: 1/-1; text-align: center; padding: 60px 40px; color: #888;">
          <div style="font-size: 3rem; margin-bottom: 20px;">🍎</div>
          찾으시는 조건의 게임이 아직 없어요.<br>
          <span style="font-size: 0.9rem;">검색어를 바꿔보거나 다른 연령대를 확인해 보세요!</span>
        </div>`;
      return;
    }

    // 필터링된 데이터를 바탕으로 카드 생성
    filtered.forEach((game, idx) => {
      // 연령/영역에 따른 카드 상단 색상 테마 결정
      const ageClass = game.age.includes(2) ? 'age2' :
                       game.age.includes(3) ? 'age3' :
                       game.age.includes(4) ? 'age4' :
                       game.age.includes(5) ? 'age5' :
                       game.isTheme ? 'theme' :
                       game.area === '루틴' ? 'routine' : 'mixed';

      // 난이도 (연령 기반)
      const diffStars = game.age.includes(2) ? '★☆☆' :
                        game.age.includes(3) ? '★★☆' :
                        game.age.includes(5) ? '★★★' :
                        game.age.includes(4) ? '★★☆' : '★★☆';

      // 플레이 횟수 (보상 데이터에서 가져오기)
      const rData = getRewardData();
      const playCount = rData.history.filter(h => h.gameId === game.id).length;

      const card = document.createElement('a');
      card.className = `game-card ${ageClass}`;
      card.href = game.path;
      card.innerHTML = `
        ${game.isNew ? '<div class="new-badge">NEW</div>' : ''}
        <div class="card-icon">${game.icon}</div>
        <div class="card-name">${game.title}</div>
        <div class="card-desc">${game.desc}</div>
        <div class="card-meta">
          <div class="card-tag">${game.tag}</div>
          <div class="card-difficulty">${diffStars}</div>
          ${playCount > 0 ? `<div class="card-played">🎮 ${playCount}회</div>` : ''}
        </div>
        <div class="tip-toggle" onclick="event.preventDefault();this.nextElementSibling.classList.toggle('open')">💡 선생님 팁</div>
        <div class="teacher-tip">${game.tip}</div>
      `;
      
      // 순차 입장 애니메이션 딜레이
      card.style.animationDelay = (idx * 0.06) + 's';
      // 카드 클릭 시 사운드 + BGM 준비
      card.addEventListener('mouseenter', startMainBgm, { passive: true });
      card.addEventListener('click', () => { try { kbrSound.click(); } catch {} }, { passive: true });
      gameContainer.appendChild(card);
    });
  }

  // --- 이벤트 리스너 설정 ---

  // 연령 탭 클릭 이벤트
  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      tabs.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      renderGames();
      // 콘텐츠 영역으로 부드럽게 스크롤
      gameContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // 검색창 입력 이벤트 (디바운스 적용 — 300ms)
  const debouncedSearch = debounce(() => renderGames(), 300);

  // --- BGM 제어 및 설정 유지 로직 ---

  // 페이지 로드 시 로컬 스토리지에서 이전 설정 불러오기 (위에서 선언 및 초기화 완료)

  /**
   * 음악 On/Off 버튼 상태 및 텍스트 업데이트
   * 저장된 설정에 따라 버튼의 디자인과 텍스트를 동기화합니다.
   */
  function syncMusicButton() {
    musicBtn.textContent = bgmEnabled ? 'BGM 끄기' : 'BGM 켜기';
    musicBtn.classList.toggle('music-on', bgmEnabled);
    
    // 스타일 버튼들도 현재 선택된 스타일에 맞춰 활성화 표시
    musicStyleButtons.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.style === selectedMusicStyle);
    });
  }

  /**
   * 음악 파일 로드
   * 선택된 스타일(차분한 교실 등)에 맞는 오디오 소스를 설정합니다.
   */
  function loadMainBgm() {
    bgmAudio.pause();
    bgmAudio.currentTime = 0;
    bgmAudio.src = bgmSources[selectedMusicStyle];
    bgmAudio.volume = bgmVolume;
    bgmAudio.load();
  }

  /**
   * 배경음악 재생 시작
   * 사용자가 BGM을 켠 상태일 때만 재생을 시도합니다.
   */
  function startMainBgm() {
    if (!bgmEnabled) return;
    if (bgmStarted) return;

    bgmStarted = true;
    bgmAudio.volume = 0;
    bgmAudio.play().then(() => {
      fadeBgm(bgmVolume, 800);
    }).catch(() => {
      bgmStarted = false;
    });
  }

  // BGM On/Off 토글 버튼 클릭 이벤트
  musicBtn.addEventListener('click', () => {
    bgmEnabled = !bgmEnabled;
    localStorage.setItem('bgmEnabled', bgmEnabled);
    syncMusicButton();

    if (bgmEnabled) {
      bgmStarted = false;
      startMainBgm();
    } else {
      fadeBgm(0, 500, () => {
        bgmAudio.pause();
        bgmStarted = false;
      });
    }
  });

  // BGM 스타일(분위기) 변경 버튼 클릭 이벤트
  musicStyleButtons.forEach(button => {
    button.addEventListener('click', () => {
      selectedMusicStyle = button.dataset.style;
      localStorage.setItem('bgmStyle', selectedMusicStyle);
      musicStyleButtons.forEach(item => item.classList.toggle('active', item === button));

      if (bgmEnabled && bgmStarted) {
        // 페이드 아웃 → 곡 변경 → 페이드 인
        fadeBgm(0, 400, () => {
          loadMainBgm();
          bgmStarted = false;
          startMainBgm();
        });
      } else {
        loadMainBgm();
      }
    });
  });

  // ─── 헤더 파티클 생성 ───
  (function() {

  // ─── 마스코트 대사 ───
  const MASCOT_GREETINGS = [
    '안녕! 오늘도 같이 놀자!', '오늘은 어떤 게임 할까?',

    '뇌또리랑 놀면 똑똑해져!', '어떤 게임이 좋을까?'
  ];
  const MASCOT_REWARD_MSGS = [
    '와! 별을 {n}개나 모았어!', '대단해! 벌써 {n}개!',
    '{n}개의 별이 반짝반짝!'
  ];

  function updateMascotSpeech() {
    const data = getRewardData();
    const speech = document.getElementById('mascotSpeech');
    const todayCount = getTodayCount(data);

    if (todayCount > 0 && data.totalStars > 0) {
      const msgs = MASCOT_REWARD_MSGS;
      speech.textContent = msgs[Math.floor(Math.random() * msgs.length)].replace('{n}', data.totalStars);
    } else {
      speech.textContent = MASCOT_GREETINGS[Math.floor(Math.random() * MASCOT_GREETINGS.length)];
    }
  }

  document.getElementById('mascot').addEventListener('click', () => {
    const speech = document.getElementById('mascotSpeech');
    speech.textContent = MASCOT_GREETINGS[Math.floor(Math.random() * MASCOT_GREETINGS.length)];
    speech.style.animation = 'none';
    speech.offsetHeight;
    speech.style.animation = 'speechIn 0.3s ease-out';

  const BADGE_DEFS = [

  ];

  function getRewardData() {
    try {
      return JSON.parse(localStorage.getItem('kbr.rewards') || 'null') || {
        totalStars: 0, totalGames: 0, badges: [],
        history: [], streak: 0, lastDate: null
      };
    } catch { return { totalStars: 0, totalGames: 0, badges: [], history: [], streak: 0, lastDate: null }; }
  }

  function saveRewardData(data) {
    try { localStorage.setItem('kbr.rewards', JSON.stringify(data)); } catch {}
  }

  function updateStreak(data) {
    const today = new Date().toISOString().slice(0, 10);
    if (data.lastDate === today) return;

    if (data.lastDate) {
      const last = new Date(data.lastDate);
      const now = new Date(today);
      const diff = Math.floor((now - last) / 86400000);
      data.streak = diff === 1 ? data.streak + 1 : 1;
    } else {
      data.streak = 1;
    }
    data.lastDate = today;
    saveRewardData(data);
  }

  function getTodayCount(data) {
    const today = new Date().toISOString().slice(0, 10);
    return data.history.filter(h => h.date === today).length;
  }

  function getAreasPlayed(data) {
    return new Set(data.history.map(h => h.area).filter(Boolean));
  }

  function renderRewardDashboard() {
    const data = getRewardData();
    updateStreak(data);
    const todayCount = getTodayCount(data);

    document.getElementById('totalStars').textContent = data.totalStars;
    document.getElementById('todayCount').textContent = todayCount;
    document.getElementById('streakCount').textContent = data.streak;

    // 최근 플레이
    const recentSection = document.getElementById('recentSection');
    const recentList = document.getElementById('recentList');
    if (data.history.length > 0) {
      recentSection.style.display = 'block';
      recentList.innerHTML = '';
      const recent = data.history.slice(0, 8);
      recent.forEach(h => {
        const game = gameData.find(g => g.id === h.gameId);
        if (!game) return;
        const stars = '⭐'.repeat(h.stars || 1) + '☆'.repeat(3 - (h.stars || 1));
        const timeAgo = getTimeAgo(h.timestamp);
        const a = document.createElement('a');
        a.className = 'recent-item';
        a.href = game.path;
        a.innerHTML = `
          <span class="ri-icon">${game.icon}</span>
          <span class="ri-info">
            <span class="ri-name">${game.title}</span>
            <span class="ri-stars">${stars}</span>
            <span class="ri-time">${timeAgo}</span>
          </span>`;
        recentList.appendChild(a);
      });
    } else {
      recentSection.style.display = 'none';
    }

    // 뱃지
    const badgeGrid = document.getElementById('badgeGrid');
    badgeGrid.innerHTML = '';
    const stats = {
      totalStars: data.totalStars,
      totalGames: data.totalGames,
      streak: data.streak,
      todayCount,
      areasPlayed: getAreasPlayed(data)
    };
    let earnedCount = 0;

    BADGE_DEFS.forEach(bd => {
      const earned = data.badges.includes(bd.id);
      if (earned) earnedCount++;
      const div = document.createElement('div');
      div.className = `badge-item${earned ? '' : ' locked'}`;
      div.innerHTML = `
        ${bd.icon}
        ${earned ? '<span class="badge-check">✓</span>' : ''}
        <span class="badge-tooltip">${earned ? bd.name : '???'}</span>`;
      badgeGrid.appendChild(div);
    });
    document.getElementById('badgeCount').textContent = earnedCount;

    // 새로운 뱃지 획득 체크
    checkNewBadges(data, stats);
  }

  function checkNewBadges(data, stats) {
    const newBadges = [];
    BADGE_DEFS.forEach(bd => {
      if (!data.badges.includes(bd.id) && bd.condition(stats)) {
        data.badges.push(bd.id);
        newBadges.push(bd);
      }
    });
    if (newBadges.length > 0) {
      saveRewardData(data);
      showMilestone(newBadges[0]);
    }
  }

  function showMilestone(badge) {
    document.getElementById('mcIcon').textContent = badge.icon;
    document.getElementById('mcTitle').textContent = '뱃지 획득! ' + badge.name;
    document.getElementById('mcDesc').textContent = badge.desc;
    document.getElementById('milestoneOverlay').classList.add('show');
  }

  function closeMilestone() {
    document.getElementById('milestoneOverlay').classList.remove('show');
    renderRewardDashboard();
  }

  function getTimeAgo(ts) {
    const diff = Date.now() - ts;
    const min = Math.floor(diff / 60000);
    if (min < 1) return '방금 전';
    if (min < 60) return min + '분 전';
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + '시간 전';
    const day = Math.floor(hr / 24);
    return day + '일 전';
  }

  // ─── 학부모 대시보드 ───
  const parentToggle = document.getElementById('parentToggle');
  const parentPanel = document.getElementById('parentPanel');
  const parentClose = document.getElementById('parentClose');

  parentToggle.addEventListener('click', () => {
    renderParentDashboard();
    parentPanel.classList.add('show');
  });
  parentClose.addEventListener('click', () => parentPanel.classList.remove('show'));
  parentPanel.addEventListener('click', (e) => {
    if (e.target === parentPanel) parentPanel.classList.remove('show');
  });

  function renderParentDashboard() {
    const data = getRewardData();
    const todayCount = getTodayCount(data);
    const today = new Date().toISOString().slice(0, 10);

    // 이번 주 플레이 수
    const weekAgo = new Date();
    weekAgo.setDate(weekAgo.getDate() - 7);
    const weekStr = weekAgo.toISOString().slice(0, 10);
    const weekCount = data.history.filter(h => h.date >= weekStr).length;

    // 평균 별점
    const avgStars = data.history.length > 0
      ? (data.history.reduce((s, h) => s + (h.stars || 0), 0) / data.history.length).toFixed(1)
      : '0';

    // 가장 많이 한 게임
    const gameCounts = {};
    data.history.forEach(h => { gameCounts[h.gameId] = (gameCounts[h.gameId] || 0) + 1; });
    const topGameId = Object.keys(gameCounts).sort((a, b) => gameCounts[b] - gameCounts[a])[0];
    const topGame = topGameId ? (gameData.find(g => g.id === topGameId) || {}) : {};

    // 요약 카드
    document.getElementById('parentSummary').innerHTML = `
      <div class="ps-card"><div class="ps-val">${data.totalGames}</div><div class="ps-label">총 플레이 횟수</div></div>
      <div class="ps-card"><div class="ps-val">${data.totalStars}</div><div class="ps-label">총 획득 별</div></div>
      <div class="ps-card"><div class="ps-val">${todayCount}</div><div class="ps-label">오늘 플레이</div></div>
      <div class="ps-card"><div class="ps-val">${weekCount}</div><div class="ps-label">이번 주 플레이</div></div>
      <div class="ps-card"><div class="ps-val">${avgStars}</div><div class="ps-label">평균 별점</div></div>
      <div class="ps-card"><div class="ps-val">${data.streak}일</div><div class="ps-label">연속 출석</div></div>
      <div class="ps-card"><div class="ps-val">${topGame.title || '-'}</div><div class="ps-label">가장 좋아하는 게임</div></div>
      <div class="ps-card"><div class="ps-val">${data.badges.length}/${BADGE_DEFS.length}</div><div class="ps-label">뱃지 달성</div></div>
    `;

    // 영역별 차트
    const areaCounts = {};
    data.history.forEach(h => {
      if (h.area) areaCounts[h.area] = (areaCounts[h.area] || 0) + 1;
    });
    const maxArea = Math.max(...Object.values(areaCounts), 1);
    const areaLabels = { '기억력': '🧠', '관찰력': '👁️', '사고력': '💡', '청각': '👂', '언어': '📝', '창의력': '🎨', '순발력': '⚡', '전략': '♟️', '지식': '📚', '루틴': '⏰' };

    let areaHTML = '<h4>영역별 활동 분포</h4>';
    ['기억력', '관찰력', '사고력', '청각', '언어', '창의력', '순발력', '전략', '지식', '루틴'].forEach(area => {
      const count = areaCounts[area] || 0;
      const pct = Math.round((count / maxArea) * 100);
      areaHTML += `
        <div class="area-bar-row">
          <span class="area-bar-label">${areaLabels[area] || ''} ${area}</span>
          <div class="area-bar-track"><div class="area-bar-fill" style="width:${pct}%"></div></div>
          <span class="area-bar-count">${count}회</span>
        </div>`;
    });
    document.getElementById('areaChart').innerHTML = areaHTML;

    // 최근 활동 로그
    const logContainer = document.getElementById('activityLog');
    if (data.history.length === 0) {
      logContainer.innerHTML = '<h4>최근 활동</h4><p style="color:#aaa;font-size:0.85rem;">아직 플레이 기록이 없어요.</p>';
      return;
    }

    let logHTML = '<h4>최근 활동 (최근 20개)</h4>';
    data.history.slice(0, 20).forEach(h => {
      const game = gameData.find(g => g.id === h.gameId);
      if (!game) return;
      const stars = '⭐'.repeat(h.stars || 1);
      const dateStr = h.date === today ? '오늘' : h.date;
      logHTML += `
        <div class="log-item">
          <span class="log-icon">${game.icon}</span>
          <span class="log-info">
            <div class="log-name">${game.title}</div>
            <div class="log-detail">${dateStr} · ${game.area}</div>
          </span>
          <span class="log-stars">${stars}</span>
        </div>`;
    });
    logContainer.innerHTML = logHTML;
  }

  // 초기 로드 시 실행
  init();
  renderRewardDashboard();
  updateMascotSpeech();
  loadMainBgm();
  syncMusicButton();
</script>

</body>
</html>
