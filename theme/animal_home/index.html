<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>동물의 집 — 쑥쑥 놀이터</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0118;--card:rgba(255,255,255,0.06);--card-border:rgba(255,255,255,0.12);
      --purple:#a855f7;--pink:#ec4899;--grad:linear-gradient(135deg,#a855f7,#ec4899);
      --text:#f0e8ff;--text-dim:rgba(240,232,255,0.55);
      --correct:#22c55e;--wrong:#ef4444;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Nunito','Apple SD Gothic Neo',sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;overflow:hidden;
    }
    .stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .star{position:absolute;border-radius:50%;background:white;
      animation:twinkle var(--d,3s) var(--delay,0s) infinite alternate ease-in-out;}
    @keyframes twinkle{from{opacity:var(--min-op,.2);transform:scale(1);}to{opacity:var(--max-op,.9);transform:scale(1.4);}}

    #game-area{
      position:relative;z-index:1;width:800px;height:600px;
      background:rgba(10,1,24,0.9);border:1px solid var(--card-border);
      border-radius:28px;overflow:hidden;display:flex;flex-direction:column;
    }
    .hud{
      display:flex;justify-content:space-between;align-items:center;
      padding:12px 20px 8px;flex-shrink:0;position:relative;z-index:10;
    }
    .btn-back{
      display:inline-flex;align-items:center;gap:6px;padding:8px 16px;
      background:rgba(10,1,24,0.7);border:1px solid var(--card-border);border-radius:50px;
      color:var(--text-dim);font-family:inherit;font-size:0.82rem;font-weight:700;
      cursor:pointer;text-decoration:none;transition:background 0.2s;
    }
    .btn-back:hover{background:rgba(255,255,255,0.1);}
    .score-area{font-size:1rem;font-weight:800;background:rgba(10,1,24,0.7);padding:6px 14px;border-radius:20px;border:1px solid var(--card-border);}
    .hearts{display:flex;gap:5px;}

    .screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
    .screen.hidden{display:none;}

    #intro-screen h1{
      font-size:2.4rem;font-weight:900;
      background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
      margin-bottom:12px;text-align:center;
    }
    #intro-screen p{font-size:1rem;color:var(--text-dim);text-align:center;line-height:1.7;margin-bottom:24px;}

    /* 플레이 화면 */
    #play-screen{
      position:relative;padding:0;
    }

    /* 서식지 배경 */
    #habitat-bg{
      position:absolute;inset:0;
      display:grid;grid-template-columns:1fr 1fr 1fr;
    }
    .habitat-zone{
      display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
      padding-bottom:16px;
      transition:all 0.3s;
      cursor:default;
    }
    .habitat-zone.hover{filter:brightness(1.2);}
    .habitat-zone.correct-flash{animation:habitatFlash 0.5s ease-out;}
    @keyframes habitatFlash{0%{filter:brightness(2);}100%{filter:brightness(1);}}
    .habitat-label{
      font-size:0.9rem;font-weight:800;
      background:rgba(0,0,0,0.5);padding:4px 12px;border-radius:20px;
      color:white;margin-top:8px;
    }

    /* 동물 카드 */
    #animals-layer{
      position:absolute;inset:0;pointer-events:none;
    }
    .animal-card{
      position:absolute;
      cursor:grab;pointer-events:all;
      transition:transform 0.15s;
      z-index:5;
    }
    .animal-card:active{cursor:grabbing;transform:scale(1.15);}
    .animal-card.dragging{z-index:100;transform:scale(1.2);pointer-events:none;}
    .animal-card.placed{pointer-events:none;animation:placedAnim 0.5s ease-out;}
    @keyframes placedAnim{0%{transform:scale(1.3);}50%{transform:scale(0.8);}100%{transform:scale(1);}}
    .animal-card.wrong-bounce{animation:wrongBounce 0.5s ease-out;}
    @keyframes wrongBounce{0%{transform:scale(1);}30%{transform:scale(0.7) rotate(15deg);}60%{transform:scale(1.1) rotate(-5deg);}100%{transform:scale(1);}}

    /* 토스트 메시지 */
    #toast{
      position:absolute;top:60px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,0.85);padding:8px 20px;border-radius:20px;
      font-size:1rem;font-weight:800;pointer-events:none;z-index:50;
      opacity:0;transition:opacity 0.3s;white-space:nowrap;
    }
    #toast.visible{opacity:1;}

    /* 결과 */
    #result-screen{gap:14px;}
    #result-screen h2{
      font-size:2rem;font-weight:900;
      background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .result-score{font-size:3rem;font-weight:900;color:#facc15;}
    .result-label{font-size:1rem;color:var(--text-dim);}
    .stars-row{display:flex;gap:10px;margin:8px 0;}
    .result-star{animation:starPop 0.4s cubic-bezier(.175,.885,.32,1.275) forwards;opacity:0;}
    @keyframes starPop{from{transform:scale(0) rotate(-30deg);opacity:0;}to{transform:scale(1);opacity:1;}}
    .btn-primary{
      padding:14px 36px;background:var(--grad);border:none;border-radius:50px;color:#fff;
      font-family:inherit;font-size:1.1rem;font-weight:800;cursor:pointer;
      box-shadow:0 4px 20px rgba(168,85,247,0.4);transition:transform 0.15s;
    }
    .btn-primary:hover{transform:translateY(-2px);}
    .btn-secondary{
      padding:12px 28px;background:var(--card);border:1px solid var(--card-border);
      border-radius:50px;color:var(--text);font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;
    }
    .btn-row{display:flex;gap:12px;margin-top:10px;}
    .particle{
      position:absolute;border-radius:50%;pointer-events:none;z-index:20;
      animation:particleFly var(--dur,.8s) ease-out forwards;
    }
    @keyframes particleFly{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}}
  </style>
</head>
<body>
<div class="stars" id="stars"></div>
<div id="game-area">
  <div class="hud">
    <a href="../../index.html" class="btn-back">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      홈
    </a>
    <div class="score-area">맞힌 동물: <span id="score-val">0</span> / <span id="total-val">12</span></div>
    <div class="hearts" id="hearts"></div>
  </div>

  <!-- 인트로 -->
  <div class="screen" id="intro-screen">
    <h1>동물의 집</h1>
    <p>동물들이 집을 잃었어요!<br>맞는 서식지로 드래그해서 데려다주세요!</p>
    <!-- 세 구역 미리보기 SVG -->
    <svg width="320" height="100" viewBox="0 0 320 100" style="margin-bottom:16px;">
      <!-- 육지 -->
      <rect x="0" y="0" width="100" height="100" rx="8" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="1.5"/>
      <text x="50" y="55" text-anchor="middle" fill="#22c55e" font-size="11" font-family="Nunito" font-weight="800">육지</text>
      <!-- 나무 -->
      <circle cx="50" cy="30" r="16" fill="rgba(34,197,94,0.4)"/>
      <rect x="46" y="38" width="8" height="12" rx="2" fill="rgba(34,197,94,0.6)"/>
      <!-- 바다 -->
      <rect x="110" y="0" width="100" height="100" rx="8" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="160" y="55" text-anchor="middle" fill="#3b82f6" font-size="11" font-family="Nunito" font-weight="800">바다</text>
      <!-- 파도 -->
      <path d="M120,70 Q135,60 150,70 Q165,80 180,70 Q195,60 210,70" stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- 하늘 -->
      <rect x="220" y="0" width="100" height="100" rx="8" fill="rgba(168,85,247,0.2)" stroke="#a855f7" stroke-width="1.5"/>
      <text x="270" y="55" text-anchor="middle" fill="#a855f7" font-size="11" font-family="Nunito" font-weight="800">하늘</text>
      <!-- 구름 -->
      <ellipse cx="250" cy="28" rx="12" ry="8" fill="rgba(168,85,247,0.4)"/>
      <ellipse cx="262" cy="25" rx="10" ry="7" fill="rgba(168,85,247,0.4)"/>
      <ellipse cx="274" cy="28" rx="9" ry="7" fill="rgba(168,85,247,0.4)"/>
    </svg>
    <button class="btn-primary" id="start-btn">시작하기</button>
  </div>

  <!-- 플레이 -->
  <div class="screen hidden" id="play-screen">
    <div id="habitat-bg">
      <div class="habitat-zone" id="zone-land" data-habitat="land">
        <div class="habitat-label">육지</div>
      </div>
      <div class="habitat-zone" id="zone-sea" data-habitat="sea">
        <div class="habitat-label">바다</div>
      </div>
      <div class="habitat-zone" id="zone-sky" data-habitat="sky">
        <div class="habitat-label">하늘</div>
      </div>
    </div>
    <div id="animals-layer"></div>
    <div id="toast"></div>
  </div>

  <!-- 결과 -->
  <div class="screen hidden" id="result-screen">
    <h2>대단해요!</h2>
    <div class="result-score" id="result-score"></div>
    <div class="result-label">동물을 집에 데려다줬어요!</div>
    <div class="stars-row" id="stars-row"></div>
    <div id="cheer-msg" style="font-size:1rem;color:var(--text-dim);text-align:center;"></div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="location.href='../../index.html'">홈으로</button>
      <button class="btn-primary" id="retry-btn">다시하기</button>
    </div>
  </div>
</div>

<script>
// 별 생성
(function(){
  const el=document.getElementById('stars');
  for(let i=0;i<55;i++){
    const s=document.createElement('div');s.className='star';
    const size=Math.random()*2.5+0.5;
    s.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*3+1.5).toFixed(1)}s;--delay:${(Math.random()*3).toFixed(1)}s;--min-op:${(Math.random()*0.2+0.1).toFixed(2)};--max-op:${(Math.random()*0.5+0.5).toFixed(2)};`;
    el.appendChild(s);
  }
})();

// ── 서식지 배경 SVG ──

    <defs><radialGradient id="grassGrad" cx="50%" cy="100%" r="60%"><stop offset="0%" stop-color="#15803d" stop-opacity="0.3"/><stop offset="100%" stop-color="transparent"/></radialGradient></defs>

  </svg>`;
  land.insertAdjacentHTML('afterbegin', landSvg);

  // 바다 배경
  sea.style.background = 'linear-gradient(to bottom, rgba(37,99,235,0.1), rgba(29,78,216,0.2))';
  sea.style.borderRight = '1px solid rgba(59,130,246,0.2)';
  sea.style.borderLeft = '1px solid rgba(59,130,246,0.2)';
  const seaSvg = `<svg width="250" height="500" viewBox="0 0 250 500" style="position:absolute;inset:0;pointer-events:none;">
    <rect width="250" height="500" fill="rgba(30,64,175,0.1)"/>

    <circle cx="200" cy="395" r="6" fill="rgba(147,197,253,0.2)"/>
  </svg>`;
  sea.insertAdjacentHTML('afterbegin', seaSvg);

  // 하늘 배경
  sky.style.background = 'linear-gradient(to bottom, rgba(124,58,237,0.15), rgba(168,85,247,0.08))';
  sky.style.borderLeft = '1px solid rgba(168,85,247,0.2)';
  const skySvg = `<svg width="250" height="500" viewBox="0 0 250 500" style="position:absolute;inset:0;pointer-events:none;">
    <rect width="250" height="500" fill="rgba(88,28,235,0.05)"/>
    <!-- 별들 -->
    <circle cx="40" cy="60" r="2" fill="rgba(255,255,255,0.6)"/>
    <circle cx="100" cy="40" r="1.5" fill="rgba(255,255,255,0.5)"/>

    <ellipse cx="105" cy="140" rx="30" ry="18" fill="rgba(196,181,253,0.18)"/>

    <ellipse cx="195" cy="232" rx="25" ry="14" fill="rgba(196,181,253,0.12)"/>
  </svg>`;
  sky.insertAdjacentHTML('afterbegin', skySvg);
}

let score=0, lives=3, placedCount=0;
const TOTAL=12;
let dragEl=null, dragOffX=0, dragOffY=0;
let dragStartX=0, dragStartY=0;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function updateHearts(){
  const el=document.getElementById('hearts');
  el.innerHTML='';
  for(let i=0;i<3;i++){
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','24');svg.setAttribute('height','24');svg.setAttribute('viewBox','0 0 24 24');
    const filled=i<lives;
    svg.innerHTML=`<path d="M12 21C12 21 3 14 3 8a4.5 4.5 0 0 1 9-1.2A4.5 4.5 0 0 1 21 8c0 6-9 13-9 13Z" fill="${filled?'#ef4444':'rgba(255,255,255,0.15)'}" stroke="${filled?'#dc2626':'rgba(255,255,255,0.2)'}" stroke-width="1.5"/>`;
    el.appendChild(svg);
  }
}

function startGame(){
  score=0; lives=3; placedCount=0;
  document.getElementById('score-val').textContent='0';
  document.getElementById('total-val').textContent=TOTAL;
  updateHearts();
  showScreen('play-screen');
  drawHabitatBg();
  spawnAnimals();
  setupZoneEvents();
}

function spawnAnimals(){
  const layer=document.getElementById('animals-layer');
  layer.innerHTML='';
  // 가로 3열, 4행 배치
  const positions=[
    // 육지 구역 상단
    {x:30,y:80},{x:30,y:170},{x:30,y:270},{x:30,y:360},
    // 바다 구역 상단
    {x:300,y:80},{x:300,y:170},{x:300,y:270},{x:300,y:360},
    // 하늘 구역 상단
    {x:560,y:80},{x:560,y:170},{x:560,y:270},{x:560,y:360},
  ];
  // 섞기
  const shuffled=[...ANIMALS];
  for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}

  shuffled.forEach((animal,idx)=>{
    if(idx>=TOTAL) return;
    const pos=positions[idx];
    const card=document.createElement('div');
    card.className='animal-card';
    card.dataset.habitat=animal.habitat;
    card.dataset.id=animal.id;
    card.style.left=`${pos.x}px`;
    card.style.top=`${pos.y}px`;
    card.style.width='70px';
    card.style.height='70px';

    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','70');svg.setAttribute('height','70');svg.setAttribute('viewBox','0 0 80 80');
    svg.innerHTML=animal.svg;
    card.appendChild(svg);

    const lbl=document.createElement('div');
    lbl.style.cssText='text-align:center;font-size:0.7rem;font-weight:800;color:rgba(240,232,255,0.8);margin-top:2px;';
    lbl.textContent=animal.name;
    card.appendChild(lbl);

    setupDrag(card);
    layer.appendChild(card);
  });
}

function setupDrag(card){
  card.addEventListener('mousedown', dragStart);
  card.addEventListener('touchstart', touchStart, {passive:false});
}

function touchStart(e){
  e.preventDefault();
  const touch=e.touches[0];
  startDrag(e.currentTarget, touch.clientX, touch.clientY);
  document.addEventListener('touchmove', touchMove, {passive:false});
  document.addEventListener('touchend', touchEnd);
}
function touchMove(e){
  e.preventDefault();
  if(!dragEl) return;
  const touch=e.touches[0];
  moveDrag(touch.clientX, touch.clientY);
}
function touchEnd(e){
  document.removeEventListener('touchmove', touchMove);
  document.removeEventListener('touchend', touchEnd);
  endDrag(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
}

function dragStart(e){
  startDrag(e.currentTarget, e.clientX, e.clientY);
  document.addEventListener('mousemove', mouseMove);
  document.addEventListener('mouseup', mouseUp);
}
function mouseMove(e){ moveDrag(e.clientX, e.clientY); }
function mouseUp(e){
  document.removeEventListener('mousemove', mouseMove);
  document.removeEventListener('mouseup', mouseUp);
  endDrag(e.clientX, e.clientY);
}

function startDrag(card, cx, cy){
  dragEl=card;
  const rect=card.getBoundingClientRect();
  dragOffX=cx-rect.left;
  dragOffY=cy-rect.top;
  dragStartX=parseInt(card.style.left);
  dragStartY=parseInt(card.style.top);
  card.classList.add('dragging');
  card.style.zIndex=100;

  // 구역 호버 표시
  document.querySelectorAll('.habitat-zone').forEach(z=>{z.style.opacity='0.6';});
}

function moveDrag(cx, cy){
  if(!dragEl) return;
  const area=document.getElementById('game-area');
  const areaRect=area.getBoundingClientRect();
  const x=cx-areaRect.left-dragOffX;
  const y=cy-areaRect.top-dragOffY;
  dragEl.style.left=`${x}px`;
  dragEl.style.top=`${y}px`;

  // 구역 하이라이트
  const zones=document.querySelectorAll('.habitat-zone');
  zones.forEach(z=>{z.classList.remove('hover');});
  const zone=getZoneAtPoint(cx,cy);
  if(zone) zone.classList.add('hover');
}

function endDrag(cx, cy){
  if(!dragEl) return;
  dragEl.classList.remove('dragging');
  dragEl.style.zIndex=5;
  document.querySelectorAll('.habitat-zone').forEach(z=>{z.classList.remove('hover');z.style.opacity='1';});

  const zone=getZoneAtPoint(cx,cy);
  if(zone){
    const animalHabitat=dragEl.dataset.habitat;
    const zoneHabitat=zone.dataset.habitat;
    if(animalHabitat===zoneHabitat){
      handleCorrect(dragEl);
    } else {
      handleWrong(dragEl);
    }
  } else {
    // 원위치
    dragEl.style.left=`${dragStartX}px`;
    dragEl.style.top=`${dragStartY}px`;
  }
  dragEl=null;
}

function getZoneAtPoint(cx, cy){
  const zones=document.querySelectorAll('.habitat-zone');
  for(const z of zones){
    const r=z.getBoundingClientRect();
    if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom) return z;
  }
  return null;
}

function handleCorrect(card){
  score++;
  placedCount++;
  document.getElementById('score-val').textContent=score;
  card.classList.add('placed');
  card.style.pointerEvents='none';
  spawnParticles(card);
  showToast('정답! 잘 찾아왔어요!', '#22c55e');
  if(placedCount>=TOTAL) setTimeout(showResult, 800);
}

function handleWrong(card){
  lives=Math.max(0,lives-1);
  updateHearts();
  card.classList.add('wrong-bounce');
  card.addEventListener('animationend',()=>{
    card.classList.remove('wrong-bounce');
    card.style.left=`${dragStartX}px`;
    card.style.top=`${dragStartY}px`;
  },{once:true});
  showToast('여기는 내 집이 아니야!', '#ef4444');
  if(lives<=0) setTimeout(showResult,800);
}

function showToast(msg, color){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.color=color;
  t.classList.add('visible');
  setTimeout(()=>t.classList.remove('visible'),1500);
}

function spawnParticles(card){
  const area=document.getElementById('game-area');
  const cardRect=card.getBoundingClientRect();
  const areaRect=area.getBoundingClientRect();
  const cx=cardRect.left-areaRect.left+35;
  const cy=cardRect.top-areaRect.top+35;
  const colors=['#22c55e','#86efac','#facc15','#fde047','#a855f7'];
  for(let i=0;i<16;i++){
    const p=document.createElement('div');p.className='particle';
    const size=Math.random()*12+6,angle=Math.random()*Math.PI*2,dist=Math.random()*100+50;
    p.style.cssText=`width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};position:absolute;left:${cx}px;top:${cy}px;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;--dur:${(Math.random()*0.4+0.5).toFixed(2)}s;border-radius:50%;pointer-events:none;z-index:30;animation:particleFly var(--dur) ease-out forwards;`;
    area.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
}

function setupZoneEvents(){}

function showResult(){
  showScreen('result-screen');
  document.getElementById('result-score').textContent=`${score} / ${TOTAL}`;
  const pct=score/TOTAL;
  const stars=pct>=0.9?3:pct>=0.6?2:pct>=0.3?1:0;
  let cheer=stars===3?'모든 동물이 집에 돌아왔어요! 최고!':stars===2?'잘했어요! 조금만 더 연습해봐요!':stars===1?'괜찮아요! 다시 도전해봐요!':'동물들을 도와줘서 고마워요!';
  document.getElementById('cheer-msg').textContent=cheer;

  const sr=document.getElementById('stars-row');sr.innerHTML='';
  for(let i=0;i<3;i++){
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','50');svg.setAttribute('height','50');svg.setAttribute('viewBox','0 0 50 50');
    svg.classList.add('result-star');svg.style.animationDelay=`${i*0.15}s`;
    const f=i<stars;
    svg.innerHTML=`<polygon points="25,5 30,18 44,18 33,27 37,41 25,32 13,41 17,27 6,18 20,18" fill="${f?'#facc15':'rgba(255,255,255,0.1)'}" stroke="${f?'#f59e0b':'rgba(255,255,255,0.15)'}" stroke-width="2"/>`;
    sr.appendChild(svg);
  }
}

document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('retry-btn').addEventListener('click',startGame);
</script>
