<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>두더지 잡기 — 쑥쑥 놀이터</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0118;
      --card: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.12);
      --purple: #a855f7;
      --pink: #ec4899;
      --cyan: #06b6d4;
      --amber: #f59e0b;
      --green: #22c55e;
      --red: #ef4444;
      --grad: linear-gradient(135deg, #a855f7, #ec4899);
      --text: #f0e8ff;
      --text-dim: rgba(240,232,255,0.55);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }
    .star {
      position: fixed; border-radius: 50%; background: #fff;
      animation: twinkle var(--dur,3s) ease-in-out infinite var(--delay,0s);
      pointer-events: none; z-index: 0;
    }
    @keyframes twinkle {
      0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.9;transform:scale(1.4)}
    }
    #game-wrap {
      position: relative;
      width: 800px; height: 600px;
      background: linear-gradient(160deg, #1a0a2e 0%, #0a0118 55%, #0f0a20 100%);
      border-radius: 28px;
      border: 1px solid rgba(168,85,247,0.25);
      box-shadow: 0 0 80px rgba(168,85,247,0.1), 0 24px 64px rgba(0,0,0,0.7);
      overflow: hidden;
      z-index: 1;
    }
    /* HUD */
    #hud {
      position: absolute;
      top: 16px; left: 20px; right: 20px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 20;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      color: var(--text-dim);
      font-family: inherit; font-size: 0.82rem; font-weight: 800;
      cursor: pointer; text-decoration: none;
      transition: background .2s, color .2s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.12); color: var(--text); }
    .hud-right {
      display: flex; align-items: center; gap: 16px;
    }
    .hearts-wrap {
      display: flex; gap: 4px;
    }
    .heart-icon {
      width: 24px; height: 24px;
      transition: transform 0.2s, opacity 0.2s;
    }
    .heart-icon.lost { opacity: 0.18; transform: scale(0.8); }
    .score-badge {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 1rem; font-weight: 900;
      color: var(--amber);
    }
    .timer-badge {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 1rem; font-weight: 900;
      color: var(--cyan);
    }
    /* Ground / Grid */
    #ground {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 490px;
      background: linear-gradient(180deg, transparent 0%, rgba(60,30,10,0.18) 100%);
    }
    #mole-grid {
      position: absolute;
      top: 68px; left: 50%;
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(3, 170px);
      grid-template-rows: repeat(3, 150px);
      gap: 12px;
    }
    /* Hole */
    .hole-wrap {
      position: relative;
      width: 170px; height: 150px;
      display: flex; align-items: flex-end; justify-content: center;
      cursor: pointer;
    }
    .hole-svg-container {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 70px;
    }
    .mole-container {
      position: absolute;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 80px; height: 100px;
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 5;
      pointer-events: none;
    }
    .mole-container.visible {
      transform: translateX(-50%) translateY(0%);
    }
    .mole-container.hit-anim {
      animation: mole-hit 0.3s ease forwards;
    }
    @keyframes mole-hit {
      0%{transform:translateX(-50%) translateY(0%) scale(1)}
      30%{transform:translateX(-50%) translateY(-10%) scale(1.15)}
      100%{transform:translateX(-50%) translateY(100%) scale(0.8)}
    }
    .hole-hit-effect {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
    }
    /* Tap area (larger than visual) */
    .tap-zone {
      position: absolute;
      inset: -10px;
      z-index: 10;
      cursor: pointer;
    }
    /* Score popup */
    .score-popup {
      position: absolute;
      font-size: 1.4rem; font-weight: 900;
      pointer-events: none;
      z-index: 30;
      animation: float-up 0.8s ease forwards;
    }
    @keyframes float-up {
      0%{opacity:1;transform:translateY(0) scale(1)}
      100%{opacity:0;transform:translateY(-60px) scale(1.3)}
    }
    /* Ground shake */
    @keyframes ground-shake {
      0%,100%{transform:translateX(0)}
      25%{transform:translateX(-4px)}
      75%{transform:translateX(4px)}
    }
    .shake-anim { animation: ground-shake 0.2s ease; }

    /* Flash */
    #flash {
      position: absolute; inset: 0; border-radius: 28px;
      pointer-events: none; z-index: 30; opacity: 0;
      transition: opacity 0.1s;
    }
    /* Particle canvas */
    #particle-canvas {
      position: absolute; inset: 0; pointer-events: none; z-index: 25;
    }
    /* Result screen */
    #result-screen {
      position: absolute; inset: 0;
      background: rgba(10,1,24,0.94);
      border-radius: 28px;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 50; gap: 14px;
    }
    #result-screen.show { display: flex; }
    .result-title {
      font-size: 2.2rem; font-weight: 900;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-grade {
      font-size: 1.3rem; font-weight: 800;
      color: var(--amber);
      background: rgba(245,158,11,0.12);
      border: 1px solid rgba(245,158,11,0.3);
      padding: 10px 28px; border-radius: 50px;
    }
    .result-stars { display: flex; gap: 12px; margin: 4px 0; }
    .result-star { width: 50px; height: 50px; }
    .result-score { font-size: 1.1rem; font-weight: 700; color: var(--text-dim); }
    .result-btns { display: flex; gap: 14px; margin-top: 8px; }
    .res-btn {
      padding: 14px 28px; border-radius: 50px;
      font-family: inherit; font-size: 1rem; font-weight: 900;
      cursor: pointer; border: none;
      transition: transform .15s;
    }
    .res-btn:hover { transform: translateY(-3px); }
    .res-btn.primary { background: var(--grad); color: #fff; }
    .res-btn.secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text);
    }
    /* Start screen */
    #start-screen {
      position: absolute; inset: 0;
      background: rgba(10,1,24,0.92);
      border-radius: 28px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 50; gap: 18px;
    }
    .start-title {
      font-size: 2.4rem; font-weight: 900;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .start-desc {
      font-size: 0.95rem; font-weight: 700; color: var(--text-dim);
      text-align: center; line-height: 1.6;
    }
    .start-btn {
      margin-top: 8px;
      padding: 16px 48px; border-radius: 50px;
      background: var(--grad); border: none; color: #fff;
      font-family: inherit; font-size: 1.1rem; font-weight: 900;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(168,85,247,0.4);
      transition: transform .15s;
    }
    .start-btn:hover { transform: translateY(-3px); }
    /* Legend */
    .legend {
      display: flex; gap: 20px; align-items: center;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.8rem; font-weight: 800; color: var(--text-dim);
    }
    .legend-dot {
      width: 14px; height: 14px; border-radius: 50%;
    }
    /* Timer bar */
    #timer-bar-outer {
      position: absolute;
      bottom: 10px; left: 24px; right: 24px;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 50px;
      z-index: 20;
    }
    #timer-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, #a855f7, #06b6d4);
      border-radius: 50px;
      transition: width 0.5s linear;
      width: 100%;
    }
  </style>
</head>
<body>
<div id="stars-container"></div>

<div id="game-wrap">
  <!-- HUD -->
  <div id="hud">
    <a class="btn-back" href="../../index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="14" height="14">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      홈
    </a>
    <div class="hud-right">
      <div class="timer-badge" id="timer-display">60</div>
      <div class="score-badge" id="score-display">0점</div>
      <div class="hearts-wrap" id="hearts-wrap">
        <!-- hearts injected by JS -->
      </div>
    </div>
  </div>

  <!-- Timer bar -->
  <div id="timer-bar-outer">
    <div id="timer-bar-inner"></div>
  </div>

  <!-- Mole Grid -->
  <div id="mole-grid"></div>

  <div id="flash"></div>
  <canvas id="particle-canvas"></canvas>

  <!-- Start screen -->
  <div id="start-screen">
    <div class="start-title">두더지 잡기</div>
    <div class="start-desc">
      두더지가 나오면 빠르게 탭하세요!<br>
      꽃과 나비는 건드리면 안 돼요.
    </div>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#c084fc"></div>
        <span>두더지 +10</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#ef4444"></div>
        <span>빨간 +30</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#fbbf24"></div>
        <span>황금 +50</span>
      </div>
    </div>
    <button class="start-btn" id="start-btn">시작!</button>
  </div>

  <!-- Result screen -->
  <div id="result-screen">
    <div class="result-title" id="result-title">대단해요!</div>
    <div class="result-grade" id="result-grade">왕관</div>
    <div class="result-stars" id="result-stars"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-btns">
      <button class="res-btn secondary" onclick="goHome()">홈으로</button>
      <button class="res-btn primary" onclick="restartGame()">다시하기</button>
    </div>
  </div>
</div>

<script>
// Stars
(function(){
  const c = document.getElementById('stars-container');
  for(let i = 0; i < 55; i++){
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 0.8;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;--dur:${2+Math.random()*4}s;--delay:${Math.random()*4}s;`;
    c.appendChild(s);
  }
})();

// === SVG Drawing ===
function makeMoleSVG(type) {
  // type: 'normal' | 'red' | 'gold' | 'flower' | 'butterfly'
  if(type === 'flower') {
    return `<svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" width="80" height="100">
      <line x1="40" y1="100" x2="40" y2="40" stroke="#4ade80" stroke-width="5" stroke-linecap="round"/>
      <ellipse cx="28" cy="62" rx="10" ry="6" fill="#4ade80" transform="rotate(-30 28 62)"/>
      <ellipse cx="52" cy="62" rx="10" ry="6" fill="#4ade80" transform="rotate(30 52 62)"/>
      <circle cx="40" cy="30" r="14" fill="#f9a8d4"/>
      <circle cx="40" cy="14" r="7" fill="#fce7f3"/>
      <circle cx="55" cy="20" r="7" fill="#fce7f3"/>
      <circle cx="25" cy="20" r="7" fill="#fce7f3"/>
      <circle cx="55" cy="38" r="7" fill="#fce7f3"/>
      <circle cx="25" cy="38" r="7" fill="#fce7f3"/>
      <circle cx="40" cy="30" r="10" fill="#fbbf24"/>
    </svg>`;
  }
  if(type === 'butterfly') {
    return `<svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" width="80" height="100">
      <ellipse cx="22" cy="44" rx="20" ry="14" fill="#60a5fa" opacity="0.85" transform="rotate(-20 22 44)"/>
      <ellipse cx="58" cy="44" rx="20" ry="14" fill="#60a5fa" opacity="0.85" transform="rotate(20 58 44)"/>
      <ellipse cx="24" cy="60" rx="12" ry="9" fill="#818cf8" opacity="0.7" transform="rotate(-20 24 60)"/>
      <ellipse cx="56" cy="60" rx="12" ry="9" fill="#818cf8" opacity="0.7" transform="rotate(20 56 60)"/>
      <ellipse cx="40" cy="50" rx="5" ry="16" fill="#1e293b"/>
      <line x1="36" y1="36" x2="26" y2="26" stroke="#1e293b" stroke-width="1.5"/>
      <line x1="44" y1="36" x2="54" y2="26" stroke="#1e293b" stroke-width="1.5"/>
      <circle cx="26" cy="24" r="3" fill="#1e293b"/>
      <circle cx="54" cy="24" r="3" fill="#1e293b"/>
    </svg>`;
  }
  // Mole variants
  const bodyColor = type === 'gold' ? '#fbbf24' : type === 'red' ? '#f87171' : '#c084fc';
  const bellyColor = type === 'gold' ? '#fde68a' : type === 'red' ? '#fca5a5' : '#e9d5ff';
  const noseColor = type === 'gold' ? '#f59e0b' : type === 'red' ? '#ef4444' : '#a855f7';
  const badgeColor = type === 'gold' ? '#f59e0b' : type === 'red' ? '#ef4444' : 'none';
  const badgeTxt = type === 'gold' ? '+50' : type === 'red' ? '+30' : '';

  return `<svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" width="80" height="100">
    <!-- Body -->
    <ellipse cx="40" cy="72" rx="28" ry="26" fill="${bodyColor}"/>
    <!-- Belly -->
    <ellipse cx="40" cy="76" rx="18" ry="16" fill="${bellyColor}"/>
    <!-- Head -->
    <circle cx="40" cy="44" r="28" fill="${bodyColor}"/>
    <!-- Ears -->
    <ellipse cx="18" cy="26" rx="8" ry="10" fill="${bodyColor}"/>
    <ellipse cx="62" cy="26" rx="8" ry="10" fill="${bodyColor}"/>
    <ellipse cx="18" cy="26" rx="5" ry="7" fill="${bellyColor}"/>
    <ellipse cx="62" cy="26" rx="5" ry="7" fill="${bellyColor}"/>
    <!-- Eyes (normal) -->
    <ellipse class="mole-eye-l" cx="30" cy="42" rx="6" ry="7" fill="#1e293b"/>
    <ellipse class="mole-eye-r" cx="50" cy="42" rx="6" ry="7" fill="#1e293b"/>
    <circle cx="32" cy="40" r="2.5" fill="white"/>
    <circle cx="52" cy="40" r="2.5" fill="white"/>
    <!-- Nose -->
    <ellipse cx="40" cy="52" rx="6" ry="4" fill="${noseColor}"/>
    <!-- Mouth -->
    <path d="M34 58 Q40 64 46 58" stroke="#1e293b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Badge -->
    ${badgeTxt ? `<rect x="52" y="14" width="26" height="16" rx="8" fill="${badgeColor}"/>
    <text x="65" y="26" text-anchor="middle" font-size="8" fill="white" font-weight="800" font-family="Nunito,sans-serif">${badgeTxt}</text>` : ''}
    <!-- Arms -->
    <path d="M14 66 Q8 78 14 86" stroke="${bodyColor}" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M66 66 Q72 78 66 86" stroke="${bodyColor}" stroke-width="10" fill="none" stroke-linecap="round"/>
  </svg>`;
}

function makeHoleSVG() {
  return `<svg viewBox="0 0 170 70" xmlns="http://www.w3.org/2000/svg" width="170" height="70">
    <defs>
      <radialGradient id="holeGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#0a0118"/>
        <stop offset="60%" stop-color="#1a0a2e"/>
        <stop offset="100%" stop-color="#3b1f6b"/>
      </radialGradient>
    </defs>
    <!-- Ground -->
    <ellipse cx="85" cy="52" rx="75" ry="20" fill="#2d1b69" opacity="0.6"/>
    <!-- Hole shadow -->
    <ellipse cx="85" cy="46" rx="62" ry="16" fill="#1e0a3c"/>
    <!-- Hole dark -->
    <ellipse cx="85" cy="44" rx="54" ry="13" fill="url(#holeGrad)"/>
    <!-- Rim highlight -->
    <ellipse cx="85" cy="44" rx="54" ry="13" fill="none" stroke="rgba(168,85,247,0.2)" stroke-width="2"/>
    <!-- Dirt mound sides -->
    <path d="M20 52 Q85 68 150 52" fill="#3b1f6b" opacity="0.5"/>
  </svg>`;
}

// === Game State ===
const TOTAL_TIME = 60;
const TOTAL_HOLES = 9;
let score = 0;
let hearts = 3;
let timeLeft = TOTAL_TIME;
let gameActive = false;
let timerInterval = null;
let holes = []; // { el, moleEl, type, visible, timer }
let currentMoles = {};

// === Setup ===
function buildGrid() {
  const grid = document.getElementById('mole-grid');
  grid.innerHTML = '';
  holes = [];
  for(let i = 0; i < TOTAL_HOLES; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'hole-wrap';
    wrap.dataset.idx = i;

    const holeContainer = document.createElement('div');
    holeContainer.className = 'hole-svg-container';
    holeContainer.innerHTML = makeHoleSVG();

    const moleContainer = document.createElement('div');
    moleContainer.className = 'mole-container';
    moleContainer.innerHTML = makeMoleSVG('normal');

    const tapZone = document.createElement('div');
    tapZone.className = 'tap-zone';
    tapZone.dataset.idx = i;

    wrap.appendChild(moleContainer);
    wrap.appendChild(holeContainer);
    wrap.appendChild(tapZone);
    grid.appendChild(wrap);

    tapZone.addEventListener('click', () => handleTap(i));
    tapZone.addEventListener('touchend', (e) => { e.preventDefault(); handleTap(i); });

    holes.push({ el: wrap, moleEl: moleContainer, type: null, visible: false, timer: null });
  }
}

function buildHearts() {
  const wrap = document.getElementById('hearts-wrap');
  wrap.innerHTML = '';
  for(let i = 0; i < 3; i++) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 24 24');
    svg.classList.add('heart-icon');
    svg.id = `heart-${i}`;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d','M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
    path.setAttribute('fill','#f43f5e');
    svg.appendChild(path);
    wrap.appendChild(svg);
  }
}

function updateHeartsDisplay() {
  for(let i = 0; i < 3; i++) {
    const h = document.getElementById(`heart-${i}`);
    if(h) h.classList.toggle('lost', i >= hearts);
  }
}

// === Mole spawn logic ===
const MOLE_TYPES = [
  { type: 'normal', weight: 60, score: 10, stayMs: [800, 1500] },
  { type: 'red',    weight: 20, score: 30, stayMs: [500, 700] },
  { type: 'gold',   weight: 10, score: 50, stayMs: [400, 550] },
  { type: 'flower', weight: 5,  score: -1, stayMs: [1200, 2000] },
  { type: 'butterfly', weight: 5, score: -1, stayMs: [1200, 1800] },
];

function pickMoleType() {
  const total = MOLE_TYPES.reduce((a, b) => a + b.weight, 0);
  let r = Math.random() * total;
  for(const mt of MOLE_TYPES) {
    r -= mt.weight;
    if(r <= 0) return mt;
  }
  return MOLE_TYPES[0];
}

function spawnMole() {
  if(!gameActive) return;
  // Find empty holes
  const empty = holes.map((h, i) => i).filter(i => !holes[i].visible);
  if(empty.length === 0) return;
  const idx = empty[Math.floor(Math.random() * empty.length)];
  const hole = holes[idx];
  const mt = pickMoleType();

  hole.type = mt.type;
  hole.visible = true;
  hole.moleEl.innerHTML = makeMoleSVG(mt.type);
  hole.moleEl.classList.remove('hit-anim');
  hole.moleEl.classList.add('visible');

  const stay = mt.stayMs[0] + Math.random() * (mt.stayMs[1] - mt.stayMs[0]);
  hole.timer = setTimeout(() => {
    if(hole.visible) hideMole(idx, false);
  }, stay);
}

function hideMole(idx, wasHit) {
  const hole = holes[idx];
  if(!hole.visible) return;
  hole.visible = false;
  clearTimeout(hole.timer);
  hole.timer = null;
  if(!wasHit) {
    hole.moleEl.classList.remove('visible');
  }
  hole.type = null;
}

function handleTap(idx) {
  if(!gameActive) return;
  const hole = holes[idx];
  if(!hole.visible) return;

  const mt = MOLE_TYPES.find(m => m.type === hole.type);
  if(!mt) return;

  if(mt.score < 0) {
    // Hit flower/butterfly — lose heart
    loseHeart();
    hideMole(idx, true);
    hole.moleEl.classList.remove('visible');
    flashScreen('rgba(239,68,68,0.25)');
    shakeGrid();
  } else {
    // Hit mole
    score += mt.score;
    updateScore();
    showScorePopup(idx, mt.score, mt.type);
    spawnHitParticles(idx, mt.type);
    clearTimeout(hole.timer);
    hole.moleEl.classList.add('hit-anim');
    hole.visible = false;
    hole.type = null;
    setTimeout(() => {
      hole.moleEl.classList.remove('visible','hit-anim');
    }, 350);
    flashScreen('rgba(168,85,247,0.12)');
  }
}

function loseHeart() {
  if(hearts <= 0) return;
  hearts--;
  updateHeartsDisplay();
  if(hearts <= 0) {
    endGame();
  }
}

function updateScore() {
  document.getElementById('score-display').textContent = `${score}점`;
}

function showScorePopup(idx, points, type) {
  const hole = holes[idx];
  const rect = hole.el.getBoundingClientRect();
  const wrap = document.getElementById('game-wrap').getBoundingClientRect();
  const x = rect.left - wrap.left + rect.width / 2;
  const y = rect.top - wrap.top + 20;

  const pop = document.createElement('div');
  pop.className = 'score-popup';
  pop.style.left = `${x}px`;
  pop.style.top = `${y}px`;
  pop.style.color = type === 'gold' ? '#fbbf24' : type === 'red' ? '#f87171' : '#c084fc';
  pop.textContent = `+${points}`;
  document.getElementById('game-wrap').appendChild(pop);
  setTimeout(() => pop.remove(), 900);
}

// === Particles ===
const pCanvas = document.getElementById('particle-canvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];
pCanvas.width = 800; pCanvas.height = 600;

function spawnHitParticles(idx, type) {
  const hole = holes[idx];
  const rect = hole.el.getBoundingClientRect();
  const wrap = document.getElementById('game-wrap').getBoundingClientRect();
  const x = rect.left - wrap.left + rect.width / 2;
  const y = rect.top - wrap.top + 40;
  const colors = type === 'gold' ? ['#fbbf24','#f59e0b','#fde68a']
               : type === 'red'  ? ['#f87171','#ef4444','#fca5a5']
               : ['#c084fc','#a855f7','#e9d5ff'];
  for(let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 5;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - 2,
      life:1, decay:0.025+Math.random()*0.02, size:4+Math.random()*6,
      color: colors[Math.floor(Math.random()*colors.length)] });
  }
}

function animateParticles() {
  pCtx.clearRect(0,0,800,600);
  particles = particles.filter(p => p.life > 0);
  for(const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.vx *= 0.97; p.life -= p.decay;
    pCtx.save(); pCtx.globalAlpha = Math.max(0, p.life); pCtx.fillStyle = p.color;
    pCtx.beginPath(); pCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2); pCtx.fill(); pCtx.restore();
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

function flashScreen(color) {
  const flash = document.getElementById('flash');
  flash.style.background = color;
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.opacity = '0'; }, 300);
}

function shakeGrid() {
  const grid = document.getElementById('mole-grid');
  grid.classList.add('shake-anim');
  setTimeout(() => grid.classList.remove('shake-anim'), 300);
}

// === Timer ===
let spawnInterval = null;

function startTimer() {
  timeLeft = TOTAL_TIME;
  document.getElementById('timer-display').textContent = timeLeft;
  document.getElementById('timer-bar-inner').style.width = '100%';

  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('timer-display').textContent = timeLeft;
    document.getElementById('timer-bar-inner').style.width = `${(timeLeft / TOTAL_TIME) * 100}%`;
    if(timeLeft <= 10) {
      document.getElementById('timer-display').style.color = '#f43f5e';
    }
    if(timeLeft <= 0) {
      endGame();
    }
  }, 1000);
}

function startSpawning() {
  // Spawn multiple moles at different intervals
  function scheduleNext() {
    if(!gameActive) return;
    const delay = 600 + Math.random() * 500;
    spawnInterval = setTimeout(() => {
      // spawn 1-2 moles at once based on time remaining
      const count = timeLeft < 20 ? 2 : 1;
      for(let i = 0; i < count; i++) spawnMole();
      scheduleNext();
    }, delay);
  }
  scheduleNext();
}

// === Game lifecycle ===
function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  score = 0; hearts = 3; timeLeft = TOTAL_TIME;
  gameActive = true;
  updateScore();
  updateHeartsDisplay();
  document.getElementById('timer-display').style.color = '#06b6d4';
  buildGrid();
  buildHearts();
  updateHeartsDisplay();
  particles = [];
  startTimer();
  startSpawning();
}

function endGame() {
  gameActive = false;
  clearInterval(timerInterval);
  clearTimeout(spawnInterval);
  // Hide all moles
  for(let i = 0; i < TOTAL_HOLES; i++) {
    const h = holes[i];
    if(h.visible) {
      clearTimeout(h.timer);
      h.moleEl.classList.remove('visible');
      h.visible = false;
    }
  }
  setTimeout(() => showResult(), 400);
}

function showResult() {
  let grade, stars;
  if(score >= 400) { grade = '왕관'; stars = 3; }
  else if(score >= 200) { grade = '열매'; stars = 2; }
  else if(score >= 100) { grade = '꽃'; stars = 1; }
  else { grade = '새싹'; stars = 0; }

  const titles = { '왕관': '두더지 왕!', '열매': '잘했어요!', '꽃': '멋져요!', '새싹': '조금 더 연습해봐요!' };
  document.getElementById('result-title').textContent = titles[grade];
  document.getElementById('result-grade').textContent = `등급: ${grade}`;
  document.getElementById('result-score').textContent = `총점 ${score}점`;
  renderStars(stars);
  document.getElementById('result-screen').classList.add('show');

  // Confetti
  for(let i = 0; i < 50; i++) {
    setTimeout(() => {
      const colors = ['#a855f7','#ec4899','#fbbf24','#22c55e','#06b6d4'];
      particles.push({
        x: Math.random()*800, y: -10,
        vx: (Math.random()-0.5)*4, vy: 2+Math.random()*3,
        life:1, decay:0.008+Math.random()*0.008, size:5+Math.random()*6,
        color: colors[Math.floor(Math.random()*colors.length)]
      });
    }, i*30);
  }
}

function renderStars(count) {
  const c = document.getElementById('result-stars');
  c.innerHTML = '';
  for(let i = 0; i < 3; i++) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 24 24');
    svg.classList.add('result-star');
    const pts = [];
    for(let j = 0; j < 10; j++) {
      const r = j%2===0 ? 11 : 5;
      const a = (j*Math.PI/5) - Math.PI/2;
      pts.push(`${12+r*Math.cos(a)},${12+r*Math.sin(a)}`);
    }
    const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points', pts.join(' '));
    poly.setAttribute('fill', i < count ? '#fbbf24' : 'rgba(255,255,255,0.1)');
    poly.setAttribute('stroke', i < count ? '#f59e0b' : 'rgba(255,255,255,0.15)');
    poly.setAttribute('stroke-width','1');
    svg.appendChild(poly);
    c.appendChild(svg);
  }
}

function restartGame() {
  document.getElementById('result-screen').classList.remove('show');
  particles = [];
  startGame();
}

function goHome() { window.location.href = '../../index.html'; }

// Init
document.getElementById('start-btn').addEventListener('click', startGame);
buildGrid();
buildHearts();
</script>
