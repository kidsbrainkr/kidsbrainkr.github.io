<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>기분 온도계 — 쑥쑥 놀이터</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0118;
      --card: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.12);
      --purple: #a855f7;
      --pink: #ec4899;
      --cyan: #06b6d4;
      --amber: #f59e0b;
      --grad: linear-gradient(135deg, #ec4899, #f59e0b);
      --text: #f0e8ff;
      --text-dim: rgba(240,232,255,0.55);
      --correct: #22c55e;
      --wrong: #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }
    .star {
      position: fixed; border-radius: 50%; background: #fff;
      animation: twinkle var(--dur,3s) ease-in-out infinite var(--delay,0s);
      pointer-events: none; z-index: 0;
    }
    @keyframes twinkle {
      0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.9;transform:scale(1.4)}
    }

    #game-wrap {
      position: relative;
      width: 800px; height: 600px;
      background: linear-gradient(160deg, #1a0a2e 0%, #0a0118 55%, #0f0a20 100%);
      border-radius: 28px;
      border: 1px solid rgba(236,72,153,0.2);
      box-shadow: 0 0 80px rgba(236,72,153,0.1), 0 24px 64px rgba(0,0,0,0.7);
      overflow: hidden;
      z-index: 1;
    }

    /* HUD */
    #hud {
      position: absolute;
      top: 16px; left: 20px; right: 20px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 20;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      color: var(--text-dim);
      font-family: inherit; font-size: 0.82rem; font-weight: 800;
      cursor: pointer; text-decoration: none;
      transition: background .2s, color .2s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.12); color: var(--text); }

    /* Progress */
    .progress-wrap {
      display: flex; align-items: center; gap: 8px;
    }
    .progress-text {
      font-size: 0.82rem; font-weight: 800; color: var(--text-dim);
    }
    .progress-bar-outer {
      width: 120px; height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 50px; overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%;
      background: var(--grad);
      border-radius: 50px;
      transition: width 0.4s ease;
    }

    /* Situation card */
    #situation-card {
      position: absolute;
      top: 64px; left: 24px; right: 24px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 20px 24px;
      display: flex; align-items: center; gap: 20px;
      z-index: 10;
    }
    #situation-icon {
      width: 80px; height: 80px; flex-shrink: 0;
    }
    .situation-texts {}
    .situation-label {
      font-size: 0.72rem; font-weight: 700; color: var(--text-dim);
      letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px;
    }
    .situation-title {
      font-size: 1.3rem; font-weight: 900; color: #fff;
      margin-bottom: 4px;
    }
    .situation-question {
      font-size: 0.92rem; font-weight: 700; color: var(--text-dim);
    }

    /* Thermometer */
    #thermometer-area {
      position: absolute;
      left: 50px; top: 200px; bottom: 80px;
      width: 60px;
      display: flex; flex-direction: column; align-items: center;
      z-index: 15;
    }
    #thermo-labels {
      position: absolute;
      right: -80px; top: 0; bottom: 30px;
      display: flex; flex-direction: column;
      justify-content: space-between;
      width: 80px;
    }
    .thermo-label-text {
      font-size: 0.65rem; font-weight: 800;
      color: var(--text-dim); white-space: nowrap;
    }
    #thermo-svg {
      width: 50px;
      flex: 1;
      cursor: ns-resize;
    }

    /* Character display */
    #character-area {
      position: absolute;
      right: 60px; top: 200px;
      width: 200px; height: 200px;
      z-index: 15;
    }
    #character-svg {
      width: 100%; height: 100%;
      filter: drop-shadow(0 8px 24px rgba(168,85,247,0.3));
    }

    /* Emotion label */
    #emotion-label {
      position: absolute;
      right: 60px; top: 410px;
      width: 200px;
      text-align: center;
      font-size: 1.1rem; font-weight: 900;
      color: #fff;
      text-shadow: 0 0 16px rgba(236,72,153,0.5);
      transition: color 0.3s;
      z-index: 15;
    }

    /* Slider */
    #slider-area {
      position: absolute;
      bottom: 60px; left: 160px; right: 60px;
      z-index: 15;
    }
    .slider-labels {
      display: flex; justify-content: space-between;
      font-size: 0.78rem; font-weight: 800;
      color: var(--text-dim); margin-bottom: 8px;
    }
    #mood-slider {
      -webkit-appearance: none;
      width: 100%; height: 14px;
      border-radius: 50px;
      background: linear-gradient(to right, #60a5fa, #facc15, #f43f5e);
      outline: none;
      cursor: pointer;
    }
    #mood-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 34px; height: 34px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #a855f7;
      box-shadow: 0 2px 12px rgba(168,85,247,0.5);
      cursor: grab;
      transition: transform 0.15s;
    }
    #mood-slider::-webkit-slider-thumb:active {
      transform: scale(1.2);
      cursor: grabbing;
    }

    /* Submit button */
    #submit-btn {
      position: absolute;
      bottom: 16px; left: 50%; transform: translateX(-50%);
      padding: 12px 40px;
      border-radius: 50px;
      background: var(--grad);
      border: none;
      color: #fff;
      font-family: inherit; font-size: 1rem; font-weight: 900;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(236,72,153,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      z-index: 20;
    }
    #submit-btn:hover { transform: translateX(-50%) translateY(-3px); }
    #submit-btn:active { transform: translateX(-50%) scale(0.95); }

    /* Feedback overlay */
    #feedback-overlay {
      position: absolute;
      inset: 0; border-radius: 28px;
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      z-index: 35; background: rgba(10,1,24,0.6);
    }
    #feedback-overlay.show { display: flex; }
    .fb-badge {
      padding: 12px 32px;
      border-radius: 50px;
      font-size: 1.4rem; font-weight: 900;
    }
    .fb-badge.ok { background: rgba(34,197,94,0.25); border: 2px solid #22c55e; color: #22c55e; }
    .fb-badge.miss { background: rgba(239,68,68,0.25); border: 2px solid #ef4444; color: #ef4444; }
    .fb-hint {
      font-size: 0.92rem; font-weight: 700; color: var(--text-dim);
    }

    /* Flash */
    #flash {
      position: absolute; inset: 0; border-radius: 28px;
      pointer-events: none; z-index: 30; opacity: 0;
      transition: opacity 0.12s;
    }

    /* Particle canvas */
    #particle-canvas {
      position: absolute; inset: 0; pointer-events: none; z-index: 25;
    }

    /* Shake */
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-10px)}40%{transform:translateX(10px)}
      60%{transform:translateX(-8px)}80%{transform:translateX(6px)}
    }
    .shake { animation: shake 0.4s ease; }

    /* Result */
    #result-screen {
      position: absolute; inset: 0;
      background: rgba(10,1,24,0.93);
      border-radius: 28px;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 50; gap: 18px;
    }
    #result-screen.show { display: flex; }
    .result-title {
      font-size: 2.4rem; font-weight: 900;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-stars { display: flex; gap: 12px; }
    .result-star { width: 52px; height: 52px; }
    .result-score { font-size: 1.1rem; font-weight: 700; color: var(--text-dim); }
    .result-btns { display: flex; gap: 14px; margin-top: 8px; }
    .res-btn {
      padding: 14px 28px; border-radius: 50px;
      font-family: inherit; font-size: 1rem; font-weight: 900;
      cursor: pointer; border: none;
      transition: transform .15s;
    }
    .res-btn:hover { transform: translateY(-3px); }
    .res-btn.primary { background: var(--grad); color: #fff; }
    .res-btn.secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text);
    }
  </style>
</head>
<body>
<div id="stars-container"></div>

<div id="game-wrap">
  <div id="hud">
    <a class="btn-back" href="../../index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="14" height="14">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      홈
    </a>
    <div class="progress-wrap">
      <span class="progress-text" id="progress-text">1 / 10</span>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progress-bar" style="width:10%"></div>
      </div>
    </div>
  </div>

  <!-- Situation card -->
  <div id="situation-card">
    <svg id="situation-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="situation-texts">
      <div class="situation-label">상황</div>
      <div class="situation-title" id="situation-title">생일 파티!</div>
      <div class="situation-question">이런 상황이라면 기분이 어떨까요?</div>
    </div>
  </div>

  <!-- Thermometer -->
  <div id="thermometer-area">
    <svg id="thermo-svg" viewBox="0 0 50 260" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer tube -->
      <rect x="17" y="10" width="16" height="210" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
      <!-- Fill -->
      <rect id="thermo-fill" x="19" y="110" width="12" height="110" rx="6"
        fill="url(#thermoGrad)"/>
      <!-- Bulb -->
      <circle cx="25" cy="230" r="16" fill="#f43f5e" opacity="0.9"/>
      <circle cx="25" cy="230" r="10" fill="#fca5a5" opacity="0.5"/>
      <!-- Defs -->
      <defs>
        <linearGradient id="thermoGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f43f5e"/>
          <stop offset="100%" stop-color="#facc15"/>
        </linearGradient>
      </defs>
    </svg>
    <div id="thermo-labels">
      <span class="thermo-label-text">100°</span>
      <span class="thermo-label-text">75°</span>
      <span class="thermo-label-text">50°</span>
      <span class="thermo-label-text">25°</span>
      <span class="thermo-label-text">0°</span>
    </div>
  </div>

  <!-- Character -->
  <div id="character-area">
    <svg id="character-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Body -->
      <ellipse cx="100" cy="145" rx="38" ry="45" fill="#fde68a" opacity="0.9"/>
      <!-- Head -->
      <circle cx="100" cy="88" r="46" fill="#fde68a"/>
      <!-- Eyes -->
      <ellipse id="eye-l" cx="84" cy="84" rx="8" ry="9" fill="#1e293b"/>
      <ellipse id="eye-r" cx="116" cy="84" rx="8" ry="9" fill="#1e293b"/>
      <!-- Eye shine -->
      <circle cx="87" cy="81" r="3" fill="white"/>
      <circle cx="119" cy="81" r="3" fill="white"/>
      <!-- Mouth -->
      <path id="mouth-path" d="M82 106 Q100 120 118 106" stroke="#1e293b" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- Blush -->
      <ellipse id="blush-l" cx="72" cy="100" rx="10" ry="6" fill="#f43f5e" opacity="0"/>
      <ellipse id="blush-r" cx="128" cy="100" rx="10" ry="6" fill="#f43f5e" opacity="0"/>
      <!-- Eyebrows -->
      <path id="brow-l" d="M76 74 Q84 70 92 74" stroke="#1e293b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path id="brow-r" d="M108 74 Q116 70 124 74" stroke="#1e293b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Arms -->
      <path id="arm-l" d="M62 120 Q45 140 50 160" stroke="#fde68a" stroke-width="14" fill="none" stroke-linecap="round"/>
      <path id="arm-r" d="M138 120 Q155 140 150 160" stroke="#fde68a" stroke-width="14" fill="none" stroke-linecap="round"/>
      <!-- Legs -->
      <rect x="82" y="185" width="14" height="14" rx="5" fill="#a78bfa"/>
      <rect x="104" y="185" width="14" height="14" rx="5" fill="#a78bfa"/>
    </svg>
  </div>

  <!-- Emotion label -->
  <div id="emotion-label">보통이에요</div>

  <!-- Slider -->
  <div id="slider-area">
    <div class="slider-labels">
      <span>매우 슬픔</span>
      <span>보통</span>
      <span>매우 기쁨</span>
    </div>
    <input type="range" id="mood-slider" min="0" max="100" value="50">
  </div>

  <!-- Submit -->
  <button id="submit-btn" onclick="submitAnswer()">결정!</button>

  <!-- Feedback -->
  <div id="feedback-overlay">
    <div class="fb-badge" id="fb-badge">잘했어요!</div>
    <div class="fb-hint" id="fb-hint"></div>
  </div>

  <div id="flash"></div>
  <canvas id="particle-canvas"></canvas>

  <!-- Result -->
  <div id="result-screen">
    <div class="result-title" id="result-title">감정 박사!</div>
    <div class="result-stars" id="result-stars"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-btns">
      <button class="res-btn secondary" onclick="goHome()">홈으로</button>
      <button class="res-btn primary" onclick="restartGame()">다시하기</button>
    </div>
  </div>
</div>

<script>
// Stars
(function(){
  const c=document.getElementById('stars-container');
  for(let i=0;i<55;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*2.5+0.8;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;--dur:${2+Math.random()*4}s;--delay:${Math.random()*4}s;`;
    c.appendChild(s);
  }
})();

// Emotion state
const EMOTION_LABELS = [
  { max: 10, label: '매우 슬퍼요', color: '#60a5fa' },
  { max: 25, label: '슬퍼요', color: '#93c5fd' },
  { max: 40, label: '조금 슬퍼요', color: '#bfdbfe' },
  { max: 55, label: '보통이에요', color: '#e0e7ff' },
  { max: 70, label: '조금 기뻐요', color: '#fde68a' },
  { max: 85, label: '기뻐요', color: '#fb923c' },
  { max: 100, label: '매우 기뻐요!', color: '#f43f5e' },
];

function getEmotionInfo(value) {
  return EMOTION_LABELS.find(e => value <= e.max) || EMOTION_LABELS[EMOTION_LABELS.length - 1];
}

// Character face update
function updateCharacter(value) {
  const mouth = document.getElementById('mouth-path');
  const browL = document.getElementById('brow-l');
  const browR = document.getElementById('brow-r');
  const blushL = document.getElementById('blush-l');
  const blushR = document.getElementById('blush-r');
  const armL = document.getElementById('arm-l');
  const armR = document.getElementById('arm-r');

  const t = value / 100; // 0=sad, 1=happy

  // Mouth: sad = frown, neutral = flat, happy = smile
  if (t < 0.3) {
    mouth.setAttribute('d', `M82 112 Q100 100 118 112`); // frown
  } else if (t < 0.6) {
    mouth.setAttribute('d', `M84 108 Q100 110 116 108`); // slight smile
  } else {
    const cy = 90 + (t - 0.5) * 60;
    mouth.setAttribute('d', `M82 104 Q100 ${Math.round(cy)} 118 104`); // big smile
  }

  // Eyebrows
  if (t < 0.3) {
    browL.setAttribute('d', 'M76 78 Q84 74 92 78'); // sad brows
    browR.setAttribute('d', 'M108 78 Q116 74 124 78');
  } else if (t > 0.7) {
    browL.setAttribute('d', 'M76 70 Q84 66 92 70'); // happy raised
    browR.setAttribute('d', 'M108 70 Q116 66 124 70');
  } else {
    browL.setAttribute('d', 'M76 74 Q84 70 92 74');
    browR.setAttribute('d', 'M108 74 Q116 70 124 74');
  }

  // Blush (happy)
  const blushOp = Math.max(0, (t - 0.5) * 2);
  blushL.setAttribute('opacity', blushOp.toFixed(2));
  blushR.setAttribute('opacity', blushOp.toFixed(2));

  // Arms (raise when happy)
  if (t > 0.75) {
    armL.setAttribute('d', 'M62 120 Q38 100 35 80');
    armR.setAttribute('d', 'M138 120 Q162 100 165 80');
  } else if (t < 0.25) {
    armL.setAttribute('d', 'M62 120 Q48 150 55 170');
    armR.setAttribute('d', 'M138 120 Q152 150 145 170');
  } else {
    armL.setAttribute('d', 'M62 120 Q45 140 50 160');
    armR.setAttribute('d', 'M138 120 Q155 140 150 160');
  }

  // Emotion label
  const info = getEmotionInfo(value);
  const lbl = document.getElementById('emotion-label');
  lbl.textContent = info.label;
  lbl.style.color = info.color;
}

// Thermometer
function updateThermometer(value) {
  const fill = document.getElementById('thermo-fill');
  // full tube: y=10 height=210. bulb at y=220
  const maxH = 210;
  const h = Math.round((value / 100) * maxH);
  const y = 10 + (maxH - h);
  fill.setAttribute('y', y);
  fill.setAttribute('height', h);
}

// Slider
const slider = document.getElementById('mood-slider');
slider.addEventListener('input', () => {
  const v = parseInt(slider.value);
  updateCharacter(v);
  updateThermometer(v);
});

// Game state
let currentSituationIndex = 0;
let situationOrder = [];
let correctCount = 0;
let inFeedback = false;
const TOTAL = 10;

function shuffleSituations() {
  situationOrder = SITUATIONS.map((_, i) => i).sort(() => Math.random() - 0.5);
}

// Particles
const pCanvas = document.getElementById('particle-canvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];
pCanvas.width = 800; pCanvas.height = 600;

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 5;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      life:1, decay:0.02+Math.random()*0.02, size:4+Math.random()*7, color });
  }
}
function animateParticles() {
  pCtx.clearRect(0,0,800,600);
  particles = particles.filter(p=>p.life>0);
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.vx*=0.97; p.life-=p.decay;
    pCtx.save(); pCtx.globalAlpha=Math.max(0,p.life); pCtx.fillStyle=p.color;
    pCtx.beginPath(); pCtx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); pCtx.fill(); pCtx.restore();
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

function loadSituation(idx) {
  const sit = SITUATIONS[situationOrder[idx]];
  slider.value = 50;
  updateCharacter(50);
  updateThermometer(50);
  document.getElementById('situation-title').textContent = sit.title;
  drawSituationIcon(sit.icon);
  document.getElementById('progress-text').textContent = `${idx + 1} / ${TOTAL}`;
  document.getElementById('progress-bar').style.width = `${((idx + 1) / TOTAL) * 100}%`;
  document.getElementById('feedback-overlay').classList.remove('show');
  inFeedback = false;
}

function submitAnswer() {
  if (inFeedback) return;
  inFeedback = true;
  const sit = SITUATIONS[situationOrder[currentSituationIndex]];
  const val = parseInt(slider.value);
  const [lo, hi] = sit.range;
  const isCorrect = val >= lo && val <= hi;

  const fb = document.getElementById('feedback-overlay');
  const badge = document.getElementById('fb-badge');
  const hint = document.getElementById('fb-hint');

  if (isCorrect) {
    badge.className = 'fb-badge ok';
    badge.textContent = '맞아요!';
    hint.textContent = sit.hint;
    correctCount++;
    spawnParticles(400, 300, '#22c55e', 24);
    spawnParticles(400, 300, '#fbbf24', 16);
    const flash = document.getElementById('flash');
    flash.style.background = 'rgba(34,197,94,0.18)';
    flash.style.opacity = '1';
    setTimeout(() => { flash.style.opacity = '0'; }, 400);
  } else {
    badge.className = 'fb-badge miss';
    badge.textContent = `${sit.emotion}이에요`;
    hint.textContent = sit.hint;
    const wrap = document.getElementById('game-wrap');
    wrap.classList.add('shake');
    const flash = document.getElementById('flash');
    flash.style.background = 'rgba(239,68,68,0.25)';
    flash.style.opacity = '1';
    setTimeout(() => { flash.style.opacity = '0'; wrap.classList.remove('shake'); }, 400);
  }

  fb.classList.add('show');

  setTimeout(() => {
    currentSituationIndex++;
    if (currentSituationIndex >= TOTAL) { showResult(); return; }
    loadSituation(currentSituationIndex);
  }, 1800);
}

function showResult() {
  const stars = Math.round((correctCount / TOTAL) * 3);
  document.getElementById('result-title').textContent =
    stars === 3 ? '감정 박사!' : stars === 2 ? '잘했어요!' : '더 연습해봐요!';
  document.getElementById('result-score').textContent =
    `${correctCount}/${TOTAL} 정답`;
  renderStars(stars);
  document.getElementById('result-screen').classList.add('show');
}

function renderStars(count) {
  const c = document.getElementById('result-stars');
  c.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 24 24');
    svg.classList.add('result-star');
    const pts = [];
    for(let j=0;j<10;j++){
      const r=j%2===0?11:5;
      const a=(j*Math.PI/5)-Math.PI/2;
      pts.push(`${12+r*Math.cos(a)},${12+r*Math.sin(a)}`);
    }
    const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points',pts.join(' '));
    poly.setAttribute('fill',i<count?'#fbbf24':'rgba(255,255,255,0.1)');
    poly.setAttribute('stroke',i<count?'#f59e0b':'rgba(255,255,255,0.15)');
    poly.setAttribute('stroke-width','1');
    svg.appendChild(poly);
    c.appendChild(svg);
  }
}

function restartGame() {
  currentSituationIndex = 0; correctCount = 0; inFeedback = false;
  particles = [];
  document.getElementById('result-screen').classList.remove('show');
  shuffleSituations();
  loadSituation(0);
}
function goHome() { window.location.href = '../../index.html'; }

// Init
shuffleSituations();
loadSituation(0);
</script>
