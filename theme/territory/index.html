<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏴 땅따먹기</title>
<style>
:root {
  --accent:#FF6B35; --accent-h:#e85a25;
  --mint:#4ECDC4; --mint-h:#38b8ae;
  --bg:#FFF8F0; --card-bg:#FFFFFF; --text:#333333;
  --shadow:0 4px 16px rgba(0,0,0,.12);
  --shadow-lg:0 8px 32px rgba(0,0,0,.18);
  --radius-sm:12px; --radius-md:20px; --radius-lg:24px;
  --font:'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  --red:#FF4757; --red-light:#ffe0e0;
  --blue:#3742fa; --blue-light:#d0d3ff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  background-image:
    radial-gradient(circle at 20% 20%,rgba(255,107,53,.06) 0%,transparent 50%),
    radial-gradient(circle at 80% 80%,rgba(78,205,196,.06) 0%,transparent 50%);
  color:var(--text);font-family:var(--font);
  min-height:100vh;display:flex;justify-content:center;
  padding:20px 16px 40px;
}
.screen{display:none;width:100%;max-width:520px;margin:0 auto;}
.screen.active{display:block;animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.game-header{text-align:center;padding:28px 0 20px;}
.game-header h1{font-size:2.2rem;color:var(--accent);text-shadow:2px 3px 6px rgba(255,107,53,.2);}
.subtitle{color:#888;font-size:1rem;margin-top:6px;}

/* Buttons */
.btn{
  display:block;width:100%;padding:18px;border:none;border-radius:var(--radius-md);
  font-size:1.3rem;font-weight:800;cursor:pointer;transition:all .18s;
  box-shadow:var(--shadow);margin-bottom:14px;
}
.btn:active{transform:scale(.96);}
.btn-accent{background:linear-gradient(135deg,var(--accent),var(--accent-h));color:#fff;}
.btn-accent:hover{box-shadow:var(--shadow-lg);}
.btn-mint{background:linear-gradient(135deg,var(--mint),var(--mint-h));color:#fff;}
.btn-mint:hover{box-shadow:var(--shadow-lg);}
.btn-outline{background:#fff;color:var(--accent);border:3px solid var(--accent);}

/* Mode selection cards */
.mode-card{
  background:var(--card-bg);border-radius:var(--radius-lg);box-shadow:var(--shadow);
  padding:24px;margin-bottom:16px;text-align:center;cursor:pointer;transition:all .2s;
}
.mode-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
.mode-card:active{transform:scale(.97);}
.mode-emoji{font-size:3rem;margin-bottom:8px;}
.mode-title{font-size:1.3rem;font-weight:800;color:var(--text);}
.mode-desc{font-size:.9rem;color:#888;margin-top:4px;}

/* Turn indicator */
.turn-bar{
  background:var(--card-bg);border-radius:var(--radius-md);box-shadow:var(--shadow);
  padding:14px 20px;margin-bottom:14px;text-align:center;
  font-size:1.3rem;font-weight:800;transition:all .3s;
}
.turn-bar.red{color:var(--red);border:3px solid var(--red);}
.turn-bar.blue{color:var(--blue);border:3px solid var(--blue);}

/* Score bar */
.score-bar{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--card-bg);border-radius:var(--radius-sm);box-shadow:var(--shadow);
  padding:10px 16px;margin-bottom:14px;font-size:1rem;font-weight:700;
}
.score-red{color:var(--red);}
.score-blue{color:var(--blue);}

/* Board */
.board-wrap{
  background:var(--card-bg);border-radius:var(--radius-lg);box-shadow:var(--shadow);
  padding:12px;margin-bottom:16px;
}
.board{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:4px;
  max-width:400px;
  margin:0 auto;
}
.cell{
  aspect-ratio:1;
  display:flex;justify-content:center;align-items:center;
  font-size:1.8rem;
  background:#f5f0eb;
  border:3px solid #e0d6cc;
  border-radius:var(--radius-sm);
  cursor:pointer;
  transition:all .18s;
  user-select:none;
  position:relative;
}
.cell:hover:not(.claimed){
  border-color:var(--accent);
  transform:scale(1.05);
  box-shadow:var(--shadow);
}
.cell:active:not(.claimed){transform:scale(.94);}
.cell.claimed{cursor:default;}
.cell.red{
  background:var(--red-light);border-color:var(--red);
  animation:claimPop .4s ease;
}
.cell.blue{
  background:var(--blue-light);border-color:var(--blue);
  animation:claimPop .4s ease;
}
.cell.flip{animation:flipAnim .5s ease;}
@keyframes claimPop{0%{transform:scale(1);}40%{transform:scale(1.18);}70%{transform:scale(.95);}100%{transform:scale(1);}}
@keyframes flipAnim{0%{transform:rotateY(0);}50%{transform:rotateY(90deg);}100%{transform:rotateY(0);}}

/* Result screen */
.result-card{
  background:var(--card-bg);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);
  padding:32px 24px;text-align:center;margin-bottom:20px;
}
.result-emoji{font-size:4rem;margin-bottom:12px;}
.result-title{font-size:1.8rem;font-weight:900;margin-bottom:8px;}
.result-sub{font-size:1.1rem;color:#888;margin-bottom:4px;}
.star-row{font-size:2.2rem;margin:16px 0;}

/* Confetti */
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
.confetti{
  position:absolute;width:10px;height:10px;border-radius:2px;
  animation:confettiFall 2.5s ease-in forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(-10px) rotate(0deg);opacity:1;}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0;}
}

/* Home button */
.home-btn{
  position:fixed;top:12px;left:12px;
  background:var(--card-bg);border:none;border-radius:50%;
  width:40px;height:40px;font-size:1.2rem;
  box-shadow:var(--shadow);cursor:pointer;z-index:50;
}
</style>
</head>
<body>

<button class="home-btn" onclick="showScreen('screen-start')">🏠</button>

<!-- Start Screen -->
<div id="screen-start" class="screen active">
  <div class="game-header">
    <h1>🏴 땅따먹기</h1>
    <div class="subtitle">땅을 많이 차지하면 이겨요!</div>
  </div>
  <div class="mode-card" onclick="startGame('ai')">
    <div class="mode-emoji">🤖</div>
    <div class="mode-title">혼자 하기</div>
    <div class="mode-desc">컴퓨터와 대결해요!</div>
  </div>
  <div class="mode-card" onclick="startGame('two')">
    <div class="mode-emoji">👫</div>
    <div class="mode-title">둘이서 하기</div>
    <div class="mode-desc">친구와 번갈아 해요!</div>
  </div>
  <div style="background:var(--card-bg);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:20px;margin-top:8px;">
    <div style="font-weight:800;font-size:1.1rem;margin-bottom:8px;">📖 규칙</div>
    <div style="font-size:.9rem;color:#666;line-height:1.6;">
      빈 칸을 클릭해서 내 땅으로 만들어요!<br>
      상대 땅을 2면 이상 둘러싸면 뒤집을 수 있어요! 😎<br>
      25칸을 다 채우면 끝! 땅이 더 많으면 승리! 🎉
    </div>
  </div>
</div>

<!-- Game Screen -->
<div id="screen-game" class="screen">
  <div id="turn-bar" class="turn-bar red">🔴 빨강 차례!</div>
  <div class="score-bar">
    <span class="score-red">🔴 빨강: <span id="score-red">0</span></span>
    <span style="color:#aaa;">남은 칸: <span id="remain">25</span></span>
    <span class="score-blue">🔵 파랑: <span id="score-blue">0</span></span>
  </div>
  <div class="board-wrap">
    <div id="board" class="board"></div>
  </div>
</div>

<!-- Result Screen -->
<div id="screen-result" class="screen">
  <div class="result-card">
    <div id="result-emoji" class="result-emoji"></div>
    <div id="result-title" class="result-title"></div>
    <div id="result-sub" class="result-sub"></div>
    <div id="star-row" class="star-row"></div>
  </div>
  <button class="btn btn-accent" onclick="startGame(currentMode)">🔄 다시 하기</button>
  <button class="btn btn-outline" onclick="showScreen('screen-start')">🏠 처음으로</button>
</div>

<div id="confetti-container" class="confetti-container"></div>

<script>
/* ===== Audio System ===== */
const AudioSys = (() => {
  let ctx = null;
  function getCtx() { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); return ctx; }
  function beep(freq, type, start, dur, vol=.4) {
    const c=getCtx(), osc=c.createOscillator(), gain=c.createGain();
    osc.connect(gain); gain.connect(c.destination);
    osc.type=type; osc.frequency.setValueAtTime(freq,c.currentTime+start);
    gain.gain.setValueAtTime(vol,c.currentTime+start);
    gain.gain.exponentialRampToValueAtTime(.001,c.currentTime+start+dur);
    osc.start(c.currentTime+start); osc.stop(c.currentTime+start+dur+.05);
  }
  return {
    playCorrect() { beep(523,'sine',0,.12,.5); beep(659,'sine',.12,.12,.5); beep(784,'sine',.24,.22,.5); },
    playWrong() { beep(300,'square',0,.10,.3); beep(220,'square',.12,.15,.3); },
    playWin() { [523,659,784,880,1046].forEach((f,i)=>beep(f,'sine',i*.12,.18,.4)); },
    playPlace() { beep(440,'sine',0,.08,.3); },
  };
})();

/* ===== Reward Reporting ===== */
function reportReward(stars) {
  try {
    const data = JSON.parse(localStorage.getItem('kbr.rewards')||'null') || { totalStars:0, totalGames:0, badges:[], history:[], streak:0, lastDate:null };
    data.totalStars+=stars; data.totalGames+=1;
    const today=new Date().toISOString().slice(0,10);
    data.history.unshift({gameId:'territory',area:'전략',stars,date:today,timestamp:Date.now()});
    if(data.history.length>100) data.history=data.history.slice(0,100);
    if(data.lastDate!==today){ if(data.lastDate){const d=Math.floor((new Date(today)-new Date(data.lastDate))/86400000);data.streak=d===1?data.streak+1:1;}else{data.streak=1;} data.lastDate=today; }
    localStorage.setItem('kbr.rewards',JSON.stringify(data));
  } catch{}
}

/* ===== Helpers ===== */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ===== Game State ===== */
const GRID = 5;
const TOTAL = GRID * GRID;
let board = []; // 0=empty, 1=red, 2=blue
let currentPlayer = 1; // 1=red, 2=blue
let currentMode = 'ai';
let locked = false;

function startGame(mode) {
  currentMode = mode;
  board = new Array(TOTAL).fill(0);
  currentPlayer = 1;
  locked = false;
  renderBoard();
  updateUI();
  showScreen('screen-game');
}

function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.idx = i;
    cell.addEventListener('click', () => onCellClick(i));
    boardEl.appendChild(cell);
  }
  updateCells();
}

function updateCells() {
  const cells = document.querySelectorAll('.cell');
  cells.forEach((cell, i) => {
    cell.classList.remove('red', 'blue', 'claimed');
    cell.textContent = '';
    if (board[i] === 1) {
      cell.classList.add('red', 'claimed');
      cell.textContent = '🔴';
    } else if (board[i] === 2) {
      cell.classList.add('blue', 'claimed');
      cell.textContent = '🔵';
    }
  });
}

function updateUI() {
  const redCount = board.filter(c => c === 1).length;
  const blueCount = board.filter(c => c === 2).length;
  const remain = board.filter(c => c === 0).length;
  document.getElementById('score-red').textContent = redCount;
  document.getElementById('score-blue').textContent = blueCount;
  document.getElementById('remain').textContent = remain;

  const turnBar = document.getElementById('turn-bar');
  if (currentPlayer === 1) {
    turnBar.className = 'turn-bar red';
    turnBar.textContent = '🔴 빨강 차례!';
  } else {
    turnBar.className = 'turn-bar blue';
    turnBar.textContent = '🔵 파랑 차례!';
  }
}

function getAdjacentIndices(idx) {
  const r = Math.floor(idx / GRID), c = idx % GRID;
  const adj = [];
  if (r > 0) adj.push(idx - GRID);
  if (r < GRID - 1) adj.push(idx + GRID);
  if (c > 0) adj.push(idx - 1);
  if (c < GRID - 1) adj.push(idx + 1);
  return adj;
}

function checkFlips(player) {
  const opponent = player === 1 ? 2 : 1;
  const flipped = [];
  for (let i = 0; i < TOTAL; i++) {
    if (board[i] !== opponent) continue;
    const adj = getAdjacentIndices(i);
    const surroundCount = adj.filter(a => board[a] === player).length;
    if (surroundCount >= 2) {
      flipped.push(i);
    }
  }
  return flipped;
}

function onCellClick(idx) {
  if (locked) return;
  if (board[idx] !== 0) return;

  placeAndProcess(idx, currentPlayer);
}

function placeAndProcess(idx, player) {
  board[idx] = player;
  AudioSys.playPlace();

  // Animate the placed cell
  const cells = document.querySelectorAll('.cell');
  const placedCell = cells[idx];
  placedCell.classList.add(player === 1 ? 'red' : 'blue', 'claimed');
  placedCell.textContent = player === 1 ? '🔴' : '🔵';

  // Check for flips
  const flipped = checkFlips(player);
  if (flipped.length > 0) {
    locked = true;
    setTimeout(() => {
      flipped.forEach(fi => {
        board[fi] = player;
        const fc = cells[fi];
        fc.classList.remove('red', 'blue');
        fc.classList.add(player === 1 ? 'red' : 'blue', 'flip');
        fc.textContent = player === 1 ? '🔴' : '🔵';
      });
      AudioSys.playCorrect();
      finishTurn();
    }, 300);
  } else {
    finishTurn();
  }
}

function finishTurn() {
  updateUI();

  // Check game over
  if (board.filter(c => c === 0).length === 0) {
    locked = true;
    setTimeout(endGame, 500);
    return;
  }

  // Switch player
  currentPlayer = currentPlayer === 1 ? 2 : 1;
  updateUI();
  locked = false;

  // AI turn
  if (currentMode === 'ai' && currentPlayer === 2) {
    locked = true;
    setTimeout(aiTurn, 600);
  }
}

function aiTurn() {
  const empty = [];
  board.forEach((c, i) => { if (c === 0) empty.push(i); });
  if (empty.length === 0) return;

  // Simple AI: try to find a move that flips, otherwise random
  let bestMove = -1;
  let bestFlips = 0;
  for (const idx of empty) {
    // Simulate
    board[idx] = 2;
    const flips = checkFlips(2).length;
    board[idx] = 0;
    if (flips > bestFlips) {
      bestFlips = flips;
      bestMove = idx;
    }
  }
  if (bestMove === -1) {
    bestMove = empty[Math.floor(Math.random() * empty.length)];
  }

  placeAndProcess(bestMove, 2);
}

function endGame() {
  const redCount = board.filter(c => c === 1).length;
  const blueCount = board.filter(c => c === 2).length;

  let title, emoji, sub, stars;
  if (redCount > blueCount) {
    title = '🔴 빨강 승리!';
    emoji = '🎉';
    sub = `빨강 ${redCount}칸 vs 파랑 ${blueCount}칸`;
    stars = (currentMode === 'ai') ? 3 : 3;
  } else if (blueCount > redCount) {
    title = '🔵 파랑 승리!';
    emoji = '🎉';
    sub = `파랑 ${blueCount}칸 vs 빨강 ${redCount}칸`;
    stars = (currentMode === 'ai') ? 1 : 3;
  } else {
    title = '비겼어요!';
    emoji = '🤝';
    sub = `둘 다 ${redCount}칸!`;
    stars = 2;
  }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = sub;
  document.getElementById('star-row').textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);

  reportReward(stars);
  AudioSys.playWin();
  showScreen('screen-result');
  spawnConfetti();
}

/* ===== Confetti ===== */
function spawnConfetti() {
  const container = document.getElementById('confetti-container');
  container.innerHTML = '';
  const colors = ['#FF6B35','#4ECDC4','#FF4757','#3742fa','#FFC312','#A3CB38','#9B59B6'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + '%';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDelay = Math.random() * 1.5 + 's';
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    container.appendChild(el);
  }
  setTimeout(() => { container.innerHTML = ''; }, 4000);
}
</script>
</body>
</html>
