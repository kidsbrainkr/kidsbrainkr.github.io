<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta http-equiv="X-Content-Type-Options" content="nosniff"><meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>탈것 소리 맞추기 🚗</title>
  <style>
    :root {
      --accent:#FF6B35; --accent-h:#e85a25; --mint:#4ECDC4; --mint-h:#38b8ae;
      --bg:#FFF8F0; --card-bg:#FFFFFF; --text:#333333;
      --shadow:0 4px 16px rgba(0,0,0,.12); --shadow-lg:0 8px 32px rgba(0,0,0,.18);
      --radius-sm:12px; --radius-md:20px; --radius-lg:24px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
      padding:16px 12px 40px;user-select:none;-webkit-user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .header{text-align:center;margin-bottom:14px;}
    .header h1{font-size:clamp(1.4rem,5vw,2rem);font-weight:800;color:var(--accent);}
    .header .subtitle{font-size:clamp(.8rem,2.5vw,.95rem);color:#888;margin-top:4px;}

    .screen{width:100%;max-width:500px;display:none;flex-direction:column;align-items:center;gap:14px;}
    .screen.active{display:flex;animation:fadeIn .3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

    .start-card{
      background:var(--card-bg);border-radius:var(--radius-lg);padding:30px 24px;
      text-align:center;box-shadow:var(--shadow-lg);width:100%;
    }
    .start-card .big-emoji{font-size:3.5rem;margin-bottom:10px;}
    .start-card .title{font-size:1.3rem;font-weight:700;margin-bottom:8px;}
    .start-card .desc{font-size:.9rem;color:#777;line-height:1.5;margin-bottom:18px;}

    .btn-primary{
      display:inline-block;padding:14px 36px;border:none;border-radius:var(--radius-md);
      font-family:inherit;font-size:1.05rem;font-weight:700;color:#fff;
      background:linear-gradient(135deg,var(--accent),var(--accent-h));
      cursor:pointer;box-shadow:var(--shadow);transition:transform .15s;
    }
    .btn-primary:hover{transform:translateY(-2px);}
    .btn-primary:active{transform:scale(.97);}

    .game-top{
      width:100%;display:flex;justify-content:space-between;align-items:center;
      background:var(--card-bg);border-radius:14px;padding:10px 16px;box-shadow:var(--shadow);
    }
    .game-top-left{font-size:.85rem;font-weight:700;color:var(--accent);}
    .game-top-right{font-size:.8rem;color:#888;}

    .progress-wrap{width:100%;height:8px;background:#e8e8e8;border-radius:4px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--mint),var(--accent));border-radius:4px;transition:width .3s ease;width:0%;}

    .sound-card{
      background:var(--card-bg);border-radius:var(--radius-lg);padding:24px 20px;
      text-align:center;box-shadow:var(--shadow-lg);width:100%;
    }
    .sound-question{font-size:1.1rem;font-weight:600;color:#666;margin-bottom:16px;}
    .sound-btn{
      display:inline-flex;align-items:center;gap:10px;
      padding:16px 32px;border:none;border-radius:50px;
      font-family:inherit;font-size:1.2rem;font-weight:700;color:#fff;
      background:linear-gradient(135deg,var(--mint),var(--mint-h));
      cursor:pointer;box-shadow:var(--shadow);transition:transform .15s;
    }
    .sound-btn:hover{transform:scale(1.05);}
    .sound-btn:active{transform:scale(.95);}
    .sound-btn.playing{animation:soundPulse .5s ease infinite alternate;}
    @keyframes soundPulse{0%{transform:scale(1);}100%{transform:scale(1.08);}}

    .choices{display:flex;flex-direction:column;gap:12px;width:100%;}
    .choice-card{
      display:flex;align-items:center;gap:14px;padding:18px 20px;
      border:3px solid #eee;border-radius:var(--radius-md);
      background:var(--card-bg);font-family:inherit;font-size:1.05rem;font-weight:700;
      cursor:pointer;transition:all .2s;box-shadow:var(--shadow);
    }
    .choice-card:hover{border-color:var(--accent);transform:translateY(-2px);}
    .choice-card:active{transform:scale(.97);}
    .choice-card .card-emoji{font-size:2.5rem;}
    .choice-card .card-name{font-size:1.1rem;}
    .choice-card.correct{border-color:#38b8ae;background:#D4EDDA;animation:correctPulse .5s;}
    .choice-card.wrong{border-color:#e74c3c;background:#FDECEA;animation:wrongShake .4s;}
    @keyframes correctPulse{0%{transform:scale(1);}50%{transform:scale(1.04);}100%{transform:scale(1);}}
    @keyframes wrongShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

    .correct-overlay{
      position:fixed;top:0;left:0;width:100%;height:100%;
      display:none;align-items:center;justify-content:center;z-index:100;
      background:rgba(0,0,0,.3);
    }
    .correct-overlay.show{display:flex;animation:fadeIn .3s ease;}
    .correct-box{
      background:var(--card-bg);border-radius:var(--radius-lg);padding:30px 40px;
      text-align:center;box-shadow:var(--shadow-lg);
    }
    .correct-box .emoji{font-size:3rem;}
    .correct-box .msg{font-size:1.2rem;font-weight:700;color:var(--accent);margin-top:8px;}

    .particle-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99;}
    .particle{
      position:absolute;width:10px;height:10px;border-radius:50%;
      animation:particleFall 1s ease-out forwards;
    }
    @keyframes particleFall{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(120px) scale(0);}}

    .result-card{
      background:var(--card-bg);border-radius:var(--radius-lg);padding:30px 24px;
      text-align:center;box-shadow:var(--shadow-lg);width:100%;
    }
    .result-card .result-emoji{font-size:3.5rem;}
    .result-card .result-title{font-size:1.4rem;font-weight:800;color:var(--accent);margin:10px 0;}
    .result-card .result-detail{font-size:.9rem;color:#888;margin-bottom:6px;}
    .stars-display{font-size:2.5rem;margin:10px 0;}
    .star{display:inline-block;opacity:.25;}
    .star.earned{opacity:1;animation:starPop .4s cubic-bezier(.34,1.56,.64,1);}
    @keyframes starPop{0%{transform:scale(0);}100%{transform:scale(1);}}

    @media(max-width:480px){.choice-card .card-emoji{font-size:2rem;}.choice-card{padding:14px 16px;}}
    @media(max-width:360px){body{padding:10px 8px 30px;}.choice-card .card-emoji{font-size:1.8rem;}}
  </style>
</head>
<body>
  <div class="header">
    <h1>탈것 소리 맞추기 🚗</h1>
    <div class="subtitle">소리를 듣고 어떤 탈것인지 맞춰보세요!</div>
  </div>

  <div class="screen active" id="startScreen">
    <div class="start-card">
      <div class="big-emoji">🚗🚂✈️</div>
      <div class="title">어떤 탈것 소리일까요?</div>
      <div class="desc">소리를 잘 듣고<br>맞는 탈것을 골라보세요!</div>
      <button class="btn-primary" onclick="startGame()">🎮 시작하기</button>
    </div>
  </div>

  <div class="screen" id="gameScreen">
    <div class="game-top">
      <div class="game-top-left">문제 <span id="qNum">1</span>/8</div>
      <div class="game-top-right">맞힌 수: <span id="correctCount">0</span></div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
    <div class="sound-card">
      <div class="sound-question">이 소리는 어떤 탈것일까요?</div>
      <button class="sound-btn" id="soundBtn" onclick="playCurrentSound()">🔊 듣기</button>
    </div>
    <div class="choices" id="choices"></div>
  </div>

  <div class="screen" id="resultScreen">
    <div class="result-card">
      <div class="result-emoji">🏆</div>
      <div class="result-title">퀴즈 완료!</div>
      <div class="result-detail" id="resultDetail"></div>
      <div class="stars-display" id="starsDisplay"></div>
      <button class="btn-primary" onclick="resetGame()" style="margin-top:16px;">🔄 다시 하기</button>
    </div>
  </div>

  <div class="correct-overlay" id="correctOverlay">
    <div class="correct-box"><div class="emoji" id="overlayEmoji">🎉</div><div class="msg" id="overlayMsg">정답!</div></div>
  </div>
  <div class="particle-container" id="particleContainer"></div>

  <script>
    let audioCtx=null;
    function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

    const AudioSys=(()=>{
      function beep(freq,type,start,dur,vol=.4){
        const c=getCtx(),osc=c.createOscillator(),gain=c.createGain();
        osc.connect(gain);gain.connect(c.destination);
        osc.type=type;osc.frequency.setValueAtTime(freq,c.currentTime+start);
        gain.gain.setValueAtTime(vol,c.currentTime+start);
        gain.gain.exponentialRampToValueAtTime(.001,c.currentTime+start+dur);
        osc.start(c.currentTime+start);osc.stop(c.currentTime+start+dur+.05);
      }
      return{
        playCorrect(){beep(523,'sine',0,.12,.5);beep(659,'sine',.12,.12,.5);beep(784,'sine',.24,.22,.5);},
        playWrong(){beep(300,'square',0,.10,.3);beep(220,'square',.12,.15,.3);},
        playWin(){[523,659,784,880,1046].forEach((f,i)=>beep(f,'sine',i*.12,.18,.4));},
      };
    })();

    // Vehicle sound synthesizers
    const VehicleSounds={
      car(){
        const c=getCtx(),dur=1.5;
        // Low rumbling engine
        const osc=c.createOscillator(),gain=c.createGain();
        osc.type='sawtooth';osc.frequency.setValueAtTime(80,c.currentTime);
        osc.frequency.linearRampToValueAtTime(90,c.currentTime+dur);
        gain.gain.setValueAtTime(.15,c.currentTime);
        gain.gain.setValueAtTime(.12,c.currentTime+dur*.5);
        gain.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);
        osc.connect(gain);gain.connect(c.destination);
        osc.start(c.currentTime);osc.stop(c.currentTime+dur);
        // Slight modulation
        const lfo=c.createOscillator(),lfoGain=c.createGain();
        lfo.frequency.setValueAtTime(6,c.currentTime);lfoGain.gain.setValueAtTime(5,c.currentTime);
        lfo.connect(lfoGain);lfoGain.connect(osc.frequency);
        lfo.start(c.currentTime);lfo.stop(c.currentTime+dur);
      },
      train(){
        const c=getCtx();
        // Chug-chug
        for(let i=0;i<6;i++){
          const osc=c.createOscillator(),gain=c.createGain();
          osc.type='square';osc.frequency.setValueAtTime(150,c.currentTime+i*.2);
          gain.gain.setValueAtTime(.12,c.currentTime+i*.2);
          gain.gain.exponentialRampToValueAtTime(.001,c.currentTime+i*.2+.1);
          osc.connect(gain);gain.connect(c.destination);
          osc.start(c.currentTime+i*.2);osc.stop(c.currentTime+i*.2+.12);
        }
        // Whistle
        const w=c.createOscillator(),wg=c.createGain();
        w.type='sine';w.frequency.setValueAtTime(800,c.currentTime+1.3);
        wg.gain.setValueAtTime(.2,c.currentTime+1.3);
        wg.gain.exponentialRampToValueAtTime(.001,c.currentTime+2);
        w.connect(wg);wg.connect(c.destination);
        w.start(c.currentTime+1.3);w.stop(c.currentTime+2.1);
      },
      helicopter(){
        const c=getCtx(),dur=1.5;
        const osc=c.createOscillator(),gain=c.createGain();
        osc.type='square';osc.frequency.setValueAtTime(200,c.currentTime);
        gain.gain.setValueAtTime(.001,c.currentTime);
        osc.connect(gain);gain.connect(c.destination);
        // Fast amplitude modulation for chopping
        const lfo=c.createOscillator(),lfoGain=c.createGain();
        lfo.type='square';lfo.frequency.setValueAtTime(12,c.currentTime);
        lfoGain.gain.setValueAtTime(.15,c.currentTime);
        lfo.connect(lfoGain);lfoGain.connect(gain.gain);
        gain.gain.setValueAtTime(.15,c.currentTime);
        gain.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);
        osc.start(c.currentTime);osc.stop(c.currentTime+dur);
        lfo.start(c.currentTime);lfo.stop(c.currentTime+dur);
      },
      airplane(){
        const c=getCtx(),dur=1.8;
        const osc=c.createOscillator(),gain=c.createGain();
        osc.type='sawtooth';osc.frequency.setValueAtTime(300,c.currentTime);
        gain.gain.setValueAtTime(.1,c.currentTime);
        gain.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);
        osc.connect(gain);gain.connect(c.destination);
        osc.start(c.currentTime);osc.stop(c.currentTime+dur);
        // High freq layer
        const osc2=c.createOscillator(),g2=c.createGain();
        osc2.type='sawtooth';osc2.frequency.setValueAtTime(600,c.currentTime);
        g2.gain.setValueAtTime(.05,c.currentTime);
        g2.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);
        osc2.connect(g2);g2.connect(c.destination);
        osc2.start(c.currentTime);osc2.stop(c.currentTime+dur);
      },
      ship(){
        const c=getCtx(),dur=2;
        const osc=c.createOscillator(),gain=c.createGain();
        osc.type='sine';osc.frequency.setValueAtTime(100,c.currentTime);
        osc.frequency.linearRampToValueAtTime(95,c.currentTime+dur);
        gain.gain.setValueAtTime(.25,c.currentTime);
        gain.gain.setValueAtTime(.25,c.currentTime+dur*.6);
        gain.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);
        osc.connect(gain);gain.connect(c.destination);
        osc.start(c.currentTime);osc.stop(c.currentTime+dur+.05);
      },
      motorcycle(){
        const c=getCtx(),dur=1.5;
        const osc=c.createOscillator(),gain=c.createGain();
        osc.type='sawtooth';
        osc.frequency.setValueAtTime(200,c.currentTime);
        osc.frequency.exponentialRampToValueAtTime(500,c.currentTime+dur*.7);
        osc.frequency.exponentialRampToValueAtTime(300,c.currentTime+dur);
        gain.gain.setValueAtTime(.12,c.currentTime);
        gain.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);
        osc.connect(gain);gain.connect(c.destination);
        osc.start(c.currentTime);osc.stop(c.currentTime+dur+.05);
      },
      ambulance(){
        const c=getCtx(),dur=2;
        const osc=c.createOscillator(),gain=c.createGain();
        osc.type='sine';
        gain.gain.setValueAtTime(.2,c.currentTime);
        gain.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);
        // Siren: alternate 600-800Hz
        for(let t=0;t<dur;t+=.4){
          osc.frequency.setValueAtTime(600,c.currentTime+t);
          osc.frequency.linearRampToValueAtTime(800,c.currentTime+t+.2);
          if(t+.2<dur)osc.frequency.linearRampToValueAtTime(600,c.currentTime+t+.4);
        }
        osc.connect(gain);gain.connect(c.destination);
        osc.start(c.currentTime);osc.stop(c.currentTime+dur+.05);
      },
      firetruck(){
        const c=getCtx(),dur=2;
        const osc=c.createOscillator(),gain=c.createGain();
        osc.type='sine';
        gain.gain.setValueAtTime(.2,c.currentTime);
        gain.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);
        // Wider siren 400-1000Hz
        for(let t=0;t<dur;t+=.5){
          osc.frequency.setValueAtTime(400,c.currentTime+t);
          osc.frequency.linearRampToValueAtTime(1000,c.currentTime+t+.25);
          if(t+.25<dur)osc.frequency.linearRampToValueAtTime(400,c.currentTime+t+.5);
        }
        osc.connect(gain);gain.connect(c.destination);
        osc.start(c.currentTime);osc.stop(c.currentTime+dur+.05);
      },
    };

    function reportReward(stars){
      try{
        const data=JSON.parse(localStorage.getItem('kbr.rewards')||'null')||{totalStars:0,totalGames:0,badges:[],history:[],streak:0,lastDate:null};
        data.totalStars+=stars;data.totalGames+=1;
        const today=new Date().toISOString().slice(0,10);
        data.history.unshift({gameId:'vehicle_sound',area:'청각',stars,date:today,timestamp:Date.now()});
        if(data.history.length>100)data.history=data.history.slice(0,100);
        if(data.lastDate!==today){if(data.lastDate){const d=Math.floor((new Date(today)-new Date(data.lastDate))/86400000);data.streak=d===1?data.streak+1:1;}else{data.streak=1;}data.lastDate=today;}
        localStorage.setItem('kbr.rewards',JSON.stringify(data));
      }catch(e){}
    }

    function shuffle(arr){
      const a=[...arr];
      for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
      return a;
    }

    function showParticles(){
      const container=document.getElementById('particleContainer');
      const colors=['#FF6B35','#4ECDC4','#FFD86F','#FF8E53','#84FAB0'];
      for(let i=0;i<20;i++){
        const p=document.createElement('div');
        p.className='particle';
        p.style.left=Math.random()*100+'%';
        p.style.top=(Math.random()*40+20)+'%';
        p.style.background=colors[Math.floor(Math.random()*colors.length)];
        p.style.width=p.style.height=(Math.random()*8+6)+'px';
        p.style.animationDelay=Math.random()*.3+'s';
        container.appendChild(p);
      }
      setTimeout(()=>container.innerHTML='',1500);
    }

    const vehicles=[
      {key:'car',emoji:'🚗',name:'자동차',play:()=>VehicleSounds.car()},
      {key:'train',emoji:'🚂',name:'기차',play:()=>VehicleSounds.train()},
      {key:'helicopter',emoji:'🚁',name:'헬리콥터',play:()=>VehicleSounds.helicopter()},
      {key:'airplane',emoji:'✈️',name:'비행기',play:()=>VehicleSounds.airplane()},
      {key:'ship',emoji:'🚢',name:'배',play:()=>VehicleSounds.ship()},
      {key:'motorcycle',emoji:'🏍️',name:'오토바이',play:()=>VehicleSounds.motorcycle()},
      {key:'ambulance',emoji:'🚑',name:'구급차',play:()=>VehicleSounds.ambulance()},
      {key:'firetruck',emoji:'🚒',name:'소방차',play:()=>VehicleSounds.firetruck()},
    ];

    let questions=[], currentQ=0, correctTotal=0, answered=false;
    const TOTAL_Q=8;

    function showScreen(id){
      document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function startGame(){
      questions=shuffle([...vehicles]).slice(0,TOTAL_Q);
      currentQ=0;correctTotal=0;
      showQuestion();
      showScreen('gameScreen');
    }

    function playCurrentSound(){
      const btn=document.getElementById('soundBtn');
      questions[currentQ].play();
      btn.classList.add('playing');
      setTimeout(()=>btn.classList.remove('playing'),1500);
    }

    function showQuestion(){
      answered=false;
      const q=questions[currentQ];
      document.getElementById('qNum').textContent=currentQ+1;
      document.getElementById('correctCount').textContent=correctTotal;
      document.getElementById('progressFill').style.width=(currentQ/TOTAL_Q*100)+'%';

      // Auto-play sound
      setTimeout(()=>playCurrentSound(),400);

      // Build 3 choices
      const wrong=shuffle(vehicles.filter(v=>v.key!==q.key)).slice(0,2);
      const choices=shuffle([q,...wrong]);

      const choicesEl=document.getElementById('choices');
      choicesEl.innerHTML='';
      choices.forEach(c=>{
        const btn=document.createElement('button');
        btn.className='choice-card';
        btn.innerHTML=`<span class="card-emoji">${c.emoji}</span><span class="card-name">${c.name}</span>`;
        btn.onclick=()=>answer(btn,c.key===q.key,q);
        choicesEl.appendChild(btn);
      });
    }

    function answer(btn,isCorrect,q){
      if(answered)return;
      answered=true;

      if(isCorrect){
        btn.classList.add('correct');
        correctTotal++;
        AudioSys.playCorrect();
        showParticles();
        document.getElementById('correctCount').textContent=correctTotal;

        const overlay=document.getElementById('correctOverlay');
        document.getElementById('overlayEmoji').textContent=q.emoji;
        document.getElementById('overlayMsg').textContent='맞아요! '+q.name+'!';
        overlay.classList.add('show');
        setTimeout(()=>overlay.classList.remove('show'),1000);
      }else{
        btn.classList.add('wrong');
        AudioSys.playWrong();
        document.querySelectorAll('.choice-card').forEach(b=>{
          if(b.querySelector('.card-name').textContent===q.name)b.classList.add('correct');
        });
      }

      setTimeout(()=>{
        currentQ++;
        if(currentQ>=TOTAL_Q){
          showResult();
        }else{
          showQuestion();
        }
      },1800);
    }

    function showResult(){
      AudioSys.playWin();showParticles();
      let stars=1;
      if(correctTotal>=7)stars=3;
      else if(correctTotal>=5)stars=2;

      document.getElementById('resultDetail').textContent=`8문제 중 ${correctTotal}개 맞혔어요!`;
      const sd=document.getElementById('starsDisplay');
      sd.innerHTML='';
      for(let i=0;i<3;i++){
        const s=document.createElement('span');
        s.className='star'+(i<stars?' earned':'');
        s.textContent='⭐';
        s.style.animationDelay=i*.15+'s';
        sd.appendChild(s);
      }
      reportReward(stars);
      showScreen('resultScreen');
    }

    function resetGame(){showScreen('startScreen');}
  </script>
</body>
</html>
