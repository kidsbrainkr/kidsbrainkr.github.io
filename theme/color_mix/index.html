<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>색깔 섞기 실험실</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0118;
      --panel: rgba(24, 12, 54, 0.86);
      --panel-strong: rgba(39, 20, 85, 0.94);
      --line: rgba(255, 255, 255, 0.18);
      --line-bright: rgba(255, 255, 255, 0.34);
      --text: #fff8ff;
      --muted: #d7c9f6;
      --yellow: #ffd84d;
      --pink: #ff63b5;
      --blue: #40c9ff;
      --green: #44e08c;
      --red: #ff4f67;
      --purple: #a86bff;
      --orange: #ff9b37;
      --shadow: rgba(0, 0, 0, 0.38);
      --correct: #36e989;
      --wrong: #ff4b6a;
      --tube-a: #3498db;
      --tube-b: #f1c40f;
      --mixed: #2ecc71;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 18%, rgba(90, 48, 156, 0.26), transparent 28%),
        radial-gradient(circle at 86% 80%, rgba(0, 188, 212, 0.12), transparent 32%),
        #0a0118;
      color: var(--text);
      font-family: 'Nunito', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    a,
    button {
      font: inherit;
    }

    button {
      border: 0;
    }

    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: var(--size);
      height: var(--size);
      left: var(--x);
      top: var(--y);
      border-radius: 50%;
      background: #ffffff;
      box-shadow:
        0 0 calc(var(--size) * 2) rgba(255, 255, 255, 0.9),
        0 0 calc(var(--size) * 5) rgba(124, 217, 255, 0.45);
      opacity: 0.35;
      animation:
        twinkle var(--speed) ease-in-out var(--delay) infinite alternate,
        starDrift calc(var(--speed) * 4) ease-in-out var(--delay) infinite alternate;
    }

    @keyframes twinkle {
      0% {
        opacity: 0.2;
        transform: scale(0.78);
      }
      48% {
        opacity: 0.68;
      }
      100% {
        opacity: 1;
        transform: scale(1.45);
      }
    }

    @keyframes starDrift {
      from {
        margin-left: -1px;
        margin-top: 0;
      }
      to {
        margin-left: 2px;
        margin-top: -2px;
      }
    }

    #game-area {
      position: relative;
      z-index: 1;
      width: 800px;
      height: 600px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(28, 14, 63, 0.78), rgba(10, 1, 24, 0.92)),
        #0a0118;
      box-shadow:
        0 28px 70px rgba(0, 0, 0, 0.52),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    #game-area.wrong {
      animation: shake 0.5s ease;
    }

    #game-area.wrong::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 12;
      pointer-events: none;
      background: rgba(255, 39, 83, 0.25);
      animation: redFlash 0.48s ease forwards;
    }

    @keyframes shake {
      0%,
      100% {
        transform: translateX(0);
      }
      15% {
        transform: translateX(-10px) rotate(-0.7deg);
      }
      30% {
        transform: translateX(9px) rotate(0.7deg);
      }
      45% {
        transform: translateX(-7px) rotate(-0.5deg);
      }
      60% {
        transform: translateX(6px) rotate(0.4deg);
      }
      75% {
        transform: translateX(-3px);
      }
    }

    @keyframes redFlash {
      0% {
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        opacity: 0;
      }
    }

    .hud {
      position: absolute;
      z-index: 10;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      pointer-events: none;
    }

    .home-button,
    .hud-progress,
    .small-pill {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
    }

    .home-button {
      gap: 6px;
      padding: 0 17px;
      text-decoration: none;
      font-weight: 900;
      pointer-events: auto;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .home-button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.14);
    }

    .hud-progress {
      min-width: 148px;
      padding: 0 16px;
      gap: 8px;
      color: #fff3bf;
      font-size: 17px;
      font-weight: 900;
    }

    .hud-progress svg {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      padding: 74px 38px 34px;
    }

    .screen.active {
      display: block;
      animation: screenIn 0.34s ease both;
    }

    @keyframes screenIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .intro-layout,
    .result-layout {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .intro-card,
    .result-card {
      width: 600px;
      padding: 34px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04)),
        rgba(24, 12, 54, 0.86);
      box-shadow:
        0 18px 44px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .title-mark {
      width: 156px;
      height: 108px;
      margin: 0 auto 14px;
      filter: drop-shadow(0 12px 24px rgba(0, 0, 0, 0.28));
      animation: floatLab 3s ease-in-out infinite alternate;
    }

    @keyframes floatLab {
      from {
        transform: translateY(0) rotate(-1deg);
      }
      to {
        transform: translateY(-8px) rotate(1deg);
      }
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 44px;
      line-height: 1.04;
      font-weight: 900;
      letter-spacing: 0;
      color: #ffffff;
      text-shadow: 0 5px 18px rgba(126, 83, 255, 0.5);
    }

    .intro-copy,
    .result-copy {
      margin-top: 12px;
      color: var(--muted);
      font-size: 21px;
      line-height: 1.45;
      font-weight: 800;
    }

    .action-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 26px;
    }

    .primary-button,
    .secondary-button {
      height: 54px;
      min-width: 152px;
      padding: 0 24px;
      border-radius: 18px;
      cursor: pointer;
      color: #18001f;
      font-size: 20px;
      font-weight: 900;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.28);
      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        filter 0.18s ease;
    }

    .primary-button {
      background: linear-gradient(135deg, #ffe77a, #58f3b2);
    }

    .secondary-button {
      color: var(--text);
      border: 1px solid var(--line-bright);
      background: rgba(255, 255, 255, 0.1);
    }

    .primary-button:hover,
    .secondary-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.34);
      filter: brightness(1.05);
    }

    .play-grid {
      height: 100%;
      display: grid;
      grid-template-columns: 220px 1fr 220px;
      grid-template-rows: 82px 1fr 126px;
      gap: 12px;
      align-items: stretch;
    }

    .question-panel {
      grid-column: 1 / 4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 78px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        linear-gradient(90deg, rgba(64, 201, 255, 0.12), rgba(255, 216, 77, 0.12)),
        rgba(255, 255, 255, 0.055);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    #questionText {
      color: #fff8ff;
      font-size: 36px;
      line-height: 1.1;
      font-weight: 900;
      text-align: center;
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.32);
    }

    .tube-zone {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.055);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .tube-zone.left {
      grid-column: 1;
      grid-row: 2;
    }

    .tube-zone.right {
      grid-column: 3;
      grid-row: 2;
    }

    .tube-label {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 16px;
      color: var(--muted);
      text-align: center;
      font-size: 24px;
      font-weight: 900;
    }

    .tube {
      position: absolute;
      left: 50%;
      top: 48%;
      width: 132px;
      height: 190px;
      touch-action: none;
      cursor: grab;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 14px 20px rgba(0, 0, 0, 0.34));
      transition:
        filter 0.18s ease,
        transform 0.18s ease;
    }

    .tube.dragging {
      position: fixed;
      z-index: 30;
      cursor: grabbing;
      filter: drop-shadow(0 22px 28px rgba(0, 0, 0, 0.42));
      transition: none;
    }

    .tube.dropped {
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.72) rotate(16deg);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .tube svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .lab-zone {
      position: relative;
      grid-column: 2;
      grid-row: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 20px;
      background:
        radial-gradient(circle at 50% 86%, rgba(255, 255, 255, 0.09), transparent 38%),
        rgba(255, 255, 255, 0.045);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .beaker-wrap {
      position: relative;
      width: 220px;
      height: 250px;
    }

    .beaker-target {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 220px;
      height: 250px;
      transform: translate(-50%, -50%);
    }

    .beaker-target.ready {
      animation: beakerPulse 0.95s ease-in-out infinite alternate;
    }

    @keyframes beakerPulse {
      from {
        filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.16));
      }
      to {
        filter: drop-shadow(0 0 22px rgba(92, 233, 255, 0.5));
      }
    }

    .beaker-svg {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .liquid-mask {
      position: absolute;
      left: 45px;
      right: 45px;
      bottom: 28px;
      height: 0;
      z-index: 2;
      overflow: hidden;
      border-radius: 18px 18px 34px 34px;
      opacity: 0.94;
      transition:
        height 0.45s cubic-bezier(0.2, 0.8, 0.2, 1),
        background 0.25s ease;
    }

    .liquid-mask.one {
      height: 58px;
      background: var(--tube-a);
      box-shadow: inset 0 10px 18px rgba(255, 255, 255, 0.2);
    }

    .liquid-mask.two {
      height: 105px;
      background: linear-gradient(90deg, var(--tube-a), var(--tube-b));
    }

    .liquid-mask.mixing {
      height: 116px;
      background: transparent;
    }

    .liquid-mask.mixed {
      height: 112px;
      background: var(--mixed);
      box-shadow:
        inset 0 11px 19px rgba(255, 255, 255, 0.2),
        0 0 28px color-mix(in srgb, var(--mixed) 62%, transparent);
    }

    .swirl {
      position: absolute;
      inset: -55px;
      border-radius: 50%;
      opacity: 0;
      background:
        conic-gradient(
          from 0deg,
          var(--tube-a) 0deg,
          var(--tube-b) 72deg,
          #ffffff 126deg,
          var(--tube-a) 168deg,
          var(--tube-b) 244deg,
          var(--tube-a) 360deg
        );
    }

    .liquid-mask.mixing .swirl {
      opacity: 1;
      animation:
        spiralSpin 0.65s linear infinite,
        spiralSqueeze 1.1s ease-in-out infinite alternate;
    }

    @keyframes spiralSpin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes spiralSqueeze {
      from {
        scale: 1 0.78;
        filter: blur(0);
      }
      to {
        scale: 0.86 1;
        filter: blur(1px);
      }
    }

    .beaker-shine {
      position: absolute;
      left: 73px;
      top: 78px;
      z-index: 4;
      width: 17px;
      height: 102px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0.04));
      opacity: 0.68;
      pointer-events: none;
    }

    .drop-status {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 12px;
      color: var(--muted);
      font-size: 18px;
      font-weight: 900;
      text-align: center;
    }

    .choice-panel,
    .free-panel {
      grid-column: 1 / 4;
      grid-row: 3;
      min-height: 118px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.055);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .choice-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    .choice-panel.hidden,
    .free-panel.hidden {
      display: none;
    }

    .choice-button {
      width: 142px;
      height: 86px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid var(--line-bright);
      border-radius: 18px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.09);
      cursor: pointer;
      font-size: 22px;
      font-weight: 900;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.22);
      transition:
        transform 0.18s ease,
        border-color 0.18s ease,
        background 0.18s ease;
    }

    .choice-button:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.14);
    }

    .choice-dot {
      width: 44px;
      height: 44px;
      flex: 0 0 auto;
      border: 3px solid rgba(255, 255, 255, 0.65);
      border-radius: 50%;
      background: var(--choice-color);
      box-shadow:
        inset 0 8px 14px rgba(255, 255, 255, 0.2),
        0 0 18px color-mix(in srgb, var(--choice-color) 58%, transparent);
    }

    .free-panel {
      padding: 12px 14px;
    }

    .free-top {
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 17px;
      font-weight: 900;
    }

    .free-slots {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff8ff;
    }

    .slot-dot {
      width: 22px;
      height: 22px;
      border: 2px solid rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.14);
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 8px;
    }

    .palette-button {
      height: 58px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 15px;
      color: #fff;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.23), rgba(0, 0, 0, 0.08)),
        var(--palette-color);
      cursor: pointer;
      font-size: 14px;
      font-weight: 900;
      text-shadow: 0 2px 7px rgba(0, 0, 0, 0.55);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.23);
      transition: transform 0.16s ease, outline-color 0.16s ease;
    }

    .palette-button:hover {
      transform: translateY(-2px);
    }

    .palette-button.selected {
      outline: 4px solid #ffffff;
      outline-offset: 2px;
    }

    .feedback-card {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 15;
      width: 500px;
      min-height: 174px;
      padding: 24px 28px;
      border: 1px solid var(--line-bright);
      border-radius: 22px;
      background:
        radial-gradient(circle at 22% 18%, rgba(255, 255, 255, 0.14), transparent 32%),
        rgba(28, 14, 63, 0.97);
      text-align: center;
      box-shadow: 0 22px 52px rgba(0, 0, 0, 0.48);
      transform: translate(-50%, -50%) scale(0.88);
      opacity: 0;
      pointer-events: none;
    }

    .feedback-card.show {
      animation: popCard 0.35s cubic-bezier(0.18, 0.88, 0.32, 1.2) forwards;
    }

    @keyframes popCard {
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    .result-color {
      width: 78px;
      height: 78px;
      margin: 0 auto 10px;
      border: 4px solid rgba(255, 255, 255, 0.72);
      border-radius: 50%;
      background: var(--mixed);
      box-shadow:
        inset 0 12px 18px rgba(255, 255, 255, 0.2),
        0 0 34px color-mix(in srgb, var(--mixed) 62%, transparent);
      animation: colorBounce 0.7s ease-in-out infinite alternate;
    }

    @keyframes colorBounce {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(-5px);
      }
    }

    #feedbackTitle {
      color: #ffffff;
      font-size: 32px;
      font-weight: 900;
    }

    #feedbackText {
      margin-top: 6px;
      color: var(--muted);
      font-size: 21px;
      font-weight: 900;
      line-height: 1.36;
    }

    #particleLayer {
      position: absolute;
      inset: 0;
      z-index: 14;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      left: var(--px);
      top: var(--py);
      width: var(--ps);
      height: var(--ps);
      border-radius: 50%;
      background: var(--pc);
      box-shadow: 0 0 14px var(--pc);
      animation: particleFly 0.78s ease-out forwards;
    }

    @keyframes particleFly {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(0.28);
      }
    }

    .score-stars {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 20px 0 12px;
    }

    .score-star {
      width: 38px;
      height: 38px;
      filter: drop-shadow(0 0 14px rgba(255, 218, 77, 0.45));
      animation: starPop 0.46s ease both;
      animation-delay: var(--star-delay);
    }

    @keyframes starPop {
      from {
        opacity: 0;
        transform: scale(0) rotate(-20deg);
      }
      to {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    .unlock-band {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      margin-top: 12px;
      padding: 0 18px;
      border-radius: 999px;
      color: #1b0730;
      background: linear-gradient(135deg, #ffe77a, #58f3b2);
      font-size: 18px;
      font-weight: 900;
    }

    .hidden {
      display: none !important;
    }

  </style>
</head>
<body>
  <div class="stars" aria-hidden="true">
    <div class="star" style="--x:3%;--y:7%;--size:2px;--speed:2.4s;--delay:-0.2s;"></div>
    <div class="star" style="--x:8%;--y:22%;--size:3px;--speed:3.1s;--delay:-1.0s;"></div>
    <div class="star" style="--x:13%;--y:13%;--size:2px;--speed:2.7s;--delay:-0.5s;"></div>
    <div class="star" style="--x:18%;--y:34%;--size:4px;--speed:3.8s;--delay:-1.6s;"></div>
    <div class="star" style="--x:22%;--y:8%;--size:2px;--speed:2.6s;--delay:-0.9s;"></div>
    <div class="star" style="--x:27%;--y:19%;--size:3px;--speed:3.4s;--delay:-1.8s;"></div>
    <div class="star" style="--x:32%;--y:5%;--size:2px;--speed:2.2s;--delay:-0.3s;"></div>
    <div class="star" style="--x:37%;--y:28%;--size:3px;--speed:3.6s;--delay:-2.0s;"></div>

    function showScreen(screen) {
      introScreen.classList.remove('active');
      playScreen.classList.remove('active');
      resultScreen.classList.remove('active');
      screen.classList.add('active');
    }

    function colorByKey(key) {
      return colorData[key].color;
    }

    function getRound() {
      return quizRounds[game.round];
    }

    function updateProgress() {
      if (game.mode === 'quiz') {
        progressText.textContent = `${game.round + 1} / ${quizRounds.length}`;
      } else {
        progressText.textContent = '자유 실험';
      }
    }

    function setTubeColors(aKey, bKey) {
      gameArea.style.setProperty('--tube-a', colorByKey(aKey));
      gameArea.style.setProperty('--tube-b', colorByKey(bKey));
      tubeALabel.textContent = colorData[aKey].name;
      tubeBLabel.textContent = colorData[bKey].name;
    }

    function resetLab() {
      game.dropped.a = false;
      game.dropped.b = false;
      game.acceptingDrops = true;
      game.mixed = false;
      choicePanel.classList.add('hidden');
      choicePanel.innerHTML = '';
      feedbackCard.classList.remove('show');
      liquidMask.className = 'liquid-mask';
      dropStatus.textContent = '물감을 비커로 끌어와요';
      tubeA.classList.remove('dropped', 'dragging');
      tubeB.classList.remove('dropped', 'dragging');
      tubeA.style.left = '50%';
      tubeA.style.top = '48%';
      tubeA.style.transform = 'translate(-50%, -50%)';
      tubeB.style.left = '50%';
      tubeB.style.top = '48%';
      tubeB.style.transform = 'translate(-50%, -50%)';
    }

    function setupQuizRound() {
      const round = getRound();
      game.mode = 'quiz';
      freePanel.classList.add('hidden');
      setTubeColors(round.a, round.b);
      updateProgress();
      questionText.textContent = `${colorData[round.a].name} + ${colorData[round.b].name} = ?`;
      resetLab();
    }

    function startQuiz() {
      game.mode = 'quiz';
      game.round = 0;
      game.score = 0;
      showScreen(playScreen);
      setupQuizRound();
    }

    function startFreeMode() {
      game.mode = 'free';
      game.freePicked = [];
      showScreen(playScreen);
      freePanel.classList.remove('hidden');
      choicePanel.classList.add('hidden');
      updateProgress();
      buildPalette();
      setTubeColors('blue', 'yellow');
      questionText.textContent = '자유롭게 색을 골라 섞어봐요';
      resetLab();
      freePanel.classList.remove('hidden');
      updateFreeSlots();
    }

    function buildPalette() {
      palette.innerHTML = '';
      paletteOrder.forEach((key) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'palette-button';
        button.textContent = colorData[key].name;
        button.style.setProperty('--palette-color', colorByKey(key));
        button.dataset.colorKey = key;
        button.addEventListener('click', () => chooseFreeColor(key));
        palette.appendChild(button);
      });
    }

    function chooseFreeColor(key) {
      if (game.mode !== 'free') {
        return;
      }
      if (game.freePicked.length === 2) {
        game.freePicked = [];
      }
      game.freePicked.push(key);
      updateFreeSlots();
      if (game.freePicked.length === 1) {
        setTubeColors(game.freePicked[0], game.freePicked[0]);
        questionText.textContent = `${colorData[game.freePicked[0]].name} + ?`;
        resetLab();
        freePanel.classList.remove('hidden');
      }
      if (game.freePicked.length === 2) {
        setTubeColors(game.freePicked[0], game.freePicked[1]);
        questionText.textContent = `${colorData[game.freePicked[0]].name} + ${colorData[game.freePicked[1]].name}`;
        resetLab();
        freePanel.classList.remove('hidden');
      }
    }

    function updateFreeSlots() {
      const buttons = palette.querySelectorAll('.palette-button');
      buttons.forEach((button) => {
        const selected = game.freePicked.includes(button.dataset.colorKey);
        button.classList.toggle('selected', selected);
      });
      slotA.style.background = game.freePicked[0] ? colorByKey(game.freePicked[0]) : 'rgba(255,255,255,0.14)';
      slotB.style.background = game.freePicked[1] ? colorByKey(game.freePicked[1]) : 'rgba(255,255,255,0.14)';
      freeHint.textContent = game.freePicked.length < 2 ? '색 2개를 골라요' : '물감을 비커에 넣어요';
    }

    function setupTubeDrag(tube) {
      const state = {
        dragging: false,
        offsetX: 0,
        offsetY: 0
      };

      tube.addEventListener('pointerdown', (event) => {
        if (!game.acceptingDrops || tube.classList.contains('dropped')) {
          return;
        }
        if (game.mode === 'free' && game.freePicked.length < 2) {
          dropStatus.textContent = '먼저 색 2개를 골라요';
          return;
        }
        state.dragging = true;
        tube.setPointerCapture(event.pointerId);
        tube.classList.add('dragging');
        const tubeRect = tube.getBoundingClientRect();
        state.offsetX = event.clientX - tubeRect.left;
        state.offsetY = event.clientY - tubeRect.top;
        tube.style.left = `${tubeRect.left}px`;
        tube.style.top = `${tubeRect.top}px`;
        tube.style.transform = 'translate(0, 0)';
      });

      tube.addEventListener('pointermove', (event) => {
        if (!state.dragging) {
          return;
        }
        const x = event.clientX - state.offsetX;
        const y = event.clientY - state.offsetY;
        tube.style.left = `${x}px`;
        tube.style.top = `${y}px`;
      });

      tube.addEventListener('pointerup', (event) => {
        if (!state.dragging) {
          return;
        }
        state.dragging = false;
        tube.releasePointerCapture(event.pointerId);
        tube.classList.remove('dragging');
        if (isOverBeaker(event.clientX, event.clientY)) {
          dropTube(tube);
        } else {
          returnTube(tube);
        }
      });

      tube.addEventListener('pointercancel', () => {
        state.dragging = false;
        tube.classList.remove('dragging');
        returnTube(tube);
      });
    }

    function isOverBeaker(clientX, clientY) {
      const rect = beakerWrap.getBoundingClientRect();
      return (
        clientX >= rect.left + 24 &&
        clientX <= rect.right - 24 &&
        clientY >= rect.top + 18 &&
        clientY <= rect.bottom - 4
      );
    }

    function returnTube(tube) {
      tube.style.left = '50%';
      tube.style.top = '48%';
      tube.style.transform = 'translate(-50%, -50%)';
    }

    function dropTube(tube) {
      const key = tube.dataset.tube;
      if (game.dropped[key]) {
        return;
      }
      game.dropped[key] = true;
      tube.classList.add('dropped');
      if (game.dropped.a && game.dropped.b) {
        dropStatus.textContent = '빙글빙글 섞는 중';
        liquidMask.className = 'liquid-mask two';
        mixNow();
      } else {
        dropStatus.textContent = '하나 더 넣어봐요';
        liquidMask.className = 'liquid-mask one';
      }
    }

    function currentMixKeys() {
      if (game.mode === 'quiz') {
        const round = getRound();
        return [round.a, round.b];
      }
      return [game.freePicked[0], game.freePicked[1]];
    }

    function getMixResult(aKey, bKey) {
      if (aKey === bKey) {
        return aKey;
      }
      return mixMap[`${aKey}+${bKey}`] || blendFallback(aKey, bKey);
    }

    function blendFallback(aKey, bKey) {
      const neutral = ['white', 'black', 'gray'];
      if (neutral.includes(aKey) && !neutral.includes(bKey)) {
        return bKey;
      }
      if (neutral.includes(bKey) && !neutral.includes(aKey)) {
        return aKey;
      }
      return 'brown';
    }

    function mixNow() {
      game.acceptingDrops = false;
      game.mixed = true;
      const [aKey, bKey] = currentMixKeys();
      const resultKey = game.mode === 'quiz' ? getRound().result : getMixResult(aKey, bKey);
      gameArea.style.setProperty('--mixed', colorByKey(resultKey));
      liquidMask.className = 'liquid-mask mixing';
      setTimeout(() => {
        liquidMask.className = 'liquid-mask mixed';
        if (game.mode === 'quiz') {
          showChoices();
        } else {
          showFreeResult(resultKey);
        }
      }, 1500);
    }

    function showChoices() {
      const round = getRound();
      choicePanel.innerHTML = '';
      choicePanel.classList.remove('hidden');
      dropStatus.textContent = '맞는 색을 골라요';
      round.choices.forEach((key) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'choice-button';
        button.dataset.choice = key;
        button.innerHTML = `<span class="choice-dot" style="--choice-color:${colorByKey(key)}"></span><span>${colorData[key].name}</span>`;
        button.addEventListener('click', () => answerChoice(key));
        choicePanel.appendChild(button);
      });
    }

    function answerChoice(key) {
      const round = getRound();
      if (key === round.result) {
        game.score += 1;
        createParticles(400, 288, colorByKey(round.result));
        showFeedback(round.result, '맞았어요!');
        setTimeout(nextRound, 1500);
      } else {
        gameArea.classList.remove('wrong');
        void gameArea.offsetWidth;
        gameArea.classList.add('wrong');
        dropStatus.textContent = '다시 골라봐요';
        setTimeout(() => gameArea.classList.remove('wrong'), 560);
      }
    }

    function showFreeResult(resultKey) {
      createParticles(400, 288, colorByKey(resultKey));
      showFeedback(resultKey, '섞였어요!');
      dropStatus.textContent = '새 색이 나왔어요';
      setTimeout(() => {
        resetLab();
        freePanel.classList.remove('hidden');
        game.freePicked = [];
        updateFreeSlots();
        questionText.textContent = '자유롭게 색을 골라 섞어봐요';
        feedbackCard.classList.remove('show');
      }, 2300);
    }

    function showFeedback(resultKey, prefix) {
      const color = colorData[resultKey];
      resultColor.style.background = color.color;
      feedbackTitle.textContent = `${color.name}색이에요!`;
      feedbackText.textContent = `${prefix} ${color.example}`;
      feedbackCard.classList.remove('show');
      void feedbackCard.offsetWidth;
      feedbackCard.classList.add('show');
    }

    function nextRound() {
      feedbackCard.classList.remove('show');
      game.round += 1;
      if (game.round >= quizRounds.length) {
        showResult();
      } else {
        setupQuizRound();
      }
    }

    function showResult() {
      showScreen(resultScreen);
      progressText.textContent = `${game.score} / ${quizRounds.length}`;
      resultTitle.textContent = game.score >= 6 ? '참 잘했어요!' : '끝까지 했어요!';
      resultCopy.textContent = `${quizRounds.length}문제 중 ${game.score}문제를 맞혔어요.`;
      renderScoreStars();
    }

    function renderScoreStars() {
      scoreStars.innerHTML = '';
      const starCount = Math.max(1, Math.ceil((game.score / quizRounds.length) * 5));
      for (let i = 0; i < 5; i += 1) {
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('viewBox', '0 0 48 48');
        svg.classList.add('score-star');
        svg.style.setProperty('--star-delay', `${i * 0.08}s`);
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', 'M24 4l5.9 12 13.2 1.9-9.6 9.3 2.3 13.1L24 34.1 12.2 40.3l2.3-13.1-9.6-9.3L18.1 16z');
        path.setAttribute('fill', i < starCount ? '#ffd84d' : 'rgba(255,255,255,0.16)');
        path.setAttribute('stroke', i < starCount ? '#fff0a6' : 'rgba(255,255,255,0.28)');
        path.setAttribute('stroke-width', '3');
        path.setAttribute('stroke-linejoin', 'round');
        svg.appendChild(path);
        scoreStars.appendChild(svg);
      }
    }

    function createParticles(x, y, color) {
      for (let i = 0; i < 42; i += 1) {
        const particle = document.createElement('span');
        const angle = (Math.PI * 2 * i) / 42;
        const speed = 74 + Math.random() * 108;
        const dx = Math.cos(angle) * speed;
        const dy = Math.sin(angle) * speed;
        const size = 6 + Math.random() * 9;
        particle.className = 'particle';
        particle.style.setProperty('--px', `${x}px`);
        particle.style.setProperty('--py', `${y}px`);
        particle.style.setProperty('--dx', `${dx}px`);
        particle.style.setProperty('--dy', `${dy}px`);
        particle.style.setProperty('--ps', `${size}px`);
        particle.style.setProperty('--pc', i % 3 === 0 ? '#ffffff' : color);
        particleLayer.appendChild(particle);
        particle.addEventListener('animationend', () => particle.remove());
      }
    }

    startQuizButton.addEventListener('click', startQuiz);
    replayButton.addEventListener('click', startQuiz);
    freeModeButton.addEventListener('click', startFreeMode);
    setupTubeDrag(tubeA);
    setupTubeDrag(tubeB);
  </script>
</body>
</html>
