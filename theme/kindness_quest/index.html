<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>친절 선택 — 쑥쑥 놀이터</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0118;
      --card: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.12);
      --purple: #a855f7;
      --pink: #ec4899;
      --cyan: #06b6d4;
      --amber: #f59e0b;
      --green: #22c55e;
      --red: #ef4444;
      --grad: linear-gradient(135deg, #ec4899, #f59e0b);
      --text: #f0e8ff;
      --text-dim: rgba(240,232,255,0.55);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }
    .star {
      position: fixed; border-radius: 50%; background: #fff;
      animation: twinkle var(--dur,3s) ease-in-out infinite var(--delay,0s);
      pointer-events: none; z-index: 0;
    }
    @keyframes twinkle {
      0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.9;transform:scale(1.4)}
    }
    #game-wrap {
      position: relative;
      width: 800px; height: 600px;
      background: linear-gradient(160deg, #1a0a2e 0%, #0a0118 55%, #0f0a20 100%);
      border-radius: 28px;
      border: 1px solid rgba(236,72,153,0.2);
      box-shadow: 0 0 80px rgba(236,72,153,0.1), 0 24px 64px rgba(0,0,0,0.7);
      overflow: hidden;
      z-index: 1;
    }
    /* HUD */
    #hud {
      position: absolute;
      top: 16px; left: 20px; right: 20px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 20;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      color: var(--text-dim);
      font-family: inherit; font-size: 0.82rem; font-weight: 800;
      cursor: pointer; text-decoration: none;
      transition: background .2s, color .2s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.12); color: var(--text); }
    .progress-wrap { display: flex; align-items: center; gap: 8px; }
    .progress-text { font-size: 0.82rem; font-weight: 800; color: var(--text-dim); }
    .progress-bar-outer {
      width: 120px; height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 50px; overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%; background: var(--grad);
      border-radius: 50px; transition: width 0.4s ease;
    }
    /* Situation area */
    #situation-area {
      position: absolute;
      top: 56px; left: 20px; right: 20px;
      height: 220px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      align-items: stretch;
      z-index: 10;
    }
    #situation-illustration {
      width: 220px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.03);
      border-right: 1px solid var(--card-border);
    }
    #situation-text-block {
      flex: 1;
      padding: 24px 24px;
      display: flex; flex-direction: column; justify-content: center; gap: 10px;
    }
    .sit-label {
      font-size: 0.7rem; font-weight: 800; color: var(--text-dim);
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .sit-title {
      font-size: 1.35rem; font-weight: 900; color: #fff;
      line-height: 1.35;
    }
    .sit-question {
      font-size: 0.9rem; font-weight: 700; color: var(--text-dim);
    }
    /* Choices */
    #choices-area {
      position: absolute;
      top: 290px; left: 20px; right: 20px; bottom: 16px;
      display: flex; flex-direction: column; gap: 10px;
      z-index: 10;
    }
    .choice-card {
      flex: 1;
      display: flex; align-items: center; gap: 16px;
      padding: 0 22px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      cursor: pointer;
      transition: background .18s, border-color .18s, transform .15s;
    }
    .choice-card:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.22);
      transform: translateX(4px);
    }
    .choice-card:active { transform: scale(0.98); }
    .choice-icon { width: 44px; height: 44px; flex-shrink: 0; }
    .choice-text {
      font-size: 0.95rem; font-weight: 800; color: var(--text);
    }
    /* Card flip animation */
    .choice-card.flip-correct {
      animation: flip-correct 0.5s ease forwards;
    }
    .choice-card.flip-wrong {
      animation: flip-wrong 0.5s ease forwards;
    }
    @keyframes flip-correct {
      0%{transform:rotateY(0) scale(1)}
      50%{transform:rotateY(90deg) scale(1.05)}
      100%{transform:rotateY(0) scale(1); background:rgba(34,197,94,0.18); border-color:#22c55e;}
    }
    @keyframes flip-wrong {
      0%{transform:rotateX(0) scale(1)}
      25%{transform:rotateX(10deg) scale(0.97)}
      50%{transform:rotateX(-8deg)}
      75%{transform:rotateX(4deg)}
      100%{transform:rotateX(0) scale(1); background:rgba(239,68,68,0.15); border-color:#ef4444;}
    }
    .choice-card.correct-final {
      background: rgba(34,197,94,0.18) !important;
      border-color: #22c55e !important;
    }
    .choice-card.wrong-final {
      background: rgba(239,68,68,0.12) !important;
      border-color: #ef4444 !important;
    }
    .choice-card.disabled { pointer-events: none; }
    /* Feedback overlay */
    #feedback-panel {
      position: absolute;
      bottom: 16px; left: 20px; right: 20px;
      background: rgba(10,1,24,0.92);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 14px 24px;
      display: none; align-items: center; gap: 14px;
      z-index: 40;
    }
    #feedback-panel.show { display: flex; }
    .fb-icon { width: 40px; height: 40px; flex-shrink: 0; }
    .fb-texts { flex: 1; }
    .fb-result { font-size: 1rem; font-weight: 900; margin-bottom: 2px; }
    .fb-result.ok { color: #22c55e; }
    .fb-result.miss { color: #ef4444; }
    .fb-msg { font-size: 0.82rem; font-weight: 700; color: var(--text-dim); line-height: 1.5; }
    .fb-next-btn {
      padding: 10px 22px; border-radius: 50px;
      background: var(--grad); border: none; color: #fff;
      font-family: inherit; font-size: 0.88rem; font-weight: 900;
      cursor: pointer; white-space: nowrap;
      transition: transform .15s;
    }
    .fb-next-btn:hover { transform: translateY(-2px); }
    /* Flash */
    #flash {
      position: absolute; inset: 0; border-radius: 28px;
      pointer-events: none; z-index: 30; opacity: 0;
      transition: opacity 0.1s;
    }
    /* Particle canvas */
    #particle-canvas {
      position: absolute; inset: 0; pointer-events: none; z-index: 25;
    }
    /* Result screen */
    #result-screen {
      position: absolute; inset: 0;
      background: rgba(10,1,24,0.94);
      border-radius: 28px;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 50; gap: 14px;
    }
    #result-screen.show { display: flex; }
    .result-title {
      font-size: 2.2rem; font-weight: 900;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-stars { display: flex; gap: 12px; margin: 4px 0; }
    .result-star { width: 50px; height: 50px; }
    .result-score { font-size: 1.1rem; font-weight: 700; color: var(--text-dim); }
    .result-msg {
      font-size: 0.9rem; font-weight: 700; color: var(--text-dim);
      max-width: 400px; text-align: center; line-height: 1.6;
    }
    .result-btns { display: flex; gap: 14px; margin-top: 8px; }
    .res-btn {
      padding: 14px 28px; border-radius: 50px;
      font-family: inherit; font-size: 1rem; font-weight: 900;
      cursor: pointer; border: none; transition: transform .15s;
    }
    .res-btn:hover { transform: translateY(-3px); }
    .res-btn.primary { background: var(--grad); color: #fff; }
    .res-btn.secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text);
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-8px)}40%{transform:translateX(8px)}
      60%{transform:translateX(-6px)}80%{transform:translateX(4px)}
    }
  </style>
</head>

<div id="stars-container"></div>

  <!-- Situation -->
  <div id="situation-area">
    <div id="situation-illustration">
      <svg id="sit-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200"></svg>
    </div>
    <div id="situation-text-block">

      <div class="sit-question" id="sit-question">어떻게 하는 게 좋을까요?</div>
    </div>
  </div>

  <!-- Choices -->
  <div id="choices-area" style="top:290px"></div>

  <!-- Feedback -->
  <div id="feedback-panel">
    <svg class="fb-icon" id="fb-icon" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="fb-texts">
      <div class="fb-result" id="fb-result">잘했어요!</div>
      <div class="fb-msg" id="fb-msg">친구를 도와주는 것은 정말 친절한 행동이에요.</div>
    </div>
    <button class="fb-next-btn" id="fb-next-btn">다음</button>
  </div>

  <div id="flash"></div>
  <canvas id="particle-canvas"></canvas>

  <!-- Result -->
  <div id="result-screen">
    <div class="result-title" id="result-title">친절 박사!</div>
    <div class="result-stars" id="result-stars"></div>
    <div class="result-score" id="result-score">10/10 정답</div>
    <div class="result-msg" id="result-msg">정말 친절한 어린이예요!</div>
    <div class="result-btns">
      <button class="res-btn secondary" onclick="goHome()">홈으로</button>
      <button class="res-btn primary" onclick="restartGame()">다시하기</button>
    </div>
  </div>
</div>

// Stars
(function(){
  const c = document.getElementById('stars-container');
  for(let i = 0; i < 55; i++){
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random()*2.5+0.8;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;--dur:${2+Math.random()*4}s;--delay:${Math.random()*4}s;`;
    c.appendChild(s);
  }
})();

// === Game State ===
let currentIdx = 0;
let order = [];
let correctCount = 0;
let answered = false;
const TOTAL = 10;

// === Particles ===
const pCanvas = document.getElementById('particle-canvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];
pCanvas.width = 800; pCanvas.height = 600;

function spawnParticles(type) {
  const cx = 400, cy = 300;
  if(type === 'correct') {
    const colors = ['#22c55e','#86efac','#fbbf24','#a855f7','#ec4899'];
    for(let i = 0; i < 40; i++) {
      const angle = Math.random()*Math.PI*2;
      const speed = 4+Math.random()*6;
      particles.push({ x: cx, y: cy, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed-3,
        life:1, decay:0.018+Math.random()*0.015, size:4+Math.random()*8,
        color: colors[Math.floor(Math.random()*colors.length)], shape: Math.random()>0.5?'heart':'circle' });
    }
  } else {
    for(let i = 0; i < 16; i++) {
      const angle = Math.random()*Math.PI*2;
      particles.push({ x: cx, y: cy, vx: Math.cos(angle)*2, vy: Math.sin(angle)*2,
        life:1, decay:0.03, size:6, color:'#94a3b8', shape:'circle' });
    }
  }
}

function animateParticles() {
  pCtx.clearRect(0,0,800,600);
  particles = particles.filter(p=>p.life>0);
  for(const p of particles) {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.vx*=0.97; p.life-=p.decay;
    pCtx.save(); pCtx.globalAlpha=Math.max(0,p.life); pCtx.fillStyle=p.color;
    pCtx.beginPath();
    if(p.shape==='heart') {
      // simple heart
      pCtx.arc(p.x-p.size*0.3*p.life,p.y,p.size*0.5*p.life,Math.PI,0);
      pCtx.arc(p.x+p.size*0.3*p.life,p.y,p.size*0.5*p.life,Math.PI,0);
      pCtx.lineTo(p.x,p.y+p.size*p.life);
      pCtx.closePath();
    } else {
      pCtx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    }
    pCtx.fill(); pCtx.restore();
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

function flashScreen(color) {
  const f = document.getElementById('flash');
  f.style.background = color; f.style.opacity = '1';
  setTimeout(()=>{ f.style.opacity='0'; }, 400);
}

// === Load situation ===
function loadSituation(idx) {
  const sit = SITUATIONS[order[idx]];
  answered = false;

  // Update progress
  document.getElementById('progress-text').textContent = `${idx+1} / ${TOTAL}`;
  document.getElementById('progress-bar').style.width = `${((idx+1)/TOTAL)*100}%`;

  // Illustration
  const svg = document.getElementById('sit-svg');
  svg.innerHTML = ICONS[sit.icon] || '';

  // Text
  document.getElementById('sit-title').textContent = sit.title;
  document.getElementById('sit-question').textContent = sit.question;

  // Choices
  const area = document.getElementById('choices-area');
  area.innerHTML = '';
  const choiceCount = sit.choices.length;
  // Adjust top based on number of choices
  area.style.top = choiceCount <= 2 ? '310px' : '290px';

  sit.choices.forEach((ch, i) => {
    const card = document.createElement('div');
    card.className = 'choice-card';
    card.dataset.correct = ch.correct ? '1' : '0';
    card.dataset.idx = i;

    const iconSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    iconSvg.setAttribute('viewBox','0 0 40 40');
    iconSvg.classList.add('choice-icon');
    iconSvg.innerHTML = CHOICE_ICONS[ch.icon] || '';

    const txt = document.createElement('div');
    txt.className = 'choice-text';
    txt.textContent = ch.text;

    card.appendChild(iconSvg);
    card.appendChild(txt);
    card.addEventListener('click', () => handleChoice(card, ch.correct, sit.feedback));
    area.appendChild(card);
  });

  // Hide feedback
  document.getElementById('feedback-panel').classList.remove('show');
}

function handleChoice(card, isCorrect, feedback) {
  if(answered) return;
  answered = true;

  // Disable all cards
  const allCards = document.querySelectorAll('.choice-card');
  allCards.forEach(c => c.classList.add('disabled'));

  if(isCorrect) {
    correctCount++;
    card.classList.add('flip-correct');
    setTimeout(() => card.classList.add('correct-final'), 500);
    spawnParticles('correct');
    flashScreen('rgba(34,197,94,0.14)');

    // Show feedback
    showFeedback(true, feedback);
  } else {
    card.classList.add('flip-wrong');
    setTimeout(() => card.classList.add('wrong-final'), 500);
    // Highlight correct answer
    allCards.forEach(c => {
      if(c.dataset.correct === '1') {
        setTimeout(() => c.classList.add('correct-final'), 600);
      }
    });
    spawnParticles('wrong');
    flashScreen('rgba(239,68,68,0.18)');
    // Shake
    document.getElementById('game-wrap').style.animation = 'none';
    document.getElementById('choices-area').style.animation = 'shake 0.4s ease';
    setTimeout(() => { document.getElementById('choices-area').style.animation = ''; }, 450);

    showFeedback(false, feedback);
  }
}

function showFeedback(isCorrect, msg) {
  const panel = document.getElementById('feedback-panel');
  const result = document.getElementById('fb-result');
  const msgEl = document.getElementById('fb-msg');
  const icon = document.getElementById('fb-icon');

  result.className = `fb-result ${isCorrect ? 'ok' : 'miss'}`;
  result.textContent = isCorrect ? '잘했어요!' : '다시 생각해봐요';
  msgEl.textContent = msg;

  // Draw feedback icon
  if(isCorrect) {
    icon.innerHTML = `<circle cx="20" cy="20" r="18" fill="rgba(34,197,94,0.2)"/>
      <path d="M10 20 L16 26 L30 12" stroke="#22c55e" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
  } else {
    icon.innerHTML = `<circle cx="20" cy="20" r="18" fill="rgba(239,68,68,0.2)"/>
      <line x1="12" y1="12" x2="28" y2="28" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
      <line x1="28" y1="12" x2="12" y2="28" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>`;
  }

  setTimeout(() => panel.classList.add('show'), 300);
}

document.getElementById('fb-next-btn').addEventListener('click', () => {
  document.getElementById('feedback-panel').classList.remove('show');
  currentIdx++;
  if(currentIdx >= TOTAL) {
    showResult();
  } else {
    loadSituation(currentIdx);
  }
});

// === Result ===
function showResult() {
  let stars = Math.round((correctCount / TOTAL) * 3);
  const titles = { 3: '친절 박사!', 2: '잘했어요!', 1: '더 연습해봐요!', 0: '함께 배워봐요!' };
  const msgs = {
    3: '모든 상황에서 올바른 선택을 했어요. 정말 친절한 어린이예요!',
    2: '대부분 잘 선택했어요. 조금 더 연습하면 친절 박사가 될 거예요!',
    1: '친절한 마음을 더 키워봐요. 다시 해볼까요?',
    0: '괜찮아요! 함께 친절한 행동을 배워봐요.'
  };

  document.getElementById('result-title').textContent = titles[stars];
  document.getElementById('result-score').textContent = `${correctCount}/${TOTAL} 정답`;
  document.getElementById('result-msg').textContent = msgs[stars];
  renderStars(stars);
  document.getElementById('result-screen').classList.add('show');

  // Confetti
  for(let i = 0; i < 60; i++) {
    setTimeout(() => {
      const colors = ['#a855f7','#ec4899','#fbbf24','#22c55e','#06b6d4'];
      particles.push({
        x: Math.random()*800, y: -10,
        vx: (Math.random()-0.5)*3, vy: 2+Math.random()*3,
        life:1, decay:0.006+Math.random()*0.006, size:5+Math.random()*5,
        color: colors[Math.floor(Math.random()*colors.length)], shape: 'circle'
      });
    }, i*25);
  }
}

function renderStars(count) {
  const c = document.getElementById('result-stars');
  c.innerHTML = '';
  for(let i = 0; i < 3; i++) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 24 24');
    svg.classList.add('result-star');
    const pts = [];
    for(let j = 0; j < 10; j++) {
      const r = j%2===0?11:5;
      const a = (j*Math.PI/5)-Math.PI/2;
      pts.push(`${12+r*Math.cos(a)},${12+r*Math.sin(a)}`);
    }
    const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points', pts.join(' '));
    poly.setAttribute('fill', i<count?'#fbbf24':'rgba(255,255,255,0.1)');
    poly.setAttribute('stroke', i<count?'#f59e0b':'rgba(255,255,255,0.15)');
    poly.setAttribute('stroke-width','1');
    svg.appendChild(poly);
    c.appendChild(svg);
  }
}

function restartGame() {
  currentIdx = 0; correctCount = 0; answered = false;
  particles = [];
  document.getElementById('result-screen').classList.remove('show');
  order = SITUATIONS.map((_,i)=>i).sort(()=>Math.random()-0.5);
  loadSituation(0);
}

function goHome() { window.location.href = '../../index.html'; }

// === Init ===
order = SITUATIONS.map((_,i)=>i).sort(()=>Math.random()-0.5);
loadSituation(0);
