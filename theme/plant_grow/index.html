<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <title>우주 식물 키우기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --space: #0a0118;
      --space-soft: #170535;
      --panel: rgba(27, 10, 58, 0.86);
      --panel-strong: rgba(45, 17, 86, 0.94);
      --line: rgba(255, 255, 255, 0.24);
      --white: #ffffff;
      --text: #f8f1ff;
      --muted: #d7c5ff;
      --gold: #ffd95a;
      --green: #69e77e;
      --blue: #72d9ff;
      --pink: #ff74b8;
      --red: #ff5f70;
      --soil: #7b4a2a;
      --soil-dark: #4c2919;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: var(--space);
      color: var(--text);
      font-family: "Nunito", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      border: 0;
      font: inherit;
      color: inherit;
      cursor: pointer;
      touch-action: manipulation;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-width: 800px;
      min-height: 600px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 58%, rgba(97, 42, 154, 0.34), transparent 38%),
        radial-gradient(circle at 18% 22%, rgba(78, 177, 255, 0.18), transparent 24%),
        radial-gradient(circle at 86% 16%, rgba(255, 116, 184, 0.16), transparent 24%),
        #0a0118;
    }

    .stars {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: var(--size);
      height: var(--size);
      left: var(--left);
      top: var(--top);
      border-radius: 50%;
      background: var(--white);
      box-shadow:
        0 0 8px rgba(255, 255, 255, 0.88),
        0 0 18px rgba(143, 214, 255, 0.52);
      opacity: 0.42;
      animation: twinkle var(--speed) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    .star::before,
    .star::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: calc(var(--size) * 3.2);
      height: 1px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      transform: translate(-50%, -50%);
    }

    .star::after {
      width: 1px;
      height: calc(var(--size) * 3.2);
    }

    @keyframes twinkle {
      0%,
      100% {
        opacity: 0.22;
        transform: scale(0.72) rotate(0deg);
      }

      48% {
        opacity: 1;
        transform: scale(1.22) rotate(18deg);
      }

      64% {
        opacity: 0.55;
        transform: scale(0.86) rotate(26deg);
      }
    }

    .hud {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }

    .home-link,
    .plant-count {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255, 255, 255, 0.28);
      border-radius: 16px;
      background: rgba(16, 4, 38, 0.72);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(8px);
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      pointer-events: auto;
    }

    .home-link {
      padding: 0 18px;
    }

    .plant-count {
      width: 96px;
      color: var(--gold);
    }

    .game {
      position: relative;
      width: 800px;
      height: 600px;
      overflow: hidden;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-radius: 28px;
      background:
        radial-gradient(circle at 50% 26%, rgba(115, 76, 205, 0.34), transparent 28%),
        linear-gradient(180deg, rgba(24, 10, 65, 0.92) 0%, rgba(13, 4, 35, 0.98) 60%, rgba(10, 1, 24, 1) 100%);
      box-shadow: var(--shadow);
    }

    .game.shake {
      animation: shake 0.36s linear;
    }

    .game.flash::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 18;
      background: rgba(255, 61, 89, 0.28);
      pointer-events: none;
      animation: redFlash 0.42s ease-out forwards;
    }

    @keyframes shake {
      0%,
      100% {
        transform: translate(0, 0);
      }

      15% {
        transform: translate(-8px, 4px);
      }

      30% {
        transform: translate(7px, -3px);
      }

      45% {
        transform: translate(-6px, -4px);
      }

      60% {
        transform: translate(6px, 3px);
      }

      75% {
        transform: translate(-3px, 2px);
      }
    }

    @keyframes redFlash {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    .sky-glow {
      position: absolute;
      left: 150px;
      top: 46px;
      width: 500px;
      height: 250px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.09), transparent 64%);
      filter: blur(4px);
      pointer-events: none;
      animation: breathingGlow 4s ease-in-out infinite;
    }

    @keyframes breathingGlow {
      0%,
      100% {
        opacity: 0.48;
        transform: scale(0.96);
      }

      50% {
        opacity: 0.9;
        transform: scale(1.04);
      }
    }

    .planet {
      position: absolute;
      left: 52px;
      top: 88px;
      width: 122px;
      height: 122px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 28%, #ffdf83 0 18%, transparent 19%),
        linear-gradient(135deg, #ff8f6b, #915cff);
      box-shadow: 0 0 42px rgba(255, 143, 107, 0.4);
      opacity: 0.78;
      animation: planetFloat 5s ease-in-out infinite;
    }

    .planet::after {
      content: "";
      position: absolute;
      left: -22px;
      right: -22px;
      top: 48px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.36);
      border-left-color: transparent;
      border-right-color: transparent;
      border-radius: 50%;
      transform: rotate(-14deg);
    }

    @keyframes planetFloat {
      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .moon {
      position: absolute;
      right: 78px;
      top: 74px;
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: #f4edc8;
      box-shadow: 0 0 26px rgba(244, 237, 200, 0.44);
      opacity: 0.86;
    }

    .moon::before {
      content: "";
      position: absolute;
      right: -6px;
      top: -5px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #0f0528;
    }

    .garden-bed {
      position: absolute;
      left: 88px;
      right: 88px;
      bottom: 70px;
      height: 142px;
      border-radius: 50% 50% 26px 26px;
      background:
        radial-gradient(circle at 28% 25%, rgba(255, 214, 138, 0.24), transparent 16%),
        radial-gradient(circle at 58% 30%, rgba(255, 214, 138, 0.17), transparent 18%),
        linear-gradient(180deg, #9b6338, #5b321e 68%, #3a1d13);
      border: 3px solid rgba(255, 220, 172, 0.26);
      box-shadow:
        inset 0 15px 30px rgba(255, 228, 177, 0.12),
        inset 0 -14px 20px rgba(0, 0, 0, 0.32),
        0 20px 40px rgba(0, 0, 0, 0.34);
    }

    .garden-bed::before {
      content: "";
      position: absolute;
      left: 58px;
      right: 58px;
      top: 24px;
      height: 32px;
      border-radius: 50%;
      background: rgba(60, 28, 17, 0.44);
      filter: blur(1px);
    }

    .plant-stage-label {
      position: absolute;
      left: 50%;
      bottom: 204px;
      transform: translateX(-50%);
      min-width: 118px;
      padding: 8px 16px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.24);
      background: rgba(12, 4, 30, 0.72);
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      color: #fff6c7;
      z-index: 6;
    }

    .plant-wrap {
      position: absolute;
      left: 50%;
      bottom: 148px;
      width: 300px;
      height: 300px;
      transform: translateX(-50%);
      display: grid;
      place-items: end center;
      z-index: 5;
    }

    .plant-wrap.complete {
      transform-origin: 50% 100%;
      animation: breeze 2.4s ease-in-out infinite;
    }

    @keyframes breeze {
      0%,
      100% {
        transform: translateX(-50%) rotate(-1.4deg);
      }

      50% {
        transform: translateX(-50%) rotate(1.6deg);
      }
    }

    .plant-svg {
      width: 300px;
      height: 300px;
      overflow: visible;
      filter: drop-shadow(0 15px 20px rgba(0, 0, 0, 0.24));
    }

    .plant-svg .grow-in {
      transform-origin: 150px 250px;
      animation: growIn 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) both;
    }

    .plant-svg .leaf {
      transform-origin: center;
      animation: leafWave 1.8s ease-in-out infinite;
    }

    .plant-svg .leaf.right {
      animation-delay: 0.18s;
    }

    .plant-svg .flower-head {
      transform-origin: center;
      animation: flowerPop 1.15s cubic-bezier(0.18, 0.89, 0.32, 1.28) both;
    }

    .plant-svg.wilt {
      animation: wiltLean 0.9s ease-in-out infinite;
      filter: saturate(0.7) drop-shadow(0 12px 16px rgba(0, 0, 0, 0.24));
    }

    .plant-svg.pale {
      filter: saturate(0.38) brightness(1.18) drop-shadow(0 12px 16px rgba(0, 0, 0, 0.2));
    }

    .plant-svg.burn {
      filter: sepia(0.56) saturate(0.82) brightness(0.8) drop-shadow(0 12px 16px rgba(0, 0, 0, 0.32));
      animation: heatWobble 0.7s ease-in-out infinite;
    }

    @keyframes growIn {
      from {
        transform: scale(0.15) translateY(32px);
        opacity: 0;
      }

      to {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    @keyframes leafWave {
      0%,
      100% {
        transform: rotate(-2deg);
      }

      50% {
        transform: rotate(3deg);
      }
    }

    @keyframes flowerPop {
      0% {
        transform: scale(0.2);
        opacity: 0;
      }

      72% {
        transform: scale(1.12);
        opacity: 1;
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes wiltLean {
      0%,
      100% {
        transform: rotate(0deg) translateY(0);
      }

      50% {
        transform: rotate(4deg) translateY(8px);
      }
    }

    @keyframes heatWobble {
      0%,
      100% {
        transform: translateX(0) skewX(0deg);
      }

      33% {
        transform: translateX(-2px) skewX(2deg);
      }

      66% {
        transform: translateX(2px) skewX(-2deg);
      }
    }

    .speech-area {
      position: absolute;
      left: 456px;
      top: 118px;
      width: 250px;
      height: 136px;
      z-index: 8;
      pointer-events: none;
      animation: bubbleFloat 1.9s ease-in-out infinite;
    }

    .speech-area.hidden {
      display: none;
    }

    @keyframes bubbleFloat {
      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .speech-svg {
      width: 250px;
      height: 136px;
      overflow: visible;
      filter: drop-shadow(0 12px 20px rgba(0, 0, 0, 0.28));
    }

    .speech-text {
      font-size: 26px;
      font-weight: 900;
      fill: #251236;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .panel {
      position: absolute;
      left: 28px;
      bottom: 22px;
      width: 744px;
      height: 116px;
      border: 2px solid rgba(255, 255, 255, 0.18);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      z-index: 10;
      display: grid;
      grid-template-columns: 178px 1fr 1fr 178px;
      gap: 14px;
      padding: 14px;
    }

    .tool-button {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 18px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.07));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 8px 18px rgba(0, 0, 0, 0.22);
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .tool-button:active {
      transform: scale(0.95);
    }

    .tool-button.ready {
      border-color: rgba(255, 217, 90, 0.78);
      box-shadow:
        0 0 0 3px rgba(255, 217, 90, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.24),
        0 8px 18px rgba(0, 0, 0, 0.22);
      animation: buttonPulse 1.2s ease-in-out infinite;
    }

    .tool-button.done {
      opacity: 0.58;
    }

    @keyframes buttonPulse {
      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-3px);
      }
    }

    .tool-icon {
      width: 62px;
      height: 62px;
      overflow: visible;
    }

    .tool-label {
      font-size: 22px;
      font-weight: 900;
    }

    .gauge-box {
      min-width: 0;
      padding: 8px 10px;
      border-radius: 16px;
      background: rgba(8, 2, 23, 0.52);
      border: 1px solid rgba(255, 255, 255, 0.14);
      display: grid;
      align-content: center;
      gap: 8px;
    }

    .gauge-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 16px;
      font-weight: 900;
    }

    .gauge-value {
      color: var(--gold);
    }

    .gauge-track {
      position: relative;
      height: 24px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.34);
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .gauge-good {
      position: absolute;
      left: 42%;
      top: 0;
      width: 22%;
      height: 100%;
      background: rgba(105, 231, 126, 0.35);
      border-left: 2px dashed rgba(255, 255, 255, 0.5);
      border-right: 2px dashed rgba(255, 255, 255, 0.5);
    }

    .gauge-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.35s ease;
    }

    .gauge-fill.water {
      background: linear-gradient(90deg, #48b7ff, #82efff);
      box-shadow: 0 0 14px rgba(114, 217, 255, 0.62);
    }

    .gauge-fill.sun {
      background: linear-gradient(90deg, #ffb84b, #fff171);
      box-shadow: 0 0 14px rgba(255, 217, 90, 0.62);
    }

    .effect-layer {
      position: absolute;
      inset: 0;
      z-index: 16;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--s);
      height: var(--s);
      border-radius: 50%;
      background: var(--c);
      box-shadow: 0 0 12px var(--c);
      animation: burst 0.9s ease-out forwards;
    }

    @keyframes burst {
      from {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }

      to {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(0.2);
      }
    }

    .drop {
      position: absolute;
      width: 9px;
      height: 18px;
      border-radius: 50% 50% 60% 60%;
      background: #72d9ff;
      box-shadow: 0 0 10px rgba(114, 217, 255, 0.8);
      animation: waterDrop 0.7s ease-in forwards;
    }

    @keyframes waterDrop {
      from {
        opacity: 1;
        transform: translateY(-20px) scale(0.8);
      }

      to {
        opacity: 0;
        transform: translateY(122px) scale(1.08);
      }
    }

    .ray {
      position: absolute;
      width: 12px;
      height: 120px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 241, 113, 0), rgba(255, 241, 113, 0.74), rgba(255, 241, 113, 0));
      transform-origin: 50% 0;
      animation: sunRay 0.78s ease-out forwards;
    }

    @keyframes sunRay {
      from {
        opacity: 0;
        transform: translateY(-20px) scaleY(0.3) rotate(var(--r));
      }

      45% {
        opacity: 1;
      }

      to {
        opacity: 0;
        transform: translateY(90px) scaleY(1.1) rotate(var(--r));
      }
    }

    .flood {
      position: absolute;
      left: 112px;
      right: 112px;
      bottom: 102px;
      height: 0;
      border-radius: 50% 50% 22px 22px;
      background:
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.18) 0 18px, rgba(255, 255, 255, 0) 18px 36px),
        linear-gradient(180deg, rgba(93, 211, 255, 0.82), rgba(42, 138, 255, 0.75));
      animation: floodRise 1.05s ease-out forwards;
      z-index: 7;
      pointer-events: none;
    }

    @keyframes floodRise {
      0% {
        height: 0;
        opacity: 0;
      }

      32% {
        opacity: 1;
      }

      70% {
        height: 92px;
        opacity: 0.95;
      }

      100% {
        height: 40px;
        opacity: 0;
      }
    }

    .heat {
      position: absolute;
      left: 250px;
      top: 118px;
      width: 300px;
      height: 260px;
      pointer-events: none;
      z-index: 7;
    }

    .heat span {
      position: absolute;
      bottom: 0;
      width: 12px;
      height: 86px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 211, 75, 0), rgba(255, 101, 50, 0.58), rgba(255, 211, 75, 0));
      animation: heatWave 0.8s ease-in-out infinite;
    }

    .heat span:nth-child(1) {
      left: 74px;
      animation-delay: 0s;
    }

    .heat span:nth-child(2) {
      left: 140px;
      height: 118px;
      animation-delay: 0.16s;
    }

    .heat span:nth-child(3) {
      left: 206px;
      animation-delay: 0.31s;
    }

    @keyframes heatWave {
      0%,
      100% {
        opacity: 0.18;
        transform: translateY(0) skewX(-8deg);
      }

      50% {
        opacity: 0.84;
        transform: translateY(-22px) skewX(8deg);
      }
    }

    .screen {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(10, 1, 24, 0.78);
      backdrop-filter: blur(8px);
    }

    .screen.active {
      display: flex;
    }

    .result-card {
      width: 472px;
      min-height: 360px;
      padding: 30px 34px;
      border-radius: 28px;
      border: 2px solid rgba(255, 255, 255, 0.24);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 217, 90, 0.22), transparent 38%),
        rgba(27, 10, 58, 0.94);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.48);
      text-align: center;
      animation: resultPop 0.52s cubic-bezier(0.18, 0.89, 0.32, 1.28) both;
    }

    @keyframes resultPop {
      from {
        opacity: 0;
        transform: scale(0.86) translateY(18px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .result-title {
      margin: 0;
      color: #fff8d5;
      font-size: 38px;
      font-weight: 900;
      line-height: 1.18;
    }

    .result-message {
      margin: 14px 0 20px;
      color: var(--muted);
      font-size: 22px;
      font-weight: 800;
      line-height: 1.35;
    }

    .score-stars {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .score-star {
      width: 58px;
      height: 58px;
      animation: scoreStar 1.1s ease-in-out infinite;
    }

    .score-star:nth-child(2) {
      animation-delay: 0.12s;
    }

    .score-star:nth-child(3) {
      animation-delay: 0.24s;
    }

    @keyframes scoreStar {
      0%,
      100% {
        transform: translateY(0) scale(1);
      }

      50% {
        transform: translateY(-8px) scale(1.08);
      }
    }

    .result-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .result-button {
      min-width: 142px;
      min-height: 54px;
      border-radius: 18px;
      border: 2px solid rgba(255, 255, 255, 0.24);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.08));
      font-size: 20px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.16s ease;
    }

    .result-button.primary {
      color: #241436;

              <ellipse cx="129" cy="117" rx="16" ry="34" transform="rotate(45 129 117)"/>
              <ellipse cx="171" cy="117" rx="16" ry="34" transform="rotate(-45 171 117)"/>

            <g fill="#4b2c1b">
              <circle cx="140" cy="88" r="3"/>
              <circle cx="154" cy="87" r="3"/>
              <circle cx="164" cy="98" r="3"/>
              <circle cx="146" cy="104" r="3"/>
              <circle cx="137" cy="101" r="3"/>
              <circle cx="156" cy="110" r="3"/>
            </g>
          </g>
        </g>
      `, getMoodClass());
    }

    function strawberrySvg(plant) {
      const c = plant.colors;
      return svgShell(`
        ${groundShadow()}
        <g class="grow-in">
          <path d="M150 242 C147 198 148 150 150 108" fill="none" stroke="${c.stem}" stroke-width="12" stroke-linecap="round"/>
          <ellipse class="leaf" cx="112" cy="184" rx="42" ry="20" fill="${c.leaf}" stroke="${c.darkLeaf}" stroke-width="5" transform="rotate(-28 112 184)"/>
          <ellipse class="leaf right" cx="188" cy="164" rx="42" ry="20" fill="${c.leaf}" stroke="${c.darkLeaf}" stroke-width="5" transform="rotate(28 188 164)"/>
          <path d="M150 116 C122 104 100 86 88 66" fill="none" stroke="${c.stem}" stroke-width="7" stroke-linecap="round"/>
          <path d="M150 116 C178 103 198 86 212 63" fill="none" stroke="${c.stem}" stroke-width="7" stroke-linecap="round"/>
          <g class="flower-head">
            <g transform="translate(88 66)">
              <circle cx="0" cy="-14" r="14" fill="${c.flower}" stroke="${c.flowerDark}" stroke-width="3"/>
              <circle cx="-14" cy="0" r="14" fill="${c.flower}" stroke="${c.flowerDark}" stroke-width="3"/>
              <circle cx="14" cy="0" r="14" fill="${c.flower}" stroke="${c.flowerDark}" stroke-width="3"/>
              <circle cx="-8" cy="14" r="14" fill="${c.flower}" stroke="${c.flowerDark}" stroke-width="3"/>
              <circle cx="8" cy="14" r="14" fill="${c.flower}" stroke="${c.flowerDark}" stroke-width="3"/>
              <circle cx="0" cy="3" r="8" fill="${c.center}"/>
            </g>
            <g transform="translate(212 68)">
              <path d="M0 0 C26 22 14 60 0 70 C-14 60 -26 22 0 0 Z" fill="${c.fruit}" stroke="#d9304d" stroke-width="4"/>
              <path d="M0 0 L-10 -11 L0 -7 L10 -11 Z" fill="${c.leaf}" stroke="${c.darkLeaf}" stroke-width="3"/>
              <g fill="#ffe6a2">
                <circle cx="-6" cy="18" r="2.5"/>
                <circle cx="7" cy="25" r="2.5"/>
                <circle cx="-8" cy="36" r="2.5"/>
                <circle cx="5" cy="48" r="2.5"/>
              </g>
            </g>
          </g>
        </g>
      `, getMoodClass());
    }

    function cactusSvg(plant) {
      const c = plant.colors;
      return svgShell(`
        ${groundShadow()}
        <g class="grow-in">
          <path d="M150 240 C118 205 119 112 150 58 C181 112 182 205 150 240 Z" fill="${c.stem}" stroke="${c.darkLeaf}" stroke-width="7"/>
          <path d="M120 172 C88 154 90 103 115 88 C135 106 139 150 120 172 Z" fill="${c.leaf}" stroke="${c.darkLeaf}" stroke-width="6"/>
          <path d="M180 186 C216 167 214 104 185 86 C164 107 160 164 180 186 Z" fill="${c.leaf}" stroke="${c.darkLeaf}" stroke-width="6"/>
          <g stroke="#eaffd8" stroke-width="3" stroke-linecap="round">
            <path d="M150 78 V224"/>
            <path d="M132 119 L121 112"/>
            <path d="M168 132 L180 124"/>
            <path d="M132 172 L118 178"/>
            <path d="M168 203 L181 211"/>
            <path d="M108 116 L96 109"/>
            <path d="M196 115 L210 106"/>
            <path d="M116 148 L102 151"/>
            <path d="M188 155 L204 159"/>
          </g>
          <g class="flower-head">
            <path d="M150 62 C133 48 136 28 150 19 C164 28 167 48 150 62 Z" fill="${c.flower}" stroke="${c.flowerDark}" stroke-width="4"/>
            <path d="M150 62 C130 64 119 48 124 32 C142 34 151 45 150 62 Z" fill="${c.flower}" stroke="${c.flowerDark}" stroke-width="4"/>
            <path d="M150 62 C170 64 181 48 176 32 C158 34 149 45 150 62 Z" fill="${c.flower}" stroke="${c.flowerDark}" stroke-width="4"/>
            <circle cx="150" cy="49" r="8" fill="${c.center}"/>
          </g>
        </g>
      `, getMoodClass());
    }

    function roseSvg(plant) {
      const c = plant.colors;
      return svgShell(`
        ${groundShadow()}
        <g class="grow-in">
          <path d="M150 242 C146 198 148 138 150 84" fill="none" stroke="${c.stem}" stroke-width="12" stroke-linecap="round"/>
          <ellipse class="leaf" cx="112" cy="184" rx="39" ry="20" fill="${c.leaf}" stroke="${c.darkLeaf}" stroke-width="5" transform="rotate(-30 112 184)"/>
          <ellipse class="leaf right" cx="188" cy="162" rx="39" ry="20" fill="${c.leaf}" stroke="${c.darkLeaf}" stroke-width="5" transform="rotate(30 188 162)"/>
          <g stroke="#ffd6df" stroke-width="4" stroke-linecap="round">
            <path d="M139 150 L129 140"/>
            <path d="M162 131 L173 121"/>
            <path d="M141 111 L130 101"/>
          </g>
          <g class="flower-head">
            <path d="M150 106 C118 88 116 51 150 38 C184 51 182 88 150 106 Z" fill="${c.flower}" stroke="${c.flowerDark}" stroke-width="5"/>
            <path d="M150 105 C122 105 101 78 115 52 C143 57 154 75 150 105 Z" fill="#ff7895" stroke="${c.flowerDark}" stroke-width="4"/>
            <path d="M150 105 C178 105 199 78 185 52 C157 57 146 75 150 105 Z" fill="#ff7895" stroke="${c.flowerDark}" stroke-width="4"/>
            <path d="M150 97 C132 87 133 62 150 52 C167 62 168 87 150 97 Z" fill="${c.center}" stroke="${c.flowerDark}" stroke-width="4"/>
            <path d="M150 89 C140 83 141 69 150 64 C159 69 160 83 150 89 Z" fill="#ffe0e8"/>
          </g>
        </g>
      `, getMoodClass());
    }

    function getMoodClass() {
      if (state.water > GOOD_MAX) {
        return "wilt";
      }
      if (state.water > 0 && state.water < GOOD_MIN && state.stage > 0) {
        return "wilt";
      }
      if (state.sun > GOOD_MAX) {
        return "burn";
      }
      if (state.sun > 0 && state.sun < GOOD_MIN && state.stage > 1) {
        return "pale";
      }
      return "";
    }

    function renderPlant() {
      const plant = plants[state.plantIndex];
      let svg = seedSvg(plant);
      if (!state.planted) {
        svg = "";
      } else if (state.stage === 1) {
        svg = sproutSvg(plant);
      } else if (state.stage === 2) {
        svg = stemSvg(plant);
      } else if (state.stage === 3) {
        svg = finalSvg(plant);
      }
      nodes.plantSvgHost.innerHTML = svg;
      nodes.stageLabel.textContent = state.planted ? stages[state.stage] : plant.name;
      nodes.plantWrap.classList.toggle("complete", state.stage === 3 && state.planted);
    }

    function renderHud() {
      nodes.plantCount.textContent = `${state.plantIndex + 1}/4`;
      nodes.waterValue.textContent = state.water;
      nodes.sunValue.textContent = state.sun;
      nodes.waterFill.style.width = `${state.water}%`;
      nodes.sunFill.style.width = `${state.sun}%`;
      nodes.seedButton.classList.toggle("ready", !state.planted);
      nodes.seedButton.classList.toggle("done", state.planted);
      nodes.waterButton.classList.toggle("ready", state.planted && !state.waterReady);
      nodes.waterButton.classList.toggle("done", state.waterReady);
      nodes.sunButton.classList.toggle("ready", state.waterReady && !state.sunReady);
      nodes.sunButton.classList.toggle("done", state.sunReady);
    }

    function renderSpeech() {
      if (!state.planted) {
        showSpeech("씨앗을 심어요!");
        return;
      }
      if (!state.waterReady) {
        showSpeech("물을 주세요!");
        return;
      }
      if (!state.sunReady) {
        showSpeech("햇빛이 필요해요!");
        return;
      }
      showSpeech(`${plants[state.plantIndex].name} 성공!`);
    }

    function showSpeech(text) {
      nodes.speechText.textContent = text;
      nodes.speechArea.classList.remove("hidden");
    }

    function renderAll() {
      renderPlant();
      renderHud();
      renderSpeech();
    }

    function plantSeed() {
      if (state.locked) {
        return;
      }
      if (state.planted) {
        wrongAction();
        return;
      }
      state.planted = true;
      state.stage = 0;
      pulseAt(400, 354, ["#d89a54", "#ffe0a7", "#7b4a2a"]);
      renderAll();
    }

    function addWater() {
      if (state.locked) {
        return;
      }
      if (!state.planted) {
        wrongAction();
        return;
      }
      if (state.waterReady) {
        state.water = 100;
        state.mistakes += 1;
        floodEffect();
        wrongAction();
        renderAll();
        setTimeout(() => {
          state.water = 44;
          renderAll();
        }, 760);
        return;
      }
      state.water = Math.min(MAX_VALUE, state.water + 22);
      if (state.water > 0 && state.water < GOOD_MIN) {
        state.stage = Math.max(state.stage, 1);
      }
      waterDrops();
      if (state.water > GOOD_MAX) {
        state.mistakes += 1;
        floodEffect();
        wrongAction();
      }
      if (state.water >= GOOD_MIN && state.water <= GOOD_MAX) {
        state.waterReady = true;
        state.stage = Math.max(state.stage, 1);
        successStep(["#72d9ff", "#69e77e", "#fff7cf"]);
      }
      renderAll();
    }

    function addSun() {
      if (state.locked) {
        return;
      }
      if (!state.planted || !state.waterReady) {
        wrongAction();
        return;
      }
      if (state.sunReady) {
        state.sun = 100;
        state.mistakes += 1;
        heatEffect();
        wrongAction();
        renderAll();
        setTimeout(() => {
          state.sun = 44;
          renderAll();
        }, 760);
        return;
      }
      state.sun = Math.min(MAX_VALUE, state.sun + 22);
      sunRays();
      if (state.sun > GOOD_MAX) {
        state.mistakes += 1;
        heatEffect();
        wrongAction();
      }
      if (state.sun >= GOOD_MIN && state.sun <= GOOD_MAX) {
        state.sunReady = true;
        state.stage = 3;
        successStep(["#ffd95a", "#ff74b8", "#69e77e"]);
        setTimeout(nextPlant, 1150);
      } else if (state.sun > 0) {
        state.stage = Math.max(state.stage, 2);
      }
      renderAll();
    }

    function successStep(colors) {
      state.locked = true;
      pulseAt(400, 286, colors);
      setTimeout(() => {
        state.locked = false;
      }, 600);
    }

    function nextPlant() {
      if (state.plantIndex >= plants.length - 1) {
        finishGame();
        return;
      }
      state.plantIndex += 1;
      state.stage = 0;
      state.water = 0;
      state.sun = 0;
      state.planted = false;
      state.waterReady = false;
      state.sunReady = false;
      state.locked = false;
      renderAll();
    }

    function finishGame() {
      const score = Math.max(1, 3 - Math.min(2, state.mistakes));
      nodes.resultMessage.textContent = score === 3
        ? "완벽해요. 네 식물이 모두 건강해요."
        : "잘했어요. 네 식물이 우주 정원에서 자랐어요.";
      nodes.resultScreen.classList.add("active");
      pulseAt(400, 220, ["#ffd95a", "#ff74b8", "#72d9ff", "#69e77e"], 48);
    }

    function wrongAction() {
      nodes.game.classList.remove("shake", "flash");
      void nodes.game.offsetWidth;
      nodes.game.classList.add("shake", "flash");
      setTimeout(() => {
        nodes.game.classList.remove("shake", "flash");
      }, 430);
      renderPlant();
    }

    function pulseAt(x, y, colors, amount = 28) {
      for (let i = 0; i < amount; i += 1) {
        const particle = document.createElement("span");
        const angle = (Math.PI * 2 * i) / amount;
        const distance = 54 + Math.random() * 70;
        const size = 6 + Math.random() * 8;
        particle.className = "particle";
        particle.style.setProperty("--x", `${x}px`);
        particle.style.setProperty("--y", `${y}px`);
        particle.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
        particle.style.setProperty("--dy", `${Math.sin(angle) * distance}px`);
        particle.style.setProperty("--s", `${size}px`);
        particle.style.setProperty("--c", colors[i % colors.length]);
        nodes.effectLayer.appendChild(particle);
        setTimeout(() => particle.remove(), 920);
      }
    }

    function waterDrops() {
      for (let i = 0; i < 16; i += 1) {
        const drop = document.createElement("span");
        drop.className = "drop";
        drop.style.left = `${330 + Math.random() * 140}px`;
        drop.style.top = `${165 + Math.random() * 46}px`;
        drop.style.animationDelay = `${Math.random() * 0.16}s`;
        nodes.effectLayer.appendChild(drop);
        setTimeout(() => drop.remove(), 900);
      }
    }

    function sunRays() {
      for (let i = 0; i < 8; i += 1) {
        const ray = document.createElement("span");
        ray.className = "ray";
        ray.style.left = `${322 + i * 22}px`;
        ray.style.top = `${72 + Math.random() * 34}px`;
        ray.style.setProperty("--r", `${-18 + Math.random() * 36}deg`);
        ray.style.animationDelay = `${Math.random() * 0.1}s`;
        nodes.effectLayer.appendChild(ray);
        setTimeout(() => ray.remove(), 900);
      }
    }

    function floodEffect() {
      const flood = document.createElement("span");
      flood.className = "flood";
      nodes.effectLayer.appendChild(flood);
      setTimeout(() => flood.remove(), 1100);
    }

    function heatEffect() {
      const heat = document.createElement("div");
      heat.className = "heat";
      heat.innerHTML = "<span></span><span></span><span></span>";
      nodes.effectLayer.appendChild(heat);
      setTimeout(() => heat.remove(), 1200);
    }

    function resetGame() {
      state.plantIndex = 0;
      state.stage = 0;
      state.water = 0;
      state.sun = 0;
      state.planted = false;
      state.waterReady = false;
      state.sunReady = false;
      state.locked = false;
      state.mistakes = 0;
      nodes.resultScreen.classList.remove("active");
      nodes.effectLayer.innerHTML = "";
      renderAll();
    }

    nodes.seedButton.addEventListener("click", plantSeed);
    nodes.waterButton.addEventListener("click", addWater);
    nodes.sunButton.addEventListener("click", addSun);
    nodes.replayButton.addEventListener("click", resetGame);

    createStars();
    renderAll();
  </script>
</body>
</html>
