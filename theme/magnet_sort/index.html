<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자석 실험 분류 놀이</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --space: #0a0118;
      --space-2: #15062a;
      --panel: rgba(30, 14, 62, 0.82);
      --panel-2: rgba(57, 31, 105, 0.78);
      --white: #ffffff;
      --text: #fff7d6;
      --muted: #cdbdff;
      --cyan: #74f3ff;
      --yellow: #ffd35a;
      --orange: #ff9f43;
      --pink: #ff6ab7;
      --red: #ff4f70;
      --blue: #4da6ff;
      --green: #62f0a8;
      --shadow: rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: var(--space);
      color: var(--text);
      font-family: "Nunito", system-ui, sans-serif;
      display: grid;
      place-items: center;
      user-select: none;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
    }

    .page {
      width: 100vw;
      height: 100vh;
      min-width: 800px;
      min-height: 600px;
      display: grid;
      place-items: center;
      position: relative;
      background:
        radial-gradient(circle at 18% 18%, rgba(116, 243, 255, 0.14), transparent 20%),
        radial-gradient(circle at 82% 26%, rgba(255, 106, 183, 0.12), transparent 22%),
        radial-gradient(circle at 50% 90%, rgba(98, 240, 168, 0.08), transparent 24%),
        #0a0118;
    }

    .stars {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: var(--size);
      height: var(--size);
      left: var(--x);
      top: var(--y);
      background: var(--shine);
      border-radius: 50%;
      opacity: 0.3;
      box-shadow: 0 0 12px var(--shine);
      animation: twinkle var(--speed) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    @keyframes twinkle {
      0%,
      100% {
        transform: scale(0.6);
        opacity: 0.22;
      }
      45% {
        transform: scale(1.28);
        opacity: 0.95;
      }
      70% {
        transform: scale(0.86);
        opacity: 0.48;
      }
    }

    .game {
      width: 800px;
      height: 600px;
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      background:
        radial-gradient(circle at 24% 18%, rgba(116, 243, 255, 0.18), transparent 18%),
        radial-gradient(circle at 82% 74%, rgba(255, 211, 90, 0.12), transparent 20%),
        linear-gradient(180deg, rgba(31, 9, 70, 0.82), rgba(10, 1, 24, 0.96));
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.55), inset 0 0 60px rgba(116, 243, 255, 0.08);
    }

    .hud {
      position: absolute;
      z-index: 20;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    .home,
    .progress,
    .small-pill {
      min-height: 44px;
      padding: 9px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
      color: var(--white);
      font-size: 18px;
      font-weight: 900;
      line-height: 1.2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
    }

    .home {
      transition: transform 160ms ease, background 160ms ease;
    }

    .home:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.18);
    }

    .stage {
      position: absolute;
      inset: 0;
    }

    .title-card {
      position: absolute;
      left: 50%;
      top: 64px;
      transform: translateX(-50%);
      width: 580px;
      text-align: center;
      z-index: 5;
    }

    .title {
      margin: 0;
      font-size: 34px;
      line-height: 1.15;
      letter-spacing: 0;
      color: var(--white);
      text-shadow: 0 5px 18px rgba(0, 0, 0, 0.35);
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 20px;
      line-height: 1.35;
      color: var(--muted);
      font-weight: 800;
    }

    .experiment-zone {
      position: absolute;
      left: 34px;
      right: 34px;
      top: 132px;
      bottom: 72px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
        rgba(12, 3, 32, 0.52);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 0 38px rgba(116, 243, 255, 0.06);
    }

    .experiment-zone.flash-red {
      animation: redFlash 420ms ease;
    }

    @keyframes redFlash {
      0%,
      100% {
        box-shadow: inset 0 0 38px rgba(116, 243, 255, 0.06);
      }
      45% {
        box-shadow: inset 0 0 70px rgba(255, 79, 112, 0.65), 0 0 30px rgba(255, 79, 112, 0.35);
      }
    }

    .magnet {
      position: absolute;
      left: 334px;
      top: 288px;
      width: 132px;
      height: 132px;
      z-index: 12;
      cursor: grab;
      touch-action: none;
      filter: drop-shadow(0 16px 16px rgba(0, 0, 0, 0.32));
      animation: floatMagnet 2.4s ease-in-out infinite;
    }

    .magnet.dragging {
      cursor: grabbing;
      animation: none;
      filter: drop-shadow(0 22px 18px rgba(0, 0, 0, 0.4)) drop-shadow(0 0 18px rgba(116, 243, 255, 0.35));
    }

    @keyframes floatMagnet {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    .item {
      position: absolute;
      width: 106px;
      min-height: 122px;
      z-index: 8;
      display: grid;
      justify-items: center;
      gap: 3px;
      transform-origin: center;
      transition: filter 200ms ease;
    }

    .item svg {
      width: 92px;
      height: 82px;
      overflow: visible;
      filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.28));
    }

    .item-label,
    .choice-label {
      min-width: 74px;
      max-width: 104px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--white);
      text-align: center;
      font-size: 17px;
      line-height: 1.1;
      font-weight: 900;
      white-space: nowrap;
    }

    .item.attracted {
      z-index: 15;
      animation: itemSpin 520ms ease both;
      filter: drop-shadow(0 0 22px rgba(116, 243, 255, 0.75));
    }

    @keyframes itemSpin {
      0% {
        scale: 1;
      }
      60% {
        scale: 1.12;
      }
      100% {
        scale: 0.74;
      }
    }

    .item.repelled {
      animation: repelBounce 540ms cubic-bezier(.2, .8, .2, 1) both;
    }

    @keyframes repelBounce {
      0% {
        transform: translate(0, 0) rotate(0);
      }
      38% {
        transform: translate(var(--push-x), var(--push-y)) rotate(var(--push-rot));
      }
      70% {
        transform: translate(calc(var(--push-x) * -0.22), calc(var(--push-y) * -0.22)) rotate(0);
      }
      100% {
        transform: translate(0, 0) rotate(0);
      }
    }

    .shake {
      animation: shake 420ms linear;
    }

    @keyframes shake {
      0%,
      100% {
        transform: translateX(0);
      }
      20% {
        transform: translateX(-10px);
      }
      40% {
        transform: translateX(9px);
      }
      60% {
        transform: translateX(-7px);
      }
      80% {
        transform: translateX(5px);
      }
    }

    .force-layer,
    .particle-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 18;
    }

    .force-arrow {
      position: absolute;
      width: 54px;
      height: 18px;
      color: var(--red);
      opacity: 0;
      animation: forcePush 620ms ease-out forwards;
    }

    .force-arrow svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 0 8px rgba(255, 79, 112, 0.6));
    }

    @keyframes forcePush {
      0% {
        opacity: 0;
        transform: translate(0, 0) scale(0.6);
      }
      20% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(var(--fx), var(--fy)) scale(1.1);
      }
    }

    .particle {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--pc);
      box-shadow: 0 0 16px var(--pc);
      animation: particleBurst 740ms ease-out forwards;
    }

    @keyframes particleBurst {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(0.2);
      }
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      min-width: 280px;
      max-width: 620px;
      padding: 12px 20px;
      border-radius: 999px;
      text-align: center;
      z-index: 24;
      font-size: 21px;
      font-weight: 900;
      color: var(--white);
      background: rgba(0, 0, 0, 0.36);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.28);
    }

    .toast.good {
      background: rgba(18, 121, 88, 0.72);
    }

    .toast.bad {
      background: rgba(151, 28, 57, 0.76);
    }

    .pole-demo {
      position: absolute;
      right: 50px;
      bottom: 92px;
      width: 228px;
      height: 92px;
      z-index: 7;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.13);
      overflow: hidden;
    }

    .pole-title {
      position: absolute;
      left: 12px;
      top: 8px;
      z-index: 1;
      color: var(--muted);
      font-size: 14px;
      font-weight: 900;
    }

    .mini-pole {
      position: absolute;
      top: 38px;
      width: 72px;
      height: 30px;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 17px;
      font-weight: 900;
      border: 2px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.28);
    }

    .mini-pole.left {
      left: 34px;
      background: var(--red);
      animation: nsAttractLeft 2.8s ease-in-out infinite;
    }

    .mini-pole.right {
      right: 34px;
      background: var(--blue);
      animation: nsAttractRight 2.8s ease-in-out infinite;
    }

    .pole-demo.repel .mini-pole.left,
    .pole-demo.repel .mini-pole.right {
      background: var(--red);
    }

    .pole-demo.repel .mini-pole.left {
      animation: nnRepelLeft 2.8s ease-in-out infinite;
    }

    .pole-demo.repel .mini-pole.right {
      animation: nnRepelRight 2.8s ease-in-out infinite;
    }

    .pole-demo.repel::before,
    .pole-demo.repel::after {
      content: "";
      position: absolute;
      top: 54px;
      width: 28px;
      height: 5px;
      border-radius: 5px;
      background: var(--yellow);
      box-shadow: 0 0 12px rgba(255, 211, 90, 0.85);
      animation: repelArrowPulse 1.2s ease-in-out infinite;
    }

    .pole-demo.repel::before {
      left: 82px;
      transform: rotate(180deg);
    }

    .pole-demo.repel::after {
      right: 82px;
    }

    @keyframes nsAttractLeft {
      0%,
      100% {
        transform: translateX(0);
      }
      50% {
        transform: translateX(24px);
      }
    }

    @keyframes nsAttractRight {
      0%,
      100% {
        transform: translateX(0);
      }
      50% {
        transform: translateX(-24px);
      }
    }

    @keyframes nnRepelLeft {
      0%,
      100% {
        transform: translateX(18px);
      }
      50% {
        transform: translateX(-10px);
      }
    }

    @keyframes nnRepelRight {
      0%,
      100% {
        transform: translateX(-18px);
      }
      50% {
        transform: translateX(10px);
      }
    }

    @keyframes repelArrowPulse {
      0%,
      100% {
        opacity: 0.25;
      }
      50% {
        opacity: 1;
      }
    }

    .quiz-wrap {
      position: absolute;
      left: 54px;
      right: 54px;
      top: 132px;
      bottom: 58px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
      z-index: 8;
    }

    .quiz-question {
      margin: 0;
      text-align: center;
      font-size: 38px;
      line-height: 1.15;
      color: var(--white);
      text-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      align-items: stretch;
    }

    .choice {
      position: relative;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      background:
        radial-gradient(circle at 50% 8%, rgba(255, 255, 255, 0.15), transparent 35%),
        rgba(255, 255, 255, 0.08);
      color: var(--white);
      cursor: pointer;
      display: grid;
      place-items: center;
      grid-template-rows: 1fr auto;
      padding: 14px 8px 16px;
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.26);
      transition: transform 170ms ease, border-color 170ms ease, background 170ms ease;
    }

    .choice:hover {
      transform: translateY(-5px);
      border-color: rgba(116, 243, 255, 0.65);
      background:
        radial-gradient(circle at 50% 8%, rgba(116, 243, 255, 0.2), transparent 36%),
        rgba(255, 255, 255, 0.11);
    }

    .choice svg {
      width: 122px;
      height: 116px;
      overflow: visible;
      filter: drop-shadow(0 14px 12px rgba(0, 0, 0, 0.3));
    }

    .choice.correct {
      animation: choiceCorrect 700ms ease both;
      border-color: rgba(98, 240, 168, 0.9);
    }

    .choice.wrong {
      animation: choiceWrong 430ms ease both;
      border-color: rgba(255, 79, 112, 0.95);
    }

    @keyframes choiceCorrect {
      0% {
        transform: scale(1);
      }
      45% {
        transform: scale(1.08) rotate(-2deg);
      }
      100% {
        transform: scale(1);
        background: rgba(25, 126, 90, 0.66);
      }
    }

    @keyframes choiceWrong {
      0%,
      100% {
        transform: translateX(0);
        background: rgba(255, 255, 255, 0.08);
      }
      25% {
        transform: translateX(-9px);
        background: rgba(160, 25, 56, 0.6);
      }
      50% {
        transform: translateX(8px);
      }
      75% {
        transform: translateX(-5px);
      }
    }

    .result {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      background: rgba(10, 1, 24, 0.78);
      backdrop-filter: blur(8px);
    }

    .result.show {
      display: grid;
      animation: resultIn 540ms ease both;
    }

    @keyframes resultIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .result-card {
      width: 560px;
      min-height: 390px;
      padding: 34px 32px;
      border-radius: 26px;
      text-align: center;
      background:
        radial-gradient(circle at 30% 0%, rgba(116, 243, 255, 0.22), transparent 32%),
        radial-gradient(circle at 70% 100%, rgba(255, 211, 90, 0.18), transparent 34%),
        rgba(34, 13, 76, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.48);
    }

    .result-title {
      margin: 0;
      color: var(--white);
      font-size: 40px;
      line-height: 1.1;
    }

    .score-stars {
      margin: 24px auto 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
      min-height: 70px;
    }

    .score-star {
      width: 58px;
      height: 58px;
      animation: starPop 820ms cubic-bezier(.2, 1.2, .3, 1) both;
      filter: drop-shadow(0 0 14px rgba(255, 211, 90, 0.7));
    }

    .score-star.dim {
      opacity: 0.28;
      filter: grayscale(1);
    }

    @keyframes starPop {
      0% {
        transform: scale(0) rotate(-35deg);
      }
      70% {
        transform: scale(1.16) rotate(8deg);
      }
      100% {
        transform: scale(1) rotate(0);
      }
    }

    .score-text {
      margin: 0;
      color: var(--text);
      font-size: 26px;
      font-weight: 900;
    }

    .result-actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 26px;
    }

    .action-btn {
      border: 0;
      min-width: 140px;
      min-height: 50px;
      padding: 12px 20px;
      border-radius: 999px;
      color: #170520;
      background: var(--yellow);
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.28);
      transition: transform 160ms ease, filter 160ms ease;
    }

    .action-btn.home-link {
      background: var(--cyan);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .action-btn:hover {
      transform: translateY(-3px);
      filter: brightness(1.08);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="stars" id="stars" aria-hidden="true"></div>
    <section class="game" id="game" aria-label="자석 실험 분류 놀이">
      <header class="hud">
        <a class="home" href="../../index.html">← 홈</a>
        <div class="progress" id="progress">1/8</div>
      </header>

      <div class="stage" id="stage"></div>
      <div class="force-layer" id="forceLayer"></div>
      <div class="particle-layer" id="particleLayer"></div>
      <div class="toast" id="toast">자석을 물건 가까이 가져가 보세요</div>

      <section class="result" id="resultScreen" aria-label="결과 화면">
        <div class="result-card">
          <h2 class="result-title">자석 실험 끝!</h2>
          <div class="score-stars" id="scoreStars"></div>
          <p class="score-text" id="scoreText">0점</p>
          <div class="result-actions">
            <button class="action-btn" id="replayBtn" type="button">다시 하기</button>
            <a class="action-btn home-link" href="../../index.html">홈으로</a>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const game = document.getElementById("game");
    const stage = document.getElementById("stage");
    const progress = document.getElementById("progress");
    const toast = document.getElementById("toast");
    const stars = document.getElementById("stars");
    const forceLayer = document.getElementById("forceLayer");
    const particleLayer = document.getElementById("particleLayer");
    const resultScreen = document.getElementById("resultScreen");
    const replayBtn = document.getElementById("replayBtn");
    const scoreStars = document.getElementById("scoreStars");
    const scoreText = document.getElementById("scoreText");

    const totalRounds = 8;
    let roundIndex = 0;
    let score = 0;
    let locked = false;
    let currentMagnet = null;
    let dragState = null;

    const items = [
      { id: "nail", name: "못", magnetic: true, svg: nailSvg },
      { id: "clip", name: "클립", magnetic: true, svg: paperclipSvg },
      { id: "key", name: "열쇠", magnetic: true, svg: keySvg },
      { id: "can", name: "캔", magnetic: true, svg: canSvg },
      { id: "wood", name: "나무", magnetic: false, svg: woodSvg },
      { id: "bottle", name: "플라스틱병", magnetic: false, svg: bottleSvg },
      { id: "rubber", name: "고무", magnetic: false, svg: rubberSvg },
      { id: "paper", name: "종이", magnetic: false, svg: paperSvg },
      { id: "sponge", name: "스펀지", magnetic: false, svg: spongeSvg }
    ];

    const experimentRounds = [
      ["nail", "wood", "paper", "bottle"],
      ["clip", "sponge", "rubber", "paper"],
      ["key", "wood", "bottle", "sponge"],
      ["can", "rubber", "paper", "wood"]
    ];

    const quizRounds = [
      ["wood", "nail", "paper", "rubber"],
      ["bottle", "clip", "sponge", "paper"],
      ["key", "wood", "rubber", "sponge"],
      ["paper", "can", "bottle", "wood"]
    ];

    const objectPositions = [
      { left: 86, top: 78 },
      { left: 256, top: 52 },
      { left: 498, top: 80 },
      { left: 128, top: 260 }
    ];

    const starPoints = [
      [8, 2],
      [10.1, 5.7],
      [14.3, 6.1],
      [11.2, 8.9],
      [12.1, 13],
      [8, 10.9],
      [3.9, 13],
      [4.8, 8.9],
      [1.7, 6.1],
      [5.9, 5.7]
    ];

    function buildStars() {
      const palette = ["#ffffff", "#74f3ff", "#ffd35a", "#cdbdff"];
      for (let i = 0; i < 55; i += 1) {
        const dot = document.createElement("i");
        dot.className = "star";
        dot.style.setProperty("--x", `${(i * 37 + 9) % 100}%`);
        dot.style.setProperty("--y", `${(i * 61 + 13) % 100}%`);
        dot.style.setProperty("--size", `${2 + (i % 4)}px`);
        dot.style.setProperty("--speed", `${1.5 + (i % 7) * 0.34}s`);
        dot.style.setProperty("--delay", `${(i % 11) * -0.22}s`);
        dot.style.setProperty("--shine", palette[i % palette.length]);
        stars.appendChild(dot);
      }
    }

    function itemById(id) {
      return items.find((item) => item.id === id);
    }

    function setToast(text, type = "") {
      toast.textContent = text;
      toast.className = `toast ${type}`.trim();
    }

    function clearStage() {
      stage.innerHTML = "";
      forceLayer.innerHTML = "";
      particleLayer.innerHTML = "";
      locked = false;
      currentMagnet = null;
      dragState = null;
    }

    function startGame() {
      roundIndex = 0;
      score = 0;
      resultScreen.classList.remove("show");
      showRound();
    }

    function showRound() {
      clearStage();
      progress.textContent = `${roundIndex + 1}/${totalRounds}`;
      const isExperiment = roundIndex % 2 === 0;
      if (isExperiment) {
        const data = experimentRounds[Math.floor(roundIndex / 2)];
        renderExperiment(data);
      } else {
        const data = quizRounds[Math.floor(roundIndex / 2)];
        renderQuiz(data);
      }
    }

    function nextRound(delay = 900) {
      setTimeout(() => {
        roundIndex += 1;
        if (roundIndex >= totalRounds) {
          showResult();
        } else {
          showRound();
        }
      }, delay);
    }

    function renderExperiment(ids) {
      const title = document.createElement("div");
      title.className = "title-card";
      title.innerHTML = `
        <h1 class="title">자석 실험</h1>
        <p class="subtitle">자석을 물건 가까이 움직여 보세요</p>
      `;
      stage.appendChild(title);

      const zone = document.createElement("div");
      zone.className = "experiment-zone";
      zone.id = "experimentZone";
      stage.appendChild(zone);

      ids.forEach((id, index) => {
        const item = itemById(id);
        const node = document.createElement("div");
        node.className = "item";
        node.dataset.id = item.id;
        node.dataset.magnetic = item.magnetic ? "true" : "false";
        node.style.left = `${objectPositions[index].left}px`;
        node.style.top = `${objectPositions[index].top}px`;
        node.innerHTML = `${item.svg()}<span class="item-label">${item.name}</span>`;
        zone.appendChild(node);
      });

      const demo = createPoleDemo(roundIndex % 4 === 0 ? "attract" : "repel");
      zone.appendChild(demo);

      const magnet = document.createElement("div");
      magnet.className = "magnet";
      magnet.innerHTML = magnetSvg();
      zone.appendChild(magnet);
      currentMagnet = magnet;
      magnet.addEventListener("pointerdown", beginDrag);
      setToast("자석을 끌어서 붙는 물건을 찾아요");
    }

    function renderQuiz(ids) {
      const title = document.createElement("div");
      title.className = "title-card";
      title.innerHTML = `
        <h1 class="title">생각해 볼까요?</h1>
        <p class="subtitle">실험한 내용을 떠올려 보세요</p>
      `;
      stage.appendChild(title);

      const wrap = document.createElement("section");
      wrap.className = "quiz-wrap";
      wrap.innerHTML = `<h2 class="quiz-question">자석에 붙는 것은?</h2>`;

      const choices = document.createElement("div");
      choices.className = "choices";
      ids.forEach((id) => {
        const item = itemById(id);
        const button = document.createElement("button");
        button.className = "choice";
        button.type = "button";
        button.dataset.id = item.id;
        button.dataset.magnetic = item.magnetic ? "true" : "false";
        button.innerHTML = `${item.svg()}<span class="choice-label">${item.name}</span>`;
        button.addEventListener("click", () => answerQuiz(button, item));
        choices.appendChild(button);
      });

      wrap.appendChild(choices);
      stage.appendChild(wrap);
      setToast("자석에 붙는 물건을 눌러요");
    }

    function beginDrag(event) {
      if (locked) {
        return;
      }
      currentMagnet.classList.add("dragging");
      currentMagnet.setPointerCapture(event.pointerId);
      const rect = currentMagnet.getBoundingClientRect();
      const zone = document.getElementById("experimentZone").getBoundingClientRect();
      dragState = {
        id: event.pointerId,
        offsetX: event.clientX - rect.left,
        offsetY: event.clientY - rect.top,
        zoneLeft: zone.left,
        zoneTop: zone.top,
        zoneWidth: zone.width,
        zoneHeight: zone.height
      };
      currentMagnet.addEventListener("pointermove", moveDrag);
      currentMagnet.addEventListener("pointerup", endDrag);
      currentMagnet.addEventListener("pointercancel", endDrag);
    }

    function moveDrag(event) {
      if (!dragState || locked) {
        return;
      }
      const maxX = dragState.zoneWidth - currentMagnet.offsetWidth - 8;
      const maxY = dragState.zoneHeight - currentMagnet.offsetHeight - 8;
      const x = clamp(event.clientX - dragState.zoneLeft - dragState.offsetX, 6, maxX);
      const y = clamp(event.clientY - dragState.zoneTop - dragState.offsetY, 6, maxY);
      currentMagnet.style.left = `${x}px`;
      currentMagnet.style.top = `${y}px`;
      testNearbyItems();
    }

    function endDrag(event) {
      if (!currentMagnet) {
        return;
      }
      currentMagnet.classList.remove("dragging");
      currentMagnet.releasePointerCapture(event.pointerId);
      currentMagnet.removeEventListener("pointermove", moveDrag);
      currentMagnet.removeEventListener("pointerup", endDrag);
      currentMagnet.removeEventListener("pointercancel", endDrag);
      dragState = null;
    }

    function testNearbyItems() {
      const magnetRect = currentMagnet.getBoundingClientRect();
      const magnetCenter = centerOf(magnetRect);
      const nodes = [...stage.querySelectorAll(".item:not(.attracted):not(.repelled)")];
      nodes.forEach((node) => {
        const rect = node.getBoundingClientRect();
        const itemCenter = centerOf(rect);
        const distance = Math.hypot(magnetCenter.x - itemCenter.x, magnetCenter.y - itemCenter.y);
        if (distance < 118) {
          const isMagnetic = node.dataset.magnetic === "true";
          if (isMagnetic) {
            attractItem(node, magnetCenter, itemCenter);
          } else {
            repelItem(node, magnetCenter, itemCenter);
          }
        }
      });
    }

    function attractItem(node, magnetCenter, itemCenter) {
      if (locked) {
        return;
      }
      locked = true;
      const dx = magnetCenter.x - itemCenter.x;
      const dy = magnetCenter.y - itemCenter.y;
      node.classList.add("attracted");
      node.style.transition = "transform 620ms cubic-bezier(.18,.9,.18,1)";
      node.style.transform = `translate(${dx}px, ${dy}px) rotate(18deg)`;
      burst(magnetCenter.x, magnetCenter.y);
      score += 1;
      setToast("맞아요! 자석에 붙었어요", "good");
      nextRound(1050);
    }

    function repelItem(node, magnetCenter, itemCenter) {
      if (node.classList.contains("repelled") || locked) {
        return;
      }
      const awayX = itemCenter.x - magnetCenter.x;
      const awayY = itemCenter.y - magnetCenter.y;
      const length = Math.max(1, Math.hypot(awayX, awayY));
      const pushX = (awayX / length) * 58;
      const pushY = (awayY / length) * 40;
      node.style.setProperty("--push-x", `${pushX}px`);
      node.style.setProperty("--push-y", `${pushY}px`);
      node.style.setProperty("--push-rot", `${pushX > 0 ? 9 : -9}deg`);
      node.classList.add("repelled");
      flashWrong();
      forceArrows(itemCenter.x, itemCenter.y, pushX, pushY);
      setToast("이 물건은 자석에 붙지 않아요", "bad");
      setTimeout(() => {
        node.classList.remove("repelled");
        setToast("다른 물건에 자석을 가까이 가져가요");
      }, 760);
    }

    function answerQuiz(button, item) {
      if (locked) {
        return;
      }
      locked = true;
      if (item.magnetic) {
        button.classList.add("correct");
        score += 1;
        const rect = button.getBoundingClientRect();
        burst(rect.left + rect.width / 2, rect.top + rect.height / 2);
        setToast("정답이에요! 자석에 붙어요", "good");
        nextRound(1050);
      } else {
        button.classList.add("wrong");
        flashWrong();
        forceArrows(button.getBoundingClientRect().left + 80, button.getBoundingClientRect().top + 80, 54, 0);
        setToast("다시 생각해요. 자석에 붙는 물건을 찾아요", "bad");
        setTimeout(() => {
          button.classList.remove("wrong");
          locked = false;
          setToast("자석에 붙는 물건을 눌러요");
        }, 760);
      }
    }

    function flashWrong() {
      const zone = document.getElementById("experimentZone") || stage;
      zone.classList.add("flash-red", "shake");
      setTimeout(() => {
        zone.classList.remove("flash-red", "shake");
      }, 480);
    }

    function burst(x, y) {
      const colors = ["#74f3ff", "#ffd35a", "#ff6ab7", "#62f0a8", "#ffffff"];
      for (let i = 0; i < 22; i += 1) {
        const particle = document.createElement("span");
        const angle = (Math.PI * 2 * i) / 22;
        const distance = 42 + (i % 6) * 10;
        particle.className = "particle";
        particle.style.left = `${x - game.getBoundingClientRect().left}px`;
        particle.style.top = `${y - game.getBoundingClientRect().top}px`;
        particle.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
        particle.style.setProperty("--dy", `${Math.sin(angle) * distance}px`);
        particle.style.setProperty("--pc", colors[i % colors.length]);
        particleLayer.appendChild(particle);
        setTimeout(() => particle.remove(), 820);
      }
    }

    function forceArrows(x, y, pushX, pushY) {
      for (let i = 0; i < 3; i += 1) {
        const arrow = document.createElement("span");
        arrow.className = "force-arrow";
        arrow.style.left = `${x - game.getBoundingClientRect().left - 22}px`;
        arrow.style.top = `${y - game.getBoundingClientRect().top - 9 + (i - 1) * 18}px`;
        arrow.style.setProperty("--fx", `${pushX + i * 10}px`);
        arrow.style.setProperty("--fy", `${pushY + (i - 1) * 8}px`);
        arrow.innerHTML = forceArrowSvg();
        forceLayer.appendChild(arrow);
        setTimeout(() => arrow.remove(), 700);
      }
    }

    function showResult() {
      clearStage();
      progress.textContent = `${totalRounds}/${totalRounds}`;
      setToast("결과를 확인해요", "good");
      scoreStars.innerHTML = "";
      const starCount = Math.max(1, Math.ceil((score / totalRounds) * 5));
      for (let i = 0; i < 5; i += 1) {
        const wrap = document.createElement("div");
        wrap.className = `score-star ${i < starCount ? "" : "dim"}`;
        wrap.style.animationDelay = `${i * 90}ms`;
        wrap.innerHTML = scoreStarSvg();
        scoreStars.appendChild(wrap);
      }
      scoreText.textContent = `${score}/${totalRounds}개 맞혔어요`;
      resultScreen.classList.add("show");
    }

    function createPoleDemo(mode) {
      const demo = document.createElement("div");
      demo.className = `pole-demo ${mode === "repel" ? "repel" : ""}`;
      demo.innerHTML = `
        <div class="pole-title">${mode === "repel" ? "N-N 밀어내요" : "N-S 붙어요"}</div>
        <div class="mini-pole left">N</div>
        <div class="mini-pole right">${mode === "repel" ? "N" : "S"}</div>
      `;
      return demo;
    }

    function centerOf(rect) {
      return {
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height / 2
      };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function magnetSvg() {
      return `
        <svg viewBox="0 0 140 140" role="img" aria-label="말굽자석">
          <defs>
            <linearGradient id="magnetRed" x1="0" x2="1">
              <stop offset="0" stop-color="#ff7a8e"/>
              <stop offset="1" stop-color="#e82f58"/>
            </linearGradient>
            <linearGradient id="magnetBlue" x1="0" x2="1">
              <stop offset="0" stop-color="#78c9ff"/>
              <stop offset="1" stop-color="#2475e7"/>
            </linearGradient>
          </defs>
          <path d="M30 27h30v58c0 12 6 19 10 19s10-7 10-19V27h30v60c0 35-19 51-40 51S30 122 30 87V27z" fill="#d7dbe8"/>
          <path d="M30 27h30v58c0 12 6 19 10 19v34c-21 0-40-16-40-51V27z" fill="url(#magnetRed)"/>
          <path d="M80 27h30v60c0 35-19 51-40 51v-34c4 0 10-7 10-19V27z" fill="url(#magnetBlue)"/>
          <rect x="24" y="18" width="42" height="30" rx="8" fill="#ff4f70"/>
          <rect x="74" y="18" width="42" height="30" rx="8" fill="#4da6ff"/>
          <text x="45" y="40" text-anchor="middle" font-size="22" font-weight="900" fill="#fff">N</text>
          <text x="95" y="40" text-anchor="middle" font-size="22" font-weight="900" fill="#fff">S</text>
          <path d="M60 62c0 17 3 28 10 28s10-11 10-28" fill="none" stroke="rgba(255,255,255,.42)" stroke-width="7" stroke-linecap="round"/>
        </svg>
      `;
    }

    function nailSvg() {
      return `
        <svg viewBox="0 0 120 100" role="img" aria-label="못">
          <rect x="28" y="44" width="70" height="12" rx="6" fill="#cfd8e8" transform="rotate(-20 63 50)"/>
          <polygon points="94,29 113,34 99,48" fill="#aeb9cc"/>
          <rect x="16" y="47" width="22" height="18" rx="4" fill="#8794aa" transform="rotate(-20 27 56)"/>
          <path d="M38 49l58-21" stroke="#ffffff" stroke-opacity=".36" stroke-width="4" stroke-linecap="round"/>
        </svg>
      `;
    }

    function paperclipSvg() {
      return `
        <svg viewBox="0 0 120 100" role="img" aria-label="클립">
          <path d="M40 62V31c0-16 13-25 28-23 14 2 22 13 22 26v34c0 16-13 26-28 26S34 84 34 68V33c0-10 8-18 18-18s18 8 18 18v34c0 5-4 9-9 9s-9-4-9-9V36"
            fill="none" stroke="#d8e8ff" stroke-width="10" stroke-linecap="round"/>
          <path d="M40 62V31c0-16 13-25 28-23" fill="none" stroke="#74f3ff" stroke-width="4" stroke-linecap="round"/>
        </svg>
      `;
    }

    function keySvg() {
      return `
        <svg viewBox="0 0 120 100" role="img" aria-label="열쇠">
          <circle cx="38" cy="44" r="22" fill="#ffd35a"/>
          <circle cx="38" cy="44" r="10" fill="#0a0118"/>
          <rect x="55" y="39" width="48" height="12" rx="6" fill="#f8b83e"/>
          <rect x="84" y="47" width="9" height="15" fill="#f8b83e"/>
          <rect x="98" y="47" width="8" height="11" fill="#f8b83e"/>
          <path d="M24 35c7-10 23-11 32 0" fill="none" stroke="#fff4b8" stroke-width="5" stroke-linecap="round"/>
        </svg>
      `;
    }

    function canSvg() {
      return `
        <svg viewBox="0 0 120 100" role="img" aria-label="캔">
          <ellipse cx="60" cy="18" rx="30" ry="11" fill="#cdd9e8"/>
          <rect x="30" y="18" width="60" height="60" fill="#6fc7ff"/>
          <ellipse cx="60" cy="78" rx="30" ry="11" fill="#8ba7bd"/>
          <path d="M30 18c5 9 55 9 60 0v60c-5 9-55 9-60 0z" fill="rgba(255,255,255,.22)"/>
          <rect x="42" y="37" width="36" height="18" rx="9" fill="#ff6ab7"/>
          <path d="M49 19c7 4 17 4 24 0" fill="none" stroke="#6b7482" stroke-width="4" stroke-linecap="round"/>
        </svg>
      `;
    }

    function woodSvg() {
      return `
        <svg viewBox="0 0 120 100" role="img" aria-label="나무">
          <rect x="20" y="28" width="80" height="46" rx="9" fill="#b66b36"/>
          <path d="M30 40h60M28 58h64" stroke="#7d421d" stroke-width="4" stroke-linecap="round"/>
          <circle cx="48" cy="51" r="10" fill="none" stroke="#7d421d" stroke-width="4"/>
          <path d="M83 32c-8 9-8 27 2 38" fill="none" stroke="#d69357" stroke-width="4" stroke-linecap="round"/>
        </svg>
      `;
    }

    function bottleSvg() {
      return `
        <svg viewBox="0 0 120 100" role="img" aria-label="플라스틱병">
          <rect x="48" y="10" width="24" height="14" rx="4" fill="#79e7ff"/>
          <path d="M45 24h30l6 18v35c0 10-8 16-21 16s-21-6-21-16V42z" fill="#b9f7ff" opacity=".9"/>
          <rect x="41" y="48" width="38" height="20" rx="8" fill="#78c9ff"/>
          <path d="M50 30c-5 12-5 33 0 47" fill="none" stroke="#ffffff" stroke-opacity=".58" stroke-width="5" stroke-linecap="round"/>
        </svg>
      `;
    }

    function rubberSvg() {
      return `
        <svg viewBox="0 0 120 100" role="img" aria-label="고무">
          <path d="M27 58c0-18 14-32 33-32s33 14 33 32c0 14-10 22-20 22-8 0-12-5-13-12-1 7-6 12-14 12-10 0-19-8-19-22z" fill="#ff7a8e"/>
          <path d="M42 58c0-10 8-17 18-17s18 7 18 17c0 7-5 11-10 11s-8-3-8-8c0 5-3 8-8 8s-10-4-10-11z" fill="#0a0118" opacity=".38"/>
          <path d="M35 48c8-12 30-17 45-2" fill="none" stroke="#ffd1dc" stroke-width="5" stroke-linecap="round"/>
        </svg>
      `;
    }

    function paperSvg() {
      return `
        <svg viewBox="0 0 120 100" role="img" aria-label="종이">
          <path d="M33 12h40l18 18v58H33z" fill="#fff7d6"/>
          <path d="M73 12v18h18" fill="#e4ddbd"/>
          <path d="M45 43h32M45 56h32M45 69h22" stroke="#8b83aa" stroke-width="5" stroke-linecap="round"/>
          <path d="M33 12h40l18 18" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
        </svg>
      `;
    }

    function spongeSvg() {
      return `
        <svg viewBox="0 0 120 100" role="img" aria-label="스펀지">
          <rect x="25" y="28" width="70" height="44" rx="14" fill="#ffd35a"/>
          <circle cx="43" cy="43" r="5" fill="#d59b25"/>
          <circle cx="66" cy="39" r="4" fill="#d59b25"/>
          <circle cx="78" cy="58" r="6" fill="#d59b25"/>
          <circle cx="52" cy="62" r="4" fill="#d59b25"/>
          <path d="M35 33c16-8 36-7 50 1" fill="none" stroke="#fff2a8" stroke-width="5" stroke-linecap="round"/>
        </svg>
      `;
    }

    function forceArrowSvg() {
      return `
        <svg viewBox="0 0 60 20" aria-hidden="true">
          <path d="M4 10h42" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
          <path d="M42 2l14 8-14 8z" fill="currentColor"/>
        </svg>
      `;
    }

    function scoreStarSvg() {
      const points = starPoints.map((point) => point.join(",")).join(" ");
      return `
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <polygon points="${points}" fill="#ffd35a"/>
          <polygon points="${points}" fill="none" stroke="#fff4b8" stroke-width="1"/>
        </svg>
      `;
    }

    buildStars();
    replayBtn.addEventListener("click", startGame);
    startGame();
  </script>
</body>
</html>
