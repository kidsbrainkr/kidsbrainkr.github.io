<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade">
  <title>이야기 순서 맞추기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --space: #0a0118;
      --panel: rgba(30, 18, 70, 0.9);
      --panel-soft: rgba(46, 30, 96, 0.72);
      --line: rgba(142, 236, 255, 0.55);
      --text: #ffffff;
      --muted: #cfc8ff;
      --gold: #ffd45d;
      --pink: #ff72c8;
      --blue: #72d8ff;
      --green: #78f0aa;
      --red: #ff5d7a;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      overflow: hidden;
      font-family: "Nunito", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      color: var(--text);
      background: var(--space);
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    button,
    a {
      font: inherit;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-width: 800px;
      min-height: 600px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 18%, rgba(106, 45, 190, 0.26), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(18, 136, 210, 0.2), transparent 24%),
        radial-gradient(circle at 52% 92%, rgba(255, 105, 180, 0.14), transparent 34%),
        #0a0118;
    }

    .stars {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      background: #ffffff;
      box-shadow:
        0 0 8px rgba(255, 255, 255, 0.9),
        0 0 18px rgba(135, 220, 255, 0.45);
      opacity: 0.35;
      animation: twinkle var(--speed) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    @keyframes twinkle {
      0% {
        opacity: 0.24;
        transform: scale(0.72);
      }

      48% {
        opacity: 1;
        transform: scale(1.32);
      }

      100% {
        opacity: 0.28;
        transform: scale(0.78);
      }
    }

    .hud-link,
    .hud-progress {
      position: fixed;
      top: 22px;
      z-index: 30;
      height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      color: #ffffff;
      background: rgba(18, 9, 45, 0.78);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(8px);
    }

    .hud-link {
      left: 24px;
      padding: 0 18px;
      text-decoration: none;
      font-size: 18px;
      font-weight: 900;
      transition:
        transform 160ms ease,
        border-color 160ms ease,
        background 160ms ease;
    }

    .hud-link:hover {
      transform: translateY(-2px);
      border-color: rgba(114, 216, 255, 0.8);
      background: rgba(36, 20, 80, 0.88);
    }

    .hud-progress {
      right: 24px;
      min-width: 82px;
      padding: 0 16px;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .game-area {
      position: relative;
      width: 800px;
      height: 600px;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(22, 12, 58, 0.92), rgba(7, 4, 24, 0.94)),
        #13072c;
      box-shadow: var(--shadow);
    }

    .moon {
      position: absolute;
      top: 38px;
      right: 68px;
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: #f7f2ba;
      box-shadow:
        0 0 22px rgba(247, 242, 186, 0.54),
        0 0 70px rgba(247, 242, 186, 0.22);
      opacity: 0.92;
    }

    .moon::after {
      content: "";
      position: absolute;
      top: 5px;
      left: 20px;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #13072c;
    }

    .nebula {
      position: absolute;
      inset: auto auto 32px -84px;
      width: 370px;
      height: 190px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 114, 200, 0.18), transparent 64%);
      filter: blur(2px);
      animation: drift 7s ease-in-out infinite alternate;
    }

    @keyframes drift {
      from {
        transform: translateX(0) translateY(0);
      }

      to {
        transform: translateX(34px) translateY(-16px);
      }
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      padding: 34px 34px 28px;
    }

    .screen.active {
      display: block;
      animation: screenIn 420ms ease both;
    }

    @keyframes screenIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .title-zone {
      position: relative;
      z-index: 2;
      width: 560px;
      margin: 38px auto 0;
      text-align: center;
    }

    .game-title {
      font-size: 48px;
      line-height: 1.08;
      font-weight: 900;
      color: #ffffff;
      text-shadow:
        0 0 18px rgba(114, 216, 255, 0.55),
        0 6px 16px rgba(0, 0, 0, 0.38);
    }

    .game-subtitle {
      width: 480px;
      margin: 16px auto 0;
      color: var(--muted);
      font-size: 22px;
      line-height: 1.36;
      font-weight: 800;
    }

    .start-orbit {
      position: relative;
      width: 210px;
      height: 150px;
      margin: 36px auto 30px;
    }

    .planet-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      animation: floatPlanet 2.7s ease-in-out infinite;
    }

    @keyframes floatPlanet {
      0%,
      100% {
        transform: translateY(0) rotate(-2deg);
      }

      50% {
        transform: translateY(-10px) rotate(2deg);
      }
    }

    .primary-button,
    .ghost-button,
    .check-button {
      border: 0;
      border-radius: 8px;
      color: #10102a;
      cursor: pointer;
      font-weight: 900;
      text-decoration: none;
      transition:
        transform 160ms ease,
        filter 160ms ease,
        box-shadow 160ms ease;
    }

    .primary-button {
      min-width: 184px;
      height: 58px;
      padding: 0 28px;
      font-size: 23px;
      background: linear-gradient(135deg, #ffe07a, #ff93d9 58%, #81e8ff);
      box-shadow:
        0 12px 30px rgba(255, 114, 200, 0.32),
        inset 0 2px 0 rgba(255, 255, 255, 0.58);
    }

    .ghost-button {
      height: 54px;
      padding: 0 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      border: 2px solid rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.08);
    }

    .check-button {
      position: absolute;
      right: 38px;
      bottom: 32px;
      z-index: 12;
      width: 150px;
      height: 54px;
      font-size: 21px;
      background: linear-gradient(135deg, #76f0aa, #72d8ff);
      box-shadow: 0 12px 30px rgba(114, 216, 255, 0.25);
    }

    .primary-button:hover,
    .ghost-button:hover,
    .check-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .primary-button:active,
    .ghost-button:active,
    .check-button:active {
      transform: translateY(1px) scale(0.98);
    }

    .round-heading {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      height: 72px;
    }

    .round-kicker {
      color: var(--blue);
      font-size: 17px;
      font-weight: 900;
      text-shadow: 0 0 14px rgba(114, 216, 255, 0.46);
    }

    .round-title {
      margin-top: 3px;
      font-size: 34px;
      line-height: 1.04;
      font-weight: 900;
    }

    .hint-pill {
      min-width: 230px;
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      border-radius: 8px;
      border: 2px solid rgba(255, 255, 255, 0.16);
      color: #ffffff;
      background: rgba(255, 255, 255, 0.08);
      font-size: 17px;
      font-weight: 900;
      text-align: center;
      box-shadow: inset 0 0 20px rgba(114, 216, 255, 0.08);
    }

    .story-stage {
      position: absolute;
      left: 35px;
      top: 130px;
      width: 730px;
      height: 260px;
      border-radius: 8px;
      border: 2px solid rgba(255, 255, 255, 0.14);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03)),
        rgba(10, 1, 24, 0.42);
      overflow: hidden;
    }

    .stage-title {
      position: absolute;
      top: 16px;
      left: 22px;
      z-index: 2;
      color: rgba(255, 255, 255, 0.74);
      font-size: 16px;
      font-weight: 900;
    }

    .story-line-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .story-line {
      stroke: rgba(114, 216, 255, 0.12);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 9 14;
      fill: none;
      transition:
        stroke 260ms ease,
        filter 260ms ease;
    }

    .story-line.on {
      stroke: rgba(120, 240, 170, 0.95);
      filter: drop-shadow(0 0 10px rgba(120, 240, 170, 0.88));
      animation: dashMove 620ms linear infinite;
    }

    @keyframes dashMove {
      to {
        stroke-dashoffset: -46;
      }
    }

    .mini-card-row {
      position: absolute;
      left: 28px;
      right: 28px;
      top: 62px;
      z-index: 2;
      height: 170px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .mini-card {
      width: 150px;
      height: 156px;
      display: grid;
      grid-template-rows: 108px 1fr;
      align-items: center;
      justify-items: center;
      border-radius: 8px;
      border: 2px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.07);
      opacity: 0;
      transform: translateY(22px) scale(0.92);
      transition:
        opacity 300ms ease,
        transform 300ms ease,
        border-color 300ms ease,
        box-shadow 300ms ease;
    }

    .mini-card.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .mini-card.playing {
      border-color: rgba(255, 212, 93, 0.96);
      box-shadow:
        0 0 0 4px rgba(255, 212, 93, 0.12),
        0 0 26px rgba(255, 212, 93, 0.48);
      animation: miniPulse 680ms ease-in-out infinite alternate;
    }

    @keyframes miniPulse {
      from {
        transform: translateY(0) scale(1);
      }

      to {
        transform: translateY(-5px) scale(1.03);
      }
    }

    .mini-card svg {
      width: 104px;
      height: 96px;
    }

    .mini-card span {
      color: #ffffff;
      font-size: 17px;
      font-weight: 900;
    }

    .slot-zone {
      position: absolute;
      left: 34px;
      right: 34px;
      bottom: 98px;
      z-index: 8;
      height: 132px;
      display: grid;
      gap: 12px;
    }

    .slot-zone.count-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .slot-zone.count-4 {
      grid-template-columns: repeat(4, 1fr);
    }

    .slot {
      position: relative;
      border: 2px dashed rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03)),
        rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 0 28px rgba(0, 0, 0, 0.28);
      transition:
        border-color 160ms ease,
        background 160ms ease,
        transform 160ms ease;
    }

    .slot::before {
      content: attr(data-step);
      position: absolute;
      top: 8px;
      left: 10px;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.82);
      background: rgba(255, 255, 255, 0.12);
      font-size: 15px;
      font-weight: 900;
    }

    .slot.over {
      border-color: rgba(114, 216, 255, 0.9);
      background: rgba(114, 216, 255, 0.12);
      transform: translateY(-3px);
    }

    .order-card {
      position: absolute;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: 82px 1fr;
      align-items: center;
      justify-items: center;
      padding: 10px 8px 9px;
      border: 2px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      color: #ffffff;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.08)),
        rgba(42, 25, 92, 0.95);
      box-shadow:
        0 10px 28px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.28);
      cursor: grab;
      transition:
        box-shadow 180ms ease,
        border-color 180ms ease,
        transform 180ms ease;
      touch-action: none;
    }

    .order-card svg {
      width: 90px;
      height: 78px;
      pointer-events: none;
      filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.25));
    }

    .order-card .label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 31px;
      padding: 0 4px;
      color: #ffffff;
      font-size: 17px;
      line-height: 1.14;
      font-weight: 900;
      text-align: center;
      word-break: keep-all;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.34);
    }

    .order-card.dragging {
      z-index: 50;
      cursor: grabbing;
      border-color: rgba(255, 212, 93, 0.9);
      box-shadow:
        0 18px 36px rgba(0, 0, 0, 0.38),
        0 0 24px rgba(255, 212, 93, 0.4);
      transform: scale(1.04) rotate(1.5deg);
    }

    .order-card.correct-flare {
      border-color: rgba(120, 240, 170, 1);
      box-shadow:
        0 0 0 4px rgba(120, 240, 170, 0.16),
        0 0 26px rgba(120, 240, 170, 0.65);
    }

    .narration {
      position: absolute;
      left: 36px;
      right: 206px;
      bottom: 30px;
      z-index: 11;
      min-height: 56px;
      display: flex;
      align-items: center;
      padding: 10px 18px;
      border: 2px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      color: #ffffff;
      background: rgba(18, 9, 45, 0.72);
      font-size: 20px;
      line-height: 1.24;
      font-weight: 900;
      opacity: 0;
      transform: translateY(12px);
      transition:
        opacity 260ms ease,
        transform 260ms ease,
        border-color 260ms ease;
    }

    .narration.show {
      opacity: 1;
      transform: translateY(0);
      border-color: rgba(114, 216, 255, 0.48);
    }

    .wrong-flash {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      background: rgba(255, 93, 122, 0);
    }

    .wrong-flash.on {
      animation: flashRed 520ms ease;
    }

    @keyframes flashRed {
      0% {
        background: rgba(255, 93, 122, 0);
      }

      32% {
        background: rgba(255, 93, 122, 0.25);
      }

      100% {
        background: rgba(255, 93, 122, 0);
      }
    }

    .shake {
      animation: shake 440ms cubic-bezier(.36, .07, .19, .97);
    }

    @keyframes shake {
      0%,
      100% {
        transform: translateX(0);
      }

      18% {
        transform: translateX(-9px);
      }

      36% {
        transform: translateX(8px);
      }

      54% {
        transform: translateX(-6px);
      }

      72% {
        transform: translateX(5px);
      }
    }

    .particle-layer {
      position: fixed;
      inset: 0;
      z-index: 90;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: var(--p-size);
      height: var(--p-size);
      border-radius: 50%;
      background: var(--p-color);
      box-shadow: 0 0 12px var(--p-color);
      animation: particleBurst 900ms ease-out forwards;
    }

    @keyframes particleBurst {
      from {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }

      to {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(0.2);
      }
    }

    .result-wrap {
      position: relative;
      z-index: 3;
      width: 560px;
      margin: 70px auto 0;
      text-align: center;
    }

    .result-title {
      font-size: 46px;
      line-height: 1.1;
      font-weight: 900;
      text-shadow: 0 0 20px rgba(255, 212, 93, 0.42);
    }

    .score-stars {
      width: 324px;
      height: 86px;
      margin: 28px auto 18px;
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .score-star {
      width: 86px;
      height: 86px;
      filter: drop-shadow(0 0 14px rgba(255, 212, 93, 0.58));
      opacity: 0;
      transform: scale(0.25) rotate(-18deg);
      animation: starPop 560ms ease forwards;
    }

    .score-star:nth-child(2) {
      animation-delay: 160ms;
    }

    .score-star:nth-child(3) {
      animation-delay: 320ms;
    }

    @keyframes starPop {
      70% {
        opacity: 1;
        transform: scale(1.14) rotate(8deg);
      }

      100% {
        opacity: 1;
        transform: scale(1) rotate(0);
      }
    }

    .score-text {
      color: var(--muted);
      font-size: 24px;
      font-weight: 900;
    }

    .result-actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 34px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="stars" id="stars" aria-hidden="true"></div>
    <a class="hud-link" href="../../index.html">← 홈</a>
    <div class="hud-progress" id="roundProgress">1/5</div>
    <main class="game-area" id="gameArea" aria-label="이야기 순서 맞추기 게임">
      <div class="moon" aria-hidden="true"></div>
      <div class="nebula" aria-hidden="true"></div>
      <section class="screen active" id="startScreen">
        <div class="title-zone">
          <h1 class="game-title">이야기 순서 맞추기</h1>
          <p class="game-subtitle">그림 카드를 끌어서 처음부터 끝까지 차례대로 놓아요</p>
          <div class="start-orbit" aria-hidden="true">
            <svg class="planet-svg" viewBox="0 0 210 150" role="img">
              <ellipse cx="105" cy="82" rx="82" ry="20" fill="none" stroke="#72d8ff" stroke-width="8" opacity="0.8" transform="rotate(-12 105 82)"/>
              <circle cx="105" cy="75" r="48" fill="#7d59ff"/>
              <path d="M63 74c22 22 60 30 93 16a48 48 0 0 1-92 15c-3-9-4-20-1-31z" fill="#ff72c8" opacity="0.78"/>
              <circle cx="88" cy="58" r="8" fill="#ffd45d"/>
              <circle cx="121" cy="91" r="7" fill="#72d8ff"/>
              <circle cx="123" cy="55" r="5" fill="#ffffff" opacity="0.88"/>
            </svg>
          </div>
          <button class="primary-button" id="startButton" type="button">시작하기</button>
        </div>
      </section>
      <section class="screen" id="gameScreen">
        <div class="round-heading">
          <div>
            <div class="round-kicker" id="roundKicker">첫 번째 이야기</div>
            <h2 class="round-title" id="roundTitle">아침에 일어나기</h2>
          </div>
          <div class="hint-pill" id="hintText">카드를 끌어서 순서를 바꿔요</div>
        </div>
        <div class="story-stage" id="storyStage">
          <div class="stage-title">이야기 보기</div>
          <svg class="story-line-layer" id="lineLayer" viewBox="0 0 730 260" aria-hidden="true"></svg>
          <div class="mini-card-row" id="miniCards"></div>
        </div>
        <div class="slot-zone" id="slotZone"></div>
        <div class="narration" id="narration">순서대로 놓고 확인해요</div>
        <button class="check-button" id="checkButton" type="button">확인</button>
        <div class="wrong-flash" id="wrongFlash"></div>
      </section>
      <section class="screen" id="resultScreen">
        <div class="result-wrap">
          <h2 class="result-title">모든 이야기를 완성했어요</h2>
          <div class="score-stars" aria-label="별 세 개">
            <svg class="score-star" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 7l12 28 30 3-23 20 7 30-26-16-26 16 7-30L8 38l30-3z" fill="#ffd45d" stroke="#fff2b0" stroke-width="4"/></svg>
            <svg class="score-star" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 7l12 28 30 3-23 20 7 30-26-16-26 16 7-30L8 38l30-3z" fill="#ffd45d" stroke="#fff2b0" stroke-width="4"/></svg>

    function switchScreen(target) {
      [startScreen, gameScreen, resultScreen].forEach((screen) => screen.classList.remove("active"));
      target.classList.add("active");
    }

    function startGame() {
      state.roundIndex = 0;
      state.completed = 0;
      switchScreen(gameScreen);
      loadRound();
    }

    function loadRound() {
      const story = storySets[state.roundIndex];
      const cards = story.cards;
      state.locked = false;
      state.drag = null;
      state.order = makeWrongShuffle(cards.map((card) => card.id));

      roundProgress.textContent = `${state.roundIndex + 1}/5`;
      roundKicker.textContent = story.kicker;
      roundTitle.textContent = story.title;
      hintText.textContent = "카드를 끌어서 순서를 바꿔요";
      narration.textContent = "순서대로 놓고 확인해요";
      narration.classList.add("show");

      renderMiniCards(story);
      renderLines(cards.length);
      renderSlots(story);
    }

    function makeWrongShuffle(ids) {
      const shuffled = [...ids];
      for (let i = shuffled.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }

      const isSame = shuffled.every((id, index) => id === ids[index]);
      if (isSame) {
        [shuffled[0], shuffled[1]] = [shuffled[1], shuffled[0]];
      }

      return shuffled;
    }

    function renderMiniCards(story) {
      miniCards.innerHTML = story.cards.map((card) => {
        return `<div class="mini-card" data-mini="${card.id}">${svgArt(card.art)}<span>${card.label}</span></div>`;
      }).join("");
    }

    function renderLines(count) {
      const points = count === 3
        ? [[205, 148], [365, 148], [525, 148]]
        : [[125, 148], [285, 148], [445, 148], [605, 148]];

      lineLayer.innerHTML = points.slice(0, -1).map((point, index) => {
        const next = points[index + 1];
        return `<path class="story-line" data-line="${index}" d="M ${point[0]} ${point[1]} C ${point[0] + 48} ${point[1] - 34}, ${next[0] - 48} ${next[1] - 34}, ${next[0]} ${next[1]}"></path>`;
      }).join("");
    }

    function renderSlots(story) {
      slotZone.className = `slot-zone count-${story.cards.length}`;
      slotZone.innerHTML = "";

      state.order.forEach((cardId, index) => {
        const slot = document.createElement("div");
        slot.className = "slot";
        slot.dataset.slot = String(index);
        slot.dataset.step = String(index + 1);
        slotZone.appendChild(slot);

        const card = story.cards.find((item) => item.id === cardId);
        const cardEl = document.createElement("div");
        cardEl.className = "order-card";
        cardEl.dataset.card = card.id;
        cardEl.dataset.slot = String(index);
        cardEl.innerHTML = `${svgArt(card.art)}<div class="label">${card.label}</div>`;
        cardEl.addEventListener("pointerdown", onPointerDown);
        slot.appendChild(cardEl);
      });
    }

    function onPointerDown(event) {
      if (state.locked) {
        return;
      }

      const card = event.currentTarget;
      const originalSlot = Number(card.dataset.slot);
      const rect = card.getBoundingClientRect();
      const areaRect = gameArea.getBoundingClientRect();

      state.drag = {
        card,
        originalSlot,
        pointerId: event.pointerId,
        offsetX: event.clientX - rect.left,
        offsetY: event.clientY - rect.top,
        areaLeft: areaRect.left,
        areaTop: areaRect.top
      };

      card.setPointerCapture(event.pointerId);
      card.classList.add("dragging");
      card.style.width = `${rect.width}px`;
      card.style.height = `${rect.height}px`;
      card.style.left = `${rect.left - areaRect.left}px`;
      card.style.top = `${rect.top - areaRect.top}px`;
      gameScreen.appendChild(card);

      moveDrag(event);
      window.addEventListener("pointermove", onPointerMove);
      window.addEventListener("pointerup", onPointerUp, { once: true });
    }

    function onPointerMove(event) {
      if (!state.drag || event.pointerId !== state.drag.pointerId) {
        return;
      }

      moveDrag(event);
      updateSlotHover(event.clientX, event.clientY);
    }

    function moveDrag(event) {
      const drag = state.drag;
      drag.card.style.left = `${event.clientX - drag.areaLeft - drag.offsetX}px`;
      drag.card.style.top = `${event.clientY - drag.areaTop - drag.offsetY}px`;
    }

    function updateSlotHover(clientX, clientY) {
      getSlots().forEach((slot) => slot.classList.remove("over"));
      const slot = findSlotAt(clientX, clientY);
      if (slot) {
        slot.classList.add("over");
      }
    }

    function onPointerUp(event) {
      if (!state.drag || event.pointerId !== state.drag.pointerId) {
        return;
      }

      window.removeEventListener("pointermove", onPointerMove);
      getSlots().forEach((slot) => slot.classList.remove("over"));

      const drag = state.drag;
      const targetSlotEl = findSlotAt(event.clientX, event.clientY);
      const targetSlot = targetSlotEl ? Number(targetSlotEl.dataset.slot) : drag.originalSlot;

      swapCards(drag.originalSlot, targetSlot);
      cleanupDrag();
      renderSlots(storySets[state.roundIndex]);
      hintText.textContent = "다 놓았으면 확인을 눌러요";
    }

    function cleanupDrag() {
      if (!state.drag) {
        return;
      }

      const card = state.drag.card;
      try {
        card.releasePointerCapture(state.drag.pointerId);
      } catch (error) {
        // 포인터가 이미 해제된 경우에는 새 슬롯 렌더링만 계속해요.
      }
      card.classList.remove("dragging");
      card.style.left = "";
      card.style.top = "";
      card.style.width = "";
      card.style.height = "";
      card.remove();
      state.drag = null;
    }

    function getSlots() {
      return Array.from(slotZone.querySelectorAll(".slot"));
    }

    function findSlotAt(clientX, clientY) {
      return getSlots().find((slot) => {
        const rect = slot.getBoundingClientRect();
        return clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom;
      });
    }

    function swapCards(fromIndex, toIndex) {
      if (fromIndex === toIndex) {
        return;
      }

      [state.order[fromIndex], state.order[toIndex]] = [state.order[toIndex], state.order[fromIndex]];
    }

    function checkOrder() {
      if (state.locked) {
        return;
      }

      const story = storySets[state.roundIndex];
      const correct = story.cards.every((card, index) => state.order[index] === card.id);

      if (correct) {
        handleCorrect(story);
      } else {
        handleWrong();
      }
    }

    function handleWrong() {
      hintText.textContent = "다시 생각해 볼까요?";
      wrongFlash.classList.remove("on");
      slotZone.classList.remove("shake");
      void wrongFlash.offsetWidth;
      wrongFlash.classList.add("on");
      slotZone.classList.add("shake");
      setTimeout(() => slotZone.classList.remove("shake"), 480);
    }

    function handleCorrect(story) {
      state.locked = true;
      hintText.textContent = "멋지게 이어졌어요";
      narration.textContent = "이야기가 차례대로 움직여요";
      createExplosion();

      getSlots().forEach((slot) => {
        const card = slot.querySelector(".order-card");
        if (card) {
          card.classList.add("correct-flare");
        }
      });

      playStory(story);
    }

    function playStory(story) {
      const minis = Array.from(miniCards.querySelectorAll(".mini-card"));
      const lines = Array.from(lineLayer.querySelectorAll(".story-line"));

      minis.forEach((mini, index) => {
        setTimeout(() => mini.classList.add("show"), index * 220);
      });

      story.cards.forEach((card, index) => {
        setTimeout(() => {
          minis.forEach((mini) => mini.classList.remove("playing"));
          minis[index].classList.add("playing");
          narration.textContent = card.narration;
          narration.classList.add("show");
          if (index > 0 && lines[index - 1]) {
            lines[index - 1].classList.add("on");
          }
        }, 680 + index * 1080);
      });

      const total = 1020 + story.cards.length * 1080;
      setTimeout(() => {
        state.completed += 1;
        if (state.roundIndex >= storySets.length - 1) {
          showResult();
        } else {
          state.roundIndex += 1;
          loadRound();
        }
      }, total);
    }

    function createExplosion() {
      const rect = gameArea.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const colors = ["#ffd45d", "#72d8ff", "#ff72c8", "#78f0aa", "#ffffff"];

      for (let i = 0; i < 54; i += 1) {
        const particle = document.createElement("span");
        const angle = (Math.PI * 2 * i) / 54;
        const distance = 70 + Math.random() * 170;
        const size = 5 + Math.random() * 8;
        particle.className = "particle";
        particle.style.left = `${centerX}px`;
        particle.style.top = `${centerY}px`;
        particle.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
        particle.style.setProperty("--dy", `${Math.sin(angle) * distance}px`);
        particle.style.setProperty("--p-size", `${size}px`);
        particle.style.setProperty("--p-color", colors[i % colors.length]);
        particleLayer.appendChild(particle);
        setTimeout(() => particle.remove(), 950);
      }
    }

    function showResult() {
      roundProgress.textContent = "5/5";
      scoreText.textContent = `${state.completed}개의 이야기 성공`;
      switchScreen(resultScreen);
      createExplosion();
    }

    $("#startButton").addEventListener("click", startGame);
    $("#replayButton").addEventListener("click", startGame);
    checkButton.addEventListener("click", checkOrder);

    makeStars();
  </script>
</body>
</html>
