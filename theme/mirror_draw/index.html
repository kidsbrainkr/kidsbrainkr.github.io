<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>거울 그림 찾기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0118;
      --panel: rgba(255, 255, 255, 0.07);
      --panel-strong: rgba(255, 255, 255, 0.12);
      --line: rgba(255, 255, 255, 0.18);
      --text: #fff8ff;
      --soft: rgba(255, 248, 255, 0.72);
      --dim: rgba(255, 248, 255, 0.48);
      --pink: #ff5fd2;
      --cyan: #5de8ff;
      --yellow: #ffe66d;
      --green: #52ffa8;
      --red: #ff4e72;
      --violet: #9d6bff;
      --deep: #15072c;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0118;
      color: var(--text);
      font-family: "Nunito", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    button,
    a {
      font: inherit;
    }

    .stars {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 105%, rgba(157, 107, 255, 0.28), transparent 42%),
        radial-gradient(circle at 12% 20%, rgba(93, 232, 255, 0.12), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(255, 95, 210, 0.12), transparent 30%),
        #0a0118;
    }

    .star {
      position: absolute;
      width: var(--size);
      height: var(--size);
      border-radius: 999px;
      background: #ffffff;
      opacity: 0.52;
      box-shadow: 0 0 10px currentColor;
      animation: twinkle var(--time) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    .star:nth-child(4n) {
      color: #ffe66d;
    }

    .star:nth-child(4n + 1) {
      color: #b9f7ff;
    }

    .star:nth-child(4n + 2) {
      color: #ffd2f2;
    }

    .star:nth-child(4n + 3) {
      color: #ffffff;
    }

    @keyframes twinkle {
      0% {
        transform: scale(0.7);
        opacity: 0.22;
      }
      45% {
        transform: scale(1.25);
        opacity: 0.95;
      }
      100% {
        transform: scale(0.82);
        opacity: 0.38;
      }
    }

    .game-area {
      position: relative;
      z-index: 1;
      width: 800px;
      height: 600px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.02)),
        radial-gradient(circle at 50% 0%, rgba(93, 232, 255, 0.11), transparent 38%),
        rgba(10, 1, 24, 0.92);
      box-shadow: var(--shadow), inset 0 0 80px rgba(157, 107, 255, 0.08);
    }

    .game-area::before {
      content: "";
      position: absolute;
      inset: 64px 18px 18px;
      border-radius: 22px;
      background:
        linear-gradient(90deg, rgba(93, 232, 255, 0.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(93, 232, 255, 0.06) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: radial-gradient(circle at center, black, transparent 76%);
      pointer-events: none;
      opacity: 0.34;
    }

    .hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 8;
      height: 66px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      pointer-events: none;
    }

    .home-btn,
    .small-home-btn,
    .replay-btn {
      border: 0;
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .home-btn {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 88px;
      height: 38px;
      padding: 0 15px;
      border-radius: 19px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      font-size: 16px;
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .home-btn:hover,
    .small-home-btn:hover,
    .replay-btn:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.28);
    }

    .hud-right {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 208px;
      justify-content: flex-end;
    }

    .heart-row {
      display: flex;
      gap: 6px;
      height: 28px;
      align-items: center;
    }

    .heart {
      width: 28px;
      height: 28px;
      filter: drop-shadow(0 0 8px rgba(255, 78, 114, 0.42));
      transform-origin: center;
      animation: heartBeat 1400ms ease-in-out infinite;
    }

    .heart:nth-child(2) {
      animation-delay: 150ms;
    }

    .heart:nth-child(3) {
      animation-delay: 300ms;
    }

    .heart.lost {
      opacity: 0.28;
      filter: grayscale(1);
      animation: none;
      transform: scale(0.86);
    }

    @keyframes heartBeat {
      0%,
      100% {
        transform: scale(1);
      }
      45% {
        transform: scale(1.1);
      }
    }

    .round-pill {
      min-width: 70px;
      height: 38px;
      display: grid;
      place-items: center;
      padding: 0 14px;
      border-radius: 19px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      font-size: 17px;
      font-weight: 900;
      color: var(--yellow);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .screen {
      position: absolute;
      inset: 66px 0 0;
      display: flex;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 320ms ease, transform 320ms ease;
    }

    .screen.hidden {
      opacity: 0;
      transform: translateY(18px);
      pointer-events: none;
    }

    .play-screen {
      padding: 16px 20px 20px;
      gap: 18px;
    }

    .left-zone {
      position: relative;
      width: 422px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 13px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      background:
        radial-gradient(circle at 50% 44%, rgba(93, 232, 255, 0.13), transparent 42%),
        rgba(255, 255, 255, 0.055);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .right-zone {
      width: 320px;
      display: grid;
      grid-template-rows: 44px 1fr;
      gap: 12px;
    }

    .question-title {
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-radius: 20px;
      background: rgba(157, 107, 255, 0.16);
      border: 1px solid rgba(157, 107, 255, 0.28);
      color: #f6edff;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .mirror-board {
      position: relative;
      width: 360px;
      height: 360px;
      display: grid;
      place-items: center;
      border-radius: 26px;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.12), transparent 48%),
        linear-gradient(135deg, rgba(93, 232, 255, 0.07), rgba(255, 95, 210, 0.07));
      border: 2px solid rgba(255, 255, 255, 0.14);
      box-shadow: inset 0 0 32px rgba(0, 0, 0, 0.22), 0 18px 40px rgba(0, 0, 0, 0.24);
    }

    .mirror-board::before {
      content: "";
      position: absolute;
      top: 26px;
      bottom: 26px;
      left: 50%;
      width: 4px;
      margin-left: -2px;
      border-radius: 2px;
      background: linear-gradient(180deg, transparent, var(--cyan), var(--pink), transparent);
      box-shadow: 0 0 18px rgba(93, 232, 255, 0.72);
      animation: axisPulse 1500ms ease-in-out infinite;
    }

    @keyframes axisPulse {
      0%,
      100% {
        opacity: 0.62;
        transform: scaleY(0.95);
      }
      50% {
        opacity: 1;
        transform: scaleY(1);
      }
    }

    .mirror-svg {
      position: relative;
      z-index: 2;
      width: 300px;
      height: 300px;
      overflow: visible;
      filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.25));
    }

    .left-half {
      transform-box: fill-box;
      transform-origin: center;
      animation: halfFloat 2300ms ease-in-out infinite;
    }

    @keyframes halfFloat {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-5px);
      }
    }

    .hidden-half {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
    }

    .mirror-board.join .left-half {
      animation: leftJoin 760ms cubic-bezier(0.2, 1, 0.2, 1) both;
    }

    .mirror-board.join .hidden-half {
      animation: rightJoin 760ms cubic-bezier(0.2, 1, 0.2, 1) both;
    }

    @keyframes leftJoin {
      0% {
        transform: translateX(-10px);
      }
      65%,
      100% {
        transform: translateX(0);
      }
    }

    @keyframes rightJoin {
      0% {
        opacity: 0;
        transform: translateX(26px) scaleX(0.96);
      }
      35% {
        opacity: 1;
      }
      100% {
        opacity: 0.96;
        transform: translateX(0) scaleX(1);
      }
    }

    .shine {
      position: absolute;
      z-index: 4;
      top: 50px;
      left: -90px;
      width: 72px;
      height: 260px;
      pointer-events: none;
      opacity: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.82), transparent);
      transform: rotate(16deg);
      filter: blur(1px);
    }

    .mirror-board.join .shine {
      animation: shineSweep 820ms ease-out 120ms both;
    }

    @keyframes shineSweep {
      0% {
        opacity: 0;
        left: -90px;
      }
      30% {
        opacity: 0.9;
      }
      100% {
        opacity: 0;
        left: 380px;
      }
    }

    .hint-text {
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border-radius: 17px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--soft);
      font-size: 16px;
      font-weight: 800;
      text-align: center;
    }

    .choice-title {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 22px;
      color: var(--text);
      font-size: 21px;
      font-weight: 900;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .choices {
      display: grid;
      grid-template-rows: repeat(3, 1fr);
      gap: 12px;
    }

    .choice-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      padding: 6px;
      overflow: hidden;
      border-radius: 22px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      background:
        radial-gradient(circle at 50% 45%, rgba(255, 255, 255, 0.08), transparent 58%),
        rgba(255, 255, 255, 0.065);
      color: var(--text);
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition:
        transform 180ms ease,
        border-color 180ms ease,
        background 180ms ease,
        box-shadow 180ms ease;
    }

    .choice-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.13), transparent);
      transform: translateX(-110%);
      transition: transform 300ms ease;
      pointer-events: none;
    }

    .choice-btn:hover,
    .choice-btn:focus-visible {
      outline: 0;
      transform: translateY(-3px) scale(1.01);
      border-color: rgba(93, 232, 255, 0.62);
      box-shadow: 0 12px 24px rgba(93, 232, 255, 0.13), inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    .choice-btn:hover::after,
    .choice-btn:focus-visible::after {
      transform: translateX(110%);
    }

    .choice-btn:disabled {
      cursor: default;
    }

    .choice-btn.correct {
      border-color: var(--green);
      background:
        radial-gradient(circle at 50% 45%, rgba(82, 255, 168, 0.2), transparent 58%),
        rgba(82, 255, 168, 0.11);
      box-shadow: 0 0 28px rgba(82, 255, 168, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.18);
      animation: correctPop 560ms ease both;
    }

    .choice-btn.wrong {
      border-color: var(--red);
      background:
        radial-gradient(circle at 50% 45%, rgba(255, 78, 114, 0.22), transparent 58%),
        rgba(255, 78, 114, 0.12);
      animation: wrongChoice 420ms ease both;
    }

    @keyframes correctPop {
      0% {
        transform: scale(1);
      }
      45% {
        transform: scale(1.055);
      }
      100% {
        transform: scale(1.02);
      }
    }

    @keyframes wrongChoice {
      0%,
      100% {
        transform: translateX(0);
      }
      20% {
        transform: translateX(-8px);
      }
      40% {
        transform: translateX(8px);
      }
      60% {
        transform: translateX(-6px);
      }
      80% {
        transform: translateX(6px);
      }
    }

    .choice-svg {
      width: 128px;
      height: 128px;
      overflow: visible;
      filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.28));
    }

    .answer-glow {
      opacity: 0;
      transform-origin: center;
    }

    .choice-btn.correct .answer-glow {
      animation: answerGlow 900ms ease both;
    }

    @keyframes answerGlow {
      0% {
        opacity: 0;
        transform: scale(0.76);
      }
      35% {
        opacity: 0.48;
      }
      100% {
        opacity: 0;
        transform: scale(1.2);
      }
    }

    .flash {
      position: absolute;
      inset: 0;
      z-index: 12;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(circle at center, rgba(255, 78, 114, 0.3), rgba(255, 78, 114, 0.06) 48%, transparent 70%);
    }

    .flash.show {
      animation: redFlash 430ms ease;
    }

    @keyframes redFlash {
      0% {
        opacity: 0;
      }
      35% {
        opacity: 1;
      }
      100% {
        opacity: 0;
      }
    }

    .shake {
      animation: boardShake 420ms ease;
    }

    @keyframes boardShake {
      0%,
      100% {
        transform: translateX(0);
      }
      18% {
        transform: translateX(-9px) rotate(-1deg);
      }
      36% {
        transform: translateX(9px) rotate(1deg);
      }
      54% {
        transform: translateX(-7px) rotate(-0.7deg);
      }
      72% {
        transform: translateX(7px) rotate(0.7deg);
      }
    }

    .round-enter {
      animation: roundEnter 440ms cubic-bezier(0.2, 1, 0.2, 1) both;
    }

    @keyframes roundEnter {
      0% {
        opacity: 0;
        transform: translateY(18px) scale(0.98);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .particle {
      position: absolute;
      z-index: 18;
      width: var(--p-size);
      height: var(--p-size);
      border-radius: 50%;
      background: var(--p-color);
      pointer-events: none;
      box-shadow: 0 0 14px var(--p-color);
      animation: particleFly var(--p-time) cubic-bezier(0.08, 0.72, 0.18, 1) forwards;
    }

    @keyframes particleFly {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      78% {
        opacity: 0.92;
      }
      100% {
        opacity: 0;
        transform: translate(var(--p-x), var(--p-y)) scale(0);
      }
    }

    .result-screen {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px;
      text-align: center;
      gap: 14px;
    }

    .result-card {
      position: relative;
      width: 560px;
      min-height: 390px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background:
        radial-gradient(circle at 50% 12%, rgba(255, 230, 109, 0.15), transparent 28%),
        radial-gradient(circle at 0% 70%, rgba(93, 232, 255, 0.15), transparent 32%),
        radial-gradient(circle at 100% 76%, rgba(255, 95, 210, 0.16), transparent 35%),
        rgba(255, 255, 255, 0.075);
      box-shadow: 0 22px 56px rgba(0, 0, 0, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.14);
      overflow: hidden;
    }

    .result-card::before {
      content: "";
      position: absolute;
      top: -90px;
      left: -130px;
      width: 220px;
      height: 620px;
      opacity: 0.32;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.7), transparent);
      transform: rotate(24deg);
      animation: resultShine 2600ms ease-in-out infinite;
    }

    @keyframes resultShine {
      0% {
        left: -170px;
      }
      46%,
      100% {
        left: 650px;
      }
    }

    .result-title {
      position: relative;
      z-index: 1;
      margin: 0;
      color: var(--text);
      font-size: 44px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: 0 0 20px rgba(157, 107, 255, 0.42);
    }

    .result-sub {
      position: relative;
      z-index: 1;
      margin: 0;
      color: var(--soft);
      font-size: 21px;
      font-weight: 800;
    }

    .score-line {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--yellow);
      font-size: 48px;
      font-weight: 900;
      text-shadow: 0 0 20px rgba(255, 230, 109, 0.35);
    }

    .result-stars {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 9px;
      min-height: 58px;
      align-items: center;
      justify-content: center;
    }

    .result-star {
      width: 50px;
      height: 50px;
      transform: scale(0) rotate(-30deg);
      opacity: 0;
      filter: drop-shadow(0 0 12px rgba(255, 230, 109, 0.6));
      animation: starPop 560ms cubic-bezier(0.16, 1.25, 0.3, 1) forwards;
      animation-delay: var(--star-delay);
    }

    @keyframes starPop {
      0% {
        opacity: 0;
        transform: scale(0) rotate(-30deg);
      }
      78% {
        opacity: 1;
        transform: scale(1.18) rotate(6deg);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotate(0);
      }
    }

    .result-actions {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 12px;
      margin-top: 6px;
    }

    .replay-btn,
    .small-home-btn {
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 24px;
      padding: 0 22px;
      font-size: 18px;
      font-weight: 900;
    }

    .replay-btn {
      border: 0;
      background: linear-gradient(135deg, #ff5fd2, #9d6bff 48%, #5de8ff);
      box-shadow: 0 12px 28px rgba(157, 107, 255, 0.34);
    }

    .small-home-btn {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
    }

    .icon {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
    }

    @media (max-width: 820px), (max-height: 620px) {
      .game-area {
        transform: scale(min(calc(100vw / 820), calc(100vh / 620)));
      }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars" aria-hidden="true"></div>

  <main class="game-area" id="gameArea">
    <header class="hud">
      <a class="home-btn" href="../../index.html" aria-label="홈으로 가기">
        <span>← 홈</span>
      </a>
      <div class="hud-right">
        <div class="heart-row" id="heartRow" aria-label="목숨"></div>
        <div class="round-pill" id="roundText">1/8</div>
      </div>
    </header>

    <section class="screen play-screen" id="playScreen" aria-label="거울 그림 게임">
      <div class="left-zone">
        <div class="question-title" id="roundTitle">왼쪽 그림을 잘 보세요</div>
        <div class="mirror-board" id="mirrorBoard">
          <div class="shine" aria-hidden="true"></div>
          <svg class="mirror-svg" id="questionSvg" viewBox="0 0 300 300" role="img" aria-label="왼쪽 반쪽 그림"></svg>
        </div>
        <div class="hint-text" id="hintText">오른쪽에 붙으면 어떤 모습일까요?</div>
      </div>

      <div class="right-zone">
        <div class="choice-title">정답을 골라요</div>
        <div class="choices" id="choices"></div>
      </div>
    </section>

    <section class="screen result-screen hidden" id="resultScreen" aria-label="결과">
      <div class="result-card">
        <h1 class="result-title" id="resultTitle">참 잘했어요</h1>

      const shape = item[0];
      const flip = (x) => mirrored ? 300 - x : x;
      if (shape === "circle") {
        const [, x, y, r, fill, stroke, sw] = item;
        return `<circle cx="${flip(x)}" cy="${y}" r="${r}" fill="${fill}" ${stroke ? `stroke="${stroke}" stroke-width="${sw || 2}"` : ""}/>`;
      }
      if (shape === "ellipse") {
        const [, x, y, rx, ry, fill, stroke, sw, rotate = 0] = item;
        const rot = mirrored ? -rotate : rotate;
        return `<ellipse cx="${flip(x)}" cy="${y}" rx="${rx}" ry="${ry}" fill="${fill}" ${stroke ? `stroke="${stroke}" stroke-width="${sw || 2}"` : ""} transform="rotate(${rot} ${flip(x)} ${y})"/>`;
      }
      if (shape === "rect") {
        const [, x, y, w, h, fill, stroke, sw, radius = 0] = item;
        const nx = mirrored ? 300 - x - w : x;
        return `<rect x="${nx}" y="${y}" width="${w}" height="${h}" rx="${radius}" fill="${fill}" ${stroke ? `stroke="${stroke}" stroke-width="${sw || 2}"` : ""}/>`;

      if (shape === "path") {

        if (!mirrored) {

        return `<path d="${d}" fill="${fill}" ${stroke ? `stroke="${stroke}" stroke-width="${sw || 2}" stroke-linecap="round" stroke-linejoin="round"` : ""} transform="translate(300 0) scale(-1 1)"/>`;

      if (shape === "arc") {
        const [, x, y, rx, ry, stroke, sw] = item;

      }
      return "";
    }

          ${drawItems(round.left, false)}
        </g>
        <g class="hidden-half" clip-path="url(#rightClip)" style="${reveal ? "opacity:0.96" : ""}">
          ${drawItems(round.left, true)}
        </g>`;
    }

    function choiceSvg(content) {
      return `
        <svg class="choice-svg" viewBox="0 0 300 300" aria-hidden="true">
          <line x1="150" y1="38" x2="150" y2="262" stroke="rgba(255,255,255,0.25)" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 9"/>
          ${content}
        </svg>`;
    }

    function shuffledChoices(round) {
      const list = [
        { correct: true, svg: fullCorrectSvg(round) },
        { correct: false, svg: fullWrongSvg(round, 0) },
        { correct: false, svg: fullWrongSvg(round, 1) }
      ];
      for (let i = list.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [list[i], list[j]] = [list[j], list[i]];
      }
      return list;
    }

    function renderRound() {
      locked = false;
      const round = rounds[currentRound];
      updateHud();
      roundTitle.textContent = round.title;
      hintText.textContent = round.hint;
      mirrorBoard.classList.remove("join", "shake");
      questionSvg.innerHTML = questionHalfSvg(round, false);
      choicesEl.innerHTML = "";

      shuffledChoices(round).forEach((choice, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice-btn";
        button.setAttribute("aria-label", `${index + 1}번 그림`);
        button.dataset.correct = choice.correct ? "true" : "false";
        button.innerHTML = choiceSvg(choice.svg);
        button.addEventListener("click", () => chooseAnswer(button));
        choicesEl.appendChild(button);
      });

      playScreen.classList.remove("round-enter");
      void playScreen.offsetWidth;
      playScreen.classList.add("round-enter");
    }

    function chooseAnswer(button) {
      if (locked) {
        return;
      }
      locked = true;
      const correct = button.dataset.correct === "true";
      const buttons = [...choicesEl.querySelectorAll(".choice-btn")];
      buttons.forEach((btn) => {
        btn.disabled = true;
        if (btn.dataset.correct === "true") {
          btn.classList.add("correct");
        }
      });

      if (correct) {
        score += 1;
        questionSvg.innerHTML = questionHalfSvg(rounds[currentRound], true);
        mirrorBoard.classList.add("join");
        makeParticles(400, 306, 34);
        window.setTimeout(nextRound, 1150);
      } else {
        button.classList.add("wrong");
        lives -= 1;
        updateHud();
        showWrongEffect();
        if (lives <= 0) {
          window.setTimeout(() => endGame(false), 950);
        } else {
          window.setTimeout(() => {
            buttons.forEach((btn) => {
              btn.disabled = false;
              btn.classList.remove("correct", "wrong");
            });
            locked = false;
          }, 760);
        }
      }
    }

    function showWrongEffect() {
      mirrorBoard.classList.remove("shake");
      flash.classList.remove("show");
      void mirrorBoard.offsetWidth;
      mirrorBoard.classList.add("shake");
      flash.classList.add("show");
    }

    function nextRound() {
      currentRound += 1;
      if (currentRound >= TOTAL_ROUNDS) {
        endGame(true);
        return;
      }
      renderRound();
    }

    function makeParticles(x, y, count) {
      const colors = ["#ffe66d", "#5de8ff", "#ff5fd2", "#52ffa8", "#ffffff", "#9d6bff"];
      for (let i = 0; i < count; i += 1) {
        const particle = document.createElement("span");
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.45;
        const distance = 62 + Math.random() * 120;
        const size = 5 + Math.random() * 8;
        particle.className = "particle";
        particle.style.left = `${x}px`;
        particle.style.top = `${y}px`;
        particle.style.setProperty("--p-size", `${size}px`);
        particle.style.setProperty("--p-color", colors[i % colors.length]);
        particle.style.setProperty("--p-x", `${Math.cos(angle) * distance}px`);
        particle.style.setProperty("--p-y", `${Math.sin(angle) * distance}px`);
        particle.style.setProperty("--p-time", `${620 + Math.random() * 520}ms`);
        gameArea.appendChild(particle);
        window.setTimeout(() => particle.remove(), 1250);
      }
    }

    function starResultSvg(delay) {
      return `
        <svg class="result-star" style="--star-delay:${delay}ms" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M32 5 39.8 22.7 59 24.7 44.6 37.5 48.7 56.3 32 46.6 15.3 56.3 19.4 37.5 5 24.7 24.2 22.7Z"
            fill="#ffe66d" stroke="#fff6b8" stroke-width="3" stroke-linejoin="round"/>
          <path d="M25 21 32 10 36 23" fill="none" stroke="rgba(255,255,255,0.62)" stroke-width="3" stroke-linecap="round"/>
        </svg>`;
    }

    function endGame(completed) {
      playScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");
      scoreLine.textContent = `${score}/${TOTAL_ROUNDS}`;
      const stars = score >= 7 ? 3 : score >= 5 ? 2 : score >= 2 ? 1 : 0;
      resultStars.innerHTML = "";
      for (let i = 0; i < stars; i += 1) {
        resultStars.insertAdjacentHTML("beforeend", starResultSvg(i * 150));
      }
      if (!completed && lives <= 0) {
        resultTitle.textContent = "다시 도전해요";
        resultSub.textContent = "천천히 보면 거울 짝을 찾을 수 있어요";
      } else if (score === TOTAL_ROUNDS) {
        resultTitle.textContent = "완벽해요";
        resultSub.textContent = "모든 거울 그림을 맞혔어요";
      } else {
        resultTitle.textContent = "참 잘했어요";
        resultSub.textContent = "끝까지 집중해서 살펴봤어요";
      }
      makeParticles(400, 280, 42);
    }

    function resetGame() {
      currentRound = 0;
      lives = MAX_LIVES;
      score = 0;
      locked = false;
      resultScreen.classList.add("hidden");
      playScreen.classList.remove("hidden");
      renderRound();
    }

    replayBtn.addEventListener("click", resetGame);

    makeStars();
    updateHud();
    renderRound();
  </script>
</body>
</html>
