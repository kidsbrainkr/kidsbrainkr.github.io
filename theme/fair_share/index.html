<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>공평하게 나눠요 — 쑥쑥 놀이터</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0118;
      --card: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.12);
      --purple: #a855f7;
      --pink: #ec4899;
      --green: #10b981;
      --amber: #f59e0b;
      --grad: linear-gradient(135deg, #10b981, #06b6d4);
      --text: #f0e8ff;
      --text-dim: rgba(240,232,255,0.55);
      --correct: #22c55e;
      --wrong: #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }
    .star {
      position: fixed; border-radius: 50%; background: #fff;
      animation: twinkle var(--dur,3s) ease-in-out infinite var(--delay,0s);
      pointer-events: none; z-index: 0;
    }
    @keyframes twinkle {
      0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.9;transform:scale(1.4)}
    }

    #game-wrap {
      position: relative;
      width: 800px; height: 600px;
      background: linear-gradient(160deg, #061a0e 0%, #0a0118 55%, #061a14 100%);
      border-radius: 28px;
      border: 1px solid rgba(16,185,129,0.2);
      box-shadow: 0 0 80px rgba(16,185,129,0.1), 0 24px 64px rgba(0,0,0,0.7);
      overflow: hidden;
      z-index: 1;
    }

    /* HUD */
    #hud {
      position: absolute; top: 16px; left: 20px; right: 20px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 20;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      color: var(--text-dim);
      font-family: inherit; font-size: 0.82rem; font-weight: 800;
      cursor: pointer; text-decoration: none;
      transition: background .2s, color .2s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.12); color: var(--text); }

    /* Round dots */
    #round-bar {
      display: flex; gap: 6px;
    }
    .rd-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      transition: background 0.3s;
    }
    .rd-dot.done { background: var(--green); }
    .rd-dot.active { background: var(--amber); box-shadow: 0 0 8px var(--amber); }

    /* Mission */
    #mission-panel {
      position: absolute;
      top: 60px; left: 50%; transform: translateX(-50%);
      text-align: center; z-index: 20; pointer-events: none;
      white-space: nowrap;
    }
    .mission-label {
      font-size: 0.72rem; font-weight: 700; color: var(--text-dim);
      letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 2px;
    }
    .mission-text {
      font-size: 1.45rem; font-weight: 900; color: #fff;
      text-shadow: 0 0 20px rgba(16,185,129,0.5);
    }

    /* Items area */
    #items-area {
      position: absolute;
      top: 108px; left: 30px; right: 30px;
      height: 140px;
      z-index: 15;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    /* Each draggable item */
    .drag-item {
      width: 56px; height: 56px;
      cursor: grab;
      position: absolute;
      z-index: 20;
      transition: filter 0.2s, transform 0.2s;
      touch-action: none;
    }
    .drag-item:hover { filter: brightness(1.2); }
    .drag-item.dragging {
      cursor: grabbing;
      z-index: 100;
      filter: drop-shadow(0 6px 16px rgba(16,185,129,0.5));
      transform: scale(1.15);
    }
    .drag-item.placed {
      cursor: default;
      pointer-events: none;
    }

    /* Plates area */
    #plates-area {
      position: absolute;
      bottom: 40px; left: 30px; right: 30px;
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      z-index: 15;
      gap: 16px;
    }

    .plate-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .friend-figure {
      width: 50px; height: 60px;
    }

    .plate {
      position: relative;
      width: 120px; height: 80px;
      z-index: 15;
    }
    .plate-svg { width: 100%; height: 100%; }
    .plate-highlight {
      outline: 3px solid var(--green);
      outline-offset: 4px;
      border-radius: 50%;
    }

    .plate-count {
      font-size: 0.8rem; font-weight: 900;
      color: var(--text-dim);
    }

    /* Hint bar */
    #hint-bar {
      position: absolute;
      top: 260px; left: 50%; transform: translateX(-50%);
      padding: 8px 20px;
      background: rgba(239,68,68,0.2);
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: 50px;
      font-size: 0.88rem; font-weight: 800;
      color: #fca5a5;
      z-index: 25;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
      pointer-events: none;
    }
    #hint-bar.show { opacity: 1; }

    /* Flash + shake */
    #flash {
      position: absolute; inset: 0; border-radius: 28px;
      pointer-events: none; z-index: 30; opacity: 0;
      transition: opacity 0.12s;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-10px)}40%{transform:translateX(10px)}
      60%{transform:translateX(-8px)}80%{transform:translateX(6px)}
    }
    .shake { animation: shake 0.4s ease; }

    /* Particle canvas */
    #particle-canvas {
      position: absolute; inset: 0; pointer-events: none; z-index: 25;
    }

    /* Result screen */
    #result-screen {
      position: absolute; inset: 0;
      background: rgba(10,1,24,0.93); border-radius: 28px;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 50; gap: 18px;
    }
    #result-screen.show { display: flex; }
    .result-title {
      font-size: 2.4rem; font-weight: 900;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-stars { display: flex; gap: 12px; }
    .result-star { width: 52px; height: 52px; }
    .result-score { font-size: 1.1rem; font-weight: 700; color: var(--text-dim); }
    .result-btns { display: flex; gap: 14px; margin-top: 8px; }
    .res-btn {
      padding: 14px 28px; border-radius: 50px;
      font-family: inherit; font-size: 1rem; font-weight: 900;
      cursor: pointer; border: none; transition: transform .15s;
    }
    .res-btn:hover { transform: translateY(-3px); }
    .res-btn.primary { background: var(--grad); color: #fff; }
    .res-btn.secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15); color: var(--text);
    }

    /* Bounce animation */
    @keyframes itemBounce {
      0%{transform:translateY(0) scale(1)}
      30%{transform:translateY(-18px) scale(1.2)}
      60%{transform:translateY(-8px) scale(1.05)}
      100%{transform:translateY(0) scale(1)}
    }
    .item-bounce { animation: itemBounce 0.5s cubic-bezier(0.34,1.56,0.64,1); }

    /* Snap animation */
    @keyframes snapIn {
      0%{transform:scale(1.3)}
      60%{transform:scale(0.9)}
      100%{transform:scale(1)}
    }
    .snap-in { animation: snapIn 0.25s ease; }
  </style>
</head>
<body>
<div id="stars-container"></div>

<div id="game-wrap">
  <div id="hud">
    <a class="btn-back" href="../../index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="14" height="14">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      홈
    </a>
    <div id="round-bar"></div>
  </div>

  <div id="mission-panel">
    <div class="mission-label">미션</div>
    <div class="mission-text" id="mission-text">사과 6개를 2명에게 나눠주세요!</div>
  </div>

  <!-- Items placed absolutely inside game-wrap -->
  <div id="items-area"></div>

  <!-- Hint -->
  <div id="hint-bar"></div>

  <!-- Plates -->
  <div id="plates-area"></div>

  <div id="flash"></div>
  <canvas id="particle-canvas"></canvas>

  <div id="result-screen">
    <div class="result-title" id="result-title">공평 챔피언!</div>
    <div class="result-stars" id="result-stars"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-btns">
      <button class="res-btn secondary" onclick="goHome()">홈으로</button>
      <button class="res-btn primary" onclick="restartGame()">다시하기</button>
    </div>
  </div>
</div>

<script>
// Stars
(function(){
  const c=document.getElementById('stars-container');
  for(let i=0;i<55;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*2.5+0.8;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;--dur:${2+Math.random()*4}s;--delay:${Math.random()*4}s;`;
    c.appendChild(s);
  }
})();

const ROUNDS = [
  { item: 'apple', label: '사과', count: 6, friends: 2 },
  { item: 'cookie', label: '쿠키', count: 9, friends: 3 },
  { item: 'candy', label: '사탕', count: 8, friends: 4 },
  { item: 'pencil', label: '연필', count: 10, friends: 5 },
  { item: 'strawberry', label: '딸기', count: 12, friends: 3 },
  { item: 'sticker', label: '스티커', count: 6, friends: 3 },
];

const FRIEND_COLORS = ['#f472b6','#60a5fa','#34d399','#fbbf24','#c084fc'];

// SVG item shapes
function makeItemSVG(type, size) {
  const s = size;
  const svgs = {
    apple: `<svg viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
      <path d="M${s*0.5} ${s*0.25} Q${s*0.5} ${s*0.08} ${s*0.62} ${s*0.1}" stroke="#22c55e" stroke-width="2" fill="none"/>
      <ellipse cx="${s*0.5}" cy="${s*0.6}" rx="${s*0.38}" ry="${s*0.35}" fill="#f87171"/>
      <ellipse cx="${s*0.38}" cy="${s*0.55}" rx="${s*0.1}" ry="${s*0.14}" fill="rgba(255,255,255,0.3)"/>
    </svg>`,
    cookie: `<svg viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
      <circle cx="${s*0.5}" cy="${s*0.5}" r="${s*0.38}" fill="#fbbf24"/>
      <circle cx="${s*0.35}" cy="${s*0.38}" r="${s*0.07}" fill="#92400e"/>
      <circle cx="${s*0.6}" cy="${s*0.45}" r="${s*0.06}" fill="#92400e"/>
      <circle cx="${s*0.42}" cy="${s*0.62}" r="${s*0.07}" fill="#92400e"/>
      <circle cx="${s*0.62}" cy="${s*0.62}" r="${s*0.05}" fill="#92400e"/>
    </svg>`,
    candy: `<svg viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
      <circle cx="${s*0.5}" cy="${s*0.44}" r="${s*0.34}" fill="#f472b6"/>
      <circle cx="${s*0.5}" cy="${s*0.44}" r="${s*0.24}" fill="#fda4af"/>
      <rect x="${s*0.46}" y="${s*0.72}" width="${s*0.08}" height="${s*0.2}" rx="${s*0.04}" fill="#f472b6"/>
      <rect x="${s*0.3}" y="${s*0.88}" width="${s*0.4}" height="${s*0.07}" rx="${s*0.035}" fill="#f472b6"/>
    </svg>`,
    pencil: `<svg viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
      <rect x="${s*0.38}" y="${s*0.1}" width="${s*0.24}" height="${s*0.7}" rx="${s*0.04}" fill="#fbbf24"/>
      <polygon points="${s*0.38},${s*0.78} ${s*0.62},${s*0.78} ${s*0.5},${s*0.94}" fill="#fde68a"/>
      <polygon points="${s*0.44},${s*0.85} ${s*0.56},${s*0.85} ${s*0.5},${s*0.94}" fill="#1e293b"/>
      <rect x="${s*0.38}" y="${s*0.1}" width="${s*0.24}" height="${s*0.1}" rx="${s*0.04}" fill="#f43f5e"/>
    </svg>`,
    strawberry: `<svg viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
      <path d="M${s*0.5} ${s*0.88} Q${s*0.18} ${s*0.6} ${s*0.22} ${s*0.38} Q${s*0.28} ${s*0.16} ${s*0.5} ${s*0.22} Q${s*0.72} ${s*0.16} ${s*0.78} ${s*0.38} Q${s*0.82} ${s*0.6} ${s*0.5} ${s*0.88}" fill="#f43f5e"/>
      <path d="M${s*0.4} ${s*0.15} Q${s*0.5} ${s*0.05} ${s*0.6} ${s*0.15}" stroke="#22c55e" stroke-width="2.5" fill="none"/>
      <circle cx="${s*0.38}" cy="${s*0.45}" r="${s*0.04}" fill="rgba(255,255,255,0.6)"/>
      <circle cx="${s*0.55}" cy="${s*0.55}" r="${s*0.04}" fill="rgba(255,255,255,0.6)"/>
      <circle cx="${s*0.45}" cy="${s*0.65}" r="${s*0.035}" fill="rgba(255,255,255,0.6)"/>
    </svg>`,
    sticker: `<svg viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
      <polygon points="${s*0.5},${s*0.08} ${s*0.61},${s*0.36} ${s*0.92},${s*0.38} ${s*0.68},${s*0.58} ${s*0.77},${s*0.89} ${s*0.5},${s*0.72} ${s*0.23},${s*0.89} ${s*0.32},${s*0.58} ${s*0.08},${s*0.38} ${s*0.39},${s*0.36}" fill="#c084fc"/>
      <polygon points="${s*0.5},${s*0.2} ${s*0.57},${s*0.4} ${s*0.78},${s*0.42} ${s*0.63},${s*0.55} ${s*0.69},${s*0.76} ${s*0.5},${s*0.64} ${s*0.31},${s*0.76} ${s*0.37},${s*0.55} ${s*0.22},${s*0.42} ${s*0.43},${s*0.4}" fill="#ddd6fe"/>
    </svg>`,
  };
  return svgs[type] || svgs.apple;
}

function makeFriendSVG(color) {
  return `<svg viewBox="0 0 50 60" xmlns="http://www.w3.org/2000/svg">
    <circle cx="25" cy="20" r="13" fill="${color}"/>
    <circle cx="21" cy="17" r="2.5" fill="#1e293b"/>
    <circle cx="29" cy="17" r="2.5" fill="#1e293b"/>
    <path d="M20 24 Q25 29 30 24" stroke="#1e293b" stroke-width="2" fill="none"/>
    <rect x="12" y="33" width="26" height="22" rx="6" fill="${color}" opacity="0.75"/>
    <line x1="12" y1="38" x2="3" y2="50" stroke="${color}" stroke-width="6" stroke-linecap="round"/>
    <line x1="38" y1="38" x2="47" y2="50" stroke="${color}" stroke-width="6" stroke-linecap="round"/>
    <line x1="18" y1="55" x2="18" y2="60" stroke="${color}" stroke-width="6" stroke-linecap="round"/>
    <line x1="32" y1="55" x2="32" y2="60" stroke="${color}" stroke-width="6" stroke-linecap="round"/>
  </svg>`;
}

// Plate SVG
function makePlateSVG(isHighlight) {
  return `<svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="60" cy="58" rx="56" ry="14" fill="rgba(0,0,0,0.25)"/>
    <ellipse cx="60" cy="50" rx="54" ry="22" fill="#d1d5db" opacity="0.15"/>
    <ellipse cx="60" cy="46" rx="50" ry="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <ellipse cx="60" cy="44" rx="36" ry="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  </svg>`;
}

// Game state
let currentRound = 0;
let score = 0;
let correctCount = 0;
let plateCounts = [];
let itemElements = [];
let plateRects = [];
let dragging = null;
let dragOffX = 0, dragOffY = 0;
let dragOriginX = 0, dragOriginY = 0;
const TOTAL_ROUNDS = ROUNDS.length;

// Particles
const pCanvas = document.getElementById('particle-canvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];
pCanvas.width = 800; pCanvas.height = 600;

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 5;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      life:1, decay:0.02+Math.random()*0.02, size:4+Math.random()*7, color });
  }
}
function animateParticles() {
  pCtx.clearRect(0,0,800,600);
  particles = particles.filter(p=>p.life>0);
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.vx*=0.97; p.life-=p.decay;
    pCtx.save(); pCtx.globalAlpha=Math.max(0,p.life); pCtx.fillStyle=p.color;
    pCtx.beginPath(); pCtx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); pCtx.fill(); pCtx.restore();
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

function updateRoundDots() {
  const bar = document.getElementById('round-bar');
  bar.innerHTML = '';
  for (let i = 0; i < TOTAL_ROUNDS; i++) {
    const dot = document.createElement('div');
    dot.className = 'rd-dot';
    if (i < currentRound) dot.classList.add('done');
    else if (i === currentRound) dot.classList.add('active');
    bar.appendChild(dot);
  }
}

function buildRound() {
  const round = ROUNDS[currentRound];
  plateCounts = new Array(round.friends).fill(0);
  itemElements = [];
  document.getElementById('mission-text').textContent =
    `${round.label} ${round.count}개를 ${round.friends}명에게 나눠주세요!`;

  // Build items area
  const itemsArea = document.getElementById('items-area');
  itemsArea.innerHTML = '';
  const wrap = document.getElementById('game-wrap');
  const wrapRect = wrap.getBoundingClientRect();

  // Layout items in grid-ish pattern in top area
  const cols = Math.min(round.count, 8);
  const startX = 400 - (cols * 40) / 2;
  const startY = 125;
  const spacing = Math.min(40, (740 / cols));

  for (let i = 0; i < round.count; i++) {
    const row = Math.floor(i / cols);
    const col = i % cols;
    const x = startX + col * spacing;
    const y = startY + row * 52;

    const div = document.createElement('div');
    div.className = 'drag-item';
    div.innerHTML = makeItemSVG(round.item, 52);
    div.style.left = `${x}px`;
    div.style.top = `${y}px`;
    div.dataset.index = i;
    div.dataset.plateIndex = -1;

    div.addEventListener('mousedown', onDragStart);
    div.addEventListener('touchstart', onTouchStart, { passive: false });

    wrap.appendChild(div);
    itemElements.push({ el: div, plateIndex: -1, origX: x, origY: y });
  }

  // Build plates
  buildPlates(round.friends);
  updateRoundDots();
}

function buildPlates(friendCount) {
  const area = document.getElementById('plates-area');
  area.innerHTML = '';
  plateRects = [];

  for (let i = 0; i < friendCount; i++) {
    const container = document.createElement('div');
    container.className = 'plate-container';

    // Friend figure
    const fig = document.createElement('div');
    fig.className = 'friend-figure';
    fig.innerHTML = makeFriendSVG(FRIEND_COLORS[i % FRIEND_COLORS.length]);
    container.appendChild(fig);

    // Plate
    const plate = document.createElement('div');
    plate.className = 'plate';
    plate.dataset.plateIndex = i;
    plate.innerHTML = makePlateSVG(false);

    const countLabel = document.createElement('div');
    countLabel.className = 'plate-count';
    countLabel.id = `plate-count-${i}`;
    countLabel.textContent = '0개';

    container.appendChild(plate);
    container.appendChild(countLabel);
    area.appendChild(container);
  }
}

// Get plate rects after render
function updatePlateRects() {
  const wrap = document.getElementById('game-wrap');
  const wrapRect = wrap.getBoundingClientRect();
  const plates = document.querySelectorAll('.plate');
  plateRects = [];
  plates.forEach(p => {
    const r = p.getBoundingClientRect();
    plateRects.push({
      x: r.left - wrapRect.left,
      y: r.top - wrapRect.top,
      w: r.width,
      h: r.height,
      el: p,
    });
  });
}

// Drag logic
function onDragStart(e) {
  e.preventDefault();
  const el = e.currentTarget;
  if (el.dataset.plateIndex >= 0) return; // already placed
  startDrag(el, e.clientX, e.clientY);
}
function onTouchStart(e) {
  e.preventDefault();
  const el = e.currentTarget;
  if (el.dataset.plateIndex >= 0) return;
  const touch = e.touches[0];
  startDrag(el, touch.clientX, touch.clientY);
}

function startDrag(el, cx, cy) {
  updatePlateRects();
  const wrap = document.getElementById('game-wrap');
  const wrapRect = wrap.getBoundingClientRect();
  const elRect = el.getBoundingClientRect();
  dragOffX = cx - elRect.left - elRect.width / 2;
  dragOffY = cy - elRect.top - elRect.height / 2;
  dragging = el;
  el.classList.add('dragging');

  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
  document.addEventListener('touchmove', onTouchMove, { passive: false });
  document.addEventListener('touchend', onTouchEnd);
}

function onDragMove(e) {
  moveDrag(e.clientX, e.clientY);
}
function onTouchMove(e) {
  e.preventDefault();
  moveDrag(e.touches[0].clientX, e.touches[0].clientY);
}

function moveDrag(cx, cy) {
  if (!dragging) return;
  const wrap = document.getElementById('game-wrap');
  const wrapRect = wrap.getBoundingClientRect();
  const x = cx - wrapRect.left - 28 - dragOffX;
  const y = cy - wrapRect.top - 28 - dragOffY;
  dragging.style.left = `${x}px`;
  dragging.style.top = `${y}px`;

  // Highlight nearest plate
  const nx = cx - wrapRect.left;
  const ny = cy - wrapRect.top;
  plateRects.forEach((pr, i) => {
    const inside = nx > pr.x && nx < pr.x+pr.w && ny > pr.y && ny < pr.y+pr.h;
    pr.el.style.filter = inside ? 'brightness(1.4)' : '';
  });
}

function onDragEnd(e) { endDrag(e.clientX, e.clientY); }
function onTouchEnd(e) {
  if (e.changedTouches.length > 0) {
    endDrag(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  }
}

function endDrag(cx, cy) {
  if (!dragging) return;
  const wrap = document.getElementById('game-wrap');
  const wrapRect = wrap.getBoundingClientRect();
  const nx = cx - wrapRect.left;
  const ny = cy - wrapRect.top;

  dragging.classList.remove('dragging');

  // Check which plate
  let droppedPlate = -1;
  plateRects.forEach((pr, i) => {
    const inside = nx > pr.x && nx < pr.x+pr.w && ny > pr.y && ny < pr.y+pr.h;
    if (inside) droppedPlate = i;
    pr.el.style.filter = '';
  });

  const idx = parseInt(dragging.dataset.index);

  if (droppedPlate >= 0) {
    // Place on plate
    const pr = plateRects[droppedPlate];
    const round = ROUNDS[currentRound];
    const perPlate = round.count / round.friends;
    // Count how many already on this plate
    const alreadyOnPlate = itemElements.filter(it => it.el.dataset.plateIndex == droppedPlate).length;
    if (alreadyOnPlate >= Math.ceil(perPlate) + 1) {
      // Too many — snap back
      dragging.style.left = `${itemElements[idx].origX}px`;
      dragging.style.top = `${itemElements[idx].origY}px`;
      dragging = null;
      removeDragListeners();
      return;
    }

    // Snap to plate position (arrange on plate)
    const countOnPlate = alreadyOnPlate;
    const offsetX = (countOnPlate % 3) * 22 - 22;
    const offsetY = Math.floor(countOnPlate / 3) * 22;
    const snapX = pr.x + pr.w / 2 + offsetX - 26;
    const snapY = pr.y + pr.h / 2 + offsetY - 22;

    dragging.style.left = `${snapX}px`;
    dragging.style.top = `${snapY}px`;
    dragging.style.zIndex = 18;
    dragging.dataset.plateIndex = droppedPlate;
    dragging.classList.add('placed', 'snap-in');
    setTimeout(() => dragging && dragging.classList.remove('snap-in'), 300);

    itemElements[idx].plateIndex = droppedPlate;
    plateCounts[droppedPlate]++;
    document.getElementById(`plate-count-${droppedPlate}`).textContent = `${plateCounts[droppedPlate]}개`;

    // Check if all placed
    const totalPlaced = itemElements.filter(it => it.plateIndex >= 0).length;
    if (totalPlaced === round.count) {
      setTimeout(() => checkAnswer(), 400);
    }
  } else {
    // Return to origin
    dragging.style.left = `${itemElements[idx].origX}px`;
    dragging.style.top = `${itemElements[idx].origY}px`;
  }

  dragging = null;
  removeDragListeners();
}

function removeDragListeners() {
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);
  document.removeEventListener('touchmove', onTouchMove);
  document.removeEventListener('touchend', onTouchEnd);
}

function checkAnswer() {
  const round = ROUNDS[currentRound];
  const expected = round.count / round.friends;
  const isCorrect = plateCounts.every(c => c === expected);

  if (isCorrect) {
    correctCount++;
    score += 15;
    // Bounce all items
    itemElements.forEach((it, i) => {
      setTimeout(() => {
        it.el.classList.add('item-bounce');
        const pr = plateRects[it.plateIndex] || { x: 400, y: 300 };
        spawnParticles(pr.x + 60, pr.y + 40, '#22c55e', 10);
        setTimeout(() => it.el.classList.remove('item-bounce'), 600);
      }, i * 60);
    });

    const flash = document.getElementById('flash');
    flash.style.background = 'rgba(34,197,94,0.18)';
    flash.style.opacity = '1';
    setTimeout(() => { flash.style.opacity = '0'; }, 500);

    setTimeout(() => nextRound(), 1800);
  } else {
    // Find unequal plates
    const maxC = Math.max(...plateCounts);
    const maxIdx = plateCounts.indexOf(maxC);
    const hint = document.getElementById('hint-bar');
    hint.textContent = `${maxIdx + 1}번 접시에 너무 많아요!`;
    hint.classList.add('show');

    const wrap = document.getElementById('game-wrap');
    wrap.classList.add('shake');
    const flash = document.getElementById('flash');
    flash.style.background = 'rgba(239,68,68,0.25)';
    flash.style.opacity = '1';
    setTimeout(() => {
      flash.style.opacity = '0';
      wrap.classList.remove('shake');
    }, 400);

    // Return all items to origin
    setTimeout(() => {
      hint.classList.remove('show');
      plateCounts = new Array(round.friends).fill(0);
      itemElements.forEach((it, i) => {
        it.el.dataset.plateIndex = -1;
        it.plateIndex = -1;
        it.el.classList.remove('placed');
        it.el.style.left = `${it.origX}px`;
        it.el.style.top = `${it.origY}px`;
        it.el.style.zIndex = 20;
        it.el.style.pointerEvents = '';
      });
      for (let i = 0; i < round.friends; i++) {
        const lbl = document.getElementById(`plate-count-${i}`);
        if (lbl) lbl.textContent = '0개';
        plateCounts[i] = 0;
      }
    }, 1200);
  }
}

function nextRound() {
  // Remove placed items from game-wrap
  itemElements.forEach(it => it.el.remove());
  currentRound++;
  if (currentRound >= TOTAL_ROUNDS) { showResult(); return; }
  buildRound();
  setTimeout(updatePlateRects, 100);
}

function showResult() {
  itemElements.forEach(it => it.el.remove());
  const stars = Math.round((correctCount / TOTAL_ROUNDS) * 3);
  document.getElementById('result-title').textContent =
    stars === 3 ? '공평 챔피언!' : stars === 2 ? '잘했어요!' : '다시 해봐요!';
  document.getElementById('result-score').textContent =
    `${correctCount}/${TOTAL_ROUNDS} 라운드 성공`;
  renderStars(stars);
  document.getElementById('result-screen').classList.add('show');
}

function renderStars(count) {
  const c = document.getElementById('result-stars');
  c.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 24 24');
    svg.classList.add('result-star');
    const pts = [];
    for(let j=0;j<10;j++){
      const r=j%2===0?11:5;
      const a=(j*Math.PI/5)-Math.PI/2;
      pts.push(`${12+r*Math.cos(a)},${12+r*Math.sin(a)}`);
    }
    const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points',pts.join(' '));
    poly.setAttribute('fill',i<count?'#fbbf24':'rgba(255,255,255,0.1)');
    poly.setAttribute('stroke',i<count?'#f59e0b':'rgba(255,255,255,0.15)');
    poly.setAttribute('stroke-width','1');
    svg.appendChild(poly);
    c.appendChild(svg);
  }
}

function restartGame() {
  itemElements.forEach(it => it.el.remove());
  currentRound = 0; score = 0; correctCount = 0;
  particles = [];
  document.getElementById('result-screen').classList.remove('show');
  buildRound();
  setTimeout(updatePlateRects, 100);
}
function goHome() { window.location.href = '../../index.html'; }

// Init
buildRound();
setTimeout(updatePlateRects, 100);
</script>
