<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>로봇 점프 — 쑥쑥 놀이터</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0118;
      --purple: #a855f7;
      --cyan: #06b6d4;
      --pink: #ec4899;
      --green: #22c55e;
      --text: #f0e8ff;
      --text-dim: rgba(240,232,255,0.55);
      --grad: linear-gradient(135deg, #a855f7, #06b6d4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }
    .star {
      position: fixed; border-radius: 50%; background: #fff;
      animation: twinkle var(--dur,3s) ease-in-out infinite var(--delay,0s);
      pointer-events: none; z-index: 0;
    }
    @keyframes twinkle {
      0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.9;transform:scale(1.4)}
    }

    /* Game container: phone portrait ratio */
    #game-wrap {
      position: relative;
      width: 360px;
      height: 640px;
      overflow: hidden;
      border-radius: 24px;
      border: 2px solid rgba(168,85,247,0.3);
      box-shadow: 0 0 60px rgba(168,85,247,0.2), 0 24px 64px rgba(0,0,0,0.8);
      background: #050010;
      z-index: 1;
      touch-action: none;
    }

    canvas#game-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
    }

    /* HUD overlay (HTML) */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 14px 16px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      z-index: 30;
      pointer-events: none;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      color: var(--text-dim);
      font-family: inherit; font-size: 0.78rem; font-weight: 800;
      cursor: pointer; text-decoration: none;
      pointer-events: all;
    }
    .btn-back:hover { background: rgba(255,255,255,0.1); }

    .hud-right {
      display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
    }
    .height-display {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(168,85,247,0.3);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 0.88rem; font-weight: 900;
      color: var(--text);
    }
    .record-display {
      padding: 4px 12px;
      font-size: 0.7rem; font-weight: 800;
      color: var(--text-dim);
    }

    /* Charge gauge (right side) */
    #charge-gauge {
      position: absolute;
      right: 14px; top: 50%; transform: translateY(-50%);
      width: 14px;
      height: 180px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      overflow: hidden;
      z-index: 30;
    }
    #charge-fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 0%;
      border-radius: 50px;
      background: linear-gradient(to top, #a855f7, #06b6d4);
      transition: none;
    }

    /* Start / Result screens */
    #result-screen, #gameover-screen {
      position: absolute; inset: 0;
      background: rgba(5,0,16,0.92);
      border-radius: 24px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 50; gap: 16px;
    }
    #start-screen {
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 220px;
      background: linear-gradient(to top, rgba(5,0,16,0.9) 60%, transparent);
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 28px;
      z-index: 50; gap: 10px;
    }
    #result-screen, #gameover-screen { display: none; }
    .screen-title {
      font-size: 2rem; font-weight: 900;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }
    .screen-sub {
      font-size: 0.88rem; font-weight: 700;
      color: var(--text-dim);
      text-align: center; max-width: 260px; line-height: 1.5;
    }
    .screen-stat {
      font-size: 1.3rem; font-weight: 900; color: var(--text);
      background: rgba(168,85,247,0.15);
      border: 1px solid rgba(168,85,247,0.3);
      border-radius: 16px;
      padding: 12px 28px;
      text-align: center;
    }
    .btn-start {
      padding: 14px 36px;
      border-radius: 50px;
      background: var(--grad);
      border: none;
      color: #fff;
      font-family: inherit; font-size: 1rem; font-weight: 900;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(168,85,247,0.4);
      transition: transform .15s;
    }
    .btn-start:hover { transform: translateY(-3px); }

    .btn-row { display: flex; gap: 12px; }
    .btn-sec {
      padding: 12px 24px;
      border-radius: 50px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text);
      font-family: inherit; font-size: 0.9rem; font-weight: 900;
      cursor: pointer; transition: transform .15s;
    }
    .btn-sec:hover { transform: translateY(-2px); }

    /* Robot instruction visual */
    .how-to {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 0.8rem; font-weight: 700;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
<div id="stars-container"></div>

<div id="game-wrap" id="game-wrap">
  <canvas id="game-canvas" width="360" height="640"></canvas>

  <!-- HUD -->
  <div id="hud">
    <a class="btn-back" href="../../index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="12" height="12">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      홈
    </a>
    <div class="hud-right">
      <div class="height-display" id="height-display">1층</div>
      <div class="record-display" id="record-display">최고: 0층</div>
    </div>
  </div>

  <!-- Charge gauge -->
  <div id="charge-gauge">
    <div id="charge-fill"></div>
  </div>

  <!-- Start screen -->
  <div id="start-screen">
    <div class="screen-title">로봇 점프!</div>
    <button class="btn-start" onclick="startGame()">시작!</button>
  </div>

  <!-- Game over screen -->
  <div id="gameover-screen">
    <div class="screen-title">아이쿠!</div>
    <div class="screen-stat" id="final-height">0 m 도달</div>
    <div class="screen-stat" id="record-stat">최고 기록: 0 m</div>
    <div class="btn-row">
      <button class="btn-sec" onclick="goHome()">홈</button>
      <button class="btn-start" onclick="startGame()">다시하기</button>
    </div>
  </div>
</div>

<script>
// Stars
(function(){
  const c=document.getElementById('stars-container');
  for(let i=0;i<55;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*2.5+0.8;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;--dur:${2+Math.random()*4}s;--delay:${Math.random()*4}s;`;
    c.appendChild(s);
  }
})();

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const W = 360, H = 640;

// Game constants
const AUTO_VX = 0.85;
const GRAVITY = 0.50;
const CAMERA_SCROLL_SPEED = 0.35; // pixels per frame downward push
const MAX_CHARGE_TIME = 1200; // ms
const MAX_JUMP_VY = -25;
const MIN_JUMP_VY = -9;
const MAX_FALL_VY = 24; // 낙하 속도 상한 (자연스러운 포물선 유지)
const ROBOT_W = 36, ROBOT_H = 44;
const PLATFORM_H = 12;
const FLOOR_HEIGHT = 200; // 200px 올라갈 때마다 1층

// Platform types
const PT = {
  NORMAL:    { id: 'normal',     color: '#64748b', label: '' },
  MOVING:    { id: 'moving',     color: '#3b82f6', label: '→' },
  CRUMBLE:   { id: 'crumble',   color: '#f97316', label: '!' },
  CONVEYOR:  { id: 'conveyor',  color: '#eab308', label: '↔' },
  SPRING:    { id: 'spring',    color: '#22c55e', label: '↑↑' },
};

// State
let gameState = 'idle'; // idle | playing | dead
let robot, platforms, cameraY, score, chargeStart, charging, frameId;
let walkFrame = 0;
let particles = [];
let bestScore = parseInt(localStorage.getItem('rj_best') || '0');
let bgStars = [];
let floorNum = 1;

// Init background stars
(function initBgStars() {
  for (let i = 0; i < 40; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * H * 3,
      r: Math.random() * 1.5 + 0.5,
      op: Math.random() * 0.6 + 0.2,
    });
  }
})();

function createRobot() {
  return {
    x: W / 2 - ROBOT_W / 2,
    y: H - 60 - ROBOT_H,
    vx: AUTO_VX,
    vy: 0,
    onGround: true,
    squish: 1, // for charge animation
    facing: 1, // 1 = right, -1 = left
    batteryPct: 1,
    trailPts: [],
  };
}

// 발판의 월드 y → 추정 층 (FLOOR_HEIGHT 기준, 게임 내 floorNum과 일관)
function floorOfY(y) {
  return Math.max(1, Math.floor((H - 60 - y) / FLOOR_HEIGHT) + 1);
}

// 층(1~)에 따른 난이도 파라미터 — 초기·동적 생성 공통 사용
function diffParams(floorEst) {
  const d = Math.min(Math.max(floorEst, 1), 10);
  const gap = 34 + d * 3.4 + Math.random() * 20;
  const w   = Math.max(70, 156 - d * 6) + Math.random() * 26;
  let type;
  if (d <= 3) {
    // 1~2층: 거의 일반블록 (입문 난이도)
    type = Math.random() < 0.93 ? PT.NORMAL : PT.MOVING;
  } else {
    const normalThresh = Math.max(0.14, 0.64 - d * 0.035);
    const r = Math.random();
    if (r < normalThresh) type = PT.NORMAL;
    else if (r < normalThresh + 0.25) type = PT.MOVING;
    else if (r < normalThresh + 0.45) type = PT.CRUMBLE;
    else if (r < normalThresh + 0.60) type = PT.CONVEYOR;
    else if (r < normalThresh + 0.70) type = PT.SPRING;
    else type = PT.NORMAL;
  }
  return { gap, w, type };
}

function createPlatforms() {
  const plats = [];
  // Full-width ground floor
  plats.push({ x: 0, y: H - 60, w: W, h: 60, type: PT.NORMAL, moveDir: 1, crumbleTimer: 0, crumbled: false, isGround: true });

  // Generate platforms going upward (층 기반 난이도 곡선 적용)
  let lastY = H - 60;
  for (let i = 0; i < 80; i++) {
    const { gap, w, type } = diffParams(floorOfY(lastY));
    const y = lastY - gap;
    const x = 20 + Math.random() * (W - 40 - w);
    lastY = y;
    plats.push({ x, y, w, h: PLATFORM_H, type, moveDir: 1, moveRange: 60 + Math.random() * 60,
      origX: x, crumbleTimer: 0, crumbled: false });
  }
  return plats;
}

function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('gameover-screen').style.display = 'none';
  gameState = 'playing';
  robot = createRobot();
  platforms = createPlatforms();
  // 로봇이 화면 하단에 위치 (맨땅이 거의 안 보이게)
  cameraY = robot.y - H + ROBOT_H + 20;
  score = 0;
  chargeStart = 0;
  charging = false;
  particles = [];
  updateRecordDisplay();
}

function stopGame() {
  gameState = 'dead';
  const f = floorNum;
  if (f > bestScore) {
    bestScore = f;
    localStorage.setItem('rj_best', bestScore);
  }
  document.getElementById('final-height').textContent = `${f}층 도달`;
  document.getElementById('record-stat').textContent = `최고 기록: ${bestScore}층`;
  document.getElementById('gameover-screen').style.display = 'flex';
}

function updateRecordDisplay() {
  document.getElementById('record-display').textContent = `최고: ${bestScore}층`;
}

// Input handling
const wrap = document.getElementById('game-wrap');

wrap.addEventListener('mousedown', onPressStart);
wrap.addEventListener('touchstart', onTouchPressStart, { passive: false });
wrap.addEventListener('mouseup', onPressEnd);
wrap.addEventListener('touchend', onTouchPressEnd);

function onPressStart(e) {
  if (gameState !== 'playing') return;
  if (e.target.closest('.btn-back')) return;
  if (!robot.onGround) return;
  charging = true;
  chargeStart = performance.now();
}
function onTouchPressStart(e) {
  e.preventDefault();
  if (gameState !== 'playing') return;
  if (!robot.onGround) return;
  charging = true;
  chargeStart = performance.now();
}
function onPressEnd(e) {
  if (!charging) return;
  releaseJump();
}
function onTouchPressEnd(e) {
  if (!charging) return;
  releaseJump();
}

function releaseJump() {
  if (!charging) return;
  const held = performance.now() - chargeStart;
  const t = Math.min(held / MAX_CHARGE_TIME, 1);
  robot.vy = MIN_JUMP_VY + (MAX_JUMP_VY - MIN_JUMP_VY) * t;
  robot.vy -= 2; // extra kick
  robot.onGround = false;
  robot.squish = 1;
  charging = false;
  document.getElementById('charge-fill').style.height = '0%';

  // Trail burst
  for (let i = 0; i < 8; i++) {
    particles.push({
      x: robot.x + ROBOT_W / 2,
      y: robot.y + ROBOT_H,
      vx: (Math.random() - 0.5) * 4,
      vy: 2 + Math.random() * 3,
      life: 1, decay: 0.04, size: 4 + Math.random() * 4,
      color: ['#a855f7','#06b6d4','#ec4899'][Math.floor(Math.random()*3)],
    });
  }
}

// Main loop
let lastTime = 0;
function loop(ts = 0) {
  const dt = Math.min(ts - lastTime, 33);
  lastTime = ts;
  try {
    update(dt);
    render();
  } catch (e) {
    console.error('loop error (skipped):', e);
  }
  // 예외가 나도 루프는 절대 멈추지 않음 (게임 프리즈 방지)
  frameId = requestAnimationFrame(loop);
}

function update(dt) {
  if (gameState === 'dead') return;

  // Frame-rate normalization (60fps 기준 — 고주사율에서 동일 속도)
  const k = Math.min(dt / 16.667, 2.5);

  // Auto movement (공중에선 수평 드리프트 줄여 발판 놓침 방지)
  robot.vx = robot.facing * AUTO_VX * (robot.onGround ? 1 : 0.4);

  // Walk animation frame
  // 걷기 애니메이션: 실제 이동거리에 비례 (프레임 보정)
  if (robot.onGround) walkFrame += Math.abs(robot.vx) * k * 1.7;

  // Charge visual (playing only)
  if (gameState === 'playing') {
    if (charging && robot.onGround) {
      const held = performance.now() - chargeStart;
      const t = Math.min(held / MAX_CHARGE_TIME, 1);
      document.getElementById('charge-fill').style.height = `${t * 100}%`;
      robot.squish = 1 - t * 0.35;
      robot.batteryPct = t;
    } else {
      robot.batteryPct = 0;
    }
  }

  // Physics (프레임 정규화 + 낙하 속도 상한)
  robot.vy += GRAVITY * k;
  if (robot.vy > MAX_FALL_VY) robot.vy = MAX_FALL_VY;
  robot.x += robot.vx * k;
  const stepDY = robot.vy * k;
  robot.y += stepDY;

  // Boundary (walls) — reverse direction on hit
  if (robot.x <= 0) { robot.x = 0; robot.facing = 1; }
  if (robot.x + ROBOT_W >= W) { robot.x = W - ROBOT_W; robot.facing = -1; }

  // Camera scroll (playing only)
  if (gameState === 'playing') {
    const screenY = robot.y - cameraY;
    if (robot.vy <= 0 && screenY < H * 0.45) {
      // 올라갈 때만 위로 스냅. 떨어질 땐 카메라 고정 →
      // 로봇이 화면 아래로 떨어지는 게 끝까지 보임 (Doodle Jump 방식)
      cameraY = robot.y - H * 0.45;
    }
  }

  // Trail
  robot.trailPts.push({ x: robot.x + ROBOT_W/2, y: robot.y + ROBOT_H/2 });
  if (robot.trailPts.length > 12) robot.trailPts.shift();

  // Platform collision
  robot.onGround = false;
  platforms.forEach(p => {
    if (p.crumbled) return;

    // Update platform
    if (p.type === PT.MOVING) {
      p.x += p.moveDir * 1.4 * k;
      if (p.x < 10 || p.x + p.w > W - 10) p.moveDir *= -1;
    }
    if (p.type === PT.CRUMBLE && p.crumbleTimer > 0) {
      p.crumbleTimer -= dt;
      if (p.crumbleTimer <= 0) p.crumbled = true;
    }

    // Check landing
    const prevY = robot.y - stepDY;
    const wasAbove = prevY + ROBOT_H <= p.y + (p.crumbled ? 0 : 2);
    const nowOverlap = robot.x + ROBOT_W > p.x - 8 && robot.x < p.x + p.w + 8 &&
      robot.y + ROBOT_H >= p.y && robot.y + ROBOT_H <= p.y + PLATFORM_H + 22;

    if (robot.vy >= 0 && wasAbove && nowOverlap) {
      robot.y = p.y - ROBOT_H;
      robot.onGround = true;

      if (p.type === PT.SPRING) {
        robot.vy = MAX_JUMP_VY * 1.1;
        spawnPlatformParticles(p, '#22c55e');
      } else {
        robot.vy = 0;
        if (p.type === PT.CRUMBLE && p.crumbleTimer === 0) {
          p.crumbleTimer = 1200;
        }
        if (p.type === PT.CONVEYOR) {
          robot.vx += p.moveDir * 2.5;
          p.moveDir = Math.sign(p.x - W/2) || 1;
        }
      }
    }
  });

  // Generate more platforms if needed
  const topPlatY = Math.min(...platforms.filter(p=>!p.crumbled).map(p=>p.y));
  if (topPlatY > cameraY - 200) {
    let y = topPlatY;
    for (let i = 0; i < 5; i++) {
      const { gap, w, type } = diffParams(floorOfY(y));
      y -= gap;
      const x = 20 + Math.random() * (W - 40 - w);
      platforms.push({ x, y, w, h: PLATFORM_H, type, moveDir: 1, moveRange: 60 + Math.random() * 60,
        origX: x, crumbleTimer: 0, crumbled: false });
    }
  }

  // Remove far-below platforms
  platforms = platforms.filter(p => p.isGround || p.y < cameraY + H + 200);

  // Particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.12; p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);

  if (gameState === 'playing') {
    // Height display
    floorNum = Math.max(1, Math.floor(Math.abs(Math.min(0, cameraY)) / FLOOR_HEIGHT) + 1);
    document.getElementById('height-display').textContent = `${floorNum}층`;

    // Death check: robot falls below camera bottom
    if (robot.y - cameraY > H + ROBOT_H + 10) {
      stopGame();
    }
  }
}

function spawnPlatformParticles(p, color) {
  for (let i = 0; i < 10; i++) {
    particles.push({
      x: p.x + Math.random() * p.w, y: p.y - cameraY,
      vx: (Math.random()-0.5)*4, vy: -(Math.random()*4+2),
      life:1, decay:0.04, size:3+Math.random()*4, color,
    });
  }
}

function drawBackground(floor) {
  const themes = [
    null,
    ['#87CEEB','#98FB98'], // 1: 초원
    ['#87CEEB','#90EE90'], // 2: 초원
    ['#4a7c3f','#2d5a1b'], // 3: 숲
    ['#3d6b35','#1a4012'], // 4: 숲
    ['#8B7355','#696969'], // 5: 산
    ['#9E9E9E','#757575'], // 6: 산
    ['#B0C4DE','#E8F4FD'], // 7: 설산
    ['#C5DDF4','#FFFFFF'], // 8: 설산
    ['#87CEEB','#E0F7FF'], // 9: 구름
    ['#7EC8E3','#B8E6F0'], // 10: 구름
    ['#1a1a4e','#0d0d2b'], // 11: 우주진입
    ['#050010','#000000'], // 12+: 우주
  ];
  const idx = Math.min(floor, themes.length - 1);
  const [top, bot] = themes[idx] || themes[themes.length - 1];

  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, top);
  grd.addColorStop(1, bot);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  if (floor <= 2) {
    ctx.fillStyle = '#5cb85c';
    ctx.beginPath();
    ctx.ellipse(80, H + 10, 120, 50, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#4cae4c';
    ctx.beginPath();
    ctx.ellipse(280, H + 15, 100, 45, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (floor <= 4) {
    [[40, H - 30], [160, H - 20], [300, H - 35]].forEach(([tx, ty]) => {
      ctx.fillStyle = '#2d5a1b';
      ctx.beginPath();
      ctx.moveTo(tx, ty); ctx.lineTo(tx - 25, ty + 60); ctx.lineTo(tx + 25, ty + 60);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(tx, ty - 20); ctx.lineTo(tx - 18, ty + 20); ctx.lineTo(tx + 18, ty + 20);
      ctx.closePath(); ctx.fill();
    });
  } else if (floor <= 6) {
    ctx.fillStyle = '#757575';
    ctx.beginPath();
    ctx.moveTo(0, H); ctx.lineTo(100, H - 120); ctx.lineTo(200, H - 80);
    ctx.lineTo(310, H - 140); ctx.lineTo(W, H);
    ctx.closePath(); ctx.fill();
  } else if (floor <= 8) {
    ctx.fillStyle = '#9E9E9E';
    ctx.beginPath();
    ctx.moveTo(0, H); ctx.lineTo(90, H - 100); ctx.lineTo(180, H - 60);
    ctx.lineTo(280, H - 130); ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.moveTo(90, H - 100); ctx.lineTo(65, H - 70); ctx.lineTo(115, H - 70);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(280, H - 130); ctx.lineTo(255, H - 95); ctx.lineTo(305, H - 95);
    ctx.closePath(); ctx.fill();
  } else if (floor <= 10) {
    [[80, H * 0.7], [250, H * 0.5]].forEach(([cx, cy]) => {
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath();
      ctx.arc(cx, cy, 30, 0, Math.PI * 2); ctx.fill();
      ctx.arc(cx + 25, cy - 10, 22, 0, Math.PI * 2); ctx.fill();
      ctx.arc(cx - 25, cy - 5, 20, 0, Math.PI * 2); ctx.fill();
    });
  }
}

// Render
function render() {
  ctx.clearRect(0, 0, W, H);

  // Background
  drawBackground(floorNum);

  // BG stars (11층 이상에서만)
  if (floorNum >= 11) {
    bgStars.forEach(s => {
      const sy = ((s.y - cameraY * 0.2) % (H * 3) + H * 3) % (H * 3) - H;
      ctx.beginPath();
      ctx.arc(s.x, sy, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.op})`;
      ctx.fill();
    });
  }

  // Platforms
  platforms.forEach(p => {
    const sy = p.y - cameraY;
    if (sy < -20 || sy > H + 20) return;
    if (p.crumbled) return;

    const t = p.type;
    const alpha = p.type === PT.CRUMBLE && p.crumbleTimer > 0
      ? Math.min(1, p.crumbleTimer / 800)
      : 1;
    ctx.save();
    ctx.globalAlpha = alpha;

    if (p.isGround) {
      // Full ground: solid fill to bottom of screen
      const groundGrd = ctx.createLinearGradient(0, sy, 0, sy + p.h);
      groundGrd.addColorStop(0, '#1e1040');
      groundGrd.addColorStop(1, '#0a0118');
      ctx.fillStyle = groundGrd;
      ctx.fillRect(0, sy, W, H);
      // Top edge glow line
      ctx.strokeStyle = '#a855f7';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#a855f7';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.moveTo(0, sy); ctx.lineTo(W, sy);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();
      return;
    }

    // ── 일반 블록: 벽돌 패턴
    if (t === PT.NORMAL) {
      ctx.fillStyle = '#c8822a';
      ctx.strokeStyle = '#7a4f1a';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(p.x, sy, p.w, PLATFORM_H, 3); ctx.fill(); ctx.stroke();
      ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(p.x + 2, sy + PLATFORM_H / 2); ctx.lineTo(p.x + p.w - 2, sy + PLATFORM_H / 2); ctx.stroke();
      const brickW = 18;
      for (let bx = p.x + 4; bx < p.x + p.w - 4; bx += brickW) {
        ctx.beginPath(); ctx.moveTo(bx, sy + 2); ctx.lineTo(bx, sy + PLATFORM_H / 2); ctx.stroke();
      }
      for (let bx = p.x + 4 + brickW / 2; bx < p.x + p.w - 4; bx += brickW) {
        ctx.beginPath(); ctx.moveTo(bx, sy + PLATFORM_H / 2); ctx.lineTo(bx, sy + PLATFORM_H - 2); ctx.stroke();
      }
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath(); ctx.roundRect(p.x + 3, sy + 2, p.w - 6, 3, 1); ctx.fill();
    }
    // ── 이동 블록: 컨베이어 벨트
    else if (t === PT.MOVING) {
      ctx.fillStyle = '#1d4ed8';
      ctx.strokeStyle = '#1e3a8a';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(p.x, sy, p.w, PLATFORM_H, 3); ctx.fill(); ctx.stroke();
      const stripeOffset = (walkFrame * p.moveDir * 0.8) % 12;
      ctx.save();
      ctx.beginPath(); ctx.rect(p.x + 2, sy + 1, p.w - 4, PLATFORM_H - 2); ctx.clip();
      ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 3;
      for (let sx2 = p.x - 12 + stripeOffset; sx2 < p.x + p.w + 12; sx2 += 12) {
        ctx.beginPath(); ctx.moveTo(sx2, sy + 1); ctx.lineTo(sx2 + 8, sy + PLATFORM_H - 1); ctx.stroke();
      }
      ctx.restore();
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = 'bold 8px Nunito';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(p.moveDir > 0 ? '▶▶' : '◀◀', p.x + p.w / 2, sy + PLATFORM_H / 2);
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    }
    // ── 부서지는 블록: 균열 벽돌
    else if (t === PT.CRUMBLE) {
      const alpha2 = p.crumbleTimer > 0 ? Math.min(1, p.crumbleTimer / 800) : 1;
      ctx.save(); ctx.globalAlpha *= alpha2;
      ctx.fillStyle = '#f97316'; ctx.strokeStyle = '#c2410c'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(p.x, sy, p.w, PLATFORM_H, 3); ctx.fill(); ctx.stroke();
      ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(p.x + p.w * 0.3, sy); ctx.lineTo(p.x + p.w * 0.2, sy + PLATFORM_H);
      ctx.moveTo(p.x + p.w * 0.6, sy + 2); ctx.lineTo(p.x + p.w * 0.7, sy + PLATFORM_H - 2);
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath(); ctx.roundRect(p.x + 3, sy + 2, p.w - 6, 3, 1); ctx.fill();
      ctx.restore();
    }
    // ── 컨베이어 블록
    else if (t === PT.CONVEYOR) {
      ctx.fillStyle = '#ca8a04'; ctx.strokeStyle = '#92400e'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(p.x, sy, p.w, PLATFORM_H, 3); ctx.fill(); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = 'bold 8px Nunito';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(p.moveDir > 0 ? '▷▷▷' : '◁◁◁', p.x + p.w / 2, sy + PLATFORM_H / 2);
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    }
    // ── 스프링 블록: 트램펄린
    else if (t === PT.SPRING) {
      ctx.fillStyle = '#16a34a'; ctx.strokeStyle = '#14532d'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(p.x, sy + PLATFORM_H - 5, p.w, 5, 2); ctx.fill(); ctx.stroke();
      const coilX = p.x + p.w / 2;
      ctx.strokeStyle = '#4ade80'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(coilX - 6, sy + PLATFORM_H - 5);
      ctx.lineTo(coilX + 6, sy + PLATFORM_H - 9);
      ctx.lineTo(coilX - 6, sy + PLATFORM_H - 13);
      ctx.lineTo(coilX + 6, sy + PLATFORM_H - 17);
      ctx.lineTo(coilX, sy + PLATFORM_H - 20);
      ctx.stroke();
      ctx.fillStyle = '#22c55e'; ctx.strokeStyle = '#14532d'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.ellipse(coilX, sy + 2, p.w * 0.35, 4, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    }

    ctx.restore();
  });

  // Trail
  if (robot.trailPts.length > 2) {
    ctx.save();
    for (let i = 1; i < robot.trailPts.length; i++) {
      const t = i / robot.trailPts.length;
      const p0 = robot.trailPts[i-1];
      const p1 = robot.trailPts[i];
      const sy0 = p0.y - cameraY;
      const sy1 = p1.y - cameraY;
      ctx.strokeStyle = `rgba(168,85,247,${t * 0.4})`;
      ctx.lineWidth = t * 4;
      ctx.beginPath();
      ctx.moveTo(p0.x, sy0);
      ctx.lineTo(p1.x, sy1);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Particles
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y - cameraY, Math.max(0, p.size * p.life), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // Robot
  drawRobot();
}

// 안드로이드봇(Bugdroid) 스타일 캐릭터
const BOT_G  = '#3DDC84'; // 안드로이드 그린
const BOT_GD = '#23A35C'; // 음영/외곽
const BOT_GL = '#8CF0BC'; // 하이라이트

function botLimb(px, py, len, wid, ang) {
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(ang);
  ctx.fillStyle = BOT_G;
  ctx.strokeStyle = BOT_GD;
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.roundRect(-wid / 2, 0, wid, len, wid / 2);
  ctx.fill(); ctx.stroke();
  // 길이방향 하이라이트
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.beginPath();
  ctx.roundRect(-wid / 2 + 1.2, 2, wid * 0.32, len - 4, wid * 0.16);
  ctx.fill();
  ctx.restore();
}

function drawRobot() {
  const rx = robot.x + ROBOT_W / 2;
  const ry = robot.y - cameraY + ROBOT_H / 2;
  const dir = robot.facing;            // 1=오른쪽, -1=왼쪽
  const rising  = robot.vy < -1;
  const falling = robot.vy > 1;
  const air = !robot.onGround;
  const charging_state = charging && robot.onGround;
  const sq = robot.squish;

  const walk = air ? 0 : Math.sin(walkFrame * 0.18);
  const bob  = (!air && !charging_state) ? Math.abs(Math.sin(walkFrame * 0.18)) * 1.6 : 0;

  // 팔다리 포즈 (정면 기준, +각도 = 앞쪽=진행방향)
  let legA1, legA2, armA1, armA2;
  if (air) {
    if (rising) { legA1 = -0.55; legA2 = -0.30; armA1 = -2.5; armA2 = -2.2; }
    else        { legA1 =  0.42; legA2 =  0.22; armA1 = -0.7; armA2 = -0.95; }
  } else if (charging_state) {
    legA1 = 0.6; legA2 = -0.6; armA1 = 1.0; armA2 = 1.15;     // 웅크림(앞으로 점프 준비)
  } else {
    legA1 = walk * 0.6;  legA2 = -walk * 0.6;                 // 다리 교차
    armA1 = -walk * 0.5; armA2 =  walk * 0.5;                 // 팔 반대 위상
  }

  ctx.save();
  ctx.translate(rx, ry);

  // ── 그림자 (방향/기울임/스쿼시 영향 없음, 땅에 고정)
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.beginPath();
  ctx.ellipse(0, ROBOT_H / 2 + 2, air ? 13 : 17, 4.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // 진행 방향으로 미러 + 살짝 기울임 → 자연스러운 좌우 걷기
  ctx.scale(1, sq);                       // 차징 시 납작
  ctx.scale(dir, 1);                      // 바라보는 방향
  const lean = air ? (rising ? -0.05 : 0.04) : 0.05 + walk * 0.03;
  ctx.rotate(lean);
  ctx.translate(0, -bob);                 // 걸을 때 위아래 바운스

  // ── 다리 (엉덩이서 회전)
  botLimb(-4.5, 7, 13, 7, legA1);
  botLimb( 4.5, 7, 13, 7, legA2);

  // ── 팔 (어깨서 회전)
  botLimb(-12, -3, 12, 6, armA1);
  botLimb( 12, -3, 12, 6, armA2);

  // ── 몸통 (둥근 캡슐)
  const bx = -11, by = -6, bw = 22, bh = 19;
  ctx.fillStyle = BOT_G;
  ctx.strokeStyle = BOT_GD;
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 8);
  ctx.fill(); ctx.stroke();
  // 몸통 하이라이트
  ctx.fillStyle = BOT_GL;
  ctx.globalAlpha = 0.45;
  ctx.beginPath();
  ctx.roundRect(bx + 3, by + 3, 6, bh - 7, 3);
  ctx.fill();
  ctx.globalAlpha = 1;

  // ── 머리 (돔 + 안테나)
  const headCY = by - 3;   // 돔 평평한 밑면 y
  const headR = 12;

  // 안테나 2개 (바깥쪽으로)
  ctx.strokeStyle = BOT_GD;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  [[-5.5, -1], [5.5, 1]].forEach(([axBase, s]) => {
    const tx = axBase + s * 4, ty = headCY - headR - 7;
    ctx.beginPath();
    ctx.moveTo(axBase, headCY - headR + 2);
    ctx.lineTo(tx, ty);
    ctx.stroke();
    ctx.fillStyle = BOT_G;
    ctx.beginPath();
    ctx.arc(tx, ty, 2.2, 0, Math.PI * 2);
    ctx.fill();
  });

  // 돔 머리 (위 반원 + 평평한 밑면)
  ctx.fillStyle = BOT_G;
  ctx.strokeStyle = BOT_GD;
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.arc(0, headCY, headR, Math.PI, 2 * Math.PI);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // 돔 하이라이트
  ctx.fillStyle = BOT_GL;
  ctx.globalAlpha = 0.4;
  ctx.beginPath();
  ctx.ellipse(-4, headCY - 5, 4, 6, -0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // 눈 2개 (진행방향으로 시선 이동)
  const eyeY = headCY - 6;
  const gaze = rising ? -1 : (falling ? 1.4 : 1.1); // 바라보는 쪽(미러됨)
  [-4.5, 4.5].forEach(ex => {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ex, eyeY, 2.7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#173a2a';
    ctx.beginPath();
    ctx.arc(ex + gaze, eyeY + (rising ? -0.6 : 0.4), 1.5, 0, Math.PI * 2);
    ctx.fill();
  });

  // 살짝 미소 (점프 중엔 생략 — 안드로이드봇 미니멀)
  if (!air) {
    ctx.strokeStyle = '#173a2a';
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    if (charging_state) {
      ctx.moveTo(-3, eyeY + 6.5);
      ctx.lineTo(3, eyeY + 6.5);
    } else {
      ctx.arc(0, eyeY + 4.5, 2.6, 0.15, Math.PI - 0.15);
    }
    ctx.stroke();
  }

  ctx.restore();
}

function goHome() { window.location.href = '../../index.html'; }

// Init: render game world immediately on page load
robot = createRobot();
platforms = createPlatforms();
cameraY = robot.y - H * 0.7;
score = 0;
chargeStart = 0;
charging = false;
updateRecordDisplay();
loop();
</script>
