<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>계절 옷 입히기 — 쑥쑥 놀이터</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0118;--card:rgba(255,255,255,0.06);--card-border:rgba(255,255,255,0.12);
      --purple:#a855f7;--pink:#ec4899;--grad:linear-gradient(135deg,#a855f7,#ec4899);
      --text:#f0e8ff;--text-dim:rgba(240,232,255,0.55);
      --correct:#22c55e;--wrong:#ef4444;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Nunito','Apple SD Gothic Neo',sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;overflow:hidden;
    }
    .stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .star{position:absolute;border-radius:50%;background:white;
      animation:twinkle var(--d,3s) var(--delay,0s) infinite alternate ease-in-out;}
    @keyframes twinkle{from{opacity:var(--min-op,.2);transform:scale(1);}to{opacity:var(--max-op,.9);transform:scale(1.4);}}

    #game-area{
      position:relative;z-index:1;width:800px;height:600px;
      background:rgba(10,1,24,0.9);border:1px solid var(--card-border);
      border-radius:28px;overflow:hidden;display:flex;flex-direction:column;
    }
    .hud{
      display:flex;justify-content:space-between;align-items:center;
      padding:12px 20px 8px;flex-shrink:0;position:relative;z-index:10;
    }
    .btn-back{
      display:inline-flex;align-items:center;gap:6px;padding:8px 16px;
      background:rgba(10,1,24,0.7);border:1px solid var(--card-border);border-radius:50px;
      color:var(--text-dim);font-family:inherit;font-size:0.82rem;font-weight:700;
      cursor:pointer;text-decoration:none;
    }
    .progress-wrap{flex:1;max-width:240px;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;margin:0 16px;}
    .progress-bar{height:100%;background:var(--grad);border-radius:4px;transition:width 0.4s;}
    .round-text{font-size:0.85rem;font-weight:700;color:var(--text-dim);}

    .screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
    .screen.hidden{display:none;}

    #intro-screen h1{
      font-size:2.2rem;font-weight:900;
      background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
      margin-bottom:12px;text-align:center;
    }
    #intro-screen p{font-size:1rem;color:var(--text-dim);text-align:center;line-height:1.7;margin-bottom:24px;}

    /* 플레이 */
    #play-screen{flex-direction:row;padding:0;gap:0;align-items:stretch;}

    /* 왼쪽: 배경장면 + 캐릭터 */
    #scene-panel{
      position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      border-right:1px solid var(--card-border);
      overflow:hidden;
    }
    #scene-bg{position:absolute;inset:0;}
    #scene-label{
      position:absolute;top:12px;left:50%;transform:translateX(-50%);
      font-size:1.1rem;font-weight:800;
      background:rgba(0,0,0,0.6);padding:6px 20px;border-radius:20px;
      white-space:nowrap;z-index:5;
    }
    #character-wrap{
      position:relative;z-index:5;
      display:flex;flex-direction:column;align-items:center;
    }
    #character-svg{display:block;}
    #cloth-slot{
      position:absolute;
      top:0;left:0;
      pointer-events:none;
      display:flex;align-items:center;justify-content:center;
    }
    #reaction-text{
      position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
      font-size:1rem;font-weight:800;
      background:rgba(0,0,0,0.7);padding:6px 16px;border-radius:20px;
      white-space:nowrap;opacity:0;transition:opacity 0.3s;z-index:10;
    }
    #reaction-text.visible{opacity:1;}

    /* 오른쪽: 옷장 */
    #wardrobe{
      width:300px;display:flex;flex-direction:column;
      align-items:center;padding:16px 12px;gap:8px;
    }
    .wardrobe-title{font-size:0.9rem;font-weight:800;color:var(--text-dim);}
    .clothes-grid{
      display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;flex:1;
      align-content:start;
    }
    .cloth-btn{
      background:var(--card);border:2px solid var(--card-border);
      border-radius:14px;padding:8px 4px;cursor:pointer;
      display:flex;flex-direction:column;align-items:center;gap:4px;
      transition:all 0.2s;
    }
    .cloth-btn:hover{border-color:var(--purple);background:rgba(168,85,247,0.1);}
    .cloth-btn.selected{border-color:var(--purple);background:rgba(168,85,247,0.2);}
    .cloth-btn.correct{border-color:var(--correct);background:rgba(34,197,94,0.15);}
    .cloth-btn.wrong{border-color:var(--wrong);background:rgba(239,68,68,0.15);}
    .cloth-name{font-size:0.7rem;font-weight:700;color:var(--text-dim);}

    .confirm-btn{
      width:100%;padding:12px;background:var(--grad);border:none;border-radius:12px;
      color:#fff;font-family:inherit;font-size:1rem;font-weight:800;cursor:pointer;
      transition:transform 0.15s;
    }
    .confirm-btn:hover{transform:translateY(-1px);}
    .confirm-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

    /* 결과 */
    #result-screen{gap:14px;}
    #result-screen h2{
      font-size:2rem;font-weight:900;
      background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .result-score{font-size:3rem;font-weight:900;color:#facc15;}
    .result-label{font-size:1rem;color:var(--text-dim);}
    .stars-row{display:flex;gap:10px;margin:8px 0;}
    .result-star{animation:starPop 0.4s cubic-bezier(.175,.885,.32,1.275) forwards;opacity:0;}
    @keyframes starPop{from{transform:scale(0) rotate(-30deg);opacity:0;}to{transform:scale(1);opacity:1;}}
    .btn-primary{
      padding:14px 36px;background:var(--grad);border:none;border-radius:50px;color:#fff;
      font-family:inherit;font-size:1.1rem;font-weight:800;cursor:pointer;
      box-shadow:0 4px 20px rgba(168,85,247,0.4);transition:transform 0.15s;
    }
    .btn-primary:hover{transform:translateY(-2px);}
    .btn-secondary{
      padding:12px 28px;background:var(--card);border:1px solid var(--card-border);
      border-radius:50px;color:var(--text);font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;
    }
    .btn-row{display:flex;gap:12px;margin-top:10px;}
    .particle{
      position:absolute;border-radius:50%;pointer-events:none;z-index:20;
      animation:particleFly var(--dur,.8s) ease-out forwards;
    }
    @keyframes particleFly{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}}
  </style>
</head>
<body>
<div class="stars" id="stars"></div>
<div id="game-area">

    <a href="../../index.html" class="btn-back">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">

  <!-- 플레이 -->
  <div class="screen hidden" id="play-screen">
    <div id="scene-panel">

      <div id="character-wrap">
        <svg id="character-svg" width="140" height="220" viewBox="0 0 140 220">

          <!-- 머리 -->

          <path id="char-mouth" d="M60,60 Q70,68 80,60" stroke="rgba(0,0,0,0.5)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

          <ellipse cx="48" cy="58" rx="8" ry="5" fill="rgba(236,72,153,0.25)"/>
          <ellipse cx="92" cy="58" rx="8" ry="5" fill="rgba(236,72,153,0.25)"/>
          <!-- 몸통 (기본 속옷) -->
          <rect x="42" y="84" width="56" height="70" rx="12" fill="#e0f2fe"/>
          <!-- 팔 -->
          <rect x="18" y="86" width="24" height="12" rx="6" fill="#fde68a"/>
          <rect x="98" y="86" width="24" height="12" rx="6" fill="#fde68a"/>
          <!-- 다리 -->
          <rect x="46" y="152" width="20" height="50" rx="8" fill="#fde68a"/>
          <rect x="74" y="152" width="20" height="50" rx="8" fill="#fde68a"/>
          <!-- 신발 -->
          <ellipse cx="56" cy="202" rx="14" ry="8" fill="#7c3aed"/>
          <ellipse cx="84" cy="202" rx="14" ry="8" fill="#7c3aed"/>
        </svg>
        <!-- 옷 레이어 (JS로 채움) -->
        <svg id="cloth-slot" style="position:absolute;top:0;left:0;" width="140" height="220" viewBox="0 0 140 220"></svg>
        <div id="reaction-text"></div>
      </div>
    </div>
    <div id="wardrobe">
      <div class="wardrobe-title">옷장에서 골라보세요</div>
      <div class="clothes-grid" id="clothes-grid"></div>
      <button class="confirm-btn" id="confirm-btn" disabled>입혀보기!</button>
    </div>
  </div>

  <!-- 결과 -->
  <div class="screen hidden" id="result-screen">
    <h2>패션 완성!</h2>
    <div class="result-score" id="result-score"></div>
    <div class="result-label">정답 / 8라운드</div>
    <div class="stars-row" id="stars-row"></div>
    <div id="cheer-msg" style="font-size:1rem;color:var(--text-dim);text-align:center;"></div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="location.href='../../index.html'">홈으로</button>
      <button class="btn-primary" id="retry-btn">다시하기</button>
    </div>
  </div>
</div>

(function(){
  const el=document.getElementById('stars');
  for(let i=0;i<55;i++){
    const s=document.createElement('div');s.className='star';
    const size=Math.random()*2.5+0.5;
    s.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*3+1.5).toFixed(1)}s;--delay:${(Math.random()*3).toFixed(1)}s;--min-op:${(Math.random()*0.2+0.1).toFixed(2)};--max-op:${(Math.random()*0.5+0.5).toFixed(2)};`;
    el.appendChild(s);
  }
})();

// ── 라운드 구성 ──
const ROUNDS = [
  {scene:'spring', correct:'spring-coat',    label:'봄 나들이'},
  {scene:'summer', correct:'summer-tshirt',  label:'여름 해변'},
  {scene:'autumn', correct:'autumn-hoodie',  label:'가을 소풍'},
  {scene:'winter', correct:'winter-padding', label:'겨울 눈놀이'},
  {scene:'spring', correct:'spring-dress',   label:'봄 꽃구경'},
  {scene:'summer', correct:'summer-swim',    label:'여름 수영'},
  {scene:'autumn', correct:'autumn-cardigan',label:'가을 단풍'},
  {scene:'winter', correct:'winter-coat',    label:'겨울 외출'},
];

let currentRound=0, correctCount=0, selectedCloth=null;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function startGame(){
  currentRound=0; correctCount=0;
  showScreen('play-screen');
  showRound();
}

function showRound(){
  selectedCloth=null;
  document.getElementById('confirm-btn').disabled=true;
  document.getElementById('round-text').textContent=`${currentRound+1} / 8`;
  document.getElementById('progress-bar').style.width=`${(currentRound/8)*100}%`;

  const round=ROUNDS[currentRound];
  const sceneDef=SCENE_BGROUPS[round.scene];
  document.getElementById('scene-bg').innerHTML=sceneDef.bg;
  document.getElementById('scene-label').textContent=sceneDef.label;
  document.getElementById('scene-label').style.color=sceneDef.color;
  document.getElementById('cloth-slot').innerHTML='';
  document.getElementById('reaction-text').classList.remove('visible');

  // 옷장 구성: 정답 + 같은 계절 다른 옷들 + 다른 계절 옷들 => 총 6개
  const correctCloth=CLOTHES.find(c=>c.id===round.correct);
  const sameSeasonOthers=CLOTHES.filter(c=>c.season===round.scene && c.id!==round.correct);
  const wrongSeason=CLOTHES.filter(c=>c.season!==round.scene);

  let choices=[correctCloth];
  sameSeasonOthers.forEach(c=>choices.push(c));
  // 다른 계절 2개
  const shuffledWrong=[...wrongSeason].sort(()=>Math.random()-0.5);
  shuffledWrong.slice(0,Math.max(0,5-choices.length)).forEach(c=>choices.push(c));
  choices=choices.slice(0,6);
  // 섞기
  for(let i=choices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[choices[i],choices[j]]=[choices[j],choices[i]];}

  const grid=document.getElementById('clothes-grid');
  grid.innerHTML='';
  choices.forEach(cloth=>{
    const btn=document.createElement('button');
    btn.className='cloth-btn';
    btn.dataset.id=cloth.id;
    btn.dataset.season=cloth.season;

    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','70');svg.setAttribute('height','80');svg.setAttribute('viewBox','0 0 140 160');
    svg.innerHTML=cloth.svgPath;
    btn.appendChild(svg);

    const lbl=document.createElement('div');
    lbl.className='cloth-name';
    lbl.textContent=cloth.name;
    btn.appendChild(lbl);

    btn.addEventListener('click',()=>selectCloth(btn,cloth));
    grid.appendChild(btn);
  });
}

function selectCloth(btn, cloth){
  if(selectedCloth===cloth.id) {
    btn.classList.remove('selected');
    selectedCloth=null;
    document.getElementById('confirm-btn').disabled=true;
    document.getElementById('cloth-slot').innerHTML='';
    return;
  }
  document.querySelectorAll('.cloth-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedCloth=cloth.id;
  document.getElementById('confirm-btn').disabled=false;
  // 미리보기
  document.getElementById('cloth-slot').innerHTML=cloth.svgPath;
}

function confirmCloth(){
  if(!selectedCloth) return;
  const round=ROUNDS[currentRound];
  const isCorrect=(selectedCloth===round.correct);

  // 버튼 표시
  document.querySelectorAll('.cloth-btn').forEach(btn=>{
    if(btn.dataset.id===round.correct) btn.classList.add('correct');
    else if(btn.dataset.id===selectedCloth && !isCorrect) btn.classList.add('wrong');
  });
  document.getElementById('confirm-btn').disabled=true;

  const rt=document.getElementById('reaction-text');
  if(isCorrect){
    rt.textContent='딱 좋아! 완벽해요!';
    rt.style.color='#22c55e';
    correctCount++;
    spawnParticles();
  } else {
    const scene=ROUNDS[currentRound].scene;
    if(scene==='winter') rt.textContent='으 추워! 더 두껍게 입어요!';
    else if(scene==='summer') rt.textContent='덥다~! 더 얇게 입어요!';
    else if(scene==='spring') rt.textContent='살랑살랑! 가볍게 입어요!';
    else rt.textContent='쌀쌀해요! 따뜻하게 입어요!';
    rt.style.color='#ef4444';
  }
  rt.classList.add('visible');

  setTimeout(()=>{
    currentRound++;
    if(currentRound>=8) showResult();
    else showRound();
  }, 1400);
}

function spawnParticles(){
  const area=document.getElementById('game-area');
  const colors=['#f9a8d4','#c4b5fd','#facc15','#86efac','#93c5fd'];
  for(let i=0;i<18;i++){
    const p=document.createElement('div');p.className='particle';
    const size=Math.random()*12+6,angle=Math.random()*Math.PI*2,dist=Math.random()*120+60;
    p.style.cssText=`width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:38%;top:40%;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;--dur:${(Math.random()*0.4+0.5).toFixed(2)}s;`;
    area.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
}

function showResult(){
  showScreen('result-screen');
  document.getElementById('result-score').textContent=`${correctCount} / 8`;
  document.getElementById('progress-bar').style.width='100%';
  const stars=correctCount>=7?3:correctCount>=5?2:correctCount>=3?1:0;
  const cheerMsgs=['다시 연습해봐요!','잘했어요! 조금만 더!','훌륭한 패션 감각!','패션 왕이에요!'];
  document.getElementById('cheer-msg').textContent=cheerMsgs[stars];
  const sr=document.getElementById('stars-row');sr.innerHTML='';
  for(let i=0;i<3;i++){
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','50');svg.setAttribute('height','50');svg.setAttribute('viewBox','0 0 50 50');
    svg.classList.add('result-star');svg.style.animationDelay=`${i*0.15}s`;
    const f=i<stars;
    svg.innerHTML=`<polygon points="25,5 30,18 44,18 33,27 37,41 25,32 13,41 17,27 6,18 20,18" fill="${f?'#facc15':'rgba(255,255,255,0.1)'}" stroke="${f?'#f59e0b':'rgba(255,255,255,0.15)'}" stroke-width="2"/>`;
    sr.appendChild(svg);
  }
}

document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('retry-btn').addEventListener('click',startGame);
document.getElementById('confirm-btn').addEventListener('click',confirmCloth);
</script>
