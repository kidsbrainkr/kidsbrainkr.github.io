<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>동물 퍼즐 — 쑥쑥 놀이터</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0118;
      --card: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.12);
      --purple: #a855f7;
      --pink: #ec4899;
      --orange: #f97316;
      --grad: linear-gradient(135deg, #f97316, #ec4899);
      --text: #f0e8ff;
      --text-dim: rgba(240,232,255,0.55);
      --correct: #22c55e;
      --wrong: #ef4444;
      --snap-dist: 40;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }
    .star {
      position: fixed; border-radius: 50%; background: #fff;
      animation: twinkle var(--dur,3s) ease-in-out infinite var(--delay,0s);
      pointer-events: none; z-index: 0;
    }
    @keyframes twinkle {
      0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.9;transform:scale(1.4)}
    }

    #game-wrap {
      position: relative;
      width: 800px; height: 600px;
      background: linear-gradient(160deg, #1a0a0e 0%, #0a0118 55%, #1a0a18 100%);
      border-radius: 28px;
      border: 1px solid rgba(249,115,22,0.2);
      box-shadow: 0 0 80px rgba(249,115,22,0.1), 0 24px 64px rgba(0,0,0,0.7);
      overflow: hidden;
      z-index: 1;
    }

    /* HUD */
    #hud {
      position: absolute; top: 16px; left: 20px; right: 20px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 20;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      color: var(--text-dim);
      font-family: inherit; font-size: 0.82rem; font-weight: 800;
      cursor: pointer; text-decoration: none;
      transition: background .2s, color .2s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.12); color: var(--text); }

    .hud-right { display: flex; align-items: center; gap: 12px; }

    /* Round dots */
    #round-bar { display: flex; gap: 6px; }
    .rd-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      transition: background 0.3s;
    }
    .rd-dot.done { background: var(--orange); }
    .rd-dot.active { background: var(--purple); box-shadow: 0 0 8px var(--purple); }

    /* Pieces counter */
    .pieces-badge {
      padding: 6px 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      font-size: 0.82rem; font-weight: 800;
      color: var(--text-dim);
    }

    /* Preview panel */
    #preview-panel {
      position: absolute;
      top: 60px; right: 20px;
      width: 130px;
      z-index: 20;
    }
    .preview-label {
      text-align: center;
      font-size: 0.68rem; font-weight: 800;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    #preview-svg-wrap {
      width: 130px; height: 100px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    #preview-svg { width: 100%; height: 100%; }

    /* Puzzle board */
    #puzzle-board {
      position: absolute;
      top: 68px; left: 30px;
      z-index: 10;
    }

    /* Pieces scatter area */
    #scatter-area {
      position: absolute;
      bottom: 16px; left: 30px; right: 170px;
      top: 280px;
      z-index: 15;
    }

    /* Puzzle piece */
    .puzzle-piece {
      position: absolute;
      cursor: grab;
      z-index: 16;
      transition: filter 0.2s;
      touch-action: none;
    }
    .puzzle-piece:hover { filter: brightness(1.15); }
    .puzzle-piece.dragging {
      cursor: grabbing;
      z-index: 100;
      filter: drop-shadow(0 6px 16px rgba(249,115,22,0.6));
    }
    .puzzle-piece.placed {
      cursor: default;
      pointer-events: none;
      filter: none;
    }

    /* Slot outlines */
    .puzzle-slot {
      position: absolute;
      border: 2px dashed rgba(255,255,255,0.15);
      border-radius: 4px;
      background: rgba(255,255,255,0.03);
      transition: background 0.2s, border-color 0.2s;
    }
    .puzzle-slot.highlight {
      border-color: var(--orange);
      background: rgba(249,115,22,0.1);
    }
    .puzzle-slot.filled {
      border-color: var(--correct);
      background: rgba(34,197,94,0.05);
    }

    /* Flash + shake */
    #flash {
      position: absolute; inset: 0; border-radius: 28px;
      pointer-events: none; z-index: 30; opacity: 0;
      transition: opacity 0.12s;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-10px)}40%{transform:translateX(10px)}
      60%{transform:translateX(-8px)}80%{transform:translateX(6px)}
    }
    .shake { animation: shake 0.4s ease; }

    /* Particle canvas */
    #particle-canvas {
      position: absolute; inset: 0; pointer-events: none; z-index: 25;
    }

    /* Shine overlay */
    @keyframes shineMove {
      0%{transform:translateX(-100%) rotate(20deg)}
      100%{transform:translateX(200%) rotate(20deg)}
    }
    .shine-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shineMove 0.8s ease;
      pointer-events: none;
      z-index: 22;
      border-radius: 28px;
    }

    /* Snap animation */
    @keyframes snapIn {
      0%{transform:scale(1.25)}
      60%{transform:scale(0.92)}
      100%{transform:scale(1)}
    }
    .snap-in { animation: snapIn 0.2s ease; }

    /* Result */
    #result-screen {
      position: absolute; inset: 0;
      background: rgba(10,1,24,0.93); border-radius: 28px;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 50; gap: 18px;
    }
    #result-screen.show { display: flex; }
    .result-title {
      font-size: 2.4rem; font-weight: 900;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-stars { display: flex; gap: 12px; }
    .result-star { width: 52px; height: 52px; }
    .result-score { font-size: 1.1rem; font-weight: 700; color: var(--text-dim); }
    .result-btns { display: flex; gap: 14px; margin-top: 8px; }
    .res-btn {
      padding: 14px 28px; border-radius: 50px;
      font-family: inherit; font-size: 1rem; font-weight: 900;
      cursor: pointer; border: none; transition: transform .15s;
    }
    .res-btn:hover { transform: translateY(-3px); }
    .res-btn.primary { background: var(--grad); color: #fff; }
    .res-btn.secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15); color: var(--text);
    }
  </style>
</head>

// Particles
const pCanvas = document.getElementById('particle-canvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];
pCanvas.width = 800; pCanvas.height = 600;

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 5;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      life:1, decay:0.018+Math.random()*0.02, size:4+Math.random()*8, color });
  }
}
function animateParticles() {
  pCtx.clearRect(0,0,800,600);
  particles = particles.filter(p=>p.life>0);
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.vx*=0.97; p.life-=p.decay;
    pCtx.save(); pCtx.globalAlpha=Math.max(0,p.life); pCtx.fillStyle=p.color;
    pCtx.beginPath(); pCtx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); pCtx.fill(); pCtx.restore();
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

function updateRoundDots() {
  const bar = document.getElementById('round-bar');
  bar.innerHTML = '';
  for (let i = 0; i < TOTAL_ROUNDS; i++) {
    const dot = document.createElement('div');
    dot.className = 'rd-dot';
    if (i < currentRound) dot.classList.add('done');
    else if (i === currentRound) dot.classList.add('active');
    bar.appendChild(dot);
  }
}

// Build round
function buildRound() {
  // Clear old pieces/slots from game-wrap
  document.querySelectorAll('.puzzle-piece').forEach(p => p.remove());
  document.querySelectorAll('.puzzle-slot').forEach(s => s.remove());
  pieces = [];
  slots = [];

  const animal = ANIMALS[currentRound % ANIMALS.length];
  const grid = ROUND_GRIDS[currentRound];
  const { cols, rows } = grid;
  const totalPieces = cols * rows;

  // Board layout
  const boardX = 30;
  const boardY = 70;
  const boardW = 310;
  const boardH = 200;
  const pieceW = Math.floor(boardW / cols);
  const pieceH = Math.floor(boardH / rows);

  // Render preview
  const previewSvg = document.getElementById('preview-svg');
  previewSvg.innerHTML = animal.svg;
  previewSvg.setAttribute('viewBox', animal.viewBox);

  const wrap = document.getElementById('game-wrap');

  // Create slots
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const idx = row * cols + col;
      const slotEl = document.createElement('div');
      slotEl.className = 'puzzle-slot';
      slotEl.dataset.slotIndex = idx;
      slotEl.style.cssText = `
        left:${boardX + col * pieceW}px;
        top:${boardY + row * pieceH}px;
        width:${pieceW}px;
        height:${pieceH}px;
        position:absolute;
        z-index:9;
      `;
      wrap.appendChild(slotEl);
      slots.push({
        el: slotEl,
        idx,
        x: boardX + col * pieceW,
        y: boardY + row * pieceH,
        w: pieceW,
        h: pieceH,
        filled: false,
      });
    }
  }

  // Create pieces (SVG clipPath sections)
  const pieceOrder = Array.from({ length: totalPieces }, (_, i) => i).sort(() => Math.random() - 0.5);

  // Scatter positions in bottom-right area
  const scatterPositions = generateScatterPositions(totalPieces, 170, 290, 590, 570);

  const vbW = 300, vbH = 220;

  pieceOrder.forEach((slotIdx, i) => {
    const col = slotIdx % cols;
    const row = Math.floor(slotIdx / cols);
    const clipX = (col / cols) * vbW;
    const clipY = (row / rows) * vbH;
    const clipW = vbW / cols;
    const clipH = vbH / rows;

    const div = document.createElement('div');
    div.className = 'puzzle-piece';
    div.dataset.pieceIndex = i;
    div.dataset.slotTarget = slotIdx;

    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('xmlns', svgNS);
    svg.setAttribute('width', pieceW);
    svg.setAttribute('height', pieceH);
    svg.setAttribute('viewBox', `${clipX} ${clipY} ${clipW} ${clipH}`);
    svg.innerHTML = animal.svg;
    svg.style.display = 'block';
    svg.style.borderRadius = '4px';
    svg.style.border = '1.5px solid rgba(255,255,255,0.2)';
    svg.style.overflow = 'hidden';

    div.appendChild(svg);

    const sx = scatterPositions[i].x;
    const sy = scatterPositions[i].y;
    div.style.left = `${sx}px`;
    div.style.top = `${sy}px`;
    div.style.width = `${pieceW}px`;
    div.style.height = `${pieceH}px`;

    div.addEventListener('mousedown', onPieceDragStart);
    div.addEventListener('touchstart', onPieceTouchStart, { passive: false });

    wrap.appendChild(div);
    pieces.push({ el: div, idx: i, slotTarget: slotIdx, placed: false, origX: sx, origY: sy });
  });

  updateRoundDots();
  updatePiecesBadge();
}

function generateScatterPositions(count, x1, y1, x2, y2) {
  const positions = [];
  const margin = 20;
  let attempts = 0;
  while (positions.length < count && attempts < 2000) {
    attempts++;
    const x = x1 + margin + Math.random() * (x2 - x1 - margin * 2 - 80);
    const y = y1 + margin + Math.random() * (y2 - y1 - margin * 2 - 60);
    const tooClose = positions.some(p => Math.hypot(p.x - x, p.y - y) < 55);
    if (!tooClose) positions.push({ x, y });
  }
  return positions;
}

// Drag
function onPieceDragStart(e) {
  e.preventDefault();
  const el = e.currentTarget;
  const pi = parseInt(el.dataset.pieceIndex);
  if (pieces[pi].placed) return;
  startPieceDrag(pi, e.clientX, e.clientY);
}
function onPieceTouchStart(e) {
  e.preventDefault();
  const el = e.currentTarget;
  const pi = parseInt(el.dataset.pieceIndex);
  if (pieces[pi].placed) return;
  startPieceDrag(pi, e.touches[0].clientX, e.touches[0].clientY);
}

function startPieceDrag(pi, cx, cy) {
  const wrap = document.getElementById('game-wrap');
  const wrapRect = wrap.getBoundingClientRect();
  const piece = pieces[pi];
  const elRect = piece.el.getBoundingClientRect();
  dragOffX = cx - elRect.left;
  dragOffY = cy - elRect.top;
  dragging = pi;
  piece.el.classList.add('dragging');
  piece.el.style.zIndex = 100;

  document.addEventListener('mousemove', onPieceDragMove);
  document.addEventListener('mouseup', onPieceDragEnd);
  document.addEventListener('touchmove', onPieceTouchMove, { passive: false });
  document.addEventListener('touchend', onPieceTouchEnd);
}

function onPieceDragMove(e) { movePiece(e.clientX, e.clientY); }
function onPieceTouchMove(e) { e.preventDefault(); movePiece(e.touches[0].clientX, e.touches[0].clientY); }

function movePiece(cx, cy) {
  if (dragging === null) return;
  const wrap = document.getElementById('game-wrap');
  const wrapRect = wrap.getBoundingClientRect();
  const piece = pieces[dragging];
  const x = cx - wrapRect.left - dragOffX;
  const y = cy - wrapRect.top - dragOffY;
  piece.el.style.left = `${x}px`;
  piece.el.style.top = `${y}px`;

  // Highlight nearest slot
  const midX = cx - wrapRect.left;
  const midY = cy - wrapRect.top;
  const target = piece.slotTarget;
  slots.forEach(s => {
    if (s.filled) return;
    const inside = midX > s.x && midX < s.x+s.w && midY > s.y && midY < s.y+s.h;
    const isTarget = s.idx === target;
    s.el.classList.toggle('highlight', inside && isTarget);
  });
}

function onPieceDragEnd(e) { endPieceDrag(e.clientX, e.clientY); }
function onPieceTouchEnd(e) {
  if (e.changedTouches.length > 0) endPieceDrag(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
}

function endPieceDrag(cx, cy) {
  if (dragging === null) return;
  const wrap = document.getElementById('game-wrap');
  const wrapRect = wrap.getBoundingClientRect();
  const piece = pieces[dragging];
  piece.el.classList.remove('dragging');

  const midX = cx - wrapRect.left;
  const midY = cy - wrapRect.top;

  const targetSlot = slots[piece.slotTarget];
  const snapDist = 55;
  const slotCX = targetSlot.x + targetSlot.w / 2;
  const slotCY = targetSlot.y + targetSlot.h / 2;
  const dist = Math.hypot(midX - slotCX, midY - slotCY);

  if (dist < snapDist && !targetSlot.filled) {
    // Snap!
    piece.el.style.left = `${targetSlot.x}px`;
    piece.el.style.top = `${targetSlot.y}px`;
    piece.el.style.zIndex = 10;
    piece.el.classList.add('placed', 'snap-in');
    piece.el.style.border = '2px solid rgba(34,197,94,0.6)';
    setTimeout(() => piece.el.classList.remove('snap-in'), 250);
    piece.placed = true;
    targetSlot.filled = true;
    targetSlot.el.classList.add('filled');

    spawnParticles(slotCX, slotCY, '#22c55e', 14);
    updatePiecesBadge();

    // Check complete
    if (pieces.every(p => p.placed)) {
      setTimeout(() => onPuzzleComplete(), 400);
    }
  } else {
    // Wrong slot: shake back
    piece.el.style.left = `${piece.origX}px`;
    piece.el.style.top = `${piece.origY}px`;
    piece.el.style.zIndex = 16;

    slots.forEach(s => s.el.classList.remove('highlight'));
  }

  slots.forEach(s => s.el.classList.remove('highlight'));
  dragging = null;
  removePieceDragListeners();
}

function removePieceDragListeners() {
  document.removeEventListener('mousemove', onPieceDragMove);
  document.removeEventListener('mouseup', onPieceDragEnd);
  document.removeEventListener('touchmove', onPieceTouchMove);
  document.removeEventListener('touchend', onPieceTouchEnd);
}

function updatePiecesBadge() {
  const placed = pieces.filter(p => p.placed).length;
  const total = pieces.length;
  document.getElementById('pieces-badge').textContent = `조각 ${placed}/${total}`;
}

function onPuzzleComplete() {
  correctCount++;
  // Shine effect
  const shine = document.createElement('div');
  shine.className = 'shine-overlay';
  document.getElementById('game-wrap').appendChild(shine);
  setTimeout(() => shine.remove(), 900);

  // Confetti
  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      spawnParticles(100 + Math.random() * 600, 100 + Math.random() * 300,
        ['#f97316','#ec4899','#a855f7','#06b6d4','#22c55e'][Math.floor(Math.random()*5)], 20);
    }, i * 100);
  }

  const flash = document.getElementById('flash');
  flash.style.background = 'rgba(34,197,94,0.18)';
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.opacity = '0'; }, 500);

  setTimeout(() => {
    currentRound++;
    if (currentRound >= TOTAL_ROUNDS) { showResult(); return; }
    buildRound();
  }, 2000);
}

function showResult() {
  document.querySelectorAll('.puzzle-piece').forEach(p => p.remove());
  document.querySelectorAll('.puzzle-slot').forEach(s => s.remove());
  const stars = Math.round((correctCount / TOTAL_ROUNDS) * 3);
  document.getElementById('result-title').textContent =
    stars === 3 ? '퍼즐 마스터!' : stars === 2 ? '잘했어요!' : '다시 해봐요!';
  document.getElementById('result-score').textContent =
    `${correctCount}/${TOTAL_ROUNDS} 퍼즐 완성`;
  renderStars(stars);
  document.getElementById('result-screen').classList.add('show');
}

function renderStars(count) {
  const c = document.getElementById('result-stars');
  c.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 24 24');
    svg.classList.add('result-star');
    const pts = [];
    for(let j=0;j<10;j++){
      const r=j%2===0?11:5;
      const a=(j*Math.PI/5)-Math.PI/2;
      pts.push(`${12+r*Math.cos(a)},${12+r*Math.sin(a)}`);
    }
    const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points',pts.join(' '));
    poly.setAttribute('fill',i<count?'#fbbf24':'rgba(255,255,255,0.1)');
    poly.setAttribute('stroke',i<count?'#f59e0b':'rgba(255,255,255,0.15)');
    poly.setAttribute('stroke-width','1');
    svg.appendChild(poly);
    c.appendChild(svg);
  }
}

function restartGame() {
  document.querySelectorAll('.puzzle-piece').forEach(p => p.remove());
  document.querySelectorAll('.puzzle-slot').forEach(s => s.remove());
  currentRound = 0; correctCount = 0; particles = [];
  document.getElementById('result-screen').classList.remove('show');
  buildRound();
}
function goHome() { window.location.href = '../../index.html'; }

// Init
buildRound();
</script>
