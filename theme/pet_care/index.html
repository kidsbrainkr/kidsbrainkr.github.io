<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta http-equiv="X-Content-Type-Options" content="nosniff"><meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>동물 돌보기 🐾</title>
  <style>
    :root {
      --accent:#FF6B35; --accent-h:#e85a25; --mint:#4ECDC4; --mint-h:#38b8ae;
      --bg:#FFF8F0; --card-bg:#FFFFFF; --text:#333333;
      --shadow:0 4px 16px rgba(0,0,0,.12); --shadow-lg:0 8px 32px rgba(0,0,0,.18);
      --radius-sm:12px; --radius-md:20px; --radius-lg:24px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
      background:var(--bg);color:var(--text);min-height:100vh;
      display:flex;flex-direction:column;align-items:center;
      padding:16px 12px 40px;user-select:none;-webkit-user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .header{text-align:center;margin-bottom:14px;}
    .header h1{font-size:clamp(1.4rem,5vw,2rem);font-weight:800;color:var(--accent);}
    .header .subtitle{font-size:clamp(.8rem,2.5vw,.95rem);color:#888;margin-top:4px;}

    .screen{width:100%;max-width:500px;display:none;flex-direction:column;align-items:center;gap:14px;}
    .screen.active{display:flex;animation:fadeIn .3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

    .btn{
      padding:14px 32px;border:none;border-radius:var(--radius-sm);font-family:inherit;
      font-size:1.05rem;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;
      box-shadow:var(--shadow);color:#fff;
    }
    .btn:active{transform:scale(.95);}
    .btn-accent{background:linear-gradient(135deg,var(--accent),#ff8f5e);}
    .btn-mint{background:linear-gradient(135deg,var(--mint),#6ee0d8);}

    .start-emoji{font-size:4rem;animation:bounce 1s infinite;}
    @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
    .start-title{font-size:clamp(1.1rem,3.5vw,1.4rem);font-weight:700;text-align:center;}
    .start-desc{font-size:.9rem;color:#777;text-align:center;line-height:1.5;}

    /* Game top */
    .game-top{
      width:100%;display:flex;justify-content:space-between;align-items:center;
      background:var(--card-bg);border-radius:14px;padding:10px 16px;box-shadow:var(--shadow);
    }
    .game-top-left{font-size:.85rem;font-weight:700;color:var(--accent);}
    .game-top-right{font-size:.8rem;color:#888;}

    .progress-wrap{width:100%;height:8px;background:#e8e8e8;border-radius:4px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--mint),var(--accent));border-radius:4px;transition:width .3s ease;width:0%;}

    /* Animal display */
    .animal-display{
      width:100%;background:var(--card-bg);border-radius:var(--radius-lg);
      padding:24px 16px;box-shadow:var(--shadow-lg);text-align:center;
      position:relative;overflow:hidden;
    }
    .animal-emoji{font-size:6rem;display:block;transition:all .3s;}
    .animal-name{font-size:1.2rem;font-weight:800;margin-top:8px;}
    .animal-need{
      font-size:1.1rem;font-weight:700;color:var(--accent);margin-top:8px;
      display:flex;align-items:center;justify-content:center;gap:6px;
    }
    .need-emoji{font-size:1.8rem;}

    /* Hearts floating */
    .heart{
      position:absolute;font-size:1.5rem;pointer-events:none;
      animation:floatUp 1s ease-out forwards;
    }
    @keyframes floatUp{
      0%{opacity:1;transform:translateY(0) scale(1);}
      100%{opacity:0;transform:translateY(-80px) scale(1.5);}
    }

    /* Action choices */
    .choices{
      width:100%;display:flex;flex-direction:column;gap:10px;
    }
    .choice-card{
      display:flex;align-items:center;gap:14px;padding:16px 20px;
      background:var(--card-bg);border-radius:var(--radius-sm);box-shadow:var(--shadow);
      cursor:pointer;transition:all .2s;border:3px solid transparent;
      font-size:1.05rem;font-weight:700;
    }
    .choice-card:active{transform:scale(.97);}
    .choice-card .choice-emoji{font-size:2.2rem;flex-shrink:0;}
    .choice-card.correct-flash{
      border-color:var(--mint);background:#E8FFF8;
      animation:correctPulse .5s ease;
    }
    @keyframes correctPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}
    .choice-card.wrong-flash{
      border-color:#FF6B6B;background:#FFF0F0;
      animation:shake .4s ease;
    }
    @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

    /* Correct overlay */
    .correct-overlay{
      position:fixed;top:0;left:0;width:100%;height:100%;
      display:none;align-items:center;justify-content:center;
      background:rgba(78,205,196,.15);z-index:100;flex-direction:column;gap:10px;
    }
    .correct-overlay.show{display:flex;}
    .correct-overlay .co-emoji{font-size:5rem;animation:popIn .3s ease;}
    .correct-overlay .co-text{font-size:1.2rem;font-weight:800;color:var(--mint);}
    @keyframes popIn{from{transform:scale(0);}to{transform:scale(1);}}

    /* Wrong msg */
    .wrong-msg{
      position:fixed;bottom:20%;left:50%;transform:translateX(-50%);
      background:#FF6B6B;color:#fff;padding:10px 24px;border-radius:var(--radius-sm);
      font-weight:700;font-size:.95rem;display:none;z-index:100;
      animation:fadeIn .3s ease;
    }
    .wrong-msg.show{display:block;}

    /* Result */
    .result-emoji{font-size:5rem;}
    .result-score{font-size:1.1rem;font-weight:700;text-align:center;color:var(--accent);}
    .result-stars{font-size:2.5rem;text-align:center;}
    .result-msg{font-size:1rem;color:#777;text-align:center;}

    .particle{
      position:fixed;width:8px;height:8px;border-radius:50%;pointer-events:none;
      animation:particleFly .8s ease-out forwards;z-index:999;
    }
    @keyframes particleFly{
      0%{opacity:1;transform:translate(0,0) scale(1);}
      100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0);}
    }
  
    .home-float-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .home-float-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
<a href="../../index.html" class="home-float-btn" title="홈으로">🏠</a>

  <div class="header">
    <h1>동물 돌보기 🐾</h1>
    <div class="subtitle">동물 친구를 돌봐줘요!</div>
  </div>

  <div class="screen active" id="screen-start">
    <div class="start-emoji">🐶</div>
    <div class="start-title">동물 친구를 도와줄까요?</div>
    <div class="start-desc">동물이 뭘 필요로 하는지 알아보고<br>알맞은 도움을 줘봐요! ❤️</div>
    <button class="btn btn-accent" onclick="startGame()">시작하기 🐾</button>
  </div>

  <div class="screen" id="screen-game">
    <div class="game-top">
      <div class="game-top-left" id="round-label">1 / 10</div>
      <div class="game-top-right" id="score-label">⭐ 0</div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="animal-display" id="animal-display">
      <span class="animal-emoji" id="animal-emoji">🐶</span>
      <div class="animal-name" id="animal-name">강아지</div>
      <div class="animal-need">
        <span class="need-emoji" id="need-emoji">😢</span>
        <span id="need-text">배고파요!</span>
        <span class="need-emoji" id="need-emoji2">🍽️</span>
      </div>
    </div>
    <div class="choices" id="choices"></div>
  </div>

  <div class="correct-overlay" id="correct-overlay">
    <div class="co-emoji" id="co-emoji">😊</div>
    <div class="co-text" id="co-text">잘했어요!</div>
  </div>

  <div class="wrong-msg" id="wrong-msg">다시 골라봐요! 🤔</div>

  <div class="screen" id="screen-result">
    <div class="result-emoji" id="result-emoji">🏆</div>
    <div class="result-score" id="result-score">10 / 10 동물을 도와줬어요!</div>
    <div class="result-stars" id="result-stars">⭐⭐⭐</div>
    <div class="result-msg" id="result-msg">동물 돌보기 천재!</div>
    <button class="btn btn-accent" onclick="startGame()">다시 하기 🔄</button>
  </div>

<script>
const AudioSys=(()=>{let ctx=null;function getCtx(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx;}function beep(freq,type,start,dur,vol=.4){const c=getCtx(),osc=c.createOscillator(),gain=c.createGain();osc.connect(gain);gain.connect(c.destination);osc.type=type;osc.frequency.setValueAtTime(freq,c.currentTime+start);gain.gain.setValueAtTime(vol,c.currentTime+start);gain.gain.exponentialRampToValueAtTime(.001,c.currentTime+start+dur);osc.start(c.currentTime+start);osc.stop(c.currentTime+start+dur+.05);}return{playCorrect(){beep(523,'sine',0,.12,.5);beep(659,'sine',.12,.12,.5);beep(784,'sine',.24,.22,.5);},playWrong(){beep(300,'square',0,.10,.3);beep(220,'square',.12,.15,.3);},playWin(){[523,659,784,880,1046].forEach((f,i)=>beep(f,'sine',i*.12,.18,.4));},};})();

function reportReward(stars){
  try{
    const data=JSON.parse(localStorage.getItem('kbr.rewards')||'null')||{totalStars:0,totalGames:0,badges:[],history:[],streak:0,lastDate:null};
    data.totalStars+=stars;data.totalGames+=1;
    const today=new Date().toISOString().slice(0,10);
    data.history.unshift({gameId:'pet_care',area:'사고력',stars,date:today,timestamp:Date.now()});
    if(data.history.length>100)data.history=data.history.slice(0,100);
    if(data.lastDate!==today){if(data.lastDate){const diff=Math.floor((new Date(today)-new Date(data.lastDate))/86400000);data.streak=diff===1?data.streak+1:1;}else{data.streak=1;}data.lastDate=today;}
    localStorage.setItem('kbr.rewards',JSON.stringify(data));
  }catch(e){}
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

const ANIMALS=[
  {emoji:'🐶',name:'강아지'},
  {emoji:'🐱',name:'고양이'},
  {emoji:'🐰',name:'토끼'},
  {emoji:'🐹',name:'햄스터'},
  {emoji:'🐦',name:'새'},
  {emoji:'🐢',name:'거북이'},
  {emoji:'🐟',name:'물고기'},
  {emoji:'🦊',name:'여우'},
];

const NEEDS=[
  {id:'hungry',text:'배고파요!',emoji1:'😢',emoji2:'🍽️',
   correct:{text:'밥 주기',emoji:'🍖'},
   wrongs:[{text:'목욕시키기',emoji:'🛁'},{text:'재우기',emoji:'🛏️'},{text:'놀아주기',emoji:'⚽'}]},
  {id:'dirty',text:'더러워요!',emoji1:'😫',emoji2:'💦',
   correct:{text:'목욕시키기',emoji:'🛁'},
   wrongs:[{text:'밥 주기',emoji:'🍖'},{text:'놀아주기',emoji:'⚽'},{text:'재우기',emoji:'🛏️'}]},
  {id:'sleepy',text:'졸려요!',emoji1:'😴',emoji2:'💤',
   correct:{text:'재우기',emoji:'🛏️'},
   wrongs:[{text:'밥 주기',emoji:'🍖'},{text:'목욕시키기',emoji:'🛁'},{text:'놀아주기',emoji:'⚽'}]},
  {id:'bored',text:'심심해요!',emoji1:'😐',emoji2:'🎾',
   correct:{text:'놀아주기',emoji:'⚽'},
   wrongs:[{text:'재우기',emoji:'🛏️'},{text:'밥 주기',emoji:'🍖'},{text:'병원 가기',emoji:'🏥'}]},
  {id:'sick',text:'아파요!',emoji1:'🤒',emoji2:'💊',
   correct:{text:'병원 가기',emoji:'🏥'},
   wrongs:[{text:'밥 주기',emoji:'🍖'},{text:'놀아주기',emoji:'⚽'},{text:'목욕시키기',emoji:'🛁'}]},
];

const TOTAL_Q=10;
let curQ=0, score=0, locked=false;
let roundData=[];

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame(){
  curQ=0;score=0;locked=false;
  // Generate 10 rounds: random animal + random need
  roundData=[];
  for(let i=0;i<TOTAL_Q;i++){
    roundData.push({
      animal:ANIMALS[Math.floor(Math.random()*ANIMALS.length)],
      need:NEEDS[Math.floor(Math.random()*NEEDS.length)],
    });
  }
  showScreen('screen-game');
  loadRound();
}

function loadRound(){
  locked=false;
  const rd=roundData[curQ];
  document.getElementById('round-label').textContent=(curQ+1)+' / '+TOTAL_Q;
  document.getElementById('score-label').textContent='⭐ '+score;
  document.getElementById('progress-fill').style.width=(curQ/TOTAL_Q*100)+'%';
  document.getElementById('animal-emoji').textContent=rd.animal.emoji;
  document.getElementById('animal-name').textContent=rd.animal.name;
  document.getElementById('need-emoji').textContent=rd.need.emoji1;
  document.getElementById('need-text').textContent=rd.need.text;
  document.getElementById('need-emoji2').textContent=rd.need.emoji2;

  // Build 3 choices: 1 correct + 2 random wrongs
  const wrongs=shuffle(rd.need.wrongs).slice(0,2);
  const choices=shuffle([
    {text:rd.need.correct.text,emoji:rd.need.correct.emoji,isCorrect:true},
    {text:wrongs[0].text,emoji:wrongs[0].emoji,isCorrect:false},
    {text:wrongs[1].text,emoji:wrongs[1].emoji,isCorrect:false},
  ]);

  const container=document.getElementById('choices');
  container.innerHTML='';
  choices.forEach(ch=>{
    const card=document.createElement('div');
    card.className='choice-card';
    card.innerHTML=`<div class="choice-emoji">${ch.emoji}</div><div>${ch.text}</div>`;
    card.onclick=()=>handleChoice(card,ch.isCorrect);
    container.appendChild(card);
  });
}

function handleChoice(card,isCorrect){
  if(locked)return;
  locked=true;

  if(isCorrect){
    score++;
    AudioSys.playCorrect();
    card.classList.add('correct-flash');

    // Show happy animal + hearts
    document.getElementById('animal-emoji').textContent='😊';
    floatHearts();
    spawnParticles(card);

    const msgs=['잘했어요! ❤️','최고예요! 🌟','동물이 좋아해요! 😊'];
    showCorrectOverlay('😊',msgs[Math.floor(Math.random()*msgs.length)]);

    setTimeout(()=>{
      curQ++;
      if(curQ<TOTAL_Q)loadRound();
      else endGame();
    },1200);
  }else{
    AudioSys.playWrong();
    card.classList.add('wrong-flash');
    document.getElementById('animal-emoji').textContent='😢';
    showWrongMsg();
    setTimeout(()=>{
      card.classList.remove('wrong-flash');
      document.getElementById('animal-emoji').textContent=roundData[curQ].animal.emoji;
      locked=false;
    },800);
  }
}

function floatHearts(){
  const display=document.getElementById('animal-display');
  for(let i=0;i<5;i++){
    const h=document.createElement('div');
    h.className='heart';
    h.textContent='❤️';
    h.style.left=(20+Math.random()*60)+'%';
    h.style.bottom='20%';
    h.style.animationDelay=(i*0.15)+'s';
    display.appendChild(h);
    setTimeout(()=>h.remove(),1200);
  }
}

function showCorrectOverlay(emoji,text){
  const o=document.getElementById('correct-overlay');
  document.getElementById('co-emoji').textContent=emoji;
  document.getElementById('co-text').textContent=text;
  o.classList.add('show');
  setTimeout(()=>o.classList.remove('show'),1000);
}

function showWrongMsg(){
  const m=document.getElementById('wrong-msg');
  m.classList.add('show');
  setTimeout(()=>m.classList.remove('show'),1200);
}

function endGame(){
  AudioSys.playWin();
  const stars=score>=9?3:(score>=6?2:1);
  reportReward(stars);

  document.getElementById('result-stars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('result-score').textContent=score+' / '+TOTAL_Q+' 동물을 도와줬어요!';
  document.getElementById('progress-fill').style.width='100%';

  let emoji,msg;
  if(score===TOTAL_Q){emoji='🏆';msg='완벽해요! 동물 돌보기 천재! 👑';}
  else if(score>=7){emoji='😊';msg='잘했어요! 훌륭한 돌봄이!';}
  else if(score>=5){emoji='👍';msg='좋아요! 조금만 더 연습해요!';}
  else{emoji='💪';msg='괜찮아요! 다시 해봐요!';}

  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('result-msg').textContent=msg;
  showScreen('screen-result');

  for(let i=0;i<20;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*window.innerWidth+'px';
    p.style.top=Math.random()*window.innerHeight*.5+'px';
    const colors=['#FF6B35','#4ECDC4','#FFD166','#FF4757','#2F86FF'];
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    const angle=Math.random()*Math.PI*2;
    const dist=30+Math.random()*80;
    p.style.setProperty('--dx',Math.cos(angle)*dist+'px');
    p.style.setProperty('--dy',Math.sin(angle)*dist+'px');
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),850);
  }
}

function spawnParticles(el){
  const rect=el.getBoundingClientRect();
  const x=rect.left+rect.width/2;
  const y=rect.top+rect.height/2;
  const colors=['#FF6B35','#4ECDC4','#FFD166','#FF4757','#2F86FF'];
  for(let i=0;i<10;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=x+'px';p.style.top=y+'px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    const angle=Math.random()*Math.PI*2;
    const dist=30+Math.random()*60;
    p.style.setProperty('--dx',Math.cos(angle)*dist+'px');
    p.style.setProperty('--dy',Math.sin(angle)*dist+'px');
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),850);
  }
}
</script>
</body>
</html>
