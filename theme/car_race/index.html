<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta http-equiv="X-Content-Type-Options" content="nosniff"><meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>자동차 경주 🏎️</title>
  <style>
    :root {
      --accent:#FF6B35; --accent-h:#e85a25; --mint:#4ECDC4; --mint-h:#38b8ae;
      --bg:#FFF8F0; --card-bg:#FFFFFF; --text:#333333;
      --shadow:0 4px 16px rgba(0,0,0,.12); --shadow-lg:0 8px 32px rgba(0,0,0,.18);
      --radius-sm:12px; --radius-md:20px; --radius-lg:24px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
      padding:16px 12px 40px;user-select:none;-webkit-user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .header{text-align:center;margin-bottom:14px;}
    .header h1{font-size:clamp(1.4rem,5vw,2rem);font-weight:800;color:var(--accent);}
    .header .subtitle{font-size:clamp(.8rem,2.5vw,.95rem);color:#888;margin-top:4px;}

    .screen{width:100%;max-width:500px;display:none;flex-direction:column;align-items:center;gap:14px;}
    .screen.active{display:flex;animation:fadeIn .3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

    .start-title{font-size:clamp(1.1rem,3.5vw,1.4rem);font-weight:700;text-align:center;}
    .start-desc{font-size:.9rem;color:#777;text-align:center;line-height:1.5;}
    .difficulty-buttons{display:flex;flex-direction:column;gap:14px;width:100%;}
    .btn-difficulty{
      display:flex;align-items:center;gap:14px;padding:18px 22px;
      border:none;border-radius:18px;font-family:inherit;font-size:1.05rem;font-weight:700;
      cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:var(--shadow);
    }
    .btn-difficulty:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
    .btn-difficulty:active{transform:scale(.97);}
    .btn-difficulty .diff-icon{font-size:1.8rem;}
    .btn-difficulty .diff-info{text-align:left;}
    .btn-difficulty .diff-name{font-size:1.1rem;}
    .btn-difficulty .diff-detail{font-size:.78rem;font-weight:400;opacity:.75;margin-top:2px;}
    .btn-difficulty.easy{background:linear-gradient(135deg,#84FAB0,#8FD3F4);color:#1a4a3a;}
    .btn-difficulty.normal{background:linear-gradient(135deg,#FFD86F,#FFAC5F);color:#5a3200;}
    .btn-difficulty.hard{background:linear-gradient(135deg,#FF6B6B,#FF8E53);color:#fff;}

    .game-top{
      width:100%;display:flex;justify-content:space-between;align-items:center;
      background:var(--card-bg);border-radius:14px;padding:10px 16px;box-shadow:var(--shadow);
    }
    .game-top-left{font-size:.85rem;font-weight:700;color:var(--accent);}
    .game-top-right{font-size:.8rem;color:#888;}

    .progress-wrap{width:100%;height:8px;background:#e8e8e8;border-radius:4px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--mint),var(--accent));border-radius:4px;transition:width .3s ease;width:0%;}

    /* Countdown */
    .countdown-display{
      font-size:4rem;font-weight:900;color:var(--accent);
      text-align:center;padding:40px;
      animation:countPulse .5s ease;
    }
    @keyframes countPulse{0%{transform:scale(2);opacity:0;}100%{transform:scale(1);opacity:1;}}

    /* Race tracks */
    .race-area{
      width:100%;background:var(--card-bg);border-radius:var(--radius-lg);
      padding:20px 16px;box-shadow:var(--shadow-lg);
    }
    .track-label{font-size:.75rem;font-weight:600;color:#aaa;margin-bottom:4px;}
    .track{
      position:relative;width:100%;height:60px;
      background:linear-gradient(180deg,#555 0%,#666 50%,#555 100%);
      border-radius:8px;margin-bottom:16px;overflow:hidden;
    }
    .track:last-child{margin-bottom:0;}
    .track-markings{
      position:absolute;top:50%;left:0;width:100%;height:3px;
      background:repeating-linear-gradient(90deg,#fff 0,#fff 20px,transparent 20px,transparent 40px);
      transform:translateY(-50%);opacity:.4;
    }
    .finish-line{
      position:absolute;right:0;top:0;width:16px;height:100%;
      background:repeating-conic-gradient(#000 0% 25%,#fff 0% 50%) 0 0/10px 10px;
    }
    .car{
      position:absolute;left:2%;top:50%;transform:translateY(-50%);
      font-size:2rem;transition:left .15s ease;z-index:2;
    }
    .car.bounce{animation:carBounce .15s ease;}
    @keyframes carBounce{0%{transform:translateY(-50%) scale(1);}50%{transform:translateY(-60%) scale(1.15);}100%{transform:translateY(-50%) scale(1);}}

    /* Tap area */
    .tap-area{
      width:100%;padding:30px 20px;
      background:linear-gradient(135deg,var(--accent),var(--accent-h));
      border-radius:var(--radius-lg);color:#fff;text-align:center;
      font-size:1.4rem;font-weight:800;cursor:pointer;
      box-shadow:var(--shadow-lg);transition:transform .1s;
    }
    .tap-area:active{transform:scale(.96);}
    .tap-area.disabled{opacity:.5;pointer-events:none;}

    .race-result{
      font-size:1.3rem;font-weight:800;text-align:center;
      padding:14px;border-radius:var(--radius-sm);
      background:var(--card-bg);box-shadow:var(--shadow);
    }
    .race-result.win{color:#27ae60;}
    .race-result.lose{color:#e74c3c;}

    .btn-primary{
      display:inline-block;padding:14px 36px;border:none;border-radius:var(--radius-md);
      font-family:inherit;font-size:1.05rem;font-weight:700;color:#fff;
      background:linear-gradient(135deg,var(--accent),var(--accent-h));
      cursor:pointer;box-shadow:var(--shadow);transition:transform .15s;
    }
    .btn-primary:hover{transform:translateY(-2px);}
    .btn-primary:active{transform:scale(.97);}

    .particle-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99;}
    .particle{
      position:absolute;width:10px;height:10px;border-radius:50%;
      animation:particleFall 1s ease-out forwards;
    }
    @keyframes particleFall{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(120px) scale(0);}}

    .correct-overlay{
      position:fixed;top:0;left:0;width:100%;height:100%;
      display:none;align-items:center;justify-content:center;z-index:100;
      background:rgba(0,0,0,.3);
    }
    .correct-overlay.show{display:flex;animation:fadeIn .3s ease;}
    .correct-box{
      background:var(--card-bg);border-radius:var(--radius-lg);padding:30px 40px;
      text-align:center;box-shadow:var(--shadow-lg);
    }
    .correct-box .emoji{font-size:3rem;}
    .correct-box .msg{font-size:1.2rem;font-weight:700;color:var(--accent);margin-top:8px;}

    .result-card{
      background:var(--card-bg);border-radius:var(--radius-lg);padding:30px 24px;
      text-align:center;box-shadow:var(--shadow-lg);width:100%;
    }
    .result-card .result-emoji{font-size:3.5rem;}
    .result-card .result-title{font-size:1.4rem;font-weight:800;color:var(--accent);margin:10px 0;}
    .result-card .result-detail{font-size:.9rem;color:#888;margin-bottom:6px;}
    .stars-display{font-size:2.5rem;margin:10px 0;}
    .star{display:inline-block;opacity:.25;}
    .star.earned{opacity:1;animation:starPop .4s cubic-bezier(.34,1.56,.64,1);}
    @keyframes starPop{0%{transform:scale(0);}100%{transform:scale(1);}}

    .score-summary{font-size:.95rem;color:#666;margin:6px 0;}

    @media(max-width:480px){.car{font-size:1.6rem;}.track{height:50px;}.tap-area{font-size:1.2rem;padding:24px 16px;}}
    @media(max-width:360px){body{padding:10px 8px 30px;}.car{font-size:1.4rem;}.track{height:44px;}}
  </style>
</head>
<body>
  <div class="header">
    <h1>자동차 경주 🏎️</h1>
    <div class="subtitle">빠르게 터치해서 경주에서 이기세요!</div>
  </div>

  <div class="screen active" id="startScreen">
    <div class="start-title">🏁 난이도를 골라주세요!</div>
    <div class="start-desc">화면을 빠르게 터치해서<br>상대 자동차보다 먼저 결승선에 도착하세요!</div>
    <div class="difficulty-buttons">
      <button class="btn-difficulty easy" onclick="startGame('easy')">
        <span class="diff-icon">🐢</span>
        <span class="diff-info"><span class="diff-name">쉬움</span><span class="diff-detail">느린 상대</span></span>
      </button>
      <button class="btn-difficulty normal" onclick="startGame('normal')">
        <span class="diff-icon">🐇</span>
        <span class="diff-info"><span class="diff-name">보통</span><span class="diff-detail">보통 상대</span></span>
      </button>
      <button class="btn-difficulty hard" onclick="startGame('hard')">
        <span class="diff-icon">🦅</span>
        <span class="diff-info"><span class="diff-name">어려움</span><span class="diff-detail">빠른 상대</span></span>
      </button>
    </div>
  </div>

  <div class="screen" id="countdownScreen">
    <div class="countdown-display" id="countdownText"></div>
  </div>

  <div class="screen" id="gameScreen">
    <div class="game-top">
      <div class="game-top-left">경주 <span id="raceNum">1</span>/3</div>
      <div class="game-top-right">승리: <span id="winCount">0</span></div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
    <div class="race-area">
      <div class="track-label">🚙 상대 자동차</div>
      <div class="track" id="aiTrack">
        <div class="track-markings"></div>
        <div class="finish-line"></div>
        <div class="car" id="aiCar">🚙</div>
      </div>
      <div class="track-label">🏎️ 내 자동차</div>
      <div class="track" id="playerTrack">
        <div class="track-markings"></div>
        <div class="finish-line"></div>
        <div class="car" id="playerCar">🏎️</div>
      </div>
    </div>
    <div class="tap-area" id="tapArea" ontouchstart="tap(event)" onmousedown="tap(event)">
      👆 여기를 빠르게 터치!
    </div>
    <div class="race-result" id="raceResult" style="display:none;"></div>
  </div>

  <div class="screen" id="resultScreen">
    <div class="result-card">
      <div class="result-emoji">🏆</div>
      <div class="result-title" id="resultTitle">경주 완료!</div>
      <div class="result-detail" id="resultDetail"></div>
      <div class="score-summary" id="scoreSummary"></div>
      <div class="stars-display" id="starsDisplay"></div>
      <button class="btn-primary" onclick="resetGame()" style="margin-top:16px;">🔄 다시 하기</button>
    </div>
  </div>

  <div class="correct-overlay" id="correctOverlay">
    <div class="correct-box"><div class="emoji" id="overlayEmoji">🎉</div><div class="msg" id="overlayMsg">1등!</div></div>
  </div>
  <div class="particle-container" id="particleContainer"></div>

  <script>
    const AudioSys=(()=>{
      let ctx=null;
      function getCtx(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx;}
      function beep(freq,type,start,dur,vol=.4){
        const c=getCtx(),osc=c.createOscillator(),gain=c.createGain();
        osc.connect(gain);gain.connect(c.destination);
        osc.type=type;osc.frequency.setValueAtTime(freq,c.currentTime+start);
        gain.gain.setValueAtTime(vol,c.currentTime+start);
        gain.gain.exponentialRampToValueAtTime(.001,c.currentTime+start+dur);
        osc.start(c.currentTime+start);osc.stop(c.currentTime+start+dur+.05);
      }
      return{
        playCorrect(){beep(523,'sine',0,.12,.5);beep(659,'sine',.12,.12,.5);beep(784,'sine',.24,.22,.5);},
        playWrong(){beep(300,'square',0,.10,.3);beep(220,'square',.12,.15,.3);},
        playWin(){[523,659,784,880,1046].forEach((f,i)=>beep(f,'sine',i*.12,.18,.4));},
        playTap(){beep(440,'sine',0,.05,.2);},
        playCountdown(){beep(400,'sine',0,.15,.3);},
        playGo(){beep(600,'sine',0,.1,.4);beep(800,'sine',.1,.15,.4);},
      };
    })();

    function reportReward(stars){
      try{
        const data=JSON.parse(localStorage.getItem('kbr.rewards')||'null')||{totalStars:0,totalGames:0,badges:[],history:[],streak:0,lastDate:null};
        data.totalStars+=stars;data.totalGames+=1;
        const today=new Date().toISOString().slice(0,10);
        data.history.unshift({gameId:'car_race',area:'순발력',stars,date:today,timestamp:Date.now()});
        if(data.history.length>100)data.history=data.history.slice(0,100);
        if(data.lastDate!==today){if(data.lastDate){const d=Math.floor((new Date(today)-new Date(data.lastDate))/86400000);data.streak=d===1?data.streak+1:1;}else{data.streak=1;}data.lastDate=today;}
        localStorage.setItem('kbr.rewards',JSON.stringify(data));
      }catch(e){}
    }

    function showParticles(){
      const container=document.getElementById('particleContainer');
      const colors=['#FF6B35','#4ECDC4','#FFD86F','#FF8E53','#84FAB0'];
      for(let i=0;i<20;i++){
        const p=document.createElement('div');
        p.className='particle';
        p.style.left=Math.random()*100+'%';
        p.style.top=(Math.random()*40+20)+'%';
        p.style.background=colors[Math.floor(Math.random()*colors.length)];
        p.style.width=p.style.height=(Math.random()*8+6)+'px';
        p.style.animationDelay=Math.random()*.3+'s';
        container.appendChild(p);
      }
      setTimeout(()=>container.innerHTML='',1500);
    }

    let difficulty='easy', currentRace=0, wins=0;
    let playerPos=0, aiPos=0, racing=false, aiInterval=null;
    const TOTAL_RACES=3, FINISH=100;
    const AI_SPEEDS={easy:80,normal:55,hard:38}; // ms per step
    const TAP_AMOUNT=3.5;

    function showScreen(id){
      document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function startGame(diff){
      difficulty=diff;
      currentRace=0;wins=0;
      beginRace();
    }

    function beginRace(){
      currentRace++;
      playerPos=0;aiPos=0;racing=false;
      document.getElementById('raceNum').textContent=currentRace;
      document.getElementById('winCount').textContent=wins;
      document.getElementById('progressFill').style.width=((currentRace-1)/TOTAL_RACES*100)+'%';
      document.getElementById('raceResult').style.display='none';
      updateCars();

      // Countdown
      showScreen('countdownScreen');
      let count=3;
      const ct=document.getElementById('countdownText');
      ct.textContent=count;
      ct.style.animation='none';ct.offsetHeight;ct.style.animation='countPulse .5s ease';
      AudioSys.playCountdown();

      const timer=setInterval(()=>{
        count--;
        if(count>0){
          ct.textContent=count;
          ct.style.animation='none';ct.offsetHeight;ct.style.animation='countPulse .5s ease';
          AudioSys.playCountdown();
        }else{
          clearInterval(timer);
          ct.textContent='출발!';
          ct.style.color='#4ECDC4';
          ct.style.animation='none';ct.offsetHeight;ct.style.animation='countPulse .5s ease';
          AudioSys.playGo();
          setTimeout(()=>{
            showScreen('gameScreen');
            startRacing();
          },500);
        }
      },800);
    }

    function startRacing(){
      racing=true;
      const tapArea=document.getElementById('tapArea');
      tapArea.classList.remove('disabled');

      // AI movement
      const speed=AI_SPEEDS[difficulty];
      const aiStep=()=>{
        if(!racing)return;
        aiPos+=1.5+Math.random()*1.5;
        if(aiPos>=FINISH){aiPos=FINISH;racing=false;endRace(false);}
        updateCars();
        if(racing)aiInterval=setTimeout(aiStep,speed+Math.random()*30);
      };
      aiInterval=setTimeout(aiStep,speed);
    }

    function tap(e){
      e.preventDefault();
      if(!racing)return;
      AudioSys.playTap();
      playerPos+=TAP_AMOUNT;

      const car=document.getElementById('playerCar');
      car.classList.remove('bounce');
      car.offsetHeight;
      car.classList.add('bounce');

      if(playerPos>=FINISH){
        playerPos=FINISH;
        racing=false;
        clearTimeout(aiInterval);
        endRace(true);
      }
      updateCars();
    }

    function updateCars(){
      const maxLeft=82; // percentage
      document.getElementById('playerCar').style.left=Math.min(playerPos/FINISH*maxLeft,maxLeft)+'%';
      document.getElementById('aiCar').style.left=Math.min(aiPos/FINISH*maxLeft,maxLeft)+'%';
    }

    function endRace(playerWon){
      clearTimeout(aiInterval);
      const tapArea=document.getElementById('tapArea');
      tapArea.classList.add('disabled');

      if(playerWon){
        wins++;
        AudioSys.playCorrect();
        showParticles();
        document.getElementById('winCount').textContent=wins;
      }else{
        AudioSys.playWrong();
      }

      const overlay=document.getElementById('correctOverlay');
      document.getElementById('overlayEmoji').textContent=playerWon?'🎉':'😅';
      document.getElementById('overlayMsg').textContent=playerWon?'1등! 이겼어요!':'2등! 아쉬워요!';
      overlay.classList.add('show');

      setTimeout(()=>{
        overlay.classList.remove('show');
        if(currentRace>=TOTAL_RACES){
          showResult();
        }else{
          beginRace();
        }
      },1500);
    }

    function showResult(){
      AudioSys.playWin();showParticles();
      let stars=wins; // 0-3 wins = 0-3 stars, minimum 1
      if(stars<1)stars=1;

      document.getElementById('resultTitle').textContent=wins>=2?'대단해요! 🏆':'잘했어요!';
      document.getElementById('resultDetail').textContent=`3번의 경주에서 ${wins}번 이겼어요!`;
      document.getElementById('scoreSummary').textContent=wins===3?'완벽한 경주였어요!':wins===0?'다음엔 더 빨리 터치해보세요!':'';

      const sd=document.getElementById('starsDisplay');
      sd.innerHTML='';
      for(let i=0;i<3;i++){
        const s=document.createElement('span');
        s.className='star'+(i<stars?' earned':'');
        s.textContent='⭐';
        s.style.animationDelay=i*.15+'s';
        sd.appendChild(s);
      }
      reportReward(stars);
      showScreen('resultScreen');
    }

    function resetGame(){showScreen('startScreen');}

  </script>
</body>
</html>
