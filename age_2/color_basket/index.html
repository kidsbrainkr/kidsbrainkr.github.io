<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; font-src 'self' data:">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>색깔 바구니 넣기 🧺</title>
<style>
/* ===== CSS 변수 — kidsbrainkr 브랜드 통일 ===== */
:root {
  --accent:    #FF6B35;
  --accent-dk: #E55A24;
  --mint:      #4ECDC4;
  --bg:        #FFF8F0;
  --txt:       #333;
  --ok:        #2ECC71;
  --sh:  0 4px 16px rgba(0,0,0,.12);
  --sh2: 0 8px 32px rgba(0,0,0,.18);
  --r:   20px;
  --font: 'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
}

/* ===== 리셋 & 기본 ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  /* 배경에 부드러운 그라디언트 포인트 */
  background-image:
    radial-gradient(circle at 15% 15%, rgba(255,107,53,.07) 0%, transparent 50%),
    radial-gradient(circle at 85% 85%, rgba(78,205,196,.07) 0%, transparent 50%);
  color: var(--txt);
  font-family: var(--font);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 12px;
  /* 모바일에서 이중 탭 확대 방지 */
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}

/* ===== 화면 전환 — active 클래스로 표시/숨김 ===== */
.screen { display: none; width: 100%; max-width: 480px; }
.screen.active { display: flex; flex-direction: column; align-items: center; }

/* ===== 게임 화면 레이아웃 ===== */
#game-screen {
  min-height: calc(100vh - 24px);
  justify-content: space-between;
  gap: 16px;
  padding: 12px 0;
}

/* ===== 상단 상태 바 ===== */
.status-bar {
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 문제 진행 뱃지 — "1 / 10" */
.progress-badge {
  background: #fff;
  border-radius: 24px;
  box-shadow: var(--sh);
  padding: 8px 22px;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 1px;
}

/* ===== 물건 카드 영역 (중앙, 매우 크게) ===== */
.item-area {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  /* 날아가기 애니메이션 위치 기준점 */
  position: relative;
}

/* 안내 문구 — 최소화 */
.item-label {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--txt);
  opacity: 0.75;
}

/* 물건 카드 — 이모지를 매우 크게 표시 */
.item-card {
  width: min(220px, 48vw);
  height: min(220px, 48vw);
  border-radius: 28px;
  background: #fff;
  box-shadow: var(--sh2);
  display: flex;
  align-items: center;
  justify-content: center;
  border: 5px solid rgba(255,255,255,.8);
  /* 진입 팝 애니메이션 */
  animation: popIn .35s cubic-bezier(.34,1.56,.64,1);
  /* 날아가기 전 기준 위치 */
  position: relative;
  z-index: 10;
  transition: opacity .3s;
}

/* 물건 이모지 — 만 2세 기준 매우 크게 */
.item-emoji {
  font-size: 6rem;
  line-height: 1;
  display: block;
}

/* ===== 바구니 영역 (하단) ===== */
.baskets-area {
  width: 100%;
  display: flex;
  gap: 12px;
  justify-content: center;
  align-items: stretch;
  padding: 0 4px;
}

/* 바구니 버튼 — 크고 탭하기 쉽게 */
.basket-btn {
  flex: 1;
  max-width: 150px;
  /* 2개일 때는 더 넓게, 3개일 때는 적당히 */
  border-radius: 22px;
  box-shadow: var(--sh);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 18px 8px;
  cursor: pointer;
  border: 4px solid rgba(255,255,255,.6);
  transition: transform .12s, box-shadow .12s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  /* 진입 애니메이션 — JS로 개별 지연 추가 */
  animation: popIn .3s cubic-bezier(.34,1.56,.64,1) both;
}

/* 바구니 호버 (PC 마우스) */
.basket-btn:hover {
  transform: translateY(-4px) scale(1.04);
  box-shadow: var(--sh2);
}

/* 바구니 이모지 — 크게 */
.basket-emoji {
  font-size: 4rem;
  line-height: 1;
  display: block;
}

/* 바구니 색 이름 텍스트 */
.basket-name {
  font-size: 1.15rem;
  font-weight: 800;
  color: #fff;
  text-shadow: 0 1px 6px rgba(0,0,0,.35);
  letter-spacing: 1px;
}

/* ===== 색깔별 바구니 배경색 ===== */
.basket-red    { background: linear-gradient(145deg, #ff6b6b, #e53935); }
.basket-blue   { background: linear-gradient(145deg, #64b5f6, #1e88e5); }
.basket-yellow { background: linear-gradient(145deg, #fff176, #fdd835); }
.basket-green  { background: linear-gradient(145deg, #81c784, #43a047); }

/* 노랑 바구니는 텍스트 어둡게 (배경이 밝아서) */
.basket-yellow .basket-name { color: #555; text-shadow: 0 1px 4px rgba(0,0,0,.2); }

/* ===== 날아가는 물건 — JS로 body에 추가되는 절대 위치 요소 ===== */
.flying-item {
  position: fixed;
  font-size: 4.5rem;
  line-height: 1;
  z-index: 200;
  pointer-events: none;
  /* 트랜지션은 JS에서 style로 직접 설정 */
  transition: none;
}

/* ===== 정답 축하 오버레이 ===== */
.correct-overlay {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: rgba(46,204,113,.82);
  z-index: 100;
  animation: fadeIn .2s ease;
  pointer-events: none;
}

.correct-emoji-big {
  font-size: min(110px, 26vw);
  animation: bounceIn .4s cubic-bezier(.34,1.56,.64,1);
  line-height: 1;
}

.correct-text {
  font-size: min(2.8rem, 8.5vw);
  font-weight: 800;
  color: #fff;
  text-shadow: 0 3px 12px rgba(0,0,0,.25);
  animation: bounceIn .45s .08s cubic-bezier(.34,1.56,.64,1) both;
}

/* ===== 결과 화면 ===== */
#result-screen {
  min-height: calc(100vh - 24px);
  justify-content: center;
  gap: 28px;
  padding: 24px 0;
}

.result-card {
  background: #fff;
  border-radius: 28px;
  box-shadow: var(--sh2);
  padding: 40px 32px;
  text-align: center;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}

.result-emoji {
  font-size: min(96px, 22vw);
  line-height: 1;
  animation: bounceIn .5s cubic-bezier(.34,1.56,.64,1);
}

.result-title {
  font-size: min(2.6rem, 8vw);
  font-weight: 800;
  color: var(--accent);
  line-height: 1.3;
}

.result-subtitle {
  font-size: 1.2rem;
  color: #888;
  font-weight: 600;
}

.result-stars {
  font-size: min(3rem, 9vw);
  letter-spacing: 8px;
}

/* 다시하기 버튼 */
.btn-restart {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 20px 56px;
  border-radius: 32px;
  font-size: 1.6rem;
  font-weight: 800;
  font-family: var(--font);
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(255,107,53,.4);
  transition: transform .15s, box-shadow .15s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.btn-restart:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(255,107,53,.5); }
.btn-restart:active { transform: translateY(0); }

/* ===== 키프레임 애니메이션 ===== */

/* 카드 진입 팝 */
@keyframes popIn {
  from { opacity: 0; transform: scale(.6); }
  to   { opacity: 1; transform: scale(1); }
}

/* 바운스 인 */
@keyframes bounceIn {
  from { opacity: 0; transform: scale(.5); }
  to   { opacity: 1; transform: scale(1); }
}

/* 페이드인 */
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* 오답 바구니 흔들기 */
@keyframes shake {
  0%,100% { transform: translateX(0) rotate(0deg); }
  15%      { transform: translateX(-10px) rotate(-4deg); }
  30%      { transform: translateX(10px) rotate(4deg); }
  45%      { transform: translateX(-8px) rotate(-2deg); }
  60%      { transform: translateX(8px) rotate(2deg); }
  75%      { transform: translateX(-4px) rotate(-1deg); }
  90%      { transform: translateX(4px) rotate(1deg); }
}

/* 오답 바구니 테두리 펄스 */
@keyframes errorPulse {
  0%,100% { border-color: rgba(255,255,255,.6); }
  40%     { border-color: #E74C3C; box-shadow: 0 0 0 5px rgba(231,76,60,.4); }
}

/* 결과 화면 별 등장 */
@keyframes starPop {
  0%   { transform: scale(0) rotate(-30deg); opacity: 0; }
  60%  { transform: scale(1.2) rotate(5deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* 물건 카드 — 정답 후 작아지며 사라짐 */
@keyframes itemShrink {
  0%   { transform: scale(1); opacity: 1; }
  100% { transform: scale(0); opacity: 0; }
}

/* 정답 바구니 — 받는 순간 커졌다 돌아옴 */
@keyframes basketPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.18); }
  70%  { transform: scale(.95); }
  100% { transform: scale(1); }
}

/* ===== 오답/정답 상태 클래스 ===== */
.shake       { animation: shake .5s ease both !important; }
.error-pulse { animation: errorPulse .5s ease both !important; }
.basket-pop  { animation: basketPop .4s ease both !important; }

/* 클릭 잠금 (애니메이션 처리 중) */
.locked { pointer-events: none; }
</style>
</head>
<body>

<!-- =====================================================================
     게임 화면 — 물건 카드(중앙) + 바구니 버튼들(하단)
     ===================================================================== -->
<div id="game-screen" class="screen active">

  <!-- 진행 뱃지 -->
  <div class="status-bar">
    <div class="progress-badge" id="progress-badge">1 / 10</div>
  </div>

  <!-- 물건 표시 영역 -->
  <div class="item-area">
    <p class="item-label">어떤 바구니에 넣을까요?</p>
    <!-- 물건 카드 — JS로 이모지 업데이트 -->
    <div class="item-card" id="item-card">
      <span class="item-emoji" id="item-emoji">🍎</span>
    </div>
  </div>

  <!-- 바구니 버튼 영역 — JS로 동적 생성 -->
  <div class="baskets-area" id="baskets-area"></div>

</div>

<!-- =====================================================================
     결과 화면 — 10문제 완료 후 표시
     ===================================================================== -->
<div id="result-screen" class="screen">
  <div class="result-card">
    <div class="result-emoji">🎉</div>
    <div class="result-title">다 넣었어요!</div>
    <div class="result-stars" id="result-stars">⭐⭐⭐⭐⭐</div>
    <div class="result-subtitle">바구니 10개를 모두 채웠어요!</div>
    <button class="btn-restart" onclick="restartGame()">다시하기 🧺</button>
  </div>
</div>

<script>
/* =====================================================================
   오디오 시스템 — Web Audio API 합성음 (파일 없음)
   ===================================================================== */
const AudioSys = (() => {
  let ctx = null, masterGain = null;

  /* AudioContext 초기화 — suspended 상태이면 resume (iOS/Chrome 자동재생 정책 대응) */
  function ensure() {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain();
      masterGain.gain.value = 0.5;
      masterGain.connect(ctx.destination);
    }
    if (ctx.state === 'suspended') ctx.resume();
  }

  /* 단일 음 재생 헬퍼 — freq(Hz), dur(초), gain, 파형, 시작지연(초) */
  function tone(freq, dur, gain = 0.5, type = 'sine', delay = 0) {
    if (!ctx) return;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g);
    g.connect(masterGain);
    o.type = type;
    o.frequency.value = freq;
    const t = ctx.currentTime + delay;
    g.gain.setValueAtTime(gain, t);
    /* 음이 끝날 때 자연스럽게 fade-out */
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t);
    o.stop(t + dur + 0.02);
  }

  return {
    /* 첫 인터랙션 때 AudioContext 깨우기 */
    init() { ensure(); },

    /* 정답 효과음 — 밝고 경쾌한 3음 상행 (도-미-솔) */
    playCorrect() {
      ensure();
      tone(523.25, 0.14, 0.5, 'sine', 0.00);  // 도 (C5)
      tone(659.25, 0.14, 0.5, 'sine', 0.12);  // 미 (E5)
      tone(783.99, 0.28, 0.55, 'sine', 0.24); // 솔 (G5)
    },

    /* 오답 효과음 — 낮고 짧은 2음 하행 */
    playWrong() {
      ensure();
      tone(300, 0.12, 0.38, 'triangle', 0.00); // 낮은 음
      tone(250, 0.18, 0.30, 'triangle', 0.10); // 더 낮은 음
    },

    /* 게임 완료 팡파레 — 화려한 5음 상행 + 마지막 롱노트 */
    playComplete() {
      ensure();
      [523.25, 659.25, 783.99, 1046.5, 1318.51].forEach((f, i) =>
        tone(f, 0.22, 0.5, 'sine', i * 0.14)
      );
      tone(1318.51, 0.65, 0.55, 'sine', 0.7); // 마지막 롱노트
    },
  };
})();

/* =====================================================================
   색깔 데이터 — 4가지 (빨강, 파랑, 노랑, 초록)
   items: 해당 색깔 물건 이모지 배열
   cssClass: 바구니 배경 CSS 클래스
   hex: 색 참조용 (현재 사용 여부 무관)
   ===================================================================== */
const COLOR_DATA = {
  red:    { name: '빨강', cssClass: 'basket-red',    items: ['🍎', '🌹', '🚒'] },
  blue:   { name: '파랑', cssClass: 'basket-blue',   items: ['🫐', '🌊', '🦋'] },
  yellow: { name: '노랑', cssClass: 'basket-yellow', items: ['🌟', '⭐', '🌻'] },
  green:  { name: '초록', cssClass: 'basket-green',  items: ['🌿', '🍀', '🐸'] },
};

/* 색깔 키 배열 */
const COLOR_KEYS = Object.keys(COLOR_DATA); // ['red','blue','yellow','green']

/* =====================================================================
   문제 생성 — 10문제
   앞 5문제: 바구니 2개 / 뒤 5문제: 바구니 3개
   각 문제: { colorKey, emoji, basketCount, basketColors }
   ===================================================================== */
function buildQuestions() {
  const questions = [];

  /* 각 색깔당 3개 이모지를 무작위 순서로 사용하기 위해 섞기 */
  const itemPool = {}; // colorKey → 섞인 이모지 배열 (복사본)
  COLOR_KEYS.forEach(k => {
    itemPool[k] = shuffle([...COLOR_DATA[k].items]);
  });

  /* 사용 인덱스 추적 */
  const itemIdx = { red: 0, blue: 0, yellow: 0, green: 0 };

  /* 10문제: 각 색깔이 골고루 나오도록 섞인 순서 결정 */
  /* 4색 × 2 = 8, 나머지 2는 랜덤 추가 → 총 10 */
  const colorSeq = shuffle([
    ...COLOR_KEYS,       // 4가지
    ...COLOR_KEYS,       // 4가지 (2번째 라운드)
    ...shuffle(COLOR_KEYS).slice(0, 2), // 추가 2개
  ]);

  colorSeq.forEach((colorKey, qIdx) => {
    /* 이모지 순환 (3개 다 쓰면 다시 처음부터) */
    const idx = itemIdx[colorKey] % 3;
    const emoji = itemPool[colorKey][idx];
    itemIdx[colorKey]++;

    /* 바구니 수: 앞 5문제=2개, 뒤 5문제=3개 */
    const basketCount = qIdx < 5 ? 2 : 3;

    /* 바구니 색 구성: 정답 색 + 오답 색들 */
    const otherKeys = shuffle(COLOR_KEYS.filter(k => k !== colorKey));
    const wrongKeys = otherKeys.slice(0, basketCount - 1);
    const basketColors = shuffle([colorKey, ...wrongKeys]);

    questions.push({ colorKey, emoji, basketCount, basketColors });
  });

  return questions;
}

/* =====================================================================
   게임 상태
   ===================================================================== */
const state = {
  questions: [],     // buildQuestions()로 생성된 문제 배열
  currentQ: 0,       // 현재 문제 번호 (0-based)
  isBusy: false,     // 애니메이션 처리 중 추가 클릭 방지
};

/* =====================================================================
   유틸 — 배열 셔플 (Fisher-Yates)
   ===================================================================== */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* =====================================================================
   화면 전환 헬퍼
   ===================================================================== */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* =====================================================================
   게임 시작 / 재시작
   ===================================================================== */
function restartGame() {
  AudioSys.init();
  state.questions = buildQuestions();
  state.currentQ = 0;
  state.isBusy = false;
  showScreen('game-screen');
  renderQuestion();
}

/* =====================================================================
   문제 렌더링
   ===================================================================== */
function renderQuestion() {
  const q = state.questions[state.currentQ];

  /* 진행 뱃지 업데이트 */
  document.getElementById('progress-badge').textContent =
    `${state.currentQ + 1} / 10`;

  /* 물건 카드 업데이트 */
  const itemCard = document.getElementById('item-card');
  const itemEmoji = document.getElementById('item-emoji');

  /* 진입 팝 애니메이션 재실행 */
  itemCard.style.animation = 'none';
  void itemCard.offsetWidth; // reflow 강제
  itemCard.style.animation = 'popIn .35s cubic-bezier(.34,1.56,.64,1)';
  itemCard.style.opacity = '1';
  itemCard.style.transform = '';

  itemEmoji.textContent = q.emoji;

  /* 바구니 버튼 생성 */
  const basketsArea = document.getElementById('baskets-area');
  basketsArea.innerHTML = '';

  q.basketColors.forEach((colorKey, i) => {
    const cd = COLOR_DATA[colorKey];
    const btn = document.createElement('button');
    btn.className = `basket-btn ${cd.cssClass}`;
    btn.setAttribute('data-color', colorKey);
    btn.setAttribute('aria-label', `${cd.name} 바구니`);
    /* 차례로 등장하는 지연 애니메이션 */
    btn.style.animationDelay = `${i * 0.08}s`;

    /* 바구니 이모지 */
    const emojiEl = document.createElement('span');
    emojiEl.className = 'basket-emoji';
    emojiEl.textContent = '🧺';

    /* 색 이름 */
    const nameEl = document.createElement('span');
    nameEl.className = 'basket-name';
    nameEl.textContent = cd.name;

    btn.appendChild(emojiEl);
    btn.appendChild(nameEl);

    /* 클릭 이벤트 */
    btn.addEventListener('click', () => onBasketClick(btn, colorKey === q.colorKey));
    /* 키보드 접근성 */
    btn.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        onBasketClick(btn, colorKey === q.colorKey);
      }
    });

    basketsArea.appendChild(btn);
  });
}

/* =====================================================================
   바구니 클릭 핸들러
   ===================================================================== */
function onBasketClick(basketBtn, isCorrect) {
  /* 처리 중이면 무시 */
  if (state.isBusy) return;

  AudioSys.init();

  if (isCorrect) {
    /* ===== 정답 처리 ===== */
    state.isBusy = true;

    /* 정답 효과음 */
    AudioSys.playCorrect();

    /* 물건이 바구니로 날아가는 애니메이션 실행 후 다음 문제 */
    flyItemToBasket(basketBtn, () => {
      /* 바구니 받는 팝 애니메이션 */
      basketBtn.classList.add('basket-pop');

      /* 축하 오버레이 표시 */
      showCorrectOverlay();

      /* 1초 후 오버레이 제거 + 다음 문제 진행 */
      setTimeout(() => {
        hideCorrectOverlay();
        state.currentQ++;

        if (state.currentQ >= 10) {
          /* 10문제 완료 → 결과 화면 */
          setTimeout(() => {
            AudioSys.playComplete();
            showResultScreen();
          }, 150);
        } else {
          state.isBusy = false;
          renderQuestion();
        }
      }, 1000);
    });

  } else {
    /* ===== 오답 처리 — 바구니 흔들기, 패널티 없음 ===== */
    AudioSys.playWrong();

    /* 바구니 흔들기 + 테두리 펄스 */
    basketBtn.classList.add('shake', 'error-pulse');

    basketBtn.addEventListener('animationend', () => {
      basketBtn.classList.remove('shake', 'error-pulse');
    }, { once: true });

    /* isBusy 변경 없음 → 바로 다시 선택 가능 */
  }
}

/* =====================================================================
   물건 → 바구니 날아가는 애니메이션
   1) 물건 카드의 화면 위치를 구함
   2) 바구니 버튼의 화면 위치를 구함
   3) body에 absolute 클론 이모지 추가
   4) CSS transition으로 이동 + 축소
   5) 완료 후 콜백 호출
   ===================================================================== */
function flyItemToBasket(basketBtn, onDone) {
  const itemCard = document.getElementById('item-card');
  const emoji = document.getElementById('item-emoji').textContent;

  /* 원본 물건 카드 위치 (viewport 기준) */
  const fromRect = itemCard.getBoundingClientRect();
  /* 바구니 버튼 위치 (viewport 기준) */
  const toRect = basketBtn.getBoundingClientRect();

  /* 날아가는 이모지 요소 생성 */
  const flyer = document.createElement('span');
  flyer.className = 'flying-item';
  flyer.textContent = emoji;

  /* 시작 위치: 물건 카드 중앙 */
  const startX = fromRect.left + fromRect.width / 2 - 36; // 폰트 크기 절반 보정
  const startY = fromRect.top + fromRect.height / 2 - 36;

  flyer.style.left = `${startX}px`;
  flyer.style.top  = `${startY}px`;
  flyer.style.fontSize = '4.5rem';
  flyer.style.opacity = '1';

  document.body.appendChild(flyer);

  /* 원본 물건 카드 페이드아웃 */
  itemCard.style.transition = 'opacity .2s';
  itemCard.style.opacity = '0';

  /* 다음 프레임에서 목표 위치로 이동 트랜지션 시작 */
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      /* 도착 위치: 바구니 중앙 */
      const endX = toRect.left + toRect.width / 2 - 24; // 축소 후 크기 보정
      const endY = toRect.top + toRect.height / 2 - 24;

      flyer.style.transition = 'left .45s cubic-bezier(.4,0,.2,1), top .4s cubic-bezier(.4,0,.2,1), font-size .4s ease, opacity .2s .35s';
      flyer.style.left = `${endX}px`;
      flyer.style.top  = `${endY}px`;
      flyer.style.fontSize = '2rem';  /* 바구니로 들어가며 작아짐 */
      flyer.style.opacity = '0';

      /* 이동 완료 후 클린업 + 콜백 */
      setTimeout(() => {
        flyer.remove();
        onDone();
      }, 500);
    });
  });
}

/* =====================================================================
   정답 축하 오버레이 — 동적 생성/제거
   ===================================================================== */
function showCorrectOverlay() {
  hideCorrectOverlay();

  const overlay = document.createElement('div');
  overlay.className = 'correct-overlay';
  overlay.id = 'correct-overlay';

  const emojiEl = document.createElement('div');
  emojiEl.className = 'correct-emoji-big';
  emojiEl.textContent = ['🌟', '✨', '🎊', '🥳', '🎉', '💫'][Math.floor(Math.random() * 6)];

  const textEl = document.createElement('div');
  textEl.className = 'correct-text';
  textEl.textContent = ['잘했어요!', '맞았어요!', '훌륭해요!', '완벽해요!'][Math.floor(Math.random() * 4)];

  overlay.appendChild(emojiEl);
  overlay.appendChild(textEl);
  document.body.appendChild(overlay);
}

function hideCorrectOverlay() {
  const existing = document.getElementById('correct-overlay');
  if (existing) existing.remove();
}

/* =====================================================================
   결과 화면 표시
   ===================================================================== */
function showResultScreen() {
  /* 별 5개 차례로 등장 */
  const starsEl = document.getElementById('result-stars');
  starsEl.innerHTML = '';
  ['⭐', '⭐', '⭐', '⭐', '⭐'].forEach((star, i) => {
    const span = document.createElement('span');
    span.textContent = star;
    span.style.display = 'inline-block';
    span.style.animation = `starPop .4s ${i * 0.12}s cubic-bezier(.34,1.56,.64,1) both`;
    starsEl.appendChild(span);
  });

  showScreen('result-screen');
}

/* =====================================================================
   게임 초기 실행
   ===================================================================== */
restartGame();
</script>
