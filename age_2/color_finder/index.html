<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>색깔 찾기 🎨</title>
<style>
/* ===== CSS 변수 — kidsbrainkr 브랜드 통일 ===== */
:root {
  --accent:    #FF6B35;
  --accent-dk: #E55A24;
  --mint:      #4ECDC4;
  --bg: linear-gradient(180deg, #E8F5FD 0%, #F3E5F5 50%, #FFF3E0 100%);
  --txt:       #333;
  --ok:        #2ECC71;
  --sh:  0 4px 16px rgba(0,0,0,.12);
  --sh2: 0 8px 32px rgba(0,0,0,.18);
  --r:   20px;
  --font: 'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
}

/* ===== 리셋 & 기본 ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  /* 배경에 부드러운 그라디언트 포인트 */
  background-image:
    radial-gradient(circle at 15% 15%, rgba(255,107,53,.07) 0%, transparent 50%),
    radial-gradient(circle at 85% 85%, rgba(78,205,196,.07) 0%, transparent 50%);
  color: var(--txt);
  font-family: var(--font);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 12px;
  /* 모바일에서 이중 탭 확대 방지 */
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}

/* ===== 화면 전환 — active 클래스로 표시/숨김 ===== */
.screen { display: none; width: 100%; max-width: 480px; }
.screen.active { display: flex; flex-direction: column; align-items: center; }

/* ===== 게임 화면 레이아웃 ===== */
#game-screen {
  min-height: calc(100vh - 24px);
  justify-content: space-between;
  gap: 16px;
  padding: 12px 0;
}

/* ===== 상단 상태 바 ===== */
.status-bar {
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
}

/* 문제 진행 뱃지 — "1 / 10" */
.progress-badge {
  background: #fff;
  border-radius: 24px;
  box-shadow: var(--sh);
  padding: 8px 22px;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 1px;
}

/* ===== 목표 색깔 영역 (상단, 크게) ===== */
.target-area {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

/* "이 색깔을 찾아봐요!" 안내 텍스트 */
.target-label {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--txt);
  text-align: center;
}

/* 목표 색깔 카드 — 화면 너비 대비 크게 */
.target-card {
  width: min(260px, 54vw);
  height: min(260px, 54vw);
  border-radius: 28px;
  box-shadow: var(--sh2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  /* 진입 시 스케일 애니메이션 */
  animation: popIn .35s cubic-bezier(.34,1.56,.64,1);
  border: 5px solid rgba(255,255,255,.6);
}

/* 목표 카드 안 색상 원 */
.target-circle {
  width: min(130px, 27vw);
  height: min(130px, 27vw);
  border-radius: 50%;
  box-shadow: inset 0 -4px 10px rgba(0,0,0,.15), 0 4px 14px rgba(0,0,0,.18);
  border: 4px solid rgba(255,255,255,.5);
}

/* 목표 카드 안 색 이름 */
.target-name {
  font-size: 1.8rem;
  font-weight: 800;
  color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,.35);
  letter-spacing: 1px;
}

/* ===== 선택지 영역 (하단 3개) ===== */
.choices-area {
  width: 100%;
  display: flex;
  gap: 12px;
  justify-content: center;
  align-items: stretch;
  padding: 0 4px;
}

/* 선택지 카드 — 탭 터치 영역 크게 */
.choice-card {
  flex: 1;
  max-width: 140px;
  aspect-ratio: 1 / 1.05;
  border-radius: 20px;
  box-shadow: var(--sh);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  border: 4px solid rgba(255,255,255,.5);
  transition: transform .12s, box-shadow .12s;
  /* 탭 시 빠른 피드백 */
  -webkit-tap-highlight-color: transparent;
}

/* 선택지 카드 호버 (PC 마우스) */
.choice-card:hover {
  transform: translateY(-4px) scale(1.03);
  box-shadow: var(--sh2);
}

/* 선택지 카드 안 색상 원 */
.choice-circle {
  width: min(65px, 14vw);
  height: min(65px, 14vw);
  border-radius: 50%;
  box-shadow: inset 0 -3px 8px rgba(0,0,0,.15), 0 3px 10px rgba(0,0,0,.18);
  border: 3px solid rgba(255,255,255,.5);
}

/* 선택지 카드 안 색 이름 */
.choice-name {
  font-size: 1.1rem;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 1px 6px rgba(0,0,0,.35);
}

/* ===== 정답 성공 오버레이 ===== */
.correct-overlay {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  /* 반투명 배경 */
  background: rgba(46,204,113,.82);
  z-index: 100;
  /* 팝업 애니메이션 */
  animation: fadeIn .2s ease;
  pointer-events: none;
}

.correct-emoji {
  font-size: min(120px, 28vw);
  animation: bounceIn .4s cubic-bezier(.34,1.56,.64,1);
  line-height: 1;
}

.correct-text {
  font-size: min(3rem, 9vw);
  font-weight: 800;
  color: #fff;
  text-shadow: 0 3px 12px rgba(0,0,0,.25);
  animation: bounceIn .45s .08s cubic-bezier(.34,1.56,.64,1) both;
}

/* ===== 결과 화면 ===== */
#result-screen {
  min-height: calc(100vh - 24px);
  justify-content: center;
  gap: 28px;
  padding: 24px 0;
}

.result-card {
  background: #fff;
  border-radius: 28px;
  box-shadow: var(--sh2);
  padding: 40px 32px;
  text-align: center;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}

.result-emoji {
  font-size: min(96px, 22vw);
  line-height: 1;
  animation: bounceIn .5s cubic-bezier(.34,1.56,.64,1);
}

.result-title {
  font-size: min(2.6rem, 8vw);
  font-weight: 800;
  color: var(--accent);
  line-height: 1.3;
}

.result-subtitle {
  font-size: 1.2rem;
  color: #888;
  font-weight: 600;
}

.result-stars {
  font-size: min(3rem, 9vw);
  letter-spacing: 8px;
  animation: bounceIn .5s .1s cubic-bezier(.34,1.56,.64,1) both;
}

/* 다시하기 버튼 */
.btn-restart {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 20px 56px;
  border-radius: 32px;
  font-size: 1.6rem;
  font-weight: 800;
  font-family: var(--font);
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(255,107,53,.4);
  transition: transform .15s, box-shadow .15s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.btn-restart:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(255,107,53,.5); }
.btn-restart:active { transform: translateY(0); }

/* ===== 키프레임 애니메이션 ===== */

/* 카드 진입 팝 */
@keyframes popIn {
  from { opacity: 0; transform: scale(.6); }
  to   { opacity: 1; transform: scale(1); }
}

/* 바운스 인 */
@keyframes bounceIn {
  from { opacity: 0; transform: scale(.5); }
  to   { opacity: 1; transform: scale(1); }
}

/* 페이드인 */
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* 오답 시 카드 흔들기 */
@keyframes shake {
  0%,100% { transform: translateX(0) rotate(0deg); }
  15%      { transform: translateX(-10px) rotate(-3deg); }
  30%      { transform: translateX(10px) rotate(3deg); }
  45%      { transform: translateX(-8px) rotate(-2deg); }
  60%      { transform: translateX(8px) rotate(2deg); }
  75%      { transform: translateX(-4px) rotate(-1deg); }
  90%      { transform: translateX(4px) rotate(1deg); }
}

/* 정답 카드 점프 */
@keyframes jumpUp {
  0%   { transform: scale(1) translateY(0); }
  40%  { transform: scale(1.15) translateY(-18px); }
  70%  { transform: scale(.97) translateY(-4px); }
  100% { transform: scale(1) translateY(0); }
}

/* 결과 화면 별 등장 */
@keyframes starPop {
  0%   { transform: scale(0) rotate(-30deg); opacity: 0; }
  60%  { transform: scale(1.2) rotate(5deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* 오답 카드 붉은 테두리 펄스 */
@keyframes errorPulse {
  0%,100% { border-color: rgba(255,255,255,.5); }
  40%     { border-color: #E74C3C; box-shadow: 0 0 0 4px rgba(231,76,60,.35); }
}

/* ===== 진입 애니메이션 — 선택지 카드 차례로 등장 ===== */
.choice-card:nth-child(1) { animation: popIn .3s .0s cubic-bezier(.34,1.56,.64,1) both; }
.choice-card:nth-child(2) { animation: popIn .3s .07s cubic-bezier(.34,1.56,.64,1) both; }
.choice-card:nth-child(3) { animation: popIn .3s .14s cubic-bezier(.34,1.56,.64,1) both; }

/* ===== 상태 클래스 ===== */

/* 오답 shake */
.shake { animation: shake .5s ease both !important; }

/* 오답 border 펄스 */
.error-pulse { animation: errorPulse .5s ease both !important; }

/* 정답 점프 */
.jump { animation: jumpUp .45s ease both !important; }

/* 선택 불가 (정답 판정 중) */
.disabled { pointer-events: none; }

  </style>
</head>

<!-- =====================================================================
     게임 화면 — 목표 색깔 카드(상단) + 선택지 카드 3개(하단)
     ===================================================================== -->
<div id="game-screen" class="screen active">

  <!-- 상단 진행 뱃지 -->
  <div class="status-bar">
    <div class="progress-badge" id="progress-badge">1 / 10</div>
  </div>

  <!-- 목표 색깔 영역 -->
  <div class="target-area">
    <p class="target-label">이 색깔을 찾아봐요!</p>
    <div class="target-card" id="target-card">
      <div class="target-circle" id="target-circle"></div>
      <span class="target-name" id="target-name"></span>
    </div>
  </div>

  <!-- 선택지 3개 -->
  <div class="choices-area" id="choices-area">
    <!-- JS로 동적 생성 -->
  </div>

</div>

<!-- =====================================================================
     결과 화면 — 10문제 완료 후 표시
     ===================================================================== -->
<div id="result-screen" class="screen">
  <div class="result-card">
    <div class="result-emoji">🎉</div>
    <div class="result-title">잘했어요!</div>
    <div class="result-stars" id="result-stars">⭐⭐⭐⭐⭐</div>
    <div class="result-subtitle">10개 색깔을 모두 찾았어요!</div>
    <button class="btn-restart" id="btn-restart" onclick="restartGame()">다시하기 🎨</button>
  </div>
</div>

<!-- 정답 오버레이 — JS로 body에 동적 추가 -->

<script>
/* =====================================================================
   오디오 시스템 — Web Audio API 합성음 (파일 없음)
   image_matching AudioSys 패턴 기반
   ===================================================================== */
const AudioSys = (() => {
  let ctx = null, masterGain = null;

  /* AudioContext 초기화 — suspended 상태이면 resume (iOS/Chrome 자동재생 정책 대응) */
  function ensure() {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain();
      masterGain.gain.value = 0.5;
      masterGain.connect(ctx.destination);
    }
    if (ctx.state === 'suspended') ctx.resume();
  }

  /* 단일 음 재생 헬퍼 — freq(Hz), dur(초), gain, 파형, 시작지연(초) */
  function tone(freq, dur, gain = 0.5, type = 'sine', delay = 0) {
    if (!ctx) return;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g);
    g.connect(masterGain);
    o.type = type;
    o.frequency.value = freq;
    const t = ctx.currentTime + delay;
    g.gain.setValueAtTime(gain, t);
    /* 음이 끝날 때 자연스럽게 fade-out */
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t);
    o.stop(t + dur + 0.02);
  }

  return {
    /* 첫 사용자 인터랙션 때 호출 — AudioContext 깨우기 */
    init() { ensure(); },

    /* 정답 효과음 — 밝고 경쾌한 3음 상행 (도-미-솔) */
    playCorrect() {
      ensure();
      tone(523.25, 0.15, 0.5, 'sine', 0.00);   // 도 (C5)
      tone(659.25, 0.15, 0.5, 'sine', 0.12);   // 미 (E5)
      tone(783.99, 0.28, 0.55, 'sine', 0.24);  // 솔 (G5)
    },

    /* 오답 효과음 — 낮고 짧은 2음 하행 (단2도 내림) */
    playWrong() {
      ensure();
      tone(300, 0.12, 0.38, 'triangle', 0.00);  // 낮은 음
      tone(250, 0.18, 0.30, 'triangle', 0.10);  // 더 낮은 음
    },

    /* 게임 완료 팡파레 — 화려한 5음 */
    playComplete() {
      ensure();
      [523.25, 659.25, 783.99, 1046.5, 1318.51].forEach((f, i) =>
        tone(f, 0.22, 0.5, 'sine', i * 0.14)
      );
      /* 마지막 음 길게 유지 */
      tone(1318.51, 0.6, 0.55, 'sine', 0.7);
    },
  };
})();

/* =====================================================================
   색깔 데이터 — 10종 (이름, 배경색, 원 색, 카드 배경색)
   배경색은 카드 전체 배경, 원 색은 색깔 원, bgLight는 더 연한 배경
   ===================================================================== */
const COLORS = [
  { id: 'red',    name: '빨강',  hex: '#E53935', card: '#FFCDD2', light: '#FFEBEE' },
  { id: 'blue',   name: '파랑',  hex: '#1E88E5', card: '#BBDEFB', light: '#E3F2FD' },
  { id: 'yellow', name: '노랑',  hex: '#FDD835', card: '#FFF9C4', light: '#FFFDE7' },
  { id: 'green',  name: '초록',  hex: '#43A047', card: '#C8E6C9', light: '#E8F5E9' },
  { id: 'orange', name: '주황',  hex: '#FB8C00', card: '#FFE0B2', light: '#FFF3E0' },
  { id: 'purple', name: '보라',  hex: '#8E24AA', card: '#E1BEE7', light: '#F3E5F5' },
  { id: 'pink',   name: '분홍',  hex: '#E91E8C', card: '#FCE4EC', light: '#FCE4EC' },
  { id: 'sky',    name: '하늘',  hex: '#29B6F6', card: '#B3E5FC', light: '#E1F5FE' },
  { id: 'white',  name: '하양',  hex: '#F5F5F5', card: '#ECEFF1', light: '#FAFAFA' },
  { id: 'black',  name: '검정',  hex: '#212121', card: '#B0BEC5', light: '#ECEFF1' },
];

/* =====================================================================
   게임 상태
   ===================================================================== */
const state = {
  totalQuestions: 10,      // 총 문제 수
  currentQ: 0,             // 현재 문제 번호 (0-based)
  questionOrder: [],       // 문제로 나올 색깔 순서 (섞인 배열)
  isBusy: false,           // 정답/오답 처리 중 추가 클릭 방지
};

/* =====================================================================
   유틸 — 배열 셔플 (Fisher-Yates)
   ===================================================================== */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* =====================================================================
   화면 전환 헬퍼
   ===================================================================== */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* =====================================================================
   게임 시작 / 재시작
   ===================================================================== */
function restartGame() {
  AudioSys.init();
  /* 전체 10종 색깔을 섞어 문제 순서 결정 */
  state.questionOrder = shuffle(COLORS);
  state.currentQ = 0;
  state.isBusy = false;
  showScreen('game-screen');
  renderQuestion();
}

/* =====================================================================
   문제 렌더링
   ===================================================================== */
function renderQuestion() {
  const q = state.currentQ;
  const target = state.questionOrder[q];

  /* --- 진행 뱃지 업데이트 --- */
  document.getElementById('progress-badge').textContent = `${q + 1} / ${state.totalQuestions}`;

  /* --- 목표 카드 업데이트 --- */
  const targetCard = document.getElementById('target-card');
  targetCard.style.background = target.card;
  /* 카드 진입 애니메이션 재실행 */
  targetCard.style.animation = 'none';
  void targetCard.offsetWidth; // reflow 강제
  targetCard.style.animation = '';

  document.getElementById('target-circle').style.background = target.hex;
  document.getElementById('target-name').textContent = target.name;

  /* --- 선택지 3개 구성 (정답 1 + 오답 2) ---
       나머지 색깔 중 무작위로 2개 뽑아 오답 구성 */
  const others = COLORS.filter(c => c.id !== target.id);
  const wrong2 = shuffle(others).slice(0, 2);
  const choices = shuffle([target, ...wrong2]);

  /* --- 선택지 DOM 렌더링 --- */
  const area = document.getElementById('choices-area');
  area.innerHTML = '';

  choices.forEach(color => {
    const card = document.createElement('div');
    card.className = 'choice-card';
    card.style.background = color.card;
    card.setAttribute('data-id', color.id);
    card.setAttribute('aria-label', color.name);
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');

    /* 색상 원 */
    const circle = document.createElement('div');
    circle.className = 'choice-circle';
    circle.style.background = color.hex;

    /* 색 이름 */
    const nameEl = document.createElement('span');
    nameEl.className = 'choice-name';
    nameEl.textContent = color.name;

    card.appendChild(circle);
    card.appendChild(nameEl);

    /* 클릭/터치 이벤트 */
    card.addEventListener('click', () => onChoiceClick(card, color.id === target.id));
    /* 키보드 접근성 */
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') onChoiceClick(card, color.id === target.id);
    });

    area.appendChild(card);
  });
}

/* =====================================================================
   선택지 클릭 핸들러
   ===================================================================== */
function onChoiceClick(card, isCorrect) {
  /* 처리 중이면 무시 */
  if (state.isBusy) return;

  AudioSys.init();

  if (isCorrect) {
    /* ===== 정답 처리 ===== */
    state.isBusy = true;

    /* 정답 효과음 */
    AudioSys.playCorrect();

    /* 선택지 카드 점프 애니메이션 */
    card.classList.add('jump');

    /* 축하 오버레이 표시 */
    showCorrectOverlay();

    /* 1.1초 후 오버레이 제거 + 다음 문제 */
    setTimeout(() => {
      hideCorrectOverlay();
      state.currentQ++;

      if (state.currentQ >= state.totalQuestions) {
        /* 10문제 완료 → 결과 화면 */
        setTimeout(() => {
          AudioSys.playComplete();
          showResultScreen();
        }, 150);
      } else {
        /* 다음 문제 */
        state.isBusy = false;
        renderQuestion();
      }
    }, 1100);

  } else {
    /* ===== 오답 처리 ===== */
    /* 오답 효과음 */
    AudioSys.playWrong();

    /* shake + error pulse 애니메이션 */
    card.classList.add('shake', 'error-pulse');

    /* 애니메이션 끝나면 클래스 제거 (다시 선택 가능) */
    card.addEventListener('animationend', () => {
      card.classList.remove('shake', 'error-pulse');
    }, { once: true });
    /* 패널티 없음 — isBusy 변경 없이 바로 다시 선택 가능 */
  }
}

/* =====================================================================
   정답 축하 오버레이 — 동적 생성/제거
   ===================================================================== */
function showCorrectOverlay() {
  /* 기존 오버레이 있으면 제거 */
  hideCorrectOverlay();

  const overlay = document.createElement('div');
  overlay.className = 'correct-overlay';
  overlay.id = 'correct-overlay';

  const emoji = document.createElement('div');
  emoji.className = 'correct-emoji';
  emoji.textContent = ['🌟','✨','🎊','🥳','🎉','💫'][Math.floor(Math.random() * 6)];

  const text = document.createElement('div');
  text.className = 'correct-text';
  text.textContent = ['잘했어요!', '맞았어요!', '훌륭해요!', '완벽해요!'][Math.floor(Math.random() * 4)];

  overlay.appendChild(emoji);
  overlay.appendChild(text);
  document.body.appendChild(overlay);
}

function hideCorrectOverlay() {
  const existing = document.getElementById('correct-overlay');
  if (existing) existing.remove();
}

/* ===== 보상 보고 (메인 허브 연동) ===== */
function reportReward(stars) {
  try {
    const data = JSON.parse(localStorage.getItem('kbr.rewards') || 'null') || {
      totalStars: 0, totalGames: 0, badges: [], history: [], streak: 0, lastDate: null
    };
    data.totalStars += stars;
    data.totalGames += 1;
    const today = new Date().toISOString().slice(0, 10);
    data.history.unshift({
      gameId: 'color_finder',
      area: '관찰력',
      stars: stars,
      date: today,
      timestamp: Date.now()
    });
    if (data.history.length > 100) data.history = data.history.slice(0, 100);
    if (data.lastDate !== today) {
      if (data.lastDate) {
        const diff = Math.floor((new Date(today) - new Date(data.lastDate)) / 86400000);
        data.streak = diff === 1 ? data.streak + 1 : 1;
      } else {
        data.streak = 1;
      }
      data.lastDate = today;
    }
    localStorage.setItem('kbr.rewards', JSON.stringify(data));
  } catch {}
}

/* =====================================================================
   결과 화면 표시
   ===================================================================== */
function showResultScreen() {
  reportReward(3);
  /* 별 5개 차례로 등장하는 효과 */
  const starsEl = document.getElementById('result-stars');
  starsEl.innerHTML = '';
  ['⭐','⭐','⭐','⭐','⭐'].forEach((star, i) => {
    const span = document.createElement('span');
    span.textContent = star;
    span.style.display = 'inline-block';
    span.style.animation = `starPop .4s ${i * 0.12}s cubic-bezier(.34,1.56,.64,1) both`;
    starsEl.appendChild(span);
  });

  showScreen('result-screen');
}

function _getItemHtml(emoji, sz) {
  sz = sz || 64;

  return '<img src="' + src + '" alt="' + emoji + '" style="width:' + sz + 'px;height:' + sz + 'px;object-fit:contain;" onerror="this.outerHTML=\'' + emoji + '\'">';
}

function _getItemSrc(emoji) {
  const f = _EMOJI_IMG[emoji];
  return f ? _ASSET_BASE + f : null;
}
