<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>위치 기억 게임 📍</title>
  <style>
    /* ===== CSS 변수 ===== */
    :root {
      --accent:  #FF6B35;
      --mint:    #4ECDC4;
      --bg:      #FFF8F0;
      --white:   #ffffff;
      --gray:    #e8e8e8;
      --red:     #FF4757;
      --yellow:  #FFE66D;
      --shadow:  0 4px 16px rgba(0,0,0,.10);
    }

    /* ===== 기본 리셋 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      user-select: none;
    }

    /* ===== 헤더 타이틀 ===== */
    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent);
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    /* ===== 상태 패널 ===== */
    #status-panel {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .badge {
      background: var(--white);
      border: 2px solid var(--gray);
      border-radius: 20px;
      padding: 4px 16px;
      font-size: 1rem;
      font-weight: 700;
      color: #444;
      box-shadow: var(--shadow);
    }

    .badge span {
      color: var(--accent);
    }

    /* ===== 안내 메시지 ===== */
    #message {
      font-size: 1.15rem;
      font-weight: 700;
      color: #333;
      text-align: center;
      min-height: 2rem;
      margin-bottom: 12px;
      transition: opacity .3s;
    }

    /* ===== 카운트다운 표시 ===== */
    #countdown {
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--accent);
      text-align: center;
      min-height: 4.5rem;
      margin-bottom: 8px;
      transition: transform .15s, opacity .15s;
    }
    #countdown.pop {
      transform: scale(1.35);
    }

    /* ===== 격자 컨테이너 ===== */
    #grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 16px;
      background: var(--white);
      border-radius: 20px;
      box-shadow: var(--shadow);
    }

    /* ===== 격자 칸 ===== */
    .cell {
      width:  90px;
      height: 90px;
      background: var(--white);
      border: 2px solid var(--gray);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: default;
      transition: background .2s, transform .1s;
      position: relative;
      overflow: hidden;
    }

    /* 공개 단계: 노란 배경 + 이모지 표시 */
    .cell.show {
      background: var(--yellow);
      border-color: #f0c040;
      transform: scale(1.04);
    }

    /* 입력 단계: 클릭 가능 커서 */
    .cell.clickable {
      cursor: pointer;
    }
    .cell.clickable:hover {
      background: #f5f5f5;
      transform: scale(1.04);
    }
    .cell.clickable:active {
      transform: scale(.95);
    }

    /* 정답 칸: 민트 배경 */
    .cell.correct {
      background: var(--mint);
      border-color: #38b2ac;
      cursor: default;
    }

    /* 오답 칸: 빨간 배경 → 애니메이션으로 flash */
    .cell.wrong {
      background: var(--red);
      border-color: #c0392b;
      animation: flash-red .6s ease;
      cursor: default;
    }

    /* 오답 후 정답 힌트 표시 (연노랑) */
    .cell.hint {
      background: var(--yellow);
      border-color: #f0c040;
    }

    @keyframes flash-red {
      0%   { transform: scale(1.1); }
      40%  { transform: scale(.95); }
      70%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    /* 이모지 내부 span */
    .cell .emoji {
      pointer-events: none;
      line-height: 1;
    }

    /* ===== 진행 바 (맞춘 개수) ===== */
    #progress-wrap {
      margin-top: 14px;
      width: 100%;
      max-width: 300px;
      text-align: center;
    }
    #progress-label {
      font-size: .95rem;
      font-weight: 700;
      color: #555;
      margin-bottom: 4px;
    }
    #progress-bar-bg {
      background: var(--gray);
      border-radius: 10px;
      height: 14px;
      overflow: hidden;
    }
    #progress-bar {
      background: var(--mint);
      height: 100%;
      border-radius: 10px;
      transition: width .3s ease;
    }

    /* ===== 단계 성공 오버레이 ===== */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #overlay.show { display: flex; }

    #overlay-box {
      background: var(--white);
      border-radius: 24px;
      padding: 36px 40px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.2);
      max-width: 340px;
      width: 90%;
    }
    #overlay-box .big-emoji {
      font-size: 4rem;
      margin-bottom: 12px;
      display: block;
    }
    #overlay-box h2 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 8px;
    }
    #overlay-box p {
      font-size: 1rem;
      color: #555;
      margin-bottom: 20px;
    }

    /* ===== 버튼 ===== */
    .btn {
      display: inline-block;
      padding: 12px 32px;
      border: none;
      border-radius: 24px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform .1s, box-shadow .1s;
      box-shadow: var(--shadow);
    }
    .btn:active { transform: scale(.95); }

    .btn-accent {
      background: var(--accent);
      color: var(--white);
    }
    .btn-mint {
      background: var(--mint);
      color: var(--white);
    }
    .btn-gray {
      background: #e0e0e0;
      color: #444;
    }

    /* ===== 결과 화면 ===== */
    #result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }
    #result-screen.show { display: flex; }

    #result-screen .trophy {
      font-size: 6rem;
      animation: bounce 1s infinite alternate;
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-14px); }
    }
    #result-screen h2 {
      font-size: 2rem;
      font-weight: 900;
      color: var(--accent);
    }
    #result-screen p {
      font-size: 1.1rem;
      color: #555;
    }

    /* ===== 게임 래퍼 ===== */
    #game-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* ===== 반응형 (모바일) ===== */
    @media (max-width: 420px) {
      .cell { width: 80px; height: 80px; font-size: 2.4rem; }
      h1 { font-size: 1.3rem; }
    }
  
    .home-float-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .home-float-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
<a href="../../index.html" class="home-float-btn" title="홈으로">🏠</a>


<!-- 게임 타이틀 -->
<h1>📍 위치 기억 게임</h1>

<!-- 상태 패널: 단계 + 이모지 개수 -->
<div id="status-panel">
  <div class="badge">단계 <span id="stage-num">1</span> / 4</div>
  <div class="badge">찾을 이모지 <span id="target-count">2</span>개</div>
</div>

<!-- 안내 메시지 -->
<div id="message">잘 봐요! 이모지 위치를 기억하세요 👀</div>

<!-- 카운트다운 숫자 -->
<div id="countdown"></div>

<!-- 격자 + 결과화면을 감싸는 래퍼 -->
<div id="game-wrap">

  <!-- 3×3 격자 -->
  <div id="grid">
    <!-- 9개 칸은 JS로 생성 -->
  </div>

  <!-- 진행 바 -->
  <div id="progress-wrap">
    <div id="progress-label">맞춘 칸: <span id="correct-count">0</span> / <span id="total-count">2</span></div>
    <div id="progress-bar-bg">
      <div id="progress-bar" style="width:0%"></div>
    </div>
  </div>

  <!-- 결과 화면 (4단계 모두 클리어) -->
  <div id="result-screen">
    <div class="trophy">🏆</div>
    <h2>모두 성공했어요!</h2>
    <p>위치 기억 능력이 최고예요! 🌟</p>
    <button class="btn btn-accent" onclick="restartAll()">처음부터 다시</button>
  </div>

</div>

<!-- 단계 클리어 / 재도전 오버레이 -->
<div id="overlay">
  <div id="overlay-box">
    <span class="big-emoji" id="overlay-emoji">🎉</span>
    <h2 id="overlay-title">단계 성공!</h2>
    <p id="overlay-msg">다음 단계로 가볼까요?</p>
    <button class="btn btn-mint" id="overlay-btn" onclick="overlayAction()">다음 단계 →</button>
  </div>
</div>

<script>
/*
 * =============================================================
 * 위치 기억 게임 - 만 4세용
 * 로직 구조:
 *   1. 게임 설정 (단계별 이모지 개수)
 *   2. 격자 생성
 *   3. 단계 시작 → show phase → 카운트다운 → hide phase → input phase
 *   4. 클릭 판정 → 진행 바 업데이트
 *   5. 모두 맞추면 단계 성공 오버레이
 *   6. 4단계 모두 성공 시 결과 화면
 *   7. Web Audio API 사운드 효과
 * =============================================================
 */

// ──────────────────────────────────────────────
// 1. 게임 설정
// ──────────────────────────────────────────────

/** 단계별 이모지 개수 (1단계=2개 ~ 4단계=5개) */
const STAGE_COUNTS = [2, 3, 4, 5];

/** 선택 가능한 이모지 풀 */
const EMOJI_POOL = ['🌟','🎈','🍎','🐶','🚗','🌈','💡','🎵','🏆'];

/** 이모지 공개 시간(ms) */
const SHOW_DURATION = 3000;

/** 오답 힌트 표시 시간(ms) */
const HINT_DURATION = 1200;

// ──────────────────────────────────────────────
// 2. 상태 변수
// ──────────────────────────────────────────────

let currentStage   = 0;   // 0-indexed (0~3)
let targetCells    = [];  // 이모지가 있던 칸 인덱스 배열
let currentEmoji   = '';  // 이번 단계에서 사용할 이모지
let correctClicks  = 0;   // 이번 단계에서 맞춘 수
let phase          = '';  // 'show' | 'input' | 'result'
let overlayIsRetry = false; // 오버레이 버튼이 재도전인지 여부

// ──────────────────────────────────────────────
// 3. DOM 참조
// ──────────────────────────────────────────────

const gridEl        = document.getElementById('grid');
const messageEl     = document.getElementById('message');
const countdownEl   = document.getElementById('countdown');
const stageNumEl    = document.getElementById('stage-num');
const targetCountEl = document.getElementById('target-count');
const correctCountEl= document.getElementById('correct-count');
const totalCountEl  = document.getElementById('total-count');
const progressBar   = document.getElementById('progress-bar');
const overlay       = document.getElementById('overlay');
const overlayEmoji  = document.getElementById('overlay-emoji');
const overlayTitle  = document.getElementById('overlay-title');
const overlayMsg    = document.getElementById('overlay-msg');
const overlayBtn    = document.getElementById('overlay-btn');
const resultScreen  = document.getElementById('result-screen');
const gameWrap      = document.getElementById('game-wrap');

// ──────────────────────────────────────────────
// 4. Web Audio API 사운드 엔진
// ──────────────────────────────────────────────

/** AudioContext 지연 생성 (첫 인터랙션 후) */
let audioCtx = null;

/**
 * AudioContext를 필요할 때만 생성.
 * 브라우저 자동재생 정책: 사용자 제스처 이후에만 작동.
 */
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

/**
 * 단순 음표 재생 헬퍼
 * @param {number} freq   - 주파수(Hz)
 * @param {number} dur    - 길이(초)
 * @param {number} vol    - 볼륨 (0~1)
 * @param {string} type   - 파형 ('sine'|'square'|'triangle'|'sawtooth')
 * @param {number} [delay=0] - 시작 지연(초)
 */
function playTone(freq, dur, vol, type = 'sine', delay = 0) {
  try {
    const ctx  = getAudioCtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.type      = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);

    gain.gain.setValueAtTime(0, ctx.currentTime + delay);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);

    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + dur + 0.05);
  } catch(e) {
    // 오디오 실패 시 무시
  }
}

/** 이모지 공개 시 '뿅' 소리 */
function soundReveal() {
  playTone(880, 0.12, 0.3, 'sine');
  playTone(1100, 0.10, 0.2, 'sine', 0.06);
}

/** 정답 클릭 맑은 소리 */
function soundCorrect() {
  playTone(1047, 0.15, 0.35, 'sine');   // C6
  playTone(1319, 0.12, 0.25, 'sine', 0.12); // E6
}

/** 오답 낮은 소리 */
function soundWrong() {
  playTone(220, 0.25, 0.35, 'sawtooth');
  playTone(185, 0.20, 0.25, 'sawtooth', 0.15);
}

/** 단계 성공 3음 상행 */
function soundStageClear() {
  playTone(523, 0.18, 0.4, 'sine');        // C5
  playTone(659, 0.18, 0.4, 'sine', 0.2);  // E5
  playTone(784, 0.28, 0.45, 'sine', 0.4); // G5
}

/** 전체 완료 팡파레 */
function soundFanfare() {
  const notes = [
    [523, 0], [659, 0.15], [784, 0.30],
    [1047, 0.48], [784, 0.68], [1047, 0.85]
  ];
  notes.forEach(([f, d]) => playTone(f, 0.22, 0.4, 'triangle', d));
}

/** 카운트다운 틱 소리 */
function soundTick() {
  playTone(440, 0.10, 0.2, 'square');
}

// ──────────────────────────────────────────────
// 5. 유틸리티
// ──────────────────────────────────────────────

/**
 * 배열에서 n개 랜덤 선택 (중복 없음)
 * @param {Array} arr
 * @param {number} n
 */
function pickRandom(arr, n) {
  const copy = [...arr];
  const result = [];
  for (let i = 0; i < n; i++) {
    const idx = Math.floor(Math.random() * copy.length);
    result.push(copy.splice(idx, 1)[0]);
  }
  return result;
}

/**
 * 배열에서 랜덤 1개 선택
 */
function pickOne(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

/**
 * Promise 기반 딜레이
 */
function wait(ms) {
  return new Promise(res => setTimeout(res, ms));
}

// ──────────────────────────────────────────────
// 6. 격자 생성
// ──────────────────────────────────────────────

/** 9개 칸을 DOM에 생성 */
function buildGrid() {
  gridEl.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.index = i;
    cell.addEventListener('click', onCellClick);
    gridEl.appendChild(cell);
  }
}

/** index번째 칸 DOM 반환 */
function getCell(index) {
  return gridEl.children[index];
}

/** 모든 칸의 클래스/내용 초기화 */
function resetCells() {
  for (let i = 0; i < 9; i++) {
    const c = getCell(i);
    c.className = 'cell';
    c.innerHTML = '';
  }
}

// ──────────────────────────────────────────────
// 7. 단계 시작 로직
// ──────────────────────────────────────────────

/** 게임 전체 초기화 후 1단계 시작 */
function startGame() {
  currentStage  = 0;
  resultScreen.classList.remove('show');
  gridEl.style.display = 'grid';
  document.getElementById('progress-wrap').style.display = 'block';
  startStage();
}

/** 현재 단계 시작 */
async function startStage() {
  phase = 'show';

  const count = STAGE_COUNTS[currentStage];
  currentEmoji = pickOne(EMOJI_POOL);
  targetCells  = pickRandom([0,1,2,3,4,5,6,7,8], count);
  correctClicks = 0;

  // 상태 패널 업데이트
  stageNumEl.textContent    = currentStage + 1;
  targetCountEl.textContent = count;
  totalCountEl.textContent  = count;
  updateProgress();

  resetCells();
  messageEl.textContent = `잘 봐요! 이모지 위치를 기억하세요 👀`;
  countdownEl.textContent = '';

  // 이모지 공개 (show phase)
  targetCells.forEach(idx => {
    const c = getCell(idx);
    c.classList.add('show');
    c.innerHTML = `<span class="emoji">${currentEmoji}</span>`;
    soundReveal();
  });

  // 카운트다운 3→2→1
  await runCountdown();

  // 이모지 숨김 (hide phase)
  hideEmojis();

  // 입력 대기 (input phase)
  phase = 'input';
  messageEl.textContent = `이모지가 있던 칸을 눌러봐요! 🖐️`;
  countdownEl.textContent = '';
  enableClicks();
}

/** 3초 카운트다운 표시 */
async function runCountdown() {
  for (let n = 3; n >= 1; n--) {
    countdownEl.textContent = n;
    soundTick();
    // 팝 애니메이션
    countdownEl.classList.remove('pop');
    void countdownEl.offsetWidth; // reflow 트릭
    countdownEl.classList.add('pop');
    await wait(1000);
  }
  countdownEl.textContent = '';
}

/** 이모지를 숨기고 일반 칸으로 되돌림 */
function hideEmojis() {
  targetCells.forEach(idx => {
    const c = getCell(idx);
    c.className = 'cell';
    c.innerHTML = '';
  });
}

/** 모든 칸에 클릭 가능 클래스 부여 */
function enableClicks() {
  for (let i = 0; i < 9; i++) {
    getCell(i).classList.add('clickable');
  }
}

/** 모든 칸에서 클릭 가능 클래스 제거 */
function disableClicks() {
  for (let i = 0; i < 9; i++) {
    getCell(i).classList.remove('clickable');
  }
}

// ──────────────────────────────────────────────
// 8. 클릭 판정
// ──────────────────────────────────────────────

/** 칸 클릭 이벤트 핸들러 */
async function onCellClick(e) {
  if (phase !== 'input') return;

  const cell  = e.currentTarget;
  const index = parseInt(cell.dataset.index);

  // 이미 판정된 칸은 무시
  if (cell.classList.contains('correct') ||
      cell.classList.contains('wrong') ||
      cell.classList.contains('hint')) return;

  if (targetCells.includes(index)) {
    // ✅ 정답
    cell.classList.remove('clickable');
    cell.classList.add('correct');
    cell.innerHTML = '✅';
    soundCorrect();
    correctClicks++;
    updateProgress();

    // 모든 정답 칸을 맞췄으면 단계 성공
    if (correctClicks === STAGE_COUNTS[currentStage]) {
      phase = 'done';
      disableClicks();
      await wait(400);
      onStageClear();
    }
  } else {
    // ❌ 오답
    disableClicks();
    phase = 'wrong';

    cell.classList.remove('clickable');
    cell.classList.add('wrong');
    soundWrong();

    // 정답 위치 힌트로 잠깐 표시
    const hintCells = targetCells.filter(i => {
      const c = getCell(i);
      return !c.classList.contains('correct');
    });
    await wait(300);
    hintCells.forEach(i => {
      const c = getCell(i);
      c.classList.add('hint');
      c.innerHTML = `<span class="emoji">${currentEmoji}</span>`;
    });

    await wait(HINT_DURATION);

    // 힌트 제거 후 재도전 오버레이
    hintCells.forEach(i => {
      const c = getCell(i);
      c.classList.remove('hint');
      c.innerHTML = '';
    });
    cell.classList.remove('wrong');

    onStageFail();
  }
}

// ──────────────────────────────────────────────
// 9. 진행 바 업데이트
// ──────────────────────────────────────────────

function updateProgress() {
  const total = STAGE_COUNTS[currentStage];
  correctCountEl.textContent = correctClicks;
  const pct = total > 0 ? (correctClicks / total) * 100 : 0;
  progressBar.style.width = pct + '%';
}

// ──────────────────────────────────────────────
// 10. 오버레이 처리
// ──────────────────────────────────────────────

/** 단계 성공 처리 */
function onStageClear() {
  soundStageClear();

  const isLast = (currentStage === 3);

  if (isLast) {
    // 4단계 모두 성공 → 결과 화면
    showResultScreen();
    return;
  }

  // 다음 단계 오버레이
  overlayIsRetry = false;
  overlayEmoji.textContent = '🎉';
  overlayTitle.textContent = `${currentStage + 1}단계 성공!`;
  overlayMsg.textContent   = `대단해요! 다음 단계로 가볼까요? 😊`;
  overlayBtn.textContent   = `${currentStage + 2}단계 도전 →`;
  overlayBtn.className     = 'btn btn-mint';
  showOverlay();
}

/** 단계 실패 처리 */
function onStageFail() {
  overlayIsRetry = true;
  overlayEmoji.textContent = '😅';
  overlayTitle.textContent = `아, 아쉬워요!`;
  overlayMsg.textContent   = `다시 한번 해볼까요? 할 수 있어요! 💪`;
  overlayBtn.textContent   = `다시 도전! 🔄`;
  overlayBtn.className     = 'btn btn-accent';
  showOverlay();
}

function showOverlay() {
  overlay.classList.add('show');
}
function hideOverlay() {
  overlay.classList.remove('show');
}

/** 오버레이 버튼 클릭 */
function overlayAction() {
  hideOverlay();
  if (overlayIsRetry) {
    // 같은 단계 재도전
    startStage();
  } else {
    // 다음 단계 진행
    currentStage++;
    startStage();
  }
}

// ──────────────────────────────────────────────
// 11. 보상 보고 (메인 허브 연동)
// ──────────────────────────────────────────────
function reportReward(stars) {
  try {
    const data = JSON.parse(localStorage.getItem('kbr.rewards') || 'null') || {
      totalStars: 0, totalGames: 0, badges: [], history: [], streak: 0, lastDate: null
    };
    data.totalStars += stars;
    data.totalGames += 1;
    const today = new Date().toISOString().slice(0, 10);
    data.history.unshift({
      gameId: 'position_memory',
      area: '기억력',
      stars: stars,
      date: today,
      timestamp: Date.now()
    });
    if (data.history.length > 100) data.history = data.history.slice(0, 100);
    if (data.lastDate !== today) {
      if (data.lastDate) {
        const diff = Math.floor((new Date(today) - new Date(data.lastDate)) / 86400000);
        data.streak = diff === 1 ? data.streak + 1 : 1;
      } else {
        data.streak = 1;
      }
      data.lastDate = today;
    }
    localStorage.setItem('kbr.rewards', JSON.stringify(data));
  } catch {}
}

// ──────────────────────────────────────────────
// 12. 결과 화면
// ──────────────────────────────────────────────

function showResultScreen() {
  reportReward(3);
  soundFanfare();
  phase = 'result';

  // 격자 숨기고 결과 화면 표시
  gridEl.style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  messageEl.textContent = '';
  countdownEl.textContent = '';

  resultScreen.classList.add('show');
}

/** 처음부터 다시 시작 */
function restartAll() {
  buildGrid();
  startGame();
}

// ──────────────────────────────────────────────
// 12. 초기 실행
// ──────────────────────────────────────────────

// 페이지 로드 시 격자 생성 + 게임 시작
buildGrid();
startGame();

</script>
