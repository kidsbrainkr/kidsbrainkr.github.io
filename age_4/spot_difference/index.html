<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta http-equiv="X-Content-Type-Options" content="nosniff"><meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>다른 그림 찾기 👀</title>
  <style>
    :root {
      --accent:#FF6B35; --accent-h:#e85a25; --mint:#4ECDC4; --mint-h:#38b8ae;
      --bg:#FFF8F0; --card-bg:#FFFFFF; --text:#333333;
      --shadow:0 4px 16px rgba(0,0,0,.12); --shadow-lg:0 8px 32px rgba(0,0,0,.18);
      --radius-sm:12px; --radius-md:20px; --radius-lg:24px;
      --correct:#2ECC71; --wrong:#E74C3C;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);font-family:'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow:hidden;user-select:none}

    .screen{display:none;flex-direction:column;align-items:center;width:100%;max-width:480px;gap:20px}
    .screen.active{display:flex;animation:fadeIn .4s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

    #startScreen{text-align:center;gap:28px}
    .start-logo{font-size:5rem;line-height:1;filter:drop-shadow(0 4px 12px rgba(0,0,0,.15));animation:float 2.4s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    .start-title{font-size:2.2rem;font-weight:900;color:var(--accent);line-height:1.2}
    .start-desc{font-size:1.1rem;color:#666;line-height:1.6}
    .rule-box{background:#fff;border:3px solid var(--mint);border-radius:var(--radius-md);padding:18px 24px;font-size:1rem;color:#444;line-height:1.8;width:100%}
    .rule-box strong{color:var(--accent)}

    .btn-primary{background:var(--accent);color:#fff;border:none;border-radius:50px;padding:18px 52px;font-size:1.5rem;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(255,107,53,.35);transition:transform .12s,box-shadow .12s;font-family:inherit}
    .btn-primary:active{transform:scale(.95);box-shadow:0 2px 8px rgba(255,107,53,.3)}

    #gameScreen{gap:0}
    .rule-banner{background:var(--accent);color:#fff;font-size:1.15rem;font-weight:800;border-radius:50px;padding:10px 28px;letter-spacing:.03em;margin-bottom:14px}
    .info-bar{display:flex;justify-content:space-between;width:100%;font-size:1rem;color:#888;font-weight:600;margin-bottom:10px}
    .info-bar span{color:var(--accent);font-size:1.1rem;font-weight:800}

    .progress-wrap{width:100%;height:14px;background:#e0e0e0;border-radius:50px;overflow:hidden;margin-bottom:22px}
    .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--mint),var(--accent));border-radius:50px;transition:width .3s ease}

    /* Grid */
    .grid-container{display:grid;gap:12px;margin-bottom:20px;justify-content:center;width:100%}
    .grid-item{font-size:3rem;background:#fff;border-radius:var(--radius-sm);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s,background .2s;aspect-ratio:1;border:3px solid transparent}
    .grid-item:active{transform:scale(.9)}

    @keyframes bounce{0%{transform:scale(1)}30%{transform:scale(1.3)}50%{transform:scale(.95)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
    .grid-item.found{animation:bounce .6s ease;border-color:var(--correct);background:#eafaf1}

    @keyframes shake{0%{transform:translateX(0)}15%{transform:translateX(-6px)}30%{transform:translateX(6px)}45%{transform:translateX(-4px)}60%{transform:translateX(4px)}100%{transform:translateX(0)}}
    .grid-item.wrong-click{animation:shake .4s ease;background:#fde8e8}

    .correct-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100}
    .particle{position:absolute;font-size:2rem;animation:particleFly 1s ease-out forwards}
    @keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.3)}}

    #resultScreen{text-align:center;gap:24px}
    .result-emoji{font-size:5rem;animation:float 2.4s ease-in-out infinite}
    .result-title{font-size:2rem;font-weight:900;color:var(--accent)}
    .result-stars{font-size:3.5rem;line-height:1}
    .result-score{font-size:1.3rem;font-weight:700;color:var(--mint)}
    .result-msg{font-size:1.3rem;font-weight:700;color:#444;background:#fff;border-radius:var(--radius-md);padding:14px 24px;border:3px solid var(--mint);width:100%}

    @media(max-width:480px){.grid-item{font-size:2.5rem}}
    @media(max-width:360px){.grid-item{font-size:2rem}.start-title{font-size:1.8rem}}
  </style>
</head>
<body>

<div id="startScreen" class="screen active">
  <div class="start-logo">👀</div>
  <div class="start-title">다른 그림 찾기!</div>
  <div class="start-desc">하나만 <strong style="color:var(--accent)">다른 그림</strong>을 찾아요!</div>
  <div class="rule-box">
    🍎🍎🍊🍎 ← <strong>🍊</strong>을 찾아요!<br>
    여러 그림 중 하나만 달라요!<br><br>
    총 <strong>10문제</strong> · 잘 살펴보세요! 🔍
  </div>
  <button class="btn-primary" id="btnStart">시작! 🚀</button>
</div>

<div id="gameScreen" class="screen">
  <div class="rule-banner">👀 다른 하나를 찾아요!</div>
  <div class="info-bar">
    <div>문제 <span id="qNum">1</span> / 10</div>
    <div>점수 <span id="score">0</span></div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="grid-container" id="gridContainer"></div>
</div>

<div id="resultScreen" class="screen">
  <div class="result-emoji" id="resultEmoji">🎉</div>
  <div class="result-title">게임 끝!</div>
  <div class="result-stars" id="resultStars"></div>
  <div class="result-score" id="resultScore"></div>
  <div class="result-msg" id="resultMsg"></div>
  <button class="btn-primary" id="btnRestart">다시 하기 🔄</button>
</div>

<div class="correct-overlay" id="overlay"></div>

<script>
let audioCtx=null;
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function playNotes(notes,type='sine',vol=0.4,startAt=0){const ctx=getAudioCtx();let t=ctx.currentTime+startAt;notes.forEach(([freq,dur])=>{const osc=ctx.createOscillator();const gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.type=type;osc.frequency.setValueAtTime(freq,t);gain.gain.setValueAtTime(vol,t);gain.gain.exponentialRampToValueAtTime(0.0001,t+dur);osc.start(t);osc.stop(t+dur+0.01);t+=dur})}
function playCorrect(){playNotes([[523,.1],[659,.1],[784,.15]],'sine',.35)}
function playWrong(){playNotes([[300,.12],[220,.22]],'square',.25)}
function playWin(){playNotes([[523,.1],[587,.1],[659,.1],[784,.12],[1047,.25]],'sine',.3)}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}

function spawnParticles(){const ol=document.getElementById('overlay');ol.innerHTML='';const emojis=['🌟','✨','⭐','💫','🎉'];for(let i=0;i<12;i++){const p=document.createElement('div');p.className='particle';p.textContent=emojis[Math.floor(Math.random()*emojis.length)];p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';p.style.setProperty('--dx',(Math.random()-0.5)*200+'px');p.style.setProperty('--dy',(Math.random()-0.5)*200+'px');ol.appendChild(p)}setTimeout(()=>{ol.innerHTML=''},1200)}

const screens={start:document.getElementById('startScreen'),game:document.getElementById('gameScreen'),result:document.getElementById('resultScreen')};
function showScreen(name){Object.values(screens).forEach(s=>s.classList.remove('active'));screens[name].classList.add('active')}

const emojiSets=[
  {main:'🍎',odd:'🍊'},{main:'🐶',odd:'🐱'},{main:'🌸',odd:'🌻'},
  {main:'⚽',odd:'🏀'},{main:'🐟',odd:'🐙'},{main:'🍕',odd:'🌮'},
  {main:'🚗',odd:'🚌'},{main:'🦋',odd:'🐛'},{main:'🌙',odd:'⭐'},
  {main:'🎈',odd:'🎁'},{main:'🐸',odd:'🐢'},{main:'🍌',odd:'🍋'},
  {main:'🐧',odd:'🐤'},{main:'🌺',odd:'🌷'},{main:'🍇',odd:'🫐'}
];

const TOTAL_Q=10;
let questions=[],curQ=0,scoreCount=0,inputLocked=false;

function getGridSize(round){
  if(round<3)return{cols:2,rows:2};      // 2x2 = 4
  if(round<7)return{cols:3,rows:3};      // 3x3 = 9
  return{cols:4,rows:3};                  // 4x3 = 12
}

function generateQuestions(){
  const pool=shuffle([...emojiSets]);
  const qs=[];
  for(let i=0;i<TOTAL_Q;i++){
    const set=pool[i%pool.length];
    const grid=getGridSize(i);
    const total=grid.cols*grid.rows;
    const oddIdx=Math.floor(Math.random()*total);
    const items=[];
    for(let j=0;j<total;j++){
      items.push(j===oddIdx?set.odd:set.main);
    }
    qs.push({items,oddIdx,cols:grid.cols,rows:grid.rows});
  }
  return qs;
}

function renderQuestion(){
  inputLocked=false;
  const q=questions[curQ];
  document.getElementById('qNum').textContent=curQ+1;
  document.getElementById('score').textContent=scoreCount;
  document.getElementById('progressBar').style.width=((curQ)/TOTAL_Q*100)+'%';

  const container=document.getElementById('gridContainer');
  container.innerHTML='';
  container.style.gridTemplateColumns='repeat('+q.cols+', 1fr)';
  container.style.maxWidth=(q.cols*90)+'px';

  q.items.forEach((emoji,i)=>{
    const div=document.createElement('div');
    div.className='grid-item';
    div.textContent=emoji;
    div.addEventListener('click',()=>handleClick(div,i));
    container.appendChild(div);
  });
}

function handleClick(el,idx){
  if(inputLocked)return;
  const q=questions[curQ];

  if(idx===q.oddIdx){
    inputLocked=true;
    scoreCount++;
    playCorrect();
    el.classList.add('found');
    spawnParticles();
    const allItems=document.querySelectorAll('.grid-item');
    allItems.forEach(item=>item.style.pointerEvents='none');
    setTimeout(()=>{curQ++;if(curQ<TOTAL_Q){renderQuestion()}else{endGame()}},900);
  }else{
    playWrong();
    el.classList.add('wrong-click');
    setTimeout(()=>{el.classList.remove('wrong-click')},400);
  }
}

function reportReward(stars){
  try{
    const data=JSON.parse(localStorage.getItem('kbr.rewards')||'null')||{totalStars:0,totalGames:0,badges:[],history:[],streak:0,lastDate:null};
    data.totalStars+=stars;data.totalGames+=1;
    const today=new Date().toISOString().slice(0,10);
    data.history.unshift({gameId:'spot_difference',area:'관찰력',stars,date:today,timestamp:Date.now()});
    if(data.history.length>100)data.history=data.history.slice(0,100);
    if(data.lastDate!==today){if(data.lastDate){const diff=Math.floor((new Date(today)-new Date(data.lastDate))/86400000);data.streak=diff===1?data.streak+1:1}else{data.streak=1}data.lastDate=today}
    localStorage.setItem('kbr.rewards',JSON.stringify(data));
  }catch(e){}
}

function endGame(){
  playWin();
  const stars=scoreCount>=9?3:(scoreCount>=6?2:1);
  reportReward(stars);

  document.getElementById('resultStars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('resultScore').textContent=scoreCount+' / '+TOTAL_Q+' 문제 맞았어요!';

  let emoji,msg;
  if(scoreCount===TOTAL_Q){emoji='🏆';msg='완벽해요! 관찰왕! 👑'}
  else if(scoreCount>=8){emoji='🎉';msg='정말 잘했어요! 최고예요! 🌟'}
  else if(scoreCount>=6){emoji='😊';msg='잘했어요! 한 번 더 해볼까요?'}
  else if(scoreCount>=4){emoji='🙂';msg='조금 더 연습하면 잘할 수 있어요!'}
  else{emoji='💪';msg='다시 한번 도전해봐요! 파이팅!'}

  document.getElementById('resultEmoji').textContent=emoji;
  document.getElementById('resultMsg').textContent=msg;
  showScreen('result');
}

function startGame(){
  questions=generateQuestions();curQ=0;scoreCount=0;inputLocked=false;
  showScreen('game');renderQuestion();
}

document.getElementById('btnStart').addEventListener('click',()=>{getAudioCtx();startGame()});
document.getElementById('btnRestart').addEventListener('click',()=>{startGame()});
</script>
</body>
</html>
